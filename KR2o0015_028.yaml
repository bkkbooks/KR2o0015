body:
  text: 歷代名賢確論卷二十八老子之道荆公樂天潁濱范文正東坡佛老之教昌黎六一潁濱老子之道荆公曰道有本末本者萬物之所以生也末者萬物之所以成也本者出之自然故不假乎人之力而萬物以生也末者涉乎形器故待人力而後萬物以成也夫其不假人之力而萬物以生則是聖人可以無言也無為也至乎有待於人力而萬物以成則是聖人之所以不能無言也無為也故昔聖人之在上而以萬物為已任者必制四術焉四術者禮樂刑政是也所以成萬物者也故聖人唯務修其成萬物者不言其生萬物者蓋生者尸之於自然非人力之所得與矣老子者獨不然以為涉乎形器者皆不足言也不足為也故抵去禮樂刑政而唯道之稱焉是不察於理而務髙之過矣夫道之自然者又何預乎唯其涉乎形器是以必待於人之言也人之為也其書曰三十輻共一轂當其無有車之用夫轂輻之用固在於車之無用然工之琢削未嘗及於無者蓋無出於自然之力可以無與也今之治車者知治其轂輻而未嘗及於無也然而車以成者蓋轂幅具則無必為用矣如其知無為用而不治轂輻則為車之術固已疏矣今知無之為車用無之為天下用然不知所以為用也故無之所以為用者以有轂輻也無之所以為天下用者以有禮樂刑政也如其廢轂輻於車廢禮樂刑政於天下而坐求其無之為用也則亦近於愚矣潁濱曰孔子以仁義教人而以禮樂治天下仁義禮樂之變無窮而其稱曰吾道一以貫之茍無以貫之則因變而行義必有支離而不合者矣易曰形而上者謂之道形而下者謂之器語曰君子上達小人下達而孔子自謂下學而上達者灑掃應對詩書禮樂皆其所從學也而君子由是以達其道小人由是以得其器達其道故萬變而致一得其器故有守而不蕩此孔子之所以兩得之也蓋孔子之為人也周故示人以器而晦其道使達者有見而未達者不眩也老子之自為也深故示人以道而略其器使達者易入而不恤其未達也要之其實皆至於道而所從施之有先後耳三代之後釋氏與孔老並行於世其所以異者體道愈逺而立於世之表指天下之所不見以示人而不憂其不悟其説又老氏之眇也老子八十一章豫嘗為之解其説如此范文正公曰老子曰名與身孰親言人知愛名不如愛其身之親也莊子曰為善無近名言為善近名人將嫉之非全身之道也此皆道家之訓使人薄於名而保其真斯人之徒非爵祿可加賞罰可動豈為國家之用哉我先王以名為教使天下自勸湯解網文王葬枯骨天下諸侯聞而歸之是三代人君已因名而重也太公直鈎以邀文王夷齊餓死于西山仲尼聘七十國以求行道是聖賢之流無不涉乎名也孔子作春秋即名教之書也善者褒之不善者貶之使後世君臣愛令名而勸畏惡名而惰矣夫子曰疾沒世而名不稱易曰善不積不足以成名然則為善近名豈無偽耶臣請辨之孟子曰堯舜性之也性本仁義三王身之也躬行仁義五霸假之也假仁義而求名後之諸侯逆天暴物殺人盜國不復愛其名者也人臣亦然有性本忠孝者上也行忠孝者次也假忠孝而求名者又次也至若簡賢附勢反道敗德弒父叛君唯欲是從不復愛其名者下也人不愛名則雖有刑法干戈不可止其惡也武王克商式商容之閭釋箕子之囚封比干之墓是聖人敦奬名教以激勸天下如取道家之言不使近名則豈復有忠臣烈士為國家之用哉東坡曰天下之道惟其辨之而無窮攻之而無間辨之而有窮攻之而有間不足以為道昔者六國之際處士橫議以熒惑天下楊氏為我而墨氏兼愛凡天下之人有以君臣父子之親而不相顧者皆歸於楊氏而道途之人皆可以為父子兄弟者舉皆歸於墨氏也夫天下之人不可以絶天屬之親而合其無故之歡此其勢然也故老聃莊周知天下之不正也起而承之以為兼愛為我之不足以收天下是以不為為我不為兼愛而處乎兼愛為我之外此其意以為不兼愛則天下譏其無親不為我則天下譏其為人故兩無所適處而泛泛焉浮遊於其間而曰我皆無所為以是足以自免而逃天下之是非矣天下之惟其是所是非所非是以其説可得而考其終今以老莊無所是非而其路歸於無有此其思之亦詳矣楊氏之為我墨氏之兼愛此其為道莫不有所執也故為我者為兼愛之所詆而兼愛者為為我之所毁是二者其地皆不可居然而得其間而固守之則可以杜天下之異端而絶其口蓋古之聖人惟其得而居之是以天下大服而其道遂傳於後世今老聃莊周不得由大道而見其隙竊入於其間而執其機是以其路縱橫堅固而不可破也且夫天下之事安可一説治也而彼二子者欲一而兼愛斷之以為我故其説有時焉而遂窮夫聖人能處於其間而制其當然兼愛為我亦莫齊也而能用之以無失乎道處天下之紛紜而不失其當故曰伯夷叔齊虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可夫無可無不可此老聃莊周之所以為辨也而仲尼亦云則夫老聃莊周其思之不可以為不繆矣蓋嘗聞聖人之道處於可不可與之際而遂從而實之是以其説汗漫而不可詰今將以求夫仲尼老聃之是非者惟能知夫虛實之可用與否也已蓋夫天下固有物也有物而相遭則固亦有事矣是故聖人從其有而制其御有之道以治其有實之事則於天下夫亦何事之不可為至區區焉求其有以納之於無則其為用不勝勞矣夫老聃莊周則未嘗知其窮矣夫其窮者何也不若從其有而有之之為易也故曰常無欲以觀其妙而又曰常有欲以觀其徼既曰無之以為用又曰有之以為利而至於佛者則曰斷滅而又曰無斷無滅既曰無矣而又恐無之反以強既斷滅矣又恐斷滅之為纍則夫其情可見矣昔者仲尼有言曰君子之中庸也君子而時中小人之中庸也小人而無忌憚也夫老聃莊周其迹近於中庸而無忌憚也哉樂天曰夫欲使人情儉朴時俗清和莫先於體黃老之道也其道在乎尚寬簡務儉素不眩聰察不役智能而已蓋善用之者雖一邑一郡一國至於天下皆可以致清淨之理焉昔宓賤得之故不下堂而單父之人化汲黯得之故不出閣而東海之政成曹參得之故獄市勿擾齊國大和漢文得之故刑伐不用而天下大理其故無他清淨之所致耳故老子曰我無為而人自化我好靜而人自正我無事而人自富我無欲而人自撲此四者皆黃老之要道也陛下誠能體而行之則人儉朴而俗清和矣佛老之教昌黎曰博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎己無待於外之謂德仁與義為定名道與德為虛位故道有君子有小人而德有凶有吉老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂德德其所德非吾所謂德也凡吾所謂道德云者合仁與義言之也天下之公言也老子之所謂道德云者去仁與義言之也一人之私言也周道衰孔子沒火于秦黃老于漢佛于晉宋齊梁魏隋之間其言仁義道德云者不入于楊則入于墨不入于墨則入于老不入于老則入于佛入于彼必出于此入者主之出者奴之入者附之出者汙之噫後之人其欲聞仁義道德之説孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其説樂其誕而自小也亦曰吾師亦嘗師之云爾不惟舉之於其口而又筆之於其書噫後之人雖欲聞仁義道德之説其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盜也古之時人之害多矣有聖人者立然後教之相生養之道為之君為之師驅其蟲蛇禽獸而處之中土焉寒然後為之衣飢然後為之食木處而顛土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其湮鬱為之政以率其怠倦為之刑以鋤其強梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之害至而為之備患生而為之防今其言曰聖人不死大盜不止剖斗折衡而民不爭嗚呼其亦不思而已矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無爪牙以爭食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也君不出令則失其所以為君臣不能行君之令而致之民則失其所以為臣民不出粟米麻絲作器皿通貨財以事其上則誅今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清淨寂滅者嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也帝之與王其號各殊其所以為聖一也夏葛而冬裘渴飲而飢食其事雖殊其所以為智一也今其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也傳曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外天下國家者滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之夷而進於中國則中國之經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荆舒是懲今也舉夷狄之法而加之先王之教之上幾何其不胥而為夷也夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂德其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賓主昆弟夫婦其服絲麻其居宫室其食粟米蔬果魚肉其為道易明而其教易行也是故以之為己則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼饗曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與揚也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其説長然則如之何其可也曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡孤獨廢疾者有養也其亦庶乎其可也六一曰夫老與佛之學皆行於世久矣為其徒者常相訾病若不相容於世二家之説皆見斥於吾儒宜其合勢并力以為拒守而乃反自相攻惟恐不能相弱者何哉豈其死生性命所持之説相盩而然耶故其代為興衰各繫於時之好惡雖善辨者不能合二説而一之至其好大宫室以矜世人則其為事同焉而佛能箝人情而鼓以禍福人之趨者常衆而熾老氏獨好言清淨逺去靈仙飛化之術其事冥深不可質究則其為常以淡泊無為為務故凡佛氏之動搖興作為力甚易而道家非遭人主之好尚不能獨興其間能自力而不廢者豈不賢於其徒也哉潁濱曰聖人將有以奪之必有以豫之將有以正之必有以揉之納之於正而無傷其心去其邪僻而無絶其不忍之意有所矯拂於天下大變其俗而天下不知其為變也釋然而順油然而化無所齟齬而天下遂至於大正矣蓋天下之民邪淫不法紛亂而至於不可告語者非今世而然也夫古者三代之民耕田而後食其粟蠶繅而後衣其帛欲享其利而勤其力欲獲其報而厚其施欲求父子之親則盡心於慈孝之道欲求兄弟之和則致力於友悌之節欲求夫婦之相安朋友之相信亦莫不務其所以致之之術故民各治其生無望於僥幸之福而力行於可信之事凡其所以養生求福之道如此其精也至其不幸而死其親戚子弟又為之死喪祭祀歲月伏臘之制所以報其先祖之恩而可安恤孝子之道者甚具而有法籩豆簠簋飲食酒醴之薦大者於廟而小者於寢薦新時祭春秋不闕故民終三年之喪而又於終身不絶之恩愛慘然若其父祖之居於其前而享其報也至於後世則不然民怠於自修而其所以養生求福之道皆歸於鬼神冥寞之間不知先王死喪祭祀之禮而其所以追養其先祖之意皆入於佛老虛誕之説是以異端之教交於中國縱橫放肆其尊貴富盛比於王者而其徒黨遍於天下其宫室屋宇衣服飲食常侈於天下之民而中國之人明哲禮義之士亦未嘗以為怪幸而其間有疑怪不信之心則又安視而不能去此其何故也彼能執天下養生報死之權而吾無以當之是以若此不可制也蓋天下之君子嘗欲去之而亦既去矣去之不久而還復其故其教之入於民者甚深而其道之恱於民者甚佞世之君子未有以解其所以入而易其所以恱是以終不能服天下之民以為養生報死皆出於此吾未有以易之而遂絶其教欲納之正而傷其心欲去其邪僻而絶其不忍之意故民之從之也甚難聞之曰川竭而谷虛丘夷而淵實作乎此者必有以動乎彼也夫天下之民非有所恱乎佛老之道而恱乎養生報死之術今能使之得其所以恱之之實而去其所以恱之之名則天下何病而不從蓋先王之教民養生有方而報死有禮凡國之賞罰黜陟各當其實貧富貴賤皆出於其人之所當然力田而多收畏法而無罪行立而名聲發德成而爵祿至天下之人皆知其所獲福之因故無惑於鬼神而其祭祀之禮所以仁其祖宗而慰其子孫之意者非有鹵莾不祥之意也故孝子慈孫有所歸心而無事於佛老臣愚以為嚴賞罰敕官吏明好惡慎取豫不赦有罪使佛老之福不得茍且而惑其生因天下之爵秩建宗廟嚴祭祀立尸祝有以大塞人子之望使佛老之報不得乘隙而制其死蓋漢唐之際嘗有行此者矣而佛老之説未去亦嘗有去者矣而賞罰不詳祭祀不謹是以其道牢固而不可去既去而復反其舊又曰善為言者因其人之言而與之言則天下之辨者服矣與其里人言曰吾父以為不然則誰肯信以為爾父之是是故不若與之論曲直雖楚人可以與秦人言之而無害故夫天下之所為多言以排夫異端終以不明者惟不務辨其是非利害而以父屈人也夫聖人之所為尊於天下為其知天理之所在也而周公仲尼所以為信於天下以其子弟而知之也故非其子弟則天下有不知周公之為周公而仲尼之為仲尼也是故老聃莊周其為説不可以周孔辨也何者彼且以為周孔之不足信也夫聖人之於事譬如規矩之於方圓爾天下之人信規矩之於方圓而以規矩辨天下之不方不圓則不若求其至方至圓以隂合於規矩使規而不圓矩而不方則無害於吾説若此則其勢易以折天下之異論昔者天下之士其論老聃莊周與佛老之道皆未嘗得其要也老聃之説曰去仁義絶禮樂而後天下安吾之説曰仁義禮樂天下之所恃以治者佛之説曰棄父絶子不為夫婦放雞豚食菜茹而後萬物遂而吾之説曰父子夫婦食雞豚而遂萬物之性夫彼且以其説而吾亦以其説彼且不吾信如吾之不彼信也蓋天下之不從莫急於未信而強劫之故夫仁以安人而行之以義節之以禮而播之以樂守之以君臣而維之以父子兄弟食肉而飲酒此明於孔子者之所知也而欲以諭其所不知之人而曰孔子則然嗟夫難哉愚則不然曰天下之道辨之而無窮攻之而無間辨之而有窮攻之而有間則是不足以為道果孔子而有窮也亦將舍而他之惟其無窮是以知其為道而無疑蓋天下有能平其心而觀焉而不牽夫仲尼老聃之名而後可以語此也又曰易曰形而上者謂之道形而下者謂之器自五帝三王以形器治天下道之以禮樂齊之以政刑道行於其間而民莫知也文武之後雖召公畢公之賢君子不以為知道者至春秋之際管仲晏子子産叔向之徒以仁義忠信成功於天下然於其道則已逺矣孔子出於周末收文武之遺而得堯舜之極其稱曰君子上達小人下達嘗自謂我下學而上達者於其門人惟顔子曾子庶幾以道許之一時賢者若老子之明道其所以尊之者至矣史稱孔子既見老子退謂弟子曰鳥吾知其能飛魚吾知其能遊獸吾知其能走走者可以為網遊者可以為綸飛者可以為繒至於龍吾不能知其乘雲氣而上天吾今日見老子其猶龍耶老子體道而不嬰於物孔子至以龍比之然卒不與共斯世也捨禮樂刑政而欲行道於世孔子固知其難哉東漢以來佛法始入中國其道與老相出入皆易所謂形而上者而漢世士大夫不能明也魏晉以後略知之矣好之篤者則欲施之於世疾之深者則欲絶之於世二者皆非也老佛之道與吾道同而欲絶之老佛之教與吾教異而欲行之皆失之矣秦姚興區區一隅招延緇素譯經談妙至者凡數千人而姚氏之亡曾不旋踵梁武繼之江南佛事前世所未嘗見至捨身為奴𨽻郊廟之祭不薦毛血父子皆陷於侯景而國隨以亡議者觀秦梁之敗則以佛法為不足賴矣後魏太武深信崔浩浩不信佛法勸帝斥去僧徒毁經壞寺既滅佛法而浩亦以非罪赤族唐武宗欲求長生徇道士之私夷佛滅僧不期年而以弒崩議者觀魏唐之禍則以佛法為不可忤矣二者皆見其一偏耳老佛之道非一人之私説也自有天地而有是道矣古之君子以之治氣養心其髙不可嬰其潔不可溷天地神人皆將望而敬之聖人之所以不疾而速不行而至者一用此道也老子曰天得一以清地得一以寧神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐絶侯王無以貴高將恐蹶道之於物無所不在而尚可非乎雖然蔑君臣廢父子而以行道於世其弊必有不可勝言者誠以形器治天下道之以禮樂齊之以政刑道行於其間而民不知萬物並育而不相害道並行而不相悖渙然不見其際而天下化不亦周孔之遺意也哉歷代名賢確論卷二十八
