body:
  text: 歷代名賢確論卷一百五代通論五代人君得失興亡東坡何去非子由唐莊宗周世宗溫公五代無全臣六一馮道溫公子由世家附南唐荆公五代人君得失興亡東坡論曰商周之興始於稷卨而至於湯武凡數百年之間而後得之於天下其成功甚難而享天下之利至緩也然桀紂既滅收天下朝諸侯已處於天子之尊而下無不服之志誅一匹夫而天下遂定蓋其用力亦甚易而無勞也至於秦漢之際其英雄豪傑之士逐天下之利惟恐不及而聞天下之釁惟恐其後之也奮臂於大澤而天下之士雲合嚮應轉戰終日而辟地千里其取天下若此其無難也然天下已定君臣之分既明分裂海內以王諸將將以傳之無窮百世而不變而數嵗之間功臣大國反者如毛而起是何其取之之易而守之之難也若夫五代干戈之際其事雖不足道然觀其帝王起於匹夫鞭笞海內戰勝攻取而自梁以來不及百年天下五嬗逺者不過數十嵗其智慮曽不足以及其後世此亦甚可怪也蓋嘗聞之梁之亡其父子兄弟自相屠滅虐用其民而天下叛周之亡適遭聖人之興而不能以自立此二者君子之所以不疑於其間也而後唐之莊宗明宗與晉漢之髙祖皆以英武特異之姿據天下大半之地及其子孫材力智勇亦皆有以過人者然終以敗亂而不可解此其勢必有以自取之也蓋唐漢之亂始於功臣而晉之亂始於外國皆以其易取天下之過也莊宗之亂晉髙祖以兵趨夷門而後天下定於明宗後唐之亡胸奴破張達之兵而後天下定於晉胸奴之禍周髙祖發南征之議而後天下定於漢故唐滅於晉晉亂於胸奴而漢亡於周蓋功臣負其創業之勳而胸奴恃其驅除之勞以要天子聽之則不可以久安而誅之則足以召天下之亂戮一功臣天下遂並起而軋之矣故唐奪晉髙祖之權而亡晉絶胸奴之和親而滅漢誅楊邠史肇而周人不服以及於禍彼其初無功臣無胸奴則不興而功臣胸奴卒起而滅之故古之聖人有可以取天下之資而不用有可以乘天下之勢而不顧撫循其民以待天下之自至此非以為茍仁而已矣誠以為天下之不可以易取也欲求天下而求之於易故凡事之可以就天下者無所不為也無所不為而就天下天下既安而不之改則非長久之計也改之而不顧此必首以忤天下之心者矣昔者晉獻公既沒公子重耳在翟里克殺奚齊卓子召重耳重耳不敢入秦伯使公子縶往弔且告以晉國之亂將有所立於公子重耳再拜而辭亦不敢當也至於夷吾聞召而起以汾陽之田百萬命里克以負蔡之田七十萬命丕鄭而奉秦以河外列城五及其既入而背內外之賂殺里克丕鄭而發兵以絶秦兵敗身虜不復其國而後文公徐起而收之大臣援之於內而秦楚推之於外既反而霸於諸侯唯其不求入而人入之無賂於內外而其勢可以自入此所以反國而無後憂也其後劉季起於豐沛之間從天下武勇之士入關以誅暴秦降子嬰當此之時功冠諸侯其勢遂可以至於帝王此皆沛公之所自為而諸將不與也然至追項籍於固陵兵敗諸將不至乃捐數千里之地以與韓信彭越而此兩人卒負其功背叛而不可制故夫取天下不可以僥幸於一時之利僥幸於一時之利則必將有百嵗不已之患此所謂不及逺也何去非論曰唐以陵夷蹙弱遂亡天下而真主未興五代之君遂相攘取朝獲暮失合其世祀不數十年自古有國成敗得喪未有如此之亟者然竊觀之莫不皆有所以必至之理也梁祖起於宛朐羣盜之黨已而挾聽命之唐鞭笞天下以收神器亦可謂一時之姦雄然及其衰暮而河汾李氏基業已大固當氣吞而志滅之矣借使不遂及於子禍則其後嗣有足以為莊宗之抗哉此梁之亡不待乎旋踵也後唐武皇假平讎之忠義發跡隂山轉戰千里奄踐汾晉及其子莊宗以兵威霸業遂夷梁室而王天下可謂壯矣然天下略定彊臣驕卒遂至不制一倡而叛之不及反顧而天下遂歸於明宗至於末帝所以失天下者猶莊宗也夫以新造未安之業而有彊臣驕兵以乘其失政其能自立於天下乎晉人挾震主之威乘釁而起君父外蕃假其兵力以收天下易若反掌一朝嗣主孱昏肆易而戎人驕功恃彊殫耗天下不足以充其要取之欲乃反負之及其所以䝉禍辱者不可勝言觀其所以自託而起者如此則晉安得而後亡哉漢祖承干戈擾踐之餘生靈無所制命起視天下復無英雄慨然投袂而作者乃建號而應之而天下之人無所歸往亦皆俯首聽役於漢然一旦委裘而彊臣巨室已不為幼子下矣故不勝其忿起而圖之僥幸於一決而周人抗命卒無以禦之而至於亡周之太祖世宗皆所謂一時之雄而世宗英特之姿有足以居天下而自立者然降年不永孺子不足當天之眷命而真人德業日隆已為天下之所歸戴則其重負安得而不釋哉由是觀之自梁以迄於周其興亡得喪世祀如此安足怪哉皆有所以必至之理也又嘗究之若唐之莊宗與夫末帝皆以雄武壯決轉鬭無前摧夷强敵卒收天下而王之非夫孱昏不肖者也然明宗之旅變於鄴下晉祖之甲倡於并門彼二主者乃低摧悸迫兒女悲涕垂頥拱手以需死期無復平日萬分之一者何也有彊臣驕兵以制其命唯至乎此始悟其身之孤弱無以自救之也夫以功就天下者常有彊臣以力致天下者常有驕兵臣非故彊也恃勳賞之積而卒至於彊兵非故驕也恃戰役之勤而卒至於驕故古者撥亂定傾之主不憂天下大計之不集而深虞大臣之或彊戰士之或驕故常先事而董治之使其操制常在於我是以天下既集而國家安彊舉而遺之冲人弱息而變故不作彼以亂繼亂者則不然方其圖天下之即集也日責功於將而責戰於士責功之亟則凡所以酬將者未嘗恤其或至於彊責戰之切則凡所以撫士者未嘗病其或至於驕是以天下略定彊臣倚驕兵而䀝睨驕兵挾彊臣而冀望一旦相與起而迫之反視其身倣徨孤立而大事且去則雖有平日壯決之氣持是而安歸哉此唐之莊宗末帝所以失天下者由此故也嗟乎圖天下於亟集而不計其既集之利害者終亦亟亡而已矣子由論曰唐季五代之亂其亂果何在也海內之兵各𨽻其將大者數十萬人而小者不下數萬撫循鞠養美食豐衣同其甘苦而順其好惡甚者養以為子而授之以其姓故當其時軍旅之士各識其將而不識天子之惠君有所令不從聽其將軍而將之所為雖有大姦不義而無所違拒故其亂也姦臣擅命擁兵而不可制而方其不為亂也所攻而必降所守而必固良將徑兵遍於天下其所摧敗破滅足以上快天子鬱鬱之心而外抗敵國竊發之難何者兵安其將而樂為用命也唐莊宗周世宗溫公論曰或問五代帝王唐莊宗周世宗皆稱英武二主孰賢臣應之曰夫天子所以統治萬國討其不服撫其微弱行其號令一其法度敦明信義以兼愛兆民者也莊宗既滅梁海內震動湖南馬氏遣子希範入貢莊宗曰比聞馬氏之業終於髙郁所奪今有兒如此郁豈能得之哉郁馬氏之良佐也希範兄希聲聞莊宗言卒矯其父命而殺之此乃市道商賈之所為豈帝王之體哉蓋莊宗善戰者也故能以弱晉勝彊梁既得之曽不數年內外離叛置身無所誠由知用兵之術不知為天下之道故也世宗以信令御羣臣以正義責諸國王環以不降受賞劉仁瞻以堅守䝉褒嚴續以盡忠獲存蜀兵以反覆就誅馮道以失節被棄張美以私恩見疏江南未服則親犯矢石期於必克既服則愛之如子推誠盡言為之逺慮其宏規大度豈得與莊宗同日語哉書曰無偏無黨王道蕩蕩又曰大邦畏其力小邦懷其德世宗近之矣五代無全臣六一論曰嗚呼孟子謂春秋無義戰豫以五代無全臣無者非無一人蓋僅有之爾豫得死節之士三人焉其仕不及二代者各以其國繫之作梁唐晉漢周臣傳其餘仕非一代不可以國繫之者作雜傳夫入于雜誠君子之所羞而一代之臣未必皆可貴也覽者詳其善惡焉馮道溫公論曰天地設位聖人則之以制禮立法內有夫婦外有君臣婦之從夫終身不改臣之事君有死無二此人道之大倫也茍或廢之亂莫大焉范質稱馮道厚德稽古宏才偉量雖朝代遷貿人無間言屹若巨山不可轉也臣愚以為正女不從二夫忠臣不事二君為女不正雖復華色之美織紝之巧不足賢矣為臣不忠雖復材智之多治行之優不足貴矣何則大節已虧故也道之為相歷五朝八姓若逆旅之視過客朝為讎敵暮為君臣易面變辭曽無愧怍大節如此雖有小善庸足稱乎或以為自唐室之亡羣雄力爭帝王興廢逺者十餘年近者四三年雖有忠智將若之何當是之時失臣節者非道一人豈得獨罪道哉臣愚以為忠臣憂公如家見危致命君有過則彊諫力爭國家敗亡則竭節致死智士邦有道則見邦無道則隱或滅迹山林或優游下僚今道尊寵則冠三師權任則首諸相國存則依違拱默竊位素餐國亡則圖全茍免迎謁勸進君則興亡接踵道則富貴自如兹乃姦臣之尤安得與他人為比哉或謂道能全身逺害於亂世斯亦賢已臣謂君子有殺身成仁無求生害仁豈專以全身逺害為賢盜跖病終而子路醢果誰賢乎抑此非特道之愆也時君亦有責焉何則不正之女中士羞以為家不忠之人中君羞以為臣彼相前朝語其忠則反君事讎語曰智則社稷為墟後來之君不誅不棄乃復用以為相彼又安有忠於我而能獲其用乎故曰非特道之愆亦時君之責也子由論曰馮道以宰相事四姓九君議者譏其反君事讎無士君子之操大義既虧雖有善不録也吾覽其行事而竊悲之求之古人猶有可得言者齊桓公殺子糾召忽死之管仲不死又從而相之子貢以為不仁問之孔子孔子曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也管仲之相桓公孔子既許之矣道之所以不得附於管仲者無其功耳晏嬰與崔杼俱事齊莊公杼弒公而立景公晏子立於崔氏之門外其人曰死乎曰獨吾君也乎吾死也曰行乎曰吾罪也乎吾亡也曰歸乎曰君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若為已死而已亡非其私昵誰敢任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入枕尸股而哭興三踊而出卒事景公雖無管子之功而從容風義有補於齊君子以名臣許之使道自附於晏子庶幾無甚愧也蓋道事唐明宗始為宰相其後歷事八君方其廢興之際或在內或在外雖為宰相而權不在己禍變之發皆非其過也明宗雖出於異族而性本寬厚道以恭儉勸之在位十年而民以少安契丹滅晉耶律德光見道問曰天下百姓如何救得道顧德光不可曉以莊語乃曰今時雖使佛出亦救不得惟皇帝救得德光喜乃罷殺戮中國之人賴焉周太祖以兵犯京師隱帝已沒太祖謂漢大臣必相推戴及見道道待之如平日太祖嘗拜道是日亦拜道受之不辭太祖意沮知漢未可代乃立湘隂公為漢嗣而使道逆之於徐道曰是事信否吾平生不妄語公毋使我為妄語人太祖為誓甚苦道行未反而周代漢篡奪之際雖賁育無所致其勇而道以拜跪談笑却之非盛德何以致此而議者黜之曽不少恕甚矣士生於五代立於暴君驕將之間日與虎兕為伍棄之而去食薇蕨友麋鹿易耳而與自經於溝瀆何異不幸而仕於朝如馮道猶無以自免議者誠少恕哉南唐荆公讀江南録曰故散騎常侍徐公鉉奉太宗命撰江南録至李氏亡國之際不言其君之過但以厯數存亡論之雖有愧於實録其於春秋之義春秋臣子為君親諱禮也箕子之說周武王克商問箕子商所以亡箕子不忍言商惡以存亡國宜告之徐氏録為得焉然吾聞國之將亡必有大惡惡者無大於殺忠臣國君無道不殺忠臣雖不至於治亦不至於亡紂為君至暴矣武王觀兵於孟津諸侯請伐紂武王曰未可及聞其殺王子比干然後知其將亡也一舉而勝焉季梁在隨隨人雖亂楚人不敢加兵虞以不用宫之奇之言晉人始有納璧假道之謀然則忠臣國之與也存與之存亡與之亡豫自為兒童時已聞金陵臣潘佑以直言見殺當時京師因舉兵來伐數以殺忠臣之罪及得佑所上諫李氏表觀之詞意質直忠臣之言豫諸父中舊多為江南官者其言金陵事頗詳聞佑所以死則信然則李氏之亡不徒然也今觀徐氏録言佑死頗以妖妄與豫舊所聞者甚不類不止於佑其他所誅者皆以罪戾何也豫甚怪焉若以商紂及隨虞二君論之則李氏亡國之君必有濫誅吾知佑之死信為無罪是乃徐氏匿之耳何以知其然吾以情得之大凡毁生於嫉嫉生於不勝此人之情也吾聞鉉與佑皆李氏臣而俱稱有文學十餘年爭名於朝廷間當李氏之危也佑能切諫鉉獨無一說以佑見誅鉉又不能力諍卒使其君有殺忠臣之名踐亡國之禍皆鉉之由也鉉懼此過而又恥其善及於佑故匿其忠而汙以他罪此人情之常也以佑觀之其他所誅者又可知矣噫若果有此吾謂鉉不惟厚誣忠臣其欺吾君不亦甚乎歷代名賢確論卷一百
