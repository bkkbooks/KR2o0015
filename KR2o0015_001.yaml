body:
  text: 歴代名賢確論卷一三皇三皇之化六一堯遺風栁州刑賞東坡比屋可封東坡鯀治水王荆公潁濱許由栁識東坡三皇之化六一曰夫至治之極也塗耳目以愚民之識暢希夷以合道之極化被而物不知功成而迹無朕古有臻於是者其大道之行乎聖人之興也捐仁義以為德之細放約束以取民之信德及而物自化言行而人必從古有盛於此者其三皇之世歟故孔子有三皇設言而民不違之説敢試論之若乃暢上古之至道張億世之逺御結繩所以為信也而懼信之未孚我則有書契之易於是乎畫八卦以由數起茹毛所以養生也而憚生之未具我則有烹餁之利於是乎嘗百糓以粒蒸民網罟利人以為用使以畋而以漁牛馬異性而必馴使可乘而可服壯棟宇以易古者之居垂衣裳以興天下之治凡所以使民不倦者皆伏犧神農黄帝之為也然而治既行矣民既賴矣守之以至静化之以無為上有淡泊清浄之風下無薄惡叛離之俗故言為教命非誥誓而自聽言為號令不鞭扑而自隨且夫歃血以涖盟約要之於信者由不信而然也為刑以殘肌骨威之使從者由不從而設也不若御至質之民行大道之化恱不以愛故不待賞而勸畏不以威故不待罰而責政不罔民故不待約而信事不申令故不待誥而從一言以行萬民禀命賴其德者百年而利服其化者百年而移非三皇之德其孰能與於此乎噫商人作誓欲民之從也而人始疑周人㑹盟欲信之固也而諸侯叛由是而言則詛民於神明狃民於賞罰而違之者末世之為也服民以道德漸民以教化而人自從之者三皇之盛也夫設言而不違者其在兹乎遺風栁州曰三河古帝王之更都焉而平陽堯之所理也有茅茨采椽土型之度故其人至于今儉嗇有温恭克讓之德故其人至于今善讓有師錫僉曰疇咨之道故其人至于今好謀而深有百獸率舞鳳凰來儀於變時雍之美故其人至于今和而不怒有昌言儆戒之訓故其人至于今憂思而畏禍有無為不言垂衣裳之化故其人至于今恬以愉此堯之遺風也願以聞於子何如吳子離席而立拱而言曰美矣善矣其蔑有加矣此固吾之所欲聞也夫儉則以足用而不淫讓則遵分而進善其道不鬬謀則通於逺而周於事和則仁之質戒則義之實恬以愉則安而久於其道也至乎哉今主上方致太平動以堯為準先生之言道之奥者若果有貢於上則吾知其易易焉也舉晉國之風以一諸天下如斯而已矣刑賞東坡曰堯舜禹湯文武成康之際何其愛民之深憂民之切而待天下以君子長者之道也有一善從而賞之又從而詠歌嗟嘆之所以樂其始而勉其終有一不善從而罰之又從而哀矜懲創之所以棄其舊而開其新故其吁俞之聲歡休慘戚見於虞夏商周之書成康既沒穆王立而周道始衰然猶命其臣吕侯而告之以祥刑其言憂而不傷威而不怒慈愛而能斷惻然有哀憐無辜之心故孔子猶有取焉傳曰賞疑從與所以廣恩也罰疑從去所以慎刑也當堯之時臯陶為士將殺人臯陶曰殺之三堯曰宥之三故天下畏臯陶執法之堅而樂堯用刑之寛四嶽曰鯀可用堯曰不可鯀方命圯族既而曰試之何堯之不聽臯陶之殺人而從四嶽之用鯀也然則聖人之意蓋亦可見矣書曰罪疑惟輕功疑惟重與其殺不辜寧失不經嗚呼盡之矣可以賞可以無賞賞之過乎仁可以罰可以無罰罰之過乎義過乎仁不失為君子過乎義則流而入於忍人仁可過也義不可過也古者賞不以爵禄刑不以刀鋸賞以爵禄是賞之道行於爵禄之所加而不行於爵禄之所不加也刑以刀鋸是刑之威施於刀鋸之所及而不施於刀鋸之所不及也先王知天下之善不勝賞而爵禄不足以勸也知天下之惡不勝刑而刀鋸不足以裁也是故疑則舉而歸之於仁以君子長者之道待天下使天下相率而歸於君子長者之道故曰忠厚之至也詩曰君子如祉亂庶遄已君子如怒亂庶遄沮夫君子之已亂豈有異術哉時其喜怒而不失乎仁而已矣春秋之義立法貴嚴而責人貴寛因其褒貶之義以制賞罰亦忠厚之至也比屋可封東坡曰堯之民比屋可封桀之民比屋可誅若信此說則堯時諸侯滿天下桀時大辟遍四海也鯀治水荆公曰堯咨孰能治水四嶽皆對曰鯀然則在廷之臣可治水者惟鯀耳水之患不可留而俟人鯀雖方命圯族而其才則羣臣皆莫及然則舍鯀而孰使哉當此之時禹蓋尚少而舜猶伏於下而未見乎上也夫舜禹之聖也而堯之聖也羣臣之仁賢也其求治水之急也而相遇之難如此後之不遇者亦可以無憾矣潁濱曰四嶽薦鯀於堯堯知鯀之不可用而屈於四嶽民被其害者九年後世疑之知其不可用而用之不仁屈於四嶽而不能信不知予嘗論之水之為害不可一日不治而知治水者雖聖賢不能也是以堯舜皆不自治使禹而後濟方禹之未見也天下言治水者莫如鯀棄鯀而不試有不仁焉斯堯之所以用鯀也歟許由栁識曰天清既能久地静不能朽先生清静天地全性出於肧渾入於鴻蒙雲遊鳥還蓊鬱和風當時帝道已半滋章欲深大樸散於人未散於山林乃有巢父杳㝠同心堯齎公器退然見推遇聖相感不得不知耳雖濯於清流道終播於無為所謂春膏時蒸朽葉自滋先生含德唐堯發之潁陽之仁德日大天下之禄利日卑且聖主所重者名器至人所重者感通推以大名義同讓終廉能感俗道自為功任應㑹之偶然生垂後之清風人登雲嶺多憶箕潁猗歟先生山水齊名東坡曰馬遷曰學者載籍極博尤考信於六藝詩書雖缺然虞夏之文可知也堯將遜位讓於虞舜舜禹之間嶽牧咸薦乃試之於位典職數十年功用既興然後授政示天下重器王者大統傳天下若此之難也而說者曰堯讓天下於許由由不受恥之逃隠及夏之時有卞隨務光者此何以稱焉東坡曰士有簞食豆羮見於色者自吾觀之亦不信也又曰巢由不受堯禪堯舜不害為至德夷齊不食周粟湯武不失為至仁孔子不廢是說曰武盡美矣未盡善也揚雄者獨何人乃敢廢此曰允哲堯禪舜則不輕於由矣陋哉斯言使夷齊不經孔子雄亦且廢之矣世主誠知揖遜之水尚汙牛腹則干戈之粟豈能溷夷齊之口乎于以知聖人以位為械以天下為牢庶乎其不驕士矣歴代名賢確論卷一
