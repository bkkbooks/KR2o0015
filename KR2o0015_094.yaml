body:
  text: 歷代名賢確論卷九十四僖宗上崩楊復恭立皇弟夀王傑范祖禹黃巢之亂范祖禹宦官范祖禹藩鎮范祖禹孫之翰孟昭圖范祖禹常濬范祖禹侯昌業范祖禹鄭畋孫之翰昭宗哀帝朱全忠弒帝孫之翰范祖禹朱全忠殺裴樞朝士等於白馬驛范祖禹宦官范祖禹崔裔范祖禹張濬范祖禹朱朴范祖禹張道古范祖禹王重榮六一禪位於梁范祖禹上崩楊復恭立皇弟夀王傑范祖禹論曰懿宗之崩中官廢長而立幼遂傾唐室僖宗疾革楊復恭亦如之大抵宦者利於幼弱欲專威權以長而立則已無功故必有所廢置謂之定䇿夫立君以為天下而宦者以私一已既以援立為功未有不亂國家者也黃巢之亂范祖禹論王仙芝陷濮州黃巢起應衆至十萬曰自古盜賊之起國家之敗未有不由暴賦重斂而民之失職者衆也書曰夏王率遏衆力率割夏邑又曰降監商民用義讎斂此桀紂之所以亡也秦漢以下莫不皆然唐之季世政出閹尹不惟賦斂割剝復販百物盡奪民利故有私鹽之盜商賈之事皆官為之使民無衣食之資欲不亡其可得乎宦官范祖禹論田令孜為中尉上呼為阿父委以政事曰唐自明皇肅宗以來尊寵宦者德宗始委以禁兵文宗以後天子由其所立故其末流子孫至於如此夫國之興也未有不由親賢及其衰也猶以小人取敗况祖宗所任不正則後世必有甚者矣是以明王必慎其所與恐開禍亂之原也若僖宗者又何責焉藩鎮范祖禹論朱全忠與李克用不和藩鎮互相吞噬無所稟畏曰天子所以制御天下者賞善罰惡辨是非枉直使人各當其所物各安其分而不相陵暴也克用有復唐室之大功而全忠輒欲殺之蕃夷之人不敢專兵復讎而赴訴於朝廷是諸侯猶有尊王室之心也為天子者宜詰其孰是孰非直者佑之不直者黜之使征伐號令出於天子則誅一鎮而天下莫敢不從矣僖宗則不然知其直者而不恤置其不直者而不問是猶一郡一縣之長不能聽訟而使民以其強弱自相勝也不惟全忠無所忌憚而克用心亦不服欲兩存之乃兩失之自是以後藩鎮擅相攻伐不復稟命以天子不足訴也唐之政令不行於藩鎮實自此始後雖復欲為強其可得乎書曰有罪無罪子曷敢有越厥志刑罰者所以為天討也王者之於天下懲勸可不明哉孫之翰論李克用請討朱全忠曰巢賊之平李克用為功臣之首雖粗猛之人朝廷恩賞至厚夙性雄豪不無感激可一時倚賴矣朱全忠出於巢黨力屈來降都統王鐸崇奬過分已授同華節帥朝廷不因立功驟委宣武大鎮克用追討巢賊還過其地全忠邀之軍府密謀叛害克用既免不舉兵報怨而奏討全忠甚得人臣之體全忠降賊也克用功臣也降賊謀害功臣是賊心不悛況帥宣武未久凶勢未大本無功名可以贖罪從功臣之請討之正得事宜若乘克用兵鋒復詔近鎮助之破全忠必矣凶賊既除克用感恩可以倚任諸鎮觀之亦必未敢為相噬之計天下或未至橫流矣僖宗孱弱宰輔暗懦宦官暴橫一無經逺之計失此機便卒致諸鎮交亂巨盜謀逆三百年宗社喪於盜手矣孟昭圖范祖禹論昭圖言天下非北司天下天子非北司天子田令孜沈之於江曰自古大亂之世亦必有忠義之臣僖宗播越幾於亡矣而諫爭之職猶有人焉蓋天下未嘗無賢惟其君不能用也唐之將亡雖有忠賢亦末如之何矣昭圖豈不知言發而禍應哉特出於忠義憤激而不能已耳夫明王道天下而使之言其賢者樂告以善道故國家可得而治也茍上下否隔不可告語使人之言者出於憤激之氣則其國豈不殆哉常濬范祖禹論濬上言姑息藩鎮致亂坐賜死曰殺諫臣者其國必亡故侯昌業孟昭圖常濬皆以諫而死自是以後無敢言者唐亡之兆亦已著矣何必天變彗孛之為妖乎夫忠臣欲救社稷之危人君不惟棄其言而又戮其身不祥莫大焉此其國所以為墟也侯昌業范祖禹論昌業以直諫賜死曰昔比干立於紂之朝三孤之位不可以視天下之亂而不言也王子之親不可以待宗廟之亡而不救也是以諫而死之唐之季世人主蒙弱閹尹擅朝四海橫流不可止救賢者遁世不居其位可也諫而死職則忠矣其未得為仁乎鄭畋孫之翰論畋罷相曰咸通衰亂之後僖宗童年繼位政在內臣固無逺謀以救世患雖宰相王鐸崔彥昭有一時名望亦非雄傑之才不能力正時事及鄭畋輔政謀議要功多中事機但同列盧攜以姦庸不忠與內臣田令孜相結阻畋之言不克施用芝巢二賊負販之民非祿山輩巨盜乘藉方面權勢以起但因飢年驅集細民劫州邑財物資朝夕之用爾何至成天下之亂由朝廷勢衰邪臣悮計所任宋威髙駢輩姦險之人無忠義之節逺大之謀爭功忌能玩寇久權養成凶賊之盛賊勢既盛駢以重兵據天下之衝反閉壁自固其他州郡守臣怯懦不敢捍禦縱之大亂也賴畋作帥於岐以謀破賊振國之威復傳檄諸鎮激以忠義致勤王之師大集關中賊勢既減鳫門兵至得以平之矣況僖宗避難之初賊乘勝而西非畋遏其凶勢則危亂可測乎又以忠謀致諸鎮勤王之舉畋雖去鎮逺不親平賊平賊之功由於畋也僖宗賞畋之功復命輔政雖在衰世亦秉朝綱令孜於宦豎中凶橫甚至怒畋公正與姦黨誣譖罷相僖宗孱弱不能主張賢相天下之事因無所制置國祚必至於亡也朱全忠弒帝孫之翰論曰昭宗即位世已亂矣雖尊禮大臣博求賢傑志欲興復大業號令天下時大臣賢而忠者杜讓能一人而已其他無不與方鎮相結方鎮何人賊也卒也嗟乎彼皆粗暴之性一無忠義之節方相吞噬亦藉大臣為援大臣欲固權位自相合爾大臣如孔緯者有一時名望尚與全忠交通崔昭緯輩姦險之人固與邠岐相結矣內外將相不忠天下大勢橫流已至於此昭宗欲何施為乎加輕信易動動無謀算何以制服諸鎮諸鎮賊臣也然賊臣之心亦可恩信待之一時倚賴者莫若太原有平賊大功爵賞已厚懼為全忠所圖蓄怨不解若昭宗以念功之意恩禮有加太原徑直感恩必深既深則順必久太原順則河中近輔鎮魏舊帥豈有不順之勢數鎮既順使讓能賢相經營於內復引同心之賢者贊助時政宦宫暴橫者去之姦人害政者逐之朝廷漸治國威或可振矣奈何因全忠請討太原不用讓能之言而聽張濬孔緯之計輕舉兵帥太原拒命以成跋扈之勢太原跋扈無可倚賴矣時無倚賴賊臣得以脅制朝廷讓能知勢不可為以死許國可謂大忠矣自是諸鎮交亂車駕不能寧處復留凶逆之人久為輔相與巨盜畫篡逆之計乃亡唐祚矣范祖禹論曰昔周之興也以諸侯歸之其亡也以諸侯叛之平王以後周室微弱政令不行歷數百年而不亡者亦以諸侯持之也唐之亂也以藩鎮及其末也藩鎮割裂疆土皆盡而唐室遂亡僖昭之時惟李克用最為有功雖嘗跋扈而終不失臣節王室可倚以為藩屛使太原之勢常重則諸鎮未敢窺唐也而唐以其戎狄之人疑而不信外而不親有震主之勢而無朝廷之助是以不競於汴而全忠獨強吞噬諸鎮卒滅唐室自古忠者不見信所信者不忠豈有不亡者乎朱全忠殺裴樞朝士等於白馬驛范祖禹論曰白馬之禍至今悲之歐陽修有言曰一太常卿與社稷孰為重使樞等不死尚惜一卿其肯以國與人乎雖樞等之力不能存唐必不亡唐而獨存也臣以為不然昭宗返自鳯翔而全忠篡奪之勢已成人無愚智皆知之矣樞乃其黨被其薦引以為宰相不恤國之將亡方且宴安於寵祿全忠之劫遷洛陽昭宗未及下樓樞受賊旨已率百官出長安東門昭宗卒以弒殞而唐遂亡由此觀之樞為忠於李氏乎忠於朱氏乎且長安與一太常卿孰重國亡君弒與流品不分孰急樞不惜長安與全忠乃惜一卿不與張廷範不恤國亡君弒而惜流品之不分其愚豈不甚哉夫樞非有忠義之心能為社稷者也不勝其利欲之心畏全忠而附之弒其君父既從之矣以為除太常卿小事也持之不與未必咈全忠之心而微以示人至公從其大而違其細欲以竊天下之虛譽不意全忠怒之至此也全忠以為此小事也猶不從已其肯聽已之取天下乎是以肆其誅鋤無所不至不知樞等實非能為唐輕重乃全忠疑之過也向使樞有存唐之心當全忠之劫遷端委而受刃於國門天下忠義之士聞之必有奮發而起者矣樞不為此而惜一卿不死於昭宗之弒而死於廷範之事處身如此豈能為國慮乎迹其附會全忠以為相進不由其道矣乃欲上不失賊臣之意下不失士大夫之譽其可得乎白馬之禍蓋自取之也然自古如此而死者多矣貪躁之士亦可少戒哉宦官范祖禹論楊復恭自謂定䇿國老謂上為負心天子曰惟君子可以有功小人不可以有功也君子有功而不伐小人有功而益驕先王戒小人勿用者以其不可立功也夫無功猶不可長也况其有功何以堪之故小人而有非常之功者國之不幸也復恭刑臣至與天子為敵昭宗親戰用大師而後克之其言不臣如此由其恃援立之功故也豈不足為永戒哉又論劉季述劫上幽於少陽院明年帝復位以韓令誨張彥洪為左右中尉曰劉季述劫太子而幽帝宦者皆預謀昭宗不能因天下讎疾之心窮治逆黨以清宫闈奪其兵柄歸之將相而以亂易亂復任宦者既赦而不問又稍以法誅之至使反側不安外結藩鎮以致劫遷之禍由除惡不絶其本而大信不立故也昔陽虎作亂於魯囚季桓子劫其國君春秋書曰盜竊寶玉大弓若季述等家臣賤人不得曰廢立為唐史者宜書曰盜則名實正矣崔裔范祖禹論謀誅宦官不克因隂結朱全忠請帝幸東都韓全誨結李茂正劫帝幸鳯翔曰崔裔本與韓全誨爭權因昭宗懲幽辱之禍謀盡誅中官故全誨黨李茂正而裔結朱全忠各倚強藩以為外援而岐汴亦憑宦官宰相內為城社以制朝廷故裔召全忠以兵入朝而全誨劫帝出幸唐室之亡由南北司相吞滅而人主受其禍豈不足為將來之永鑒哉張濬范祖禹論與孔緯請伐李克用曰李克用有復唐社稷之功茍無大害於天下猶將十世宥也朱全忠欲殺之而朝廷不詰全忠與諸鎮一心請討克用則遽從之蓋以克用出於蕃夷而陵蔑之耳然有功者見討有罪者不誅則無以為國故夫昭宗所以失政而海內愈亂者由張濬為此役也唐之將亡譬如人有必死之疾使秦和扁鵲救之未必能起也而庸醫妄藥以攻之所攻非疾所疾不攻豈不速其死乎朱朴范祖禹論擢朱朴為相中外大驚曰國之將亡如大厦之將顛扶其東而西傾支其南而北壞况所以扶而支之者非其任哉張道古范祖禹論道古上疏言五危三亂貶施州曰昭宗之在華州唐室日趨於亡當求賢如不及聽言如在己社稷宗廟未可冀也而斥逐言責之臣杜絶諫諍之路是自蔽耳目長姦諛也終於顛墜厥緒誠不知君道哉王重榮六一跋王重榮碑曰重榮當唐之末再逐其帥遂據河中雖破黃巢平朱玫之叛有功於一時而阻兵召亂為唐患者多矣碑文辭非工而事實無可采所以録者俾世知求名莫如自修善譽不能掩惡也考重榮之碑豈不欲垂美名於千載而其惡終暴於後世者毁譽善惡不可誣故也禪位於梁范祖禹論曰自古易姓之際必有仗節死義之臣忠於本朝故賊臣憚焉唐之亡也其宰相皆姦險趨利賣國與盜為一傾覆宗社士之立於朝者皆小人也故以璽綬與人而不以為不可勸進賊庭而不以為羞惟楊凝式一有言而其父大駭以為狂惑不祥之人矣豈其賢人君子遭世之亂而隱伏不見歟抑其纍世之君不能養其風俗而無禮義亷恥之習歟何三百年之天下而無一忠義之士扶持之也人君豈可不養士之亷恥以重其國哉歷代名賢確論卷九十四
