body:
  text: 歷代名賢確論卷十五文公閏月不告朔猶朝于廟東坡宣公初稅畝東坡成公作丘甲東坡襄公會于澶淵宋災故東坡昭公黑肱以濫來奔東坡孟僖子知孔子東坡定公孔子為政東坡閏月不告朔猶朝于廟東坡曰春秋之文同其所以為文異者君子觀其意之所在而已矣先儒之論閏月不告朔者牽乎猶朝于廟之説而莫能以自解也春秋之所以書猶者二曰如此而猶如此者甚之之詞也辛巳有事于太廟仲遂卒于垂壬午猶繹是也曰不如此而猶如此者幸之之詞也不郊猶三望閏月不告朔猶朝于廟是也夫子傷周道之殘缺而禮樂文章之壞也故區區焉掇拾其遺亡以為其全不可得而見矣得見一二斯可矣故書曰猶朝于廟者傷其不告朔而幸其猶朝于廟也夫子之時告朔之禮亡矣而餼有羊者存焉夫子猶不忍去以志周公之典則其朝于廟者乃不如餼羊之足存歟公羊傳曰曷為不言告朔天無是月也穀梁傳曰閏月者附月之餘日也天子不以告朔而喪事不數也而皆曰猶者可以已也是其以幸之之詞而為甚之之詞宜其為此異端之説也且夫天子諸侯之所為告朔聽政者以為為天歟為民歟天無是月而民無是月歟彼其孝子之心不欲因閏月以廢喪紀而人君乃欲假此以廢政事歟夫周禮樂之衰豈一日之故有人焉開其端而莫之禁故其漸遂至于掃地而不可救文十六年夏六月公四不視朔公羊傳曰公有疾也何言乎公有疾不視朔自是公無疾不視朔也故夫有疾而不視朔者無疾而不視朔之原也閏月而不告朔者常月而不告朔之端也聖人憂焉故謹而書之所以記禮之所由廢也左氏傳曰閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民而杜預以為雖朝于廟則如勿朝以釋經之所書猶之意是亦曲而不通矣初稅畝東坡曰古者公田曰藉藉借也言其借民力以治此也詩曰雨我公田遂及我私言民之必先公田也傳曰私田稼不善則非吏公田稼不善則非民言上之必恤私田也民先其公而上恤其私故民不勞而上足用也宣公無恩信于民民不肯盡力於公田故按行擇其善畝而稅之公羊傳曰稅畝者何履畝而稅也夫民不盡力于公田者上之過也宣公不責已悔過擇其善畝而稅之宜其民之謗讟而災異之作也稅畝之明年冬蝝生公羊傳曰蝝生不書此何以書幸之也猶曰受之云爾上變古易常應是而有天災其諸則宜于此焉變矣何休以為宣公懼而復古故其後大有年愚以為非也春秋書作三軍後又書舍中軍書躋僖公後又書從祀先公事之復正未始不書宣公而果復古也春秋當有不稅畝之書故何休之説愚不信也作丘甲東坡曰先王之為天下也不求民以其所不為不強民以其所不能故其民優遊而樂易周之盛時其所以取於民者莫不有法民不告勞而上不闕用及其衰也諸侯恣行其所以賦取于民者惟其所欲而刑罰隨之故民至于窮而無告夫民之為農而責之以工也猶居山者而責之以舟楫也魯成公作丘甲而春秋譏焉穀梁傳曰古者農工各有職甲非人人之所能為也丘作甲非正也而杜預以為古者四丘為甸甸出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人而魯使丘出之也夫以四丘而後為甸魯雖重斂安至于四倍而取之哉哀公用田賦曰二吾猶不足而孔子譏其殘民之甚未有四倍而取者也夫變古亂常者春秋之所譏也故書作三軍舍中軍初稅畝作丘甲用田賦者皆所以譏政令之所由變也而穀梁杜氏之説如此之相戾安得不辨其失而歸之正哉愚故曰穀梁之説是也會于澶淵宋災故東坡曰春秋之時忠信之道缺大國無厭而小國屢叛朝戰而夕盟朝盟而夕會夫子蓋厭之矣觀周之盛時大宗伯所制朝覲會同之禮各有逺近之差逺不至于踈而相忘近不至于數而相瀆春秋之際何其亂也故曰春秋之盟無義盟也春秋之會無義會也雖然紛紛者天下皆是也夫子將譏之而以為不可以勝譏之也故擇其甚者而譏焉桓二年會于稷以成宋亂襄三十年會于澶淵宋災故皆以深譏而切責之也春秋之書會多矣書其所會而不書其所以會桓之稷襄之澶淵而已矣宋督之亂諸侯將討之桓公平之不義孰甚焉宋之災諸侯之大夫會以謀歸其財既而無歸不信孰甚焉非不義不信之甚春秋之譏不至于此也左氏之論得其正矣皆諸侯之大夫而書曰某人某人會于澶淵宋災故尤之也不書魯大夫諱之也且夫見鄰國之災匍匐而救之者仁人君子之心也既言而忘之既約而背之委巷小人之事也故書其始之為君子仁人之心而後可以見後之為委巷小人之事春秋之意蓋明白如此而公羊傳曰會未有言其所為者此言其所為何録伯姬也且春秋為女子之不得其所而死區區焉為人之死而録之是何夫子之志不廣也穀梁曰不言災故則無以見其為善澶淵之會中國不侵夷狄夷狄不入中國無侵伐八年善之也晉趙武楚屈建之力也如穀梁之説宋之盟可謂善矣其不曰息兵故何也嗚呼左氏得其正矣黑肱以濫來奔東坡曰諸侯之義守先君之封土而不敢有失也守天子之疆界而不敢有過也故夫以力而相奪以兵而相侵者春秋之所謂暴君也侵之雖不以兵奪之雖不以力而得之不義者春秋之所謂汚君也鄭伯以璧假許田晉侯使韓穿來言汶陽之田歸之于齊此諸侯之以不義而取魯田者也邾庶其以漆閭丘來奔莒牟夷以防茲來奔黑肱以濫來奔此魯之以不義而取諸侯之田者也諸侯以不義而取魯田魯以不義而取諸侯之田皆不容于春秋者也夫子之於庶其牟夷黑肱也責之薄而于魯也罪之深彼其竊邑叛君為穿窬之事市人屠沽且羞言之而安足以重辱君子之譏哉夫魯周公之後守天子之東藩招聚小國叛亡之臣與之為盜竊之事孔子悲傷而悼痛之故于三叛之人具文直書而無隱諱之辭蓋其罪魯之深也先儒之説區區于叛人之過惡其論固已狹矣且夫春秋豈為穿窬盜竊之人而作哉使天下之諸侯皆莫肯容夫如此之人而穿窬盜竊之事將不禁而自絶此春秋之所以用意于其本也左氏曰或求名而不得或欲蓋而名彰書齊豹盜三叛人名而公羊之説最為踈繆以為叔術之後而通濫于天下故不繫黑肱於邾嗚呼誰謂孔子而賢叔術耶蓋嘗論之黑肱之不繫邾也意其若欒盈之不繫于晉歟欒盈既奔齊而還入曲沃以叛故書曰欒盈入于晉黑肱或者既絶于邾而歸竊兵邑以叛歟當時之簡牘既亡其詳不可得而聞矣然以類而求之或亦然歟穀梁曰不言邾别乎邾也不言濫子非天子之所封也此尤迂濶不可用矣孟僖子知孔子東坡曰甚哉聖人待天下之通且恕也朝而為盜跖暮而為伯夷聖人不棄也孟僖子之過也其悔亦晚矣然聖人不棄也曰猶愈乎卒而不知悔者也孟僖子之過可悲也已仲尼之少也賤天下莫知其為聖人魯人曰此吾東家丘也又曰此鄒人之子也楚之子西齊之晏嬰皆當時所謂賢人君子也其言曰孔丘之道迂濶而不可用况夫三桓之間而孰知夫有僖子之賢哉僖子之病也告其子曰孔丘聖人之後也而絶于宋其祖弗父何以有采而授厲公及正考父三命益恭其後必有聖人今孔丘博學而好禮殆其是歟爾必往師之以學禮嗚呼孔子用于魯三月而齊人懼其霸以僖子之賢而知夫子之為聖人也使之未亡而授之以政則魯作東周矣故曰僖子之過可悲也已雖然夫子之道充乎天下者自僖子始懿子學乎仲尼請于魯君而與之車使適周觀禮焉而聖人之業然後大備僖子之功雖不能用之于未亡之前而猶能救之于已沒之後左丘明懼後世不知其功之如此也故丁寧而稱之以為補過之君子昔仲虺言湯之德曰改過不吝夫以聖人而不稱其無過之為能而稱其改過之為善然則補過者聖人之徒歟孟僖子者聖人之徒也孔子為政東坡曰魯定公十三年孔子言于公曰臣無藏甲大夫無百雉之城使仲由為季氏宰將墮三都于是叔孫氏先墮郈季氏將墮費公山不狃叔孫輒率費人襲公公與三子入于季氏之宫孔子命申句須樂頎下伐之費人北二子奔齊遂墮費將墮成公斂處父以成叛公圍成弗克或曰殆哉孔子之為政也亦危而難成矣孔融曰古者王畿千里寰內不以封建諸侯曹操疑其論封建漸廣遂殺融融特言之耳安能為哉操以為天子有千里之畿將不利巳故殺之不旋踵季氏親逐昭公公死于外從公者皆不敢入雖子家羇亦亡季氏之忌克忮害如此雖地勢不及曹氏然君臣相猜蓋不減操也孔子安能以是時墮其名都而出其藏甲也哉考于春秋方是時三家雖若不悅然莫能違孔子也以為孔子用事于魯得政與民而三家畏之歟則季桓子之受女樂也孔子不能郤之矣彼婦人之口可以出走是孔子畏季氏季氏不畏孔子也夫孔子盍姑修其政刑以俟三家之隙也哉蘇子曰此孔子之所以聖也蓋田氏六卿不服則齊晉無不亡之道三家不臣則魯無可治之理孔子之用于世其政無急于此者矣彼晏嬰者亦知之曰田氏之僣唯禮可以已之在禮家施不及國大夫不收公利齊景公曰善哉吾今而後知禮之可以為國也嬰能知之而莫能為之嬰非不賢也其浩然之氣以直養而無害塞于天地之間者不及孔孟也孔子以羇旅之臣得政期月而舉治世之禮以律亡國之臣墮名城出藏甲而三家不疑其害已此必有不言而信不怒而威者矣孔子之聖見于行事至此為無疑也嬰之用于齊久于孔子景公之信其臣也愈於定公而田氏之禍不少衰吾是以知孔子之難也孔子以哀公十六年卒十四年陳恆弒其君孔子沐浴而朝告于哀公請討之吾是以知孔子之欲治列國之君使如春秋之法者至于老且死而不忘也或曰孔子知哀公與三子者必不從而以禮告也歟曰否孔子實欲伐齊孔子既告公公曰魯為齊弱久矣子之伐之將若之何對曰陳恆弒其君民之不豫者半以魯之衆加齊之半可克也此豈禮告而已哉哀公患三家之逼嘗欲以越伐魯而去之夫以蠻夷伐國民不豫也臯如出公之事斷可見矣豈若從孔子而伐齊乎若從孔子而伐齊則凡以勝齊之道孔子任之有餘矣既克田氏則魯之公室自張三家不治而自服也此孔子之志也歷代名賢確論卷十五
