body:
  text: 歴代名賢確論卷六十三宋武帝武帝之志子由何去非謝靈運惠連𤣥暉樂天子西謝靈運陶淵明庾義城魯直文帝謝晦徐羡之傅亮子由文帝誅劉湛等彭城王義康遜位出鎮豫章温公詔豫章三妃四時祀二帝於青溪故宅用家人禮温公劉凝之東坡明帝明帝殺王彧東坡順帝王儉自比謝安少游通論宋代晉張謂宋之人君温公武帝之志子由曰東漢之衰曹公始踐伯者之迹挾天子以令諸侯其志本欲盡掃羣雄而後取漢耳既滅二袁吕布劉表遂欲取江東而不克既破馬超韓遂欲并舉巴蜀而不果再屈於吳蜀而公亦老矣於是董昭進九錫之議幡然聽之而桓文之業至此盡矣然方是時公在河朔而漢都許昌雖使主盟諸夏而不廢舊君上可以為周文王下亦不失為桓文公不能忍而甘心王莽九錫之事此荀文若之所以為恨也至司馬仲逹父子其勢葢與公異矣擁兵天子之側固已不順既殺王淩害諸葛誕非人臣矣又降劉禪服曹氏之所不能服非貪其土地而利其人民也志亦在九錫耳雖欲復為桓文尚可得乎宋武既誅桓氏收遺晉而封植之又克譙縱執慕容超逐盧循擒姚泓立四大功天下莫能抗然其志不在桓文而志在九錫亦已卑矣方帝之克長安也中原震恐元魏雖姚氏之婚姻而不敢捄羌氏雖關中之唇齒而不敢争此其智力有餘足以有為之時也若能因其兵勢據秦隴之形勝引吳越之饒富以經略中夏成曹公河朔之勢則五伯之功可冀顧所以用之何如耳然其兵未入秦而使傅亮南走建業發九錫之議劉穆之死南方無復可託雖已入秦而無畱秦之意舉千里之地付一孺子而去赫連勃勃乘之兵將死者過半狼狽而反僅乃得脫以帝之明非不知諸將之不足以保秦而志有所在不暇它慮矣悲夫以目前之利而棄百世之功有曹公削平之業而俯從司馬父子攘竊之陋此君子之所追恨也孔子曰知及之仁不能守之雖得之必失之智及之仁能守之不莊以莅之則民不敬知及之仁能守之莊以莅之動之不以禮未盡善也古之為國必具此四者而後能成大功如武帝之用兵無敵於天下可以言知矣至其棄秦而歸以求九錫之淫名尚可以為仁乎惟其仁知不具故其功業止於是也故予曰志有所在而不暇它慮焉何去非論曰天下之事日至而無窮而吾有以應之莫不中理者在乎善因其機况乎爭天下之利處兩軍之交不得其機以決之則事亦隨去矣蓋機之為物不可以期待不能以巧致者也卒然而㑹迅忽眇微及其去之疾不容瞬先機而起於機為妄赴後機而發於機為失應古之智者於機未嘗妄赴而亦未嘗失應是以御天下之事於一已而權不移制天下之變於無窮而智不詘夫機有待之百年而不至者有居之一日而數至者待之百年而無可乘之機則吾未嘗遲之而求於先發居之一日而機數至則吾未嘗厭之而怠於必應嗚呼人有至此然後可與濟天下之大業矣昔者越王勾踐辱於㑹稽之栖迨其返國苦身焦思拊循其民求有以報於吳也葢七年而民求奮於吳其臣僚同大夫種范蠡之徒止之以為未覩其可乘之機以發之也於是乎歛形匿跡以伺其隙者凡十八年一旦吳王空國北從黃池之㑹遂一舉而敗吳再舉而亡之西晉自永嘉之亂羣雄四起而分中原元帝竄身南渡收區區之江左以續宗祀而羣雄自相搏噬驟興驟滅百年之久至於符堅并夷略盡乃空國大舉而圖江南遂及淝水百萬之敗反未及國而慕容亡燕之裔並起而乘之垂收陜東而沖亂關右符丕坐困鄴城求我糧援既而垂以幽冀之民饉死殆盡其黨潰叛退保中山堅沖相持其勢俱憊於斯時也可謂千載一至之機也晉人有能乘燕秦相弊之餘因淝水克敵之勢選師擇將而命二軍一軍北收鄴城以舉燕代一軍西趨咸陽而定關隴據舊都之固復七廟之墜鎮撫士民以殄餘冦則武帝之業一朝可復而大恥刷矣晉人撫機而不知發乃方出師漕粟以慰其求既而尺土不獲而師以喪敗此謝安以氣怯而失機也宋武帝以英特之姿攘袂而起平靈寶於舊楚定劉毅於荆豫滅南燕於三齊克譙縱於庸蜀殄盧循於交廣西執姚泓而滅後秦葢舉無遺策而天下憚服矣北方之寇獨關東之拓拔隴北之赫連耳方其入關魏人雖强不敢南指西顧以議其後而秦民大悦以謂百年憤辱去於一朝相與涕泣而畱之以其為漢室之裔乃以長安十陵咸陽宫室以動其情使武帝因三秦悦附之民治兵蒐騎而畱拊之通江淮之漕下巴蜀之粟舉荆豫之師發青齊之甲以與趙魏從事於中原則天下之勢不勞而遂一矣然其席不暇煖舉千里之秦屬之乳褓之兒引兵遽還無復顧慮大違秦民之望蓋一舉足而赫連躡踵以收關中如探物於懐間此宋武以志卑而失機也察夫宋武之心非以秦雍為當捐而趙魏為足憚也然其亟去而不顧者蓋以其艱難百戰凡所以造宋之基業者皆在乎江左故也往日南燕之役盧循乘虚而下幾失建鄴今之速返者畏人之議其後而為盧循之舉也此所以輕捐關中而不顧也又其起於漁樵匹夫之微﨑嶇轉戰以經略江左者凡三十年今之西師者徒欲成取晉之資而其志慮之所在亦曰代晉而已未暇為王業萬世慮也使司馬氏卒不復見中州之定而諸部遂為不討之讎者由再失天下之大機也嗟夫集大事者惡夫志卑而失機宋武兼之矣謝靈運惠連𤣥暉樂天讀靈運詩曰吾聞逹士道窮通順㝠數通乃朝廷來窮即江湖去謝公才廓落與世不相遇壯志鬱不用須有所洩處洩為山水詩逸韻諧竒趣大必籠天海細不遺草樹豈惟翫景物亦欲攄心素往往即事中未能忘興諭因知康樂作不獨在章句子西書三謝詩後曰江左諸謝詩文見文選者六人希逸無詩宣遠叔源有詩不工今取靈運惠連𤣥暉詩合六十四篇為三謝詩是三人者詩至𤣥暉語益工然蕭散自得之趣亦復少減漸有唐風矣於此可以觀世變矣謝靈運陶淵明庾義城魯直論其詩曰謝康樂庾義城之於詩鑪錘之功不遺力也然陶彭澤之墻數仞謝庾未能窺者何哉蓋二子有意於俗人賛毁其工拙淵明直寄焉耳謝晦徐羡之傅亮子由曰晉獻公殺其世子申生而立奚齊國人不順其大夫里克殺奚齊卓子而納惠公春秋皆以弑君書之矣惠公既入而殺里克以弑君之罪罪之春秋書曰晉殺其大夫里克稱人以殺殺有罪也稱國以殺殺無罪也里克弑君而以無罪書此春秋之微意也奚齊卓子之立以淫破義雖已為君而晉人不君也既已為君則君臣之名正故里克為弑君而國人之所不君則勢必不免里克因國人之所欲廢而廢之因國人之所欲立而立之則里克之罪與宋華督齊崔杼異矣雖使上有明天子下有賢方伯里克之罪猶可議也惠公以弑得立而歸罪於克以自説於諸侯其義有不可矣然惠公殺克而背内外之賂國人惡之敵人怨之兵敗於秦身死而子滅至其謀臣吕甥郤穪冀芮皆以兵死蓋背理而傷義非獨人之所不與而天亦不與也宋武帝之亡也託國於徐羡之傅亮謝晦少帝失德三人議將廢之而其弟義真亦以輕動不任社稷乃先廢義真而後廢帝兄弟皆不得其死乃迎立文帝既立三人疑憚羡之亮内秉朝政晦出鎮上流為自安之計自謂廢狂亂以安社稷不以賊遺君父無負於國矣然文帝藩國舊人王華孔寗子王曇首皆陵上好進之人也惡羡之亮據其逕路每以弑逆之禍激怒文帝文帝遂決意誅之三人既死君臣自謂不世之功也是時甯子已死華與曇首皆受不次封賞文帝在位三十年其治為江左稱首然元嘉三年始誅三人是嵗皇子劭生既壯而為商臣之亂華甯子之子孫無聞於世而曇首之子僧綽其才能任事亦并死於劭嗚呼天之報人不遠如此不然晉惠公宋文帝禍發若合符契何哉謝晦將之荆州自疑不免以問蔡廓廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺人二昆以之北面挾震主之威據上流之重以古推今自免為難耳善夫蔡廓之言不學春秋而意與之合太史公有言為國者不可以不知春秋前有䜛而不見後有賊而不知守經事而不知其宜遭變事而不知其權為人君父而不通春秋之義者必蒙首惡之名為人臣子而不通春秋之義者必陷簒弑之誅其意皆以善為之而不知其義是以被之空言而不敢辭宋之君臣誠略通春秋則文帝必無惠公之禍而徐傅謝三人必不受里克之誅悲夫文帝誅劉湛等彭城王義康遜位出鎮豫章溫公曰文帝之於義康友愛之情其始非不隆也終於失兄弟之歡虧君臣之義迹其亂階正由劉湛權倖之心無有厭已詩云貪人敗類其是之謂乎詔豫章三妃四時祀二帝於青溪故宅用家人禮温公曰昔屈到嗜芰屈建去之以為不可以私欲干國之典况子為天子而以庻人之禮祭其父遠禮甚矣衛成公欲祀祖甯武子猶非之而况降祀祖考於私室使庶婦尸之乎劉凝之東坡曰劉凝之為人認所着屐即與之此人後得所失屐送還不肯復取沈麟士亦為鄰人認所着屐麟士笑曰是卿屐耶即予之鄰人後得所失屐送還之麟士曰非卿屐邪笑而受之此雖小節然人處事當如麟士不當如凝之也明帝殺王彧東坡曰宋明帝詔荅王景文其略曰有心於避禍不若無心於任運千仞之木既摧於斧斤一寸之草亦碎於踐踏晉將畢萬七戰皆獲死於牖下蜀將費褘從容坐談斃於刺客故甘心於履危未必逢禍從意於處安未必全福此言近於逹者然明帝竟殺景文哀哉哀哉景文之死也詔言朕不謂卿有罪然吾不能獨死請子先之詔至景文正與客棊竟斂子納奩中徐謂客曰有詔見賜以死酒至未飲門生焦度在側取酒抵地曰丈夫安能坐受死州中文武可以一奮景文曰知卿至心若見念者為我百口計乃謂客曰此酒不可相勸乃仰飲之蘇子曰死生亦大矣而景文安之豈貪權竊國者乎明帝可謂不知人者矣景文名彧王儉自比謝安少游曰君子之論人觀其終身之大節大節喪矣雖有一時之美一日之長足以夸汚世而矯流俗君子無取焉史稱王儉嘗謂江左風流宰相惟有謝安葢自況也以愚觀之儉實安之罪人也豈可同日而語哉何則自晉以閥閲用人王謝二氏最為望族江左以來公卿將相出其門者十七八子為主婿女為王妃布臺省而列州郡者不可勝數亦猶齊之諸田楚之昭屈景氏皆與國同其休戚者也安之仕晉始為桓溫司馬孝武之世政由温出縉紳顧望不知所為而安與王坦之盡忠王室蔑有二心至於屢改袁宏之文以寢九錫之命可謂以身許國社稷之臣者矣儉之仕宋襲封選尚其為親貴固非安之比也蕭公雖有異志而謝朏褚彦回之屬初無從意齊室之建儉實發之至引梁王魯國之事使臣珥貂所居稱殿何異取大勢以文姦言者安之於晉其大節如彼儉之於宋其大節如此愚故曰儉實安之罪人也至於該洽經史明習故事工詞令妙威儀動為名流之所仰所謂一時之美一日之長夸汚世而合流俗者也君子何取焉安少有重名累年辟召不至其後雖受朝寄而東山之志始末不渝形於言色則安之功名出於無意者也儉少時志在宰執見於所賦之詩及生子字曰元成取仍世作相之義則儉之富貴取於有心者也夫無意之與有心相去遠矣豈可同日而語哉宋受命陶濳自以祖侃晉世宰輔恥復屈身投劾而歸躬耕於潯陽之野其所著書因義熙以前題晉年號永初以後但稱甲子而已以此論之則儉之為人葢可見矣宋代晉張謂曰昔在王癸不道帝辛失德天命將改人心已去聖哲拯之厯數歸焉商湯所以革夏周武所以伐殷也至於太甲初放成王未長國步猶梗時尚屯虞忠賢處之名節存焉伊尹所以反王周公所以復嗣也元興之際義熙之間晉主中庸幸無桀紂之罪劉公大略遂有伊周之勲當其驅駕英雄芟夷僣偽南摧勁楚北破强燕電掃秦雍風清巴蜀三方為我有四海為已任誠能秉汾陽之志息漢陰之機牽率何劉同為翊戴指撝徐傅共致雍熙則元皇建業之都至今享殷周之祚劉后豫章之地至今為齊晉之國而近希曹馬遠棄威文禍徒及於兩朝福未盈於三載八葉傳其世嗣六君不以壽終漢氏寛仁晉緒成大族劉公殘暴子孫無遺種天之報施其明徵乎則知握元符升大寶禮義得之者難絶智力得之者易亡使成如宋齊無足稱者况敗如莽卓豈足道哉後之人運屬陵夷業崇經濟周爰故地殷鑒在兹宋之人君温公曰晉氏渡江以來君弱臣强禍亂相繼至於元興而桓氏簒位高祖首唱大義糾合同志起於草莽之間奮臂一呼兇黨瓦解遂梟靈寶之首奉迎乘輿再造晉室厥功已不細矣既而治兵誓衆經營四方揚旗東征廣固橫潰卷甲南趨盧循殄滅偏師西上譙縱授首鋭卒北驅姚泓面縳遂汎掃伊洛修奉園陵震驚拓抜之心發舒華夏之氣南國之盛未有過於斯時者也然區宇未一躋於天位委棄秦雍以資冦敵使大功不成惜哉文帝勤於為治子惠庶民足為承平之良主而不量其力横挑强敵使師徒殱於河南戎馬飲於江津及其末路狐疑不決卒成於禍豈非文有餘而武不足邪及以孝武之驕淫明帝之猜忍得保首領以沒於牖下幸矣何後之有歴代名賢確論卷六十三
