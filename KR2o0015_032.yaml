body:
  text: 歷代名賢確論卷三十二始皇取齊楚巧拙東坡王翦滅楚潁濵戰守東坡何去非棄禮義而務便利東坡不用仁義而亡溫公潁濵忘逺老泉天之報應潁濵秦非閠位六一取齊楚巧拙東坡曰始皇十八年取韓二十二年取魏二十五年取趙取楚二十六年取燕取齊初并天下蘇子曰秦并天下非有道也特巧耳非幸也然吾以謂巧於取齊而拙於取楚其不敗於楚者幸也嗚呼秦之巧亦創於智伯而已韓魏肘足接而智伯死秦知創智伯而諸侯終不知師韓魏秦并天下不亦宜乎齊湣王死法章立君王后佐之秦猶伐齊也法章死王建立六年而秦攻趙齊楚救之趙乏食請粟於齊而齊不豫秦遂圍邯鄲幾亡趙趙雖未亡而齊之亡形成矣秦人知之故不加兵於齊者四十餘年夫以法章之才而秦伐之建之不才而秦不伐何也太史公曰君王后事秦謹故不被兵夫秦欲并天下耳豈以謹故置齊也哉吾故曰巧於取齊者所以大慰齊人之心而解三晉之交也齊秦不兩立秦未嘗須㬰忘齊也而四十餘年不加兵者豈其情乎齊人不悟而與秦合故秦得以間取三晉三晉亡齊蓋岌岌矣方是時猶有楚與燕也三國合猶足以拒秦秦大出兵伐楚伐燕而齊不救故二國亡而齊亦虜不閲嵗如晉取虞虢也可不謂巧乎二國既滅齊乃發兵守西界不通秦使嗚呼亦晚矣秦初遣李信以二十萬人取楚不克乃使王翦以六十萬人攻之蓋空國而戰也使齊有中主具臣知亡之無日而掃境以伐秦以久安之齊而入厭兵空虛之秦覆秦如反掌也吾故曰拙於取楚然則奈何曰古之取國者必有數如取齠齒必以漸故齒脫而兒不知今秦易楚以為是齠齒也可拔遂抉其口一拔而取之兒必傷必齧故秦之不亡者幸也非數也吳為三軍迭出以肄楚三年而入郢晉之平吳隋之平陳皆以是物也唯苻堅不然使堅知出此以百倍之衆為迭出之計雖韓白不能支而况謝𤣥牢之之流乎吾是以知二秦之一律也始皇幸勝而堅不幸爾王翦滅楚潁濵曰王翦與始皇議滅楚非六十萬不行豫始疑其過及觀田單與趙奢論兵乃知老將之言不妄也趙以齊田單為相單語趙奢曰吾非不說將軍之兵法所不服者將軍之用衆也帝王之兵不過三萬而天下服矣今將軍必負十萬二十萬而後用之使民不得耕作糧食挽賃不可給也奢曰君非徒不逹兵又不明時勢矣吳干之劒肉試則斷牛馬金試則截盤匜薄之柱上而擊之則絶為三質之石上而擊之則碎為百今以三萬之衆而應强國之兵是薄柱擊石之類也且夫劒之為用無脊之厚則鋒不入無髀之薄則刃不斷無釣罕鐔䝉須之便操其刃而刺則未入而手斷今君無十萬二十萬之衆以為釣罕鐔䝉須之便焉能以三萬行於天下乎古者四海萬國城大不過三百丈人多不過三千家則以三萬拒之足矣今取古萬國分為戰國七兵能具數十萬食能支數嵗千丈之城萬家之邑相望也君奈何以三萬之衆攻之田單喟然歎息曰單未至也由此觀之攻千里之國毁百年之業不乘大隙非大衆不可彼決機兩陳之間為一日成敗之計乃可以少擊衆耳戰守東坡曰秦人居諸侯之地而有萬乘之志侵辱六國斬伐天下不數十年之間而得志於海內至其後世再傳而遂亡劉季起於匹夫斬艾豪傑蹶秦誅楚以有天下而其傳子孫數十世而不絶蓋秦漢之事其所以起者不同而其所以取之者無以相逺也然劉項奮臂於閭閻之中率天下蜂起之兵西嚮以攻秦無一成之聚一夫之衆驅罷弊適戍之人以求所非望得之則生失之則死以匹夫而圗天下其勢不得不疾戰以趨利是以冒萬死求一生而不顧今秦擁千里之地而乘纍世之業雖閉關而守之畜威養兵拊循士民而諸侯誰敢謀秦觀天下之釁而後出兵以乘其弊天下夫誰敢抗而惠文武昭之君乃以萬乘之資而用匹夫所以圗天下之勢疾戰而不顧其後此宜其能以取天下而亦能以亡之也夫劉項之勢天下皆非吾有起於草莽之中因亂而爭之故雖驅天下之人以爭一旦之命而民猶有待於其定以息肩於此故以疾戰定天下天下既安而下無背叛之志若夫六國之際諸侯各有分地而秦乃欲以力征强服四海不愛先王之遺黎以為子孫之謀而竭其力以爭鄰國之利大國雖滅而秦民之心已散矣故秦之所以謀天下者匹夫特起之勢而非所以承祖宗之業以求其不失者也昔者嘗聞之周人之興數百年而後至於文武文武之際三分天下而有二然商之諸侯猶有所未服紂之衆未可以不擊而自解也故以文武之賢退而修德以待其自潰誠以為后稷公劉太王王季勤勞不懈而後能至於此故其發之不可輕而用之有時也嗟夫秦人舉纍世之資一用而不復惜其先王之澤已竭於取天下而尚欲求以為國亦已惑矣又曰天下之勢莫大於使天下樂戰而不好戰天下不樂戰則不可與從事於危好戰則不可與從事於安昔秦人之法使吏士自為戰戰勝而利歸於民所得於敵者即以有之使民之所以養生送死者非殺敵無由取也故其民以好戰并天下而亦以亡夫始皇雖以墮名城殺豪傑銷鋒鏑而民之好戰之心囂然其未巳也是故不可與休息若夫王者之兵要在於使之知愛於上而讎其敵使其知其上之所以驅之於戰者凡皆以為我也是以樂其戰而甘其死至於其戰也務勝敵而不務得財其賞也發公室而行之於廟使其利不在殺人是故其民不志於好戰夫然後可以作之於安危之中而休之於爭奪之際可與安可與危而不可與亂此天下之勢也何去非曰兵有攻有守善為兵者必知夫攻守之所宜故以攻則克以守則固當攻而守當守而攻均敗之道也方天下交臂相與而事秦之强也秦人出甲以攻諸侯蓋將取之也圗攻以取人之國者所謂兼敵之師也及天下攘袂相率而叛秦之亂也秦人合卒以拒諸侯蓋將卻之也圖拒以卻人之兵者所謂救敗之師也兼敵之師利於轉戰救敗之師利於固守兵之常勢也秦人據崤函之阻以臨山東自繆公以來常雄諸侯卒至於并天下而王之豈其君世賢耶亦以得乎形便之居故也二世之亂天下相與起而亡秦不三嵗而為墟以二世之不道顧秦亦何足以亡然而使其知捐背叛之山東嚴兵拒關為自救之計雖以無道行之而山西千里之區猶可嵗月保也不知慮此乃空國之師以屬章邯李由之徒越關千里以摶冦而為鄉日堂堂兼敵之師亦已悖矣方陳勝之首事而天下豪傑爭西嚮而誅秦也蓋振臂一呼而帶甲者百萬舉麾一號而下城者數十又類皆山林倔起之匹夫其存亡勝負之機取决於一戰其鋒至鋭也而章邯之徒不知固守其所以老其師乃提孤軍棄大險渡漳踰洛左馳右騖以嬰其四合之鋒卒至於敗而沛公之衆揚袖而入空關雖二世之亂足以覆宗天下之勢足以夷秦而其亡遂至於如此之亟者用兵之罪也夫秦役其民以從事於天下之日久矣而其民被二世之毒未深其勇於公鬭樂於衛上之風聲氣俗猶在也而章邯之為兵也以攻則不足以守則有餘周文常率百萬之師傅於戲下矣章邯三擊而三走之卒殺周文使其不遂縱以摶敵而坐關固守為救敗之師關東之土雖已分裂而全秦未潰也或曰七國之反漢也議者歸罪於吳楚以為不知杜成臯之口而漢將一日過成臯者數十輩遂至於敗亡今豪傑之叛秦而罪二世之越關摶戰何也嗟夫務論兵者不論其逆順之情與夫利害之勢則為兵亦疏矣夫秦有可亡之形而天下之衆亦鋭於亡秦是以豪傑之起者因民志也關東非為秦役矣漢無可叛之釁而天下之民無至於負漢則七國之起非民志矣天下皆為漢役者也以不為秦役之關東則二世安得即其地而疾戰其民以方為漢役之天下則漢安得不趨其所而疾誅其君此戰守之所以異術也昔者賈誼司馬遷皆謂使子嬰有庸主之才僅得中佐則山西之地可全而有卒取失言之譏於後世彼二子者固非愚於事機者也亦惜夫秦有可全之勢耳雖然彼徒知秦有可全之勢而不知至於子嬰而秦之事去矣雖有太公之佐其如秦何哉棄禮義而務便利東坡曰昔者生民之初不知所以養生之具擊摶挽裂與禽獸爭一旦之命惴惴焉朝不謀夕憂死之不給是故巧詐不生而民無知然聖人惡其無别而憂其無以生也是以作為器用耒耜弓矢舟車網罟之類莫不備至使民樂生便利役御萬物而適其情而民始有以極其口腹耳目之欲器利用便而巧詐生求得欲從而心至廣聖人又憂其桀猾變詐而難治也是故制禮以反其初禮者所以反本復始也聖人非不知箕踞而坐不揖而食便於人情而適於四體之安也將必使之習為迂闊難行之節寬衣博帶佩玊履舄所以回翔容與而不可以馳驟上自朝廷而下至於民其所以視聽其耳目者莫不近於迂闊其衣以黼黻文章其食以籩豆簠簋其耕以井田其進取選舉以學校其治民以諸侯嫁娶死喪莫不有法嚴之以鬼神而重之以四時所以使民自尊而不輕為姦故曰禮之近於人情者非其至也周公孔子所以區區於升降揖讓之間丁寧反覆而不敢失墜者世俗之所謂迂闊而不知夫聖人之權固在於此也自五帝三代相承而不敢破至秦有天下始皇帝以詐力而并諸侯自以為智術之有餘而禹湯文武之不知出此也於是廢諸侯破井田凡所以治天下者一切出於便利而不恥於無禮决壞聖人之藩牆而以利器明視天下故自秦以來天下惟知所以求生避死之具而以禮者為無用贅疣之物何者其意以為生之無事乎禮也茍生之無事乎禮則凡可以得生者無所不為矣嗚呼此秦之禍所以至今而未息歟昔者始有書契以科斗為文而其後始有規矩摹畫之迹蓋今所謂大小篆者至秦而更以𨽻其後日以變革貴於速成而從其易義創為紙以易簡䇿是以天下簿書符檄繁多委壓而吏不能究姦人有以措其手足如使今世而尚用古之篆書簡䇿則雖欲繁多其勢無由由此觀之則凡所以便利天下者是開詐僞之端也嗟夫秦既不可及矣而後之君子欲治天下而惟利便之求則是引民而日趨於詐也悲夫不用仁義而亡溫公曰知及之仁不能守之雖得之必失之秦之謂也善夫賈生之言曰秦以區區之地千乘之權招八州而朝同列百有餘年然後六合為家崤函為宫一夫作難而七廟隳身死人手為天下笑何哉仁義不施而攻守之勢異也潁濵曰三代以道御天下動容貌出辭氣逡巡於廟堂之上而諸侯承德四夷向風何其盛哉至其後世稍衰桓文迭興而維持之要之以盟㑹齊之以征伐既已畢矣然春秋之後吳越放恣繼之以田常三晉之亂天下遂為戰國君臣之間非詐不言非力不用相與為盜跖之行猶恐不勝雖桓文之事且不試矣而况於文武成康之舊歟秦起於西陲與戎狄雜居本以强兵富國為上其先襄公最賢詩人稱之然其所以為國者亦猶是耳詩曰蒹葭蒼蒼白露為霜所謂伊人在水一方夫蒹葭之方盛也蒼蒼其强徑而不宜於用至於白露凝戾為霜然後堅成可施於人今夫襄公以耕戰自立而不知以禮義終成之豈不蒼然盛哉然而君子以為未成故其後世狃於為利而不知義至於商君厲之以法風俗日惡鄙詐猛暴甚於六國卒以此勝天下秦之君臣以為非是無足以服人矣當是時諸侯大者連地數千里帶甲數千萬雖使齊桓晉文假仁義挾天子以令之其勢將不能行惟得至誠之君子自修而不爭如商周之先君庶幾可以服之孟子遊於齊梁以此干其君皆莫能信以為詐謀竒計之所不能下長㦸徑弩之所不能克區區之仁義何足以致此然魏文侯當時之弱國也齊王后齊之一婦人也魏文侯行仁義禮下賢者用子夏田子方段干木而秦人不敢加兵齊王后用齊四十餘年事秦謹與諸侯信而齊未嘗受兵而况於力行仁義中心惻怛終身不懈而有不能勝者哉夫衣冠被玉可以化强暴深居簡出可以卻猛獸虛心寡欲可以懷鬼神孟子曰仁不可以為衆試因秦之地用秦之民按兵自守修德以來天下彼將襁負其子而至誰與共守惜乎其明不足以知之竭力以勝敵勝敵之後二世而亡其數有以取之矣忘逺老泉曰武王不泄邇不忘逺仁矣乎非仁也勢也天下之勢猶一身一身之中手足病於外則腹心為之深思靜慮於內而求其所以療之之術腹心病於內則手足為之奔掉於外求其所以療之之物腹心手足之相救非有待而後然愚故曰武王之不泄邇不忘逺非仁也勢也勢如此其急而古之君獨武王然者何也人皆知一身之勢而武王知天下之勢也夫不知一身之勢者一身危而不知天下之勢者天下不危乎哉秦之保關中自以為子孫帝王萬世之業而陳勝吳廣乃楚人也由此觀之天下之勢逺近如一然以臣言之近之可憂未若逺之可憂之深也天之報應潁濵曰戰國惟秦楚燕為故國取之非逆而守之為暴矣若三晉及齊皆以篡奪得之所以取守者皆非義也天方厭喪亂欲假手於秦而秦亦淫虐無以受之於是不韋乘釁納妾於子楚以亂其後六國未亡而嬴氏已先亡矣及至二世屠戮諸公子殆盡而後授首於劉項老子曰天網恢恢踈而不失不觀其微孰知其故哉秦非閏位六一曰謂秦為閏者誰乎是不原本末之論也此漢儒之私說也其說有三不過曰滅棄禮樂用法嚴苛與其興也不當五德之運而已五德之說非聖人之言曰昧者之論詳之矣其二者特始皇之事爾然未原秦之本末也昔者堯舜夏商周秦皆出於黃帝之苖裔其子孫相代而王堯傳於舜舜傳於禹夏之衰也湯代之王商之衰也周代之王周之衰也秦代之王其興也或以德或以功大抵皆乘其弊而代之初夏世衰而桀為昏暴湯救其亂而起稍治諸侯而誅之其書曰湯征自葛是也其後卒以攻桀而滅夏及商世衰紂為昏暴周之文武救其亂而起亦治諸侯而誅之其詩所謂昆崇共密是也其後卒攻紂而滅商推秦之興其功德固有優劣而其迹豈有異乎秦之紀曰其先大業出於顓頊之苖裔至孫伯翳佐禹治水有功唐虞之間賜姓嬴氏及非子為周養馬有功秦仲始為命大夫而襄公與立平王遂受岐豐之賜當是之時周衰固已久矣亂始於穆王而繼以厲幽之禍平王東遷遂同列國而齊晉大侯魯衛同姓擅相攻伐共起而弱周非獨秦之暴也秦於是時既平犬夷因取周所賜岐豐之地而穆公以來始東侵晉地至于河西滅諸戎拓地千里其後關東諸侯强僭者日益多周之國地日益蹙至無復天子之制特其號在爾秦昭襄五十三年周之君臣稽首自歸于秦至其後世遂滅諸侯而一天下此本末之迹也其德雖不足而其功力尚不優於魏晉乎始秦之興務於力勝至于始皇遂悖棄先王之典禮又自推水德益任法而少恩其制度文為皆非古而自是此其所以見黜也夫始皇之不仁不過如桀紂桀紂不能廢夏商之統則始皇未可廢秦也歷代名賢確論卷三十二
