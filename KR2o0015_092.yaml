body:
  text: 歴代名賢確論卷九十二武宗殺陳王孫之翰毁拆佛寺石守道諫官疏皆匿名范祖禹李徳裕諫不使監使多占精兵不以中詔指揮軍事范祖禹宦官范祖禹藩鎮范祖禹温公子由李徳裕范祖禹張唐英孫之翰鄭獬杜牧裴延齡殺陳王孫之翰論曰武宗殺陳王安王又欲殺李玨等不惟褊很之過乃不思召後代之亂也文宗繼昭愍即位晚年無子以陳王昭愍之子立為儲貳李玨之議得其正矣及文宗大漸仇士良矯詔立武宗武宗文宗之弟於次序不若陳王之正然既即位陳王李玨何罪焉武宗聴士良之譖乗褊很之性已殺陳王矣至是又欲殺玨雖輔相等懇救其事然竟逐之是大臣當天子立子之際不當正議也正議者獲罪則後之大臣於國嗣不敢忠言矣大臣不敢忠言則天子之子或長年而大賢可無他慮若子幼或未著大賢之名或無子孰敢正議國嗣有時而不定一日争奪之患何所不至豈非召後代之亂也如嗣復立安王之議此乃不正然必事狀明白為中外所信可罪之以戒後之挾私而議國事者况事狀曖昧又安可不罪焉毁拆佛寺石守道論曰夫仁義之道大中至正之道也天下之福也古者堯舜禹湯周文王武王能修仁義之道故皆受仁義之福何以騐之書曰堯在位七十年享年一百一十七嵗舜在位五十載享年一百一十二嵗禹傳于子繼位一十七君有國四百年湯傳于子繼位二十七君有國七百年周亦傳于子繼位三十三君有國八百年此其驗也後世人君仁義不修而湎淫怠荒窮奢極欲竭天下之力疲天下之力聚歛生靈之膏血以信奉佛而望福報不亦妖言乎且帝王以生靈為本使天下無一夫饑無一夫寒無一夫不遂其生無一夫不得其所此帝王之福也天下生民凍餒轉死溝壑而不給一尺帛賜一石粟使其飽且暖而乃輦金載貨填于寺門以奉羣髠將以為萬民求福何其迂也且僧徒皆游惰之民人庸人爾使之齋與之錢不知何由能作福也若曰奉佛佛死已千有餘年也其骨已臭朽腐爛也其魂已殄滅消散也以數片金薄塗于面首用三門髙屋覆其身軀其使能降福於人臣不信也臣不信也王縉之徒以謂國祚流長皆佛之福報所資又以為禄山思明毒亂方熾而皆有子禍僕固懷恩將亂而死西戎犯闕未擊而退實由佛之福力何厚誣也髙祖太宗以仁義革亂提四海之民出塗炭之中置于富夀之域登于太平之樂徳化深厚恩惠及逺積仁累義垂慶子孫不能嗣襲其善中原屢擾社稷幾覆髙祖太宗之徳未盡人神協賛宗廟祐助逆兵勤而且死神器危而復安延至于三百年葢髙祖太宗之靈天地神人之賛而乃推于佛何厚誣也嗚呼自佛入中國蠧壞至于今矣今髠徒左袵異端之人半中國古之所謂四民者流入于佛老十有六七天下榖帛貨貝歸於佛老者亦十有六七今以天下奉佛老佛老益盛中國益匱生民益耗生民耗中國匱雖有天下國家何以為國也佛老之患也大矣深矣非有英睿之君神聖威武如禹湯文武者誰能除此弊也在有唐時憲宗迎佛骨刑部侍郎韓愈上疏切諫至于武宗皇帝遂拆天下寺盡去天下僧尼盡毁天下佛像武皇帝英威如此謚之曰武宜哉古之帝王以干戈而定天下而人服則有周武王以征伐而威四夷以來朝則有漢武帝以睿智英斷聰明正直而去佛教以殄滅則有唐武宗臣嘗論三武之功以謂紂虐無厭武王憑后稷公劉王季文王之徳乗天下厭亂之心一戎衣服天下漢祖志怯戎狄輕北易走武帝驅天下之兵利天下之甲以抗一隅而匃奴臣其功皆易至於佛者深根固蒂七八百年為天下大患如唐太宗之聖神明皇之仁勇憲宗之英睿皆不能除之而武宗皇帝奮於百王之下斷自宸智挺然不疑一旦盡除去之其功過於周武王漢武帝逺甚矣諫官疏皆匿名范祖禹論曰易曰天下之動正夫一朝廷者四方之極也非至公無以絶天下之私非至正無以正天下之邪人君一不正其心則無以正萬事茍以術御下是自行詐也何以禁臣下之欺乎是以術行而欺愈多智用而心愈勞葢以詐勝詐未有能相一者也禮曰王中心無為也以守至正夫惟正不可得而欺欺則不容於誅矣豈不約而易守哉李徳裕諫不使監使多占精兵不以中詔指揮軍事范祖禹論曰治天下之繁者必以至簡制天下之動者必以至静夫用兵於千里之外而君相擾於内則本先揺矣何以制其末乎是故號令簡則民聴不惑心慮静則事變不撓此所以能成功也宦官范祖禹論士良戒其僚悦天子以奢侈勿令讀書近儒生曰小人莫不養其君之欲以濟已之欲使其君動而不静為而不止則小人得以行其計矣豈獨奢靡之娯恱耳目足以蕩君心哉又有甚焉者矣或殖貨利或治宫室或開邊境或察臣下隨其所好以竊權寵人君樂得其欲而不知其為天下害是以政日亂而不自知惟能親正直逺邪佞則可以免斯患矣藩鎮范祖禹論李徳裕請討劉稹宣慰河北三鎮三鎮無不奉詔曰自天寳以後河朔世為唐患憲宗雖得魏博而穆宗復失之是以朝廷惟事姑息幸其不叛斯可矣豈得而使之哉至于武宗不惟使三鎮不敢助逆又因以為臂指之用由徳裕所以告之者能服其心也揚雄曰御得其道則天下徂詐咸作使御失其道則天下徂詐咸作敵人主威制天下豈有不由一相者哉又論徳裕戒勵河北三鎮曰書曰戒之用休董之用威古之明王天下有不順者必諄諄而告教之至于再至于三告之不可然後征之則其民知罪而用兵有辭矣自唐之失河朔或討伐之或姑息之不聞有文告之命戒敕之辭也是以兵加而不服恩厚而愈驕李徳裕以一相而制御三鎮如運諸掌使武宗享國長乆天下豈有不平者乎温公論郭誼殺劉稹斬之曰董重質之在淮西郭誼之在昭義呉元濟劉稹如木偶人在技兒之手耳彼二人者始則勸人為亂終則賣主規利其死固有餘罪然憲宗用之於前武宗誅之於後臣愚以為皆失之何則賞奸非義也殺降非信也失義與信何以為國昔漢光武待王郎劉盆子止於不死知其非力竭則不降故也樊崇徐宣王元牛邯之徒豈非助亂之人乎而光武弗殺蓋以既受其降則不可復誅故也若既赦而復逃亡叛亂則其死固無辭矣如誼等免死流之逺方沒齒不還可矣殺之非也子由論曰李徳裕制變遇事之方裴度有所愧然度之制變務出于中和故事出而人不驚事已而身安徳裕矜才而快意者也故其所發足以悚動人之觀聴而後多悔宦者劉承偕監劉悟軍悟不堪其侮而言之朝憲宗以其有寵於母后也問計於度度請殺之又曰不能斬則流之夫斬之則風采足以震動而於事也徒然茍求生下足以厭悟意上不傷太后心流之亦足矣何必求動人之視聴哉此度過人者也劉稹之叛計䇿出於郭誼為多稹勢已窮􅕚誼斬稹以降此在誼為可怒在朝廷為可賞徳裕以為稹小子安知反誼寔教之而終賣稹以求生卒斬之徳裕之出此不過欲明大義立風聲以悚動視聴若誼者置而不問斯可矣何必求名而殺之邪是時强藩叛鎮力足以拒王命而所深忌者左右之竊發也誅誼而叛臣始安心於其下其為慮益已疎矣徳裕惡牛僧孺其傾僧孺也曰僧孺聞劉從諫滅而慨歎又誣成其往來之迹夫傾大臣惟有交反者罪為無以加人主之所不恕僧孺由此遂竄徳裕於復怨則快矣而君子豈忍為是哉故一失勢羣起而擠之身沒南荒非偶然者也李徳裕范祖禹論徳裕言為政在慎擇宰相令政事皆出中書曰古之王者惟以一相總天下之務是以理出于一政無多門茍非其才則退之而已矣不以小臣間之讒慝疑之所以重責任也徳宗之時宰相失職故其政謬亂徳裕欲先正其本而後圖所以為治其能致㑹昌之功伐蓋以此歟張唐英論徳裕請任世家為要官曰李徳裕言朝廷要官當任世家以其知典故之故也噫徳裕之言私於已可也非天下之公言也且伊尹起於耕夫傅說起於胥靡太公望起於漁釣蕭曹起於刀筆公孫𢎞牧豕菑丘翟方進以孤童入京率皆為時賢臣豈盡出於世胄耶以唐之時而言自房杜已降如馬周劉垍狄仁傑劉幽求婁師徳郝處俊裴行儉劉仁軌張説姚崇宋璟陸贄裴度之輩又豈皆世家子弟耶徳裕祖栖筠嘗為御史大夫父吉甫為宰相已又為宰相其意又欲為其諸子之地使異日列處顯要故先為此言以為身後之計故曰私於己可也非天下之公言也而後之人卒以此言為然而孤寒之路益塞誠可嗟也徳裕若以天下公言則宜曰朝廷要官宜擇賢者無限孤寒世胄惟才者任之則可也奈何以己三世宰輔又欲為諸子之地而以此言扼天下之寒士哉盧文紀曰越人善泅生子方晬乳母浮之水上曰其父善泅子必不溺而徳裕之言其乳母浮子之謂耶孫之翰論徳裕辭太尉曰李徳裕自穆宗至文宗朝歴内外職任奏議忠直政績彰顯遂當輔相之任然為邪佞所排不克成就功業及相武宗英主始盡其才回鶻在邊先請待以恩好及其侵軼乃授劉沔石雄成算使之平蕩得中國大體上黨拒命舉朝懼生事不欲用兵徳裕料其事勢奏遣使魏鎮先破聲援之謀且委征討之任魏帥遷延其役使王宰領師直趨磁州據魏之右魏帥恐懼全軍以出又以王宰少有顧望令劉沔領軍直抵萬善示代宰之勢宰即時進兵太原之亂楊弁結中使張皇其事邀求符節徳裕折中使姦言使王逢將陳許易定兵進討太原兵戍於外者懼客軍收城并屠其家徑歸擒弁盡誅將卒此皆獨任其䇿不與諸相同謀大得制御將帥用兵必勝之術上黨既平太尉之命賞其功固當徳裕懇辭而後受者懼位極而禍至也既知其禍何不益務仁徳以保功名反恣剛彊之性取怨於人竟為姦邪誣陷是不知避禍也夫得位而立大功名人之所難也保其功名人之所易也立功名非天賦大才不能也保功名平其心無怨忌足矣徳裕能其難者不能其易者惜哉又論武宗駕馭徳裕曰人君於大臣得委任之道駕馭之術則大臣盡心於事得以成勲推公於人不敢竊威福其道其術失一不可二者惟太宗得之貞觀中陳師合上拔士論言人之思慮有限不可兼領數職意間房杜則立行竄逐蕭瑀奏中書門下朋黨則折莫妄言竟出於外可謂能委任矣然中書門下議事命諫官御史史官隨之或正其失或紏其過或書其非李靖以老疾家居欲復任為將一言於朝靖已起而統兵可謂能駕馭矣故威徳至盛大臣各成功名而不敢驕横其道其術至矣武宗用李徳裕誠得委任之道故徳裕盡其才謀獨當國事時之威令大振者委任之至也但武宗性雄雋觀前朝法令不行紀綱衰替方將興大其勢知徳裕才首命作相徳裕謀略動合其意故專任之矣委任既專權勢自重勢既重天子始不恱之怨者得窺其隙而攻之矣怨者攻之彼勢已重肯帖帖乎必至於禍而後已嗚呼武宗英主也知賢相而任之不能駕馭尚致行事太專怨者頗衆若中常之君不知人而任之復不能駕馭則為害於時甚矣或曰既稱武宗誠英矣徳裕誠賢矣但君臣之性雄毅則銳於行事而事或不思事之不思喜怒有時而過喜怒之過行事不無不平武宗未免是累徳裕之情固不知察矣武宗若察其情而制之徳裕必不至肆其所為安得一徇其意無所駕馭也夫人君駕馭大臣之術非一端且就徳裕事言之徳裕於牛僧孺李宗閔輩相怨之乆人人所知平上黨之際奏逐僧孺輩明是成功而報怨僧孺雖非大賢嘗位宰輔矣吕述之言有何顯狀至貶之遐裔宗閔已出逺郡刺史亦不因顯過而流竄御史崔元藻按事有異是舉其職乃不復驗而黜之栁公權方以才望為集賢學士無故罷職是一徇徳裕之意也武宗於徳裕任其才從其謀高其位厚其禮足矣何得一徇其意也若徳裕言人之罪其狀明白固當從其言事或不明豈得不詢驗其狀若不然當有所制也有所制則徳裕無過矣或曰武宗英主能任大臣而不能駕馭中常之君何以盡委任之道駕馭之術答曰惟至公可矣至公者不以合意而悦之不察其過不以違意而怒之不知其賢人君用大臣平心如是委任之道駕馭之術庶幾矣鄭獬曰李文饒窮愁志篇未嘗不在奇章也至周秦行紀論予讀而悲之嗚呼憎怨之攻人也深矣雖然文饒不欲南斥可得哉杜牧裴延齡論杜牧文章曰文章與政通而風俗以文移在三代之道以文與忠敬隨之是為理具與運髙下探採古作者之論以屈原宋玉賈誼司馬遷相如揚雄劉向班固為世魁傑然騷人之辭怨刺憤懟雖援及君臣教化而不能霑洽持論相如子雲瑰麗詭變諷多要寡漫羨無歸不見治亂賈馬劉班乗時君之善否直豁已臆奮然以拯世扶物為任纂緒造端必不空言言之所及則君臣禮樂教化賞罰無不包焉竊觀牧之文髙騁夐厲旁紹曲接簡㓗渾圎勁出横貫滌濯澤窳支立欹倚呵摩皸瘃如火煦焉爬梳痛癢如水洗焉其抉剔挫揠敢斷果行若誓牧野前無有敵其正視嚴聴前衡後鑾如整冠裳祗謁宗廟又其䀨蟄爆聾發慄若大吕勁鳴洪鐘横撞撑裂噎喑戞切韶頀其砭熨嫉害堤障初終若濡槁於未焚膏癰於未穿栽培教化翻正治亂變醨養醇堯醲舜薫斯有意趨賈馬劉班之藩牆者邪其文有罪言原十六衛者戰守二論者與時宰論用兵論江賊二書者上獵秦漢魏晉南北二朝逮貞觀至長慶數千百年兵農刑政措置當否皆能採取前事凡人未嘗經度者若繩裁刀解粉畫線織何在眼見耳聞哉其譎往事則阿房宫賦刺當代則感懷詩有國欲亡則得一賢人決遂不亡則張保臯傳尚古兵柄本出儒術不専任武力者則注孫子而為其序褒美賢傑表揭職業則贈莊淑大長公主及故丞相竒章公汝南公墓誌標白歴代取士得才率由公族子弟為多則與高大夫書諫諍之體非訐醜惡與主鬭鬭激則論諫書若一縣宰因行徳教不施刑罰能舉古風則謝守黄州表一存一亡適見交分則祭李處州文訓勵官業告束君命擬古典謨以寓誅賞則司帝之誥其餘述喻讃誡興詭愁傷易格異狀機鍵雜發雖綿逺窮幽醲腴魁礨筆酣句徤窕眇碎細包詩人之軌憲整揚馬之衙陣聳曹劉之骨氣掇顔謝之物色然未始不掇斸治本縆幅道義鈎索於經史觝禦於理化也文中子曰言文而不及理是天下無文也王道何從而興乎嘻所謂文章與政通而風俗以文移果於是以卜盛時理具踔三代而䕃萬古若躋太華臨溟渤但觀乎積高而沓深不知其磅礴澶漫所為逺大者也歴代名賢確論卷九十二
