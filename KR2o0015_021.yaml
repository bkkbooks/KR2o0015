body:
  text: 歷代名賢確論卷二十一成王令尹子文老泉子玉用兵東坡康王屈建不薦芰東坡昭王子西潁濱惠王葉公潁濱泰伯讓國東坡潁濱季札讓國蕭定獨孤及潁濱東坡令尹子文老泉曰楚人高令尹子文之行曰三以為令尹而不喜三奪其令尹而不怒其為令尹也楚人為之喜而其去令尹也楚人為之怒已不期令尹而令尹自至夫令尹子文豈獨惡夫富貴哉知其不可以求得而安其自得是以喜怒不及其心而人為之囂囂嗟夫豈亦不足以見已大而物小耶脫然為棄於人而不知棄之為悲紛然為取於人而不知取之為樂人自以為棄我取我而吾之所以為我者如一則亦不足以高視天下而竊笑矣哉子玉用兵東坡曰蒍賈論子玉過三百乘必敗而郤克自謂不如先大夫請八百乘將以用寡為勝抑以將多為賢也如淮隂侯言多多益辦是用衆亦不易古人以兵多敗者不可勝數如王尋苻堅哥舒翰者多矣子玉剛而無禮少與之兵或能戒懼而不敗耶屈建不薦芰東坡曰屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之君子曰不違而道唐栁宗元非之曰屈子以禮之末忍絶其父將死之言且禮有齊三日思其所樂思其所嗜子木去芰安得為道甚矣栁子之陋也子木楚卿之賢者也夫豈不知為人子之道事死如事生況於將死丁寧之言棄而不用人情之所忍乎是必有大不忍於此者而奪其情也夫死生之際聖人之所嚴薨於路寢不死於婦人之手至於結冠纓啓手足之末不敢不勉其於死生之變亦重矣父子平日之言可以恩掩義至於死生至嚴之際豈容以私害公乎曾子有疾稱君子之所貴平道者三孟僖子卒使其子學禮於仲尼管仲病勸桓公去三豎夫數君子之言或主社稷或勤於道德或訓其子孫雖所趨不同然皆篤於大義不私其躬也如此今赫赫楚國若敖氏之賢聞於諸侯身為正卿死不在民而口腹是憂其為陋亦甚矣使子木行之國人誦之太史書之天下後世不知夫子之賢而惟陋是聞子木其忍為此乎故曰是必有大不忍者而奪其情也然禮之所謂思其所樂思其所嗜此言人子追思之道也曾晢嗜羊棗而曾子不忍食父沒而不能讀父之書母沒而不能執母之器皆人子之情自然也豈待父母之命耶今薦芰之事若出於子則可自其父命則為陋爾豈可以飲食之故而成父莫大之陋乎曾子寢疾曾元難於易簀曾子曰君子之愛人也以德細人之愛人也以姑息若以栁子之言為然是曾元為孝而童子順禮之末易簀於病革之中為不仁之甚也中行偃死視不可含范宣子盥而撫之曰事吳敢不如事主猶視欒懷子曰主或終所不嗣事於齊者有如河乃瞑嗚呼范宣子知事吳為忠於主而不知報齊以成夫子憂國之美其為忠則大矣古人以愛惡比之美疢藥石曰石猶生我疢之美者其毒滋多由是觀之栁子之愛屈到是疢之美子木之違父命為藥石也哉子西潁濱曰或問子西孔子曰彼哉彼哉鄭公孫夏無足言者蓋非所問也楚令尹子西相昭王楚以復國而孔子非之何也昭王欲用孔子子西知孔子之賢而疑其不利楚國使聖人之功不見於世所以深疾之也世之不知孔子者衆矣孔子未嘗疾之疾其知我而疑我耳葉公潁濱曰孔子曰知及之仁不能守之雖得之必失之知及之仁能守之不莊以涖之則民不敬知及之仁能守之莊以涖之動之不以禮未善也春秋之末諸侯之士知者多矣而未見其仁也葉公子高於白公之未亂也知其不可近及其既亂也舉兵而入罪人斯得而楚國以定可以言知矣使葉公因惠王之復而身為令尹以行楚國之政楚豈有間言者哉然葉公追念子西子期之功以其子為令尹司馬而身老於葉有存國之勞而不享存國之利於是可以言仁矣昔孔子去衛盤桓陳蔡之間六年陳蔡之君無足取意在楚葉耳當是之時葉公未有白公之功也而孔子知其仁可謂明矣然葉公終不能用孔子使聖人之效不見於當世豈仁雖能守而未暇由禮歟傳曰葉公好龍室屋雕文無非龍者天龍下之懼而還走喪其魂魄此言蓋謂孔子非謂龍也昔楚昭王將用孔子矣令尹子西知孔子聖人畏其害楚而沮之或問子西於孔子孔子曰彼哉彼哉夫諸侯大夫不知孔子者衆矣孔子未嘗疾之子西知孔子矣而獨以為害楚疑之此其罪甚於不知故孔子深疾之歟讓國東坡曰遜國盛德之事也然非其人鮮不為亂宋宣公捨與夷而立穆公亂者三世隱桓之相賊子噲之失國皆存其實而取其名名實存亂之所由起也泰伯斷髮文身示不可用使民無得而稱之名實俱亡亂何自生哉非孔子孰能知其為至德乎潁濱曰泰伯以國授王季逃之荆蠻天下知文武之賢而不知泰伯之德所以成之者遠矣故曰泰伯其可謂至德也三以天下讓民無得而稱焉子瞻曰太伯斷髮文身示不可用使民無得而稱有讓國之實而無其名故亂不作彼宋宣魯隱皆存其實而取其名者也是以宋魯皆被禍豫以為不然人患不誠誠無爭心茍非豺狼孰不順之魯之禍始於攝宋之禍成於好戰此非讓之過也漢東海王禮以天下授顯宗唐宋王成器以天下授𤣥宗兄弟終身無間言焉豈亦斷髮文身乎子貢曰泰伯端委以治吳仲雍繼之斷法文身孰謂泰伯斷髮文身示不可用歟太史公以意言之耳季札讓國蕭定曰昔者有吳之興也泰伯讓以得之有吳之衰也季子讓以失之為讓之情同而興衰之體異者何哉夫泰伯之讓讓以賢也故周有天下而吳建國焉季子之讓賢以讓也當周德之衰而吳喪邦焉或曰非所讓而讓之使宗祀泯絶而不血食豈曰能賢斯可謂知存而不知亡者矣夫治亂時也興亡運也故至至而不可卻終終而不可留黃河既濁阿膠無以正其色鹽池斯鹹弊箄不能匡其味與夫當濁亂之世召力勝之戎讓與爭孰賢乎易曰知幾其神則季子之見可謂知幾矣季子之明可謂知進退存亡而不失其正矣至於聽樂辨列國之興亡審賢知世數之存沒挂劒示不言之信避國保無欲之貞故有吳之祀寂寥而延陵之饗如在𤣥風可想至德興歎美之辭哲人其萎表墓著嗚呼之篆向微德仁兩至則夫子不復歎焉詳其精義被物鈎深致逺之㫖烏可究其津涯而窺其牆仞哉是知讓之為德在於生靈不獨其子孫明矣獨孤及曰季子三以吳國讓而春秋褒之余徴其前聞於舊史氏竊謂廢先君之命非孝附子臧之義非公執禮全節使國篡君弒非仁出能觀變入不討亂非智左丘明太史公書而無譏余有惑焉夫國之大經實在擇嗣王者慎德之不建故以賢則廢年以義則廢卜以君命則廢禮是以泰伯之奔勾吳也蓋避季歷季歷以先王所屬故纂服嗣位而不私泰伯知公器有歸亦斷髮文身而無怨及武王繼統受命作周不以配天之業讓伯邑考官天下也彼諸樊無季歷之賢王僚無武王之聖而季子為泰伯之讓是徇名也豈曰至德且使爭端興於上替禍機作於內室遂錯命於子光覆師於夫差陵夷不返二代而吳滅以季子之閎達博物慕義無窮向使當夀夢之眷命接餘昧之絶統必能光啓周道以霸荆蠻則大業用康多難不作闔閭安得謀於窟室專諸何所施其匕首嗚呼全身不顧其業專讓不奪其志所去者忠所存者節善自牧矣謂先君何與其觀變周樂慮危戚鐘曷若以蕭牆為心社稷是恤復命哭墓哀死事生孰與先釁而動治其未亂棄室以表義挂劒以明信孰與奉君父之命慰神祗之心則獨守純白不義于嗣是潔已而遺國也國之覆亡君實階禍且曰非我生亂其孰生之哉其孰生之哉潁濱曰春秋之際世不知義而以權利為貴至齊桓晉文皆知爭國成名者也如子臧之於曹季子之於吳皆有可取之義又棄而不顧而况於爭乎豫高二子之義又欲考其行事而子臧反國而致事事不復見季子事吳九十餘年觀其挂劒於墓不以死背其心葬子嬴博不以恩纍其志引兵避楚不以名害其德蓋其所以養心者至矣雖祿之以天下將有所不受而況於吳乎彼其所養者誠重也東坡贊論曰魯襄公十二年吳子夀夢卒延州來季子其少子也以讓國聞于諸侯則非童子矣至哀公十年冬楚子期伐陳季子救陳謂子期曰二君不務德而力爭諸侯民何罪焉我請退以為子名務德而安民乃還時去夀夢卒蓋七十七年矣而能千里將兵季子何夀而康也然其卒不書于春秋哀公之元年吳王夫差敗越于夫椒勾踐使大夫種因太宰嚭以行成于吳吳王許之子胥諫不聽則吳之亡形成矣季子觀樂於魯知列國廢興于百年之前方其救陳也去吳之亡十三年已而謂之季子不知可乎闔閭之自立也曰季子雖至不吾廢也是季子之德信于吳人而言行于其國也且帥師救陳不戰而去之以為敵國名則季子之於吳蓋亦少專矣救陳之明年而子胥死季子知國之必亡而終無一言于夫差知言之無益也夫子胥以闔閭霸而夫差殺之如皂𨽻豈獨難於季子乎嗚呼悲夫吾以是知夫差之不道致使季子不敢言也蘇子曰延州來季子張子房皆不死者也江左諸子好談子房季子之賢有以也夫此可與知者論難與俗人言也作延州來季子贊曰泰伯之德鍾于先生棄國如遺委蛻而行坐閲春秋幾三之二古之真人齊一作有化無死歷代名賢確論卷二十一
