body:
  text: 歷代名賢確論卷七十六𤣥宗二姚崇宋璟范祖禹皮溫公子由日休孫之翰盧懷慎溫公孫之翰張說范祖禹源乾曜范祖禹張九齡唐子西吕溫孫之翰東坡周子諒范祖禹柳子厚張唐英鄭􅀈陸象先張唐英姚崇宋璟范祖禹論崇奏序進官吏帝仰視屋不顧曰人君勞於求賢逸於任人古者疇咨僉諧然後用之茍得其人則任而勿疑乃可以責成功明皇既相姚崇而委任之如此其能致開元之治不亦宜哉又論姚崇對帝刺史縣令不可遍擇曰姚崇之辨雖能折議者之言然亦未為得也夫天子者擇一相而任之一相者擇十使而使之十使者擇刺史縣令而置之賢者舉之不肖者去之則君不勞而天下治矣故有一相則有十使矣有十使則有刺史縣令矣何患乎不得其人哉任相者天子之事也選使者相之職也察吏者使之責也郡縣之廣守令之衆焉得人人而擇之茍相得其人則委之擇大吏而已矣吏非其人則是相之不才也退之而已矣崇不論此乃以為刺史縣令不可遍擇豈宰相之體乎司馬溫公論薛謙元獻鼎銘崇表賀曰日蝕不驗太史之過也而君臣相賀是誣天也采偶然之文以為符命小臣之諂也而宰相因而實之是侮其君也上誣於天下侮於君以明皇之明姚崇之賢猶不免於是豈不惜哉范祖禹論遣薛訥擊契丹曰姚崇等以其君討契丹為是邪當成之為非邪當爭之不可微諫而止也明皇既不聽諫又益甚之遂相薛訥而使之將兵崇等乃不敢言則是人君可以威脅羣臣而遂其非也然則君有大過將何以止之夫人臣諫而不聽則當去位茍不能彊諫而視其君之過舉至於天下咸怨其臣則曰非我不諫君不能用我也始則擇利以處其身終則引謗以歸於君此不忠之大者也使君驕其臣而輕於用武天下不勝其弊崇之罪也夫孫之翰論相姚崇曰天子任輔臣非知其才諒其忠推誠待之何以責成功輔臣荷天子之知非素藴䇿畫通逹時務盡節行之何以稱大用明皇之任相姚崇之事君得其道矣初明皇以崇可相將召之張說輩讒言交譖一不能動遂以大柄付之崇亦荷其信任之意力救時弊行之不疑數十年紛亂之政旬日而變紀綱法度卓然振起非君臣相待之誠至深至悉何以及此然為姚崇則易為明皇則難自中宗復位承武后暴政之餘且為韋庶人所制用姦貪去忠良官職無序紀綱大亂以太平暴橫不改其惡中外人心思治甚切崇有才智固能觀時事之弊知其變之之術一日當國政順人心行之不難爾明皇居藩邸已憤時弊之甚即位之始鋭意求治任崇固宜但張說有輔翼舊勳帝所親待方居左右與崇不協崇雖才過於說適在疏逺明皇不信親近而信疏逺不任說而任崇此所以為難也嗚呼人君知疏逺之臣賢而可任付以大柄推誠待之遂使盡心時政成開元治平之業後之人君觀其任賢之道得不以為法哉子由論曰唐史臣稱崇善應變以成天下之務宋璟善守文以持天下之正斯言固二人之所長也然應變者要之不失正而後可孟子有言所惡於智者為其鑿也如智者若禹之行水則無惡於智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣唐明皇豪俊之君也而姚崇復以豪俊事之方其君臣遇合天下事迎刃而解若無足為者雖然以水濟水後將有不可食者開元四年天下大蝗民祭而拜之坐視食苗而不敢捕崇奏遣御史為捕蝗使分道殺蝗羣臣多不以為然帝亦疑之而崇行之愈力蝗亦為息捕蝗雖古之遺法然遇災而懼修德以答天變古之道也崇置之不言而専以捕為事已可疑矣既而崇所親吏趙誨以賕死崇懼遂還政時帝將幸東都而太廟屋壞宰相宋璟蘇頲皆言三年之喪未終不可巡幸壞壓之變天戒也請罷東巡修德以答至譴帝以問崇崇曰此苻堅故殿也山有朽壤而崩木蠧而折理無足怪但壞與行㑹非緣行而壞也今關中無年餽餉勞弊出幸東都所以為人非為已也百司已戒供擬已具請車駕即東而遷神主太極殿更作新廟此大孝也帝用其言崇由此復相開元末帝在東都欲還長安裴耀卿等皆言農人場圃未畢須冬可還李林甫獨曰二都本東西宫耳車駕往來何用待時假令妨農獨赦所過租賦可也帝大悅即駕而西崇建東幸之計林甫建西還之議其意同爾孰謂崇獨賢乎從崇之議使人君上不畏天戒中不敬宗廟下不恤人言三者忠臣之所諱而崇居之不疑何哉其後崇璟皆沒𤣥宗愈輕蔑羣臣方任張九齡而廢太子瑛用牛仙客則聽李林甫方嬖楊國忠而縱安祿山則用輔璆琳専以適已為悅類崇有以啓之也吾謂開元之治雖出於崇天寶之亂亦崇之所自致此人臣之至戒也范祖禹論宋璟不賞郝靈荃以防黷武曰宋璟可謂賢相矣見其始而知其終沮其勝而憂其敗懲人主之好武為天下患之深也其後明皇卒以黷武至於大亂何其智之明歟其可謂賢相矣又論宋璟不與楊思勉交言曰昔申棖以欲不得為剛宋璟所以能剛其惟無欲乎明皇以此重之可謂能知賢矣皮日休曰余嘗慕宋廣平之為相貞姿徑質剛態毅狀疑其鐵腸與石心不解吐婉媚之文而有梅花賦清便富艷得南朝徐庾體殊不類其為人也後蘇相公味道得而稱之廣平之名遂振嗚呼夫廣平之才未為是賦則蘇公何暇知其人哉將廣平困於窮厄於躓然强為是文邪盧懷慎司馬溫公論懷慎每事推崇時人謂伴食宰相曰昔鮑叔之於管仲子皮之於子産皆位居其上能知其賢而下之授以國政孔子美之曹參自謂不及蕭何一遵其法無所變更漢業以成夫不肖用事為其僚者愛身保祿而從之不顧國家之安危是誠罪人也賢智用事為其僚者愚惑以亂其治専固以分其權媢嫉以毁其功愎戾以竊其名是亦罪人也崇唐之賢相懷慎與之同心戮力以濟明皇太平之政夫何罪哉秦誓曰如有一介臣斷斷猗無他技其心休休焉其如有容人之有技若已有之人之彥聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉懷慎之謂矣孫之翰論懷慎薦宋璟盧從願且謂上享國既久慮小人乘間以進二君其志之曰太宗嘗賜魏公手詔言晉何曽不忠之罪蓋謂曽窺武帝奢逸之意不能切諫但退有後言也觀盧懷慎與宋璟等所言頗似何曽之意然懷慎與曽言同而意異曽以奢侈為時所譏見主之過默而不諫此正保位爾其與子孫竊言又欲取名於後世也懷慎清儉有節性復公正非懷祿固寵之人也其主方勤政治未有深過但以髙識見其萌芽不聞切諫此亦可責能與璟等深言且力薦之是使諫正於後以此論之懷慎與曽言同而意異也夫大臣德望有素無保位懷祿之迹若觀主微過而不言能薦賢者諫正於後尚可掩過若大臣德望未著見主過而不言又不能力薦賢者使之諫正此真懷祿固寵之人雖竊一時富貴千萬世識者視之當為罪人矣張說范祖禹論張說召募壯士代宿衛曰唐制諸衛府有為兵之利而無養兵之害田不井而兵猶藏於民後世最為近古而便於國者也開元之時其法寖隳非其法不善蓋人失之也張說不究其所以而輕變之兵農既分其後卒不能復古則說之為也夫三代之法出於聖人及其末流亦未嘗無弊救之者舉其偏以補其弊而已若并其法廢之而以私意為一切茍簡之制則先王之法其存者幾何天下之務常患於議臣之好改舊章此所以多亂也源乾曜范祖禹論乾曜張說以上生日為千秋節曰太宗不以生日宴樂以為父母劬勞之日也乾曜等乃以人主生日為節又移社以就之夫節者隂陽氣至之候不可為也社者國之大祀不可移也明皇享國既久驕心寖生乾曜說不能以義正君每為諂首以逢迎之後世猶謂說等為名臣不亦異乎張九齡唐子西張曲江畫像贊序曰吾南遷至曲江其故老為吾言唐開元中平盧帥張守圭遣偏將安祿山奏事京師張文獻公見之大驚密請除之不從未幾守圭入朝祿山引兵襲契丹大敗所亡失以萬計公請以軍法誅之又不從後二十年祿山稱兵犯順公之沒蓋十六年矣明皇在蜀始悔不用公言於是遣使度嶺弔祭以舊史驗之良然吾嘗謂明皇一曰殺三庶人如刈竹葦如剖瓜瓠無毫髮顧惜而誅一祿山如拔齒然此何理也方是時唐祚將衰親疏厚薄之序一切倒置陵夷至於天寶之末人倫天理絶滅敗壞故張垍其壻也而先叛永王其子也而又叛太子起兵至靈武則又叛雖微祿山唐祚未必不衰而唐祚之衰自祿山始明皇嘗歎公沒不復聞忠言正使公存吾知其言不復用矣公平生論事至多而斯言不用尤可痛恨吾欲訪其故居而弔其墓識其子孫以求其遺風餘烈時方遷序勢有所未暇獨得其遺像流涕而贊之曰魏武言典午不可親而文帝待之坦然不疑也齊王攸言劉淵不可養而晉武寵之確然不移也莫親於父子莫愛於兄弟一有所蔽則親愛莫得而奪之況於疏逺乎然則公言之不用固其宜也噫先事而言則未信已至而悔則無及前世之敗末有不由於斯也可勝道哉可勝痛哉此吾所以見公之像愾然而嗟咨也吕溫張荆州畫贊序曰中書令始興文獻公有唐之鯁亮臣也開元二十二年𤣥宗春秋髙矣謂太平自致頗易天下綜核稍怠推納寖廣若君子小人摩肩於朝直聲遂寢邪氣始勝中興之業衰焉公於是以生人為身社稷自任抗危言而無所避秉大節而不可奪小必諫大必諍攀帝檻歷天階犯雷霆之威不霽不止日月幾蝕卻為分明虎而冠之不敢猛視羣賢倚賴天下仰息凜凜乎千載之望矣不虞天將啓幽薊之禍俾姦臣乘釁以速致戎詐成讒勝聖不能保褫我公衮置於侯服身雖逺而諫愈切道既塞而誠彌堅憂而不怨終老南國於戲功業見乎變而其變有二在否則通在泰則窮開元初天子新出艱難久憤荒政樂與羣下勵精致理於是乎有否極之變姚宋坐而乘之舉為時要動中上急天光照身宇宙在手勢若舟楫相得當洪流而鼓迅風崇朝千里不足怪也開元末天子倦於勤而安其安髙視穆清霈然大滿於是乎有泰極之變荆州起而扶之舉為時害動咈上欲日與讒黨抗行於交㦸之中勢若微陽戰隂衝密雲而吐丹氣歘耀而滅又何難乎所痛者逢一時事一聖踐其跡執其柄而有可有不可有成有不成況乎差池草茅沉落光耀者復何言哉贊曰唐有棟臣往矣其邈世傳遺像以覺後學德容恢異天骨峻擢波澄東溟日照泰嶽具瞻崇崇起敬起忠貌與神㑹凜然生風氣藴逆鱗色形匪躬當時曲直如在胸中鯤鱗初脫激海以化羊角中頽摩天而下無喜無愠亦如斯畫嗚呼為臣警爾夙夜孫之翰論九齡乞斬祿山曰人君有忌心則賢者不能立事矣軍國之務至大至衆一人之志固不能了必藉賢者謀議也賢者謀議多出衆人之見非英睿求治之君往往不諒其心或以忤意厭之或以立異惡之姦邪希㫖之臣托疑似之事從而譖毁則人君忌之矣既忌之不惟謀議難合且欲鬭一時怒氣多方沮之雖理道明白亦不從也賢者為人君所忌如此欲立事得乎九齡以髙才直道居輔相之位值明皇倦於政治厭聞讜言方且倚任李林甫姦臣謀議固無以合所奏祿山逆狀此先覺獨斷之論非常人可明其以將校敗衄請行軍法此有何難明之理況祿山素無賢名又無大功止以勇鋭可用今戰而敗衄則勇鋭亦不過人不知以何功德可贖罪也是明皇以九齡論議堅正多所違忤又聽姦邪讒間又有忌心固不從其言而沮之也噫賢者忠於國而人君忌之謀議之事雖理道明白不從其言在賢者無負於國矣但人君內倚姦臣外養大惡播遷之患歸咎何人東坡論九齡罷相曰士大夫砥礪名節正色立朝不務雷同以固祿位非獨人臣之私義乃天下國家所恃以安者也若名節一衰忠信不聞亂立隨之捷如影響西漢之末敢言者惟王章朱雲二人章死而雲廢則公卿持祿保妻子如張禹孔光之流爾故王莽以斗筲穿窬之才盜取神器如反掌唐開元之末大臣守正不回惟張九齡一人九齡既已忤㫖罷相明皇不復聞其過以致祿山之亂治亂之機可不慎哉周子諒范祖禹論杖周子諒於朝堂以彈牛仙客故曰古之殺諫臣者必亡其國明皇親為之其大亂之兆乎開元之初諫者受賞及其末也而殺之非獨於此而異也始誅韋氏抑外戚焚珠玉錦繡詆神仙禁言祥瑞豈不正哉其終也惑女寵極奢侈求長生悅禨祥以一人之身而前後相反如此由有所陷溺其心故也可不戒哉柳子厚曰天寶年有以諂諛至相位賢臣放逐公為御史抗言以白其事得死於墀下史臣書之公之死而佞者始畏公議於乎古之得其死者衆矣若公之死志匡王國氣震姦佞動獲其所斯蓋得其死者歟公之德之才洽於傳聞卒以不試而獨申其節猶能奮百代之上以為世軌第令生於定哀之間則孔子不曰未見剛者出於秦楚之間則漢祖不曰安得猛士而存不及興王之用沒不遭聖人之歎誠立志者之所悼也云云張唐英論曰柳宗元有御史周君碣曰有唐正臣周某字某以諫死葬於某所公天寶中有諂諛至相位賢臣放逐公為御史抗言以白其事得死於墀下然不言周君名字及諂諛為相者誰氏賢臣放逐者何人今以唐史質之周君必子諒也諂諛必牛仙客也賢臣必張九齡也林甫薦仙客為宰相張九齡言其不可上不悅罷九齡相位時子諒為御史白於大夫李適之曰仙客不才濫登相位公何得坐觀其事適之遽奏之上怒決配子諒於瀼州至藍田賜死以九齡所薦子諒非其人左遷荆州都督嗟乎九齡以子諒能抗言朝廷之失是不負其職而九齡為能知人爾而明皇悅邪佞之臣反以九齡所薦非其人而逐之如此則後之大臣薦臺諫官者當依阿取容喑喑如秋蟬泛泛如浮萍則無患矣何以為朝廷之耳目哉夫植而欲其茂也必時溉之溉而怒長反自伐之必衰之理也明皇之惡子諒乃自求衰之謂乎西幸之禍有所召爾鄭獬曰唐孰亂之曰林甫也曰是林甫居其成也然則其殺周子諒始乎子諒死言也張九齡直其議亦棄焉於此開元之治亂岐矣於時林甫雖相也有正人梗乎中尚闔吻而伺未能奮其爪牙也及死且棄焉則闞然始怒矣直臣噤口而喑去羣邪爭途而公進顧誰為忌憚歟嗚呼禹曰無若丹朱傲吾視舜不宜及是言也而舜無誅焉則有以發乎衆矣故朱雲逐則張禹進禹進而王氏擅與漢之亂一迹焉吾故曰其殺周子諒始乎陸象先張唐英論曰象先為益州長史司馬韋枹真諌以宜行罰象先曰理則可矣何必嚴刑以立威遷河中尹録事白以小吏合杖象先曰此人之情不甚相逺必須行杖須從汝始又曰天下本無事庸人擾之始為煩耳但靜其源何憂不簡噫可謂仁恕長者也求之古人其宓子賤之倫乎兩漢以下循吏殆不及也後世為人上者以仁愛而撫民則世謂之柔懦以教化而訓俗則世之謂迂闊至有殘其民惟恐其不酷反得幹才之譽撓其民惟恐其不煩反得治劇之名故近年趨進奔竸者惟務軋其民以進已之身故天下之民日陷網羅之苦耳不聞仁義禮樂之教目不見寬和惠慈之化謂為治之法自古皆然至有父不父子不子兄不兄弟不弟踵凶襲惡填塞牢獄刑誅殺戮嵗千萬數皆由在上者煩撓而致之噫安得國家拔卓茂於密縣顯朱邑於桐鄉又求象先輩百十人分之四方郡縣導民以德齊民以禮使其有恥且格不煩不撓至簡至易盡成循吏之治而使吾人熙熙哉夫以區區曹參而能守蓋公一言以清淨而鎮俗而公卿大夫牧民而不以象先之心為心者真衣冠而劫者乎歷代名賢確論卷七十六
