body:
  text: 歷代名賢確論卷九成王下周公待士昌黎石守道荆公周公居變東坡潁濱周公不樂東坡召公荆公周公待士昌黎曰周公之為輔相急於見賢也方一食三吐其哺方一沐三握其髮當是時天下之賢才皆已舉用姦邪讒佞欺負之徒皆已除去四海皆已無虞九夷八蠻在荒服之外者皆已賓貢天災時變昆蟲草木之妖皆已銷息天下之所謂禮樂刑政教化之具皆已修理風俗皆已敦厚動植之物風雨霜露之所霑被者皆已得宜休徵嘉瑞麟鳯龜龍之屬皆已備至而周公以聖人之才慿叔父之親其所輔理承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢于周公而已豈復有賢于時百執事者哉豈復有所計議能補于周公之化者哉然而周公求之如此其急惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得于天下之心如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺握髮為勤而止哉惟其如是故于今頌成王之德而稱周公之功不衰石守道曰周公相成王制禮作樂一飯三吐哺一沐三握髮起以待士何汲汲也如此沐與飯且不暇舜相堯禹相舜益相禹伊尹相湯傅說相髙宗皆不如周公之勤且勞也豈周公之德不及舜禹益伊尹傅說乎曰周公不得不然也堯聖人也禹聖人也湯聖人也髙宗聖人也舜禹益伊尹傅說勤且勞復何為哉周公則不得不然也成王孺子也成王方在襁褓之中知成王果聖人耶且后稷公劉古公王季文王武王積千餘年以得天下武王死成王幼弱武王以后稷公劉古公王季文王之天下及成王以託周公周公受武王之託負天下之重茍成王不似墜覆其業則是后稷公劉古公王季文王武王之天下周公失之也周公豈得不勤勞乎又何暇乎沐且飯也為周公者皆然舜禹益與伊尹傅說所相君所逢時異也孰謂周公之德不及耶荆公曰甚哉荀卿之好妄也載周公之言曰吾所執贄而見者十人還贄而相見者三十人貌執者百有餘人欲言而請畢事千有餘人是誠周公之所為則何周公之小也夫聖人為政於天下也初若無為於天下而天下卒以無所不治者其法誠修也故三代之制立庠於黨立序於遂立學於國而盡其道以為養賢教士之法是士之賢雖未及用者而固無不見尊養者矣此則周公待士之道也誠若荀卿之言則春申孟嘗之行亂世之事也豈足為周公乎且聖世之事各有其業講道習藝患日之不足豈暇於遊公卿之門哉彼遊公卿之門求公卿之禮者皆戰國之奸民而毛遂侯嬴之徒也荀卿生於亂世不能考論先王之法著之天下而惑於亂世之俗遂以為聖世之事亦若是而已亦已過矣且周公之所禮者大賢歟則周公豈唯執贄見之而已固當薦之天子而共天位也如其不賢不足與共天位則周公如何其與之為禮也子産聽鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政蓋君子之為政立善法于天下則天下治立善法於一國則一國治如其不能立法而欲人人悅之則日亦不足矣使周公知為政則宜立學校之法于天下矣不知立學校而徒能勞身以待天下之士則不惟力有所不足而勢亦有所不得周公亦可謂愚也又曰仰祿之士猶可驕正身之士不可驕也夫君子之不驕雖暗室不敢自慢豈為其人之仰祿而可以驕乎嗚呼所謂君子者貴其能不易乎世也荀卿生於亂世而遂以亂世之事量聖人後世之士尊荀卿以為大儒而繼孟子者吾不之信矣周公居變東坡曰論周公者多異說何也周公居禮之變而處聖人之不幸宜乎說者之異也凡周公之所為亦不得已而已矣若得已而不已則周公安得而為之成王幼不能為政周公執其權以王命賞罰天下是周公不得已者如此而已今儒者曰周公踐天子之位稱王而朝諸侯則是豈不可以已耶書曰周公位冡宰正百工羣叔流言又曰召公為保周公為師相成王為左右召公不說又曰周公曰王若曰王則是周公未嘗踐天子之位而稱王也周公稱王則成王宜何稱將亦稱王耶將不稱耶不稱即是廢也稱王則是二王也而周公何以安之孔子曰必也正名乎儒者之患患在于名實之不正故亦有以文王為稱王者是聖人為後世之僭君急於為王者耶天下雖亂有王者在而已自王雖聖人不能以服天下昔髙帝擊滅項籍統一四海諸侯大臣相率而帝之然且辭以不德惟陳勝吳廣乃囂囂乎急于自王而謂文王亦為之耶武王伐商師渡孟津㑹于牧野其所以稱先君之命命於諸侯者蓋猶曰文考而已至于武成既以柴望告天百工奔走受命于周而後其稱曰我文考文王克成厥勳由此觀之則是武王不敢一日妄尊其先君而况於文王自王乎詩曰虞芮質厥成文王蹶厥生是亦追稱而已矣史記曰嫗乎采芑歸乎田成子夫田常之時安知其為成子而稱之故凡以文王周公為稱王者皆過也是資後世之篡君而為之藉也陳賈問於孟子曰周公使管蔡監商管蔡以商叛知而使之是不仁不知而使之是不智孟子曰周公弟也管叔兄也周公之過不亦宜乎從孟子之說則是周公未免於有過也夫管蔡之叛非逆也是其智不足以深知周公而已矣周公之誅非疾之也其勢不得不誅也故管蔡非所謂大惡也兄弟之親而非有大惡則其道不得不封管蔡之封武王之世也武王之世未知有周公成王之事則管蔡何從而叛周公何從而誅之故曰周公居禮之變而處聖人之不幸也又曰伊尹既立太甲而放諸桐天下不以為不義武王既沒成王幼周公攝天子之位朝諸侯於明堂而召公不說管叔蔡叔咸叛天下幾至於不可救二者其故何也太甲既立矣而不足以治天下則夫伊尹猶有辭于後世也蓋周公之事無以異于伊尹然天下皆疑而不信無足怪也何者天下未知夫成王之不明而周公攝則是周公未有信服天下之心而强攝焉以為之上也且夫伊尹之攝其事有不得已而然耳太甲雖變伊尹不敢有所立以召天下之亂故以已攝焉而待夫太甲之自悔是以天下無疑乎其心今夫周公之際其勢未至于不得已者使成王拱手以居天下之上而周公為佐以成王名號而輔之此所謂其勢之未至於不得已者矣而周公不居則天下之謗是周公之所自取也然愚以為不然挾天子以令天下此諸葛孔明之事爾而周公豈不足以知之蓋人臣惟無執天子之權人臣而執天子之權則必有忠于其心然後可以自免於難何者人臣而用天子之事此天子所忌也以一人之身上為天子所忌而下為左右之大臣從而媒蘖其隙此古之忠臣所以盡心而不免於禍而世之姦雄之士所以動其無君之心而不顧者也使成王用事於天下而周公制其豫奪之柄則愚恐成王有所不平於其心而管蔡之徒乘其隙而間之以至於亂也使成王有天子之虛名而不得制天下之政則愚以周公有所不忍於其志赧然有所不安之心也是以寧取而攝之使成王無與乎其間以破天下詐慝之謀而絶其爭權之心是以其後雖有管蔡之憂而天下不搖使其當時列於羣臣之間方其疑惑擾攘而未决也則恐周公之禍非居東之所能免而管蔡得志於天下成王將遂不立也嗚呼其思之深矣故曰周公居禮之變而處聖人之不幸也潁濱曰世俗之說曰舜囚堯不得其死禹逐舜終蒼梧之野周公將篡成王二叔譏之乃免於亂彼小人之情度君子之心亦何所不至哉今夫聖人雖與世同處而其中浩然與天地同量彼其食粟衣帛蓋有不得已爾而况與人爭利哉諸葛孔明受託昭烈以相孺子雖使取而代之蜀人安焉然君臣之義沒身不替孔明尚然而况於聖人乎彼小人何足以知之周公不樂東坡曰每讀詩至鴟梟讀書至君奭常竊悲周公之不遇及觀史見孔子厄於陳蔡之間而弦歌之聲不絶顔淵仲由之徒相與答問夫子曰匪兕匪虎率彼曠野吾道非耶吾何為於此顔淵曰夫子之道至大故天下莫能容雖然不容何病不容然後見君子夫子油然而笑曰回使爾多材吾為爾宰夫天下雖不能容而其徒自足以相樂如此今乃知周公之富貴反不如夫子之貧賤夫以召公之賢管蔡之親而不知其心則周公誰與樂其富貴而夫子之所與共貧賤者皆天下之賢材則亦足為樂乎此矣召公荆公曰漢之諸儒皆以為周公攝政而召公不悅以孔氏古文考之則召公之不悅也周公既歸政矣然召公之不悅何也曰成王可與為善可與為惡者也周公既復辟成王既即位蓋公懼王之不能終而廢先王之業也是以不悅焉夫周之先王非聖人則仁人也積德纍行數世而後受命以周公繼之纍年而後太平民之習治也久矣成王以中才承其後則其不得罪於天下之民而無負于先王之烈也不亦難乎如此則責任之臣不得不以為憂也周公曰君惟乃知民德罔不能厥初惟其終然則召公之不悅亦周公之心也周公以為在天者其命之終吉凶吾不得而知也在人者後嗣或不修德墜厥命則吾亦不得而知也在我者吾知勉之而已則天不庸釋于文王受命也且以古之人君至於文武所以能保其天下國家者亦皆有賢人為佐我自今乃相與濟成王同未在位之時則可以無大責矣夫在我者君子之所及而當勉者也在天與人者吾如彼何哉故周公之告也亦竭其心盡其力而已所以勉且慰之也曰如周公之誥則召公可以無不恱矣然則召公之所以不及周公儻在是乎曰憂其可憂疑其可疑召公之所以不恱也憂其可憂而卒之以不憂疑其可疑而卒之以不疑周公之所以誥也五聲之相得也五味之相入也其始不同而卒于和也聖賢之相揆也亦若是而已矣以此謂召公為不及周公則吾于征苗以伯翳為賢於禹也其可乎然則召公固無不恱周公之事乎曰自堯舜沒至于周而賢人為衆詩曰肅肅兔罝椓之丁丁赳赳武夫公侯干城言兔罝之人猶足以干城乎公侯也又曰肆成人有德小子有造古之人無斁譽髦斯士言其為士者亦皆有德之髦也當此之時而召公為公則其為賢亦逺矣以召公為不足以知周公也則凡在周之士大夫宜無一人知周公者矣然則周公孰與之謀而就事乎且以召公為不賢而不足以知周公也則文武周公曷為任之至於此極而召公又安能以其令名終也以召公為賢而不悅乎周公則其與之共事而不爭又不去焉何也夫聖人之所立賢人有所不能知者矣顔子曰既竭吾才如有所立卓爾雖欲從之末由也已顔子之於孔子有所不能知者也雖然未嘗不心恱而誠服之也此其所以為賢人也如賢人之於聖人既不足以知之而又不能悅也則是聖與賢幾異類而相反也或曰子路之于孔子嘗不悅也曰由之鄙人也何足以語召公也哉孔子曰由也千乘之國可使治其賦也文武周公之使人猶孔子也文武周公所以為三公與孔子所使治千乘之賦者其智之不同亦可知已然則成王之疑周公也召公曷為不諫曰召公坐而論道以相成王者也其朝夕所以開王心者史能悉記之乎歷代名賢確論卷九
