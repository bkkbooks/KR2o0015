body:
  text: 歷代名賢確論卷九十九髙祖髙祖篡唐范祖禹梁統六一通論梁之失溫公莊宗郭崇韜子由何去非通論唐之興亡溫公髙祖李彥珣同張從賔謀反既克髙祖赦之又以赦令已行不治殺母之罪溫公通論晉之興亡溫公髙祖髙祖之政溫公通論漢之興亡溫公世宗立監采銅鑄錢銷佛像溫公王朴少遊通論周之興亡溫公髙祖篡唐范祖禹論曰孟子曰不仁而得國者有之矣不仁而得天下者未之有也三代以後蓋有不仁而得天下者焉朱全忠之篡唐以悖逆取之以暴虐守之雖為天子數年而不免其身子孫殄戮靡有遺類是以一族易一身之富貴也五代之際起匹夫而為天子或五六年或三四年或一二年皆宗族夷滅世絶不祀亂臣賊子曽莫懲也書曰惠迪吉從逆凶惟影響豈不信哉又論與羅紹威誅牙軍曰昔商民化紂之惡周公遷於洛邑既歷三紀而其風未殄以纍聖人之治猶如此甚矣汙俗之難變也自天寶以後燕趙魏不為唐有其人安於悖逆不復知有君臣聲教之所不及政刑之所不加歷十五世然後殱夷殄滅靡有遺類而其俗猶不改也其後梁之亡也始於魏莊宗之亡也亦始於魏其得之也以魏其失之也以魏由其習亂之久故易動也而燕人至于晉民遂淪於左衽豈非諸夏之禮其亡有漸乎趙居二寇之間或逆或順不若燕魏之甚也故其禍有淺深論者或謂紹威誅牙軍以弱魏而全忠無後顧之慮因以篡唐夫唐與魏離亦久矣牙兵適足亂魏以拒朝廷而已其能為唐室輕重豈其然乎梁統六一論曰黜梁為偽者其説有三一曰後唐之為唐猶後漢之為漢梁蓋新比也一曰梁雖改元即位而唐之正朔在李氏而不絶是梁於唐未能絶而李氏復興一曰因後唐而不改因後唐者是謂因人之論固已辨矣其二者宜有説也夫後唐之自為唐也緣其賜姓而已唐之時賜姓李者多矣或因臣子之異心或懷四夷而縻之忠臣茂貞思忠克用是也當唐之衰克用與梁並起而爭之梁以強而先得克用恥爭之不勝難忍臣敵之慙不得不借唐以自託也後之議者胡謂而從之哉其所以得為正統者以其得梁而然也使梁且不滅同光之號不過於河南則其為唐與李璟等耳夫正朔者何王者所以加天下而同之於一之號也昔周之東其政雖弱而周猶在也故仲尼以王加正而繩諸侯者幸周在也當唐之亡天祐虛名與唐俱絶尚安所寓於天下哉使幸而有忠唐之臣不忍去唐而自守雖不中於事理或可善其誠心若李氏者果忠唐而不忍棄乎况於唐亡託虛名者不獨李氏也王建稱之於蜀楊行密稱之於吳李茂貞亦稱之於岐大抵不為梁屈者皆自託於虛名也初梁祖奪昭宗於岐遂劫而東改天復四年為天祐而克用與王建怒曰唐為朱氏奪矣天祐非唐號也遂不奉之但稱天復至八年自以為非復稱天祐此可笑者安得曰正朔在李氏乎夫論者何為疑者設也堯舜三代之終始較然著乎萬世而不疑固不待論而明也後世之有天下者帝王之理或舛而始終之際不明則不可以不疑故曰由不正與不一然後正統之論興者也其德不足以道矣推其迹而論之庶幾不為無據云梁之失溫公論曰太祖始以黃巢降將秉旄宣武逞其詐力蠶食東夏地廣兵強威權日熾志欲無厭遂遷唐祚淫虐不悛禍自內興不得其死宜矣均王膏粱之子材不過人棄敬翔王彥章而用趙巖張歸霸以與莊宗為敵能無亡乎郭崇韜子由論曰國無釁而後可以伐人冒釁以伐人敵無釁則已受其災敵有釁則我與敵皆斃楚靈王殘民以逞舉思亂之民以伐吳吳不可動而棄疾攻之若攻虛邑靈王遂死於外齊湣王貪而好勝不知宋之不可攻而忘齊國之既病燕師乘之遂以失國自古冒釁以攻人其禍若此唐莊宗勇而善戰與梁人夾河相攻十戰九勝涉河取鄆不十日而克梁威震諸國五代用兵未有神速若此者也然其克敵之後幸一日之安沈湎聲色之娛宦官伶人交亂其政府庫之積罄於耳目之奉民怨兵怒國有土崩之勢而不知也一時功臣皆武夫崛起未有識安危之機者唯樞密使郭崇韜智勇兼人知其不可力言而不見聽求去而不見許中外佞幸視之側目崇韜深病之矣時方欲伐蜀崇韜欲立功為自安之計議以魏王繼岌為元帥而已為之副將兵六萬以出兵不逾時而克成都降王衍料敵制勝之才可謂盛矣然崇韜知蜀之易舉而不知唐之已亂挈其良將徑兵西行數千里雖立大功而不免讒死于蜀征蜀之兵未還而趙在禮為亂河朔明宗北征遂與在禮皆反帥兵南向克汴入洛遂無一人能禦之者向使西師不克出蜀雖未下而京師有重兵崇韜不死禍福未可知也崇韜冒險以伐人蹈齊湣之亂而以為安惜其有智而未始學也何去非論曰人謂漢高祖以布衣之微召號豪傑起定禍亂乃瓜裂天下以王勳將韓彭英布皆連城數十南面稱孤舉天下之籍而據其半及夫釋甲就封創血未乾皆相視誅滅蓋由髙祖封賞過制陷之驕逆其於功臣不能無負光武率義從之士平夷盜逆收還神器天下既定遂鑒髙祖之失第功行封爵為通侯大者不過數縣而不任以吏事是以元勳故將皆能自全李靖談兵之雄者也亦以謂光武得將將之道賢於髙祖逺甚嗟乎是皆不深求髙祖光武之事者也天下之事有所必然者雖聖智不能遷而避之髙皇以寬仁大度役天下之智力而集大業豈所謂隂忮暴忍而喜忘人之功者邪秦為無道天下髙材疾足爭起而競搏之皆有伐秦之心也彭越黥布皆以人傑操兵特起未以其身輕屬於人者也韓信挾百戰百勝之略擇主而附亦有大志故身定全齊而自王之方漢王大敗於彭城隨何不能緩頰於淮南則黥布不至及困於固陵諸侯棄約不會微張良之畫則彭越韓信不從方是時漢王不捐數千里之地以充三人者之欲而致其兵則楚不亡漢之待此三人者譬若養虎飽則不動飢則噬人由是觀之封賞過制豈得已哉欲就大業於須臾之決故也雖然大業就矣而三人者之逼天下之所共寒心也以天下之皆寒心則彼持是而安歸且髙祖亦得安枕而卧乎故疑似之釁一發而大禍集矣此其勢必至於夷滅而後定也光武痛宗社之禍收率懷漢之民投袂而起凡所攀附者多南陽故人其尤偉傑者寇鄧數人而已然較其才略徒足以供光武指顧之役非有驕桀難制若韓彭之與髙祖也天下既定封以數千之户莫不志欲盈足唯恐持保之不獲為光武者獨何隙以誅除之哉而曰光武獨得保全勳舊之術髙祖於功臣有不容之忍此不求二王所遇之不同與夫勢理有所必至者也後唐莊宗承武皇之遺業假大義挾世讎以與梁人百戰而夷之乃有天下可謂難且勞矣然有二臣焉其為韓彭者李嗣源為寇鄧者郭崇韜也嗣源居不賞之功挾震主之威得國兵之權執之而不釋也莊宗無以奪之而稍忌其逼崇韜嘗有大功於國忠而可倚而嗣源之所畏者也莊宗茍能挾所可倚而制所可忌則嗣源雖懷不自安而有顧憚非敢輒發也莊宗知其所忌而不知其所倚故崇韜以忠見疏讒嫉日擊使其營自救之計乃求將其征蜀之兵莊宗掃國中之師屬之而西崇韜雖已舉蜀捷奏才上而以讒死矣莊宗知得蜀足以資其盛強而不知崇韜之死已去嗣源之畏故鄴下之變嗣源以一旅之衆西趨洛陽如蹈無人之境其遷大器易若反掌且內有強臣窺伺間隙乃空國之師勤於逺役固已大失計矣而又去我之所倚與彼之所畏者則大禍之集可勝救哉雖得百蜀無救其失國也使崇韜之不死舉全蜀之衆因東歸之士擁繼岌檄方鎮以討君父之讎雖嗣源之強亦何以禦之蓋嗣源有韓彭之逼而不踐其禍者莊宗無髙祖之略故也崇韜有寇鄧之烈而不全其宗者莊宗無光武之明故也嗟乎人臣之禍起於操權而速禍之權莫重於制兵崇韜謀逭禍自全而方求執其兵此於抱薪救火者何異也唐之興亡溫公論曰武皇以沙陀微種奄有河東黃巢之亂有大功於唐室上源之變訟於朝廷而不能自直遂與朱氏治兵相攻糾紛不解流血成川僵尸蔽野至其晚節將衰窮居一隅僅能自保莊宗以弱齡襲位麾下諸將皆白首行陳皆武皇並轡齊驅之人乃能以恩信結其心英果折其氣莫不竭力致命頥指如意遂服真定從山東取漁陽兼魏博䇿馬渡河而朱氏失國當是之時天下莫不竭力震動諸侯陸梁踞肆者皆􅌓眙相顧莫敢保其土地王衍恃其險逺辭禮踞慢偏師西指而劒閣不守觀其行兵可謂能矣惜其志小氣近驕心易生矜功自喜禦衆無法便嬖是悅婦言是用才及三年隕身亡族悲夫明宗無取國之心而為衆所附資性寬厚克終天祿清泰於危難之中坐受神器得之非艱失之孔易負扆未安家為煨燼十年之中易姓者四禍福相尋何其速哉李彥珣同張從賔謀反既克髙祖赦之又以赦令已行不治殺母之罪溫公論曰治國者固不可無信然彥珣之惡三靈所不容晉髙祖赦其叛君之愆治其殺母之罪何損於信乎晉之興亡溫公論曰髙祖以地尊勢重迫於猜嫌親執臣子之禮以事外國賂之土地藉其兵力以取天下羽翼未成不可以髙飛國家未治不可以應敵齊王捨桑維翰之深謀信景延廣之彺䇿內政不修而外挑強鄰使流民塗野草敵騎汚宫闕生為降虜死為羇魄非不幸也髙祖之政溫公論曰漢髙祖殺幽州無辜子五百人非仁也誘張璉而誅之非信也杜重威罪大而赦之非刑也仁以合衆信以行令刑以懲姦失此三者何以守國其祚運之不延也宜哉漢之興亡溫公論曰髙祖擁精鋭之兵居形便之地屬胡騎北旋中州無主故雍容南面而天下歸之豈其材德之首出哉乃會其時之可為也夫根疏者不固基薄者易危隱帝雖有南面之號而政非巳出民不知君輕信羣小之謀欲除跋扈之臣禍不旋踵自然之勢也父子相繼四年而滅自古享國之短未有若兹也立監采銅鑄錢銷佛像溫公論曰若周世宗可謂仁矣不愛其身而愛民若周世宗可謂明矣不以無益廢有益王朴秦少遊論曰適用而不窮者天下之真材也材而不適用用而有所窮雖有髙世之名難能之行實庸人耳何有補於世耶臣讀五代史見王朴為周世宗決平邊之䇿然後知朴者天下之真材也夫用兵之要在於識序之先後而識先後之要在於知敵之難易天下之敵非大而堅則小而脆也其難易孰不知之所以不知者敵大而脆則疑於難敵小而堅則疑於易也昔漢兵圖宛光武以别將徇昆陽王邑欲攻之嚴尤以謂昆陽城小而堅宜進擊宛宛敗昆陽自服邑不聽盡鋭攻之兵以大敗邑之所以不聽尤者疑於難而已朴嘗為世宗畫平邊之䇿其言曰攻取之道從易者始當今吳易圖得吳則桂廣皆為內臣閩蜀可飛書而召之如不至則四面並進席卷而平之必矣惟并必死之寇可為後圖蓋李氏雖有江南之地二十一州為桂廣閩蜀之脊然南帶江東距海可撓者二千餘里其人易動搖輕撓亂不能持久號為大國實脆敵也劉氏雖據河東十州之地與中國為境然左有常山之險右有大河之固北有契丹之援其人剽悍強忍精勇髙氣樂鬭而輕死號為小國實堅敵也是時中國欲取之也譬如壯士操利兵於深山之中左觸虎而右遇熊不可並刺則亦先虎而後熊矣何則虎躁悍易乘熊便捷難制舉虎困則熊必畏威而逃困於熊虎將乘弊而至形勢然也故朴以大而脆者為易小而堅者為難易者宜先難者宜後則所以先吳而後并也皇朝受命四方僭偽次第削平皆如其䇿非所謂天下之真材其孰能與於此朴雖出於五代擾攘傾側之中然其器識學術雖治世士大夫與之比者寡方世宗之時外事征伐內修法度而朴至於隂陽律厯之學無所不通所定欽天厯當世莫能異而其所作樂至今用之而不可改其五䇿之意彼民與此民之心同是與天意同契天人意同則無不成之功以此推之朴之所知者蓋未可量也使遭休明之時遇不世出之主則其所就者將不止於此哉周之興亡溫公論曰太祖負震主之威挾不賞之功措身無所乘危而發雖履天下之籍而室家矣世宗以異姓之親令承大統知近世之弊起於威令不行下陵上替故髙平之役首誅樊何以振軍法遂能變弱為強因敗為功乘勝逐北至於太原歸而簡師習戰并心進取於是南割江淮西克秦鳯北開關南攻無堅城戰無強陳又以枹鼓之隙治律厯興典禮審法令修政事收賢才養百姓可謂知治安之本矣大功未成中道而天蓋太平之業天啓聖人而授之非人謀之所及也歷代名賢確論卷九十九
