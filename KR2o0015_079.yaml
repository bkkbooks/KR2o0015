body:
  text: 歷代名賢確論卷七十九玄宗五總論玄宗之政溫公道孫之翰石守東坡范祖禹總論玄宗之政溫公曰明皇之始欲為治能自刻厲儉約如晚節猶以奢敗甚哉奢靡之易以溺人也詩云靡不有初鮮克有終可不慎哉又論安祿山搜捕樂工入洛曰聖人以道德為麗仁義為樂故雖茅茨土階惡衣菲食不恥其陋惟恐奉養之過以勞民傷財明皇恃其承平不思後患殫耳目之玩窮聲技之巧自謂帝王富貴皆不我如欲使前莫能及後無以踰非徒娛已亦以誇人豈知大盜在旁已有窺窬之心卒致鑾輿播越生民塗炭乃知人君崇華靡以示人適足為大盜之招也孫之翰論袁楚客諫帝娛樂曰開元二年明皇方勤政治用才傑百度修舉內外無事實有承平之風聽政之暇頗事娛樂以人之常情觀之天子當承平之時稍自娛樂何損於事袁楚客上疏引太康之事由余之言為諫此乃賢人見逺而慮深也大抵人之情好逸而憚勞志意稍充目前無患鮮有不驕怠者驕怠不已憂患遂至此人事之常勢也況萬乘之貴為天下所奉又當內外無事恃此自樂驕怠之意必從而生姦人窺其情益求美物作奇巧以奉之心悅意快以寵其人一人寵之則姦人之徒爭為之計矣姦人得計時政必壞日復一日亂亡自至此人君好逸之常勢也故楚客一窺明皇娛樂之意以太康失道不聽五弟所述禽荒色荒甘酒嗜音峻宇雕牆之戒遂至失國秦穆崇飾宫室由余譏其勞民能改其過乃興霸業之事上疏言之以止驕逸之漸明皇雖容其言而娛樂不改其意自以大功即位方任賢才致天下無事我娛樂何害哉所以忽其言不聽蓋明皇才性英豪向在藩邸歷知民間事觀韋庶人之黨勢危社稷遂起兵討之能成大功兹乃感憤而為也及即位勵精政事委信賢才以除前日之弊然英豪之性不能純入於道見時平無事乃以娛樂為意殊不知娛樂寖久志意漸昏姦邪乘間以進自致危亂也但明皇雄材大略雖務娛樂猶倚任賢人以了國事德澤之廣入人甚深故久而致天寶之亂也若中智之主不及明皇材復不能任賢致天下無事如開元時效明皇縱樂不待久而為亂也或曰人主當天下無事之時不可自樂乎曰天下之大政務之廣堯舜致治之世尚曰兢兢業業一日二日萬幾戒慎如此後世之治望堯舜逺矣一時無事得不慎其微乎然人主聽斷之暇宴樂以節遊幸以時豈不樂乎況天下奉之意無不足何必數從禽廣聲樂使姦人窺之奉其欲之為樂也後世必法堯舜之君常保儉德恐有不能或嗜好於物不可有形或倦怠於事不可有迹外或有恩澤之臣權不可假內或有嬖寵之人言不可惑嗜好有形則小人極新美之事曲奉其欲而自有所希矣倦怠有迹則邪臣陳安逸之趣迎導其意而自有所為矣假恩澤者權則黨附必衆而擅恩威矣惑嬖寵之言則私謁大行而撓政令矣明皇在位嵗久四事皆不能慎故起天寶之亂天寶之亂原於是年矣東坡論重內輕外之弊曰豫謂古者任人無內外輕重之異故雖漢宣之急賢蕭望之得君猶更出治民然後大用非獨以歷試人材亦所以維持四方均內外之勢也唐開元天寶間重內輕外當時公卿名臣非以罪責不出守郡雖藩鎮帥守自以為不如寺監僚佐故郡縣多不得人祿山之亂河北二十四郡一朝降賊獨有一真卿而明皇初不識也此重內輕外之弊可以為鑒范祖禹論禮遇姚宋林甫曰三公坐而論道天子所與共天位治天職者也故其禮不可不尊其任不可不重自堯舜至三代尊禮輔相詩書著矣漢承秦敝崇君卑臣然猶宰相進見天子御坐為起在輿為下所以體貌大臣而風厲其節也開元初明皇勵精政治優禮故老姚宋是師天寶以後宴安驕侈倦求賢俊委政羣下彼小人者唯利是就不顧國體巧言令色以求親昵人主甘之薄於禮厚於情是以林甫得容其姦故人君不體貌大臣則賢者日退而小人日進矣石守道論任用楊李曰書云后非賢不乂又曰良臣惟聖則知人君雖有自誠之明上聖之性必由忠賢輔翼然後聖德日躋而天下長治也古言治者莫尚乎三皇言三皇者莫尚乎黃帝須得六相而後皇道成也古言治者莫尚乎五帝言五帝者莫尚乎堯舜堯須得四嶽舜須得十六相而後帝德盛也古之言治者莫尚乎三王言三王者莫尚乎禹湯文武禹必得益湯必得伊尹文王武王必得周召吕望而後王業大也三王而下言治者莫尚乎漢言漢者莫尚乎髙祖髙祖必得蕭張而後能滅暴秦而平海內也漢而下言治者莫尚乎唐言唐者莫尚乎太宗太宗必得房魏而後能革亂隋而登太平也故曰人君雖有自誠之明上聖之性必由忠賢輔翼然後聖德日躋而天下長治矣臣觀唐明皇帝為臨淄王始得劉幽求等克討韋庶人以清內難自皇太子即帝位能用崔日用郭元振等遂誅太平公主以除大懟開元初則引姚崇宋璟等為宰相乃致開元三十年太平之功業偉哉侔禹湯而齊文武矣暨天寶初姚崇宋璟既死又斥棄張九齡不用専任李林甫楊國忠於是忠良路塞君子道否姦黨並進小人得時明皇一身三處受害林甫國忠蔽其明髙力士塞其聰楊貴妃食其心大凡人所待而用者心也耳也目也聖人髙拱巖廊之上南面臨天下者以心勞乎萬機之務而計乎成敗也以明視乎九州之逺而察乎安危也以聰聽乎萬方之政而審乎治亂也今明皇心與耳目三者皆廢雖有自誠之明上聖之性又安用之哉荒色淫湎惑以喪志萬機曠廢而不知朝廷傾亂而不察天下咨怨而不恤社稷將覆而不悟祿山兵起河北陷沒而賊據東都猶未之覺干戈將及乘輿乃遽走出延秋門以避鋒刃幾何不喪身亡國由林甫國忠之啓亂也或曰髙力士弄權於外楊貴妃用事於內天寶之亂豈獨林甫國忠也對曰力士所以得弄權於外楊貴妃所以得用事於內者由林甫國忠為之也髙力士自開元初則知內侍省事已承人主恩寵是時姚宋為宰相力士小心供職而已固未敢干政事竊威權及林甫國忠為相皆由力士進達故力士得専恣矣宇文融李適之蓋嘉運韋堅楊慎矜王鉷安祿山安思順髙仙芝皆因附力士並取將相髙位専寵恣橫威福擅作而君子道消開元初武惠妃顧遇特厚以故王皇后見廢而明皇虛中宫二十年専寵惠妃及惠妃薨後庭數千人無可意者後楊貴妃進見至於期嵗禮遇才如惠妃然則明皇在開元間非惑於女色而海宇無事政令和一豈非以姚宋等朝夕左右以忠言鯁論進於君耳使君汲汲行堯舜之道明皇鋭意治本懼兹正人飲酒不敢過夕坐朝不敢差晚絲竹不敢數御苑囿不敢頻行內雖嬖寵惠妃而外不敢隳慢庶政惠妃雖受君寵而不敢輒竊君權雖有百惠妃又豈能惑明皇之心亂開元之政哉及楊貴妃入宫則林甫國忠為宰相唯以奢侈之務厭君之心佚樂之事蕩君之志積斂財貨以盈君欲崇飾臺榭以請君遊纍日不視朝無人切諫連宵奏鍾鼓無人上言倡優日戲上前婦女朋淫宫內朝政大壞皆林甫國忠為之也噫用姚宋則治用楊李則亂賢臣不可不用也姦人不可不去也崔羣嘗對憲宗曰安危在出令治亂由所任明皇用姚崇宋璟張九齡韓休李元紘杜暹則治用李林甫楊國忠則亂人皆以天寶十五年祿山自范陽起兵是治亂分時也臣以為開元二十年罷賢相張九齡専任姦臣李林甫治亂自此已分矣用人得失所係非小又穆宗嘗謂侍臣曰國家貞觀中文皇帝躬帝道治致升平及神龍之間繼有內難明皇平定興復不易而聲名最盛歷代長久何道而然宰相崔植對曰前代創業之君多起自人間知百姓疾苦初承丕業皆能勵精思理太宗文皇帝特稟上聖之姿同符堯舜之道是以貞觀一朝四海寧晏有房喬杜如晦魏鄭公王圭之屬為輔佐股肱君明臣忠事無不理聖賢相遇固宜如此明皇守文繼體常經天后艱危開元初得姚崇宋璟委之為政此二人者皆天生俊傑動必推公夙夜孜孜致君于道璟嘗手寫尚書無逸一篇為圗以獻明皇置之內殿出入觀省咸記在心每歎古人至言後代莫及故任賢戒欲心歸沖漠開元之末因無逸圗壞始以山水圗代之自後既無座右針規又信姦臣用事天寶之世稍倦于勤王道于斯缺矣陛下既虛心理道亦望以無逸為元龜開元之治天寶之亂則任賢臣與任姦邪得失安危明矣或曰人君深居九重之內朝廷千官百辟比肩而進接武而退何由辨得其賢臣而用之何由辨得其姦邪而去之對曰賢臣與姦邪逈異爾非為難辨也在人君密審而熟察其可見也昭昭矣其好直言君之短者直訐君之失者好忠謀不避死者好補時政之闕者好不從君之欲者好不徇君之私者復為當朝正人之所延譽者為左右小臣之所譖毁者為宫掖嬪后之所憎惡者此則賢臣也其好隨君之意順君之旨伺君之色候君之言探君之心徇君之欲好詭隨而從衆好循默而不言復不為朝廷正人之所延譽者為左右小臣之所引薦者為宫掖嬪后之所稱美者此則姦邪也君以此察之賢臣姦邪甚易見也明皇欲罪太子瑛鄂王瑶光王琚張九齡不奉詔李林甫曰此家事何須謀於外人明皇欲加牛仙客實封張九齡奏為不可林甫曰天子用人有何不可凡人觀之皆以為九齡賢林甫姦而明皇怒九齡不順已善林甫能承意貶九齡而相林甫此明皇之不察也傳曰失之毫釐差之千里明皇失之致海內罹毒國祚將傾豈止誤以千里也任人之際可不察與向使明皇能辨林甫之姦九齡之賢則豈有祿山犯闕之事也千載之下可為龜鑑也歷代名賢確論卷七十九
