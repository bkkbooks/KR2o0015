body:
  text: 歴代名賢確論卷五十二武帝上袁紹少游東坡子西赤壁之戰子西攻吳蜀論赤壁漢中之役東坡子由攻袁紹吳蜀何去非操征栁城劉備勸劉表襲許表不用子西操不追闗侯子西征烏桓辟田疇子西袁紹少游曰天下之禍莫大於殺士古之人欲有為於世者雖負其豪俊傑特之才據强大不可拔之勢疑若殺一士不足以為損益然而未始不亡者何邪士國之重器社稷安危之所係四海治亂之所属故師士者王友士者霸臣士者强失士者辱慢士者危殺士者亡世之論者皆以袁紹之亡係於官渡竊以為不然紹之所以亡者殺田豐耳使紹不殺田豐雖有官渡之敗未至亡也何則昔楚漢相距於京索之間髙祖奔北狼狽甚於袁紹者數矣而卒有天下項籍以百戰百勝之威非特曹公比也而竟死東城其所以然者無他士之得失而已故髙祖以為張子房韓信蕭何三者皆人傑吾能用之所以取天下項羽有一范増而不能用所以為我擒以楚漢之事言之則知紹之亡果在於田豐不在於官渡也且紹之械繫田豐也何異髙祖械繫婁敬於廣武乎髙祖圍於平城而還以二千石封敬號建信侯紹敗而還慙豐而殺之嗚呼人之量度相逺一至於此哉傳曰善敗者不亡故楚昭王軫越王勾踐皆濵於絶滅而復續紹雖敗於官渡而冀州之地南據大河北阻燕代形勢之勝尚可用也向使出豐於獄東向而事之問以計䇿卑身折節以撫傷殘之餘親執金鼓以厲奔走之氣内修農械外結英雄縱不能幷吞天下豈遽至於亡哉方紹與董卓異議横刀不應長揖而出及起兵渤海遂有四州之地連百萬之衆威震河朔名重天下不可謂非一時之傑也然殺一田豐遂至於此則天下之禍其有大於殺士者乎文若曰袁紹布衣之雄耳能聚人而不能用予竊以為知言也東坡論曹袁興亡曰魏武帝既勝烏桓曰吾所以勝者幸也前諌我者萬全之計也乃賞諌者曰後勿難言袁紹既敗于官渡曰諸人聞吾敗必相哀惟田别駕不然當幸其言之中也乃殺豐為眀主謀而忠不惟無罪乃有賞為庸主謀而忠賞固不可得而禍隨之吾乃今知孟徳本初之所以興亡者又曰竊觀善用兵者莫如曹操其破滅袁氏最為巧思請試論之袁紹以十倍之衆大敗於官渡僅以身免而操頓兵不追者何也所以緩紹而亂其國也紹歸國益驕忠賢就戮嫡庶争奪不及八年而袁氏無遺種矣向使操急之紹既未可以一舉蕩滅若懼而修政用田豐而立袁譚成敗未可知也其後北征烏桓討袁尚袁熈尚熈走遼東或勸操呼之操曰彼素畏尚等吾今急則合緩之則自相圖其勢然也遂引兵還曰吾方使公孫度斬送其首已而果然若操者可謂巧於滅國夫滅國大事也不可以速譬如小兒毁齒以漸揺撼之則齒脫而兒不知若不以漸一㧞而齒斯毁矣可以殺兒云云唐子西非孫盛評曹公哭袁紹墓曰禹見刑人於市下車而哭之況劉項受命懷王約為兄弟而紹與操少相友善同起事而紹又盟主乎雖道乖好絶至於相傾然吾以公義討之以私恩哭之不以恩掩義亦不以義廢恩是古之道也何名為失哉孫氏之論非但僻學也盖亦可謂小人矣赤壁之戰唐子西曰世之為將者雖多其兵而不知兵至三十萬難用矣前代以六十萬勝楚以四十萬勝秦惟王翦項籍二人而多多益辦者獨韓信能之自餘兵至三十萬未有得志者趙括以四十五萬敗於長平漢初合五諸侯兵五十六萬敗於彭城以三十萬困於白登王恢引三十二萬伏馬邑無功王尋王邑以百萬敗於昆陽黄巾以百萬敗於夀張苻堅以八十萬敗於合淝隋以九十萬敗於遼東其衆愈多其敗愈毒然猶有可諉者曰將不善若曹公可謂善將矣復以水軍六十萬號稱八十萬而敗於烏林是時戰艦相接故為敵人所燒大衆屯聚故疫死者㡬半此兵多為累之眀驗也以髙祖之才不過能將十萬衆則水軍六十萬當得如髙祖者六人乃能將之髙祖豈易得哉其敗者固宜攻吳蜀論赤壁漢中之役東坡曰世之所謂智者知天下之利害而審乎計之得失如斯而已矣此其為智猶有所窮唯見天下之利而為之唯其害而不為則是有時而窮焉必不能盡天下之利古之所謂大智者知天下利害得失之計而權之以人是故有所犯天下之至危而卒以成大功者此以其人權之輕敵者敗重敵者無成功何者天下未甞有百全之利也舉事而待其百全則必有所格是故知吾之所以勝人而人不知其所以勝我者天下莫能敵之昔晉荀息知虢公必不能用宫之竒齊鮑叔知魯君必不能用施伯薛公知黥布必不出於上䇿此三者皆危道也而直犯之彼不知用其所長又不知出吾之所忌是故可以冒害而就利自三代之亡天下以詐力相幷其道術政教無以相過而能者得之當漢氏之衰豪傑並起而圖天下二袁董呂爭為强暴而孫權劉備又以區區於一隅其用兵制勝固不足以敵曹氏然天下終於分裂訖魏之世而不能一盖嘗試論之魏武長於料事而不長於料人是故有所重𤼵而喪其功有所輕為而至於敗劉備有盖世之才而無應卒之機方其新破劉璋蜀人未附一日而四五驚斬之不能禁釋此時不敢取而其後遂至於不敢加兵者終其身孫權勇而有謀此不可以聲勢恐喝取也帝不用中原之長而與之爭於舟楫之間一日一夜行五百里以爭利犯此二敗以攻孫權是以喪師於赤壁以成吳之强且夫劉備可以急取而不可以緩圖方其危疑之間卷甲而趨之雖兵法之所忌可以得志孫權者可以計取而不可以勢破也而欲以荆州新附之卒乗勝而取之彼非不知其難特欲僥倖於權之不敢抗也此用之於新造之蜀乃可以逞故夫魏武重發於劉備而喪其功輕為於孫權而至於敗此不亦長於料事而不長於料人之過歟嗟夫事之利害計之得失天下之能者舉知之而不能權之以人則亦紛紛焉或勝或負爭為雄强而未見其能一也子由論賈詡劉曄曰曹公入荆州降劉琮欲順江東下以取孫氏賈詡言於公曰公昔破袁氏今收漢南威名逺聞兵勢盛矣若因舊楚之饒以饗吏士撫安百姓江東可以不勞衆而定也公不用其計以兵入吳境遂敗於赤壁夫詡之所以說曹公則李左車之所以說淮隂侯使乗破趙之勢傳檄以下燕者也方是時孫氏之據江東已三世矣國險而民附賢才為用諸葛孔眀以為可與為援而不可圖而曹公以劉琮待之欲一舉而下之難哉使公誠用詡言端坐荆州使辯士持尺書結好於吳吳知公無幷吞之心雖未即降而不以干戈相向者可必也方是時劉𤣥徳方以窮客借兵於吳吳既修好於公其勢必不助劉而𤣥徳固可蹙矣惜乎謀之不善荆州既不能守而孫劉皆奮孰謂曹公之智而不如淮隂侯哉其後公既降張魯下漢中劉曄勸公乗勝取蜀曰劉備人傑也有度而遲得蜀日淺蜀人未附也今舉漢中蜀人震駭因其震而壓之無不克也若少緩之諸葛亮善治國而為相闗張勇冠三軍而為將蜀人既定憑險守要不可犯也公不從而反天下皆惜曄計之不用夫𤣥徳之賢過於仲謀賈詡欲以文告懐仲謀而曄欲以虛聲下𤣥徳其愚智盖已逺矣彼曹公不用曄計豈非以詡言為戒也哉春秋之際楚子重伐鄭晉欒武子救之遇於繞角楚師還晉師遂侵蔡楚子以申息之師救蔡晉羣帥皆欲戰知莊子范文子韓獻子謂武子曰吾来救鄭楚師不戰吾遂至此既遷戮矣戮而不已又怒楚師戰必不克雖克不令若不克為辱已甚不如還也遂全師而歸夫兵久於外狃於一勝而輕與敵遇我怠彼奮敗常十九古之習於兵者盖知之矣攻袁紹吳蜀何去非曰昔者東漢之㣲豪傑並起而爭天下人各操其所爭之資盖二袁以勢呂布以勇而曹公以智劉備孫權各挟乎智勇之㣲而不全者也夫兵以勢舉者勢傾則潰戰以勇合者勇竭則擒唯能應之以智則常以全强而制其二者之弊是以袁吕皆失而曹公收之劉備孫權僅獲自全於區區之一隅也方二袁之起藉其世資以撼天下紹舉四州之衆南向而逼官渡術據南陽以擾江淮遂竊大號吕布驍勇轉鬭無前而爭兖州方是之時天下之視曹公疑不復振而人之所以爭附而樂赴者袁呂而已而曹公逡廵獨以其智起而應之奮盈萬之旅北摧袁紹而定燕冀合三縣之衆東擒吕布而收濟兖䠞袁術於淮左徬徨無歸遂以奔死而曹公智畫之出常若有餘而不少困彼之所謂勢與勇者一旦潰敗皆不勝支然後天下始服曹公之為無敵而以袁呂為不足恃也至於彼之任勢與力及夫各挟智勇之不全者亦皆知曹公之獨以智强而未易敵也故常内憚而共䠞之唯曹公亦自恃其智之足以鞭笞天下而服役之也故常視敵甚輕為無以虞於其東征劉備也袁紹欲躡之於其官渡之相持也孫權欲襲之於其北伐烏桓也劉備欲乗之三役者皆所以致兵招寇而窺伺間隙者所起之時也然而曹公晏然不為之深憂而易計者失於負智輕敵之已甚是以數乗危而徼倖也雖然於勢不得不起者盖劉備在所必征袁紹在所必拒又其近在於徐州之與官渡使其人之謀我而我亦將有以應之未有乎顛沛也至於烏桓之役則其輕敵速寇而茍免禍敗者固無殆於此時也夫袁紹雖非曹公之敵亦所謂一時之豪横大河之北奄四州之土南向而爭天下一旦摧敗卒以憂死而其二子孱駑不肖曹公折箠而驅之北走烏桓以茍嵗月之命雖未就梟戮亦可知其無能為矣方是之時中土未安幽冀新附而孫權劉備覘伺其後獨未得其機以𤼵之耳而操方窮其兵力逺即塞北以從事於三郡烏桓為不急之役徼倖於一决嗚呼可謂至危矣使劉表少辨事機而備之謀得逞舉荆州之衆卷甲而乗許下之虚則魏之本根撥矣曹公雖還而大河之南非復魏有矣然則操之數為此舉而蔑復顧者恃其智之足以逆制於人而易之也夫官渡徐州之役在勢有不得不應雖易之可也今提軍萬里後皆寇讎而前向勁敵且甚易之而不顧者亦已大失計矣劉備之不得舉者天所以相魏耳嗟乎人唯智之難能茍唯獲乎難能之智加審處而慎用之則無所不濟今乃恃之以易人則其與不智者何異曹公所以數蹈禍機而幸免者天實全之耳後之人無求祖乎曹公而謂天下之可易也矣又曰言兵無若孫武用兵無若韓信曹公武雖以兵為書而不甚見於其所自用韓信不自為書曹公雖為而不見於後世然而傳稱二人者之學皆出於武是以能神於用而不窮竊嘗究之武之十三篇天下之學兵者所通誦也使其皆知所以用之則天下孰不為韓曹也以韓曹未有繼於後世則凡得武之書伏而讀之者未必皆能辨於戰也武之書韓曹之術皆在焉使武之書不傳則二人者之為兵固不戾乎武之所欲言者至其所以因事設竒用而不竆者雖武之言有所未既也驅市人白徒而置之死地惟若韓信者然後能斬陳餘遏其歸師而與之死地戰惟若曹公者然後能克張繡此武之所以寓其妙固有待乎韓曹之儔也譎衆圖勝而人莫之能知既勝而復譎以語人人亦從而信之不疑此韓信曹公無窮之變詐不獨用於敵而亦自用於其軍也盖軍之所恃者將將之所恃者氣以屢勝之將持必勝之氣以臨三軍則三軍之士氣定而情安雖有大敵故常吞而勝之韓信以數萬之衆當趙之二十萬非脆敵也乃令禆將傳食曰破趙而後㑹食信䇿趙為必敗可也而曰必破而後㑹食者可豫期哉使誠有以破趙雖食而戰未為失趙之敗也然而韓信為此者以至寡而當至衆危道也故示之以必勝之氣與夫至暇之情所以寧士心而作之戰也曹公之征闗中馬超韓遂之所糾合以拒公者皆劇賊也毎賊一部至公輙有喜色賊既破諸將問其故答曰闗中長逺若賊各據險征之不一二年不可定也今其皆集可一舉而滅之是以喜耳袁紹造公於延津公使登壘而望之曰可五六百騎有頃復白騎稍多歩兵不可勝計公曰勿復白乃令解鞍縱馬待焉有頃縱兵擊之遂大破紹斬其二將夫敵多而懼者人之情也以曹公之勇而形之以懼則其下震矣故以偽喜偽安視之衆恃公之所喜與安也則畏心不生而勇亦自倍此所以勝之也故用兵之妙而獨以詐敵而又以愚吾士卒之耳目也昔者創業造邦之君盖莫盛於漢之髙皇考其平日之智勇寔無以逮其良平信越之佐然其崛起曽不累年誅秦覆楚遂奄天下而王之曹公天資機警挟漢以令天下其行兵用師決機合變當日無與其儷也然卒老於軍不能平一吳蜀此其故何也議者以其持法嚴忍諸將計畫有出於已者皆以法夷之故人舊怨無一免者此所以不濟嗟夫曹公殘刻少恩必報眦睚之怨真有之矣至若謀夫䇿士收攬聽任固亦不遺未嘗深負之也盖常自詭以帝王之志業期有以欺眩後世然稽其才畧盖亦韓信之等夷而其遇天下之變無以異於劉項之際劉備孫權皆以人豪因時乗變保據一隅而公之諸將皆非其敵至於鞭笞中原以基大業皆自公為之而老期迫矣此其為烈與漢異也操征栁城劉備勸劉表襲許表不用唐子西曰挾天子令諸侯其事始於齊桓晉文而齊桓晉文未嘗遷惠王襄王於齊晉也除難定亂興滅繼絶功效既著諸侯自服耳董卓以獻帝居長安李茂貞以昭宗幸鳳翔發號施令動以制詔為名然而天下諸侯羣起而攻之何也無尺寸之功以取信於天下而有刼主之名以負謗於諸侯則天下諸侯羣起而攻之亦固其理也使表能勤王如桓文耶雖不襲許何害其為令諸侯哉如其不然雖能襲許適足以致諸侯之師而已董卓李茂貞是也操不追闗侯唐子西曰侯為曹公所厚而終不忘其君可謂賢矣然戰國之士亦能之曹公得侯不殺厚待而用其力可謂賢矣然戰國之君亦能之至侯必欲立効以報公然後封還所賜拜書告辭而去進退去就雍容可觀殆非戰國之士矣曹公知侯必去重賞以贐其歸戒左右勿追曰彼各為其主也内能平其氣不以彼我為心外能成侯之忠不私其力於已是猶有先王之遺風焉吾嘗論曹公曰是人能為善而不能不為惡能為善是以能享國不能不為惡是以不能取天下征烏桓辟田疇唐子西曰或曰田疇辭聘於袁氏從辟於曹公門人怪之疇笑而不答何也曰難言也昔漢眀帝問於吳良曰先帝召卿不至反從驃騎遊邪良曰先帝以禮待下故臣得以禮進退驃騎以法檢下故臣為法屈爾疇之用意盖亦如此是時袁氏政寛故疇可得不至曹氏刻急故疇不敢不来来非慕義故終身不受封爵疇雖不言言在其中矣歷代名賢確論卷五十二
