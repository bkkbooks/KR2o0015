body:
  text: 歴代名賢確論卷六十四齊高帝金土同價袁皓東坡武帝武帝疾王融謀以子良易嗣君温公海陵王明帝謀繼大統侍中謝朏求出致酒遺弟瀹書曰飲此勿豫人事温公通論高帝明帝東昏侯温公梁武帝臨川王宏洛口之敗幷竊發以宏為名因免官温公湛僧智圍魏夏侯䕫引兵助之魏元慶和以城降僧智以城遜䕫温公武帝好佛李德裕賀琛啓陳四事武帝怒而詰責温公昭明太子葬其貴嬪求吉地被厭禱之譖温公通論武帝元帝温公陳文帝帝疾篤語孔奐等欲傳位弟安成王頊奐等諌止之及太子伯宗立三年頊廢伯宗而入簒是為宣帝温公後主荒淫劉禹錫東坡通論武帝文帝宣帝後主温公陳國興亡曾子固金土同價袁皓齊處士言曰齊祖受禪大宴卿士顧謂丞相曰予不肖幸有天下乃百執事羽翼小子共拯宋人之溺也然予不敢易時而侮器使不逾十載致黃金與土同價朝臣稱賀内外諠懽快喜相傳日走天下齊封父聞而慶曰宋人生矣而告鄉處士處士聞而泣曰捨虎逢狼改時而亡吾為宋人幸未死果塗炭於齊矣新主之言豈成聖人之道耶君王知黃金貴於土不知百姓視土貴於黃金吾聞古者土地之封在於民全而國殷土有林木民得而取土有醎滷民得而煑土有禾黍民得盈庾金玉在山桑麻在原聖人不禁無私無官死者有土生者有田聖人樂而百姓同百姓憂而聖人然秦傳亂國之疾百姓之苦莫痊漢壤既廣百姓饒矣土地之利百姓莫得而窺之金玉在山醎滷在田取塊土者犯禁而死生無土而何以田殁無土而及乎泉生則税蠹而郡蠹邑剋而吏嚙吾視宋人之貧久矣未見宋人有寸土者君王茍欲致民於生地不若薄民之賦貽民之利知百姓貴土於黃金則其民受福於齊矣封父謝曰吾將聞執政者可乎處士曰否是欲急挈吾於禍矣惟父勿施吾將往東坡曰齊高帝云吾當使金土同價意則善矣然物豈有此理者哉孟子曰物之不齊物之情也巨屨與小屨同價人豈為之哉而孟子亦自忘其言為菽粟如水火之論金之不可使賤如土猶土不可使貴如金也武帝疾王融謀以子良易嗣君温公曰孔子稱鄙夫不可與事君未得之患得之既得之患失之茍患失之無所不至王融乘危徼倖謀易嗣君子良當時賢王雖素以忠清自居不免憂死迹其所以然正由融速求富貴而已輕躁之士烏可近哉明帝謀繼大統侍中謝朏求出致酒遺弟瀹書曰飲此勿豫人事溫公曰衣人之衣者懐人之憂食人之食者死人之事二謝兄弟比肩貴近安享榮禄危不豫知為臣如此可謂忠乎高帝明帝東昏侯温公南齊論曰高帝以功名之盛不容於昏暴之朝逆取而順守之亦一時之良主也明帝自以得於不義猜忌高武子孫誅夷殆盡深戒東昏以先事制人而大臣疑懼禍變相尋卒亡其國夫不務全德而殺人以自安自古以來未有能濟者也臨川王宏洛口之敗并竊發以宏為名因免官温公曰宏為將則覆三軍為臣則涉大逆高祖貸其死罪可矣數旬之間遷為三公於兄弟之恩誠厚矣王者之法果安在哉湛僧智圍魏夏侯䕫引兵助之魏元慶和以城降僧智以城遜䕫温公曰湛僧智可謂君子矣忘其積時攻戰之勞以授一朝新至之將知人之賢不掩人之長功成不取以濟國事忠且無私可謂君子矣武帝好佛李德裕曰世人疑梁武建佛刹三百餘所而國破家亡殘禍甚酷以為釋氏之力不能拯其顛危余以為不然也釋氏有六波羅密檀波羅密是其一也又曰難捨能捨大者頭目支體其次國城妻子此所謂難捨也余嘗深求此理本戒其不貪能自不戒哉是以詭誕之士竒邪之術君子遠之武帝元帝温公曰武帝當齊之季任居方面危不自安乘時奮起以除昏主而成大業及享國日久普通大通之際遭魏氏衰微王公牧守襁屬而歸之戎車北征至於洛汭觀其勤身約已好尚文雅拊循士大夫亦可謂恭儉寛厚之君矣然以萬乘之主為桑門之行屈身傾國以奉浮屠恩勝於威紀綱不立信佞臣之謀貪河南之地棄與國寵叛人遂使臺城覆没老而餒死江淮以南鞠為荆棘其智未足稱也夫德澤不能及而享其大利聖人禍之譬如悦盗賊之財而延之入室財不可得而喪其所有必矣其子孫各擁强兵列居重鎮不救君父之危而窺間乘便更相屠滅元帝於兄弟之中殘忍尤甚是以雖翦兇渠而克復故業旋踵之間身為俘馘豈特人心之不與哉亦天地之所誅也帝疾篤語孔奐等欲傳位弟安成王頊奐等諫止之及太子伯宗立三年頊廢伯宗而入簒是為宣帝温公曰夫臣之事君宜將順其美匡救其惡孔奐在陳處腹心之重任決社稷之大計茍以世祖之言為不誠當如竇嬰面辨袁盎廷爭防微杜漸以絶覬覦之心以為誠邪則當請明下詔書宣告中外使世祖有宋宣之美高宗無楚靈之思不然謂太子嫡嗣不可動搖欲保輔而安全之則當盡忠竭節以死繼之如晉之荀息趙之肥義奈何於君之存則逆探其情而求合焉及其既没則權臣移國而不能救嗣王失位而不能死乃姦諛之尤者而世祖謂之遺直託以六尺之孤豈不悖哉荒淫劉禹錫臺城詩曰臺城六代競豪華結綺臨春事最奢萬戶千門成野草只縁一曲後庭花東坡論陳隋好樂而亡曰吹笛彈琵琶五弦及歌舞二技自文襄以來好之河清以後尤甚後主惟賞邉方樂耽愛無已於是繁手淫聲爭新哀怨故曹妙逹安馬駒之徒至有封王開府者遂服簮纓而為伶人之事後主亦能自度曲親執樂器玩好無倦倚絃而歌别採新聲為無愁曲音韻窈窕極於哀思挾侍兒閹官輩齊唱和之曲終樂闋莫不隕涕行幸道路或時馬上作之樂往哀來竟以亡國餘見隋煬帝門武帝文帝宣帝後主温公曰武帝與王僧辨同事梁室誅夷侯景乘時伺隙以詐力取國然率羸弊之衆當强齊乘勝之勢卒成大功奄有江南斯亦難矣文帝恭勤政事足為良主孝宣值齊之衰而啓土逢周之興而喪師豈非不恃内而恃外耶以陳國區區不能居天下五分之一慄慄危懼不能保其社稷况後主荒淫無度以趣之納身眢井不亦宜乎陳國興亡曾子固陳書序曰陳之為陳蓋偷為一切之計非有先王經紀禮義風化之美制治之法可章示後世然而兼權尚計明於任使恭儉愛人則其始之所以興惑於邪臣溺於嬖妾忘患縱欲則其終之所以亡興亡之端莫非自已致者至於有所因造以為號令威刑職官州郡之制雖其事已淺然亦各施於一時皆學者之不可不考也而當時之士爭奪詐偽茍得偷合之徒尚不得不列以為世戒而况於壊亂之中倉皇之際士之安貧樂義取舍去就不為患禍勢利動其心者亦不絶於其間若此人者可謂篤於善矣蓋古人之所思見而不可得風雨之詩所為作者也安可使之泯泯不少槩見於天下哉則陳之史其可廢乎歴代名賢確論卷六十四
