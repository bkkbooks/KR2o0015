body:
  text: 歷代名賢確論卷六文王西伯受命稱王梁肅六一孫明復西伯獻地請紂去炮烙刑溫公文王之囿潁濱文王之兵杜牧西伯受命稱王梁肅曰太史公曰詩人道西伯以受命之年稱王而斷虞芮之訟遂追王大王王季改正朔易服色十年而崩或謂大雅序文王受命作周泰誓序十有一年武王伐殷妄徴二經以實其説豫以為反經非聖不可以訓莫此為甚焉嘗試言之夫惟聖人無作作則為萬代法仲尼美文王之德曰三分天下有其二以服事殷又曰內文明而外柔順以蒙大難文王以之未有南面稱王而謂之服事易姓創制而謂之柔順仲尼稱武王之烈曰湯武革命又曰武王末受命未有父受之而子後革命父為天子云末受當武王之會盟津也告諸侯曰汝未知天命未可以誓師也曰惟九年大統未集豫小子其承厥志孰有王者出征復俟天命大統既改而復云未集禮大傳稱牧之野既事而退遂柴於上帝追王大王王季文王改正朔殊徽號若虞芮之歲稱王則不應復云追王王制既行則不應復云改物是皆反經者也夫大者天地其次君臣聖人知定位之不可易也故制為上下之禮財成天地之道使各當其分而不相間若億兆之去留天命之與奪則存乎其時聖人順而行之故謳歌所歸而舜禹揖讓桀紂惡盈則湯武放伐所謂後天而奉天時不得已而為之者也若殷道未絶紂凶未極而遂稱王以令天下則不可謂至德也已此其非聖者也豫以為大雅作周之義蓋取夫積德纍仁為海內所歸後武王因之遂成大業非所謂革命易姓為作周也泰誓紀年蓋武王周公追考前文陳王業之盛自虞芮始故斷為受命之歲仲尼憲章文武故因而敘之曰十有一年武王伐殷非所謂自稱王而為之數也文王既歿經義斯在如曰不然以俟君子六一曰書稱商始咎周以乘黎乘黎西伯也西伯以征伐諸侯為職事其伐黎而勝也商人已疑其難制而患之使西伯赫然見其不臣之狀與商並立而稱王如此十年商人反晏然不以為怪其父師老臣如祖伊微子之徒亦默然相與熟視而無一言此豈近於人情邪由是言之謂西伯受命稱王十年者妄説也以紂之雄猜暴虐嘗醢九侯而脯鄂侯西伯聞之竊歎遂執而囚之幾不免死至其叛已不臣而自王乃反優容而不問者十年此豈近於人情邪由是言之謂西伯受命稱王十年者妄説也孔子曰三分天下有其二以服事商使西伯不稱臣而稱王安能服事於商乎且謂西伯稱王者起於何説而孔子之言萬世之信也由是言之謂西伯受命稱王十年者妄説也伯夷叔齊古之知義之士也方其讓國而去顧天下莫可歸聞西伯之賢共往歸之當是時紂雖無道天子也天子在上諸侯不稱臣而稱王是僭叛之國也然二子不以為非依之久而不去至武王伐紂始以為非而棄去彼二子者始顧天下莫可歸卒依僭叛之國而不去不非其父而非其子此豈近於人情邪由是言之謂西伯受命稱王十年者妄説也書之泰誓稱十有一年説者因以謂自文王受命九年及武王居喪二年并數之耳是以西伯聽虞芮之訟謂之受命以為元年此又妄説也古者人君即位必稱元年常事爾不以為重也後世曲學之士説春秋始以改元為重事然則果常事歟固不足道也果重事歟西伯即位已改元矣中間不宜改元而又改元至武王即位宜改元而反不改元乃上冒先君之元年并其居喪稱十一年及其滅商而得天下其事大於聽訟逺矣又不改元由是言之謂西伯以受命之年為元年者妄説也後之學者知西伯生不稱王而中間不稱改元則詩書所載文武之事粲然明白而不誣矣或曰然則武王畢喪伐紂而泰誓曷謂稱十有一年對曰畢喪伐紂出於諸家之小説而泰誓六經之明文也昔者孔子遭衰周之際患衆説紛紛以惑亂當世於是退而修六經為後世法及孔子既歿去聖稍逺而衆説復興與六經相亂自漢以來莫能辨正今有卓然之士一取信乎六經則泰誓者武王之事也十有一年者武王即位之十有一年耳復何疑哉司馬遷作周本紀雖曰武王即位九年祭於文王之墓然後治兵於孟津至作伯夷列傳則又載父死不葬之説皆不可以為信是以吾無取焉取信於書可矣孫明復曰左傳吳公子季札來聘請觀於周樂見舞象簫南籥者曰美哉猶有憾説者曰憾恨也文王恨不及已致太平意以謂文王不能夷商紂於當世取天下於己有遺恨焉愚甚惑之竊謂季札之是言也非知樂者也厚誣於聖人矣若果如季子之言也則是文王懷二以事其上匿怨以伺其間包藏禍心乃亂臣賊子矣何者以文王受封商室列為諸侯紂雖無道君也安得為人之臣有無君之心哉矧紂以文王為西伯位于諸侯之上賜之弓矢斧鉞使得征伐紂之有德於文王也厚矣則文王宜乎竭力盡能夙夜匪懈以事於紂也又豈可背惠忘施以怨報德將成干紀亂常之事哉噫事必不然章章矣觀乎紂既失德毒流四海諸侯咸叛而文王事之獨無二心故孔子曰三分天下有其二以服事商周之德其可謂至德也已矣又曰下之事上也雖有庇民之大德不敢有君民之心仁之厚也有庇民之大德有事君之小心其舜禹文王周公之謂歟若文王猶有憾也則孔子何以謂之至德與仁厚者乎或曰史記齊世家敘太公之迹其後亦言西伯昌之脫羑里歸與呂尚隂謀修德以傾商政其事多兵權與竒計若文王果無憾也則何得與太公隂謀修德以傾商政其事多兵權竒計之如是哉由是觀之則季子之言又何誣也曰此蓋秦火之後簡編錯亂司馬子長修史記敘太公之迹也不能實録善事乃散取雜亂不經之説以廣其異聞爾斯固不足疑於聖人也嗚呼古稱季札賢明博達觀樂能盡知興衰而於此也何蒙暗頓惑之若是邪逮乎杜預服虔之徒復無卓識絶見以發明之斯又乖謬之甚也西伯獻地請紂去炮烙刑溫公論史載崇侯譖西伯於紂曰西伯積善纍德諸侯皆嚮之將不利於帝紂乃囚西伯於羑里西伯既出乃獻洛西之地以請紂去炮烙之刑紂許之溫公曰紂疑文王之得民故囚之既釋而又獻地以止其虐刑是正信崇侯虎之譖於紂也豈所謂遵養時晦以蒙大難者哉且紂惟不勝其淫虐之心故為炮烙之刑若能自止而不為則不待受西伯之地若不能自止雖受地於西伯而為之如故誰能禁之哉文王之囿潁濱曰齊宣王問曰文王之囿方七十里有諸孟子對曰於傳有之周雖大國未有以七十里為囿而不害於民者也意者山林藪澤與民共之而以囿名焉是以芻蕘雉者無不獲往不然七十里之囿文王之所不為也文王之兵杜牧曰大儒在位而未有不知兵者未有不能制兵而能止暴亂者未有暴亂不止而能活生人定國家者自生人以來可以屈指而數也今兵之下者莫若刺伐之法詩大雅維清奏象舞之篇曰維清緝熙文王之典迄用有成維周之禎象者象武王伐紂刺伐之法此乃文王受命受殷王專征之命也七年五伐留戰陳刺伐之法遺之武王武王用以伐紂而有天下致之清平為周家之禎祥周公居攝祀文武於清廟作此詩以歌舞文武之德其次兵之尤者莫若鈎援衝壁今之一卒之長不肯親自為之詩大雅周公皇矣美周之詩曰以爾鈎援以爾臨衝以伐崇墉臨衝間間崇墉言言此實文王伐崇墉傅于其城以臨車衝鈎援其城文王親自為之夫文王何人也周公詩之夫子刪而取之列于大雅以美武王之功德手弦而口歌之歷代名賢確論卷六
