body:
  text: 歴代名賢確論卷六十一通論元帝不得正統六一晉人君温公陶潜阮籍樂天韓愈魯直子由東坡兩晉通論晉風俗子由晉室之敗東坡愍懷之亂何去非元帝不得正統六一東晉論曰周遷而東天下遂不能一然仲尼作春秋區區於尊周而明正統之所在晉遷而東與周無異而今黜之何哉是有説焉較其德與迹而然耳周之始興其來也遠當其盛也規方天下為大小之國衆建諸侯以維王室定其名分使傳子孫而守之以為萬世之計及厲王之亂周室無君者十四年而天下諸侯不敢僥倖而窺周於此然後見周德之深而文武周公之作真聖人之業故雖天下無君而正統猶在不得而改况平王之遷國地雖蹙然周德之在人者未厭而法制之臨人者未移平王以子繼父自西而東不出王畿之内西周之地八百里東周六百里以井田之法計之通為千里之方則正統之在周也推其德與迹可以不疑夫晉之為晉與夫周之為周也異矣其德法之維天下者非有萬世之計聖人之業也直以其受魏之禪而合天下於一推較其迹可以曰正統耳自惠帝之亂晉政已亡愍懐之間晉如綫爾惟嗣君繼世推其迹曰正焉可也建興之亡晉於是絶矣周之東也以周而東晉之南也豈復以晉而南乎自愍帝死賊庭琅琊起江表位非嗣君正非繼世徒以晉之臣子有不忘晉之心發於忠義而功不就可為傷己若因而遂竊萬世大公之名其可得乎春秋之法君弑而賊不討則以為無臣子也使晉之臣子遭乎聖人適當春秋之責况欲以失國共立之君干天下之統哉夫道德不足語矣直推其迹之如何耳若乃國已滅矣以宗室子自立於一方卒不能復天下於一則晉之琅琊與夫後漢之劉備五代漢之劉崇何異備與崇未嘗為正統則東晉可知焉耳晉人君温公曰晉室既衰中原雲擾劉石慕容之輩彌漫河洛蟠據岱華宫闕蕪没陵廟隳焚元帝以宗室疎屬遁居江表天下士民有思晉者皆裹粮而歸之國於荆揚之間子孫相承不絶如綫獨明帝英武克清大憝不幸享國不永自餘孱弱孤危外陵内叛寄命於虎狼之口幾遇吞食者數矣然卒能保其位號宗廟血食百有餘年何者王導卞壼温嶠陶侃謝安謝幼度為之臣也羣賢既没使道子元顯之徒輔之敗亡不亦宜乎陶潜阮籍樂天訪陶公舊宅詩曰垢塵不汚玉靈鳯不啄羶嗚呼陶靖節生彼晉宋間心實有所守口終不能言永惟孤竹子拂衣首陽山夷齊各一身窮餓未為難先生有五男與之同饑寒腸中食不充身上衣不完連徵竟不起斯可謂真賢云云不慕樽有酒不慕琴無絃慕君遺榮利老死此丘園柴桑古村落栗里舊山川不見籬下菊但餘墟中煙每逢姓陶人使我心依然魯直彭澤思陶元亮詩曰潜魚願深𣺌淵明無由逃彭澤當此時沈㝠一世豪司馬寒如灰禮樂卯金刀嵗晩以字行更始號元亮淒其望諸葛骯髒猶漢相時無益州牧指揮用諸將平生本朝心嵗月閱江浪空餘詩句工落筆九江上向來非無人此友獨可尚屬予剛制酒無用酌杯盎欲招千載魂斯文或宜當又書淵明責子詩後曰觀淵明之詩想見其人愷悌慈祥雖戲謔可觀也俗人後謂淵明諸子皆不肖而淵明愁歎見於詩所謂癡人前不得説夢也子由和淵明詩集序曰吾於詩無所甚好獨好淵明之詩淵明所作詩不多然其詩質而實綺癯而實腴自曹劉鮑謝李杜詩人皆莫及也云云嗟夫淵明不肯為五斗米一束帶見鄉里小人而仇池出仕三十餘年為獄吏所折困終不能悛以陷大難乃欲以桑榆之末景自託於淵明其誰肯信之雖然仇池之仕其出入進退猶可考也後之君子必有以處之矣孔子曰述而不作信而好古竊比於我老彭孟子曰曽子與子思同道區區之迹葢亦未足以論士也云云東坡曰孔子不取微生高孟子不取於陵仲子惡其不情也陶淵明欲仕則仕不以求之為嫌欲隠則隠不以去之為高饑則扣門而乞食飽則雞黍以延客古今賢之貴其真也韓愈論阮籍陶潜曰吾少時讀醉鄉記私怪隠居者無所累於世而猶有是言哉豈誠㫖於味邪及讀阮籍陶潜詩然後乃知彼雖偃蹇不欲與世接然猶未能平其心或為事物是非相感發於是有託而逃焉者也若顔氏之操瓢與簞曾參歌聲若出金石彼得聖人而師之汲汲每若不可及其於外也固不暇尚何麴糵之託而昏㝠之逃邪吾又以悲醉鄉之徒不遇也晉風俗子由曰聖人之所以御物者三道一也禮二也刑三也易曰形而上者謂之道形而下者謂之器禮與刑皆器也孔子生於周末内與門弟子言外與諸侯大夫言言及於道者葢寡也非不能言謂道之不可以輕授人也葢嘗言之矣曰參乎吾道一以貫之夫道以無為體而入於羣有在仁而非仁在義而非義在禮而非禮在智而非智惟其非形器也故目不可以視而見耳不可以聽而知惟君子得之於心以之御物應變無方而不失其正則所謂時中也小人不知而竊其名與物相遇輒汩理而徇欲則所謂無忌憚也故孔子不以道語人其所以語人者必以禮禮者器也而孔子必以教人非吝之也蓋曰君子上逹小人下逹君子由禮以逹其道小人由禮以逹其器由禮以逹其道則自得而不眩由禮以逹其器則有守而不狂此孔子所以寡言道而言禮也若其下者視之以禮而不格然後待之以刑辟三者具而聖人之所以御物者盡矣三代已遠漢之儒者雖不聞道而猶能守禮故在朝廷則危言在鄉黨則危行皆不失其正至魏武始好法術而天下貴刑名魏文始慕通逹而天下賤守節相承不已而虚無放蕩之論盈於朝野何晏鄧颺導其源阮籍父子張其流而王衍兄弟卒以亂天下要其終皆以濟邪佞成淫欲惡禮法之繩其姦也故蔑棄禮法而以道自命天下之小人便之君臣奢縱於上男女淫泆於下風俗大壊至於中原為墟而不悟王導謝安江東之賢臣也王導無禮於成帝而不知懼謝安作樂於期喪而不受教則廢禮慕道之俗然矣東晉以來天下學者分為南北南方簡約得其精華北方深廣窮其枝葉至唐始以義疏通南北之異雖未聞聖人之大道而形器之説備矣上自郊廟朝廷之儀下至冠昏喪祭之法何所不取於此然以其不言道也故學者小之於是捨之而求道於㝠㝠而不可得也則至於禮樂度數之間字書形聲之際無不指以為道之極然反而察其所以施之於世者内則諂諛以求進外則聚歛以求售廢端良聚茍合杜忠信之門闢邪説之路而皆以詩書文飾其偽要之與衍無異嗚呼世無孔孟使楊墨塞路而莫之闢吾則罪人爾矣晉室之敗東坡晉論曰御天下有道休之以安動之以勞使之安居而能動逸處而能憂其君子周旋揖遜不失其節而能耕田射御以自致其力平居習為勉强而去其惰傲厲精而日堅勞苦而日彊冠冕佩玉之人而不憚執天下之大勞夫是以天下之事舉皆無足為者而天下之匹夫亦無以求勝其上何者天下之亂葢常起於上之所憚而不敢為天下之小人知其上之有所憚而不敢為則有以乘其間而攻其上之所難夫上之所難者豈非死傷戰鬭之患匹夫之所輕而士大夫之所不忍以其身試之者邪彼以死傷戰鬭之患邀我而我不能應則無怪乎天下之至於亂也故夫君子之於天下不見其所畏求使其所畏之不見是故事有所不辭而勞苦有所不憚者昔晉室之敗非天下之無君子也其君子皆有好善之心高談揖遜泊然沖虚而無慷慨感激之操大言無常不適於用而畏兵革之事天下之英雄知其所忌而竊乘之是以顛沛隕越而不能以自存且夫劉聰石勒王敦祖約此其姦詐雄武亦一世之豪也譬如山林之人生於草木之間大風烈日之所咻而雪霜饑饉之所勞苦其筋力骨節之所嘗試者亦已至矣而使王衍王導之倫清談而當其衝此譬如千金之家居於高堂之上食肉飲酒不習寒暑之勞而欲以捍禦山林之勇夫而求其成功此固姦雄之所樂攻而無難者也是以雖有賢人君子之才而無益於世雖有盡忠致命之意而不救於患難此其病起於自處太高而不習天下之辱事故富而不能勞貴而不能治葢古之君子其治天下為其甚勞而不失其高食其甚美而不棄其糲使匹夫小人不知所以用其勇而其上不失於君子至於後世為其甚勞而不知以自復而為秦之强食其甚美而無以自實而為晉之敗夫甚勞者固非所以為安而甚美者亦非所以自固此其所以喪天下之故也哉愍懷之亂何去非晉論曰天下之禍不患其有可覩之迹而發於近而患其無可窺之形而發於遲有迹之可覩雖甚愚怯必加所警備而發於近者其毒常淺無形之可窺雖甚智勇亦忽於防閑而發於遲者其毒常深昔者典干東遷之禍其起非一朝之日也探其基而積之乃在於數百嵗之淹緩國更三世而歴君者數十平居常日不見其有可窺之形是以一發而莫之能支夫非無形也葢為禍之形常隱於福為福之形常隠於禍人見其為今日之禍福而已不就其所隠而逆窺之是以於其未發皆莫覩其昭然之形此其為禍至於不可勝救之也先王之制九畿也要荒最遠雖曰四塞世告至未嘗不欲驅攘而擯外之周公朝諸侯於明堂夷蠻戎狄之君立於四門之外使悉化于備物盛禮之觀後世之君幸其衰敝而悦其向服也自内徙而親之其争肇於漢之孝宣漸於世祖而盛於魏武或空其國而罷徼塞之警或藉其兵而為寇敵之扞夫既去其侮而又役其力可謂世主之大欲國家之盛福矣不知積之既久而大禍之所伏一旦洶然而發若決防水莫之能遏晉為不幸而適當之以其平居常日不覩其昭然之形故也昔者孝宣乘武帝攘擊匈奴之威㑹五單于内争始納呼韓邪之朝元帝時請罷邊備賴侯應之策以為自孝武攘之漠北奪其陰山匈奴失所蔽隠每過陰山未嘗不哭其喪之也今罷備塞則示之大利元帝雖報謝焉自是匈奴亦浸而南顧漢亦甚悦其來而不之却也世祖因匈奴日逐之至遂建南廷以安納之稍内居之西河美稷而其諸部因遂屯守北地朔方五原代郡雲中定襄鴈門之七郡而河西之地鞠為異區加徙叛羌錯置三輔魏武復大徙武都之氐以實關畿用禦蜀寇而匈奴五部皆居汾晉而近在肘腋矣於晉之興大率中原半為荐居元海匈奴也而居晉陽石勒羯也而居上黨姚氐羌也而居扶風苻氏氐也而居臨渭慕容鮮卑也而居昌黎種族日蕃其居處飲食皆趨華美而其桀暴貪悍樂鬭喜亂之志態則亦無時而變也是以元海一倡而并雍之間乘時四起自長淮之北無復晉土而為戰國者幾二百年所謂發於遲而為毒深者也雖然彼之内徙而聴役也亦迫於制服之威而其情未嘗不懐土而思返固甚怨夫中國羈拘而賤侮之也是以劉猛發憤而反於晉事雖不濟而劉氏諸部未嘗一日而忘之也自魏而上其間非無明智之主足以察究微漸為子孫後世之慮然皆安其内附或樂用其力唯恐其不能鳩合而收役之雖有夫為禍之形皆不為之深思遠慮就其所伏而消厭之由晉而下自武帝之平一吳㑹徧撫天下固無藉乎夷狄之助矣茍於此時有能探其所伏之禍而逆制焉因其懐返之情加之恩意以導其行為之假建名號而廩資之使各以其種族而還之舊土彼將樂引輕去而唯恐其後也然後嚴斥障塞使有華夷内外之限後雖有警則無至乎發於肘腋之間而被不可勝言之禍矣雖然自非明智英果之主為子孫後世之慮則不能決於有為以救其未發之深禍彼晉武自平一吳㑹方以侈欲形於天下其能有及於此邪雖郭欽抗疏江統著論其言反復切至皆恬不為省方抱虎而熟寐爾嗟乎為天下者無恃其為平日之福而忽所隠之禍也哉歴代名賢確論卷六十一
