body:
  text: 歴代名賢確論卷十七通論諸公即位正不正東坡魯之失國潁濱魯用郊東坡魯猶三望東坡雩閔雨東坡劉蕡大夫無遂事東坡諸公即位正不正東坡曰始終受授之際春秋之所甚謹也無事而書首時事在二月而書二月在三月而書三月者例也至於公之始年雖有二月三月之書而又特書正月隱元年春王正月三月公及邾儀父盟于蔑所以掲天子之正朔而正諸侯之始也公羊傳曰縁臣民之心不可以一日無君縁始終之義一年不二君不可曠年無君故書曰元年春王正月此四者相須而不可去也定公元年書曰王三月晉人執宋仲幾于京師先儒疑焉而未得其當也嘗試論之春秋十有二公其得始終之正而備即位之禮者四文成襄哀也攝而立不得備即位之禮者一隱是也先君不以其道終而已不得備即位之禮者六桓莊閔僖宣昭是也先君不以其道終而又在外者二莊公定公也在外踰年而後至者一定公也且夫先君雖在外不以其道終而未嘗有逾年而後至者則是二百四十二年未嘗一日無君而定公元年魯之統絶者自正月至于六月而後續也正月者正其君也魯之統方絶而未續天子之正朔將誰正邪公羊曰正月者正即位也定無正月者即位後也定哀多㣲詞而何休以為昭公出奔國當絶定公不得繼體奉正嗚呼昭公絶而定公又得立是魯無君矣穀梁曰昭無正終故定無正始是桓莊閔僖宣昭皆不書正月歟丘明無傳杜預之註略而不明而公穀之說又如此故愚猶有言焉魯之失國潁濱曰魯自宣公殺其世子而自立公室遂卑三桓分有其民而竊咻之民知有大夫而不知有君襄公二十九年季武子取卞公還自楚不敢入歸而不敢問盖魯君之失國也久矣至昭公不忍其缺能収民而舉兵攻之遂以失國哀公孤弱甚于昭公又欲以越人攻之終亦出死于越嗟夫棄國五世而欲一朝収之宜其難哉昔齊晏子嘗告景公以田氏之禍公問所以救之者晏子曰唯禮可以已之在禮家施不及國而大夫不収公利景公稱善而不能用齊卒以亡語稱哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗使民戰栗孔子聞之曰成事不說遂事不諫既往不咎予嘗考之以為哀公將去三桓而不敢正言古者戮人於社其託于社者有意于誅也宰我知其意而亦以隱答焉其曰使民戰栗以誅告也孔子知其不可曰此先君之所為植根固矣不可以誅戮齊也盖亦有意於禮乎不然何咎予之深也孔子曰禮樂征伐自諸侯出十世希不失矣禮樂征伐自大夫出五世希不失矣陪臣執國命三世希不失矣自隱至昭而逐于季氏凡十世自宣至定而制于陽虎凡五世虎不逾世而敗自是三桓㣲没不復見焉魯公室雖㣲不絶遂與戰國相終始盖以臣僭君不義而得民要以力自斃君雖失衆而其實無罪久則民將哀之其勢固當然哉魯用郊東坡曰先儒之論或曰魯郊僭也春秋譏焉非也魯郊僭也而春秋之所譏者當其罪也賜魯以天子之禮樂者成王也受天子之禮樂者伯禽也春秋之譏魯郊也上則譏成王次則譏伯禽成王伯禽不見于春秋而夫子無所致其譏也無所致其譏而不譏者春秋之所以求信于天下也夫以魯而僭天子之郊其罪惡如此之著也夫子以為無所致其譏而不譏焉則其譏之者固天下之所用而信之也郊之書於春秋者其類有二書卜郊不從乃免牲者譏卜常祀而不譏郊也鼷鼠食郊牛之口傷改卜牛者譏養牲之不謹而不譏郊也書四月五月九月郊者譏郊之不時而不譏郊也非卜常祀非養牲之不謹非郊之不時則不書不書則不譏也禘于太廟者為致夫人而書也有事于太廟者為仲遂卒而書也春秋之書郊者猶此而已故曰不譏郊也郊祀者先王之大典而夫子不得見之于周也故因魯之所有天子之禮樂而記郊之變焉耳成十七年九月辛丑用郊公羊傳曰用者不宜用者也九月非所用郊也穀梁傳曰夏之始猶可以承春以秋之末承春之始盖不可矣且夫郊未有至九月者也曰用者著其不時之甚也杜預以為用郊從史文或說用然後郊者皆無取焉魯猶三望東坡曰昔之論春秋書猶之義者皆曰猶者可以已也愚以為不然春秋之所以書猶者二曰如此而猶如此者甚之之詞也公子遂如齊至黄乃復辛巳有事于太廟仲遂卒于垂壬午猶繹是也曰不如此而猶如此者幸之之詞也閏月不告朔猶朝于廟不郊猶三望是也夫子傷周道之衰禮樂文章之壞而莫或救之也故區區焉掇拾其遺亡以為其全不可得而見矣得見一二斯可矣故閏月不告朔猶朝于廟者憫其不告朔而幸其猶朝于廟也不郊猶三望者傷其不郊而幸其猶三望也春秋之書三望者為不郊而書也或卜郊不從乃免牲猶三望或郊牛之口傷改卜牛牛死乃不郊猶三望而穀梁以為乃者亡乎人之詞也猶者可以已之詞也夫郊祀者先王之大典而夫子不得親見之於周也故因魯之所行郊祀之禮而極言之焉耳故不郊猶三望者皆夫子所以存周之遺典也若曰可以已則是周之遺典絶矣或曰魯郊僭也夫子何存焉曰魯郊僭也而夫子不譏夫子所譏者當其罪也賜魯以天子之禮樂者成王也受天子之禮樂者伯禽也夫子而譏魯郊也上則譏成王次則譏伯禽成王伯禽不見于經而夫子何譏焉故曰猶三望者夫子之所以存周之遺典也雩閔雨東坡曰雩者先王所以存夫愛民之心而已也天之應乎人君者以其德不以其言也人君修其德使之無愧乎其中而又何禱也雖然當歲之旱也聖人不忍安坐而視民之無告也故為之雩雩者先王之所以存夫愛民之心而已也作傳者不達乎此而為是紛紛之論亦可笑矣穀梁傳曰月雩正也秋大雩非正也冬大雩非正也月雩之為正何也其時窮人力盡是月不雨則無及矣雩之必待其時窮人力盡何也雩者為旱請也古之人重請以為非讓也嗚呼為民父母安視其急而曰毛澤未盡人力未竭以行其區區之讓哉愚以為凡書雩者記旱也一月之旱故雩書月一時之旱故雩書時春秋書雩之例時月而不日以為旱之不在乎日也唯昭公之末年八月上辛大雩季辛又雩而昭公之雩非旱雩也公羊傳曰又雩非雩也聚衆以逐季氏也然則旱雩之例亦可見矣傳例曰凡災異歴日者月歴月者時歴時者加日又雩記旱也旱記災也故愚舉此以為例劉蕡曰春秋魯僖公一年之中三書不雨者以其人君有恤人之志也魯文公二年之中一書不雨者以其人君無憫人之心也故僖致精誠而旱不害物文無憫恤而變則成災大夫無遂事東坡曰春秋之書遂一也而有善惡存焉君子觀其當時之實而已矣利害出於一時而制之於千里之外當此之時而不遂君子以為固上之不足以利國下之不足以利民可以復命而後請當此之時而遂君子以為專專者固所貶也而固者亦所譏也故曰春秋之書遂一也而有善惡存焉君子觀其當時之實而已矣公子結媵陳人之婦于鄄遂及齊侯宋公盟公羊曰媵不書此何以書以其遂事書大夫無遂事此其言遂何大夫出疆有可以安國家利社稷則專之可也公子遂如周遂如晉公羊亦曰大夫無遂事此其言遂何公不得為政也其書遂一也而善惡如此之相逺豈可以不察其實哉春秋者後世所以學為臣之法也謂遂之不譏則愚恐後之為臣者流而為專謂遂之皆譏愚恐後之為臣者執而為固故曰觀乎當時之實而已矣西漢之法有矯制之罪而當時之名臣皆引此以為據若汲黯開倉以賑饑民陳湯發兵以誅郅支若此者專之可也不然獲罪於春秋矣歴代名賢確論卷十七
