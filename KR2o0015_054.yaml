body:
  text: 歷代名賢確論卷五十四文帝文帝受禪栁子厚子西賈詡諌伐吳蜀子西司徒華歆等與諸葛亮書令稱藩子西賜羣臣沒入生口子西于禁溫公徐幹曾子固眀帝有司奏魏得地統以建丑為正子西眀帝問黃權三國孰為正權對以天文則魏為正子西張掖出石時人以為魏晉之符子西司馬懿陳羣曹休曹真並以大將軍開府子西明帝作考課之法七十二條溫公夏侯𤣥何晏東坡司馬仲達何去非陳留王鄧艾何去非通論魏人君文帝受禪栁子厚論曹不一言舜禹之事曰魏公子丕由其父得漢禪還自南郊謂其人曰舜禹之事吾知之矣由丕以來皆笑之栁先生曰丕之言若是可也嚮者丕若曰舜禹之道吾知之矣丕罪也其事則信吾見笑者之不知言未見丕之可笑者也凡易姓受位公與私仁與强其道不同而前者忘後者繫其事同使以堯之聖一日得舜而與之天下能乎吾見小爭於朝大爭於野其為亂堯無以已之何也堯未忘於人舜未繫於人也堯之得舜也以聖舜之得堯也以聖兩聖得於天下之上奈愚人何其立於朝者放齊猶曰朱啓眀而況在野者乎堯知道不可退而自忘舜知堯之忘已而繫舜於人也進而自繫舜舉十六族去四凶使天下咸得其人命二十二人興五教立禮刑使天下咸得其理合時月正厯數齊律度量衡使天下咸得其用積十餘年人曰眀我者舜也齊我者舜也資我者舜也天下之在位者皆舜之人也而堯隤然聾其聰昏其眀愚其聖人曰往之所謂堯者果安在哉或曰耄矣曰匿矣又十餘年其思而問者加少矣至於堯死天下曰久矣舜之君我也夫然後能揖遜受終於文祖舜之與禹也亦然禹旁行天下功繫於人者多而自忘也晚益之自繫猶是也而啓賢聞於人故不能夫其始繫於人也厚則其忘之也遲不然反是漢之失德久矣其不繫而忘也甚矣宦董袁陶之賊生人盈矣丕之父攘禍以立强積三十餘年天下之主曹氏而已無漢之思也丕嗣而禪天下得之以為晚何以異夫舜禹之事耶然則漢非能自忘也其事自忘也曹氏非能自繫也其事自繫也公與私仁與强其道不同其忘而繫者無以異也堯舜之忘不使如漢不能授舜禹舜禹之繫不使如曹氏不能受之堯舜然而世徒探其情而笑之故曰笑其言者非也問者曰堯崩天下若喪考妣四海遏密八音三載子之言忘若甚然是可不可歟曰是舜歸德於堯史尊堯之德之辭者也堯之老更一世矣德乎堯者蓋已死矣其幼而存者堯不能使之思也不若是不能與人天下子西論孫盛非蘇則發服曰魏氏受禪漢帝尚存縞素舉哀誠為輕脫然盛謂二志茲又過矣箕子過故商墟感宮室毁壞傷之欲哭以方朝而不敢季札哭王僚而事闔廬晏子哭莊公而事景公哀死事生以待天命此人臣之分也何得謂之非其所事而事其所非乎孫盛梟音使人聞而惡之賈詡諌伐吳蜀子由曰用兵之難蓋有怵於外而動者矣力之所及而義不可君子不為也義之所可而力不及君子不强也魏文帝始受漢禪欲用兵吳蜀以問詡詡曰吳蜀雖蕞爾小國依阻山川劉備有雄才諸葛亮善治國孫權識虛實陸遜見兵勢據險守要泛舟江湖皆難卒謀也用兵之道先勝後戰量敵論將故舉無遺䇿臣竊料羣臣無備權對雖以天威臨之未見萬全之勝也帝不能用遂興江陵之役士卒多死是時帝始受禪欲以武功夸視四方貪得幸勝未暇慮兵敗勢屈之辱也魏多謀臣蓋必有知之者矣然皆莫敢言詡能言之可謂不怵於外矣晉末苻堅擁百萬之衆恥吳㑹之未服欲一舉下之而不知晉之無釁謝安乘苻堅之敗知中原之蕩析而不知江南之微弱勢不能成大功故苻堅至於失國而謝安至於喪師二人者皆恥不若人怵於外之患也司徒華歆等與諸葛亮書令稱藩子西曰魏之羣臣可謂不學亡術而昧於識慮矣使其學術識慮如漢之蕭望之者當不為此舉動也漢宣帝時呼韓欵塞稱藩望之議以客禮待之使他日遁去於漢不為叛臣宣帝從之蓋方是時胸奴雖衰然素號敵國非東甌南粵比也名分一正遂不可易他日叛去何以處之發兵加誅則勢有所未能置之不問則無以令天下故方其柔順之時待以不臣之禮非獨視以謙遜蓋將為後日久逺之慮也魏之自視何如宣帝吳蜀雖弱不至如呼韓邪之時彼雖稱藩猶當待以弗臣況未服而强之邪前此加權封爵而為權所戲侮今復喻蜀稱藩為亮所不答自西自東自南自北無思不服者不如是之勞也賜羣臣沒入生口子西論孫盛非華歆出嫁沒入生口曰孫盛以刻薄之資承學於草竊亂賊之世性習皆惡故其論議類皆如此夫見牛未見羊孟子所謂仁術也何名為偏宥哉使盛為廷尉於魏文之時則歆當以私饋盜施誅矣東晉之不用盛不為過也于禁溫公曰于禁將數萬衆敗不能死生降於敵既而復歸文帝廢之可也乃畫陵屋以辱之斯為不君矣徐幹曾子固中論序曰愚始見館閣及世所有徐幹中論二十篇以謂盡於此及觀貞觀政要怪太宗稱賞見幹中論復三年喪篇而今書此篇闕因考之魏志見文帝稱幹著中論三十餘篇於是知館閣及世所有者非全書也幹字偉長恬淡寡欲有箕山之志魏太祖特旌命之辭疾不就後以為上艾長又以疾不行蓋漢承周衰及秦滅學之餘百夫雜家與聖人之道並傳學者罕能獨觀於道德之要而不牽於俗儒之說至於治心養性去就語默之際能不悖理者固希矣況至於魏之濁世哉幹獨能考六藝推仲尼孟軻之㫖述而論之求其辭時若有小失者要其歸不合於道者少矣其所得於內者又能信而充之逡巡濁世有去就顯晦之大節云云有司奏魏得地統以建丑為正子西曰世言夏得人統以建寅為正商得地統以建丑為正周得天統以建子為正其說非也以堯典羲和舜典巡狩觀之唐虞之世固以建寅為正矣至夏后之時其法尤備其書傳於後世謂之夏小正孔子得之於杞以為可用非謂建寅之正自夏后氏始也至成周時始用建子為正然猶不廢夏時謂之正嵗後之學者以為夏以建寅為正周以建子為正商居其間不應無所變改因以意推之曰商以建丑為正而三統之說興焉夫夏后氏以建寅為正吾於論語見之矣論語曰行夏之時周以建子為正吾於春秋見之矣春秋書十月降霜殺菽三月大水商人以建丑為正於經既無所見於理亦復不通夫以建子為正者取二十四氣之首也以建寅為正者取四時之首也以建丑為正其取義安在哉足以知其不然眀帝問黃權三國孰為正權對以天文則魏為正子西曰權推魏為正統未必不然然權初無他說一以天文決之此非余之所敢知也黃初四年三月癸卯月犯心大星占曰心為天王位王者惡之四月癸巳蜀先主殂于永安宫而二國皆自如天道豈易言哉晉天文志稱二石雖僭號其强弱常占昴宿不關太微紫宫然以戴記考之流星入紫宮而劉聰殞彗星掃太微而苻堅敗熒惑守帝座而呂隆破故知推論正統固自有理也晉庾翼與兄氷書曰歲星犯天關江東無故而季龍頻年閉關此復是天公憒憒無皂白之證也噫人之責天亦太詳矣為天者不亦難哉張掖出石時人以為魏晉之符子西曰河圖洛書之說歐陽永叔攻之甚力今觀此圖與河圖洛書亦何以異惜乎時無伏犧神禹故莫能通其義而陋者以為魏晉之符彼魏晉何足道安知其非八卦九疇之類也造化之所為猶有幸不幸焉而況於人乎可勝嘆哉可勝嘆哉司馬懿陳羣曹休曹真並以大將軍開府子西曰漢初置丞相御史府後置三公府將帥出征置幕府軍罷即廢不常置也今魏既置三公而懿等並為大將軍開府京師此何理邪公室之卑蓋自此始矣蜀將李平聞懿等開府辟召以說孔眀孔眀鄙之是時中原人物推陳長文為第一今長文亦為此餘無足道矣眀帝作考課之法七十二條溫公曰為治之要莫先於用人而知人之道聖賢所難也是故求之於毁譽則愛憎競進而善惡混殽考之於功狀則巧詐橫生真僞相冒要之本在至公至眀而已矣為人上者至公至眀則羣下之能否焯然形於目中無所復逃矣茍為不公不眀則考課之法適足以為曲私欺罔之資也何以言之公眀者心也功狀者迹也已之心不能治而以考人之迹不亦難乎為人上者誠能不以親疏貴賤異其心喜怒好惡亂其志欲知治經之士則視其記覽博洽講論精通斯為善治經矣欲知治獄之士則視其曲盡情僞無所寃抑斯為善治獄矣欲知治財之士則視其倉庫盈實百姓富給斯為善治財矣欲知治兵之士則視其戰勝攻取敵人畏服斯為善治兵矣至於百官莫不皆然雖詢謀於人而決之在已雖考狀於迹而察之在心研核其實而斟酌其宜至精至微不可以口述不可以書傳者也安得豫為之法而悉委有司哉或者親貴而不能任職疏賤雖賢才而見遺所喜所好者敗官而不去所怒所惡者有功而不録詢謀於人則毁譽相半而不能決者求於迹則文具實亡而不能察雖復為之善法繫其條目謹其簿書安能得其真哉或曰人君之治大者天下小者一國內外之官以千萬數考察黜陟安得不委有司而獨任其事哉曰非謂其然也凡為人上者不特人君而已太守居一郡之上刺史居一州之上九卿居屬官之上三公居執事之上皆用此道以考察黜陟在下之人為君者亦用此道以考察黜陟公卿刺史太守奚煩勞之有哉或曰考績之法唐虞所為京房劉邵述而修之耳烏可廢哉曰唐虞之官其居位也久其受任也専其制法也寬其責成也逺是故鯀之治水九載績用弗成然後治其罪禹之治水九州攸同四隩既宅然後賞其功非若京房劉邵之法校其米鹽之謂責其旦夕之效也事固有名同而實異者不可不察也考績非可行於唐虞而不可行於漢魏由京房劉邵不得其本而奔趨其末故也夏侯𤣥何晏東坡曰魏氏春秋云夏侯𤣥著樂毅張良及本無肉刑論辭㫖深逺傳於世然以余觀之燕師之伐齊猶未及桓文之舉也而以為幾湯武豈不過甚矣乎初𤣥好老莊道德之言與何晏等皆有盛名然卒陷曹爽黨中𤣥亦不免李豐之禍晏目𤣥以易之所謂深者而𤣥目晏以神及其遇禍深與神皆安在乎羣兒妄作名字自相刻畫類皆如此可以發千載之一笑司馬仲達何去非曰昔之君臣相擇相遇天下擾攘之日君未嘗不欲其臣之才臣未嘗不欲其君之眀臣既才矣而其君常至於甚忌君既眀矣而其臣常至於甚憚者何也君非有惡於臣而忌之也忌其權略之足以二於我也臣非有外於君而憚之也憚其剛忍之足以不容於我也此忌憚之所由生也雖然君固有所不忌以其得無所當忌之臣臣固有所不憚以其得無所當憚之君昔者蜀先主之與諸葛孔眀苻堅之與王猛是也至於曹公之與司馬仲達則忌憚之情不得不生矣非仲達不足以致曹公之忌非曹公不足以致仲達之憚天下之士不應曹公之命者多矣而仲達一不起已將收而治之夫仲達之不起固疑其不為已容曹公之欲治固疑其不為已用此其相期於始者固已不盡君臣之誠矣則忌憚何從而不生也雖然仲達處之卒至乎曹公無所甚忌仲達無所甚憚者此所以為人豪以成夫取魏之資也人之挾數任術若荀文若者幾希矣蓋曹公之䇿士而倚之為蓍龜者也公之欲遷漢祚也於其始萌諸心而仲達啓之以中其欲於其既形於迹則文若沮之以忤其情已而文若出於百營而不能救其誅仲達卒為之腹心而遂去其憚方曹公之鞭笞天下求集大業也將帥四出無一日而釋甲而仲達獨以其身雍容治務而已未嘗一求將其兵雖公亦不以為能而求使之逮公之亡始制其兵出竒應變奄忽若神無嚮不殄雖曹公有所不逮焉魏文固已無忌仲達固已無憚天下始甚畏之猶公之不亡也由是觀之仲達之以術略自將其身者可得而窺哉奈何諸葛孔眀欲以其至誠大義之懷數出其兵求與之決於一戰以定魏蜀之存亡哉仲達孔眀皆所謂人傑者也渭南之役人皆惜亮之死以為不見夫二人者決勝負於此舉也亮之僑軍利在速戰仲達持重不應以老其師而求乘其弊亮以巾幗遺之欲激其應仲達表求決戰魏君乃遣辛毗杖節制之亮以仲達無意於戰其請於君徒示武於衆耳嗟夫謂仲達之請戰以示武於衆者則或有之謂其有所終畏而無意於一決者亦非也雖然使辛毗不至則仲達固將不戰也仲達之所求者克敵而已今以一辱不待其可戰之機乃悻然輕用其衆為忿憤之師安足為仲逹也晉之朱伺號為善戰人或問之伺曰人不能忍而我能忍是以勝之豈以仲達而無朱伺之量耶察其所以誅曹爽者足見其能忍而待也故其䇿亮曰亮志大而不見機多謀而少決好兵而無權雖提卒十萬已墮吾畫中破之必矣此仲達之志也亮之始出也仲達語諸將曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣昔者曹公攻鄴袁尚以兵救之諸將皆以歸師勿遏當避之公曰尚從大道來且避之若循西山則成擒耳尚果循西山一戰擒之盧循反攻建鄴宋武䇿之曰賊若新亭直上且當避之回泊蔡洲則成擒耳循果泊蔡洲一戰而走之亮之趨原與袁尚之循西山盧循之泊蔡洲等耳蓋鋭氣已奪固將畏而避人不足為人之所畏避此三君者所以易而吞之也亮常嵗之出其兵不過數萬不以敗還輒以饑退今千里負糧餉師十萬坐而求戰者十旬矣仲達提秦雍之徑卒以不應而老其師者豈徒然哉將求全於一勝也然而孔眀既死蜀師引還而仲達不窮追之者蓋不虞孔眀之死其士尚飽而軍未有變蜀道阻而可伏疑其僞退以誘我也向使孔眀之不死而弊於相持則仲達之志得矣或者謂仲達之權譎不足以當孔眀之節制此腐儒守經之談不足為曉機者道也鄧艾何去非論曰事物之理可以情通而不可以迹係通之以情則有以適變而應乎聖人所與之權係之以迹則無以制宜而入乎聖人所疾之固是以天下事功之成常出於權而其不濟常主於固夫以人為是而求踐之不知所以踐者於今為非以人為非而求矯之不知所以矯者於今為是是皆不求通之以今日之情而係之以既往之迹故其所以踐與矯者適足以為禍悔之資也昔衛青之擊胸奴其禆將蘇建盡亡其軍於令當斬青以不敢専誅於外囚建送之人皆多青之不擅權得所以為臣與帥之順道也皇甫嵩討賊梁州董卓副之賊平詔卓以兵屬嵩卓不受詔挾兵睥睨人皆勸嵩誅之嵩不欲其専誅於外也而以狀聞卓因遂其凶逆卒以不制夫嵩之舍卓者非出於他也蓋以衛青不戮蘇建獲恭厚之譽遂係迹而求踐之不知所以舍卓者於今為縱寇也鄧艾之伐蜀也出於萬死不顧一生之計乘危決命卒俘劉禪可謂功矣然其心氣闊略以為閫外之任當制威賞乃大専拜假至欲擅王劉禪留西不遣雖司馬文王以順諭之猶不見聽是以鍾㑹得入其間以及於誅而不悟也夫艾之専制者非出於他也蓋以皇甫嵩常要譽求全而失於董卓故蹈後悔遂係迹而求矯之不知所以矯嵩者於今為召禍也是皆不求通之以今日之情而専係乎既往之迹此所以不自知夫禍悔之集也觀艾之為將也急於智名而鋭於勇功喜邀前利而忘顧後患者也艾嘗以是勝敵矣而卒結禍於其身者亦以此也始鍾㑹以十萬之徑而趨劒閣姜維以摧折之師憊於奔命雖能拒扼而終非堅敵也艾為主帥不務以全策縻之乃獨以其兵萬人自隂平邪徑而趨江油以襲劉禪蓋出其不意而行無人之境七百餘里鑿山險治橋閣巖谷峻絶士皆攀緣崖木投墜而下又糧運不繼而艾至於以氊自裹輪運而下嗚呼可謂危矣士皆殊死決戰僅獲破諸葛曕之師而劉禪悸迫即時束手使禪獨忍數日之不降以待援師之集則艾為以肉齒餓虎矣艾一不濟則鍾㑹十萬之師可傳呼而潰矣艾以其身為僥幸之舉者乃求生救敗之計非所謂取亂侮亡之師而亦非大將自任之至數也是役也非艾無以取勝於速而其勝也有出於幸使其不幸而至於潰敗者亦艾致也夫竒道之兵將以掩覆於其外必有以應聽於其內然後可與勝期而功㑹也唐李訴之入蔡以取吳元濟也以其有李祐之為鄉道故也使其無應聽之主則訴亦何能乘危而僥幸也西漢中興之名將無若趙充國史稱其沈勇有大略觀其為兵期於克敵而已每以全師保勝為䇿未嘗茍競於一戰故其居軍無顯赫殱滅之效卒至制敵於股掌之上安邉定寇皆出其畫而獨收其成勳他將無與焉幾於所謂無智名勇功之善者也由是觀之艾之所以不免者亦其操術之致然也魏人君溫公曰漢室不綱羣雄麋擾乘輿播遷莫之攸省太祖獨奉迎而相之披荆棘以立朝廷則其名義固足以結民心矣加之英威眀略過絶於人驅䇿賢豪奮除姦宄於是張繡屈膝呂布授首公路野死本初覆亡劉琮獻地韓馬遁逃中原肅清戎狄請服然則魏取天下於盜手非取之漢室也惜其狹中多詐猜忌賢能此海內所以不盡服也及文帝受禪眀帝繼業內綏外禦不廢前功而眀帝於彌留之際為姦臣牽率嗣子幼弱寄託非人曹爽驕戇黨友輕佻禍自內興遂衰微不振以至易姓悲夫歷代名賢確論卷五十四
