body:
  text: 歴代名賢確論卷四十髙祖下三傑王元之張良李白公荆公子由梁肅東坡温韓信荆公西魯直唐子劉禹錫髙參温公陳平李徳裕樊噲魯直六一高祖欲易太子東坡高祖之智老泉四皓元禎梁肅白樂天孫明復李白牟荆公元之李華頲韋渠王蘓趙堯東坡田横子由昌黎三傑王元之三傑佐漢孰優論曰夫百姓不能自治命聖人以治之聖人不能獨治生賢臣以佐之粤自有天地建國家歴代已來固非賢而不乂也在昔嬴氏之有天下也蠶食六國虎噬兆民君政法干豺狼人命輕于草芥役五嶺之戍起阿房之宫坑儒學之徒惑神仙之事築城北塞鞭石東溟蒼生嗷嗷上訴求主天命高祖革秦之暴纂堯之緒斬蛇于大澤逐鹿于中原雲飛豐沛之間雷動崤函之地將欲洗萬人之塗炭救六合之分崩乃生三傑以佐焉則有膺炎漢之運儲昴宿之精舉不失賢動無遺策供轉輸于千里約法令於三章收圖籍之書全府庫之利使諸侯同反掌定萬國如走丸此酇侯為一也則有繼韓國之裔受黄公之言解紛陳八難之謀運籌决千里之勝掉三寸舌蔚為帝者之師封萬户侯自是布衣之極此留侯為二也次乃勇冠三軍功深百戰下强齊如拾芥虜叛魏似摧枯七十陣征伐之勞光乎史策四百年興隆之祚垂之古今此淮陰為三也故高祖嘗曰此皆人之傑也吾能用之奮布衣而取天下未為艱哉然則漢猶鼎也三傑為足以負之漢猶天也三傑為辰以燭之鼎去一足則有欹傾之虞天闕一辰則失經躔之度漢虧一傑則無霸王之業豈非天之道啓聖哲救黎元滅亂秦殄强楚而興大漢哉不然何龍虎風雲㑹合之若是耶噫輔弼則優劣斯異故謂韓信之功如獵犬雖云有獲蓋指蹤在乎人矣如是蕭張人之功也韓信犬之功也優劣之義不其明乎其或得名遂之道其在子房乎故蕭公受縶韓信受戮雖成功于前終貽慼於後未若定儲之計從赤松而游遠害全身垂名于萬世者不為優乎張良李白經下邳圯橋懷子房詩曰子房未虎嘯破産不為家滄海得壯士椎秦博浪沙報韓雖不成天地皆震動濳匿遊下邳豈曰非智勇我來圮橋上懷古欽英風唯見碧流水曾無黄石公歎息此人去蕭條徐泗空王荆公詩曰張良美好如婦人五世相韓韓入秦傾家為主合壯士博浪沙中擊秦帝脫身下邳世不知舉國大索何能為素書一卷天與之穀城黄石非吾師固陵解鞍聊出口捕取項羽如嬰兒從來四皓招不得為我立棄商山芝洛陽賈誼才能薄擾擾空令絳灌疑子由詩曰留侯決成敗面折愧周昌垂老召商叟鴻鵠自高翔梁肅圯橋石表銘曰初留侯醜秦高帝在豐龍虎不起風雲未㑹黄石知天衢欲平否極必傾秦之亡而漢之昌故先以興王之符而授留侯且曰孺子可教後得濟北黄石其我也故以號云夫受命之君與佐命之臣將欲叙天道定人倫則必幽贊神明協成大勲在黄帝氏方平蚩尤時乃𤣥女啓符風后行誅然後迎日推筴天下大治在堯舜方憂水害時乃洛出九疇禹成九功然後萬國底寧黎民時雍在漢祖方征秦項時乃黄石授兵留侯演成然後紲嬰軹道斬羽垓下自昔𤣥圖元命著在篆籀皆片言隱辭無益帝載惟此三后感致神書文章昭明大業用興易稱人謀鬼謀百姓與能又曰神道設教而天下服蓋謂是矣凡志不定則事不成謀不從則業不廣留侯不遭黄石無以定其志高祖不獲留侯無以廣其業人神参并漢道乃行不然何道降聖賢君臣遇合上得天統下為帝師如此其盛也東坡曰古之所謂豪傑之士者必有過人之節人情有所不能忍者匹夫見辱㧞劔而起挺身而鬭此不足為勇也天下有大勇者卒然臨之而不驚無故加之而不怒此其所挾持者甚大而其志甚遠也夫子房受書於圯上之老人也其事甚怪然亦安知其非秦之世有隱君子者出而試之觀其所以微見其意者皆聖賢相與警戒之義而世不察以為鬼物亦已過矣且其意不在書當韓之亡秦之方盛也以刀鋸鼎鑊待天下之士其平居無罪夷滅者不可勝數雖有賁育無所復施夫持法太急者其鋒不可犯而其勢未可乗子房不忍忿忿之心以匹夫之力而逞於一擊之間當此之時子房之不死者其間不能容髮蓋亦已危矣千金之子不死於盜賊何者其身之可愛而盜賊之不足以死也子房以蓋世之才不為伊尹太公之謀而特出於荆軻聶政之計以僥倖於不死此圯上之老人所為深惜者也是故倨傲鮮腆而深折之彼其能有所忍也然後可以就大事故曰孺子可教也楚莊王伐鄭鄭伯肉袒牽羊以逆莊王也王曰其君能下人必能信用其民矣遂舍之勾踐之困於㑹稽而歸臣妾於吳者三年而不倦且夫有報人之志而不能下人者是匹夫之剛也夫老人者以為子房才有餘而憂其度量之不足故深折其少年剛鋭之氣使之忍小忿而就大謀何則非有平生之素卒然相遇於草野之間而命以僕妾之役油然而不恠者此固秦皇帝之所不能驚而項籍之所不能怒也觀夫高祖之所以勝而項籍之所以敗者在能忍與不能忍之間而已矣項籍惟不能忍是以百戰百勝而輕用其鋒高祖忍之養其全鋒而待其弊此子房教之也當淮隂破齊而欲自王高祖發怒見於辭色由此觀之猶有剛强不忍之氣非子房其誰全之太史公疑子房以為魁梧竒偉而其狀貌乃如婦人女子不稱其志氣嗚呼此其所以為子房歟温公曰夫生之有死猶夜旦之必然自古及今固未嘗有超然而獨存者也以子房之明辨達理足以知神仙之為虚詭矣然其欲從赤松子遊者其智可知也夫功名之際人臣之所難處如高帝所稱者三傑而已淮隂誅夷蕭何繫獄非以履盛滿而不止者耶故子房託於神仙遺棄人間等功名於外物置榮利而不顧所謂明哲保身者子房有焉韓信王荆公詩曰韓信寄食常歉然邂遘漂母能哀憐當時噲等何由伍但有淮隂惡少年誰道蕭曹刀筆吏從容一語知人意壇上平明大將旗舉軍盡驚王不疑捄兵半楚濰半涉從初龍且聞信怯鴻門天下已横分談笑重來卷楚氛但以怯名終得羽誰為孔費兩將軍魯直詩曰韓生沈鷙非悍勇俛身跨下直自重滕公不斬人未知蕭相自追王始用從來儒者溺所聞竒兵果斬成安君功成千金購降虜東面置坐師廣武軍前定策取萬全燕齊爭下如風旋雖云晩計太疎畧此事已足垂千年君不見秦家丞相衛公子立法治秦薄如紙法行投鼠不忌器迺是天資少恩耳白頭故人一趙良忠言過耳棄路傍吾固知功名成敗不足據直觀古人用心處劉禹錫詩曰將畧兵機命世雄蒼黄鍾室歎良弓遂令後代登壇者每一尋思怕立功高參高祖偽遊議曰或曰漢高祖偽游雲夢以擒韓信果哉其智足稱也予以漢高祖不思𢎞遠之規而務一時之計於是乎失政刑矣夫聖人貴正不貴幸與律不與臧昔者明王五載一巡狩合諸侯各朝於方嶽大明黜陟故無德者削地有功者進律漢氏君臨萬國示人以偷偽游之名不可以訓且當此之時韓信未有逆節一朝繫信而生諸侯之疑則所利者少而所失者多昔崇伯之方命圮族共工之靜言庸違帝堯以聖哲之明而未有去者蓋以其行偽象恭且有四嶽之舉故也向使堯惡四兇之行拒四嶽之舉不待試用加之誅放天下必以為戮不辜矣夫刑一人使天下知其罪則服賞一人使天下知其賢則勸若賞而不勸刑而不服則堯所不為也漢祖不能斟酌古典卒用陳平之言執信而歸於京師一二年間韓王信反馬邑趙相貫高謀柏人陳狶反代地彭越黥布盧綰悉以叛渙豈非服勸用刑之失歟傳曰君人執信臣人執忠古之盟主恥襲侵之事况光有天下者乎於戲悠悠千載變詐萌生使天子不復言巡狩諸侯不敢議朝覲大者自嫌强盛小者懼於囚執是恩信不流於下而忠孝不達於上王者之澤寖以陵遲自雲夢始矣温公曰世或以韓信為首建大策與高祖起漢中定三秦遂分兵以北禽魏取代仆趙脅燕東擊齊而有之南滅楚垓下漢之所以得天下者大抵皆信之功也觀其距蒯通之説迎高祖於陳豈有反心哉良由失職怏怏遂陷悖逆夫以盧綰里閈舊恩猶南面王燕信乃以列侯奉朝請豈非高祖亦有負於信哉臣以為高祖用詐謀禽信於陳言負則有之雖然信亦有以取之也始漢與楚相距滎陽信滅齊不還報而自王其後漢迫楚至固陵與信期共攻楚而信不至當是之時高祖固有取信之心矣顧力不能耳及天下既定則信復何恃哉夫乗時以徼利者市井之志也酬功而報德者士君子之心也信以市井之志利其身而以士君子之心望於人不亦難哉是故太史公論之曰假令韓信學道謙遜不伐己功不矜其能則庶幾哉於漢家勲可以比周召太公之徒後世血食矣不務出此而天下已集乃謀叛逆夷滅宗族不亦宜乎唐子西淮隂賢婦傳曰賢婦亡姓名淮隂下鄉人蓋老矣貧無自資以洴澼絖為業屬秦末亂離民不親耒耜者累年矣天下饑饉婦方坐沙上以水擊絮望見城下有客長大帶刀劍彷徨水濱婦私獨怪之遂就與語則壯士也面有饑色婦哀其困館而食至數十日欣然無倦意客感慨曰異日必有重報母是時天下兵動關東豪傑並起婦視客非庸人終能有所就遂佯怒以語激之曰丈夫不能自食吾哀王孫而進之食寧望報乎㑹楚兵過淮客仗劍從楚戲下楚不能用客亡命歸漢得大將從漢王定三秦與楚人戰京索間有功二年八月始涉西河破魏豹九月破代十二月破趙明年十二月遂破齊蓋自北出至是嵗餘而席卷天下之半明年二月漢遣使立客齊王又明年引兵㑹漢垓下破楚天下大定漢徙客王楚都下邳蓋自寄食五年裂地數千里南面稱孤於是下令曰求婦報千金天下不多客之賢而多婦之長者有知識客韓信也云云銘曰項王喑嗚范増謀謨信來不呼信去不拘坐視信逋反噬其軀匹夫區區而知信乎陳平李德裕曰士之有志氣而思富貴者必能建功業有志氣而輕爵禄者必能立名節二者雖其志不同然時危世亂皆人君之所急也何者非好功業不能以勘亂非重名節不能以死難此其梗概也好功業者當理平之世或能思亂唯重名節者理亂皆可以大任平澹和雅世所謂君子者居平必不能急病理煩遭難亦不能捐軀濟厄可以羽儀朝廷潤色名教如宗廟瑚璉園林鴻鵠雖不常為人用而自然可貴此謂王䝉劉長之儔然世亦有不拘小疵而能全大節者如陳平背楚歸漢漢王疑其多心令䕶諸將又疑其受金可謂不能以名節自固矣及功成封侯辭曰非魏無知臣安得進漢高曰若子可謂不背本矣其後竟誅諸吕以安劉氏近世宰相上官儀詩多浮豔時人稱為上官體實為正人所病及高宗之初竟以謀廢武后心存王室至於宗族受禍郭代公倜儻不覊之士也少不以名節自檢當蕭岑内難保護睿宗雖履危機竟全臣節則名節之間不可以一槩論也陳平能不背魏無知所以必不負漢王矣今士之背本者人君豈可保之哉樊噲魯直詩曰漢興豐沛開天下故舊因依日月明㧞劔一巵戲下酒剖符千户舞陽城鼔刀屠狗少時事排闥諫君身後名異日淮隂儻相見安能鞅鞅似平生六一樊侯廟記曰樊侯本以屠狗立軍功佐沛公至皇帝位為列侯邑食舞陽剖符傳封與漢長久禮所謂有功德於民則祀之者歟舞陽距鄭既不遠又漢楚常苦戰滎陽京索間亦侯平生提戈斬級所立功處故廟而食之宜矣方侯之參乗沛公事危鴻門瞋目一顧使羽失氣其勇力足有過人者故後世言雄武稱樊將軍宜其聰明正直有遺靈矣高祖欲易太子東坡曰有進說於君者因其君之資而為之說則用力寡矣人惟好善而求名是故仁義可以誘而進不義可以刼而退若漢高帝起於草莽之中徒手奮呼而得天下彼知天下之利害與兵之勝負而已安知所謂仁義者哉觀其天資固亦有合於仁義者而不喜仁義之說此如小人終日為不義而至以不義説之則亦怫然而怒故當時之善説者未嘗敢言仁義與三代禮樂之教亦惟曰如此而為利如此而為害如此而可如此而不可然後高帝擇其利與可者而從之蓋亦未嘗遲疑天下既平以愛故欲易太子大臣叔孫通周昌之徒力爭之不能得用留侯計僅得之蓋讀其書至此未嘗不太息以為高帝最易曉者茍有以當其心彼無所不從盍嘗告之以吕后太子從帝起於布衣以至於定天下天下望以為君雖不肖而大臣心欲之如百嵗後誰肯北面事戚姬子乎所謂愛之者祗以禍之嗟夫無有以奚齊卓子之所以死為高帝言者歟叔孫通之徒不足以知天下大計獨有廢嫡立庶之說而欲持此以卻之此固高帝之所輕也人固有所不平使如意為天子惠帝為臣絳灌之徒圜視而起如意安得而有之孰與其全安而不失為王之利也如意之為王而不免於死則亦高帝之過矣不少抑遠之以泄吕后不平之氣而厚封焉其為計不已疎乎或曰吕后强悍高帝恐其為變故欲立趙王此又不然自高帝之時而言之計吕后之年當死於惠帝之手吕后雖很亦不忍奪其子以與姪惠帝既死而吕后始有邪謀此出於無聊耳而高帝安得逆知之且夫事君者不能使其心知其所以然而樂從吾説而欲以勢奪之亦已危矣如留侯之計高帝顧戚姬悲歌而不忍特以其勢不得不從是以猶欲區區為趙王計使周昌相之此其心猶未悟以為一强項之周昌足以抗吕后而捍趙王不知周昌激其怒而速之死耳古之善原人情而深識天下之勢者無如高帝然至此而惑亦無有以告之者悲夫高祖之智老泉曰漢高帝挾數用術以制一時之利害不如陳平揣摩天下之勢舉指揺目以刼制項羽不如張良微此二人則天下不歸漢而高帝乃木强之人而止耳然天下已定後世之子孫之計陳平張良智之所不及則高帝當先為之規畫處置以中後世之所為曉然如目見其事而為之者蓋高帝之智明於大而暗於小至於此而後見也帝嘗語吕后曰周勃厚重少文然安劉氏必勃也可令為太尉方是時劉氏既安矣勃又將誰安耶故吾之意曰高帝之以太尉屬勃也知有吕氏之禍也雖然其不去吕后何也勢不可也昔者武王殁成王幼而三監叛帝意百嵗後將相大臣及諸侯王有武庚禄父者而無有以制之也獨計以為家有主母而豪奴悍婢不敢與弱子抗吕后佐帝定天下為大臣素所畏服獨此可以鎮壓其邪心以待嗣子之壯故不去吕后者為惠帝計也吕氏既不可去故削其黨以損其權使雖有變而天下不揺是故以樊噲之功一旦遂欲斬之而無疑嗚呼彼豈獨於噲不仁耶且噲與帝偕起㧞城陷陣功不為少矣方亞父嗾項莊時微噲誚讓羽則漢之為漢未可知也一旦人有惡噲欲滅戚氏者時噲出伐燕立命平勃即斬之夫噲之罪未形也惡之者誠偽未必也且高帝之不以一女子斬天下之功臣亦明矣彼其娶於吕氏吕氏之族若産禄輩皆庸才不足恤獨噲豪健諸將所不能制後世之患無大於此矣夫高帝之視吕后也猶醫者之視堇也使其毒可以治病而無至於殺人而已矣樊噲死則吕氏之毒將不至於殺人高帝以為是足以死而無憂矣彼平勃者遺其憂者也噲之死於惠之六年也天也使其尚在則吕禄不可紿太尉不得入北軍矣或謂噲於帝最親使之尚在未必與産禄叛夫韓信黥布盧綰皆南面稱孤而綰又最為親幸然及髙帝之未崩也皆相繼以逆誅誰謂百嵗之後椎埋屠狗之人見其親戚乗勢為帝王而不欣然從之耶吾故曰彼平勃者遺其憂者也四皓元稹詩曰巢由皆避世堯舜不得臣伊吕雖急病湯武乃可君四賢胡為者千載名氛氲顯晦有遺跡前後疑不倫秦政虐天下黷武窮生民諸侯戰必死壯士眉亦顰張良韓孺子椎碎屬車輪遂令英雄意日夜思報秦先生相將去不復嬰世塵雲卷存孤岫龍濳為小鱗秦皇轉無道諫者鼎鑊親茅焦脫衣諫先生無一言趙高殺二世先生如不聞劉項取天下先生遊白雲海内八年戰先生全一身漢業日已定先生名亦振不得為濟世宜哉為隱淪如何一朝起屈作儲貳賓安存孝惠帝摧顇戚夫人捨大以謀細虯盤而蠖伸惠皇竟不嗣吕氏禍有因雖懐安劉志未若周與陳皆落子房術先生道何屯出處貴明白故吾今有云白樂天荅元稹詩曰天下有道見無道卷懐之此乃聖人語吾聞諸仲尼矯矯四先生同稟希世資隨時而顯晦秉道無磷緇秦皇肆暴虐二世遭亂離先生相隨去商嶺采紫芝君看秦獄中戮辱者李斯劉項爭天下謀臣競悦隨先生如鸞鶴去入㝠㝠飛君看齊鼎中離爛者酈其子房得沛公自謂相遇遲八難掉舌樞三畧役心機辛苦十數年晝夜形神疲竟雜霸者道徒稱帝者師子房爾則能此非吾所宜漢高之季年嬖寵鍾所私冡嫡欲廢奪骨肉相憂疑豈無子房口口舌無所施亦有陳平心心計將何為皤皤四先生高冠危映眉從容下南山顧盼入東闈所瞻惠太子左右生羽儀卻顧戚夫人楚舞無光輝心不畫一計口不吐一詞暗定天下本遂安劉氏危子房吾則能此非爾所知先生道既光太子禮甚卑安車留不住功成棄如遺如破旱天雲一雨百榖滋澤則在天下雲復歸希夷勿髙巢與由勿尚呂與伊巢由往不返伊吕去不歸豈如四先生出處兩逶迤何必長隱逸何必長濟時由來聖人道無朕不可窺卷之不盈握舒之亙八陲先生道甚明夫子猶或非願子辨其惑為秦吟此詩李白詩曰白髮四老人昂藏南山側偃蹇松雪間㝠翳不可識雲牕拂青靄石壁横翠色龍虎方戰爭於焉自休息秦人失金鏡漢祖昇紫極陰虹濁太陽前星遂淪匿一行佐明聖倐起生羽翼功成身不居舒卷在胷臆窅㝠合元化茫昧信難測飛聲塞天衢萬古仰遺跡王荆公詩曰秦敺九州逃知力起經綸重利誘衆榮頗知聚秦民頽然此四老上友千載魂采芝商山中一視漢與秦靈珠在泥沙光景不可昏道德雖避世餘風迴至尊嫡孽一朝正留侯果知言出處但有禮廢興豈所存李華詩曰秦滅漢帝興南山有遺老危冠揖萬乗幸得厭征討當君逐鹿時臣等已枯槁寧知市朝變但覺泉石好高卧三十年相看成四皓帝言公甚善見顧何不早咸稱太子仁重義亦尊道側聞驪姬事申生不自保暫出商山雲朅來趨灑掃東宫成羽翼楚舞傷懐抱後代無其人戾園滿秋草梁肅曰道可佐皇而隘於帝治是以崆峒箕山之長揖於軒堯也德宜輔王而偶生霸世則四皓之所以晦明於漢氏也噫周道絶而王澤凋秦短世而漢雜興六合披攘兵不暇戢則四公軒軒然鴻飛于㝠時也天下大寳一人攸係茍蔑嫡崇庶則亂是用長而公僂僂然俯定儲后權也處則以時出則以權時以全已之道權以安天下之器得非知幾者歟易謂知幾其神乎四公體之故曰時合道合時塞道塞生非其時與道消息四公之謂矣李華贊曰時濁代危賢人去之商洛深山鸞鳯潛飛漢以霸興皇王道衰玉帛雖至先生不歸吾非固然可動而紀厖眉皓髪來䕶太子至尊動容奪嫡心已四賢暫屈天下定矣返駕南山白雲千里孫明復曰四先生儒也哀周之亡疾秦之暴脫身乎虐熖沈㝠乎南山非欲潔其身而亂大倫者也蓋有道則見無道則隠曷以知其然哉夫傳嗣立嫡周道也為國之大莫大於傳嗣嗣之大莫大於立嫡不可不正也茍一失其正則覆亡簒奪之禍隨之自秦氏肆虐燔滅羣聖之典周道絶矣絶而復傳者四先生也昔漢祖提一劔平四海由布衣取天子位斯可謂真主矣及夫禍亂既定嗜欲既起内有嬖寵之惑外有廢嫡之議羣臣恂恂莫之能正四先生將因是時以行其道故因子房而出吐一言以正太子之位此非周道絶而四先生復傳者乎然四先生之出豈止為漢而出哉為萬世而出也漢祖起干戈中素不喜儒四先生懼其辱也故不旋踵而去終於巖石之下嗟乎逮今千餘祀人未有知其潛德隱耀者昔伯夷叔齊諫武王不食而死非孔子稱之則西山之餓夫也後世孰稱之哉司馬遷班固不能博采厥善發施其光為四先生立傳垂於無窮斯其過矣噫萬世而下使臣不敢戕其君者二叔是也萬世之下使庶不敢亂其嫡者四先生是也韋渠牟四皓商山畫圖賛曰煥煥煌煌為圭為璋孰光乎不耀之光幽幽深深為山為林孰繫乎不繫之心足知乎虚室生白元門不關流水去住清風往還豈比夫稷契在世巢由在山一物有累兩心不閒者哉閒之謂何簪裾薜蘿本不干我豈云其他熙熙忻忻與時為春匡漢避秦惟兹四人於德之鄰不孤其身于澗之濱不迷其津繪事既素孰知其故想像儀刑念兹丹青曄曄紫芝深谷逶迤俯仰今古空林住時鳯豈無德鸞皆有羣出處語黙商山白雲王元之曰易稱知進退存亡而不失其正者其惟聖人乎先生避秦知亡也安劉知存也應孝惠之聘知進也拒高祖之命知退也四者備矣而正在其中先生非聖而孰為聖乎若其秦亂而不避則焚書坑儒髙斯之流矣漢危而不出則索隱行怪巢由之徒矣應髙祖之命則溺其冠而騎其項矣拒孝惠之命則功不立而名不彰矣引而伸之先生可謂全德者矣嘗試論之周公聖人也鞭伯禽教孺子居攝七年明辟未復召公不悦於内二叔流言於外盛德大業幾墜於地吁扶幼君秉大政之難也有如是哉觀夫如意之惑戚姬之寵以妾並后以嬖代宗本根一揺社稷將墜咸謂扶蘇之賜死胡亥之亡國可翹足而待也豈無曲逆間强楚解平城則可議立嫡則圓鑿而方枘也豈無留侯陳八難罷六國則可言主鬯則以水而投石也先生一出而助之一言而定之漢廷公卿皆出其下復能錙銖軒冕桎梏衣冠安萬乗而不有其功抗匹夫而不食其祿自非至仁逹識疇能與於此夫向使先生定漢嗣為漢臣報德議功必在平勃之右必當以左輔右弼前凝後丞而處之當是時以四賢事一帝挾振主之威負不賞之功又何不說流言之事乎吾知其就戮辱之不暇矣欲望其茹紫芝卧商嶺烏可得乎是知先生之出非獨謀漢也亦將救時也先生之去非獨全身也亦將矯世也危而䕶之不安於獨善可謂救乎時矣定而去之不乗時以取寵可謂矯乎世矣用是為誡人猶有失建元立順之徒爾烏呼世之為人臣議立裔者可勝道哉或因定䇿而専國或因援立而無君代殺殘兇何莫由斯其後滔天于莽卓盜國于曹馬移徙龜鼎易於弈棊累累簡編可為大集異乎哉先生危則助之安則捨之其來也至公于萬民其往也無私于一身前所謂進退存亡而不失其正者千古四人而已矣或曰周公相成王制禮作樂天下大定歴代仰之號為元聖豈先生之道過于周公乎愚曰不然周公成文武之業知王化可興故輔之以行道焉先生當暴秦之後知霸道終雜故去之以遠害焉周公聖之明也先生聖之晦也蓋時異而迹殊矣非所謂過乎周公者也又擬留侯與四皓書曰蓋聞有天地以來聖人曰軒轅有崆峒之請又曰帝堯有箕山之遜況乎風移世變民澆化漓北面而為臣者乎有國家之未決智慮所不及得不資取於賢士哉先生抱大道蔵大器榮辱之事出于身外興亡之理了于掌中膠漆雲泉泥滓爵位瓊林瑶池以游以息雲漿霞饌以飲以食芝君桂父先生之交也青鸞紫鳯先生之駕也龜亡鶴夭神氣愈清桂朽椿枯童顔未改萬乗不能屈其節千金不能聘其才真所謂神仙中人風塵外物然而歴觀古之聖賢未嘗不有意於民也故隱見隨其時語黙得其所進則為天下之福退則為天下之亂在暴秦勃興荼毒華夏虎猛擇肉網宻凝脂君德甚於虎狼人命輕於草芥先生知德不可輔民不可化拂衣髙蹈遁於山林其隱也可謂得其時矣今皇帝奮布衣提利劔撥大亂定大難起龍虎於豐谷㑹雲雷於泗濱席卷亂秦電掃强楚可謂英雄矣既而革秦之暴纂堯之緒定覆盂之固成垂拱之風唯於儲嗣之間忽有廢立之議臣下股慄弗敢遑寧良與帝同起於草莽間殆五六年經七十戰出竒畫䇿未嘗有一事見違唯於此時言不獲用至掉三寸舌為帝者之師封萬户侯乃布衣之極敢於此際愛死不諫乎蓋恐死而無益於國事矣又聞古之有天下者禪遜於賢今之有天下者封立其子而已德薄於古矣茍不選賢擇能立嫡立長能無毁宗社乎今太子為人元良立事正固少海流潤洊雷震聲三善克隆百技無爽帝欲廢而不用天下失望朝廷愕然先生於此時可不有意於民哉良願先生出雲關開岫幌駕𤣥鶴馭金虬俯降殿庭辱對旒冕定天下之惑決君上之疑隱見語黙之道豈獨美於昔賢耶望先生無截轅杜轡之虞發函一披則萬國幸甚蘇頲夷齊四皓優劣論曰君子疾没世而名不稱恥當年而節莫覩故發義以立志從道以成功激清一時流譽千古然立志者必義成功者必道也資於義而志可明徵於道而功可見志以立節功以成名名之成昭其道也節之立昭其義也能潔其身後代有凖非夷齊歟能利其國當時繄賴非四皓歟揆而度之優而柔之循其事而理於是乎在考其初而論於是乎著蓋周德既廣則夷齊遜國而歸焉漢業既興則四皓受命而出焉天之棄商矣諫武王正臣禮也人之戴漢矣䕶太子忠主道也忠之所存者大則正之所行者髙高而能行者節所謂立也大而能行者名所謂成也若夫志士仁人將合而已進足以成退足以立用足以兼濟否足以獨善不辱其身則安食其粟不降其志則言采其薇墨台氏之子不屈也嬴之德衰則巖穴全生劉之德盛則衣冠就列夏黄公之徒知時也舉其成事各同乎其成矣究其立事各異乎其立矣深惟終始敢無優劣統而論之其美也一別而叙之其跡也二棄身以遂志夷齊之烈矣愛國以屈身四皓之行矣曰若稽古以質乎今四皓見賢於子房夷齊稱仁於宣父與其稱仁於宣父不猶愈於見賢於子房哉趙堯東坡曰方與公謂周昌之史趙堯年雖少然竒士君必異之且代君昌笑曰堯刀筆吏何至是居頃之堯説高祖為趙王置貴彊相獨昌為可高祖用其策堯竟代昌為御史大夫至殺趙王昌亦無能為特謝病不朝耳由是觀之堯特為此計規代昌耳安能為高祖謀哉其後吕后怒堯為此計亦抵堯罪堯非獨不能為高祖謀其自謀亦不審矣昌謂之刀筆吏真不誣哉田横唐子西過田横墓詩曰成則為王敗則亡英雄成敗本尋常滄溟無際何妨死卻死東郊未耿光又曰九江梁楚竟誅夷自古才高必見疑就使酈生猶未死將軍來此亦何為昌黎祭横墓文曰事有曠百世而相感者余不自知其何心非今世之所稀孰為使余歔欷而不可禁余既博觀乎天下曷有庶幾乎夫子之所為死者不復生嗟余去此而從誰當秦氏之敗亂得一士而可王何五百人之擾擾而不能脱夫子於劔鋩抑所寳之非賢亦天命之有常昔闕里之多士孔聖亦云其遑遑茍余行之不迷雖顛沛其何傷自古死者非一夫子至今有耿光歴代名賢確論卷四十
