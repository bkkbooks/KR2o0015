body:
  text: 歴代名賢確論卷六十元帝明帝成帝哀帝王導庾亮王敦蘇峻楊䕫温公子由少游東坡石崇厠婢東坡沈勁温公祖逖子由陶侃母舒元輿王述郗超東坡孟嘉東坡王羲之曽子固劉裕平廣固獲慕容超斬王公以下三千餘人夷其城温公王導庾亮王敦蘇峻楊䕫原晉亂説曰晉室南遷制度草創承永嘉之後囂風未除廷臣中猶以謝鯤輕佻王澄曠誕競相祖習以為高逹卞壼厲色於朝曰帝祚流移社稷傾蕩職兹浮偽致此隳敗而猶欲崇慕虛誕汗蠧時風奏請鞫之以正頹俗王導庾亮抑之而止噫西晉之亂百代所悲移都江左是潔源端本之日也猶乃翼虛駕偽崇扇佻薄躡諸敗跡踵其覆轍以此創立朝綱基立王業何異登膠船而汎巨浸操朽索以馭奔駟乎設或行卞壼之奏黜浮偽登進淳實左右大法維持紀綱則晉祚亦未可量也其後王敦作逆蘇峻繼亂余以為晉之亂不自敦峻而稔於導亮子由王導論曰西晉之士借通逹以濟淫慾風俗既敗夷狄乘之遂喪中國相隨渡江而此風不改賢者知厭之矣而不勝其衆俗亂於下政弊於上而莫能正也東晉之不競由此故耳是時王導為相逹於為國之體性本寛厚有容衆人安之然生於澄衍之間不能去習俗之累喜通而疾介能彌縫一時之闕而無百年長久之計也更二大變幾至亡國元帝之世王敦擁兵上流有無君之心劉隗刁恊剛介狷淺見信於帝專以法繩公卿而深疾王氏恣橫敦遂起兵以誅君側為辭兵再犯闕幸而敦死元明既没成帝幼弱庾亮輔政任法以裁物復失人心蘇峻擅兵歴陽多納亡命專用威刑亮知峻必為亂以大司農召之衆人皆知不可而亮不聽遂與祖約連兵内向塗炭京邑此二釁者皆導之所不欲而隗亮不忍以速其變以隗亮為是邪敦峻之禍發不旋踵以導為是邪使人主終身含垢何以為國魯自宣公政在季氏更三世至昭公不能忍將攻之子家羈曰捨民數世求以克事不可必也公不從而出隗亮之敗則昭公之舉也齊景公以貪暴失民田氏以寛惠得衆公問晏嬰求其所以救之嬰曰唯禮可以已之在禮家施不及國民不遷農不移工賈不變士不濫官不滔大夫不收公利公歎曰善哉吾今而後知禮之可以為國嬰曰禮之可以為國也久矣與天地並晏子知之而景公不能用田氏遂代吕氏蓋大家世族為患於其國若腹心之疾必與人命相持為一攻之以毒藥刼之以鍼砭病若不去命輒隨盡非賢臣良醫未易處也子產為鄭國小而偪族大多寵子產患之有事伯石賂以其邑子太叔曰國皆其國也何獨賂焉子產曰無欲實難皆得其欲以從其事而要其成非我有成其在人乎何愛於邑邑將焉往子太叔曰若四國何子産曰非相違也而相從也四國何尤焉鄭書有之曰安定國家必大焉先治先安大以待其所歸既伯石懼而歸邑卒以予之又使為卿以次己位鄭乃少安及其久而政成大臣之忠儉者從而予之泰侈者因而斃之逐豐卷戮子晳鄭乃大治如導所為知賂伯石以全其始矣未知予忠儉斃泰侈以成其終也以為賢於隗亮則可以論晏子子產則遠矣東坡論庾亮召蘇峻曰庾亮召蘇峻孔坦與陶回共説王導及峻未至宜急斷阜陵之界守江西當利諸口彼少我衆一戰決矣若峻未來可往逼其城今不先往峻必先入有奪人之心導然之亮以為峻若往來是襲朝廷虛也不從及峻將至回又説亮峻知石頭有重戌不敢直下必向小丹陽南道步來若伏兵邀之可一戰而擒亮又不從果由小丹陽經秣陵迷失道逢郡人執以為向導夜行無部分亮聞之深悔吾以為召峻固失計若從二人言猶不至覆國幾於滅亡也鼂錯削七國大類此亞夫猶能速馳行入梁楚之郊故漢不敗吾嘗謂錯能容忍七國待事㑹而發固上策若不能忍決欲發者自可獨召吳王濞入朝仍發大兵隨之吳若不朝便可進討則疾雷不及掩耳吳破則諸侯服矣又當獨罪狀吳而不及餘國如李文饒輔車之詔或分遣使者發其兵諸國雖疑亦不能一旦合從俱反也錯知吳必反不先未削為反備既反而後調兵食此真兒戲也又一旦而削七國以合諸侯之交此真妄庸人也温公論蘇峻平王導加卞敦寵禄曰庾亮以外戚輔政首發禍機國破君危竄身茍免卞敦位列方鎮兵粮俱足朝廷顛覆坐觀勝負人臣之罪孰大於此既不能明正典刑又以寵禄報之晉室無政亦可知矣任是責者豈非王導乎少游論王導殺周顗曰春秋書趙盾之罪而三傳皆以為實其族穿非盾也盾為正卿亡不越境反不討賊故被大惡之名愚始疑之又讀晉史見王導周顗之事然後知三傳之説為不誣矣何則經誅其志傳述其事也王敦之舉兵也劉隗勸帝誅王導嘗求於顗顗申救甚切而不與言導心衘之及敦得志聞顗與導之不合顗遂見誅後見其表乃流涕曰吾雖不殺伯仁伯仁由我而死然則顗之死雖假手於敦實導意也若使後世良史書曰王導殺周顗不亦宜乎以此觀之則趙盾之事從可知矣夫盾以驟諌不入靈公使鉏麑賊之麑不忍殺之又伏甲而攻之僅以身免故其族穿攻靈公於桃園然則靈公之死雖假手於穿實盾之志也不然則其反也曷為其不討穿乎傳以為志同則書重信不誣矣豈非經誅其志而傳述其事耶然則穿首惡也盾疑似者也舍首惡而誅疑似者何也蓋名實俱善者天下不疑為君子心迹俱惡者天下不疑為小人有善之名無善之實有惡之心無惡之迹是為姦人者常託身於疑似之間天下莫得而誅之此春秋所以誅之也太史公以春秋别嫌疑明是非定猶豫蓋以此矣漢淮南厲王母坐趙事死厲王以為辟陽侯力能得之而不争輙椎殺之唐高宗欲立武后畏大臣異議李勣曰此陛下家事何須問外人帝意遂定唐人以為立武后者勣也由此觀之誅志不誅事非特春秋古今人情之所同然也春秋能發之耳然則王導之罪與趙盾同乎曰非也導實江左之名臣東晉之興導力為多特其殺顗之事有似盾而已石崇厠婢東坡曰王敦至崇家如厠脱故著新意色不怍厠中婢曰此客必是作賊此婢乃知人而崇令執事厠中是殆無知耶沈勁温公曰沈勁可謂能為人子矣恥父之惡致死以滌之變兇逆之族為忠義之門易曰幹父之蠱用譽蔡仲之命曰爾尚蓋前人之愆惟忠惟孝其是之謂乎祖逖子由論曰敵國相圖必審於彼已將强敵弱則利於進取將弱敵强則利於自守違此二者而求成功難矣東晉渡江以江淮為境中原雖屢有變而南兵不出出亦無功皆劉石自相屠滅而已石勒之死也庾亮為北伐之計石虎之老也庾翼為徙鎮之役皆無成而死及苻堅之敗謝安父子乘戰勝之威有席卷之意終以兵將犇潰無尺寸之得其後宋文帝自謂富强以兵挑元魏梁武志於并吞失信於高氏陳宣乘高氏之衰攘取淮南皆繼之以敗亡何者東南地薄兵脆將非命世之雄其勢固如此也方石虎之斃中原大亂晉人皆謂北方不足復平蔡謨獨以為憂或問其故謨曰夫能順天奉時濟六合於草昧若非上哲必由英豪度今諸人皆不辦此必將經營分表疲人以逞才不副意徒使財殫力竭終將何所至哉吾見韓盧東郭俱斃而已矣至哉此言實當時好事者之病也自江南建國惟桓温東討慕容西征苻堅兵鋒所及敵人震動又宋武破廣固陷長安所至蕩定有弔伐之風此二人者誠非常將也然桓温終以敗衂不能成大功宋武志在禪代未能定秦狼狽而返而况其下者乎惟晉元帝初定江南未遑北伐祖逖言於帝曰晉室之亂非上無道而下怨叛也由藩王争權自相誅滅遂使淵聰乘釁毒流中原耳今遺黎既被殘酷人有奮擊之志誠能奮威命將使若逖等為之統主郡國豪傑必有應者沈溺之志喜於來蘇庻幾國恥可雪也帝以逖為豫州刺史使進屯淮陰逖兵力甚弱乃鑄造兵器招合離散稍誅鋤叛渙復進據譙然未嘗為深入計也石勒遣兵攻逖輙就破其衆每於兵間勤身節用禮下賢俊懐撫初附專以恩信接人不尚詐力故人爭為之用自黃河以南盡為晉土雖石勒之强不敢以兵窺其境逖母塟成臯勒使人修其墓復遣使通好且求互市逖不答其使而許其市通南北之貨多獲其利方將經略河北而帝使戴若思擁節直據其上逖怏怏不得志死葢敵强將弱能知自守之為利者惟逖一人夫惟知自守之為進取而後可以言進取也哉陶侃母舒元輿陶母墳版文曰常母之道恩勝威威不勝而常子之性偏以驕出由此也偏氣襲正正氣敗績故往往恩過驕過而閨門間有觸命觝教磨去法用者相半古孟氏母警戒若此乃首以兼教軻三變而至於道去千年而陶之母亦以兼教侃侃還至於道云云父母教子大倫不逃義方然父之教主於兼之言恩威不偏勝偏失者或骨髓間有秦吳之繆故州吁石厚變為賊敵非父子邪且母之教偏在慈夫以兼教無有嚮者之繆以偏教而無嚮者之繆或鮮矣云云王述郗超東坡論王述謂子為癡曰王坦之為桓温長史温欲為子求婚於坦之及還家省父而述愛之雖長大猶抱置膝上坦之因言温意述大怒即排下曰汝竟癡邪詎可畏温面而以女妻兵坦之乃辭以他故温曰此尊君不肯耳乃止若以辭婚得罪於温以至狼狽則見述癡若以婚姻從温者則見坦之之癡王述年迫懸車上疏乞骸骨曰臣曽祖父魏司空昶白文皇帝曰昔與南陽宗世林共為東宫官屬世林少得好名州里瞻敬及其年老汲汲自謀遂見廢棄時人咸共笑之若天假其壽致仕之年不為此公婆娑之事其言慷慨乃實訓戒又論郗超小人之孝曰郗超雖為桓温腹心以其父愔忠於王室不令知之將死出一箱付門生曰本欲焚之恐公年尊必以相傷為斃我死後公若大損眠食可呈此箱不爾便燒之愔後果哀悼成疾門生依指呈之則悉與温往返密計愔大怒曰小子死恨晩更不復哭若方回者可謂忠臣矣當與石碏比然郗超謂之不孝可乎使超知君子之孝則不從温矣東坡曰小人之孝也又論王郗父子優劣曰郗嘉賔既死畱其所與桓温密謀之書一篋屬其門生曰若吾父眠食大減即出此書方回見之曰是兒死已晩矣乃不復念予讀而悲之曰士之所甚好者名也而愛莫加於父子今嘉賔以父之故而暴其惡名方回以君之故而不念其子嘉賔可謂孝子方回可謂忠臣也悲夫或曰嘉賔與桓温謀叛而子以孝子稱之可乎曰采葑采菲無以下體嘉賔之不忠不待誅絶而明者其孝可廢乎王述之子坦之欲以女與桓温述怒排坦之曰汝竟癡邪乃欲以女與兵坦之是以不與桓温之禍使郗氏父子能如此吾無間然者矣孟嘉東坡論孟嘉非無用曰晉士浮虚而無實用然其間亦有不然者如孟嘉平生無事然桓温謂嘉人不可無勢我乃能駕馭卿温平生輕殷浩豈妄許人哉乃知孟嘉若遇當作謝安安不遇如孟嘉也王羲之曾子固右軍墨池記曰臨川之城東有地隱然而高以臨於漢曰新城新城之上有池窅然而方以長曰王羲之墨池也羲之嘗慕張芝臨池學書池水盡黒方羲之不可强以仕而嘗極東方出滄海以娛其意於山水之間豈其徜徉肆恣而又嘗自休於此邪羲之之書晩乃善則其所能葢亦以精力自致者非天成也然後世未有能及之者豈其學不如彼邪則學固豈可少哉况欲深造於道德者邪劉裕平廣固獲慕容超斬王公以下三千餘人夷其城温公曰晉自濟江以來威靈不競干戈横騖塗炭中原劉裕始以王師翦平東夏不於此際旌禮賢俊慰撫疲民宣愷悌之風滌殘穢之政使羣士嚮風遺黎企踵而更恣行屠戮以快忿心迹其施設曾符姚之不如宜其不能蕩一四海成美盛之業豈非雖有智勇而無仁義使之然乎歴代名賢確論卷六十
