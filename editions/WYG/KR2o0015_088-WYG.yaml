body:
  text: 歴代名賢確論卷八十八憲宗三韓愈沈顔厚石介坡范文正公皮李漢栁子東少㳺日休李翺孟郊張籍李翺昌黎六一歐陽詹昌黎曾子固韓愈沈顔登華㫖曰嘗讀李肇國史譜云韓文公登華嶽之巔顧視其險絶恐慄度不可下乃發狂慟哭而欲縋遺書為訣且譏好竒之過也如是沈子曰吁是不諭文公之㫖邪夫仲尼之悲麟悲不在麟也墨翟之泣絲泣不在絲也且阮籍縱車於途途窮輒慟豈始慮不至耶蓋假事諷時致意於此爾前賢後賢道豈相逺文公憤趣榮貪位者之若陟懸崖險不能止俾至身危踣蹶然後歎不知稅駕之所焉可及矣悲夫文公之㫖微沈子幾晦乎石介辨謗曰介讀青州劉槩韓吏部傳論曰憲宗迎佛骨羣臣無敢言者獨吏部言之去南荒八千里此豈利于身利于道也槩於此知吏部之功也曰潮陽之湫鰐魚為害潮人患之吏部至則投文以逐之一夕盡去鰐魚厥性暴戾無識猶感其化而去焉使吏部立巖廊輔元首施其道而化天下之暴戾無識復有如鰐魚者乎必無也鰐魚可化况於人乎槩於此知吏部之道也曰史臣謂排釋老於道未大不知大其道者復何也槩於此知吏部之尊也曰諱辨其㫖不獨為賀有激於時爾凡人怠於敦孝而亟於避諱甚無取也槩於此知吏部之孝也曰鯀無德於民猶有靈於晉國宗元有徳於民豈無靈於羅池者乎吏部碑之何所不可槩於此知吏部之是也曰平蔡碑非不善也信一婦人而磨之焉知實錄不類蔡碑槩於此知吏部之受誣也范文正公曰予觀堯典舜歌而下文章之作醇醨迭變代無窮乎惟抑末揚本去鄭復雅左右聖人之道者難之近則唐貞元元和之間韓退之主盟于文而古道最盛懿僖以降寖及五代其體薄弱李漢曰文者貫道之器也不深於道有至焉者不也易繇爻象春秋書事詩詠歌書禮剔其偽皆深矣乎秦漢以前其氣渾然迨乎司馬遷相如董生揚雄劉向之徒尤所謂傑然者也至後漢曹魏氣象萎薾司馬氏已來規範蕩析謂易已下為古文剽掠僣竊為工耳文與道蓁塞固然莫知也先生生於大厯戊申幼孤隨兄播遷韶嶺兄卒鞠於嫂氏辛勤來歸自知讀書為文日記數千百言比壯經書通念曉析酷排釋氏諸史百子搜抉無隱汗瀾卓踔奫沄澄深詭然而蛟龍翔蔚然而虎鳳躍鏘然而韶鈞鳴日光玉潔周情孔思千態萬狀卒澤於道徳仁義炳如也洞視萬古愍惻當世遂大拯頺風教人自為時人始而驚中而笑且排先生益堅終而翕然隨以定嗚呼先生於文摧陷廓清之功比於武事可謂雄偉不常者矣栁子厚韓愈毛頴傳後曰自吾居夷不與中州人通書有來南者時言韓愈為毛頴傳不能舉其辭而獨大笑以為怪而吾乆不克見楊子誨之來始持其書索而讀之若捕龍蛇搏虎豹急與之角而力不敢暇信韓子之怪於文也世之模擬竄竊取青媲白肥皮厚肉柔筋脆骨而以為辭者之讀之也其大笑固宜且世人笑之也不以其俳乎而俳又非聖人之所棄者詩曰善戲謔兮不為虐兮太史公書有滑稽列傳皆取乎有益於世者也故學者終日討說答問呻吟習復應對進退掬溜播灑則罷憊而廢亂故有息焉游焉之説不學操縵不能安絃有所拘者有所縱也太羮𤣥酒體節之薦味之至者而又設以竒異小蟲水草楂梨橘柚苦醎酸辛雖蜇吻裂鼻縮舌澀齒而咸有篤好之者文王之昌蒲菹屈到之芰曾晳之羊棗然後盡天下之竒味以足於口獨文異乎韓子之為也亦將弛焉而不為虐歟息焉㳺焉而有所縱歟盡六藝之竒味以足其口歟而不若是則韓子之辭若壅大川焉其必決而放諸陸不可以不陳也且凡古今是非六藝百家大細穿穴用而不遺者毛頴之功也韓子窮古書好斯文嘉穎之能盡其意故奮而為之傳以發其鬱積而學者得之勵其有益於世歟是其言也固與異世者語而貪常嗜瑣者猶呫呫然動其喙彼亦勞甚矣乎又論曰退之所為者司馬遷揚雄遷於退之固相上下若雄者如太𤣥法言及四愁賦退之獨未作耳使作之加恢竒至他文過揚雄逺甚雄之遣言措意頗短局滯澀不若退之猖狂恣睢肆意有所作云云東坡曰韓愈亦近世豪傑之士如原道中言語雖有疵病然自孟子之後能將許大見識尋求古人自亦難得觀其斷曰孟子醇乎醇荀揚擇焉而不精語焉而不詳若不是他有見識豈千餘年後便斷得如此分明如揚雄言老子謂之道徳則有取焉爾至於槌提仁義絕滅禮樂為無取若以老子剖斗折衡而民不爭聖人不起為救時反本之言為無取尚可恕如老子言失道而後德失徳而後仁失仁而後義失義而後禮則不識道已不成言語却言其言道徳則有取揚子亦目不見道此其與韓愈相去逺矣又論曰歐陽文忠公嘗謂晉無文章惟陶淵明歸去來一篇而已余亦以謂唐無文章惟韓退之送李愿歸盤谷序一篇而已平生願効此作一篇毎執筆輒罷因自笑曰不若且放教退之獨步又論曰聖人之道有趨其名而好之者有安其實而樂之者珠璣象犀天下莫不好奔走悉力争鬭奪取其好之不可謂不至也然不知其所以好之之實至於粟米蔬肉桑麻布帛天下之人内之於口而知其所以為美被之於身而知其所以為安此非有所役乎其名也韓愈之於聖人之道蓋亦知好其名矣而未能樂其實何者其為論甚髙其待孔子孟軻甚尊而拒楊墨佛老甚嚴此其用力亦不可謂不至也然其論至於理而不精支離蕩佚往往自叛其説而不知昔者宰我子貢有若更稱其師以為生民以來未有如夫子之盛雖堯舜之賢亦所不及其尊道好學亦已至矣然而君子不以為貴曰宰我子貢有若智足以知聖人之汙而已矣若夫顔淵豈亦云爾哉蓋亦曰夫子循循焉善誘人由此觀之聖人之道果不在於張而大之也韓愈者知好其名而未能樂其實者也愈之原人曰天者日月星辰之主也地者山川草木之主也人者飛潛動植之主也主而暴之不得其為主之道矣是故聖人一視而同仁篤近而舉逺夫聖人之所為異乎墨者以其有别焉耳今愈之言曰一視而同仁則是以待人之道待夫萬物是愛無差等之説也而可乎教之使有能化之使有知是待人之仁也不薄其禮而致其情不責其去而厚其來是待外國之仁也殺之以時而用之有節是待禽獸之仁也若之何其一之儒墨之相戾不啻若胡越而其疑似之間相去不能以髪宜乎愈之以為一也孔子曰汎愛衆而親仁仁者之為親則是孔子不兼愛也祭如在祭神如神在神不可知而祭者之心以為如其存焉則是孔子不明鬼也儒者之患患在於論性以為喜怒哀樂皆出於情而非性之所有夫有喜有怒而後有仁義有哀有樂而後有禮樂以為仁義禮樂皆出於情而非性則是相率而為老子之嬰兒也嗟夫君子之為學知其人之所長而不知其蔽豈可謂善學者耶又論曰匹夫而為百世師一言而為天下法是皆有以參天地之化闗盛衰之運其生也有自來其逝也有所為矣故申吕自嶽降而傅說為列星古今所傳不可誣也孟子曰吾善養吾浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辯是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者自東漢以來道喪文弊異端並起歴唐貞觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸於正蓋三百年於此矣文起八代之衰而道濟天下之溺忠犯人主之怒而勇奪三軍之帥此豈非參天地闗盛衰浩然而獨存者乎蓋嘗論天人之辨以謂人無所不至惟天不容偽智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能馴鰐魚之暴而不能弭皇甫鎛李逢吉之謗能信於南海之民廟食百世而不能使其身一日安於朝廷之上蓋其所能者天也其所不能者人也始潮人未知學公命進士趙徳為之師自是潮之士皆篤於文行延及齊民至于今號稱易治信乎孔子之言君子學道則愛人而小人學道則易使也云云秦少游論曰先王之時一道徳同風俗士大夫無意於為文故六藝之文事詞相稱始終本末如出一人之手後世道術為天下裂士大夫始有意於為文故自周衰以來作者班班相望而起奮其私知各自名家總而論之未有如韓愈者也何則夫所謂文者有論理之文有論事之文有叙事之文有託詞之文有成體之文探道徳之理述性命之情發天人之奥明死生之變此論理之文如列禦冦莊周之所作是也别白黒隂陽要其歸宿決其嫌疑此論事之文如蘇秦張儀之所作是也考同異次舊聞不虚美不隱惡人以為實録此叙事之文如司馬遷班固之作是也原本山川極命草木比物屬事駭耳目變心意此託詞之文如屈原宋玉之作是也鈎列莊之微挟蘇張之辯摭班固之實獵宋屈之英本之以詩書折之以孔氏此成體之文韓愈之所作是也蓋前之作者多矣而莫有備於愈後之作者亦多矣而無以加於愈故曰總而論之未有如韓愈者也然則列莊蘇張班馬屈宋之流其學術才氣皆出於愈之文猶杜子美之於詩實積衆家之長適當其時而已昔蘇武李陵之詩長於髙妙曹植劉公幹之詩長于豪逸陶􅅗阮籍之詩長於沖澹謝靈運鮑照之詩長於峻潔徐陵庾信之詩長於􅍨麗於是杜子美者窮髙妙之格極豪逸之氣包沖澹之趣兼峻潔之姿備􅍨麗之態而諸家之作所不及焉然不集諸家之長杜氏亦不能獨至於斯也豈非適當其時故耶孟子曰伯夷聖之清者也伊尹聖之任者也栁下恵聖之和者也孔子聖之時者也孔子之謂集大成嗚呼杜氏韓氏亦集詩文之大成者歟皮日休請韓文公配享書曰於戲聖人之道不過乎求用用於生前則一時可知也用於死後則百世可知也故孔子之封賞自漢至隋其爵不過乎公侯至於吾唐乃策王號七十子之爵命自漢至隋或卿大夫至於吾唐乃封公侯曾參之孝道動天地感鬼神自漢至隋不過乎諸子至於吾唐乃旌入十哲噫天地乆否忽泰則平日月乆昏忽開則明雷霆乆息忽震則驚雲霧乆鬱忽廓則清仲尼之道否於周秦而昏於漢魏息於晉宋而鬱於陳隋遇於吾唐萬世之憤一朝而釋儻死者可作其志可知也今有人身行聖人道口吐聖人言行如顏閔文若游夏死不得配食於夫子之側吾又不知尊先聖之道也夫孟子荀卿翼傳孔道以至於文中子文中子之末降及貞觀開元其傳者醨其繼者淺或引刑名以為文或援從横以為理或作詞賦以為雅文中子之道曠百祀而得室授者惟昌黎文公公之文蹴楊墨於不毛之地蹂釋老於無人之境故得孔道危然而自正夫今之文人千百祀之作釋其巻觀其詞無不禆造化補時政繫公之力也公之文曰僕自度若世無孔子僕不當在弟子之列設使公生孔子之世公未必不在四科焉國家以二十一賢者若左丘明卜子夏公羊髙穀梁赤伏勝髙堂生戴勝毛公孔安國劉向鄭衆杜子春馬融盧植鄭康成伏子慎何休王肅王輔嗣杜元凱范甯代用其書垂於國胄並配享於孔聖廟堂者其為典禮也大矣美矣茍以代用其書得不以釋聖人之辭箋聖人之義哉况有身行其道口傳其文吾唐以來一人而已不得在二十一賢之列則未聞乎典禮為備伏請命有司定其配享之位則自兹已後天下以文化未必不由夫是也李翺祭文曰嗚呼孔氏云逺楊朱恣行孟軻拒之乃壞於佛佛教混華異學魁宏兄嘗辯之孔道益明建武以還文卑質喪氣萎體敗剽剥不讓儷花鬭葉顛倒相上及兄之為思動鬼神撥去其華得其本根開合怪駭驅濤湧雲包劉越嬴並武同殷六經之風絕而後新學者有歸大變於文兄之仕宦罔辭于難疏奏輒斥去而復還昇黜不改正言亟聞云云老耼言夀死而不亡兄名之垂星斗之光我譔兄行下于太常聲殫天地誰云不長孟郊張籍李翺昌黎曰大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得已者而後言其歌也有思其哭也有懷凡出乎口而有聲者其皆有弗平者乎樂也者鬱於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推􅟃其必有不得其平者乎其於人也亦然人聲之精者為言文辭之於言又其精也尤擇其善鳴者而假之鳴其在於唐虞咎陶禹其善鳴者也而假以鳴䕫弗能以文辭鳴又自假於韶以鳴夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之辭鳴於楚楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老耼申不害韓非慎到田駢鄒衍尸佼孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相如揚雄最其善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絕也就其善鳴者其聲清以浮其節數以急其辭滛以哀其志弛以肆其為言也亂雜而無章天將醜其徳莫之顧邪何為乎不鳴其善鳴者也唐之有天下陳子昂蘇源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其髙出晉魏不懈而及于古其他浸滛乎漢氏矣從吾游者李翺張籍其尤也三子者之鳴信善鳴矣抑不知天將和其聲而使鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸耶三子者之命懸乎天矣其在上也奚以喜其在下也奚以悲云云六一論李翺文曰予始讀其復性書三篇曰此中庸之義疏耳智者議其性當復中庸愚者雖讀此不曉也不作可焉又讀與韓侍郎薦賢書以謂翺特窮時憤世無薦已者故丁寜如此使其得志亦未必然以翺為秦漢間好事行義之一豪雋亦善諭人者也最後讀幽懷賦然後置書而嘆不已復讀不自休恨翺不生於今不得與之交又恨予不得生翺時與翺上下其論也况廼翺一時有道而能文者莫若韓愈愈嘗有賦矣不過羡二鳥之光榮歎一飽而無時爾推是心使光榮而飽則不復云矣若翺獨不然其賦曰衆囂囂而雜處兮咸歎老而嗟卑視予心之不然兮慮行道之猶非怪神堯以一旅取天下後世子孫不能以天下取河北以為憂嗚呼使當時君子皆易其歎老嗟卑之心為翺所憂之心則唐之天下豈有亂與亡哉然翺幸不生今時見今之事則憂之又甚矣奈何今之人不憂也予行天下見人多矣脱有一人能如翺憂者又皆賤逺與翺無異其餘光榮而飽者一聞憂世之言不以為狂人則以為病子不怒則笑之矣嗚呼在位而不肯自憂又禁他人使皆不得憂可嘆也夫歐陽詹昌黎曰歐陽詹世居閩越自詹已上皆為閩越官至州佐縣令者累累有焉閩越地肥衍有山泉禽魚之樂雖有長材秀民通文書吏事與上國齒者未嘗肯出仕今上初故宰相常衮為福建諸州觀察使治其地衮以文詞進有名於時又作大官臨莅其民鄉縣小民有能誦書作文辭者衮親與之為客主之禮觀游讌饗必召與之時未幾皆化翕然詹于時獨秀出袞加敬愛諸生皆推服閩越之人舉進士繇詹始建中貞元間余就食江南未接人事往往聞詹名閭巷間詹之稱於江南也乆貞元三年余年十九始至京師舉進士聞詹名尤甚八年春遂與詹文辭同考試登第始相識自後詹歸閩中余或在京師他處不見詹乆者惟詹歸閩中時為然其他時與詹離率不歴嵗移時則必合合必兩忘其所趨乆然後去故余與詹相知為深詹事父母盡孝道於妻子仁於朋友義以誠氣醇以方容貌嶷嶷然其燕私善謔以和其文章切深喜往復善自道讀其書知其於慈孝最隆也十五年冬余以徐州從事朝正於京師詹為國子監四門助教將率其徒伏闕下舉余為博士㑹詹有獄不果上觀其心有益於余將忘其身之賤而為之也嗚呼詹今其死矣詹閩越人也父母老矣捨朝夕之養以來京師其心將以有得而歸為父母榮也雖其父母之心亦皆然詹親在側雖無離憂其志不樂也詹在京師雖有離憂其志樂也若詹者所謂以志養志者歟詹雖未得位其聲名流於人人其徳行信于朋友雖詹與其父母皆可無憾也云云曾子固曰韓愈作歐陽詹哀辭其序曰讀其書知其於仁孝最隆也余觀其出門懷歸等賦思曰愈之所稱豈謂此耶又觀其陶器銘駑驥詩等則悲生之志焉至棧道銘觀其鑄金蒸雲之論至珍祥論觀其反復諷諭則又知生之尤魁怪於文而其材果竒也最後觀其明誠論卒曰知之者知之委之者知之知生於此甚自負其説三四觀之而其說皆不出於舊生卒無已見者不知生於此何其自大也則又思余舅氏吳君嘗論斥生之所謂尹喜自明誠而長生公孫𢎞自明誠而為卿張子房自明誠而輔劉公孫鞅自明誠而佐嬴之者為非是明誠之非為長生為卿非尹喜公孫子房商君之所能至其理較然舅氏之論無疑矣此於生為一失於舅氏非其意所極也與生材髙下如何故不可知其可知者舅氏之從事於明誠可謂知所守矣不溺而趨於為長生為卿為子房之譎商君之刻薄可必也則其材亦誠卓然可畏者也惜乎死矣不得見其施之於行事而其論與其集今皆亡使其有補於生與後世者獨余知之而世不得盡知也云云歴代名賢確論卷八十八
