body:
  text: 歴代名賢確論卷九十八通論四君臣之失孫樵宰相兼度支東坡官品廢置張唐英裴延齡皇甫鎛石守道七愛皮日休唐之文人東坡梁肅孫何子厚唐之詩人獨孤及司空圖東坡君臣之失孫樵曰孫樵謂陸長源唐春秋乃編年雜録因掇其潔切峭獨可以示懲勸者擲其藂冗秃屑不足以警訓者自為十八通書號孫氏西齋録起髙祖之初武皇之終首廟號以表元首日月以表事尚功力正刑名登崇善良蕩戮兇回有所鯁避則㣲文示譏無所顧慄直書志匿所謂髙祖殺太子建成者何黜功徇愛譏失教也太宗有大功宜嗣有天下髙祖不當立建成為太子至有六月二十四日事故書曰髙祖殺太子建成李勣立皇后武氏者何忘諫贊慝懲廢命也李勣為顧命大臣儻堅諫不奪髙宗不敢立武氏為后故書曰李勣立皇后武氏起王氏已廢之魂上配天皇者何登嫌黜家不可謂順予懼後世疑於禘祼也髙宗廢王立武武乃貞觀侍女何以列昭穆故特以王后配髙宗示天后有嫌於禘祼條髙后擅政之年下繫中宗者何紫色閏位不可謂正予懼後世牽以稱臨也天后改元即真今悉以天后年號及行事繫于中宗示女子不得改元有政也崔察賊殺中書令裴炎者何詭諛梯亂肇殺機也裴為顧命大臣屢白天后歸政御史崔察廷詰曰裴若不有異謀何故使太后歸政天后遂怒斬裴放都亭蜀故書曰崔察賊殺中書令裴也張守珪以安禄山叛者何貸刑咈教稔禍階也禄山乃張守珪部將嘗犯令張曲江令守珪斬之張不從果使亂天下故書曰張守珪以安禄山叛他皆倣此云云宰相兼度支東坡對制䇿曰制䇿有周以冡宰制國用唐以宰相兼度支錢榖大計也兵師大衆也何陳平之對謂當責之内史韋賢之言不宜兼於宰相臣以為宰相雖不親細務至於錢榖兵師固當制其贏虚利害陳平所謂責之内史者特以宰相不當治其簿書多少之數耳昔唐之初以郎官領度支而職事以治及兵興之後始立使額參佐既衆簿書益繁百弊之源自此而始其後裴延齡皇甫鎛皆以剥下媚上至於希世用事以宰相兼之誠得防姦之要而韋賢之議特以其權過重歟故李徳裕以為賤臣不當議令臣常以為有宰相之風矣官品廢置張唐英論曰武徳定文武官品並踵開皇之制天下郡縣多從省併至貞觀九年文皇以官多則事煩遂減内外文武官六百四十三員而天下役省民安咸亨天授已後務廣員品以收人情大置試官以處之及李嶠為吏部侍郎欲收衆譽以取宰相之位大置員外官二千餘員又有特置同正員又有檢校攝判之名於是官紀大壞爵禄無准賢愚為之一混府庫為之一空開元以來始裁制度尚書省以統㑹衆務門下省以侍從獻替中書省以出納制誥秘書省以總領圖書御史臺以肅清百寮殿中丞以供修服膳内侍省以承㫖奉引又有九寺五監分理羣司六軍十二衛以嚴武備而官品有條矣又分天下為十道以統領四方之政然判司簿尉頗多矣代宗詔京兆府長安各減丞一員部二員天下縣各減一員元和中李吉甫奏併省吏員當時天下翕然稱治裴延齡皇甫鎛石守道論其姦邪曰歴代凡主皆以財為私自古姦臣皆以財利求進吁君以財貨狥欲臣以財利啗君上下以利為國欲國不亂欲民不散是必不可得也夫庸君得其欲雖宗社崎危而不之顧也姦臣得其進雖國家傾覆而不知變也是知姦臣不可進陸贄之疏言之備矣後人宜戒之嗚呼天之佑於民也至矣既生聖人使君之又生賢人使輔之葢以謂聖人無賢輔雖有天下不能治賢人無聖君雖有才能無所施也故天為並生聖賢使同治人也聖人為君賢人為臣君臣之位則别其任則一也君尊也馭臣下則以法然而待之必以禮臣卑也事君上則以禮然而輔之必以道君待臣不以禮臣輔君不以道則亂可待也故君有過失臣得以規之君有荒慢臣得以諫之君違則臣得弼君闕則臣得補葢天下乃天下之天下也非君之天下也庸君昏主承父兄餘業憑祖宗遺緒自謂尊為萬乗富有四海威可以專生殺權可以擅刑賞黜陟在己誅伐任情違正人之言咈莊士之諫一辭忤㫖則竄逐一事不從則疎逺昵近羣小捐斥忠良至於教化陵遲綱紀頽壞海内咨怨君子潛藏一旦祖父之業為丘墟宗廟之鬼不血食可哀也哉賢人不可疎也姦邪不可近也疎且不可其可廢之乎近且不可其可任之乎臣請以唐為鑑焉七愛房𤣥齡李白杜如晦白居易李晟盧潘元魯山皮日休曰皮子之志常以真純自許每謂立大化者必有真相以房杜為真相焉定大亂者必有真將以李太尉為真將焉傲天君者必有真隠以盧徴君為真隠焉鎮澆俗者必有真吏以元魯山為真吏焉負逸氣者必有真放逸以李翰林為真放逸焉名臣者必在真才以白太傅為真才焉嗚呼吾之道時邪行其事也在乎愛忠矣不時邪行其事也亦在乎愛忠矣茍有心歌詠者豈徒然哉云云唐之文人東坡曰唐之古文自韓愈始其後學韓而不至者為皇甫湜學皇甫湜不至者為孫樵自樵以降無足觀矣梁肅曰文之作上所以發揚道徳正性命之紀次所以裁成典禮厚人倫之義又所以昭顯義類立天下之中三代之後其流派别炎漢制度以霸王道雜之故其文亦二賈生馬遷劉向班固其文博厚出於王風者也枚叔相如揚雄張衡其文雄富出於霸塗者也其後作者理勝則文薄文勝則理消理消則言愈繁斯亂矣文薄則意愈巧斯弱矣故文本於道失道則博之以氣氣不足則節之以辭葢道能兼氣氣能兼辭辭不當則文斯敗矣唐有天下幾二百載而文章三變初則廣漢陳子昂以風雅革浮侈次則燕國張公説以宏茂廣波瀾天寳以還則李員外蕭功曹賈常侍獨孤常州比肩而作故其道益熾若乃其辭辨博馳騖古今之際高步天地之間則有左補闕李翰云云叙治亂則明白坦蕩衍餘條暢端如貫珠之可觀也陳道義則游泳性情探㣲豁㝠渙乎春冰之將泮也廣勸戒則得失相維吉凶相追倬乎元龜之在前也頌功美則温直顯融協于大中穆如清風之中人也議者又謂翰之才若崇山出雲神禹𨗳河觸石而彌六合隨山而注巨壑葢無物足以遏其氣而閡其行者也世所謂文章之雄捨翰其誰與云云孫何曰夫治世之具莫先乎文文之要莫先乎理文必理而方工者惟論議為最然繇斯而談則駕説立言者不得不以為己任也唐虞已往治道尚簡三代之際見於六經此不書也兩漢間鴻儒間出猶為黄老刑名權霸所雜魏晉已降文體卑賤固不足論若乃羽􅁎翼孔卓爾大得根仁柢義動為世法者獨唐賢為最所著論議傑然尤異者若牛相僧孺從道善惡無餘皇甫湜紀傳編年夷惠清和獨孤常州及呉季札權文公徳輿兩漢辨士等論高僕射郢魯用天子禮樂韓吏部愈范蠡與大夫種書吕衡州溫功臣恕死白宫傅居易晉恭世子等議或意出千古或理鎮羣疑或重定褒貶之誤或再正名教之失無之足以惑後人有之足以張吾道云云子厚曰贊曰文之用辭令褒貶導揚諷諭而已雖其言鄙野足以備於用然而闕其文采固不足以竦動時聴夸示後學立言而朽君子不由也故作者抱其根源而必由是假道焉作於聖故曰經述於才故曰文文有二道辭令褒貶本乎著述者也導揚諷諭本乎比興者也著述者流葢出於書之謨訓易之象系春秋之筆削其要在於髙壯廣厚詞正而理備謂宜藏於簡冊也比興者流葢出於虞夏之詠歌殷周之風雅其要在於麗則清越言暢意美謂宜流於謡誦也兹二者考其㫖義乖離不合故秉筆之士恒偏勝獨得而罕有兼者焉厥有能而專美命之曰藝成雖古文雅之盛世不能並肩而生唐興以來稱是選而不怍者梓潼陳拾遺其後燕文貞以著述之餘攻比興而莫能極張曲江以比興之隙窮著述而不克備其餘各探一隅相與背馳於道者其去彌逺文之難兼斯亦甚矣唐之詩人獨孤及曰五言詩之源生於國風廣於離騷著於李蘇盛於曹劉其所自逺矣當漢魏間雖已朴散為器作者猶質有餘而文不足以今揆昔則有朱絃䟽越大羹遺味之歎歴千餘嵗至沈詹事宋員外始財成六吕彰施五色使言之而中倫歌之而成聲縁情綺靡之功至是乃備雖去雅寖逺其麗有過於古者亦猶路鼗出於土鼓篆籕生於鳥跡也沈宋既歿而崔司勲顥王右丞維復崛起於開元天寳之間得其門而入者當代不過數人補闕其人也補闕皇甫冉司空圖曰文之難而詩之難尤難古今之喻多矣而愚以為辨於味而後可以言詩也江嶺之南凡是資於適口者若醯非不酸也止於酸而已若鹺非不鹹也止於鹹而已華之人所以充饑而遽輟者知其鹹酸之外醇美者有所之耳彼江嶺之人習之而不辨也宜哉詩貫六義則諷諭抑揚淳蓄淵雅皆在其間矣然直叛所得以格自奇前輩諸集亦不專工於此矧其下者耶王右丞韋蘇州澄澹精緻格在其中豈妨於道舉哉賈閬仙誠有警句視其全篇意思殊餒大抵附寒澀方可置才亦為體之不備也又曰工之尤者莫若伎於文章其能不死於詩者比他伎尤寡豈可容易較量哉國初主上好文雅風流特盛沈宋始興之後傑出於江寧宏肆於李杜極矣右丞蘇州趨味澄夐若清流之貫達大厯十數公抑又其次焉力勍而氣孱乃都市豪右耳劉夢得楊巨源亦各有勝㑹閬仙無可劉得仁輩時得佳致亦足滌煩厥後所聞逾褊淺矣又題栁栁州集後曰金之精麤效其聲皆可辨也豈清於磬而渾於鐘哉然則作者為文為詩才格亦可見豈當善於彼而不善於此耶愚觀文人為詩詩人為文始皆繫其所尚所尚既專則搜研愈至故能炫其工於不朽亦猶力巨而鬭者所持之器各異而皆能濟勝以為勍敵也愚嘗覽韓吏部歌詩累百首其驅駕氣勢若掀雷決電撑抉於天地之垠物狀其變不得鼔舞而徇其呼吸也其次皇甫祠部文集外所作亦為超逸非無意於深宻葢或未遑耳今於華下方得栁詩味其探搜之致亦深逺矣俾其窮而克夀抗精極思則固非瑣瑣者輕可擬議其優劣又嘗觀杜子美祭太尉房公文李太白佛寺碑賛宏拔清厲乃其歌詩也張曲江五言沈鬱亦其文章也豈相傷哉噫後之學者褊淺片詞隻句未能自辨已側目相詆訾矣痛哉因題栁集之末庶俾後之銓評者罔惑偏説以葢其全云東坡曰予嘗論書以謂鍾王之迹蕭散簡逺好在筆畫之外至唐顔栁始集古人筆法而盡發之極書之變天下翕然以為宗師而鍾王之法益微至於詩亦然蘇李之天成曹劉之自得陶謝之超逸葢亦至矣而杜子美李太白以英偉絶世之姿凌跨百代古今詩人盡廢然魏晉以來高風絶塵亦少衰矣李杜之後詩人繼出雖間有逺韻而才不逮意獨韋應物栁宗元發纎穠於簡古寄至味於淡泊非餘子所及也唐末司空圖崎嶇兵亂之間而詩文高雅猶有承平之遺風其論詩曰梅止於酸鹽止於鹹飲食不可無鹽梅而其美常在於酸鹹之外葢自列其詩之有得於文字之表者二十有四韻恨當時不識其妙余三復其言而悲之歴代名賢確論卷九十八
