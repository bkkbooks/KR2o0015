body:
  text: 歴代名賢確論卷十九襄公公敗于泓東坡潁濱獻公世子申生白樂天荀息東坡文公守原栁州文公霸栁州厲公士燮東坡悼公智罃趙武潁濱平公叔向潁濱智伯智伯之亡栁州溫公通論文公悼公潁濱晉之故封栁州公敗于泓東坡曰魯僖公二十二年冬十有一月己巳朔宋公及楚人戰于泓宋師敗績春秋書戰未有如此之嚴而盡也曰宋公天子之上公宋先代之後于周為客天子有事膰焉有喪拜焉非列國諸侯之所敢敵也而曰及楚人戰于泓楚夷狄之國人㣲者之稱以天子之上公而當夷狄之㣲者至于敗績宋公之罪盖可見矣而穀梁傳以為桓文之師不過是學者疑焉故不可以不辨宋襄公非特行仁義而不終者也以不仁之資盗仁者之名耳齊王有牽牛而過堂下者曰牛何之曰將以釁鐘王曰舍之吾不忍其觳觫若無罪而就死地夫舍一牛於德未有所損益也而孟子與之所謂以不忍人之心行不忍人之政三代之所共也而宋襄公執鄫子用於次睢之社君子殺一牛猶不忍而宋公滅一國君若犬豕然此而忍為之天下孰有不忍者耶泓之役身敗國衂乃欲以不重傷不禽二毛欺諸侯人能紾其兄之臂以取食而能忍饑于壺飱者天下知其不情也襄公忍于鄫子而不忍於重傷二毛此豈其情也哉桓文之師存亡繼絶猶不齒于仲尼之門况用人於夷鬼以求霸而謂之王者之師可乎使鄫子有罪而討之雖聲之諸侯而戮於社天下不以為過若以喜怒興師則秦穆獲晉侯且猶釋之而况敢用諸淫昬之鬼乎以愚觀之宋襄公王莽之流也襄公以諸侯可以名得而王莽以天下可以文取其得喪大小不同其不能欺天下則同也其不鼔不成列則不能損宋襄公之虐其抱孺子以泣則不能盖王莽之簒使莽無成則宋襄公襄公得志亦一莽也古人有言曰圖王不成猶足以霸襄公行王者之事則其敗猶足以當桓文之師一戰之餘救死扶傷不暇此特妄庸耳齊桓晉文得管仲子犯以興襄公有一子魚不能用豈可同日而語哉自古失道之若如是者多矣身死而論之未有如宋襄公之欺於後世者也潁濱曰宋襄公欲求諸侯與楚人戰于泓不鼓不成列不禽二毛以此兵敗身死而公羊嘉之以為文王之戰不過于此余竊笑之夫㐮公凌虐小國至使邾人用鄫子于次睢之社雖桀紂有不為也乃欲以不鼔不成列不禽二毛為文王不過亦甚矣哉夫堯舜文武其所以自為者至矣始于其身而終至于其室家仰不愧于天俯不怍于人夫是以干羽可以格三苖因壘可以服有崇不然將敗折自救之不暇而况以服人哉嗚呼儒者不原本末而惑于虚名將以杯水勝輿薪之火悲夫世子申生白樂天曰晉侯以驪姬之惑殺太子申生或謂申生得殺身成仁之道是以晉人諡為恭世子載在方册古今以為然居易獨以為不然大凡恭之義有三以孝保身子之恭以正承命臣之恭以道守嗣君之恭若棄嗣于非禮不可謂道受命于非義不可謂正殺身以非罪不可謂孝三者率非恭也申生有焉而諡曰恭不知其可若垂之來代以為訓戒居易懼後之臣子有失大義守小節者將奔走之將欲商搉敢徵義類在昔虞舜父頑母嚚舜既克諧瞽亦允若申生父之昬姬之惡誠宜率子道以幾諫感君心以至誠雖申生孝不侔於舜而獻公之頑亦不逺于瞽盍以烝烝之乂俾不格於姦乎故咎之始形則齋慄祗載而為虞舜可也若不能及禍之將兆則讓位去國為吳太伯可也若又不能及難之既作則全身逺害為公子重耳可也三失無一得於是乎致身於不義不祗陷父于不德不慈負罪被名以至于死臣子之道不其惑歟夫以堯之聖書美曰允恭舜之孝書美曰温恭今以申生之失道亦謂曰恭庸可稱乎周之衰也楚子以霸王之器奄有荆蠻光啓土宇赫赫楚國由之而興諡之為恭猶曰薄德今申生狥其死不顧其義輕其身不圖其君俾死之後弑三君奚齊卓子懷公殺十有五臣荀息里克丕鄭祁舉共華賈華叔堅騅顓櫐虎持宫山祁慶鄭狐突瑕生郤芮實啓禍先大亂晉國則楚恭之得也如彼申生之失也如此異德同諡無乃不可乎左氏修魯史受經于仲尼盖仲尼之志丘明從而明之無善惡無小大莫不㣲婉而發揮焉至于申生之死也之謚也略而無譏何其謬哉何以覈諸且仲尼修春秋明則有凡例幽則有㣲㫖其有君不君臣不臣父不父子不子者率書名以貶之故書曰晉侯殺其太子申生不言晉人而書晉侯且名太子者盖明晉侯不道且罪申生陷君父於不義也以㣲㫖考之則仲尼之明貶可知矣以凡例推之則左氏之闕文可知矣嗚呼先王之制諡豈容易哉盖善惡始終必褒貶于一字所以彰明往者而勸沮來者故君子于其諡無所茍而已矣繇是而言則恭世子之諡不亦誣乎不亦誣乎荀息東坡曰荀息疑於忠者也其事君也君存不能正其道没又成其邪志而死焉荀息而為忠則凡忠於盗賊死於私暱者皆忠也而可乎故其書曰及其大夫荀息不然則荀息孔父之徒也可得而名哉春秋不與荀息之為忠也推此而往則凡天下之得為正者庶乎不濫矣守原栁州曰晉文公既受原于王難其守問寺人勃鞮以畀趙衰余謂守原政之大者也所以承天子樹霸功致命諸侯不宜謀及媟近以沗王命而晉君擇大任不公議于朝而私議于宫不博謀于卿相而獨謀于寺人雖或衰之賢足以守國之政不為敗而賊賢失政之端由是滋矣况當其時不乏謀議之臣乎狐偃為謀臣先軫將中軍晉君疏而不咨外而不求乃卒定于内豎其可以為法乎且晉君將襲齊桓之業以翼天子乃大志也然而齊桓任管仲以興進豎刁以敗則獲原啓疆適其始政所以觀視諸侯也而乃背其所以興跡其所以敗然而能霸諸侯者以土則大以力則强以義則天子之册也誠畏之矣烏能得其心服哉其後景監得以相衞鞅𢎞石得以殺望之誤之者晉文公也嗚呼得賢臣以守大邑則問非失問舉非失舉也然猶羞當時陷後代如此况問與舉又兩失之者其何以救之哉余故著晉君之罪以附春秋許世子止晉趙盾之義文公霸栁州曰文公之霸也援秦破楚囊括齊宋曹衞解裂魯鄭震恐定周于溫奉册受錫夾輔糾逖以為侯伯齊盟踐土低昂玉帛天子恃焉以有諸侯諸侯恃焉以有其國百姓恃焉以有妻子而食其力叛者力取附者仁撫推德義立信讓示必行明所嚮逹禁止一好尚春秋之事公侯大夫策文馬馳軒車出入環連貫于國都則有五筵之堂九几之室大小定位左右有職禽牢餼饋交錯文質饗有嘉樂宴有庭實登降好賦犧象畢出犒勞贈賄率禮無失六卿理兵大戎小戎鐘鼓不寧以討不恭車埓萬乗卒半天下鼓之則震斾之則畏其號令之動若水之源若輪之旋莫不如志當此之時咸能驩虞以奉其上故其民至於今好義而任力此以民力自固假仁義而用天下其遺風尚有存者士燮東坡曰料敵勢之强弱而知師之勝負此將帥之能也不求一時之功愛君以德而全其宗嗣此社稷之臣也鄢陵之役楚師壓晉軍而陣諸將請從之范文子獨不欲戰晉卒敗楚楚子傷目子反殞命范文子疑若懦而無謀者矣然不及一年三郤誅厲公弑胥童死欒書中行偃幾不免于禍晉國大亂鄢陵之功資使之然也有非常之人然後有非常之功非常之功聖人所甚懼也夜光之珠明月之璧無因而至前匹夫猶或按劍而况非常之功乎故聖人必自反曰此天之所以厚於我乎抑天之禍予也故雖有大功而不忘戒懼中常之主鋭于立事忽于天戒日尋干戈而殘民以逞天欲全之則必折其萌芽挫其鋒芒使知其所悔天欲亡之以美利誘之以得志使之有功以驕士翫其寇讎而侮其人民至于亡國殺身不悟者天絶之也嗚呼小民之家一朝而獲千金非有大福必有大咎何則彼之所獲者終日勤勞不過數金爾所得者㣲故所用者狹無故而得千金豈不驕其志喪其所守哉侈心一動物極而不能返家破身困復欲治其故業豈可得耶由是言之一天下者得之艱難則失之不易得之既易則失之亦然漢髙皇帝之得天下親冒矢石與秦楚爭戰五年未嘗得志比定天下復有平城之圍故終其身不事逺略民亦不勞繼之文景不言兵唐太宗舉晉陽之師破竇建德虜王世充所過者下易于破竹然天下始定外攘四夷伐髙昌破突厥終其身師旅不解幾至于亂者以其親見取天下之易也故兵之勝敗足以為國之强弱而國之强弱足以為治亂之兆盖有勝而亡有敗而興者矣㑹稽之棲而勾踐以伯黄池之㑹而夫差以亡有以使之也夫虢公敗戎于桑田晉卜偃知其必亡曰是天奪之鑑而益其疾也晉果滅虢此范文子所以不得不諫諫而不納而又有功敢逃其死哉彼其不死則厲公逞志必先圖于范氏趙盾之事可見矣趙盾雖免于死而不免于惡名則范文子之智過于趙宣子逺矣智罃趙武潁濱曰齊桓公存三亡國以屬諸侯其義多于晉文公然桓公没而齊亂其後不能復霸文公子孫世為盟主二百餘年與春秋相終始其故何也雖襄公悼公之賢齊所無有然其所以保霸業而不失者則有在矣伯者之盛非能用兵以服諸侯之難而能不用兵以服諸侯之難耳文公之後前有智罃後有趙武皆能不用兵以服諸侯此晉之所以不失霸也悼公與楚爭鄭三合諸侯之師其勢足以舉鄭而郤楚晉之羣臣中行偃欒黶之徒欲一戰以服楚者衆矣惟智罃為中軍將知用兵之難勝負之不可必三與楚遇皆遷延稽留不與之戰卒以弊楚而服鄭此則智罃不用兵之功也悼公死平公立平公非悼公比也然能屬任趙武武嘗與楚屈建合諸侯之大夫于宋以求弭兵趙孟于此有仁人之心二焉方其未盟也屈建衷甲將以襲武武與叔向謀之叔向曰以信召人而以僭濟之人誰與之安能害我武從其言卒事而楚不敢動將盟晉楚爭先叔向又曰諸侯歸晉之德也非歸其尸盟也子務德無爭先武亦從而先之此二者非仁人不能何也人將衷甲以襲我我亦衷甲以待之此勢之所必至也不幸不勝無可言者雖幸而勝晉楚之禍必自此始晉為盟主嘗先諸侯矣晉未失諸侯而楚求先之若與之爭楚必不聽晉楚之禍亦必自此始然此二者皆人情所不能忍也忍之近于弱不忍近于强而武能忍之晉楚不爭諸侯賴之故吾以為武有仁人之心二焉凡晉之所以不失諸侯而趙氏之所以卒興于晉者由此故也春秋書宋之盟實先晉而後楚孔子亦許之叔向潁濱曰樂王鮒言于君無不從欲為叔向請以其同也棄而不應祁大夫老矣無位于朝以其覺也知其必為巳言何其明哉不然晉楚之際亦多故矣同盟有衷甲之變交聘有司宫之禍茍明不足以應之身被其辱而國被其害可勝言哉當平丘之㑹齊人不服叔向詰之以禮威之以衆攘臂而仍之僅乃得之嗚呼殆哉彼不幸而仕于衰晉盖不得已而然歟智伯之亡栁州設漁者對智伯曰智氏既滅范中行志益大合韓魏圍趙水晉陽智伯瑶乗舟以臨趙且又往來觀水之所自務速取焉羣漁者有一人坐漁智伯怪之問焉曰若漁幾何曰臣始漁于河中今漁于海今主大茲水臣是以來曰若之漁何如曰臣幼而好漁始臣之漁于河有魦鱮鱣鰋者不能自食以好臣之餌日収者百焉臣以為小去而之龍門之下伺大鮪焉夫鮪之來也從魴鯉數萬垂涎流沫後者得食焉然其饑也亦返吞其後愈肆其力逆流而上慕為螭龍及夫抵大石亂飛濤折鰭秃翼顛倒頓踣順流而下宛委冒懵環坁溆而不能出嚮之從魚之大者幸而啄食之臣亦徒手得焉猶以為小聞古之漁有任公子者其得益大於是去而之海上北浮於碣石求大鯨焉臣之具未及施見大鯨驅羣鮫逐肥魚於渤澥之尾震動大海簸掉巨島一啜而食若舟者數十勇而未巳貪而不能止北蹙于碣石稿焉嚮之以為食者反相與食之臣亦徒手得焉猶以為小聞古之漁有太公者其得益大釣而得文王於是舍而來智伯曰今若遇我也如何漁者曰嚮者臣已言其端矣始晉之侈家若欒氏祁氏郤氏羊舌氏以十數不能自保以貪晉國之利而不見其害主之家與五卿嘗裂而食之矣是無異魦鱮鱣鰋也腦流骨腐於主之故鼎可以懲矣然而猶不肯寤又有大者焉若范氏中行氏貪人之土田侵人之勢力慕為諸侯而不見其害主與三卿又裂而食之矣脱其鱗鱠其肉刳其腸斷其首而棄之鯤鮞遺𦙍莫不備爼豆是無異夫大鮪也可以懲矣然而猶不肯寤又有大者焉吞范中行以益其肥猶以為不足力愈大而求食愈無饜驅韓魏以為羣鮫以逐趙之肥魚而不見其害貪肥之勢將不止于趙臣見韓魏懼其將及也亦幸主之蹙於晉陽其目動矣而主乃傲然以為咸在机爼之上方磨其舌抑臣有恐焉今輔果舍族而退不肯同禍段規怨深而造謀主之不寤臣恐主為大鯨首解于邯鄲鬛摧於安邑胷披于上黨尾斷于中山之外而腸流于大陸為鱻薧以充三家子孫之腹臣所以大懼不然主之勇力强大於文王何有智伯不悦然終不寤于是韓魏與趙合滅智氏其地三分溫公曰智伯之亡也才勝德也夫才與德異而世俗莫之能辨通謂之賢此其所以失人也夫聰察强毅之謂才正直中和之謂德才者德之資也德者才之帥也是故才德全盡謂之聖人才德兼亡謂之愚人德勝才謂之君子才勝德謂之小人凡取人之術茍不得聖人君子而與之與其得小人不若得愚人何則君子挾才以為善小人挾才以為惡挾才以為善者善無不至矣挾才以為惡者惡亦無不至矣愚者雖欲為不善智不能周力不能勝譬之乳狗搏人人得而制之小人智足以遂其姦勇足以决其㬥是虎而翼者也其為害豈不多哉夫德者人之所嚴而才者人之所愛愛者易親嚴者易踈是以察者多蔽于才而遺于德自古昔以來國之亂臣家之敗子才有餘而德不足以至于顛覆者多矣豈特智伯哉故為國為家者茍能審于才德之分而知所先後又何失人之足患哉文公悼公潁濱曰晉文公辟驪姬之難處狄十有二年奚齊卓子相繼戮死秦晉之人歸心焉文公深信舅犯靖而待之若將終焉者至于惠公起而赴之如恐不及於是秦人責報于外而里丕要功于内不能相忍繼以敗滅内外絶望屬于文公然後文公徐起而収之無尺土之賂一金之費而晉人戴之遂霸諸侯彼其處利害之計誠審哉夏商之衰湯文王皆起于諸侯積德深厚天下歸之不得已而後應故雖取天下無取天下之患其後皆數十世若文公德雖未足而待其自至庶幾王者之事也是以主盟中夏幾二百年其功業與齊桓等而子孫過之逺甚夫豈非其積累之有厚薄故耶晉悼公之復霸也與楚爭鄭三合諸侯之師未嘗一與楚戰卒以斃楚而服鄭盖古之善用兵者皆不以戰屈人之兵非不得已不戰方鄭之未服也中行偃欒黶皆欲以戰勝楚惟智罃知用兵之難勝負之不可必遷延稽留而楚人自敝不較而去不然二子將為先穀而罃將為林父如罃可謂知兵矣晉之故封栁州曰晉之故封太行犄之首陽起之黄河迤之大陸靡之或巍而髙或呀而淵景霍汾澮以經其壖若化若遷鈎嬰蟬聨然後融為平川而侯之都居大夫之邑建焉其髙壯則騰突撐拒聱岈鬰怒若熊羆之咆虎豹之嘷終古而不去攫秦搏齊當者失據燕狄惴怯若卵就壓振振業業覷闗蹀户愓若僕妾其按衍則平盈旋縁紆徐夷延若飛鳶之翔舞􅋡水之容與以稼則碩以植則茂以牧則蕃以畜則庶而人用是富而邦以之阜其河則濬源崑崙入于天淵出乎無門行乎無垠自匈奴而南以介西鄙衝奔太華運肘東指混潰后土濆濁糜沸黿鼉詭怪于于汩汩騰倒䡍越委泊涯涘呀呷欱納摧雜失墜其所盪激則連山參差廣野壞裂轟雷努風撼頷于􅡴崩石之所轉躍大木之所擢抜漰泙洞踏者彌數千里若萬夫之斬伐而其軸轤之所負橦檣之所御鱗川林壑隳雲遁雨瞬目而下者榛榛沄沄百舍一赴若是何如吳子曰先生之言豐厚險固誠晉之美矣然晉人之言表裏山河者備敗而已非以為榮觀顯大也吳起所謂在德不在險皆晉人之藉也歴代名賢確論卷十九
