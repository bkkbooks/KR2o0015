body:
  text: 歴代名賢確論卷三二帝通論堯舜之德張謂潁濱温公東坡范文正公荆公劉執中堯舜之德張謂曰堯有天下七十載將遜于位久難其人伯支許由全其節而固讓羲仲和叔審其才而固辭帝德合于天天命歸於帝帝盡善也我其試哉由是賓于四門納于百揆星辰合度雷雨不迷堯之二女釐降于内堯之九男服勤于外受昭華之玉允洽人神泥封祀之金大報天地五臣皆進明賞也四族咸黜明刑也先質后文敦俗也貴德尚齒優賢也於斯之時君明於上人化於下山川鬼神亦莫不寧鳥獸魚鼈衆乎咸若無為而治其聖也歟夫以萬乘之尊一人之貴多見軼其軌度少能窒其嗜欲瑤臺瓊室堯舜則茅茨土階矣玉食寶衣堯舜則藜羮皮裘矣歴代多嬪御堯舜顧禮經娶一姓矣自古好征伐堯舜舞干戚懷四夷矣百姓樂堯舜未嘗不樂百姓憂堯舜未嘗不憂厯數之來人以位授我謳歌之去我以位授人其來也嬰於樊籠其去也脫於桎梏形神非吾有天地之委和子孫非吾有天地之委蛻此其所以禪代也近日曹丕父子世為漢賊當鼎易之時發荒唐之論髙視前古大誇羣雄猥以漢魏之間輒同堯舜之際此河伯不知於海若盜跖自方於仲尼也古人云堯以義終舜以勤死稽諸祀典永為世教游夏之徒豈誣也哉稱堯見囚小儒之虚誕為禹所放曲士之穿鑿攻乎異端斯害也已温公曰或曰堯舜之德何以為難能迂夫曰舜自修於􅅵畆之中聞之於堯此舜之難也舜在􅅵畆之中而堯知之此堯之難也范文正公曰恒陽動陰順剛上柔下震上㢲下上下各得其常之時也天尊地卑道之常矣君處上臣處下理之常矣男在外女在内義之常矣震男㢲女天地君臣男女各得其正常莫大焉諸卦多以有應為吉此卦六爻皆應而爻無元吉者何也夫吉於應者相求以濟之時也常者上下各得其所之時矣故以剛柔皆應為常不以獲應為吉是以士之常也在於己不在於人諸侯之常也在於政不在於隣天子之常也在於道不在於權故曰聖人久於其道而天下化成堯舜為仁終身而已矣其知常也哉劉執中曰五者之道莫大於仁義仁者所以仁天下之道也義者所以宜天下之道也舉天下莫不被其愛則傷之者莫得以至焉舉天下莫不適其宜則悖之者無自以入焉天下之廣也萬物之衆也而能使一物無傷焉一物無悖焉此聖人所以參配天地而贊育萬物也故堯舜之致治無他焉仁義而已矣夫有堯舜之仁義而行之不以其道則惠澤不及於下矣所謂行之以其道者何也禮樂刑政也四者體名雖殊然皆同載于仁義以施天下也故舜舉四嶽而朝諸侯必曰修五禮則堯舜之治莫先於禮矣曰同律度量衡又曰命夔典樂教胄子則堯舜之治不可無樂矣曰慎徽五典五典克從納于百揆百揆時叙則堯舜必尚於政矣又曰象以典刑則堯舜之治亦必用刑矣四者兼發於上而不失於其中則仁義從之浹於下矣故當其時無一民不宅乎其仁也無一物不由乎其義也民宅乎仁則傷之者莫得而至矣物由乎義則悖之者無自入矣舉天下而一民無傷也一物無悖也則正氣充而陰陽和矣天地位而萬物育矣故曰光被四表格于上下此言乎仁義被於四逺而日月星辰罔不順於上矣鳥獸魚鼈莫不咸若于下矣又曰烈風雷雨弗迷是非禮樂刑政之所致歟潁濱曰堯之世洚水為害以意言之堯之為國當日夜不忘水耳今考之於書觀其為政先後命羲和正四時務農事其所先也末乃命鯀治水九年無成功乃命四岳舉賢以遜位四岳稱舜德曰父頑母嚚象傲克諧以孝烝烝乂不格姦堯以為然而用之君臣皆無一言及於水者舜既攝事黜鯀而用禹洚水以平天下以安堯舜之治其緩急先後於此可見矣使五教不明父子不親兄弟相賊雖無水患求一日之安不可得使五教既修父子相安兄弟相友水雖未除要必有能治之者昔孔子論政曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立古之聖人其憂深慮逺如此世之君子凡有意於治皆曰富國而强兵患國之不富而侵漁細民患兵之不强而侵虐鄰國富强之利終不可得而謂堯舜孔子不切於事情於乎殆哉東坡曰論堯舜之德必曰無為考之於經質之於史堯舜之所為卓然有見於世者蓋不可勝計也其曰無為何哉古人有言曰除日無歲又曰日一曰勞考載曰功若堯舜者可謂功矣歲者月之積也月者日之積也舉歲則兼月舉月則兼日矣日别而數之則月不見月别而數之則歲不見此豈日月之外復有歲哉日月之各一人臣之勞也歲之并考人君之功也故曰王省惟歲卿士惟月師尹惟日此上下之分煩簡之宜也禹為之平水土稷為之殖百榖契為之敷五教伯夷為之典三禮臯陶為之平五刑羲和為之厯日月堯舜果何為哉今夫三百有六旬分之以四時配之以六甲位之以十二子散之以二十四氣裂之以七十二候晝不可以并夜寒不可以兼暑則歲果安在哉惟其為在而不可名寄之於人而已不有此所以為王省之功也日不立則月不建月不建則歲不成師尹不官則卿士不治卿士不治則王功廢矣故曰庶民惟星文王不兼庻獄陳平不治錢榖邴吉不問鬬傷此所謂不易者也秦皇衡石量書光武以吏事責三公此易歲月而亂日時者也荆公論九變而賞罰可言曰萬物待是而後存者天也莫不由是而之焉者道也道之在我者德也以德愛者仁也愛而宜者義也仁有先後義有上下謂之分先不擅後下不侵上謂之守形者物此者也名者命此者也所謂物此者何也貴賤親疎所以表飾之其物不同者是也所謂命此者何也貴賤親疎所以稱號之其命不同者是也物此者貴賤各有容矣命此者親疎各有號矣因親疎貴賤任之以其所宜為此之謂因任因任之以其所宜為矣放而不察乎則又將大弛必原其情必省其事此之謂原省原省明而後可以辨是非是非明而後可以施賞罰故莊周曰先明天而道德次之道德巳明而仁義次之仁義已明而分守次之分守已明而形名次之形名已明而因任次之因任已明而原省次之原省已明而是非次之是非已明而賞罰次之是說雖㣲莊周古之人孰不然古之言道德所自出而屬之天者未嘗有也堯者聖人之盛也孔子稱之曰惟天為大惟堯則之此之謂明天聰明文思安安此之謂明道德允恭克讓此之謂明仁義次九族列百姓序萬邦此之謂明分守修五禮同律度量衡以一天下此之謂明形名棄后稷契司徒臯陶士垂共工此之謂明因任三載考績五載一巡狩此之謂明原省命舜曰乃言底可績謂禹曰萬世永賴時乃功蠢兹有苗昏迷不恭此之謂明是非臯陶方祇厥叙方施象刑惟明此之謂明賞罰歴代名賢確論卷三
