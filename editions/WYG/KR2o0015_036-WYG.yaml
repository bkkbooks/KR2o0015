body:
  text: 歴代名賢確論卷三十六七國通論七國興亡温公老泉何去非潁濱蘇秦陸龜䝉潁濵四公子潘存實劉敞戰國䇿曾子固申不害商鞅韓非潁濵東坡趙括王翦六一曹沫専諸豫讓聶政荆軻頴濵荆公優孟西門豹淳于髠優旃潁濵扁鵲潁濵七國興亡温公曰從横之説反覆百端然大要合從者六國之利也昔先王建萬國親諸侯使之朝聘以相交饗宴以相樂㑹盟以相結者無它欲其同心戮力以保國家也曏使六國能以信義相親則秦雖強暴安得而亡之哉夫三晉者齊楚之藩蔽齊楚者三晉之根柢形勢相資表裏相依故以三晉而攻齊楚者自絶其根柢也以齊楚而攻三晉者自撤其藩蔽也安有撤其藩蔽以媚盗曰盜將愛我而不攻豈不悖哉老泉曰六國破滅非兵不利戰不善弊在賂秦賂秦而力虧破滅之道也或曰六國互喪率賂秦耶曰不賂者以賂者喪葢失彊援不能獨完故曰弊在賂秦也秦以攻取之外小則獲邑大則得城較秦之所得與戰勝而得者其實百倍諸侯之所亡與戰敗而亡者其實亦百倍則秦之所大欲諸侯之所大患固不在戰矣思厥先祖父暴霜露斬荆棘以有尺寸之地子孫視之不甚惜舉以予人如棄草芥今日割五城明日割十城然後得一夕安寢起視四境而秦兵又至矣然則諸侯之地有限暴秦之欲無厭奉之彌繁侵之愈急故不戰而彊弱勝負已判至於顛覆理固宜然古人云以地事秦猶抱薪救火薪不盡火不滅此言得之齊人未嘗賂秦終繼五國遷滅何哉與嬴而不助五國也五國既喪齊亦不免矣燕趙之君始有逺畧能守其土義不賂秦是故燕雖小國而後亡斯用兵之效也至丹以荆卿為計始速禍焉趙嘗五戰于秦二敗而三勝後秦擊趙者再李牧連卻之洎牧以讒誅邯鄲為郡惜其用武而不終也且燕趙處秦革滅殆盡之際可謂智力孤危戰敗而亡誠不得已向使三國各愛其地楚魏韓也齊人勿附于秦刺客不行良將猶在則勝負之數存亡之理當與秦相較或未易量嗚呼以賂秦之地封天下之謀臣以事秦之心禮天下之竒才并力西嚮則吾恐秦人食之不得下咽也悲夫有如此之勢而為秦人積威之所刼日削月割以趨於亡為國者無使為積威之所刼哉夫六國與秦皆諸侯其勢弱於秦而猶有可以不賂而勝之之勢茍以天下之大下而從六國破亡之故事是又在六國下矣何去非曰秦得所以并天下之形而天下無至於必可并六國有以拒秦之勢而秦遂至於不可拒者豈秦為工於斃六國耶其禍在乎六國之君自戰其所可親而忘其所可讎故也秦之為國一而已矣而闗東之國六焉計秦之地居六國五之一校秦之兵當六國十之一以五一之地十一之兵而常擅其䧺强以制天下之命者由其據形便之居俯扼天下之吭而蹈其膺背於足股之下故也使六國之君知夫社稷之實禍在秦而相與致誠締交戮力以擯秦耶秦誠巧於攻鬭則亦何能鞭笞六國使之駢首西嚮而事秦哉又况得以一二而夷之也葢其不知慮此凡所以早朝而晏罷者皆其自相屠斃之謀此秦所以得收其弊而終為所擒也葢六國之勢莫利於為從莫害於為衡從合則安衡成則危必然之勢也方其為從於蘇秦也秦人不敢窺兵函谷闗者十五年已而為衡於張儀而山東諸侯嵗被秦禍日割地以求事秦之懽卒至於地盡而安為墟六國固嘗收合從之利矣然而終敗於為衡之害者其禍在乎自戰其所可親而忘其所可讎故也所謂戰所可親忘所可讎者秦人稍蠶食六國而并夷之則闗東諸侯皆與國也宜情親勢合以謀抗秦然而齊楚自恃其强有已吞燕趙韓魏之志而緩秦之禍燕趙韓魏自懲其弱有疑惡齊楚之心而脅秦之威是以衡人得而因之散敗從約秦以氣恐而勢喝之故人人震迫爭入購秦唯恐其獨後之也曾不知齊楚雖强不足以致秦之畏而其所甚忌者獨在乎韓魏也韓魏者寔諸侯之西蔽也勢能限秦而使之無東秦茍有以越之我得以制其後此秦之所忌也使齊楚燕趙審夫社稷之實禍在秦而知韓魏之為蔽於我委重國而收親之固守從約併力一志以讎虎狼之秦使其一下兵於六國則六國之師悉合而從之則秦甲不敢輕越函谷而山東安矣或曰韓魏者秦之錯壤也秦兵之加韓魏也戰於百里之内其加於四國也戰於千里之外韓魏之致秦兵近在乎一日之間而其待諸侯之救乃在乎三月之外秦攻韓魏既勝而歸休兵則四國之乘徼者尚未及知也今徒執虚契以役韓魏則秦人固將疾攻而方蹷之是使二國速被實禍而齊楚燕趙返居齒寒之憂非至計也噫齊楚燕趙之民裹糧荷㦸以應秦敵者無虚嵗也然終不能紓秦患於一日四國誠能嵗各更其國之一軍命一偏將提之以合戍韓魏而佐其勢則是六國之師日萃於韓魏之郊仰闗而伺秦秦誠勇者雖曰辱而招之固不輕出而以腹背支敵矣夫蘇秦張儀雖其為術生於揣摩辨説之巧人皆賤之然其䇿畫之所出皆足以為諸侯之利害而成敗之葢蘇秦不獲終見信於六國而張儀之志獨行於秦此六國之所以見并於秦也嗟乎使闗東之國裂而為六者豈天所以終相秦乎向使闗東之地合而為一以與秦人决機於韓魏之郊則勝負之勢葢未可知使齊能因其資而遂并燕趙楚能因其資而遂并韓魏則鼎足之勢可成以其為國者六是以秦人得以間其懽而離其交終於一二而夷滅之悲夫潁濱曰嘗讀六國世家竊怪天下之諸侯以五倍之地十倍之衆發憤西向以攻山西千里之秦而未免於滅亡常為之深思逺慮以為必有可以自安之計蓋未嘗不咎其當時之士慮患之踈而見利之淺且不知天下之勢也夫秦之所與諸侯爭天下者不在齊楚燕趙也而在韓魏之郊諸侯之所與秦爭天下者不在齊楚燕趙也而在韓魏之野秦之有韓魏譬如人之有腹心之疾也韓魏塞秦之衝而蔽山東之諸侯故天下之所重者莫如韓魏也昔者范睢用於秦而收韓商鞅用於秦而収魏昭王未得韓魏之心而出兵以攻齊之綱夀范睢以為憂然則秦之所忌者可以見矣秦之用兵於燕趙秦之危事也越韓過魏而攻人之國都燕趙拒之於前而韓魏乘之於後此危道也而秦之攻燕趙未嘗有韓魏之憂則韓魏之附秦故也夫韓魏諸侯之障而使秦人得出入於其間此豈知天下之勢耶委區區之韓魏以當强虎狼之秦彼安得不折而入於秦哉韓魏折而入於秦然後秦人得通其兵於東諸侯而使天下徧受其禍夫韓魏不能獨當秦而天下之諸侯藉之以蔽其西故莫如厚韓親魏以擯秦秦人不敢逾韓魏以窺齊楚燕趙之國而齊楚燕趙之國因得以自完於其間矣以四無事之國佐當冦之韓魏使韓魏無東顧之憂而為天下出身以當秦兵以二國委秦而四國休息於内以隂助其急若此可以應夫無窮彼秦者將何為哉不知出此而乃貪疆場尺寸之利背盟敗約以自相屠滅秦兵未出而天下諸侯已自困矣至使秦人得伺其隙以取其國可不悲哉又曰用兵有權權之所在其國乃勝是故國無小大兵無强弱有小國弱兵而見畏於天下者權在焉耳千鈞之牛制於三尺之童弭耳而下之曽不如狙猿之奮擲於山林此其故何也權在人也我欲則戰不欲則守戰則天下莫能支守則天下莫能窺昔者秦嘗用此矣開闗出兵以攻諸侯則諸侯莫不願割地而求和諸侯割地而求和於秦秦人未嘗急於割地之利若不得已而後應故諸侯嘗欲和而秦嘗欲戰如此則權固在秦矣且秦非能强於天下之諸侯秦惟能自必而諸侯不能是以天下百變而歸於秦諸侯之利固在從也朝聞陳軫之説而合為從暮聞張儀之計而散為横秦則不然横人之欲為横從人之欲為從皆使其自擇而審處之諸侯相顧而終莫能自必則權之在秦不亦宜乎又曰蘇秦欲連諸侯以拒秦此一時良􅄸也公孫衍一説齊魏而蘇秦之約不能期年以壊衆志之不一其勢固難成哉然天方相秦人謀雖善將有不能支者彼韓魏趙楚與秦壤地相接雖欲勉强抗秦而干戈日至勢不可矣如燕齊負海前有四國之限燕弱不足言如齊之强使與四國合從推其有餘以補不足時出而拯其急雖秦之暴亦安能遂滅諸侯乎然威宣方以其力攻伐諸侯不親湣王取宋破燕求逞其欲不暇及逺而王建偷安自守僥倖秦之見容與五國相隨而亡豈非天哉然吾觀六國之亡其君無一人可以守國者楚考烈王死李園專國負芻與王猶爭立僅能自定而秦兵至趙王遷信讒以誅李牧魏景湣王用秦間以廢信陵韓王安制於韓圯燕丹私怨始皇欲以刺客斃秦雖使秦㓂不作其勢亦不能乆安矣而况秦乘其敝乎蘇秦陸龜䝉設寒泉子對秦惠王曰寒泉子秦處士見秦惠王曰客有自趙來以約從連横事説太王者為誰惠王曰東周人蘇秦也寒泉子曰書十上王弗聴有之乎曰然其道如何王耶霸耶曰黜其霸以隮王乎曰然則何上書之煩而用之踈乎惠王曰醯雞不能混雷霆嬰兒不能抗烏獲者響與力懸絶故也蘇子誠辨矣安能以三寸舌謀山東諸侯使西面朝秦者乎寡人非不知不破一領甲不折一隻矢之為利也顧猶捕風耳諸侯不可一非一朝也齊桓晉文之霸也始若膠附終若氷泮豈止連雞不能俱上於栖而已哉寡人塞耳義弗聞也寒泉子曰不然夫齊荆三晉之人病於兵乆矣方城之金十九為兵一為鏄銚董澤之蒲十九為幹一為箕棬父子兄弟之血前後濺野草齊魂為燕氛趙骨化魏土其悽痛之聲入金石出絃匏聞之者悄慼酸屑泣不自禁一旦有人謂曰朝與秦連衡暮得帖帖安臥秦亦厭戰雖鼓牙頰未能吞諸侯秦休而强吾亦勇而奮矣設有辯口安能反覆乎大王不用秦詔一武士斷其頸無令車輪輾闗下土使東諸侯聞其言從散衡敗東向以背秦大王出則奪氣入則包羞及其殆也披土地以奉讎國獨不念秦仲之業艱難乎春秋祀事何面目見宗廟惠王卒弗用寒泉子耕於鄙趙即封蘇季子為武安君六國果奉教秦閉闗十五年潁濵曰秦强而諸侯弱逰談之士為横者易為功為從者難為力然而從成則諸侯利而秦病横成則秦帝而虜諸侯要之二者皆出於權譎而從為愈歟蘇秦本説秦為衡不合而激於燕趙甘心於其所難為之期年㰱血於洹水之上可不謂能乎然口血未乾犀首一出而齊趙背盟從約皆破葢諸侯異心譬如連鷄不能俱棲勢固然矣而太史公以為約書入秦秦人為之閉函谷者十五年此説客之浮語而太史公信之過矣四公子潘存實四公子贊曰四君當齊楚趙魏之盛門客三千人聞者孰不慕之有未逹則孰不曰一朝富且貴必然嗚呼自四君沒千載之間豈無貴於四君者豈無富於四君者而然者其誰既富貴則曰彼四子徒沽名耳三千之人何為哉悲夫人之貴也為身四君之貴也為人富貴皆知可及也而富貴之心與貧賤之心不相負者愚則未見其及也贊曰四人為身萬二千人為耳目四人為梁萬二千人為榱桷有危可平有死可生豈彼威慿寔惟義爭嗟乎人之家或財不自與心不自是妻不睦夫父不慈子而况乎萬二千士懿哉恨目不覩此劉敞曰孟嘗平原信陵皆稱賢君善養士士至三千人然孟嘗以讒廢唯馮生從車一乘入秦使孟嘗復重於齊平原背千里約趙與楚約從非毛遂㡬不定信陵最賢矣得侯嬴乃能成功士亦安在多哉然不多養士亦失此三人此三人者非特百十之䧺也乃在三千之一也以彼之折節慕義貧賤無所遺平生得其用者三千之一耳而况乎不善養士士無所歸者乎其不困辱幸矣何功名之望哉戰國䇿曾子固序曰劉向叙此書言周之先明教化修法度所以大治及其後詐謀用而仁義之路塞所以大亂其説既美矣率以謂此書戰國之謀士度時君之所能行不得不然則可謂惑於流俗而不篤於自信者也夫孔孟之時去周之初已數百嵗其舊法已亡其舊俗已熄乆矣二子乃獨明先王之道以謂不可改者豈將强天下之主以後世之所不可為哉亦將因其所遇之時所遭之變而為當世之法使不失乎先王之意而已也二帝三王之治其變固殊其法固異而其為國家天下之意本末先後未嘗不同也二子之道如是而已葢法者所以適變也不必盡同道者所以立本也不可不一此理之不易者也故二子者守此豈好為異論哉能勿茍而已矣可謂不惑於流俗而篤於自信者也戰國之游士則不然不知道之可信而樂於説之易合其設心注意偷為一切之計而已故論詐之便而諱其敗言戰之善而蔽其患其相率而為之者莫不有利焉而不勝其害也有得焉而不勝其失也卒至蘇秦商鞅孫臏呉起李斯之徒以亡其身而諸侯及秦用之者亦滅其國其為世之大禍明矣而俗猶莫之寤也惟先王之道因時適變為法不同而考之無疵用之無敝故古之聖賢未有以此而易彼也或曰邪説之害正也宜放而絶之則此書之不冺其可乎對曰君子之禁邪説也固將明其説於天下彼當世之人皆知其説之不可從然後以禁則齊使後世之人皆知其説之不可為然後以戒則明豈必滅其籍哉放而絶之莫善於是故孟子之書有為神農之言者有為墨子之言者皆著而非之至於此書之作則上繼春秋下至楚漢之起二百四十五年之間載其行事固不得而廢也申不害商鞅韓非潁濵曰商鞅以法治秦而申不害以術治韓憲令著於官府刑罰必於民心賞存乎慎罰加乎奸所謂法也因任而授官循名而責實操生殺之柄課羣臣之能所謂術也法者臣之所師而術者君之所執也及韓非之學並取申商而兼用法術法之所止雖有聖智不用也術之所操雖有父子不信也使人君據法術之自然而無所復為此申韓所謂老子之道而實非也彼申商各行其説耳然則韓秦之治行於一時而其害見於乆逺使非不幸獲用於世其害將有不可勝言者矣太史公悲韓非知説之難而卒以説死故載其説難於篇然古之君子循理而言言之利害不存乎心故言出而必合要之無愧於中矣豈復立法而求其必售耶今非先立法而後説人既已不知説矣而况非之所以説秦求禍之道乎太史公以李陵之事不合於漢武終身廢辱是以深悲之歟東坡曰聖人之所為惡夫異端盡力而排之者非異端之能亂天下而天下之亂所由出也昔周之衰有老耼莊周列禦冦之徒更為虚無淡泊之言而治其猖狂浮游之説紛紜顛倒而卒歸於無有由其道者蕩然莫得其當是以忘乎富貴之樂而齊乎死生之分此不得志於天下髙世逺舉之人所以放心而無憂雖非聖人之道而其用意固亦無惡於天下自老耼之死百有餘年有商鞅韓非著書言治天下無若刑名之賢及秦用之終於勝廣之亂教化不足而法有餘秦以不祀而天下被其毒後世之學者知申韓之罪而不知老耼莊周之使然何者仁義之道起於夫婦父子兄弟相愛之間而禮法刑政之原出於君臣上下相忌之際相愛則有所不忍相忌則有所不敢夫不敢與不忍之心合而後聖人之道得存乎其中今老耼莊周論君臣父子之間汎汎乎若萍浮於江湖而適相值也夫是以父不足愛而君不足忌不忌其君不愛其父則仁不足以懐義不足以勸禮樂不足以化此四者皆不足用而欲置天下於無有夫無有豈誠足以治天下哉商鞅韓非求為其説而不得得其所以輕天下而齊萬物之術是以敢為殘忍而無疑今夫不忍殺人而不足以為仁而仁亦不足以治民則是殺人不足以為不仁而不仁亦不足以亂天下如此則舉天下唯吾之所為刀鋸斧鉞何施而不可昔者夫子未嘗一日易其言雖天下之小物亦莫不有所畏今其視天下眇然若不足為者此其所以輕殺人歟太史遷曰申子卑卑泥於名實韓子引繩墨切事情明是非其極慘覈少恩皆原於道徳之意愚讀而思之事固有不相謀而相感者莊老之後其禍為申韓由三代之衰至於今凡所以亂聖人之道者其弊固已多矣而愚未知其所終奈何其不為之所也趙括王翦六一曰嗚呼用人之難難矣未若聴言之難也夫人之言非一端也巧辯縱横而可喜忠言質樸而多訥此非聴言之難在聴者之明闇也諛言順意而易悦直言逆耳而觸怒此非聴言之難在聴者之賢愚也是皆未足為難也若聴其言則可用然用之有輒敗人之事者聴其言若不可用然非如其言不能以成功者此然後為聴言之難也請試舉其一二戰國時趙將有趙括者善言兵自謂天下莫能當其父奢趙之名將老於用兵者也每與括言亦不能屈然奢終不以括為能也歎曰趙若以括為將必敗趙事其後奢死趙遂以括為將其母自見趙王亦言括不可用趙王不聴使括將而攻秦括為秦軍射死趙兵大敗降秦者四十萬人坑於長平葢當時未有如括善言兵亦未有如括大敗者也此聴其言可用用之輒敗人事者趙括是也秦始皇欲伐荆問其將李信用兵㡬何信方年少而勇對曰不過二十萬足矣始皇大喜又以問老將王翦翦曰非六十萬不可始皇不悦曰將軍老矣何其怯也因以信為可用即與兵二十萬使伐荆王翦遂謝病退老於頻陽已而信大為荆人所敗亡七都尉而還始皇大慚自駕如頻陽謝翦因强起之翦曰必欲用臣非六十萬不可於是卒與六十萬而往遂以滅荆夫初聴其言若不可用然非如其言不能以成功者王翦是也且聴計於人者宜如何聴其言若可用用之宜矣輒敗事聴其言若不可用捨之宜矣然必如其説則成功此所以為難也予又以謂秦趙二主非徒失於聴言亦由樂用新進忽棄老成此其所以敗也大抵新進之士喜勇鋭老成之人多持重此所以人主之好立功名者聴勇鋭之語則易合聞持重之言則難入也若趙括者則又有説焉予略考史記所書是時趙方遣亷頗攻秦頗趙名將也秦人畏頗而知括虚言易與也因行反間於趙曰秦人所畏者趙括也若趙以為將則秦懼矣趙王不悟反間也遂用括為將以代頗藺相如力諫以為不可趙王不聴遂至於敗由是言之括虚談無實而不可用其父知之其母亦知之趙之諸臣藺相如等亦知之外至敵國亦知之獨其主不悟爾夫用人之失天下之人皆知其不可而獨其主不知者莫大之患也前世之禍亂敗亡由此者不可勝數也曹沫專諸豫讓聶政荆軻潁濵曰周衰禮義不明而小人奮身以犯上相夸以為賢孔子疾之齊豹以衛司冦殺衛侯之兄縶蔡公孫翻以大夫弑其君申春秋皆以盗書而不名所謂求名而不得者也太史公傳刺客五人皆豹翻之類耳而其稱之不容口失春秋之意矣獨豫讓為舊君報趙襄子有古復讎之義如荆軻刺秦始皇雖始皇以强暴失天下心聞者快之要以盗賊乘人主不意法不可長也至曹沫之事予以左氏攷之魯莊公十年沫始以謀干莊公公用之敗齊於長勺自是魯未嘗敗十三年而㑹齊侯于柯安得所謂三戰三敗沫以匕首刼齊桓求侵地者哉始公羊髙采異議載沫事於春秋其後戰國游士多稱沫以為口實而實非也莊公之禦齊沫問所以戰以小惠小信不足恃惟忠為可以一戰沫葢知義者也而肯以其身為刺客之用乎春秋宋楚盟於城下齊魯盟于夾谷皆以要盟不書書平及㑹而已使沫信以匕首刼桓公得非要盟乎而春秋書公㑹齊侯盟于柯是以知其非要盟也是以削去曹沫而録其四人然亦非所謂賢也荆公曰曹沫將而亡人之城又刼天下盟主管仲因勿倍以市信一時可也予獨怪智伯國士豫讓豈顧不用其䇿耶讓誠國士也曾不能逆䇿三晉救智伯之亡一死區區尚足校哉其亦不欺其意者也聶政售於嚴仲子荆軻豢於燕太子丹此兩人者汙隐困約之時自貴其身不妄願知亦曰有待焉彼挾道徳以待世者何如哉優孟西門豹淳于髠優旃潁濵曰太史公得滑稽三人禇先生一人皆以優笑有益於事故并録之然西門豹古循吏非滑稽者也特以止河伯娶婦事發於俳故巧而捷是以載之滑稽而實非也太史公以齊威王事先楚莊今既正之然優孟語稱齊趙韓魏葢戰國記事者粉澤之過耳扁鵲頴濵曰予於趙世家削簡子之夢黜扁鵲之説以為為國不可以語怪及扁鵲列傳則具載其説曰世或有是不足怪也葢孔子作春秋非人事不知而左氏所記鬼神變怪世所共傳者録之無疑世有逹者當辯此耳扁鵲見趙簡子齊威王而中有虢公之事虢之事在春秋之初而趙簡子在春秋之末威王復次其後或疑其説之妄然戰國之際薛亡乆矣而孟嘗君稱薛公安知是時無虢公者哉歴代名賢確論卷三十六
