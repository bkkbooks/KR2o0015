body:
  text: 歷代名賢確論卷四十九眀帝肅宗赦竇憲奪沁水公主園田温公朱暉東坡梁鴻梁肅王充昌黎安帝徴用樊英温公順帝以梁冀為大將軍溫公質帝崔寔應詔詣公車言事溫公元帝平東羌溫公李固子由徐穉張九齡曽子固王符昌黎靈帝黨錮荆公裕子由照黄垍李徳盧隣温公司空圖陳寔少游赦竇憲奪沁水公主園田溫公曰人臣之罪莫大於欺罔是以眀君疾之孝章謂竇憲何異指鹿為馬善矣然卒不能罪憲則姦臣安所懲哉夫人主之於臣下患在不知其姦茍或知之而復赦之則不若不知之為愈也何以言之彼或為姦而上不知之猶有所畏既知而不能討彼知其不足畏也則放縱而無所顧矣是故知善而不能用知惡而不能去人主之深戒也朱暉東坡曰東漢肅宗時榖貴經用不足尚書張林請以布帛為租官自煮鹽且行均輸獨朱暉文季以為不可事既寢而陳事者復以為可行帝頗然之暉復獨奏曰王制天子不言有無諸侯不言多寡食祿之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人窮怨布帛為租則吏多姦盜皆非眀主所當行帝方以林言為然發怒切責諸尚書暉等皆自繫獄二日詔出之曰國家樂聞駮議黄髪無愆詔書過也何故自繫暉等固稱病篤尚書令以下惶怖謂暉曰今林得譴奈何稱病其禍不細暉曰行年八十蒙恩得在機宻當以死報若心知不可而順指雷同負臣子之義今耳目無所聞見伏待死命遂閉口不復言諸尚書不知所為乃共劾奏暉帝意解寢其事後數日詔使直事即問暉起居狀太醫視疾太官賜食暉乃起云云肅宗號稱長者詔書既已引罪而謝文季矣諸尚書何怖之甚也文季於此時强力不足多貴而諸尚書為可􅀏也云其禍不細不知以何等為禍盖以帝不恱後不甚進用為莫大之禍也悲夫梁鴻梁肅梁鴻髙士碣曰君得天元純誕其生知囊括道妙而遊於世遭漢微缺澆風偃物君以為道不可徇時故安節以髙蹈髙蹈不可以激俗故登邙以作歌作歌不可以遺患故適越以遐遯遐遯不可以不粒故寄食於杵臼是以孟氏恱其道而妻之伯通尚其風而禮之安夫大而遺其細忽夫語而順乎黙樂則行之憂則違之斯可謂髙世之逸民矣原夫天之運也曰眀與晦人之道也曰否與泰逹人知否與晦之不可為也故耦而耕狂而歌鑿坏以逃荷蓧以遊而晦徳避難不成乎名於戲伯鸞非斯人之徒則誰與哉孟子稱聞栁下惠之風者鄙夫寛薄夫敦然則聞之風聲亦將舎爾朶頥以觀我靈龜乎銘曰山隠器車河秘馬圖伯鸞不行獨與道俱大虚無際浮雲無繫伯鸞伊何冥跡人世直道辱身三黜魯邦扣馬逆諫餓于首陽邈矣伯鸞靜而含光作銘臯橋萬古是望王充昌黎贊曰王充者何㑹稽上虞本自元城爰来徙居師事班彪家貧無書閱書于肆惟市是遊一見誦憶遂通衆流閉門潜思論衡以修為州治中自免歸歟同郡友人謝姓夷吾上書薦之命待公車以病不行年七十餘乃作養性一十六篇肅宗之時終於永元徴用樊英溫公曰古之君子邦有道則仕邦無道則隠隠非君子之所欲也人莫己知而道不得行群邪共處而害將及身故深藏以避王者舉逸民揚側陋固為其有益於國家非以徇世俗之耳目也是故有道徳足以尊主智能足以庇民被褐懐玊深藏不市則王者當盡禮以致之屈體以下之虛心以訪之克己以從之然後能利澤施于四海功烈格于上下盖取其道不取其人也務其實不務其名也其或禮備而不至意勤而不起則姑内自循省而不敢强致其人曰豈吾徳之薄而不足慕乎政之亂而不可輔乎羣小在朝而不敢進乎誠心不至而憂其言之不用乎何賢者之不我從也茍其徳已厚矣政已治矣羣小逺矣誠心至矣彼將扣閽而自售又安有勤求而不至者哉荀子曰輝蟬者務在明其火振其木而已火不眀雖振其木無益也今人主有能眀其徳則天下歸之若蟬之歸眀火也或者人主恥不能致乃至誘之以髙位脅之以嚴刑使彼誠君子邪則位非所貪刑非所畏終不可得而致也可致者皆貪位畏刑之人也烏足貴哉若乃令聞著於家庭行誼隆於鄉曲利不茍取士不茍進潔已安分優游卒嵗雖不足以尊主庇民是亦清修之士也王者當褒優安養俾遂其志若孝昭之待韓福光武之待馮異以勵亷恥美風俗斯亦可矣固亦不當如范升之詆毁又不可如張措之責望也至於飾偽以邀譽釣竒以驚俗不食君祿而爭屠沽之利不受小官而規卿相之位名與實反心與跡違斯乃華士少正卯之流其得免於聖王之誅幸矣尚何聘召之有哉以梁冀為大將軍温公曰成帝不能選任賢俊委政舅家可謂闇矣猶知王立之不材棄而不用順帝援大柄授之后族梁冀頑嚚兇㬥著於平昔而使之繼父母之位終於悖逆蕩覆漢室校於成帝闇又甚焉崔寔應詔詣公車言事温公曰漢家之法已嚴矣而崔寔猶病其寛何哉盖衰世之君率多柔懦凡愚之佐惟知姑息是以權幸之臣有罪不坐豪猾之民犯法不誅仁恩所施止於目前姦宄得志綱紀不立故崔寔之論以矯一時之枉非百世之通義也孔子曰政寛則民慢慢則糾之以猛猛以濟寛政是以和斯不易之常道矣平東羌温公曰書稱天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母夫蠻夷異國氣類雖殊其就利避害樂生惡死亦與人同耳御之得其道則附順服從失其道則離叛侵擾固其宜也是以先王之政叛則討之服則懷之處之四裔不使亂禮義之邦而已若乃視之如草木禽獸不分臧否不辨去来悉艾殺之豈作民父母之意哉且夫羌之所以叛者為郡縣所侵克故也叛而不即誅者將帥非其人故也茍使良將驅而出之塞外擇良吏而牧之皆疆場之臣也豈得多以専殺為快邪夫御之不得其道雖華夏之民亦將蜂起而為寇又可盡誅邪然則段紀明之為將雖克捷有功君子所不與也李固子由曰孔子謂顔淵用之則行舎之則藏惟我與爾有是夫用之而不行則何以利人舎之而不藏則何以保身聖人之於天下理極於是而已陳靈公與其大夫孔寧儀行父宣滛於朝洩冶强諌以死春秋書之曰陳殺其大夫洩冶君雖無道而洩冶亦名以為無益於事而害其身君子不為也李固立於順桓之間内無愧於其心外無負於其人東漢名臣如固者一二人耳然事有可恨者沖帝之亡固欲立清河王蒜梁冀不從而立質帝質帝之亡也固復以清河王為請與胡廣趙戒同謀廣戒懼而中變固獨與杜喬爭之冀積怒憤𤼵䇿免固而立桓帝其後嵗餘劉文劉鮪謀立清河王冀遂誣固與文鮪通謀殺之吾竊怪固為三公再欲立蒜而不克冀如豺狼疾之如仇讎獨一梁太后知其賢欲宥之而不能固雖貪立賢君存漢社稷勢必無成矣一舉不中奉身而去得免於禍斯已幸矣再更大變固守前議遲遲不去以䧟大戮則固之死僅自取也不然如固之賢吾何間然哉徐穉張九齡曰公受天元休含道傑出生知而上貫之以一體資清純動適元妙知道之將廢乃窮則獨善躬耕取資非力不食鄰落所處率化無訟在漢之季遭時溷濁不抗跡以庇物故退非山林不茍利以辱身故進無祿位五辟宰府四察孝㢘又舉有道就拜太原太守皆辭疾不起延嘉二年尚書令汝南陳蕃僕射南郡胡廣相與上疏極言先生宜為輔弼協和人神漢桓帝猶能安車𤣥纁備禮致聘而竟不屈志知時之不可支也然而諸公嘉招雖不之屑就及聞薨卒徒歩弔祭禮有所尚隻雞不薄意有所加生芻為貴士之感義實衰世之有補人而見徳俾後生之可尋其廢中權行中慮皆此類也昔者夷齊介潔而逺去沮溺野逸而難羣顔闔鑿坏以遁逃接輿狂歌而詭激此誠作者或類沽名夫有所不為至則偏也無適不可用之極也先生則貶絶在心而經修於世純儉以存戒博愛以體仁應物以㑹通全已以歸正漢廷所以宗其徳天下所以服其行豈與彼數子直逍遥而已哉銘曰靈芝無根醴泉無源角立傑出先生斯存英英先生徳不可名麟出無應鴻飛入㝠道髙事逺跡陳名劭勒石舊邦以觀其妙曽子固曰漢自元興以後政出宦者小人挾其威福相煽為惡中材顧望不知所為漢既失其操柄紀綱大壞然在位公卿大夫多豪傑特起之士相與𤼵憤同心直道正言分别是非黒白不少屈其意至於不容而羅織鈎黨之獄起其執彌堅而其行彌厲志雖不就而忠有餘故及其既歿而漢亦以亡當是之時天下聞其風慕其義者人人感慨奮激至於解印綬棄家族骨肉相勉趨死而不避百餘年間擅彊大覬非望者相屬皆逡廵而不敢𤼵漢能以亡為存盖其力也孺子於時豫章太守陳蕃太尉黄璚辟皆不就舉有道拜太原太守安車備禮召皆不至盖忘己以為人與獨善於隠約其操雖殊其志於仁一也在位士大夫抗其節於亂世不以死生動其心異於懷祿之臣逺矣然而不屑去者義在於濟物故也孺子嘗謂郭林宗曰大木將顛非一䋲所維何栖栖不遑寧處此其意亦非自足於丘壑遺世而不顧者也孔子稱顔回用之則行舎之則藏惟我與爾有是夫孟子亦稱孔子可以進則進可以止則止乃所願則學孔子而易於君子小人消長進退擇所宜處未嘗不惟其時則見其不可而止此孺子所以未能以此而易彼也王符昌黎賛曰王符節信安定臨涇好學有志鄉人所輕憤世著論濳夫是名述赦之篇以赦為賊良民之患其㫖湛明皇甫度遼聞至乃驚衣不及帯屣履出迎豈若鴈門問鴈呼卿不仕終家吁嗟先生黨錮王荆公讀後漢書詩曰錮黨紛紛果是非當時髙士見精㣲可憐竇武陳蕃輩欲與天爭漢鼎歸子由陳蕃論曰易曰君不宻則失臣臣不宻則失身㡬事不宻則害成是故鷙鳥將擊必匿其形非以智御物而事不得不爾謀未𤼵而使人知之未有不殆者也陳蕃將與竇氏共誅宦官蕃自謂外從人望内有徳於竇后事無不克乃先事露章曰臣聞言不直而行不正則為欺乎天而負乎人危言極意則羣兇側目禍不旋踵酌此二者臣寧得禍不忍欺天今道路詾詾皆言侯覽曹節公乗昕王甫鄭颯等與趙夫人諸女尚書並亂天下若不急誅必生變亂傾覆社稷願出臣章宣示左右令諸姦知臣疾之太后不從聞者莫不震恐謀未及𤼵曹節等矯詔殺之時蕃七十餘矣聞難作將官屬門生八十餘人抜刃入承天門攘臂大呼適遇王甫甫收殺之於乎天之將亡漢耶蕃一朝老臣名重天下而猖狂寡慮乃與未嘗更事者比㡬乎㬥虎馮河死而無悔者斯豈孔子所謂賢哉黄垍東都名臣論曰范曄書稱陳蕃曰懔懔乎伊望之業矣論竇武曰天之廢商久矣君將興之宋襄公所以敗也當陳蕃竇武秉政之際天下延頸太平之業後世學者言忠烈有道必稽焉愚獨謂東京天緒雖期於盡然使國紀勦墜士人不奮實蕃武之由蕃以竒志堅節誓清國歩呈材効業不穢腐爛竇氏臨朝腹心相委武以后父位為上將將相同心頥指喑嗚足移天下列奏邪豎次行誅屏緩期延計如牛捕鼠而鄭颯等縲紲吞舌無敢騰變是氣窮勢竭也所留者朱瑀等十七人方且出宿歸府狐疑不斷瑀等喢血一呼軀首塗地使天下忠臣義士跼蹐甘禍亂是何智慮之不明器用之寡㣲也夫以將相委任之重從天下想望之志興起以誅洒羣孽若决江湖灌枝燭泰山壓朽株爾遲回自失貽禍宗社使天下以忠為諱兇豎得志人上猶能謂之材烈之士邪通儒巨賢四海所觀望覆敗乃爾尚何責屠羊乗寵無謀而凶終哉學者必猶惑蕃武之事試為陳之自和順之後君道已替政由嬖習使蕃武居股肱地補綻決壞因事諷論不以蕩滅為己任則紀綱勢祚猶可維持為㣲缺之漢而已一旦功力不終為邪黨魚肉使何進小智憤激而辱覆車兇黨竭澤則劉氏遷業矣豈非材不應實覆餗渥形哉愚誠傷漢業將謝陳竇扶起翻為振落之禍耳故君子之立事也乗勢如騎獸搏物如鷹隼騎獸顛則立噬鷙鳥見形則無獲是以不俟終日救患未萌疾雷不及掩耳去惡絶其本根安有處萬全之勢緩毫髪之斷身辱功絶貽禍宗社哉愚柀漢書與賈生異時而慟也温公曰天下有道君子揚于王庭以正小人之罪而莫敢不服天下無道君子囊括不言以避小人之禍而猶或不免黨人生昬亂之世不在其位四海横流而欲以口舌救之臧否人物激濁揚清撩虺蛇之頭踐虎狼之尾以至身被滛刑禍及朋友士類殱滅而國隨以亡不亦悲乎夫唯郭泰既眀且哲以保其身申屠蟠見機而作不俟終日卓乎其不可及已司空圖曰儒衣而漢弁也人望而是之是威其徳也必有操戈待之者矣君子救時也亦必相時度力以致其用不可則静而鎮之以道訓服茍厲鋒氣果於擊搏道不能化力不能制是將濟時重困故元禮之徒終致鈎黨之禍至於張儉又不能引決區區之身雖殘壞天下何裨於吾道哉陳太丘之容衆郭有道之誘人其意未嘗沮物而彼亦不厚其毒利害可見矣且猛摯不革其㬥麟不足以為仁也惡鳥不息其鳴鳳不足以為瑞也況彼二三子甘逞於權豪呶呶以至大亂惟據正而屈己者庶可與權李徳裕曰理平之世教化興行羣臣和於朝百姓和於野人自砥礪無所是非天下焉有朋黨哉仲長統所謂同異生是非愛憎生朋黨朋黨致怨讎是也東漢桓靈之朝政在閽寺綱紀以亂風教寖衰黨錮之士始以議論疵物於是危言危行刺譏當世其志在於維持名教斥逺佞邪雖乖大道猶不失正今之朋黨者皆依倚倖臣誣陷君子鼔天下之動以養交游竊儒家之術以資大盗謂倖臣也所謂教猱升木嗾犬害人穴居城社不可熏鑿漢之黨錮為理世之罪人矣今之朋邪又黨錮之罪人矣仲長統曰才智者亦姦兇之羽翼勇氣者亦盗賊之爪牙誠如是言然辨之未盡如是者皆小才小勇秪能用詭道入邪徑磔鼠穿屋虺毒螫人如巨海隂夜百色妖露焉能白日為怪越人道之行當虀粉矣盧照鄰詠郭泰詩曰大漢昔云季小人道遂振玊帛委閽尹斧鑕嬰縉紳邈哉郭先生卷舒得其真雍容謝朝廷譚􅀏奬人倫在晦不絶俗處亂不為親諸侯不得友天子不得臣冲情甄負甑重價折角巾悠悠天下士相送洛橋津誰知仙舟上寂寂無四鄰陳寔少游曰孟子曰伯夷聖之清者也栁下惠聖之和者也又曰伯夷隘栁下惠不恭何也盖古之君子初無意於制行也因時而已伯夷之時天下失於太濁於是制其行以清栁下惠之時天下失於太潔故制其行以和雖然清者所以激濁也非激濁而為清是隘而已和者所以救潔也非救潔而為和是不恭而已故由其本而言之則為清為和由其弊而言之則為隘為不恭故伯夷栁下惠者實未嘗清實未甞和也安有隘不恭之弊哉前史稱中常侍侯覽托太守髙倫用吏陳寔曰此人不宜用而侯常侍不可違乞從外舉又中常侍張讓歸𦵏潁川雖一郡畢至而名士無徃者讓甚耻之寔乃獨弔焉嗚呼若寔者可謂殆庶㡬於夷惠矣何則桓靈之時政在宦官而天下之士方以髙節相髙疾之已甚至使其屬無所發憤常欲以身死黨錮之禍海内塗炭者二十餘年豈特小人之罪哉君子亦有以取之也寔知其然故於用吏送𦵏之事稍屈其身應之所以因時救弊而已其後復誅黨人張徳寔以此多自全宥則其效盖可見也嗚呼使東漢之士大夫皆如寔也黨錮之禍何從而興乎以此言之寔殆庶㡬於夷惠不誣矣然則寔為侯張而少詘也不為過則元稹之徒因宦官以得宰相亦不為過斯不然也孔子於衛見南子矣於魯欽陽虎矣至彌子以為主我衛卿可得也則曰有命盖見南子欽陽虎者身可詘也不主彌子者道不可詘也寔於侯張亦詘身以伸道耳豈若元稹之徒詘道而伸身者哉然則士大夫為道而不詘身於宦人者亦可乎斯又不然也昔齊人獲臧堅齊侯使人唁之且曰無死堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙决傷而死古之人耻其身之辱於刑臣也如此非寔之時其可詘身於宦人也與故為伯夷之清而非其時者是隘而已若寔之詘身於宦人而非其時者是為姦而已蔡邕言三互法温公曰叔向有言國將亡必多制眀王之政謹擇忠賢而任之凡中外之臣有功則賞有罪則誅無所阿私法制不煩而天下大治所以然者何哉執其本故也及其衰也百官之任不能擇人而禁令益多防閑益宻有功者以閡文不賞為姦者以巧法免誅上下煩擾而天下大亂所以然者何哉逐其末故也孝靈之時刺史二千石貪如豺虎㬥殘烝民而朝廷方守三互之禁以今視之豈不適足為􅀏而深可為戒哉歴代名賢確論卷四十九
