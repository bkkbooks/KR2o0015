body:
  text: 歴代名賢確論卷九十五通論一唐之治亂興亡温公范祖禹石守道東坡何去非張唐英唐之治亂興亡温公論曰髙祖舉晉陽精兵承亡隋之弊席卷長驅奄有闗中命將出師掃除亂略遂降李宻系建徳擒世充芟武周翦黒闥夷蕭銑六年之中海内咸服何成功之速哉蓋以太宗之為子也太宗文武之才髙出前古驅䇿英雄網羅俊乂好用善謀樂聞直諫拯民於水火之中而措之於袵席之上使盜賊化為君子呻吟轉為謳歌衣食有餘刑措不用突厥之渠系頸闕庭北海之濵悉為州縣蓋三代以還中國之盛未之有也惜其好尚功名而不及禮樂父子兄弟之間慙徳多矣髙宗沈溺宴安仁而不武使天后斲喪唐室屠害宗支毒流縉紳迹其本原有自來矣中宗乆罹幽辱備嘗險阻一旦得志荒淫不悛糞土之牆安可汚也睿宗鑒前之禍立嗣以功所謂可與權矣明皇能謀有斷再清内難開元之初憂勤庶政好賢樂善愛民利物海内富庶四夷賔服浸淫於貞觀之風矣及其天寳以降自以功成治定無有後艱志欲既滿侈心乃生忠直寖疎讒䛕並進以遊娯為良謀以聲色為急務以李林甫楊國忠為周召以安禄山哥舒翰為方虎癰疽結於心腹而不寤豺狼遯於藩籬而不知一旦變生所忽兵起邊隅廟堂執檄而心醉猛將望塵而束手腥膻汚於伊洛流血染於河潼乗輿播蕩生民塗地禍亂並興不可救藥使數百年之間干戈爛漫而不息嗟乎靡不有初鮮克有終安之不可恃治之不可保如此夫肅宗以國之元子收兵靈武反斾而東不失舊物代宗分命羣帥翦除兇醜使大河南北復為唐臣其功皆不細矣然此兩君者武不足以決疑明不足以燭理曏無郭子儀之忠李光弼之智因僕固懷恩以困回紇之衆則天下已非唐有矣夫以肅宗之孝慈而制於李輔國不得養其父惑於張后不能庇其子則其武可知矣以代宗之寛仁而聴讒臣之言使光弼不敢入朝憂憤而死懷恩招引外寇幾再亡國則其明可知矣而又不思經逺之謀專為姑息之政盜賊據州郡者因用為牧守士卒殺主帥者因授之旄鉞使彊㬥縱横下陵上替積習成俗莫知其非唐之紀綱大壞不可復振則肅宗之為也徳宗憤積世之弊憫唐室之卑南面之初赫然有撥亂之志而識度闇淺資性猜愎親信多非其人舉措不由其道賦歛煩重果於誅殺故闗外之寇未平而京城之盜先起於是困辱於興元播遷於山南公卿拜于賊庭鋒鏑集於黄屋尚賴陸贄盡心於内李晟渾瑊輸力於外故能誅夷元兇還奉宗社自是之後消剛為柔刓方為圓逮其晚節偷懦之政甚於祖考矣順宗不幸嬰疾姦邪肆志而能委政冢嗣以安社稷足為賢矣憲宗聰明果決得於天性選任忠良延納善謀師老財屈異論輻輳而不為之疑盜發都邑屠害元宰而不為之懼卒能取靈夏清劒南誅浙西俘澤潞平淮右復齊魯於是天下深根固蒂之盜皆狼顧䑕拱納質効地稽顙入朝百年之憂一日廓然矣而怠於防微變生肘腋悲夫穆宗䝉已成之業承既平之緒授任非材為謀不臧使柙中之虎復縱㬥於原野網中之魚自脱於深淵元和之功於兹墜矣寳厯輕易荒縱自貽顛覆文宗優游不斷受制家臣雖有好賢之心文雅之美皆不足稱也武宗英敏特達委任能臣克上黨如拾芥取太原如反掌享國日淺功業未究惜哉宣宗少歴艱難長年踐祚人之情偽靡不周知盡心民事精勤治道賞簡而當罰嚴而必故方内樂業殊俗順軌求諸漢世其孝宣之流亞歟懿宗驕奢無度賊虐不忌輔弼之任委於嬖寵四海之財竭於淫樂民怨不知神怒不恤李氏之亡於兹決矣且唐自至徳以來近習用權藩臣跋扈譬如羸病之人以糜粥養之猶恐不濟又况飲之毒酒其能存乎及僖昭嗣位天禄已去民心已離盜賊徧於寰區蓬蒿塞於城闕漂泊幽辱寄命諸侯當是之時雖欲救之其將能乎范祖禹論曰唐自高祖取隋五年而四方底平九年而太宗立貞觀之治幾於三代然一傳而有武氏之篡國命中絶二十餘年中睿享國日淺朝廷濁亂明皇以兵取而後得之開元之治幾於貞觀而終之以天寳大亂唐室遂微肅宗以後無足稱者惟憲宗元和之政號為中興凡唐之世治日如此其少亂日如彼其多也昔三代之君莫不脩身齊家以正天下而唐之人主起兵而誅其親者謂之定内難偪父而奪其位者謂之受内禪此其閨門無法不足以正天下亂之大者也其治安之乆者不過數十年或變生於内或亂作於外未有内外無患承平百年者也潁濱論曰天下之變常伏於其所偏重而不舉之處故内重則為内憂外重則為外患古者聚兵京師外無彊臣天下之事皆制於内當此之時謂之内重内重之弊姦臣内擅而外無所忌匹夫横行於四海而莫之能禁其亂不起於左右之大臣則生於山林小民之英雄故夫天下之重不可使專在内也古者諸侯大國或數百里兵足以戰食足以守而其權足以生殺然後能使邊隅盜賊之患不至於内天子之大臣有所畏忌而患不作當此之時謂之外重外重之弊諸侯擁兵而内無以制由此觀之則天下之重固不可使在内而亦不可使在外也周衰齊晉秦楚緜地千里内不勝於外以至滅亡而不救秦人患其外已重而至此也於是收天下兵聚之闗中夷滅其城池殺戮其豪傑使天下之命皆制於天子然至二世時陳勝呉廣大呼起兵而郡縣之吏熟視而走無敢誰何趙髙擅權於内頥指如意雖李斯為相備五刑而死於道路其子李由守三川擁山河之固而不敢校也此二患者皆始於外不足而無有以制之也至漢興懲秦孤立之弊乃大封侯王而髙帝之世反者九起其遺孽餘烈至文景而為淮南濟北呉楚之亂於是武帝分裂諸侯以懲大國之禍其後百年間王莽遂得奮其志於天下而劉氏子孫無復齟齬魏晉之世乃益侵削諸侯四方微弱不復為亂而朝廷之權臣山林之匹夫常為天下之大患此數君者其所以制其内外輕重之際皆有以自取其亂而莫之或知也夫天下之重在内則為内憂在外則為外患而秦漢間不求其勢之本末而更相懲戒以就一偏之利故其禍循環無窮而不可解也且天子之於天下非如婦人孺子之愛其所有也得天下而謹守之不忍以分於人此匹夫之所謂智也而不知其無成者未始不自不分始故夫聖人將有所大定於天下非外之有權臣則不足以鎮之也而後世之君乃欲去其爪牙翦其股肱而責其成功亦已過矣夫天下之勢内無重則無以威外之彊臣外無重則無以服内之大臣而絶姦民之心此二者其勢相持而後成而不可一輕者也昔唐太宗既平天下分四方之地盡以沿邊為節度府而范陽朔方之軍皆帶甲十萬上足以制邊境難下足以備匹夫亂内足以禁大臣變而將帥之臣常不至於叛者内有重兵之勢以豫制之也貞觀之際天下之兵八百餘府而在闗中者五百舉天下之衆而後能當闗中之半然而朝廷之臣亦不至於乗隙伺釁以邀大利者外有節度之權以破其心也故外之節度有周之諸侯外重之勢而易置從命得以擇其賢不肖之才是以人君無征伐之勞而天下無世臣暴虐之患内之府兵有秦之闗中内重之勢而左右謹飭莫敢為不義之行是以上無逼奪之危下無誅絶之禍蓋周之諸侯内無府兵之威故陷於逆亂而不能以自止秦之闗中外無節度之援故脅於大臣而不能以自立有周秦之利而無周秦之害形格勢禁内之不敢為變而外之不敢為亂未有如唐制之得者也而天下之士不究利害之本末猥以成敗之遺蹤而論計之得失徒見開元之後彊兵悍將皆為天下之大患而遂以太宗之制為猖狂不審之計夫論天下論其勝敗之形以定其法制之得失則不若窮其所由勝敗之處葢天寳之際府兵四出萃於范陽而徳宗之世禁兵皆戍趙魏是以禄山朱泚得至於京師而莫之能禁一亂塗地終於昭宗而天下卒無寧嵗内之彊臣雖有輔國元振守澄士良之徒而卒不能制唐之命誅王涯殺賈餗自以為威震四方然劉從諫為之一言而震慴自歛不敢復肆其後崔昌遐倚朱温之兵以誅宦官去天下之監軍而無一人敢與抗者由此觀之唐之衰其弊在於外重而外重之弊起於府兵之在外非所謂制之失而後世之不用也何去非論曰據天下之勢必有所以制天下之權葢權待勢而立勢待權而固有是之勢而其權不足以固之則其勢日就傾弱而天下莫能安彊是以人主之於權也不可一日使之去已而分於人凡物之去已者猶可收分者猶可全也至於權也一去而不可復收一分而不可復全而所據之勢隨之可不慎哉昔者唐之太宗以神武之略起定禍亂以王天下威加四海矣然所謂固天下之勢以遺諸子孫者葢未立也於是乎籍兵於府置將於衛據闗而臨制之處兵於府則將無内専之權處將於衛則兵無外擅之患然猶以為未也乃大誅四夷之侵侮者破突厥夷吐渾平高昌滅焉耆皆俘其王親駕遼左而殘其國凡此者非以黷武也皆所以立權而固天下之勢者也武后以女主專制挟唐以令天下圖移神器天下之人莫不屏息重足從其制命彼得天下之權而逆持之然猶若此况以順守者哉明皇以英果之氣起平内難遂襲大統可謂誼主矣然狃於承平宴安之乆府衛之制一切廢壞盡推其權以假邊將禄山虎視幽薊横制千里而軍中之吏凡三千人故范陽之變一起天下大震徒驅市人以嬰其鋒使微肅宗召號忠義駕馭豪武奮不顧身與之從事則兩都不復矣雖能再造王室然其所賴以收天下者皆為方鎮矣天下之權已分於下而不全矣至於代室僅夷殘盜乃𤓰裂河朔以帥寇黨遂相為背腹世襲不禁陵夷至於大厯貞元之間兩河方鎮日以强肆而當時之君畏縮摧抑常若抱虎包羞含垢媚嫵不暇以茍旦暮之無事而陵犯益至雖内設禁軍統以閹尹然亦不足以待天下之變故涇師之亂而神䇿六軍召之無一至者從奉天之幸者四百士耳及章武之興天下之為方鎮者五十縣官賦入止於東南八道而已而章武乃能振激武烈期於不赦排斥衆議而大治之於是擒劉闢於劒南執李錡於浙西縳盧從史於昭義服王承宗於鎮冀誅李師道淄青五世之襲平呉元濟淮西三世之叛可謂盛烈矣然其至於後世益以不振在内之權而閹尹執之在外之權而方鎮執之寖微寖削而遂至於亡焉蓋唐以權奪勢傾而亡天下然其亡不在乎僖昭之世而在乎天寳之載焉以其喪所以制天下之權者實兆乎此故也故其後世之君若章武者僅能自立不為之深屈而已况其非章武者乎嗟夫後之為天下者茍無意於所執之權而為人執之則視唐可知也矣張唐英論曰太宗文皇既受内禪孜孜求治勤勞萬機聴納諫諍寛恤刑獄平壹征賦減省用度駕馭中外撫養生聚不以大寳為貴不以黄屋為心謙虚以接羣臣果斷以決大事恐懼丕業務成太平之治内有房杜以經綸庶政外有英衛以征討四方有魏公王珪之啓沃有馬周劉洎之議論有無忌士亷之保祐有季輔行成之正色有文本正倫之維持有戴胄伏伽之執法有世南百藥之經術聴政之暇則引文學之士更直閣下以商搉古今是非諮訪治道之得失此天下不得不治也高宗之初承貞觀之遺跡耆儒碩臣尚布中外故永徽之初亦克乂寧及夫無忌遂良韓瑗來濟上官儀之徒繼遭竄戮忠義之士結舌避禍詭誕之臣攘袂而進而李義府許敬宗之倫倒持國柄尤為巨蠧復有武媪悍妬恣窮妖淫僴然自得不復愧恥此不得不亂爾中睿之朝武三思太平安樂等公主倚恃城社競為狐䑕號令刑政棼然無紀朝廷乃市道之藪刑賞乃權倖之柄明皇帝躍於艱危之際目擊衰敝之政即位之始鏟除汙迹一新王道擯絀姦詭登用賢俊講求治體尊尚儒術姚崇宋璟以忠正而用張説二蘇以文雅而進李元紘盧懷慎以清儉而任魏知古源乾曜以吏術而升張九齡韓休以方正而選此不得不治爾及夫天寳之間驕於承平游心於神仙之妄肆情於嬖倖之寵周子諒直言而撲死於文陛李適之介訐而貶死於宜春内則楊李紊壞國體外則哥牛邀求邊功社稷已危而未悟姦雄已萌而不知遂使草鞠繁華之地兵屯宫禁之下至於肅宗之時李輔國用事而有南内之變代宗之世魚朝恩持權而有陜州之幸徳宗以雄略之才欲刷多難然而炎杞以憸巧之才取怨四方以至涇原之兵竊發輦下悤遑奉天之狩窘迫興元之幸外臣由是倔彊帝祚由是漸弱順宗之朝伾文執誼之徒凡所施設尤可嗤笑憲宗中興欲洗宿憤任用武元衡杜黄裳裴度崔羣權徳輿韋處厚裴洎等取蜀夏平淮蔡收冀鄆然望開元已邈然不及矣况貞觀乎穆宗昭愍文武宣懿而下忽治忽亂忽得忽失注訓以小器而大謀牛李以私怨而公報盜賊由是蜂起藩鎮由是跋扈災連禍踵遂失天下每觀其史未嘗不痛心疾首以至泣下沾襟而不能止也石守道論女后中官姦臣曰夫前車覆後車戒前事之失後事之鑑湯以桀為鑑故不敢為桀之行而湯徳克明隆祀六百周以紂為鑑故不敢為紂之惡而周道彌盛傳世三十漢以秦為鑑故不敢為秦之無道而漢業益茂延洪四百年唐以隋為鑑故不敢為隋之暴亂而唐室攸乆永光十八葉國家雖承五代後實接唐之緒則國家亦當以唐為鑑臣逖覽往古靡不以女后用事而喪國家者臣觀唐最甚矣武后變唐為周韋庶人安樂公主鴆殺中宗太平公主潛謀逆亂楊貴妃召天寳之禍臣歴觀前世鮮不以閹宦用權而傾社稷者臣視唐尤傷矣代宗遭輔國之侮蔑憲宗被陳慶之弑逆昭宗為季述之囚辱臣𦕈尋歴代無不以姦臣専政而亂天下者臣視唐至極矣禄山之亂則林甫國忠為之也陳慶之弑則皇甫鎛為之也嗚呼姦臣不可使専政女后不可使豫事宦官不可使用權明皇始用姚崇宋璟則治終用林甫國忠則亂徳宗始用崔祜甫陸贄則治終用盧杞裴延齡則亂憲宗始用裴度則治終用皇甫鎛則亂自武后奪國迄于中睿暨天寳年政由女后而李氏幾喪自肅宗踐位歴于代宗徳宗順宗憲宗穆宗文宗武宣僖昭權在中官而唐祚終去詩曰赫赫宗周褒姒滅之然則巍巍鉅唐女后亂之姦臣壞之宦官覆之臣故探摭唐史中姦臣宦官女后事迹各以類集作為三卷謂之唐鑑噫唐十八世三百年惟武徳貞觀開元元和百數十年禮樂征伐自天子出女后亂之於前姦臣壞之於中宦官覆之於後顛倒﨑危綿綿延延乍傾乍安若續若絶僅能至于三百年何足言之後之為國者鑒李氏之覆轍勿専政於女后勿假權於中官勿委任於姦臣則國祚延洪歴世長逺當傳于子傳于孫可至於千萬世豈止齷齪十八帝局促三百年者哉東坡論唐之亂始自明皇曰夫孫武戰國之將也知為呉慮而已矣是故以將用之則可以君用之則不可今其書十三篇小至部曲營壘芻糧器械之間而大不過於攻城拔國用間之際葢亦盡於此矣天子之兵天下之勢武未及也其書曰將能而君不御者勝為君而言者有此而已竊以為天子之兵莫大於御將天下之勢莫大於使天下樂戰而不好戰夫天下之患不在於寇賊亦不在於敵國患在於將帥之不力而以寇賊敵國之勢内邀其君是故將帥多而敵國愈彊兵加而寇賊愈堅敵國愈彊而寇賊愈堅則將帥之權愈重將帥之權愈重則爵賞不得而加夫如此則是盜賊為君之患而將帥利之敵國為君之讎而將帥幸之舉百倍之勢而立毫芒之功以藉其口而邀利於其上如此而天下不亡者特有所待耳昔唐之亂始於明皇自肅宗復兩京而不能乗勝并力盡取河北之盜徳宗收洛博幾定魏地而不能斬田悦於孤窮之中至於憲宗天下略平矣而其餘孽之存者終不能盡去夫唐之所以屢興而終莫之振者何也將帥之臣養寇以自封也故曰天子之兵莫大於御將御將之術開之以其所利而授之以其所忌如良醫之用藥鳥喙蝮蝎皆得自効於前而不敢肆其毒何者授之以其所畏也憲宗將討劉闢以為非高崇文則莫可用而劉雍者崇文之所忌也故告之曰闢之不克將雍實汝代是以崇文決戰不旋踵擒劉闢此天子御將之法也夫使天下樂戰而不好戰者何也天下不樂戰則不可與從事於危好戰則不可與從事於安昔秦人之法使吏士自為戰戰勝而利歸於民所得於敵者即以有之使民之所以養生送死者非殺敵無由取也故其民以好戰并天下而亦以亡夫始皇雖已墮名城殺豪傑銷鋒鏑而民之好戰之心囂然其未已也是故不可與休息而至於亡若夫王者之兵要在於使之知愛其上而讎其敵使之知其上之所以驅之於戰者凡皆以為我也是以樂其戰而甘其死至於其戰也務勝敵而不務得財其賞也發公室而行之於朝使其利不在於殺人是故其民不忘於好戰夫然後可以作之於安危之中而休之於爭奪之際可與安可與危而不可與亂此天下之勢也歴代名賢確論卷九十五
