body:
  text: 歴代名賢確論卷八十肅宗一即位靈武范祖禹太上皇范祖禹寶應元年四月崔侁奏尼真如登天得鎮國寶十三枚以鎮國災甲寅上皇崩丁卯帝崩范祖禹去尊號去年號以建子月為嵗首范祖禹帝在彭原與張良娣博范祖禹上始以官爵賞功而朝士僮僕有衣金紫執役者大將軍告身一通才易一醉范祖禹帝初與回紇約克京城日金帛子女皆歸之至廣平王俶等收東京回紇大掠三日范祖禹命九節度討安慶緒不置元帥以魚朝恩為觀軍容使九節度之師六十萬潰於相州范祖禹帝不聽李泌先取范陽之謀秦少游以六等定陷賊官罪悔誅陳希烈等温公更制樂器東坡以李峴論毛若虚鞫獄不實罷相降蜀州刺史孫之翰藩鎭范祖禹温公李揆張唐英李勉范祖禹即位靈武范祖禹論曰哥舒翰守潼關王思禮請回兵誅楊國忠翰曰此乃翰反非禄山也翰僨軍降虜固無足道然其言可為後法肅宗以皇太子討賊至靈武遂自稱帝此乃太子叛父何以討禄山也唐有天下幾三百年由漢以來享國最為長久然三綱不立無父子君臣之義見利而動不顧其親是以上無教化下無亷恥古之王者必正身齊家以率天下其身不正未有能正人者也唐之父子不正而欲正萬事難矣其享國長久亦曰幸哉太上皇范祖禹論上迎上皇於望賢宫釋黄袍嘗膳習馬執鞚前引曰肅宗以皇太子討賊遂自立於靈武不由君父之命而有天下是以不孝令也及其迎上皇於望賢宫百姓皆注耳目則辭帝服避馳道屑屑焉為末禮以眩耀於衆豈其誠乎况其終也用婦言而保姦謀遷其父於西宫卒以憤鬰而殞事親若此罪莫大焉且臨危則取大利居安則謹小節以是為孝亦已悖矣孟子曰不能三年之喪而緦小功之察放飯流歠而問無齒決其肅宗之謂乎又論帝遷上皇西内後感李唐對上皇亦思見陛下之言然畏張后不敢詣西内曰陽失其所以為陽則制於隂剛失其所以為剛則困於柔肅宗不君故制於小人女子不能讎疾而反畏之欲見其父而且不敢其況能保四海乎寶應元年四月崔侁奏尼真如登天得鎮國寶十三枚以鎮國災甲寅上皇崩丁卯帝崩范祖禹論曰昔堯命重黎絶地天通盖惡神人雜揉巫覡矯妄而誣天罔民也後世主昏於上民迷於下黷亂天地無所不有肅宗父子不相信妖由人興故姦偽得以惑之獲寶不一月而二帝崩吉凶之驗亦可睹矣又論李輔國殺張后及越王係兖王僴曰李輔國本飛龍馬家皂𨽻之流肅宗尊寵而任之委之以政授之以兵明皇以憂崩已以駭没張后二王以戮死上不保其父中不保其身下不保其妻子此近小人之禍也可不戒哉去尊號去年號以建子月為嵗首范祖禹論曰肅宗信禳祈之小數以為更制改號可以致福而弭禍夫畏鬼神聽巫覡者匹婦之愚也以天下之君為之不亦異乎帝在彭原與張良娣博范祖禹論曰明皇播遷於蜀肅宗越在草莽宗廟焚毁社稷丘墟此痛心嘗膽之時也而於軍旅之中與婦人嬉戲豈非以位為樂乎肅宗之志不及逺矣享國不永此其兆歟上始以官爵賞功而朝士僮僕有衣金紫執役者大將軍告身一通才易一醉范祖禹論曰傳曰不軌不物謂之亂政官爵者人君所以馭天下不可以虚名而輕用也君以為貴則人貴之君以為賤則人賤之難得而加於君子則貴矣易得而施之小人則賤矣肅宗欲以茍簡成功而濫假名器輕於糞土此亂政之極也唐室之不競不亦宜乎帝初與回紇約克京城日金帛子女皆歸之至廣平王俶等収東京回紇大掠三日范祖禹論曰肅宗欲克復唐室茍求天下之賢而與之共天下之功因民之心以討暴逆何患乎賊之不滅而唐之人主好結諸蕃以求其援肅宗姑務欲速不為逺謀至使回紇縱掠與賊無異其失民也不亦甚乎昔武王伐商亦有微盧彭濮春秋之時姜戎常佐晉征討皆以中國之師制之使為犄角之助而已至於後世則倚外域以成功與之共事未有不為患者也命九節度討安慶緒不置元帥以魚朝恩為觀軍容使九節度之師六十萬潰於相州范祖禹論曰夙沙衛殿齊師殖綽郭最曰子殿國師齊之辱也夫以諸侯之師使閹人殿之猶以為辱况天子之師而使宦者為之主帥乎是辱天下之衆也且慶緒窮冦郭李不世出之將也使朝恩節制之猶不免於敗則庸人可知矣肅宗初復兩京舉六十萬之衆而棄之其不亡亦幸哉帝不聽李泌先取范陽之謀秦少游論曰臣聞有善聽無良謀有善謀無利勢天下之勢善謀之則無不利天下之謀善聽之則無不良臣嘗以為唐室方鎮之患至於百有餘年而不能解者其弊葢始於天寶之際肅宗不用李泌之謀先取范陽而已何則范陽者禄山之巢穴也鳥焚其巢雖有勁翮無所歸獸失其穴雖有絶足無所恃其勢也禄山帥范陽専三道勁兵不徙者十有四年矣其人視之猶子之於父母也一旦舉兵犯順天下之人以為反賊切齒攘袂惟恐其不滅而范陽之人獨以為主引頸企踵惟恐其不興此所謂家臣不知有國自古小人之常情故郭子儀李光弼自朔方起兵皆欲先圖范陽而泌為肅宗言之最悉此盖天下利勢乘之不可失者使肅宗能聽其計先詔李郭諸將犄角而取范陽賊失巢穴則其衆自潰兩京可以傳檄而定兵亦遂息矣唯其不用泌謀是以慶緒思明相繼復起至兇徒逆黨久稽天誅則偷為一切之計𤓰分河北地以付之此方鎮之患所從起也昔之取天下者皆以首事之地為根本故雖困敗而能復振高祖之保闗中光武之據河内魏武之全兖州是也夫范陽者亦禄山之闗中河内兖州也方其陷兩京所得禁府珍寶輙以槖駞載歸其俗至謂禄山思明為二聖後十七年張𢎞靖欲懲其事發墓毁棺而衆猶不悅以至於亂由是言之天寶之際若非唐之威德在人忠臣義士乃心王室則天下之事可勝言哉栁玭稱兩京之復泌謀居多其功大於魯連范蠡若以范陽言之泌之謀不見聽者多矣其言王者之師當務萬全圖久安使無後害又得兩京則賊再亂已而果然嗚呼使泌之謀盡見聽也豈有方鎮之患哉以六等定陷賊官罪悔誅陳希烈等司馬温公論曰為人臣者䇿名委質有死無二希烈等或貴為卿相或親連肺腑於承平之日無一言以規人主之失救社稷之危迎合取容以竊富貴及四海横潰乘天子播越偷生茍活顧戀妻子媚賊稱臣為之陳力此屠酤之所羞犬馬之不如儻更全其首領復其官爵是諂諛之臣無往而不得計也彼顔杲卿張廵之徒世治則擯斥外方沉抑下僚世亂則委棄孤城虀粉冦手何為善者之不幸而為惡者之幸朝廷待忠義之薄而保姦邪之厚邪至於微賤之臣廵徼之𨽻謀議不豫號令下變朝聞親征之詔夕失警蹕之所乃復責其不能扈從不亦難乎六等議刑斯亦可矣又何悔焉更制樂器東坡曰唐之初即用隋樂武德九年始詔祖孝孫竇琟等定樂初隋用黄鍾一宫惟擊七鐘其五懸而不擊謂之啞鐘張文収乃依古斷竹為十二律與孝孫等次調五鐘叩之而應由是十二鐘皆用而肅宗時山東人魏延陵得律圖李輔國奏之云太常樂調皆下不合黄鍾請悉更制諸鐘磬帝以為然乃悉取諸樂器摩剡之二十五日而成然以漢律考之黄鍾乃太簇也當時議者以為非是唐用肅宗樂以後政日急民日偷以至於亡以理推之其所謂下者乃中聲也悲夫以李峴論毛若虚鞫獄不實罷相降蜀州刺史孫之翰論曰肅宗逐李峴不惟為内臣所制亦昏暗而然也峴之名徳為時信重作相未踰月論議風采已能聳動中外及論毛若虚姦回致崔伯陽等無罪譴逐此固易明之事一縣尉捕殺馬坊卒非兇暴之甚安敢行法但李輔國言卒之寃伯陽等數名臣案覆之具得其狀獨若虚附會輔國亦言其寃肅宗不信伯陽等公正之言但慿若虚姦回之奏此豈非為輔國所制而然爾既為内臣所制枉逐正人賢相辨之復以為累且對侍臣言峴專權逐之逺郡猶為寛法是果不能辨事之曲直察臣之枉正豈非昬暗也輔國一閹人以護從微勞寵用過分遂致强横撓亂國法公卿百官承附者衆峴既相首論其狀輔國尋讓位雖出忿意是亦知懼也一閹人方强横天子不能制大臣不敢忤賢者作相首挫其鋒若任之嵗時必能制其姦惡不至於甚峴方盡心國事無所畏避肅宗以為専權而逐之養成輔國之勢卒為大惡噫肅宗中興之主也以過寵内臣遂昬懦至此惜哉藩鎮范祖禹論邢延恩請劉展為淮南都統因除之展知謀以宋州兵赴鎮陷潤昇等十餘州曰邢延恩一言而朝廷失信藩臣背叛江淮數千里罹塗炭之患甚矣小人之交亂四國也肅宗不明有以來䜛慝之口豈特一延恩之罪哉又論裴茙受密敇襲來瑱瑱擊擒茙送京師賜死曰肅宗信䜛黜陟不明以藩鎮為餌欲誘反側之臣故劉展叛於前來瑱亂於後皆朝廷易置不以其道故也且瑱未失臣節而行裴茙簒奪之謀使茙克瑱而代其位不若瑱跋扈之為愈也夫藩臣倔彊阻兵得一賢相足以制之肅宗謀及宦者得無亂乎司馬温公論平盧節度使王元志卒李懐玉殺元志子推侯希逸為節度上令中使就授旄節曰夫民生有欲無主則亂是故聖人制禮以治之自天子諸侯至於卿大夫庻人尊卑有分大小有倫若綱條之相維臂指之相使是以民服事其上而下無覬覦其在周易上天下澤履象曰君子以辨上下定民志此之謂也凡人君所以能有其臣民者以八柄存乎已也茍或捨之則彼此之勢均何以使其下哉肅宗遭唐中衰幸而復國是宜正上下之禮以綱紀四方而偷取一時之安不思永久之患彼命將帥統藩維國之大事也乃委一介之使徇行伍之情無問賢不肖惟其所欲與者則授之自是之後積習為常君臣循守以為得䇿謂之姑息乃至偏禆士卒殺逐主帥亦不治其罪因以其位任授之然則爵禄廢置殺生予奪皆不出於上而出於下亂之生也庸有極乎且夫有國家者賞善而誅惡故為善者勸為惡者懲彼為人下而殺逐其上惡孰大焉乃使之擁旄秉鉞師長一方是賞之也賞以勸惡惡其何所不至乎書云逺乃猷詩云猷之未逺是用大諌孔子曰人無逺慮必有近憂為天下之政而專事姑息其憂患可勝校乎由是為下者常盻盻焉伺其上茍得間則攻而發之為上者常惴惴焉畏其下茍得間則掩而屠之争務先發以逞其志非有相保養為俱利乆存之計也如是而求天下之安其可得乎迹其厲階肇於此矣盖古者治軍必本於禮故晉文公城濮之戰見其師少長有禮知其可用今唐治軍而不顧禮使士卒得以陵偏禆偏禆得以陵將帥則將帥之陵天子自然之勢也由是禍亂繼起兵革不息民墜塗炭無所控訴凡二百餘年及大宋受命後太祖始制軍法使以階級相承小有違犯咸伏斧鑕是以上下有序令行禁止四征不庭無思不服宇内乂安兆民允殖以迄于今皆由治軍以禮故也豈非詒謀之逺哉李揆張唐英論曰李揆與吕諲同相肅宗諲才居揆之上及諲以事出守荆南而政譽甚美再入為相密遣直省官往江陵求諲之事諲乃奏之揆貶袁州刺史噫揆欲陷諲乃自陷也且執大政於巖廊之上當思所以輔翼人主之道以澤天下而不誤蒼生不以喜怒私國家之法不以親讎壞朝廷之公賢有讎必擢㧞而用之不肖而親者必擯斥而去之庻幾上不負於君下不愧於人而反惡其有美政而恐得用欲求其瑕隂肆傾陷此豈有心於天下哉盖筆札之士非廊廟之器其始進也不考其實如南郭先生之徒及得位而不知所以為大臣之道而恃居中制外有臨髙走丸之易而欲害外臣豈不愧於古之祁奚哉真懐腐而欲香入水而求不濡之人也噫身為大臣而父事中人李輔國而復嫉害正人其後元載用事而置之散地卒至流落葢亦有所召也李勉范祖禹論彈管崇嗣朝儀不肅曰昔趙襄子有晉陽之難羣臣皆懈惟髙共不敢失禮及襄子行賞以共為先肅宗之在朔方唐室危如綴旒李勉不以王路夷險易其心不以君父在草莽而廢其職事君若此可謂忠正之士矣歴代名賢確論卷八十
