body:
  text: 歴代名賢確論卷八成王上卜年卜世孫邰翦桐葉封弟栁州辨周禮田制潁濱周制事在末老泉成王周公恭信東坡卜年卜世孫邰曰周成王定鼎于郟鄏卜世三十卜年七百夫帝王括囊宇宙位重憂崇天生利民非樂兆民之上故君民者遇夫聖則禪之不遇則以子繼之堯之於舜舜之於禹禹之於子是以周都天地之中欲便四方之㑹不恃山河務從德化原其意也在乎利民豈異唐虞之道而反卜年卜世耶必也欲求其祚莫先德義貽厥後世天人祐之豈非無窮也哉何三十七百年世之有若右其卜而左其德俾乎厥後恃年世之永久必輕乎德義若此之謀非君子之道也昔太戊懼災而盛帝辛恃瑞而亡在此不在彼豈不知之而卜年卜世者乎翦桐葉封弟栁州曰古之傳者有言成王以桐葉與小弱弟戲曰以封汝周公入賀王曰戲也周公曰天子不可戲乃封小弱弟於唐吾意不然王之弟當封耶周公宜以時言于王不待其戲而賀以成之也不當封耶周公乃成其不中之戲以地以人與小弱者為之主其得為聖乎且周公以王之言不可茍焉而已必從而成之耶設有不幸王以桐葉戲婦寺亦將舉而從之乎凡王者之德在行之何若設未得其當雖十易之不為病要于其當不可使易也而况以其戲乎若戲而必行之是周公教王遂過也吾意周公輔成王宜以道從容優樂要歸之大中而已必不逢其失而為之辭叉不當束縛之馳驟之使若牛馬然急則敗矣且家人父子尚不能以此自克况號為君臣者耶是直小丈夫􅆙􅆙者之事非周公所宜用故不可信或曰封唐叔史佚成之辨周禮田制潁濱曰世言周公之所以治周者莫詳于周禮然以吾觀之秦漢諸儒以意損益之者衆矣非周公之完書也何以言之周之西都今之闗中也其東都今之洛陽也二都居北山之陽南山之隂其勢東西長南北短短長相補不過千里古今一也而周禮王畿之大四方相距千里如畫棊局近郊遠郊甸地稍地小都大都相距皆百里千里之方地實無所容之故其畿内遠近諸法類皆空言耳此周禮之不可信者一也書稱武王克商而反商政列爵惟五分土惟三故孟子曰天子之制地方千里公侯百里伯七十里子男五十里不能五十里不達於天子附于諸侯曰附庸鄭子産亦云古之言封建者盖若是而周禮諸公之地方五百里諸侯四百里諸伯三百里諸子二百里諸男百里與古說異鄭氏知其不可而為之說曰商爵三等武王增以子男其地猶因商之故周公斥大九州始皆益之如周官之法於是千乗之國自一成十里而出車一乗千乗而千成非公侯之國無以受之吾竊笑之武王故封而周公大之其勢必有所幷有所幷必有所徙一公之封而子男之國為之徙者十有六封數大國天下盡擾此書生之論而有國者不為傳曰方里而井十井為乗故十里之邑而百乗百里之國而千乗千里之國而萬乗古之道也不然百乗之家為方百里萬乗之國為方數圻矣古無是也語曰千乗之國攝乎大國之間千乗雖古之大國而於衰周為小孔子猶曰安見方六七十如五六十而非邦也者然則雖衰周列國之强家猶不及五十里者矣韓氏羊舌氏晉大夫也其家賦九縣長轂九百其餘四十縣遺守四千謂一縣而百乗則可謂一縣而百里則不可此周禮之不可信二也王畿之内公邑為井田鄉遂為溝洫此二者一夫而受田百畝五口而一夫為役百畝而稅之十一舉無異也然而井田自一井而上至于一同而方百里其所以通水之利者溝洫澮三溝洫之制至于萬夫方三十二里有半其所以通水之利者遂溝洫澮川五利害同而法制異為地少而用力博此必有國者不為也楚蒍掩為司馬町原防井衍沃盖平川廣澤可以為井者井之原阜隄防之間狹不可井則町之皆因地以制廣狹多少之異井田溝洫盖亦然耳非公邑必為井田而鄉遂必為溝洫此周禮之不可信三也三者既不可信則凡周禮之詭異遠于人情者皆不足信也古之聖人因事立法以便人者有矣未有立法以强人者也立法以强人此迂儒之所以亂天下也周制事在末老泉曰天下之事制之在始始不可制制之在末是以君子慎始而無後憂救之于其末而其始不為謀失諸其始而要之其終而天下無遺事矣是故古者之制其始有百年之前而為之者也盖周公營于東周數百年而待乎平王之東遷也然及其収天下之士而責賢不肖之分則未嘗於其始焉而制其極盖常舉之於諸侯考之于大學引之於射宫而試之以弓矢如此其備矣然而管叔蔡叔文王之子而武王周公之弟也生而與之居處習知其性之所好惡與夫居之於大學而習之于射宫者宜愈詳矣然其不肖之實卒不見于此時及其出為諸侯監國臨大事而不克自定然後敗露以見其不肖之狀且夫張弓而射之一不失容此不肖者或能焉而聖人豈以此為足以盡人之才盖將為此名以収天下之士而後觀其臨事而黜其不肖故曰始不可制制之在末成王周公恭信東坡曰國之將興必有繼天之主建都邑立藩輔以定天命而宅民心為子孫之師亦必有命世之臣考禮樂修法令以定國是而正風俗為卿大夫之宗然後世世可以垂拱䝉成雖有中主弱輔而不至於亂故書曰孺子來相宅其大惇典商獻民亂為四方新辟作周恭先予且以多子越御事篤前人成烈答其師作周孚先國之所恃者法與人也詩曰雖無老成人尚有典刑故周公以謂惇典而用賢可以定國後之言恭者必稽焉傅說有言事不師古以克永世匪說攸聞今不師古後不師今故周公以謂我當與卿大夫士篤前人成烈以答衆心則後之言信者必師焉夫以成王之賢周公之信其所以為後世先者不過于恭與信而已詩曰自古在昔先民有作溫恭朝夕執事有恪閔馬父曰古稱恭者曰自古曰在昔曰先民其嚴如是愚以是知恭之大者盖堯之允恭孔子之溫恭非獨恭世子之恭楚恭王之恭也成王以是為後世先也不亦宜乎大有上吉履信思乎順又以尚賢也是以自天祐之吉無不利又曰自古皆有死民無信不立信之為德也重於兵而急于食周公以是為後世先也不亦宜乎歴代名賢確論卷八
