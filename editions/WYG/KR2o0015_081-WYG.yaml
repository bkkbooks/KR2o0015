body:
  text: 歴代名賢確論卷八十一肅宗二房琯東坡范祖禹桞子厚張唐英李光弼孫之翰范祖禹子由張廵許逺李翰昌黎栁子厚韋應物白樂天房琯東坡論陳濤斜之敗曰房次律敗於陳濤斜殺四萬人悲哉古之言兵者或取通典通典雖杜佑所集然其出於劉秩陳濤之敗秩有力焉次律云曵洛河雖多安能敵我劉秩挾區區之辨以待曳洛河踈矣范祖禹曰房琯有髙志虛名而無實才肅宗既疎之而猶以為將帥倚其能成克復之功是不知其臣也琯以䜛見疎而猶以討賊為己任是不量其君也君不知其臣臣不量其君而欲成天下之務未之聞也且肅宗任琯而琯任劉秩君臣不知人如此夫安得不敗乎栁子厚相國房公徳銘之隂曰天子之三公稱公王者之後稱公諸侯之入為王卿士亦曰公有土封其臣稱之曰公尊其道而師之稱曰公楚之僭凡為縣者皆曰公古之人通謂年之長老曰公故言三公若周公召公王者之後若宋公為王卿士若衛武公虢文公鄭桓公其臣稱之則列國皆然師之尊若太公楚之為縣者若葉公白公年之長老若毛公涪公而大臣罕能以姓配公者雖近有之然不能著也唐之大臣以姓配公最著者曰房公相𤣥宗有勞於蜀人咸服其節相肅宗作訓於岐人咸尊其道惟正直慈愛以成於德用是進退所居而事理辨所去而人哀號理逺人逺人不勝其懐為文士趙郡李華銘公之德故不克立今刺史太原王涯嘉公之道猶存乎人人不忘公之道為之刻石且曰州之南有亭曰需宴亭公之為也人之思也乃増飾棟宇即而立焉州人大悦咸㑹隕涕言曰昔公以周召之德微子之仁有土封以為卿士道為三公德為國師年為元老嘗為縣縣懐其化至於州州濡其澤凡公子孫㒺不戴慕盛德之詞文而不刻刺史數十莫克興起乃卒歸於王公王公嘗以機密匡天子於禁中遵公之道刺於我邦承公之理又能尊公之德起遺文以昭前烈則其入為卿士三公也孰曰不宜吾懼其去我也遽願書於銘之陰用永表於邦之良政張唐英論曰議者謂賀蘭進明不出兵以救睢陽致賊將尹子竒攻陷其城執殺張巡姚誾南霽雲許逺皆進明所致也今觀其本末則非進明之罪乃房琯之罪也何以明之且琯與進明有隙除為嶺南節度及辭之日具言為琯所排肅宗改授河南節度兼御史大夫守臨淮琯惡進明之戾於已也乃除許叔冀為進明都知兵馬使兼御史大夫使權位與進明相敵而不可度制及南霽雲來乞兵進明懼叔冀相襲不敢分兵以援之遂致睢陽之陷嗚呼身為國相當天下横流奔潰之際不能進賢授能推至公以拯天下之難蜂蠆其心求釋已憾以亞相之爵假於兇竪俾伺正人而毒之卒致睢陽不救忠義被害一郡之民肝血塗地非琯致之而孰致之耶夫燕雀巢於一室子母相哺姁姁然自以為安也竈突火焚不知託迹無地其琯之謂也當是時上皇在蜀天子在靈武雖幽閨婦女草野童竪雖無知識必亦忿然思刷國恥而琯為執政大臣曾不是思務為小人隂險之行是姁姁自安也彼誠何心哉而杜甫區區尚謂其大臣之子能自樹立盖徒慕其風流虚名如王衍何晏而不考其實爾噫此輩真地餠爾豈有益於天下哉李光弼孫之翰論李光弼斬崔衆曰將帥専閫外之事不行法不尚威固難立功然行法尚威止以制服部下將士使之一禀命令盡力於事也若天子遣使於軍中有所違犯亦與部將為比而戮之則置朝廷於何地況靈武初基大亂未定為將帥者固當盡忠義之心尊奉王室以起盛大之勢尚慮威靈未振安得為强横之態以輕朝廷也崔衆奉詔交兵驕慢將帥此雖有罪奈奉朝命何不論奏其狀乞行國法於時天子方倚任將帥必無不從之理天子從而行法則將帥尊朝廷威三軍二事俱得矣何至忿其無禮遽行軍法朝廷召任其人堅拒所命至言宣敕則斬中丞拜宰相則斬宰相此彊横之態甚矣且如穰苴為將於戰國之世斬監軍以立威者蓋苴起卑下未為將士信服故請君之寵臣監軍因其有犯而行法用此立威以濟國事非謂已有所忿也光弼授將帥之任功効已著威名已髙不待戮衆而三軍信服矣況衆為御史奉朝命交兵又非監軍之比以驕慢戮之是因忿而行法至有斬宰相之言豈非强横之態也將帥之臣遇朝廷微弱强横自恣此固跋扈者常態耳光弼忠賢不當如是蓋暗於大體忿而不思也光弼將帥之材傑出於時平賊之功髙於諸將晚年為讒邪所間大節微虧蓋不能去彊横之態也可不惜哉又論史思明降光弼使烏承恩殺恩明不克思明復叛曰李光弼謀史思明事何其不度事機不顧國體之甚也思明為禄山逆黨罪不容誅但能從耿仁智忠義之言以范陽一道歸於朝廷雖險詐之心未可全信已能斬慶緒之黨表効順之節天子命為節帥封之王爵恩寵方厚未見復叛之迹何遽遣人圖之也若以叛逆之罪險詐之情必不可留亦須國威兵力足以制服其人赫然命使誅之示天下去惡之法何至方降恩命且遣人為之副介使潛結部將圖之此豈國體也況河北殘冦尚未平定叛逆之黨方觀國之恩信厚薄為向背之計思明既以歸順被寵命書始降隨而圖之使叛者決其計矣此又豈事機也遂致思明復叛大亂兩河毒生民敗王師兇勢之盛數年始平由兹失策矣噫光弼賢將謀有如是之失後之謀國事者得不深慮之范祖禹論曰王者所以威服海内惟其有信與義也匹夫一為不信猶不可自立於鄉黨況人主而為不信天下其誰從之肅宗既納史思明之降加以爵命於時未有逆亂之節也李光弼為國元帥職在禦侮知其有不臣之志終為背叛言於君而備之可也待其發而誅之可也乃使傳詔之臣陰與其黨為盜賊之計不亦辱王命乎若事之捷則反側之人誰不懷懼事之不捷適足以長亂非所以弭亂也既失信於已降之虜又歸罪於死事之臣欲以服天下姦雄之心豈不難哉子由論李郭優劣曰雄傑好亂之士可服以天下之大義而不可掩以匹夫之小數何者彼其心甘為理屈而不肯屈人以其智幸而掩之得其志其後必大亂兇悖放恣而後快其志乃已此不可不慎也漢髙帝茍一時之便偽遊雲夢而執韓信雖能執信而信之反心自此始矣當此時髙才志士亦有輕其君之心故英布貫髙之亂繼踵而起此非服英雄之道也李光弼提孤軍與安史健卒百鬭百勝其治軍行兵風采出郭子儀之右而當時諸將皆望風服子儀如敬君父而光弼之在彭城諸將已不為使子儀能使回紇謂為父而思明乃上書請誅光弼大抵光弼之實不如子儀之名子儀安坐而有餘光弼馳騁而不足云云張巡許逺李翰表曰聖主褒死難之士育死事之孤或親推轜車或追建封邑厚死以慰生撫存以答亡然後君臣之義貫以生死激勸之道著於存亡君所以不遺於臣臣所以不背其君臣節於是乎立伏見張廵生於昌時少習儒訓屬安逆謀亂兇虐滔天挺身下位忠勇奮發率烏合之衆當漁陽之餘賊時竊據洛陽控引幽朔驅其猛鋭吞噬河南廵前守雍丘潰其心腹及魯炅以十萬之師棄甲於宛葉哥舒以天下之衆敗績於潼闗兩宫出居萬國波蕩賊遂僭盗神器鴟峙兩京南臨漢江西逼岐雍羣師遷延而不進列郡望風而出奔而廵獨守孤城不為之却賊乃遶出廵後議圖江淮廵退軍睢陽扼其咽領前後拒守自春徂冬大戰數十小戰數百以少擊衆以弱制彊出竒無窮制勝如神殺其兇醜凡九十餘萬賊所以不敢越睢陽而取江淮江淮所以保全者廵之力也城孤糧盡外救不至猶奮羸起病摧鋒陷堅俾三軍之士噉膚而食知死不叛及城陷見執終無撓詞顧叱兇徒精貫白日雖古之忠烈何以加焉而議者或罪廵以食人愚廵以守死臣切痛之今臣敢取十倫以議廵過以塞衆口臣聞人禀教以立身刑原情而定罪故事有虧教則人道不列刑有非罪則王法不加忠者臣之教恕者法之情今廵握節而死非虧教也析骸而爨非本情也春秋之義以功覆過咎繇之典容過者刑故大易之戒遏惡揚善為國之體録用棄瑕今衆議廵罪是廢君臣之教絀忠義之節不以功掩過不以刑恕情善遏惡揚録瑕棄用非所以奬人倫明勸戒也且安逆背徳人鬼所讎朝廷衣冠沐恩累代大臣將相從逆比肩而廵朝廷不登坐宴不與不階一伍之衆不假一節之權威肅義旅奮身死節此廵之忠大矣賊勢慿凌連兵百萬廵以數千之衆横而制之若無廵則無睢陽無睢陽則無江淮賊若因江淮之資兵彌廣財彌積根結盤據西向以拒王師雖終於殱夷而曠日持乆國家以六師震其西廵以堅壘扼其東故陜鄢一戰而犬羊北走王師因之而勢勝聲勢纔接而城陷此天意使廵保江淮以待陛下之師師至而廵死也此廵之功大矣古者列國諸侯或相侵伐猶有分災救患之義况諸將同受國恩奉辭伐罪乎廵所以固守者非惟攘獨克之志亦以恃諸軍之救救不至而食盡食既盡而及人乖其本圖非其素志則廵之情可求矣設使廵守城之初已有食人之計捐數百之衆以全天下臣猶曰功過相掩况非其素志乎在周典之三宥其一曰宥過失故語廵之忠則可以敦世教議廵之功則可以繫中興原廵之情則可以宥過失昔夫子制春秋明褒貶齊侯將封禪略而不書晉文公召王河陽書而諱之盖以匡戴之功大可以掩僭禪之過也今廵倉皇之罪輕於僭禪興復之功重於匡戴罪疑惟輕功疑惟重聖人之訓昭然可徵臣故謂廵者足可以為訓矣云云昌黎曰李翰所為張廵傳頗詳密然尚恨有闕者不為許逺立傳逺雖材若不及廵者開門納廵位本廵上授之柄而處其下無所疑忌竟與廵俱守死成功名城陷而虜與廵死先後異耳兩家子弟材智下不能通知二父志以為廵死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳而賊語以國亡主滅悟之逺見救援不至而賊來益衆必以其言為信外無待而猶守死人相食且盡雖愚人亦能數日而知死處矣逺之不畏死亦明矣烏有城壊而其徒俱死獨䝉愧恥求活雖至愚者不忍為嗚呼而謂逺之賢而為之耶說者又謂逺與廵分城而守城之陷自逺所分始以此詬逺此又與兒童之見無異人之將死其臟腑必有先受其病者引繩而絶之其絶必有處觀者見其然從而尤之其亦不達於理矣小人之好議論不樂成人之美如是哉如廵逺之所成就如此卓卓猶不得免其他則又何說當二公之初守也寧能知人之卒不救棄城而逆遁茍此不能守雖避之他處何益及其無救而且窮也將其創殘餓羸之餘雖欲去必不達二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽􅃒江淮沮遏其勢天下之不亡其誰之功也當是時棄城而圖存者不可一二數擅彊兵坐而觀者相環也不追議此而責二公以死守亦見其自比於逆亂設淫辭而助之攻也云云栁子厚論南霽雲曰急病讓夷義之先圖國忘死貞之大利合而動乃市賈之相求恩加而感則報施之常道睢陽所以不階王命横絶兇威超千祀而挺生奮百代而特立者也時惟南公天與拳勇神資機智藝窮百中豪出千人不遇興詞鬱尨眉之都尉數竒見惜挫猨臂之將軍天寶末冦劇慿陵隳突河華天旋虧斗極之位地圯積狐狸之穴親賢在庭子駿陳謨以佐命元老用武夷甫委師而勸進惟公與南陽張公巡髙陽許公逺義氣懸合訏謀大同誓鳩武旅以遏横潰裂裳而千里來應左袒而一呼皆至柱厲不知而死難狼瞫見黜而奔師忠謀朗然萬夫齊力公以推讓且專奮擊為馬軍兵馬使出戰則羣校固强入守而百雉齊固初據雍丘謂非要害將保江淮之臣庻通南北之奏復㧞我義類扼於睢陽前後捕斬要􅃒凶氣連沮漢兵已絶守疏勒而彌堅北騎雖彊頓旴􅇇而不進賊徒乃棄疾於我悉衆合圍技雖窮於九攻志益專於三板偪陽懸布之勁汧城鑿穴之竒息意牽羊羞鄭師之大臨甘心易子鄙宋臣之病告諸侯環顧而莫救國命阻絶而無歸以有盡之疲人敵無已之彊冦公乃躍馬潰圍馳出萬衆抵賀蘭進明乞師進明乃張樂侑食以好聘待之公曰弊邑父子相食而君辱以燕禮獨何心歟乃自噬其指曰噉此足矣遂慟哭而返即死孤城首碎秦庭終懵無衣之賦身離楚野徒傷帶劒之辭至德二載十月城陷遇害無傅燮之歎息有周苛之慷慨聞義能徙果其初心烈士抗詞痛臧洪之同日直臣致憤惜蔡恭於累旬於戲睢陽之事不惟以能死為勇善守為功所以出竒以恥敵立慬以怒冦俾其専力於東南而去備於西北力專則堅城必陷備去則天討可行是故即城陷之辰為尅敵之日世徒知力保於江淮而不知功靖乎醜逆論者或未之思歟韋應物白樂天曰韋蘇州歌行才麗之外頗近規諷其五言詩又高雅閒澹自成一家之體今之秉筆者誰能及之然當蘇州在時人亦未甚愛重必待身後然後貴之歴代名賢確論卷八十一
