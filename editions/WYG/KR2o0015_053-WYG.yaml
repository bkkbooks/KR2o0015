body:
  text: 歴代名賢確論卷五十三武帝下孔融東坡孔融禰衡楊修魯直華佗劉禹錫荀彧温公曹氏代漢黄魯直管寧東坡子由華歆邴原管寧三友子西臧洪為張超死少㳺使蔣幹說周瑜東坡孔融東坡曰文舉以英偉冠世之資師表海内意所予奪天下從之此人中龍也而曺操隂賊險狠特鬼蜮之雄者耳其勢決不兩立非公誅操則操害公此理之常而前史乃謂公負其髙氣志在靖難而才踈意廣訖無成功此盖當時奴婢小人論公之語公之無成天也使天未欲亡漢公誅操如殺狐兎何足道哉世之稱人豪者才氣各有髙卑然皆以臨難不懼談笑就死為難操以病亡子孫滿前而咿嚶涕泣留連妾婦分香賣履區處衣物平生姦偽死見真性世以成敗論人物故操得在英雄之列而公見謂才疏意廣豈不悲哉操平生畏劉備而備以公知天下有已為喜天若祚漢公使備誅操無難也予讀公所作楊四公賛歎曰方操害公復有魯國一男子慨然爭之公庶㡬不死孔融禰衡楊修魯直木之彬彬詩序曰曺公所禮三人孔融禰衡楊修嫚侮操且疑且信故以衡假手於黄祖融晚乃覆巢獨楊修才慧數解隠語又探其不言者𤼵之最先得罪雖其父公雅故不足以貰死嗟乎修黄犢子有致逺材一努其臂死於隆車之轍曽不如隰子之伐木耶田常與大夫隰子登臺四望齊邑南向而蔽於隰子之喬木成子不言隰子歸使人伐木斧斤罹數創則止之相室曰變之亟也曰田子將成大事惡人知其㣲今不伐木未深忌也知人之所不言其忌深矣故曰知㣲者兵在其頸求福者楮藏其頴雖然隰子猶有所未立也與百里奚䇿虞公而去之豈可同年語哉感二三子行事作木之彬彬詩曰木之彬彬非取異於人可宫室則斬則伐可籩豆則捋則擷草之茸茸非求顯於世中芻牧則刈則鉏中毉咊則剥則菹非以其材故耶是非之岐利害薫蒸嗟人道之多患彼草木尚無情吾嘗觀於若人夫巧於辨人拙於自辨以動乎天機不周乎旹變罪莫慘於徳有心祻莫深於心有見罪不在徳心其蟊賊祻不在心見其髠箝之人皦皦自鮮行於衆汚之前嶢嶢不讓立乎衆埤之上積小不當是以亡其大當悲夫羿注矢以當物十常中其七八引莫耶以自殘駭兕虎之竊𤼵祻集於所忽怨棲於榮名易其言則害智用其智則害眀為君子則奈何獨見曉於㝠㝠華佗劉禹錫論曰史稱華佗以恃能厭事為曺公所怒荀文若請曰佗術實工人命係焉宜議能以宥曺公曰憂天下無此鼠軰耶遂拷竟佗至蒼舒病且死見醫不能生始有悔之歎嗟乎以操之眀畧見㡬然猶輕殺材能以是文若之智力地望以的然之理攻之然猶不能返其恚直可畏諸亦可惜諸原夫史氏之書于冊也是使後之人寛能者之刑納賢者之諭而懲􅍊者之輕殺故自恃能至有悔恚書焉後之或者覆用是為口實悲哉夫賢能不能無過茍寘於理矣或必有寛之請彼壬人皆曰憂天下無材耶曽不知悔之日方痛材之不可少也或必有惜之之歎彼壬人皆曰譬彼死矣將若何曾不知悔之日方痛生之不可再也可不謂大哀乎夫以佗之不宜殺昭昭然不足言也獨病夫史書之義是將推此而廣耳吾觀自曹魏以来執死生之柄者用一恚而殺材能衆矣又烏用書佗之事為嗚呼前事之不忘期有勸且懲也而暴者復藉口以快意孫權則曰曹孟徳殺孔文舉矣孤於虞翻何如而孔融亦以應泰山殺孝㢘自譬仲謀近覇者文舉有髙名猶以可懲為故事矧他人哉荀彧温公曰孔子之言仁也重矣自子路冉求公西赤門人之髙弟令尹子文陳文子諸侯之賢大夫皆不足以當之而獨稱管仲之仁豈非以其輔佐齊桓大濟生民乎齊桓之行若狗彘管仲不羞而佐之其志盖以非桓公則生民不可得而濟也漢末大亂羣生塗炭自非髙世之才不能濟也然則荀彧舎魏武將誰事哉齊桓之旹周室雖衰未若建安之初也建安之初四海蕩覆尺土一人皆非漢有荀彧佐魏而興之舉賢用能訓卒厲兵决機發䇿征伐四克遂能以弱為强化亂為治十分天下而有其八其功豈在管仲之後乎管仲不死子糾而荀彧死漢室其仁復居管仲之先矣而杜牧乃以為彧之勸魏武取兖州則比之髙光官渡不令還許則比之楚漢及事就功畢乃欲邀名於漢代譬之教盜穴墻發櫃而不與同挈得不為盜乎怪愚以為孔子稱文勝質則史凡為史者記人之言必有以文之然則比魏武於髙光楚漢者史氏之文也豈皆彧口所言邪用是貶彧非其罪矣且使魏武為帝則彧為佐命元功與蕭何同賞矣彧不利此而利於殺身以邀名豈人情乎杜牧題荀文若傳後曰荀文若為魏操畫䇿取兖州比之髙光不棄闗中河内官渡不令還許比楚漢成皋凡為籌計比議無不以帝王許之海内付之事就功畢欲邀名於漢代委身之道可以為忠乎世皆曰曹馬且東漢崩裂紛披都遷主播天下大亂操起兵東都提獻帝於徒歩困卧之中南征北伐僅三十年始定三分之業司馬安全之代竊發肘下奪偷權柄殘虐譎狡豈可與操比哉若使操不殺伏后不誅孔融不囚楊彪從容於揖讓之間雖慙於三代天下非操而誰可以得之者紂殺一比干武王斷首燒屍而滅其國桓靈四十年間殺千百比干毒流其社稷可以血食乎可以壇墠父天拜郊乎假使當時無操獻帝復能正其國乎假使操不挾獻帝以令天下英雄能與操爭乎使無操復何人為蒼生請命乎教盗穴墻𤼵櫃多得金玊已復不與同挈得不為盜乎何況非盗也文若之死宜然耶子由論曰荀文若之於曹公則漢髙帝之子房也董昭建九錫文若不欲曹公不能平以致其死君子惜之或以為文若先識之未究或以為文若欲終節於漢氏者皆非文若之心也文若始從曹公於東郡致其筭畧以摧滅群雄固以帝王之業許之矣豈其晚節復疑而不予哉方是時中原畧定中外之望屬於曹公矣雖不加九錫天下不歸曹氏而將安徃文若之意以為刼而取之則我有力爭之嫌人懷不忍之志徐而俟之我則無嫌而人亦無憾要之必得而免爭奪之累此文若之本心惜乎曹公志於速得不忍數年之頃以致文若之死九錫雖至而禪代之事至子方遂此則曹公之陋而非文若之過也子西論議者謂彧叶規曹氏以傾漢祚晚節立異無救運移曰管仲相桓公伐山戎伐陳蔡伐楚伐晉其志欲尊周爾而桓公遂有封禪之志文若佐曹公平青徐平許洛平河朔平漢南其志欲尊漢耳而曹公遂有九錫之議管仲知封禪之不可許也故設詞以拒之文若知九錫之不可長也故遜詞以却之管仲幸故桓公從其說以全勤王之功文若不幸故曹公不用其語以成竊國之祻究其終始幸不幸異耳用心豈不同耶論者何得非之曹氏代漢魯直詩并叙曰曹公自以勲加宰衡文封西伯蟬蛻揖讓之中而用漢室於家巷更黨錮之灾義士忠臣耘除畧盡獻靈之間北靣朝者拱而觀變漢魏何擇焉彼見宗廟社稷之無與也執太阿而用頴以司一世之命左右無不得意引後宫於鈇鉞如刈蒲茅夫婦婢使得罪家人猶為謝過而親北面受命之君自以為未知死所嗚呼厲怜王其誰曰過言雖然終已恭遜腹毒而色取仁任丕以易漢姓者何也漢之末造雖得罪於社稷骨鯁之臣而猶不得於民故相與愛其名耳余聞曰道揆以上惠不足而眀有餘不在社稷而數有功粢盛殆其不繼哉感之作曹公詩一章南征北伐報功頻劉氏親為魏國賔畢竟以丕成覇業豈能於漢作純臣兩都秋色皆喬木二祖恩波在細民駕御英雄雖有術力扶宗社可無人管寧東坡曰曹操既得志士人靡然歸之自文若盛名猶為之經營謀慮一旦小異便為謀殺程昱郭嘉之流不足數也孔文舉竒逸慱聞志大而才踈每所論建輒中操忌况肯為用然終亦不免桓温謂孟嘉曰人不可無勢我能駕馭卿夫温之才百倍於嘉所以云爾者自知其隂賊險狠不為髙人勝士所比數耳管幼安懷寳遯世就閑海表其視曹操父子真穿窬斗筲而已終身不屈亦不得而殺余以謂賢於文若文舉逺矣子由管幼安畫贊幷引曰予自龍州還頴川十有三年杜門幽居無以自適稍取舊書閲之將求古人而與之友盖於三國得一人焉曰管㓜安㓜安少而遭亂渡海居遼東三十七年而歸安於田廬不應朝命年八十有四沒功業不加於人而予獨何取焉取其眀於知時而審於處已云耳盖東漢之衰士大夫以風節相尚其立志行義賢於秦漢然時方大亂其出而應世鮮有能自全者頴川荀文若以智䇿輔曹公方其擒呂布斃袁紹皆談笑而辦其才與張子房比然至於九錫之議卒不能免其身彭城張子布忠亮剛簡事孫氏兄弟成江東之業然終以直不見容力爭公孫淵事君臣之義㡬絶平原華子魚以德量重於曹氏父子致位三公然曹公之殺伏后子魚將命至破壁出后而害之汝南許文休以人物臧否聞於世晚入蜀依劉璋先主將克成都文休踰城出降雖卒以為司徒而蜀人鄙之此四人者皆一時賢人也然直已者終害其身而枉已者終喪其徳處亂而能全非幼安而誰與哉云云贊曰幼安之賢無以過人予獨何以謂賢賢其眀於知時審於處已以能自全幼安之老歸自東海一畝之宮閑不求通白㡌布裙舞雩而風四時烝嘗饋奠必躬八十有四蟬蛻而終少非漢人老非魏人何以命之天之逸民華歆邴原管寧三友唐子西曰邴原管寧皆盛徳之士而歆為之首則歆之為人可知矣然漢書稱伏后之廢操使歆勒兵入宮收后后閉戸匿壁中歆破戸𤼵壁而入豈盛徳之士㢤操雖姦雄然使人各當其理方是之時魏氏羣臣如董昭夏侯惇賈詡程昱郭嘉之流為不少足以辦此何至使歆為之歆果賢耶操决不敢以此使之以此事操則歆决不得為賢者陳夀作原傳稱少與管寧俱以操尚稱初不及歆至作寧傳又稱與原歆相友豈三人相友而歆獨無操尚乎朋友出處不齊理宜友之操尚不同則非所以為友矣此余之所未解臧洪為張超死少游論曰臧洪以袁紹不救張超絶不與通至於敗死以愚觀之洪實游侠之靡也豈臣子之義哉何則夫欲生而惡死天下之真情也然古之君子或捐軀命棄親族不為茍得者非不欲生以其所欲有甚於生而已使其所欲未有甚於生所惡未有甚於死則君子豈有矯世絶俗拂其所謂真情者耶詩曰既眀且哲以保其身君子之常也傳曰志士仁人有殺身以成仁無求生以害仁君子之變也不得已而為之者也世衰道㣲士大夫講學不眀於是始惑於輕重趨舎之際徒知保身之為易殺身之為難而不知妄死之與茍生其失一也齊有崔氏之難其臣死者十有餘人晏子獨以為君臣為社稷死為社稷亡者若為已死為已亡非其私暱誰敢任之以晏子之言論之洪為張超而死者果何為也夫曹操吕布皆漢之姦臣然方是時操挾天子其勢為順布背朝廷其勢為逆使超去逆就順紹弗為救猶或可責矧叛操而歸布安能責其不救乎夫張超袁紹之於洪雖交有故新遇有薄厚然受其表用則皆主也使舊主為新主所殺洪絶之而致死猶或近義矧滅超者曹氏也得與紹為仇乎由是言之洪為張超而死者果何謂也孔融甞為管亥所困太史慈為突重圍求救於先主先主從之遂解都昌之急盖是時俗尚名節甚矣天下之士唯以然諾不終為媿禍亂不解為耻厥志有在生死以之故事成則為太史慈不成則為臧洪以臣子之義責之皆罪也豈楊子以要離為蛛螫之靡聶政為壯士之靡荆軻為刺客之靡耶孟子曰可以死可以無死死傷勇若數子者可謂傷勇矣亦可悲夫使蔣幹說周瑜東坡曰曹公聞周瑜年少有美才謂可游說動也乃宻下揚州遣九江蔣幹徃見瑜幹有儀容以才辯見稱獨歩江淮之間乃布衣褐巾自託私行詣瑜瑜出迎之立謂幹曰子翼良苦逺渉江湖為曹公作說客耶幹曰吾與足下州里間隔别遥聞芳烈故来叙濶幷觀雅規而云說客無逆詐矣乎瑜曰吾雖不及䕫曠聞絃賞音足知雅曲後三日瑜請幹同觀營中行視倉庫軍資器仗訖還飲燕視之侍者服飾珍玩之物因謂幹曰丈夫處世遇知己之主外託君臣之義内結骨肉之恩言行計從禍福共之假使蘇張更生酈叟復出猶將撫其背而折其辭豈足下小生所能移乎幹笑而不言遂稱雅量髙致非言詞所間中州之士以此多之蘇子曰曹孟徳所用皆為人役者也以子房待文若然終不免殺之豈能用公瑾之流度外之士哉歴代名賢確論卷五十三
