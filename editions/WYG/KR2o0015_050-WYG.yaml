body:
  text: 歴代名賢確論卷五十獻帝董卓髙適何去非温公詔并十四州復為九州子西袁術僭號置南北郊子西仲長統昌黎通論漢之人君温公東漢興亡温公循吏杜牧隗囂劉表子由丁鴻劉愷東坡子由董卓髙適董卓廟議曰昔漢祚陵夷桓靈棄徳宦官用事國歩多艱宗社有綴旒之危宰臣非補衮之具董卓地兼形勝手握兵鈐顛而不扶禍則先唱興晉陽之甲君側未除入洛陽之宫臣節如掃至乃發掘園寢逼辱妃嬪太后之崩豈稱天命𢎞農之廢孰謂人心敢諷朝廷以自尊貴大肆剽虜以極誅求焚燒都邑馳突放横衣冠凍餒死倚牆壁之間兆庶困窮生塗草莽之上於是天地憤怒鬼神號哭而山東義旗攘袂爭起連州跨郡皆以誅卓為名故兵挫於孫堅氣奪於袁紹僭擬輿服黨助姧邪驅蹙東人脅帝西幸滛刑以逞有湯鑊之甚要之糜爛刳剔異端乃謂漢鼎可移郿塢方盛殊不知禍盈惡稔未或不亡故神質允誠天假布手母妻屠戮種族無留骨肉灰燼不其快哉今狄道之人不慙卓之不臣而務其為鬼茍斯鬼足尚則漢莽可得而神晉敦可得而廟靈寳父子可享於江鄉爾朱兄弟可祠於朔土嗟乎仁賢之魄寂寞於丘陵義烈之魂沈埋於泉壤何馨香之氣用之於㬥悖之鬼哉何去非孫堅之攻董卓論曰古之豪傑有功業之大志其才力雖足有以取濟而無謀夫䇿士合竒集智以更輔其不迨使無失乎事機之㑹則徃徃功敗業去而為徒發者皆是也昔東漢董卓之變豪傑相視而起於中州者若袁曹劉呂皆負其姦豪之恣求因時乗變以濟所欲獨孫堅激於忠勇投袂特起於區區之下郡奮以誅卓雖卓亦獨憚而避之惜乎三失大機而功業不就卒以輕敵遂殞其身由無謀夫䇿士以發其智慮之所不及故也始堅以義從之士起於長沙比至南陽衆已數萬南陽太守不時調給堅責以稽停義師按軍律而誅之人大震服南陽民籍且數百萬兵强食阜而堅不遂據之以治軍整卒命一偏將西趨武闗以震三輔身扼成臯而定鞏洛迎天子而奉之仗順討逆以濟其志乃返棄去而袁術得以起而收於羇旅之中以為已資遂以驕肆此堅之一失也夫董卓之强天下畏之袁紹曹公相與㰱血而起者凡十一將皆擁據州郡衆各數萬然無敢先𤼵以向卓者獨曹公與其偏將遇遂以敗北而堅獨以其兵趨之合戰陽人大破其軍梟其銳將卓深震憚乃遣腹心詣堅和咸令疏其子弟勝刺史郡守者悉表用之向使堅陽合而隂違之差其宗親茍勝軍事者皆列疏與焉使得各據土權兵以大其勢徐四起而䠞之則其取卓易於反掌不知出此乃怒辱其使誓必誅卓使之憤懼遂殘汙洛陽刼持天子西引入闗以避其鋒而窮其毒此堅之二失也夫兵以義動者其勢足以特立則何至於附人茍唯不能而有所附必其徳義足以為天下之所歸徃者然後從之袁術徒憑藉世資以役天下其驕豪不武非托身之主也堅已驅卓而修復雒陽之殘壤不能阻山河之固因形勢之便以觀天下之變乃還軍魯陽聴役於術為之﨑嶇轉戰以搏黄祖卒殞其身於襄漢之間無異士伍此堅之三失也夫一舉事而三失隨之則其功業違矣司馬温公論王允専董卓之功孫瑞歸功不自居易稱勞謙君子有終吉夫孫瑞有功不伐以保其身可不謂之智乎詔幷十四州復為九州唐子西曰三桓諷魯作三軍合周禮其志乃欲卑公室而奪之權曹操諷復九州合禹貢矣其志乃欲廣冀州而益其地夫引經術稱古誼者固未必皆姦人而姦人之欲濟其邪謀者亦未嘗不引經術而稱古誼既不可以盡信亦不可以皆疑要在乎察之而已袁術僭號置南北郊唐子西曰惟天子祀天地于郊唯魯得用郊郊祀之禮聖人所甚重而後亂人欲為大盜於天下未嘗不先盜其所甚重者此莊老之徒所以有聖人不死大盜不止之說也至揚子之論則又不然秦人祠白畤周不即禁卒舉天下而與之名分所在不得不重夫莊老之說儒者固已非之而揚子之論亦復有所未盡揚子惟知嚴名分以臨天下而不知能保天下者然後能守名分秦人之祀白畤周非不欲禁之力有所不能也然則欲守名分者先勉其所以保天下者哉仲長統昌黎賛曰長統公理山陽髙平自謂髙幹有雄志而無雄才其後果敗以此有聲倜儻敢言語嘿無常人以為狂生州郡㑹召稱疾不就著論見情初舉尚書郎後參丞相軍事卒不至于榮論說古今𤼵憤著書昌言是名友人繆襲稱其文章足繼西京四十一終何其短邪嗚呼先生漢之人君温公曰新室之末民心思漢如渇之望飲饑之待哺也是以諸劉奮臂一呼而逺近嚮應曽未期年元惡授首更始入雒之初天下已服矣而素無人君之器紀綱不修諸將􅍊横不旋踵而亡固其宜也光武以仁厚之徳濟英傑之志昆陽之役驅烏合之衆掃滔天之敵使海内翻然變而為漢宜陽之師不戰而赤眉束手百萬之盗一朝而散皆希世之竒功也至於待王郎劉盆子止於不死取良吏卓茂以為太傅戒馮異以安集闗中不務戰攻取勝雖當草創之際可謂有帝王之逺畧矣天下已定不失舊物乃偃武修文崇徳報功勤政治養黎元興禮樂宣教化表行義勵風俗繼以眀章守而不失於是東漢之風忠信㢘恥㡬於三代矣及孝和以降政令寖弛外戚専權近習放恣然猶有骨鯁忠烈之臣忘身以徇國故雖衰而不亡豈非建武永平之餘烈歟至於桓靈而紀綱大壞廢錮英俊賊虐忠正鬻獄賣官濁亂四海何進見殺袁紹不勝其憤遂燔燒宫闕肆行誅戮外召董卓以脅朝廷於是虺蝪雖除而虎貙入室矣卓貪愎殘忍廢主遷都州郡紛然稱兵以討之卓死而天下大亂漢室遂亡哀哉東漢興亡温公曰敎化國家之急務也而俗吏慢之風俗天下之大事也而庸君忽之夫惟眀智君子深識長慮然後知其為益之大而收功之逺也光武遭漢中衰羣雄糜沸奮起布衣紹恢前緒征伐四方日不暇給乃能敦尚經術賔延儒雅開廣學校修眀禮樂武功既成文徳亦洽繼以孝明孝章遹追先志臨雍拜老横經問道自公卿大夫至於郡縣之吏咸選用經明行修之人虎賁衛士皆習孝經匈奴子弟亦遊太學是以教立於上俗成於下其忠厚清修之士豈唯取重於縉紳亦見慕於衆庶愚鄙汚穢之人豈唯不容於朝廷亦見棄於鄉曲自三代既亡風化之美未有若東漢之盛者也及孝和以降貴戚擅權嬖倖用事賞罰無章賄賂公行賢愚混雜是非顛倒可謂亂矣然猶綿綿不至於亡者上則有公卿大夫袁安楊震李固杜喬陳蕃李膺之徒靣折廷爭用公義以扶其危下則有布衣之士符融郭泰范滂許劭之流立私論以救其敗是以政治雖濁而風俗不衰至有觸冐斧鉞僵仆於前而忠義奮發繼起於後隨踵就戮視死如歸夫豈特數子之賢哉亦光武眀章之遺化也斯時茍有眀君作而振之則漢氏之祚猶未可量也不幸承陵夷頺弊之餘重以桓靈之昏虐保養姦回過於骨肉殘滅忠良甚於宼讎積多士之憤蓄四海之怒於是何進召戎董卓乗釁袁紹之徒從而起難遂使乗輿播越宗廟丘墟王室蕩覆烝民塗炭大命隕絶不可復救然則州郡擁兵専地而雖互相吞噬猶未嘗不以尊漢為辭以魏武之􅍊戾彊抗加有大功於天下其蓄無君之心乆矣乃至沒身不敢廢漢而自立豈其志之不欲哉猶畏名義而自抑也由是觀之教化安可慢風俗安可忽哉循吏杜預曰東漢光武眀帝稱為眀王相繼聨五十年當時以深刻刺舉號為稱職治古之風廢俗吏之課髙於此時循吏衛颯任延王景魯恭劉寛陳寵之徒止一縣宰獨能不徇時俗自行教化唯徳是務愛人如子廢鞭笞責削之文用忠恕撫字之道百里之内勃生古風凡違衆背時徇古非今王者公侯尚難其事豈一縣宰能移其俗此盖人為治古之人法為一時之法治以之教教之即治古之人以一時之法齊之即一時之人正云云隗囂劉表子由隗囂論曰智者為國知所去就大義既定雖有得失不為害也隗囂初據壠坻謙恭下士豪傑歸之刑政修舉兵甲富盛一時竊據之中有賢將之風矣然聖公乗王莽之敗擁衆入闗君臣貪暴不改盜賊之舊敗亡之勢匹夫匹婦皆知之矣而囂舉大衆束手稱臣違方望之言陷諸父於死地僅以身免及光武自河北入洛政修民附賢士滿朝羣盗十去六七而囂懲既往之禍方擁兵自固為亡國之計謀臣去之義士笑之而囂與王元王捷三人以死守之始從聖公而不疑終背光武而不悔去就之際無一得者至於殺身亡國盖不足怪也劉表専制荆州土廣民衆勢重於天下曹公與袁紹相距於官渡二人皆求助於表表方晏然自守一無所與韓嵩說表曰兩雄相持天下之重在於將軍果欲有為起乗其弊可也如其不然則將擇其所宜從豈可擁甲十萬坐觀成敗求援而不能救見賢而不能歸此兩怨必集於將軍恐不得中立矣猶豫不能用卒為曹公所幷隗囂劉表雍容風義皆有長者之譽然其敗也皆以去就不眀失之不如張魯之庸敗亡之餘知所歸往猶能保其後嗣兵法有之知彼知己百戰不殆知彼而不知己一勝一負不知己不知彼每戰必殆夫惟知彼知己然後知所去就哉丁鴻劉愷東坡曰君子之為善非特以適已自便而已其取於人也必度其人之可以與我也其予人也必度其人之可以受我也我可以取之而其人不可以與我君子不取我可以予之而其人不可受君子不予既為己慮之又為人謀之取之必可予予之必可受若己為君子而使人為小人是亦去小人無㡬耳東漢劉愷遜其弟而詔聽之丁鴻亦以陽狂遜其弟而其友人鮑駿責之以義鴻乃就封其始自以為義而行之其終也知其不義而復之以其能復之知其始之所行非詐也此范氏之所以賢鴻而下愷也其論稱太伯伯夷未始有其遜故太伯稱至徳伯夷稱賢人及後世徇其名而昧其致於是詭激之行興矣若劉愷之徒遜其弟使弟受非服而已受其名不已過乎丁鴻之心主於忠愛何其終悟而從義也范氏之所賢者固已得之矣而其未盡者請得而畢其說夫先王之制立長所以眀宗眀宗所以防亂非有意私其長而沮其少也天子與諸侯皆有太祖其有天下有一國皆受之太祖而非己之所得専有也天子不敢以其太祖之天下與人諸侯不敢以其太祖之國與人天下之通義也夫劉愷丁鴻之國不知二子所自致邪將亦受之其先祖邪受之其先祖而傳之其所不當立之人雖其弟之親與塗人均耳夫吳太伯伯夷非所以為法也太伯將以成周之王業而伯夷將以訓天下之遜而為是詭時特異之行皆非所以為法也今劉愷舉國而遜其弟非獨使弟受非服之為過也將以壞先王防亂之法輕其先祖之國而獨為是非常之行考之以禮繩之以法而愷之罪大矣然漢世士大夫多以此為名者安順桓靈之世士皆反道矯情以盗一時之名盖其弊始於西漢之世韋元成以侯讓其弟而為世主所賢天下髙之故漸以成俗履常而蹈易者世以為無能而擯之則丁鴻之復於中道尤可深嘉而屢歎也子由曰天下之讓三有不若之讓有相援之讓有無故之讓讓之為名天下之大功大善也然而至於無故之讓則聖人深疾而排之以為此姦人之所以盜名於暗世也昔者公族穆子之讓韓起范宣子之讓知伯宣子穆子之於彼二人者誠有愧於其心也是不若之讓也舜之命禹也讓於臯陶命益也讓於朱虎熊羆禹之事非臯陶之所能任而益之事非朱虎熊羆之所能辦亦眀矣而猶讓焉是所謂相援之讓也故誠使夫天下之人皆讓其所不如則百職舉而無廢材讓以相援則賢者以類升而小人不能間此二者天下之大善也至於無故之讓天下之大不善也東漢之衰丁鴻鄧彪劉愷此三人者當襲父爵而以讓其弟非有先君之命非有嫡庶之别而徒讓焉以取髙於世俗世之君子疾而深譏之以為䧟於無故之讓然三人者之中又有美惡焉劉鄧讓而不反以遂其非丁鴻讓而不終聽其友人鮑駿之言而卒就國此所以為賢於劉鄧也且夫聞天下之讓而竊取其名以自髙其身以邀望天下之大利者是鄧彪劉愷之心也聞天下之讓而竊慕之而不知其不同者丁鴻之心也推此二心以斷天下之真偽則鴻在可恕而愷為可戮此優劣之辨也故范曄曰太伯伯夷未始有其讓也故太伯稱至徳伯夷稱賢人若夫鄧彪劉愷讓其弟以取義使弟受非服而已受其名不已過乎且君子之立言非以茍顯其美將以訓天下之未悟者立行非以茍顯其身將以教天下之方動者言行之所開塞可無慎乎丁鴻之心存乎忠愛故能悟而從義異乎二子之為徇名也嗚呼世之邪僻之人茍冒天下之美名以僥倖天下之大利自以為莫吾察也而不知君子之論有以見之故為天下不可以無君子之論也歴代名賢確論卷五十
