body:
  text: 歴代名賢確論卷七十一太宗四蕭瑀吕温范祖禹張唐英劉洎禇遂良孫之翰張唐英東坡王珪李徳裕裴寂六一戴胄張唐英孔穎達張唐英尉遲敬徳吕温李君羡王元之王君廓張唐英總論太平之政曽子固子由范祖禹總論羣臣吕温蕭瑀吕温蕭公瑀贊曰隋氏不君忠賢莫用桐生朝陽有集惟鳯捨彼頺厦鬱為新棟路車𤣥衮開國有宋武徳之暮羣孽内蠧巍巍宋公聳節髙歩不吐不茹不來不去屹屹中立為天一柱從容而言社稷遂安持誠秉忠光輔二君激濁揚清欲人如身道至廣莫我敢羣境至大不容纎塵雪山倚空冰壑照人耿介絶倫為唐貞臣范祖禹論太宗謂瑀真社稷臣曰太宗以蕭瑀無二心於已而嘉之可謂能知臣矣且天子在而私於藩王者明君之所甚惡也或誘以利或脅以死而從之者不亦多乎惟瑀介然自立有隕無貳太宗所以知其臨大節而不可奪也人君以此取於人豈不得忠正之士乎張唐英曰蕭瑀請出家為僧此可罪也然盡忠於隋及歸國亦多有功績頗見委任歴僕射御史大夫參預朝政每有議論房杜不能抗之房等雖心知其是而不用其言瑀彌怏怏自是罷為太子少傅此是机閣瑀而使優閒爾且房杜可謂賢相也經綸草昩以啓天下之業竭忠悉慮以成天下之務不以求備而責人不以已長而格物貞觀太平之功誠有力焉然於瑀尚亦有所抑遏豈亦珪之玷而珠之翳乎古人謂事雖淺當深謀之言雖輕當重思之由不知言以致知言而房杜二人於用人亦至矣而尚失於瑀豈瑀之性褊躁每於議論之際務以直氣自豪而不能從容委曲詳悉評議但求辯博而取勝於諸公故房杜自以持天下之政權柄在已恥其不能卑論每有不容其説然以二公才過於人雖不從一蕭瑀之言無害為賢相後之執政者必欲跡房杜業成就太平之功則不可使順㫖者榮華逆意者枯槁心知其是而不用其言庶乎國家之政無有蔽而不通故曰天下無粹白之狐而有粹白之裘者蓋取於衆茍不取於衆是哥奴輩昔嘗箝天下之口而自任耳劉洎褚遂良孫之翰論曰劉洎之死據舊史所書由遂良之譖也然伐遼之行太宗諭洎輔翼太子之意洎有誅大臣之對時已責其疎徤太宗自遼東至不豫洎謁而深憂或言誅大臣事亦與前疎徤之語何異儻為遂良所奏太宗累前怒殺之跡其事狀近於是矣若洎止憂聖體絶無他言又引馬周自明周對與洎不異太宗何至偏信遂良䜛言遽殺大臣乎況洎有罪而周隱之又安得止罪洎而不責周也葢褚遂良諫廢立皇后事以忠直被譴姦人從而譖之惟恐無罪故劉洎之子訴父為遂良所譖李義府助之賴樂彦瑋力辨其事遂良譖洎之言當出於此矣又貞觀實録本敬播所修號為詳直後許敬宗専修史之任頗以憎愛改易舊文則遂良譖洎之事安可信也張唐英曰太宗征遼留洎於定州輔太子謂曰安危之機所寄尤重洎對曰大臣有愆臣即行誅太宗戒曰臣不密則失身卿性疎徤宜戒之以保終吉及征遼還上在道不康洎謂褚遂良曰聖體可憂遂良誣奏曰洎云正當輔少主行伊霍事乃賜自盡而論者謂遂良陷殺洎後亦流貶葢其報應然觀洎為性不甚周慎當有此言非遂良誣之也何以明之且洎因爭飛白書不顧陛亷之分輒登御牀又對太宗尚欲親誅大臣而太宗戒以不密至是見上不豫忽發伊霍之言固必有之及遂良不肯立武氏貶死愛州則天臨朝之際洎之子訴理其父之寃必不言其父之失復李義府輩左右之故史臣從而書其子之言以為遂良所誣此乃必然之理然遂良有可責者止可奏於上令削其官爵不可不救而令賜洎死也兹可罪也東坡論遂良飛雉集宫之對曰唐太宗時飛雉數集宫中上以問褚遂良曰昔秦文公時童子化為雉雌鳴陳倉雄鳴南陽童子曰得雄者王得雌者伯文公遂雄諸侯光武得其雄起南陽有四海陛下本封秦故雄雌並見以告明徳上恱曰人不可以無學遂良所謂多識君子哉予以謂秦雉陳寳也豈常雉乎今見雉即謂之寳猶得白魚便自比武王此謟妄之甚愚瞽其君而太宗善之史不譏焉野鳥無數入宫此乃災異使魏徵在必以髙宗鼎耳之祥諫也遂良非不知此捨鼎雊而取陳寳非忠也王珪李徳裕論王珪對太宗納廬江美人曰自古得伐國之女以為妃后未嘗不致危亡之患者何也亡國之餘焉能無怨氣其立基創業之祖宗必皆一時之英傑其社稷山川之鬼神當為一國之所奉愛其血食忿其滅亡故能為厲矣必生妖美之色蠱惑當世之君使其骨肉相殘以壊於内君臣相疑以敗於外危亡之兆鮮不由此史蘇所謂必有女戎妹喜妲己褒姒是也史蘇言之詳矣今不復論是以晉獻得驪戎佚女太子有雉經之酷禍及三世苻堅納慕容姊弟秦宫有鳯兮之謡敗於五將苻堅於五將山破梁武取東昏所幸幾至危國隋文嬖陳主之妺終以殞身此皆禍敗之著明者也又夏姬入荆子反疲於奔命呉人始叛楚矣呉嬪至晉世祖怠於為政劉石乃代興矣所以王珪覩廬江美人正言納説如王珪者可謂識微之士明於禍福矣裴寂六一曰予嘗與尹師魯論自魏晉而下佐命功臣皆可貶絶以其二心舊朝叶成謀主雖曰忠於所事而非人臣之正也及讀裴寂傳跡其終始良有以哉始寂為晉陽宫監私以宫人饋髙祖因見親䁥可謂貳隋矣及太宗以博奕啗之遂開義師之謀卒成唐室劉武周為冦請行自敗不即就誅者非特佐命有功豈非曩時私狎之恩哉坐交沙門法雖免官見放復有所陳太宗數之曰計公勲庸不至於此數以武徳官政之謬皆歸其人又聞妖言不自明乃欲殺人緘口遂被流放列其四罪貸不致理蓋由進身之私恩衰即敗也韓彭之功猶終不保況寂也哉戴胄張唐英曰貞觀中詐偽資䕃者許自首免罪不首者死俄有詐偽者敗露胄斷流以奏之帝曰下勑令死今斷從流示天下以不信也卿欲賣獄乎胄曰陛下當即殺之非臣所及即付所司臣不敢虧法觀胄之言乃效張釋之為心也然而釋之已失對於孝文胄亦失言於文皇且人君執天下之柄可生可殺威福在已古之聖賢慮人主恃崇髙之位而輕於刑罰故皋陶告虞舜戒惟刑之恤周公作立政戒成王以庶獄今胄之意以為即當殺之非臣所及謂人君可以不用法而殺人使為人主者皆如太宗固無慮有淫虐之刑設使兇􅍊如桀紂者謂有司執法不可委之於有司乃任情殺人則恐無辜者無告矣若胄者宜曰聖人之制必闗盛衰王者之法不枉輕重陛下亦不可得而私之臣豈敢得而専之必歸之中正合乎王極使人無寃枉奈何其意反謂為君者用法不必慎為臣者用法須慎王子雍謂輕於為君重於為臣其胄之謂乎孔穎達張唐英曰孔穎達嘗撰周易正義又與馬嘉運趙乾協蘇徳詳等參詳以行於世觀其發明三聖之㫖通貫萬化之藴其亦深於易乎然於下繫云案諸儒象卦制器皆取卦爻象之體今韓康伯之意直取卦名因以制器案上繫云制器者尚其象則取象不取名也韓氏乃取名不取象於義未善今既遵韓氏之學且依此釋之甚哉穎達之失聖人之道至深逺而學者不悟故洪生碩儒為注疏以啟導後進而使得其餘今韓氏既失於取象之義而已為正義當為刋正指歸以為後人之師法奈何既知其失不為剖析是非又從而蹈其失哉夫斲木為耜揉木為耒葢取諸益益者震下巽上震陽木動也巽隂木可揉也而揉以為耒耜之象其動在下耕田之象也而韓謂制器致豐以益萬物又刳木為舟剡木為楫之象而韓謂乘理以散動也斷木為杵掘地為臼葢取小過小過者艮下而震上艮山也震木也山止於下木動於上杵臼之象而韓謂以小物濟用諸如此類失者甚衆不可備舉韓氏妄肆臆説穎達又不發明其得失誠可惜也類而推之則聖人之㫖皆可見矣學者宜自求之尉遲敬徳吕温尉遲鄂公敬徳贊曰侁侁鄂公百鍊龍泉沈翳未宣氣衝斗間佩非其人敬徳初事宋金剛躍入大川神武獲焉提之上天天地之内指麾無前熊威虎力隠若敵國剛毅木訥安劉必勃武徳之屯手㧞禍根掃除氛昏捧出日月耀於天門功成名遂髙謝戎事烈烈猛志化為和氣深地髙堂頥性保常屑瓊飲露静奏清商商為臣勵事君鄂公之志之仁公貞觀後不交人事常煉氣服食奏清商樂以自奉李君羡王元之李君羡傳論曰貞觀中太白頻晝見太史曰女主昌又謡言曰當有女主武王者太宗深惡之時李君羡已封武連郡公又為左武衛將軍在𤣥武門上因武官内宴作酒令各言小字君羡自稱五娘以其封邑皆有武字乃名合女主之䜟愕然忌之卒以謀反下詔誅焉噫太宗以聖文神武駕馭英雄心腹推於人故人不疑矣賞罰當于人故人不怨矣至於進功臣而黜宗室亦一代之真主耳且其侯君集之反也太宗自按之洎得其狀復謂羣臣曰往者國家未安君集實展其力不忍致之于法吾將乞其性命公卿其許我乎太宗厚君集而薄君羡邪葢天文變于上人謡騰於下雖聖人不能不疑懼矣而脩徳可也疑而行誅則有陷於非罪者必矣然君羡匹夫之命不足道也洎武氏復出則太宗之徳得無累乎故書曰疑謀勿成為是也僕讀書至是嘆君羡之罹罪無辜而見誅惜文皇之用刑有誅而不中因論以志之亦以為君臣之戒王君廓張唐英曰太子建成既被誅詔召幽州都督廬江王瑗入朝瑗建成之黨也甚懼之時王君廓典瑗之兵素性險薄欲陷瑗以為己功乃始説瑗令舉兵而反君廓因是擒瑗縊殺傳首京師君廓以功遷領軍大將軍嗟乎瑗無長謀逺慮為君廓所賣遂陷叛逆此固可誅然瑗之叛由君廓致之朝廷不原其心遂除籍屬没其家産而進君廓之秩仍以瑗家口賜之俾代其位而稔姦植惡使小人之心愈無畏憚而自謂得計矣譬人有植梧者而鄰父云非善也請伐之既而求以為薪是利在於薪也以太宗雄才大畧髙絶夐古而謟巧之人尚得逞其志比之諭人伐梧求以為薪不甚相逺而不加誅戮以懲不忠不義之人又嘗比之為藺相如豈嫉建成之深而恥瑗為之黨故雖君廓􅍊兇悖逆不叶天道而不以為非歟古所謂愛之欲生而惡之欲死於瑗與君廓見之矣然尤可惜若瑗乃髙祖從父兄之子雖有罪逆其家口止可從坐不然幽之掖庭不當以賜君廓而君廓亦何面目而受之哉噫禽獸不為也而君廓為之是不迨禽獸也總論太宗之政曽子固曰予少讀唐書及貞觀政要見魏鄭公王珪之徒在太宗左右事之大小無不議論諫諍當時邪人庸人相參者少雖有如封倫李義府輩太宗又能識而疎之故其言無不信聽卒能成貞觀太平刑置不以居成康上未嘗不反復欣慕繼以嗟唶以謂三代君臣不知曽有如此周旋議論否雖皋陶禹稷與堯舜上下謀謨載於書者亦未有若此委曲備具頗意三代堯舜去今時逺其時雖有謀議如貞觀間或尚過之而其史不盡存故於今所聞見尠是不可知所不敢臆定由漢以降至于陳隋復由髙宗以降于五代其史甚完其君臣無如此謀議決也故其治皆出貞觀下理勢然爾子由論曰太宗之賢自西漢以來一人而己任賢使能將相莫非正人恭儉節用天下幾至刑措自三代以下未見其比也然傳子至孫遭武氏之亂子孫為戮不絶如綫後世推原其故而不得以吾觀之惜乎其未聞大道也哉昔楚昭王有疾卜之曰河為祟大夫請祭於郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不徳河非所獲罪也遂勿祭及將死有雲如衆赤鳥夾日以飛三日王使問周史周史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之亦弗禜孔子聞之曰楚昭王知大道矣其不失國也宜哉吾觀太宗所為其不知道者衆矣其能免乎貞觀之間天下既平征伐四夷滅突厥夷髙昌殘吐谷渾兵出四克務勝而不知止最後親征髙麗大臣力爭不從僅而克之其賢於隋氏者幸一勝耳而帝安為之其意亦欲夸當年髙後世耳太子承乾既立十餘年復寵魏王泰使兄弟相傾承乾既廢晉王嫡子也欲立泰而使異日傳位晉王疑不能決至引佩刀自刺大臣救之而止父子之間以愛故輕予奪至於如此帝嘗得秘䜟言唐後必中微有女武代王以問李淳風欲求而殺之淳風曰其兆既已成在宫中矣天之所命不可去也徒使疑似之戮淫及無辜且自今以後四十年其人已老老則仁雖受終易姓必不能絶李氏若殺之後生壯者多殺而逞則子孫無遺類矣帝用其言而止然猶以疑似殺李君羡夫天命之不可易惟修徳或能已之而帝欲以殺人弭之難哉帝之老也將擇大臣以輔少主李勣起於布衣忠力勁果有節俠之氣嘗事李密友單雄信密敗不忍以其地求利密死不廢舊君之禮雄信將死以股肉㗖之使與俱死帝以是為可用疾革謂髙宗曰爾於勣無恩今以事出之我死即授以僕射髙宗從之及廢王后立武昭儀召勣與長孫無忌褚遂良計之勣稱疾不至帝曰皇后無子罪莫大於絶嗣將廢之遂良等不可他日勣見帝曰將立昭儀而顧命大臣皆以為不可今止矣勣曰此陛下家事不須問外人由此廢立之議遂定勣匹夫之俠也以死徇人不以為難至於禮義所重社稷所由安危勣不知也而帝以為可以屬幼孤寄天下過矣且使勣信賢託國於父竭忠力以報其子可也何至父逐之子復之而後可哉挾術以待臣下於義既已薄矣凡此皆不知道之過也茍不知道則凡所施於世必有逆天理失人心而不自知者故楚昭王知大道雖失國而必復太宗惟不知道雖天下既治且安而幾至於絶滅孔子之所以觀國者如此范祖禹曰太宗以武撥亂以仁勝殘其材畧優於漢髙而規模不及也恭儉不若孝文而功烈過之矣迹其性本彊悍勇不顧親而能畏義而好賢屈已以從諫刻厲矯揉力於為善此所以致貞觀之治也夫賢君不世出自周武成康歴八百餘年而後有漢漢八百餘年而後有太宗其所成就如此豈不難得哉人主之所行其善惡是非在後世當其時不可得而辨也故凡太宗之行事其善與不善臣皆舉其大畧矣老子曰善人者不善人之師不善人者善人之資人君擇其善者而從之足以得師其不善者而戒之足以為資矣總論羣臣吕温淩煙閣勲臣賛序曰我二后受成命撫興運軋坤軸撼乾樞鼓元氣而雷域中騰百川而雨天下雷收雨霽如再開闢蕩焉與太極同功貞觀十七年太宗以功成治定秉為而不有之道讓徳于祖考推勞于羣臣念匡濟於艱難感風雲於疇昔思所以攄之無窮乃詔有司擬其形容圗畫於淩煙閣者二十有四人葢象乎二十四氣之佐天昭勲徳也昔者舜以五臣致理周以十亂反正髙祖以三傑作漢光武以二十八將中興若夫錯綜勲賢牢籠今古雄四代而髙視者其惟聖唐乎至若唐莒公劉渝公之倫探元符建帝圗昔戴神堯舉晉陽而活天下此則大禹之拯溺也魏鄭公以致君為己任諫若不及謇謇左右秉心宣猷此則咎繇之颺言也虞永興糾合羣儒旁求百代明備王禮克諧帝樂使我大國煥乎其有文章此則夷䕫之制作也長孫趙公舉大義除二兇安宗廟定社稷以振我丕赫無疆之休此則周公之匡救也英衛受天勇智雄武佐聖鼓行海内麾定四方此則太公之鷹揚也房杜𤣥機朗識並運帷幄神發嚮效謨成天功此則蕭何之指蹤也子房之決勝也尉遲秦程剛毅木訥氣鎮三軍力崩大敵匹馬孤劒為王前驅此則呉漢之樸忠賈復之雄勇也其餘皆榱棟殊材黼黻異制儔諸古烈㒺有慙徳皇王之際於斯為盛其始也文為經武為緯智斯作忠斯述其末也大不偪小不遏退者全來者達控而縱之使自用之推而引之使自盡之不設籠檻以觀遼廓之致不頓韁鎖以極權奇之變執一徳而衆力展懸大信而羣情竭髙祖取之以義太宗用之以道髙宗終之以仁傳聖萬代享其功利此非盛歟歴代名賢確論巻七十一
