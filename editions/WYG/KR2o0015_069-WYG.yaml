body:
  text: 歴代名賢確論卷六十九太宗二南平公主張唐英太宗論治之隆替不由於樂温公充容徐氏上疏孫之翰大徵天下名儒為學官吕温禹劉禹錫范祖突厥范祖禹康國求内附不從范祖禹髙麗范祖禹孫之翰薛延陁温公范祖禹四夷請帝為天可汗范祖禹李靖吕温孫之翰李勣范祖禹孫之翰張唐英南平公主張唐英論曰南平公主下降王珪子珪以禮有婦見舅姑儀近代公主出降其禮皆廢今上欽明動循法制使公主謁見豈為身榮乃與妻就席而坐使公主執笄行盥饋禮自是公主下降皆行婦禮於舅姑自珪始也噫珪可謂能行閨門禮也太宗可謂能以家道而正其女也南平可謂能行其婦道也詩曰平王之子齊侯之孫言其平王之女使其下降與侯之子齊體也而自漢後公主自以帝王女以隂干陽不復有剛柔上下之分士大夫畏而恥之故劉裕時江斆當尚主乃上表讓婚曰王偃無仲都之質裸雪於北階何瑀闕龍工之姿投軀於深井召必以三脯為期遣必以日出為限若披請不申當刑膚翦髪投山竄海觀其言則知自古至今夫之被淩甚於天下者衆矣況習盡恭於盥饋之禮邪以此觀之則南平之賢可知矣後之公主下降者宜取法焉太宗論治之隆替不由於樂司馬温公曰臣聞垂能目制方圓心度曲直然不能以教人其所以教人者必規矩而已矣聖人不勉而中不思而得然不能以授人其所以授人者必禮樂而已矣禮者聖人所履也樂者聖人所樂也聖人履中正而樂和平又思與四海共之百世傳之於是乎作禮樂焉故工人執垂之規矩而施之器是亦垂之巧已王者執五帝三王之禮樂而施之於世是亦五帝三王之治已五帝三王其違世已久矣後之人見其禮知其所履聞其樂知其所樂炳然若猶存於世此非禮樂之功邪夫禮樂者有本有末中和者本也容聲者末也二者不可偏廢先王守禮樂之本未嘗須臾去於心行禮樂之末未嘗須臾逺於身興於閨門著於朝廷被於鄉遂比隣達於諸侯流於四海自祭祀軍旅至於飲食起居未嘗不在禮樂之内如此數十百年然後治化周浹鳯凰來儀也茍無其本而有其末一日行之而百日捨之求以移風易俗誠亦難矣是以漢武帝置協律歌天瑞非不美也不能免哀痛之詔王莽建羲和考律吕非不精也不能救漸臺之禍晉武帝制笛尺調金石非不詳也不能弭平陵之災梁武帝立四器調八音非不察也不能免臺城之辱然則雖韶夏頀武之音具存於世茍其餘不足以稱之曽不能化一夫況四海乎是猶執垂之規矩而無工與材坐而待器之成終不可得也況齊陳淫昏之主亡國之音暫奏於庭烏能變一世之哀樂乎而太宗遽云治之隆替不由於樂何發言之易而果於非聖人也如此夫禮非威儀之謂也然無威儀則禮不可得而行矣樂非聲音之謂也然無聲音則樂不可得而見矣譬諸山取其一土一石而謂之山則不可然土石皆去於山何在哉故曰無本不立無文不行奈何以齊陳之音不驗於今世而謂樂無治亂何異睹拳石而輕泰山乎必若所言則是五帝三王之作樂皆妄也君子於其所不知葢闕如也惜哉充容徐氏上疏孫之翰曰帝王於後宫恩寵過厚非賢徳者鮮不干預時事著名於外葢寵過厚則言易入言易入則事可動後宫於帝王可動事則姦邪附之著名於外又況親族竊恩競為氣勢内寵至此小則破家之禍大則為國之患此必然之勢也太宗在位嵗久於後宫不無寵嬖但外不聞何人爾惟徐充容以恩顧稱絶不干預時事復能諫爭君失則貞觀宫壼之政可知也宫政如是後代不能遵守神龍中上官昭容等招權於外廣樹姦黨天寳中楊妃専勢於時務强親屬國事既亂數婦人及其家皆不免誅戮矣噫上世淳風既往人主之尊為天下所奉制度必如古帝之簡朴或不能也宫室服用既異於上世矣雖英明之君為外物所誘必有侈樂之意意有侈樂於後宫豈無所嬖在人情未為大過也既嬖之居處服玩充其欲足矣何必容其私謁至干國事使戚屬倚之以作勢姦人附之以竊權氣熖既成必至患禍而後已則人君於後宫或有嬖寵能以貞觀為法不惟不擾時事亦足以保安之也大徵天下名儒為學官吕温虞世南永興公贊曰英英永興華徳素行以文富國以道佐命天下既定為唐儒宗東觀石渠始生古風乘精繹思假道書圃驅馳百代出入三古問羲和心聽堯舜語歸來帝側獻可替否帝告永興與鴻碩之倫闡六籍三墳建樂章禮文先師是宗先聖是崇於廓辟雍辟雍沈沈天子所臨或絃或歌講古述今其從八千纓弁森森獩貊羌髳咸詠徳音羽林孤兒亦垂青衿洋洋聲教無逺不洎日月所照皆成文字鬱開古始掃蕩澆季實我羣儒成太宗之志英英永興宜曰文懿劉禹錫論唐之貴文曰天以正氣付偉人必飾之使光耀于世粹和絪緼積于中鏗鏘發越形于文文之細大視道之行止故得其位者文非空言咸繫于謀謨宥密庸可不紀惟唐神武定天下羣慝既讋驟示以文韶英之音與鉦鼓相襲故起文章為大臣者魏文貞公以諫爭顯髙士亷以智畧奮岑江陵以潤色聞無草昧汗馬之勞而任遇在功臣上唐之貴文至矣哉范祖禹曰古之教者家有塾黨有庠遂有序國有學士修之於家而後升於鄉升於鄉而後升於國升於國而後達於天子其教之有素其養之有漸故成人有徳小子有造賢才不可勝用由此道也後世鄉里之學廢人君能教者不過聚天下之士而烏合於京師學者衆多眩耀一時而已非有教養之實也唐之儒學惟貞觀開元為盛其人才之所成就者亦可睹矣孟子曰學所以明人倫也無學則人倫不明故有國者以為先儒不復三代之制臣未知其可也突厥髙昌范祖禹論太宗因突厥請朝而知懼曰易曰其亡其亡繫于苞桑書曰儆戒無虞夫戒所以勵善而進徳也太宗觀突厥入朝而知懼如此其能致貞觀之治宜哉又論突厥入冦帝悔不用魏徴褚遂良復立髙昌之言曰有國者䘮師之禍小而或以霸秦繆公越王勾踐是也得地之禍大而或以亡楚靈王齊湣王是也是故廣地不若廣德强兵不若强民先王患德之不足而不患地之不廣患民之不安而不患兵之不强封域之外聲教所不及者不以煩中國也太宗不從忠諫卒自咎悔況不若太宗之强盛而可為哉康國求内附不從范祖禹曰太宗知招來絶域之弊故有所不為然以兵克者則以為已有而郡縣置之其為疲勞百姓一也豈先行其言而後從之者歟然其不受康國足以為後世法矣使其行事每如此其盛德可少貶哉髙麗范祖禹論陳大德使髙麗回言髙麗聞髙昌亡大懼曰大德出使絶域當布宣德澤以懐遠人使聲教所及無思不服此其職也而以賂遺覘其險阻詭詐誘其民人以為奇能藉口歸報啓人主征伐之志罪之大者也且天子之使而為諜于外國失使之職豈不辱乎又論鄧素請増戍兵曰太宗以増戍兵不若修文德其言豈不美哉然非能行之直以辯折臣下而已其殆不欲増戍而卒親征不為其小而為其大豈大者能勝德乎書曰非知之艱行之維艱太宗之謂矣又論褚遂良諫親征伐髙麗曰髙麗臣屬于唐而其主為賊臣所殺為大國者不可不討然髙麗之大未如突厥其險遠不過于髙昌吐谷渾此三國者皆命將帥以偏師取之遂墟其國何獨至于髙麗而欲自征之乎太宗若從遂良之言雖伐而不克亦未失也孫之翰曰貞觀中天下治平天子威德甚盛太宗練兵師尚功名其志甚鋭以此不衰怠之意臨天下可預防患難永保太平之業也但因一遠臣弑主害民復侵陵隣國詔罷兵不聴然彼有罪豈預中國之事命一二將帥出師境上示征討救援之勢使畏威懐德足為天子能事何至決親征之計乎忠賢交諫莫非苦言李勣一議堅不可動遂舉中國數萬之衆驅之異域輕其性命已似忍心況萬乘之尊力與爭勝又自輕之甚雖平遼東數城破延夀大軍何足益其威德若延夀納對盧之計危可測乎此盖太宗英勇自恃忽于深慮李勣順意生事遂成誤計且初議伐遼褚遂良諫止其事太宗然之勣至追逐延陀犯邊聖策本欲追撃由魏徴苦諫致失事機以此激之遂定親征之議及敗延夀之衆太宗下馬謝天則危心可知矣詔從行軍人戰死者加勲級榜殯地則中國士衆殞命于遠夷者可知矣天子荷宗廟社稷之重為天下生靈之主一旦不因中國之事履危難輕人命威德無乃損乎且李勣追咎魏徴諫撃延陀犯邊太宗命將禦之大破其衆足示中國之威不追撃之亦未為失況髙麗本不敢犯邊何至親征乎李勣順意生事無以逃其罪矣房喬忍死上表懇諫代遼賢哉范祖禹曰傳曰國無小不可易也葢雖小國必有智者為之謀勇者致其死則雖以天下之大百萬之衆未可恃以為必勝也髙麗對盧之謀正合于太宗所謂上策使延夀聴用唐師豈不殆哉又論帝驛書報太子矜髙麗之功曰太宗之伐髙麗非獨恃其四海之富兵力之强也本其少時奮于布衣志氣英果百戰百勝以取天下治安既久不能深居髙拱猶思所以逞志扼腕踊躍喜于用兵如馮婦搏虎不能自止非有理義以養其志中和以養其氣始于勇敢終于勇敢而已矣記曰所貴于勇敢彊有力者貴其敢行禮義也天下無事則用之于禮義天下有事則用之于戰勝用之于戰勝則無敵用之于禮義則順治太宗于天下無事不知用之于禮義而惟以戰勝為美也是故以天子之尊而較勝于遠夷一戰而克自以為功矜其智能夸示臣下其器不亦小哉又論帝以征髙麗不能成功悔思魏徴曰太宗北擒頡利西滅髙昌兵威無所不加而玩武不已親撃髙麗以天下之衆無功而還意折氣沮親見煬帝以勤遠亡國而襲其所為臣以為太宗之征髙麗無異于煬帝但不至于亂亡耳惟不能慎終如始日新其德而欲功過五帝地廣三王是以失之然見危而思直臣知過而能自悔此所以為賢也又論二十一年髙麗之役曰太宗以葢蘇文弑其君故舉問罪之師當誅其賊臣弔其國人置君而後去之則德刑舉矣而唐師入境貪其土地虜其民人使其父兄子弟流為餓殍且弑君者盖蘇文也彼髙麗之民何罪豈王者之師乎伐而不克益發忿兵乃更欲擾其疆場害其耕稼則是利于為冦非禦冦也又論使蜀造船欲大舉滅髙麗曰昔舜命禹征有苗三旬苗民逆命乃班師振旅夫以舜禹征伐猶無功故用兵非美事也老子曰佳兵者不祥之器不得已而用之太宗之伐髙麗其得已而不已者乎聖人有不能服則反求諸已故舜舞干羽而格有苗未聞以苗民逆命為忿也太宗不能反已而恥其無功欲傾天下之力逞志于遠何其迷而不復也夫天下如一人之一身四方猶四支也師役四支之病也以髙麗之役不及于蜀而必欲疲之是一支病而使别支皆被其痛也此豈愛身之道乎薛延陀司馬温公論延陀請昏帝初許而復絶之曰孔子稱去食去兵不可去信唐太宗審知薛延陀不可妻則初勿許其婚可也既許之矣可復恃强棄信而絶之雖滅薛延陀猶可羞也王者發言出令可不慎哉范祖禹論破薛延陀曰昔武王克商通道于九夷八蠻西旅獻獒太保作訓曰不矜細行終累大德為山九仞功虧一簣因事而戒恐其驕也太宗不得志于東欲收功于北因延陀破亡以兵臨之如疾風之振槁自以為開闢以來未之有也昔之有天下者亦可得而畧聞矣舜曰而難任人蠻夷率服又曰無怠無荒四夷來王然則欲其率服莫若難任人欲其來王莫若無怠荒柔遠能邇治内安外而殊俗之民嚮風慕義不以利誅不以威脅而自至矣欲附者則撫之不欲者不强致也故不勞民不費財至于後世之君或讐疾而欲殄滅之或愛悦而欲招來之是二者皆非也為之者秦始皇是也山川之所限風氣之所移言語不通嗜慾不同得其地不可居得其民不可使也列為州縣是崇虛名而受實弊也且得之既以為功則失之必以為恥其失不在于已則在于子孫故有征討之勞餽餉之煩民不堪命而繼之以亡隋煬帝是也且中國地非不廣也民非不衆也曷若無得無失修其禮樂政刑以惠養吾民使男有餘粟女有餘布兵革不試以致太平不亦帝王之盛美乎故有求于外如彼其難也無求于外如此其易也然而人君常捨所易而行所難何哉忽近而喜逺厭故而謀新不入于秦則入于隋雖不至于亡而常與之同事其累德豈細哉太宗矜其功能好大無窮非所以遺後嗣安中國之道此當以為戒而不可慕也四夷請帝為天可汗范祖禹曰太宗以萬乘之主不恥其名而受其佞事不師古不足為後世法也李靖吕温凌煙閣勲臣李衛公靖贊曰有隋之末羣盜熾爇帝怒震發五星從太白煥照參野將有聖人兵定天下金精下射􅀈毅感激李公矯矯從此奮跡躍于中原王者則獲壯士不死唐威載赫帝曰汝傑致天之罰手付金鉞俾往式遏不廷則殺如颷發發如火烈烈摧枯爍雪應鼓如截遠若荆巫險若江湖强若匃奴莫不率從莫不震恭車書混同氛祲蕩空衛侯之功功則維何威明惠和策勇駕智長驅仁義仁義曠蕩帝王之將萬古曷瞻鐵山巉巉孫之翰論命李靖討吐谷渾曰天子善任人而能主威柄則大臣不驕大臣不驕則中外自肅太宗以吐谷渾拒命一日謂侍臣曰欲李靖為帥討之靖功名之大為當世勲臣方以老病家居聞其言亟見執政請行天子使大臣如是功名不逮于靖筋力未衰于靖者敢驕慢乎人臣不敢驕慢則各盡其才節人臣各盡才節天下事不足治矣天子使人至是者無他善任人而能主威柄也又論帝謂靖曰前者有人讒公今朕意已悟命為僕射曰太宗之明李靖之賢君臣之心可無間矣況靖深入成大功安得容讒人之言且謂靖軍無綱紀致奇寶散於亂兵之手此不識事體之言也靖善用兵法令素整以少精騎深入無綱紀安能成功乎奇寶若果有之散之兵衆正得事宜突厥凌中國久矣一日平之張天威雪國恥安邊寧人非靖盡心兵衆盡力何以成此功以寶貨散之軍衆是上不奉君欲下足恩衆心故謂正得事宜但不知寶貨之有無耳太宗為君何至以奇寶為意猜疑賢將尚賴仁明之德不行重責靖之忠誠無所觖望不然君臣之間兩有大過矣及數月始悟其事命靖為相亦足光其功德宜罪讒人以戒于後世可也李勣范祖禹論降李勣疊州曰太宗以李勣為何如人哉以為愚也則不可以託幼孤而寄天下矣以為賢也當任而勿疑何乃憂後嗣之不能懐服先黜之而後用邪是以犬馬畜之也夫欲奪其心而折之以威欲得其力而懐之以恩此漢祖所以馭黥彭之徒徂詐之術也五伯之所不為也豈堯舜親賢之道乎苟以是心而待其臣則利禄之士可得而使也賢者不可得而致也若夫禄之以天下而不顧繫馬千駟而不視者太宗豈得而用之哉孫之翰曰君待臣以道則臣以道報之矣君待臣以利則臣以利報之矣此歴代已來君臣之常術也太宗用李勣有本末勣之才謀智力立功立事為大臣固宜然以勣不負李密尤信其心使輔太子正為此節勣雖髙勲重望位尚書預中書門下事寵已至矣使輔太子敢不盡力乎何至無故譴逐使太子他日授以僕射方謂致其死力此正待之以利也凡人父兄有恩力於人其人稍良未有不厚其子弟者況天子以大位授人且寵信之豈於太子不盡力也然勣忠義之士但風氣英豪非感激不能盡節一日無故逐之不無怏怏及太子授以僕射勣之機心豈不曉其利誘也至廢立皇后之際不肯盡忠雖失大臣之節然亦由太宗以利啟其心也張唐英曰太宗寢疾謂太子晉王曰汝於李勣無恩我將責之汝他日授以僕射即荷汝恩以致死力乃出為疊州都督晉王即位召為僕射嘗觀史至此惜太宗於任人之誠有未盡矣且既知勣可為顧命大臣當面授遺詔使為羽翼奈何勣本無過失乃責為都督使太子自召而用求其致力哉夫忠臣義士雖在裘褐之中巖野之下亦有憂勞天下之心不必位之尊禄之厚然後致死力於國家且匹夫之交亦有可託市道之友亦能知心而況勣出入將相二十餘年自當致力以答累朝之恩何必須太子自授以官然後可任使哉使勣小人也則茍且一時之寵以充詘其志使勣君子也其肯忘先朝之恩而不盡忠於嗣君乎其後勣竟不能奮大節以輔髙宗乃雷同取容扶立武氏斵喪王室皆勣之為又肯能為髙宗致死力哉諺謂欲不溺而自硾以石欲不病而自飲以堇其太宗任勣之謂乎范祖禹論勣勸立武后曰髙宗欲廢立而猶難於顧命大臣取決於李勣之一言勣若以為不可則武氏必不立矣勣非惟不諫又勸成之孽后之立無忌遂良之死唐室中絶皆勣之由其禍豈不博哉太宗以勣為忠託以幼孤而其大節如此書曰知人則哲惟帝其難之信矣歴代名賢確論卷六十九
