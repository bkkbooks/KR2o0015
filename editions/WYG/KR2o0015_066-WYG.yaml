body:
  text: 歴代名賢確論卷六十六隋高祖高祖與后重誓無異生子以絶分爭又使五子分據大鎮晩年父子兄弟迭猜忌皆不以壽終温公楊素何去非煬帝荒淫樂天東坡嚴峻法令陳子昻通論文帝煬帝温公高祖與后重誓無異生子以絶分爭又使五子分據大鎮晩年父子兄弟迭猜忌皆不以壽終温公曰昔辛伯諗周桓公曰内寵並后外寵貳政嬖子配嫡大都偶國亂之本也人主誠能慎此四者亂何自生乎隋高祖徒知嫡庶之多爭孤弱之易搖曾不知勢鈞位逼雖同産至親不能無相傾奪者諗辛伯之言得其一而失其三乎楊素何去非曰戰必勝攻必取者將之良能也良將之所挾亦曰智勇而已徒智而無勇則遇勇而挫徒勇而無智則遇智而蹶智足以役勇勇足以應智然後以戰必勝以攻必取天下其孰能當之昔者楊素之於隋可謂一代之名將矣而賀若弼評之謂其特猛將耳非所謂謀將也甚哉弼之過於自負而輕於議人也隋自平陳之後素已為統帥矣其克敵斬虜功策為多既俘陳主而江湖海岱羣盗蜂起大者數萬小者數千而素專閫外之權轉戰萬里窮越嶺海無向不滅已而突厥犯塞宗室稱兵而社稷危矣素之授鉞專征其所摧陷者不可勝計遂空敵庭而清内難然素之兵未嘗小衂隋功臣無與肩者其為烈亦至矣而弼猶不以謀將處之特曰猛而已夫目之以猛而不許之以謀蓋所謂徒勇而無智者矣考素之功烈如此茍其智之不逮則凡所以決機取勝者其誰之謀也自隋文平一天下所謂名將者獨韓擒虎賀若弼史萬嵗與素耳擒弼自平陳之後不獲立尺寸之効獨史萬嵗從素征討以驍勇稱而弼乃以大將自處而目是三人者皆不能盡其材亦見其不知量而務以其私言動世主也素之馭戎嚴整而喜誅每戰必求士之過失者斬之以令常至百輩而先以數百人赴敵陷陣不能而還却者悉斬之復進以數百人期必陷陣而止是以士皆必死前無堅敵此弼所以得目之為猛也嗟乎素非有忍於士也以為士之必死者乃所以決生必生者乃所以決死故也唐之善於兵者無若李靖其為書曰畏我者不畏敵畏敵者不畏我是以古之名將十卒而殺其三者威振於敵國殺其一者令行於三軍靖豈以卒為不足愛哉以為殺一而百奮則奮者可期於勝也縱一而百惰則惰者可期於敗也奮而克敵與夫惰而為敵所克則是殺者乃所以生之愛者乃所以害之也善為將者能審乎此則無惡乎其茍忍也雖然在素之術有足以致勝未足以為勝之工也法曰兵無選鋒曰北詩曰元戎十乘以先啓行其啓行者選鋒之謂也越王勾踐之伐吳其為士者數萬而又有君子六千人所謂君子者其選鋒也素之所使以陷陣者其選鋒之謂歟然至有不克而還不免於誅者疑其非選之特精而養之素厚之士也又嘗觀唐太宗之將未嘗先以其身親搏戰也必以驍騎勁旅而經營於其傍或瞰臨於其高常若無意於戰其兵既交其鬭皆力而未決也卒然率之而奮士皆殊死突貫其敵之陣而出其背凡所嬰者無不摧敗猶之二人之相搏也材鈞而力偶方相持而未決也卒然一夫起其旁而助之則夫受助者蔑不勝矣此法所謂以正合以竒勝者也使素之所用以為鋒者皆精其選而又量敵之堅脆以遣之使其必足以陷敵無至乎不克而還又加之誅而常出於唐太宗之竒則如弼者亦何得而妄議矣荒淫白樂天隋堤栁詩曰隋堤栁嵗久年深盡衰朽風飄飄兮雨蕭蕭三株兩株汴河口老枝病葉愁殺人曽經大業年中春大業年中煬天子種栁成行夾流水西自黃河東至淮緑影一千三百里大業末年春暮月栁色如煙絮如雪南幸江都恣佚遊應將此栁繫龍舟紫髯郎將䕶錦纜青娥御史直迷樓海内財力此時竭舟中歌笑何日休上荒下困勢不久宗社之危如綴旒煬天子自言歡樂殊未極豈知明年正朔歸武德煬天子自言福祚長無窮豈知皇子封􅈶公龍舟未過彭城閣義旗已入長安宫蕭墻禍生人事變晏駕不得歸秦中土墳數尺何處葬吳公臺下多悲風二百年來汴河路沙草和煙朝復暮後王何以鑒前王請看隋堤亡國樹東坡論隋好樂而亡曰隋煬帝不解音律略不關懐後人製豔曲詞極淫綺令樂正白明逹造新聲創萬嵗樂藏鈎樂投壺樂舞席固心髻玉女行觴神仙畱客擲塼續命鬭雞子鬭百草泛龍舟還舊宫長樂花及十二時等曲掩抑摧藏哀音斷絶帝悦之不已謂幸臣曰多彈曲者如人多讀書讀書多則能撰文彈曲多則能造曲因語明逹云陳氏褊陋曹妙逹猶自封王况我天下大同乎宋武帝既受禪朝廷未備音樂殷仲文以為言帝曰日不暇給且所不解仲文曰屢聴自解帝曰政以解則好之故不習觀二主之言興亡之理豈不明哉嚴峻法令陳子昻諌刑書曰自古聖人不有外患必有内憂物理之然也臣聞長老言隋之末代天下猶平煬帝不龔窮毒威武厭居皇極自總元戎以百萬之師觀兵遼海天下始騷然矣遂使楊𤣥感挾不臣之勢有大盗之心欲因人謀以竊皇業乃稱兵中夏將據洛陽哮闞之勢傾宇宙矣然亂未踰月而首足異處何者天下之弊未有土崩蒸人之心猶望樂業煬帝不悟暗忽人機自以為元惡既誅天下無巨猾也皇極之任可以刑罰理之遂使兵部尚書樊子蓋專行屠戮大窮黨與海内豪士無不罹殃遂至殺人如麻流血成澤天下靡靡始思為亂矣於是蕭銑朱粲起於荆南李密竇建德亂於河北四海雲搖遂並起而隋族亡矣豈不哀哉文帝煬帝温公論曰文帝之於周室非有元功厚德素洽於人直以天元暴崩嗣君幼弱姦臣矯命徼倖得之然明敏儉約勤於政治隨才任官信賞必罰故能取江南三百年之國易於返掌使天下復為一統百姓繁庶衣食豐衍突厥室韋靺鞨林邑高昌女國之屬莫不稽顙稱臣奉珍入貢雖兩漢全盛之時不能過也向使後嗣僅得中材之主以守之十世之内未易亡也煬帝以悖逆詐謀坐承富强之業志驕意溢慨然慕秦皇漢武之為人窮奢極欲兵連四夷政煩賦重盗賊蠭起而猶巡遊不息以樂滔憂惡聞直言喜自壅蔽噫是道也雖禹湯文武之子孫未或不亡况隋無積善之基乎歴代名賢確論卷六十六
