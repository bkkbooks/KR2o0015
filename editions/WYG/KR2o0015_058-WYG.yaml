body:
  text: 歴代名賢確論卷五十八晉宣帝武帝宣帝謀魏子由傅𤣥諫止持文帝三年之喪温公武帝無貽厥孫謀之道温公武帝以太子母弟秦王柬楚王瑋淮南王允並鎮守要害子由貴戚專殺東坡裴楷諂對東坡衛瓘拊床東坡為惠帝娶婦東坡賈充東坡李徳裕山濤温公嵇紹應命王裒辭徵温公阮籍東坡張華東坡唐彬東坡平吳六一子由子西宣帝謀魏子由論曰世之説者曰司馬仲達之於魏則曹孟徳之於漢也是不然二人智勇權畧則同而所處則異漢自董卓之後内潰外畔獻帝奔走困踣之不暇帝王之勢盡矣獨其名在耳曹公假其名號以服天下擁而植之許昌建都邑誅叛逆皆曹公也雖使終身奉獻帝率天下而朝之天下不歸漢而歸魏者十室而九矣曹公誠能安而俟之使天命自至雖文王三分天下有其二以事紂何以加之惜其為義不終使獻帝不安於上義士憤怨於下雖荀文若猶不得其死此則曹公之過矣如司馬仲達則不然明帝之末曹氏之業固矣雖明帝以淫虐失衆曹爽以驕縱得罪而顛覆之形未見天下未叛魏也仲達因其隙而乘之拊其背而奪其成業事與曹公異矣漢武帝之老也託昭帝於霍光昭帝尚幼燕王葢主有簒取之心上官桀桑𢎞羊助之此其禍急於曹爽霍光内斃燕蓋外誅桀羊擁䕶昭帝絶無驕君之心及昭帝早喪國空無主迎立昌邑王昌邑不令又援立宣帝柄在其手者屢矣然退避臣位不以自疑中外悉其本心初無有一人異議者以仲達擬光孰為得之耶然光猶不足道蜀先主將亡召諸葛孔明而告之曰嗣子可輔輔之如其不才君可自取復語後主汝與丞相從事事之如父後主之闇弱孔明之賢智蜀人知之矣使孔明有異志一搖手而定矣然外平徼外蠻夷内廢李平廖立旁禦魏吳功成業定又付之蔣琬費禕奉一昏主三十餘年而無纎介之隙此又霍光所不能望也故人患不誠茍誠忠孝舜之於父母伊尹之於太甲終無間然者自仲達之後人臣受六尺之寄因而取之者多矣皆以地勢迫切置而不取則身必危國必亂至自比騎虎不可復下此亦自欺而已哉傅𤣥諫止持文帝三年之喪温公曰三年之喪自天子逹於庻人此先王禮經百世不易者漢文帝師心不學變古壊禮絶父子之恩虧君臣之義後世帝王不能篤於哀戚之情而羣臣諂諛莫肯釐正至於晉武獨以天性矯而行之可謂不世之賢君而裴傅之徒固陋庸臣習常玩故不能將順其美惜哉武帝無貽厥孫謀之道温公曰何曾譏武帝偷惰取過目前不為遠慮知天下將亂子孫必與其憂何其明也然身為僭侈使子孫承流卒以驕奢亡族其明安在哉且身為宰相知其君之過不以告而私語於其家非忠臣也武帝以太子母弟秦王柬楚王瑋淮南王允並鎮守要害子由晉武帝論曰立嫡以長不以賢立子以貴不以長古今之正義也然堯廢丹朱用舜而天下安帝乙廢微子立紂而商亡古之人蓋有不得已而行之者矣得已而不已不得已而已之二者皆亂也子非朱紂而廢天下之正義君子不忍子如朱紂而守天下之正義君子不為也漢高帝始謂惠帝仁弱欲廢之而立如意既而知人心之在於太子也遂寢廢立之議而用平勃平勃皆賢而權任均故惠帝雖殁産禄雖橫而援立文帝漢室不病也武帝既老而知燕王旦廣陵王胥之不可用也廢之而立少子任霍光金日磾上官桀桑𢎞羊以後事當時昭帝之賢否未可知而四人枉直相半也幸而昭帝明哲霍光忠良桀羊雖為亂而不遂其後復廢昌邑立宣帝而朝廷晏然無患葢人君不幸而立幼主當如二帝屬任賢臣乃免於亂此必然之勢也魏明帝疾篤而無子棄遠宗子而立齊王始欲輔以曹宇曹肇而倖臣劉放孫資不便宇肇之正勸帝易以司馬仲逹曹爽齊王既非天下之望而爽又以庸才與仲逹姦雄為對數年之間遂成簒弑之禍晉武帝親見此敗矣惠帝之不肖羣臣舉知之而牽制不忍忌齊王攸之賢而恃愍懐之小慧以為可以消未然之憂獨有一汝南王亮而不早用舉社稷之重而付之楊駿至於一敗塗地無足怪也帝之出齊王也王渾言於帝曰攸之於晉有姬旦之親若豫聞朝政則腹心不二之臣也國家之事若用后妃外戚則有吕氏王氏之虞付之同姓至親則又有吳楚七國之慮事任輕重所在未有不為害者也惟當任正道求忠良不可事事曲設疑防慮方來之患也若以智猜物雖親見疑至於疏遠亦安能自保乎人懐疑懼非為安之理此最國家之深患也渾之言天下之至言也帝不能用乃用王佑之計使太子母弟秦王柬都督關中楚王瑋淮南王允並鎮守要害以强帝室然晉室之亂實成於八王吾嘗籌之如攸之親賢奪嫡之禍非其志也不幸至此天下所宗宗社之計猶有頼也如佑之計使子弟據兵以捍外患如梁孝王之禦吳楚尚可若變從中起而使人人握兵以救内難此與何進袁紹召丁原董卓以除宦官何異古人有言擇福莫若重擇禍莫若輕如武帝之擇禍福可謂不審矣貴戚專殺東坡曰王濟以人乳蒸豚王愷使妓吹笛小失齊韻便殺之使美人行酒客飲不盡亦殺之時武帝尚在而貴戚敢如此知晉室之亂也久矣裴楷諂對東坡曰晉武帝探策當如籖也耶惠帝不肖得一蓋神以實告裴楷諂對士君子恥之而史以為善談鄙哉惠懐愍皆不終牛繼馬後豈及二乎衛瓘拊牀東坡曰晉惠帝為太子衛瓘欲陳啟廢之言未敢發㑹燕凌雲臺瓘託醉帝前曰臣有所啟欲言而止者三因以手拊牀曰此座可惜帝意乃悟曰公真大醉賈后由是怨瓘此何等語乃於衆中言之豈所謂不密失身耶以瓘之智不宜闇此殆鄧艾之寃天奪其識耳為惠帝娶婦東坡曰晉武帝欲為太子取衛瓘女賈氏女有五不可青黒短妬而無子竟為羣臣所譽取之卒以亡晉婦人黒白美惡人人知之而愛其子欲為取好婦且使多子者人人同也然至惑於衆口則顛倒錯謬如此俚語曰證龜成鼈此未足怪也以此觀之當謂證龜為蛇小人之移人也使龜蛇易位而况邪正之在其心利害之在嵗月後者耶賈充東坡曰司馬景王既執王淩而歸過賈逵廟大呼曰賈梁道我大魏之忠臣也及景王病見淩與逵共守笞殺之逵之子充乃叛魏事晉首發成濟之事淩嘗謂充卿非賈梁道子耶乃欲以國與人由此觀之逵之忠於魏久矣充豈不知也耶予乃知小人嗜利利之所在不難叛父父且不顧不知人主亦安用此物故亡晉者卒充也予少時嘗戲作小詩云嵇紹似康為有子郄超叛鑒是無孫而今更恨賈梁道不殺公閭殺子元李徳裕羊祜畱賈充論曰任愷庾純以賈充邪僻欲其疎遠勸晉武令西鎮長安唯羊祜密表畱之祜豈悦賈充者哉良以愛君體國發於至誠耳晉氏傾奪魏國初有天下其將相大臣非魏之舊臣即其子孫所寄心腹唯賈充而已充亦非忠於君者自以成濟之事與晉室當同休戚此羊祜所以願畱也昔漢高不去吕后亦近於此漢高嬖戚姬愛如意思其久安之計至於悲歌不樂豈不知除去吕后必無後患况吕后年長有過稀復進見漢高棄之如去塵垢實以惠帝闇弱必不能自攬權綱其將相皆平生故人俱起豐沛非吕后剛强不能臨制所以存之為社稷也後世翼戴其君者得不念於此哉東坡曰昔賈充用事天下憂恐而庾純任愷戮力排之及充出鎮秦涼忠臣義士莫不相慶屈指數日以望惟新之化而馮純之徒更相告曰賈公遠放吾等失勢矣於是相與獻謀而充復畱則晉氏之亂始此矣自古惟小人為難去何則去一小人而其黨破壊是以為之計謀遊説者衆也山濤温公論李喜言山濤等占官田曰政之大本在刑賞刑賞不明政何以成晉武帝赦山濤而褒李喜其於刑賞兩失之使喜所言為是則濤不可赦所言為非則喜不足褒褒之使言言而不用怨結於下威玩於上將安用之且四臣同罪劉友伏誅而濤等不問避貴施賤可謂政乎創業之初而政本不立將以垂統後世不亦難乎嵇紹應命王裒辭徵温公曰昔舜誅鯀而禹事舜不敢廢至公也嵇康王儀死皆不以其罪二子不仕晉室可也嵇紹茍無蕩陰之忠殆不免於君子之譏乎阮籍東坡阮籍嘯臺詩曰阮生古狂逹遁世黙無言猶餘胷中氣長嘯獨軒軒高情遺萬物不與世俗論登臨偶自冩激越蕩乾坤醒為嘯所發飲為醉所昏誰能與之較亂世足自存又論阮籍廣武嘆曰昔先友史經臣彥輔謂余阮籍登廣武而嘆曰時無英雄使豎子成其名豈謂沛公豎子乎余曰非也傷時無劉項也豎子指魏晉間人耳其後余遊京口甘露寺寺有孔明孫權梁武李徳裕之遺跡余感之賦詩其略曰四雄皆龍虎遺迹儼未刋方其咸壯時争奪肯少安廢興屬造物遷逝誰控搏况彼妄庸子而欲事所難聊興廣武嘆不待雍門彈則猶此意也今日讀太白登廣武古戰塲詩云沈湎呼豎子狂言非至公乃知白亦誤認嗣宗語與先友之意無異也嗣宗雖放蕩本有意於世以魏晉間多事所以放於酒耳何至以沛公為豎子乎又書阮籍語曰世之所謂君子者惟法是修惟禮是克手執圭璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉黨長聞隣國上欲圖三公下不失九州牧獨不見大羣蝨之處褌中乎逃乎深縫匿乎敗絮自以為吉宅也行不敢離縫際動不敢出褌襠自以為得繩墨也然炎丘火流焦邑滅都羣蝨處於褌中不能出也君子之處域内何異夫蝨之處褌中乎此阮籍之胷懐本趣也籍未嘗臧否人物口不及世事然禮法之士疾之如仇讎獨賴司馬景王保持之爾其去死無幾以此論之亦蝨之出入往來於衣褌中間者也安能笑褌中之藏乎吾故書之以為將來君子一笑張華東坡論曰阮籍見張華鷦鷯賦嘆曰此王佐才也觀其志獨欲自全於禍福之間耳何足為王佐才乎華不從劉卞言竟與賈氏之禍畏八王之難而不免倫秀之害此正求全之過失鷦鷯之本意也唐彬東坡論曰唐彬與王濬伐吳為先驅所至皆下度孫皓必降未至建業二百里許稱疾不行已而先到者争財後到者争功當時有識者莫不高彬此舉余讀晉書至此未嘗不廢卷太息也然本傳云武帝欲以彬及楊宗為監軍以問文立立曰彬多財欲而宗嗜酒帝曰財欲可足酒不可改遂用彬此言進退無據豈有人如唐彬而貪財者使誠貪財乃遠不如嗜酒何可用也文立者獨何人斯安知非蔽賢者耶平吳羊祜杜預六一峴山亭記曰峴山臨漢上望之隱然蓋諸山之小者而其名特著於荆州者豈非以其人哉其人謂誰羊祜叔子杜預元凱是已方晉與吳以兵事争常倚荆州以為重而二子相繼於此遂以平吳而成晉業其功烈已葢於當世矣至於流風餘韻藹然被於江漢之間者至今人猶思之而又於叔子思之尤深蓋元凱以其功而叔子以其仁二子所為雖不同然皆足以垂於不朽而頗疑其反自汲汲於後世之名者何哉傳言叔子嘗登兹山慨然語其屬以謂此山常在而前世之士皆已湮滅於無聞因自顧而悲傷然獨不知兹山待已而名著也元凱銘功於二石一置兹山之上一投漢水之淵是知陵谷有變而不知石有時而磨滅也豈皆自喜其名之甚而過為無窮之慮歟將自待者厚而所思者遠歟子由羊祜論曰善為國者必度其君可與共患難可與同安樂而後有為故功成而無後憂晉厲公與楚共王爭鄭晉人知楚有可乘之隙欒武子為政欲出兵擊之曰不可以當吾世而失諸侯范文子不欲請釋楚以為外懼武子不能用夫文子非茍自安者也厲公侈而多嬖寵諸大夫富而凌上國有大功則君臣不相安亂之所自生也既謀之不從出而遇楚猶欲避楚而歸既勝反國曰亂將作矣吾不可以俟使其祝宗祈死逾年而厲公殺三郤立胥童欒書殺胥童弑厲公文子雖死而免於大難子孫與晉國相終始范蠡事越王勾踐反自㑹稽撫人民厲兵甲七年而殺吳王夫差歸未及國知越王之難與同安樂也扁舟去之卒免大夫種之戮若二子者可謂有先見之明矣范文子至於自殺范蠡至於逃亡而不顧何則所全者大也晉武帝既受魏禪中原富强羣臣用命吳孫皓以淫虐失衆有亡國之釁晉人習於長江之險以為未可取也羊祜為襄陽守知其不能久陳可取之計武帝納之祜又進王濬杜預以成滅吳之功後世皆稱其賢吾嘗論祜巧於策吳而拙於謀晉何以言之武帝之為人好善而不擇人茍安而無遠慮雖賢人滿朝而賈充荀勗之流以為腹心使吳尚在相持而不敢肆雖為賢君可也吳亡之後荒於女色蔽於庸子疎賢臣近小人去武備崇藩國所以兆亡國之禍者不可勝數此則滅吳之所從致也孟子曰入則無法家拂士出則無敵國外患者國恒亡故人常生於憂患而死於安樂祜不慮此而鋭於滅吳其不若范文子遠矣或曰吳滅而晉亂此天命非人事也而羊祜何罪焉吾應之曰為國當論人事使祜不為滅吳之計孫皓窮兇而死吳更立君則長江未可越也吳既不亡則晉之君臣厲精不懈是吳不滅而晉不亂也不猶愈於吳滅而晉亂乎祜之將死也武帝欲使臥䕶諸將祜曰滅吳不須臣自行但吳平之後當勞聖慮耳惟祜此言蓋亦憂在平吳矣憂在平吳而勇於滅吳其不若范文子遠矣子西論羊陸交和或以祜抗失臣節兩譏之曰親仁善鄰者國家之事出竒克敵者將帥之職羊陸以將帥之職而修國家之事此論者所以譏其失節也竊謂不然兵固多術矣有以力相傾者有以智相傾者有以徳相傾者秦漢以來唯知詐力一有為徳則是非為之紛然而不知所謂以徳相傾者是亦出竒而已矣何名為失節哉然晉陽秋以為羊陸推僑札之好兹又過矣兵家詭道何僑札之有就如所云乃不足貴何則非吳鄭之使而敦僑札之分處方面之任而私境外之交此非所以稱羊陸之美也歴代名賢確論卷五十八
