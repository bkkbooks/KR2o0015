body:
  text: 歴代名賢確論卷八十三徳宗一省貢獻罷樂工詔勿上祥瑞出宫女等中外皆悅淄青軍士曰明主岀吾屬猶反乎范祖禹薛邕張渉以贓得罪宦官武將藉口毁文臣帝心始疑范祖禹帝不委任臣下陸贄言用人之法范祖禹上不任宰相惟信裴延齡韋渠牟韋執誼李實等范祖禹蔣乂諌張茂宗起復尚主不從范祖禹賦稅征斂范祖禹温公陸贄諫遥制軍機范祖禹關中饑饉兵民皆痩黑范祖禹責御史段平仲張唐英東宫范祖禹宦官范祖禹藩鎭范祖禹李希烈杜牧李翺朱滔范祖禹朱泚范祖禹張唐英吐蕃孫之翰省貢獻罷樂工詔勿上祥瑞出宫女等中外皆悅淄青軍士曰明主出吾屬猶反乎范祖禹曰徳宗即位之初思致太平知天下厭代宗之政滌其煩穢決其底滯四海之内聞風震慄以為不世出之主也不數年而致大亂何哉燭理不明而所任非人求欲速之功役其獨智而不本於人情故也孟子曰其進鋭者其退速其徳宗之謂乎薛邕張涉以贓得罪宦官武將藉口毁文臣帝心始疑范祖禹曰德宗之不明豈足與有為哉二臣以贓敗而疑天下之士皆貪何其信小人之深而待君子之淺也舜不以朝有四兇而不舉元凱周不以家有管蔡而不封懿親夫以失於一人而不取於衆是以噎而廢食也已則不明不能求賢卒委宦者以為腹心乃疑朝士皆不可倚仗不自知其蔽也帝不委任臣下陸贄言用人之法范祖禹曰昔仲弓為季氏宰問政孔子曰先有司赦小過舉賢才夫為政不先有司則君代臣職矣不赦小過則下無全人矣不舉賢才則小人進矣失此三者以為季氏宰且不可而况為天下乎自堯舜以來未有不由此三者而治蓋君人之常道也徳宗反之亦足為後世戒哉上不任宰相惟信裴延齡韋渠牟韋執誼李實等范祖禹曰徳宗悅人之從已而惡人之違已故守正之士難入辯給之士易親貞元之間雖忠邪賢佞雜處於朝而君子常阨窮小人常得志韋渠牟之徒在左右王叔文之黨事東宫唐之小人於是為多其不遽至於亡非不幸也又論宰相不敢私第見客曰易曰巽而耳目聰明言人君養賢之故也詩曰周爰咨詢言人臣事君之職也德宗禁錮宰相而使之其宰相亦塗其耳目以容身保位國之治亂民之休戚若不聞見焉自古以來未有聾瞽其大臣而可以為國者也夫疑之則勿任任之則勿疑置相者當擇之於未用之前而不當疑之於既用之後未有可託天下而不保其不欺君者也然而人君多悅人之從已其未用也輕信之既用也過防之是以上下相䝉而政愈亂也蔣乂諫張茂宗起復尚主不從范祖禹曰朝廷者禮義之所出也而以喪昏廢先王之軌使四方何觀焉德宗即位之初動必循禮而其終如此心無所主故也委巷鄙慝之禮法之所當禁也乃引以為比茍欲拒諫不亦惑乎賦稅征斂范祖禹論楊炎作兩稅外率一錢者以枉法論曰立法者其始未嘗不亷而終於貪出令者其始未嘗不戒而終於廢法令者人君為之而與天下共守之者也茍朝廷自不守其法則天下其誰守之德宗之政名亷而實貪故其令始戒而終廢其初禁暴非不嚴也而刻剥之令紛然繼出天下不勝其弊蓋法雖備具而意常誅求人君用意出於法外天下之吏奉朝廷之意而不奉其法逆意有罪奉法無功是以法雖存而常為無用之文也又論借商人錢曰人君用天下之力取天下之財征伐不庭以一海内所以保民也而兵革既起未嘗不自虐其民暴歛之害甚於寇盗冦盗害民之命而暴歛失民之心害民命者君得而治之失民心者則不可得而復收也孔子曰苛政猛於虎也借商之事可見矣議者必曰不有小害不得大治不有小殘不得大功一勞而乆逸暫費而永寜是以人主甘心焉而卒致大亂此不可以不戒也又論陳少㳺奏増稅錢及鹽價曰少㳺重歛加賦以媚上求寵此民賊也德宗推其法於天下而以宰相賞之是以官吏承風競為刻剥民不勝困以至大亂夫以天官而賞民賊安得無顛覆之禍乎又論初税間架除陌錢曰易剥之六四曰剥牀以膚凶夫牀者膚之所依也剝牀不已必侵於膚君者民之所戴也剝民不已必害於君故象曰切近災也徳宗有平一海内之志而求欲速之功不務養民而先用武軍食不足則暴征横歛以繼之民愁兵怨激而成亂自古不固邦本而攻戰不息者必有意外之患此後王之深戒也又論陸贄奏請兩稅以布帛為額不計錢數曰泉貨所以權物之輕重流於天下則為用積於府庫不為利也何以知其然耶榖帛出於民而官不可為也錢出於官而民不可為也取其所有與其所無則上下皆濟矣是故以穀帛為賦則民不得不耕織以奉公上此驅之於農桑也如不取其所有而與其所無則民之所有棄之必賤矣官之所無收之必貴矣穀帛輕則民為之者少錢重則物甚賤者多是以利壅於上民困於下至於田野荒杼柚空由取其所無故也然則以錢為賦官豈得其利乎為法者必使民去末而反本則富國之道也又論帝自興元還尤専意聚歛藩鎭州縣以進奉求恩曰古之人君或多難以興國或因亂以啟覇蓋險阻艱難憂患備嘗則知民之疾苦事之愆失困而後發其智懼而後懲其心故能有為也徳宗還自興元不知其貪以取亡而惟貨之求愈務聚歛政吏駢惡紀綱大壞徳之不進而其心謬戾亦甚矣哉司馬温公論上畋新店入民趙光竒家問百姓樂乎對曰不樂上命復其家曰甚矣唐徳宗之難寤也自古所患者人君之澤壅而不下達小民之情鬱而不上通故君勤恤於上而民不懷民愁怨於下而君不知以至於離叛危亡凡以此也徳宗幸以逰獵得至民家值光竒敢言而知民疾苦此乃千載之一遇也固當按有司之廢格詔書殘虐下民横増賦歛盗取公財及左右諂䛕日稱民間豐樂者而誅之然後洗心易慮一新其政屏浮飾廢虚文謹號令敦誠信察眞偽辨忠邪矜困窮伸寃滯則太平之業可致矣釋此不為乃復光竒之家夫以四海之廣兆民之衆又安得人人自言於天子而戸戸復其徭賦乎范祖禹論長安平府庫尚餘蓄曰德宗欲剗滅藩鎮故聚天下之財因師出為名而多殖貨利以為人主可欺天下而莫之知也夫匹夫猶不可以家之有無欺其鄰里况人主内有餘富而可以不足欺天下乎得財而失民將誰與守矣其失國宜哉而向之所積反為盗資貨悖而出猶不能竭先王不以利為利而以義為利盖以此也陸贄諫遥制軍機范祖禹曰易師之六五曰長子帥師弟子輿尸貞凶六五為師之主制師之命者也長子人之帥也故行師則吉弟子聴於人者也故雖貞而凶然則師之道在擇人而委任之不可以牽制也而人君常欲權出於己或不欲功歸於人將在外而以君命制之兵從中御未有能成功者也又曰明君用人而不自用故恭已而成功多疑之君自用而不用人故勞心而敗事自古征伐或勝或不勝多由於此二者矣傳曰師在制命而已稟命則不威且戒事在邊而人主自將行兵於千里之外決䇿於九重之中雖有方叔召虎之臣不得自便此非敵國之所敗乃人主自敗其師也關中饑饉兵民皆痩黑范祖禹曰老子曰師之所處荆棘生焉大軍之後必有凶年言民以其愁苦之氣傷天地隂陽之和致水旱之災夫以兵除殘如人以毒藥攻疾疾去而人傷亦甚矣其血氣必乆而後復或終身遂衰一失其養則易以死亡不若未病之完也先王制治于未亂保邦於未危有天下者可不務哉責御史段平仲張唐英曰徳宗以雄才英氣慕漢中宗為治專總威福臨制中外宰臣備員承受章奏而天下之政多所壅隔時監察御史段平仲磊落忠義常言曰若得一召見必大有開悟後與陳歸奉使回奏事畢欲有所建白上知其意問之聲色俱厲雜以他語平仲錯愕不得言因誤稱名上叱出之坐是廢七年噫徳宗於此乎失君人之體矣夫君人之威踰於雷霆重於萬鈞臣子之命微如鴻毛輕如一縷君人者優柔以容之温怡以接之慮其畏懼而不敢言嫌疑而不盡情而况臨之以嚴厲之色責之以叢雜之言而欲來直言通下情其可得哉胡不少假以顔色試聴所奏而能明社稷之安危究邦家之興替悉生民之利病審刑政之得失一言興邦轉禍為福奈何震威以懼之哉以是知興元之阨興元之幸亦由上下之情不通而有以召之也昔程名振奏事詞色不屈文皇帝曰房喬在朕左右見朕嗔人未嘗不失色今名振敢如此亦竒士也乃優而任之徳宗之量豈不愧於文皇哉禮曰聲色之化民末也詩曰予懷明徳不大聲以色恭惟藝祖優寵直言未嘗抑挫太宗詔内外臣僚忽欲靣對便御閤門司引見眞宗之時有比為桀紂者輔臣請罪其指斥真宗曰但問事之曲直不須責此仁宗即位已來其臺諫之臣侍從之列嘉謀讜論日夕陳之於前未嘗不温顔訪問故能四十年天下太平夷夏安靖前視徳宗之器一何隘哉東宫范祖禹論王伾王叔文侍東宫薦人隂結黨與曰古之教太子者必選天下之賢使與之共處左右前後皆正人也其後嗣猶或不能成徳而小人之依徳宗不能選賢以輔導東宫而惟使技藝博奕之人入侍豈不愚其子乎夫有十金之産者必欲其子守之有一命之爵者必欲其子繼之此常人之情也而况天下至大祖業至重可不求賢以傅其子而愚之乎詩曰其誰知之蓋亦勿思昔之人君疑賢者導其子之為非而不疑於小人因之不教其子者亦不思而已矣又論帝疾衛次公等定嗣繼曰昔成王將崩命召公畢公率諸侯相康王慿玉几以訓之以元子付之大臣王崩太保仲桓南宫毛俾爰齊侯吕伋以二干戈虎賁百人逆子釗于南門之外當是時太子在内特出而迎之所以顯之於衆也然則古之立君者惟恐衆之不覩事之不顯也何則天子者天下之共主也故當與天下之人戴而君之未有竊取諸宫中而立之出於宦寺婦人之手而可以正天下者也先王於其即位也必以禮正其始於其將殁也亦以禮正其終顧命之書所以為萬世帝王之法也至於後世之君以富有天下為心惟恐失之大利所在天理滅焉故父子相疑以終事為諱以後嗣為忌是以繼承之際鮮有能正其體者也順宗為太子二十餘年既有壯子一旦病不能言而徳宗亦寖疾彌留中外隔絶大臣不得聞知徳宗既崩宦者猶有他議或太子㓜弱儲位未定幾何而不變亂也唐之人主惟太宗每求天下之忠賢而託以㓜孤髙宗以下無足道者徳宗在位嵗乆最為猜忌及其將殁不能召宰相而屬以社稷儲君廢置繫於宦者次公等特以草詔得至禁中遂沮其謀不然幾有趙髙之事後之人主豈可不法三代而以唐為永鑒哉宦官范祖禹論帝杖邵光超中使不敢受賂曰代宗寵宦者而縱之受賂雖為蠧政其害未大也徳宗矯其失而深懲之豈不明哉然其終也舉不信羣臣惟宦者之從至委以禁兵持天下之柄而授之其後人主廢置出於其手則其為害又甚於代宗何其明於知父之失而闇於知己之非乎昔者明王欲改其先君之過者殆不然故夫徳宗即位之初凡深矯代宗之政者愚人以為喜而哲人以為憂蓋出於一時之鋭而無忠信誠慤之心以守之未有不甚之者也又論竇文場典神䇿軍始令宦官分典禁旅曰徳宗為唐室造禍之主此宗社覆亡之本也臣是以著之又論竇霍勢傾中外清要或出其中曰自是宦者始專國矣外則藩鎮内則臺省而多出其門則其易置天子不難矣刑賞國之大柄也其可以假人乎又論宦者議軍事爭論紛然莫能決曰自古宦者豫軍政未有不敗國喪師者而唐為甚後世亦可以鑒矣猶循覆車之軌豈非有疑於將帥而以宦者為可信乎則莫若慎擇將帥委任而勿疑之善也且將帥忠賢則不必監之茍非其人將不顧其父母妻子何有於宦者乎臣見其為害未見其有益也又論宫市彊奪取人物曰詩云惠此京師以綏四國孔子曰近者悦逺者來京師者諸夏根本天子之所與共守者也而徳宗殘之如此然則逺者何所望乎當是時刻剝遍天下而京師甚焉惟其委任宦官是以弊政至於如此其極也又論薛盈珍誣奏姚南仲帝為貶幕僚馬少微曰徳宗信宦者而疑羣臣故不分枉直不辨是非而其心常與宦者如一踈羣臣而外之雖有實言人殺身以明之終不信也至於宦者則妄言必聴之以為言若出諸己也故其為害如木之有蠧人之有膏肓之疾蠧深則木不可攻疾乆則與身為一必俱亡而後已原其禍由人主與之為一故也可為深戒藩鎭范祖禹論陸贄諫李萬榮為節度不從曰自肅宗以來藩鎮之將有殺逐其主帥者因而授之徳宗之世姑息尤甚此教天下以簒也夫以下犯上以臣逐君此為國者所深惡聖主之法必誅而無赦者也不惟不討而又賞之使天下皆無君豈得不偪天子乎禮曰政不正則君位危為國者必嚴上下之等明少長之序使不相陵越者蓋君欲自安也唐之人主壞法亂紀無政刑矣其何以為天下乎又論李說忌李景畧使竇文塲薦守豐州曰徳宗以姑息藩鎮為事然必自選參佐以副之者猶欲出於己也而藩臣得以計去之宦者得以術使之終不由己惟其茍簡多畏無法以自守也夫以一人之慮其可勝左右之欺乎又論李說薨嚴綬以進奉知名為河東司馬曰昔魏獻子為晉國之政其縣大夫皆以賢舉梗陽人欲納貨其臣遽諫而辭之徳宗舉藩鎮之臣乃以貨利雖為天下之主不如列國之大夫也又論于頔有據漢南志帝無如之何曰徳宗初有削平藩鎮之志其明斷似剛其不畏似勇然非實能剛勇也夫剛有血氣之剛有志氣之剛夫勇有匹夫之勇有天下之勇此二者不可不察也始盛而終衰壯鋭而老消此血氣之剛也其静也正其動也健此志氣之剛也血氣之剛可得而挫也志氣之剛不可得而挫也不度其可而為之不慮其後而發之此匹夫之勇也居之以德行之以義此天下之勇也匹夫之勇可得而怯也天下之勇不可得而怯也是故至剛與大勇人君不可不養也徳宗之初欲有為者血氣之剛匹夫之勇也其出之也易則其屈也必深其發之也輕則其挫也必亡是以其終怯畏如此之甚也又論韓全義至長安竇文塲掩其敗迹曰詩曰不侮鰥寡不畏彊禦惟有常徳者能之徳宗急於文吏緩於武夫凡有土地甲兵者皆畏縮而不敢治難乎有常徳哉又論李長榮薨帝遣中使以詔授本軍但軍士所附者即授節度曰藩鎮不順未必人情之所欲也由朝廷御失其道而不能服其心是以致亂三軍之士豈不惡夫上下之相陵犯欲得天子之帥而事之哉廢置爵賞人主之柄也徳宗不有而推以與人失其所以為君矣豈非不能與賢人圖事而至此乎李希烈杜牧論劉冒薛愿曰建中初年李希烈自蔡陷汴驅兵東下將收江淮寜陵守將劉昌以兵三千拒之希烈衆且十倍攻之三月韓晉公三千强弩涉水夜入寜陵弩矢至希烈帳前希烈曰復益吳弩寜陵不可取也解圍歸汴後數月希烈驍將翟耀以鋭兵大敗於淮陽城下希烈且蹙棄汴歸蔡後司徒劉公立佐見昌問曰爾以孤城用一當九凡百日間何以能守昌泣曰以負心能守之耳昌令陴者曰内顧者斬昌孤甥張俊守西隅未嘗内顧捽而斬之軍士有死志故能堅守因伏地流涕司徒劉公亦泣撫昌背曰國家必以富貴爾天寳末淮陽太守薛愿睢陽太守許遠眞源縣令張巡等共守二城其於窮蹙事相差埒睢陽陷賊淮陽能守故巡遠名懸而愿事不傳昌之守寜陵近比之於淮陽故良臣之名不如忠臣孫武曰善用兵者無赫赫之功斯是也杜牧之竇烈女傳曰烈女姓竇氏小字桂娘父良建中初為汴州戸曹掾桂娘美顔色讀書甚有文李希烈破汴州使甲士至良門取桂娘以去將出門顧其父曰慎無戚必能滅賊使大人取富貴於天子桂娘既以才色在希烈側復能巧曲取信凡希烈之宻雖妻子不知者悉皆得聞希烈歸蔡州桂娘謂希烈曰忠而勇一軍莫如陳先竒其妻竇氏先竒寵且信之願得相往來以姊妹叙齒因徐説之使堅先竒之心希烈然之桂娘因以姊事先竒妻嘗間曰為賊兇殘不道遲晚必敗姊宜早圖遺種之地先竒妻然之興元元年四月希烈暴死其子不發喪欲盡誅老將校以卑少者代之計未決有獻含桃者桂娘白希烈子請分遺先竒妻且示無事於外因為蠟帛書曰前日已死殯在後堂欲誅大臣須自為計以朱染帛丸如含桃先竒發丸見之言於薛育育曰兩日希烈稱疾但怪樂曲雜𤼵晝夜不絶此乃有誅未定示暇於外事審矣明日先竒薛育各以所部譟於牙門請見希烈希烈子迫出拜曰願去偽號一如李納時正己死納代為帥先竒曰爾父悖逆天子有命因斬希烈及妻子函其首以獻暴尸於市後兩月吳少誠殺先竒知桂娘謀因亦殺之請試論之希烈負桂娘者但刼之耳希烈僭而桂娘妃復寵信之於女子心始終希烈可也此誠知所就逆順輕重之理明也能得希烈權也姊先竒妻智也終能滅賊不顧其私烈也六尺男子有禄位者當希烈叛與之上下者衆矣豈才力不足邪蓋義理茍至雖一女子可以有成云云李翺楊烈婦傳曰建中四年希烈陷汴州既又將盗陳州分其兵數千人抵項城縣蓋將掠其土用俘纍其男女以㑹於陳州縣令李偘不知所為其妻楊氏曰君縣令也冦至當守力不足死焉職也君如逃則誰守偘曰兵與財皆無將若何楊氏曰如不守縣為賊所得矣倉廩皆其積也府庫皆其財也百姓皆其戰士也國家何有奪賊之財而食其食重賞以合死士其必濟於是召書吏百姓於庭楊氏言曰縣令誠主也雖然嵗滿罷去非若吏人百姓然吏人百姓邑人也墳墓存焉宜相與致死以守其節忍失其貞而為賊之人邪衆皆泣許之乃殉曰以瓦石中賊者與之千金以刀矢兵刃之物中賊者與之萬錢得數百人偘率之以乗城楊氏親為之爨以食之無長少必周而均偘使與賊言曰項城父老義不為賊矣皆悉力守死得吾城不足以威不如亟去徒失利無為也賊皆笑有蜚箭集于偘偘傷而歸楊氏責之曰君不在則人誰肯固矣與其死於城不猶愈於家乎偘遂忍之復登陴項城小邑也無長㦸勁弩髙城深溝之固賊氣吞焉率其徒將從超城而下有以弱弓射者中其帥墮馬其帥希烈之婿也賊失勢遂相與散走項城之人無傷焉朱滔范祖禹論滔救田恱至束鹿士卒不從乃斬二百餘人引兵而南曰民皆有常性饑食渇飲以養其父母妻子而終其天年此人情之所欲也豈樂為叛而沈其族哉然自古治少而亂多由上失其道而民不知所從故姦雄得以詭其衆而用之也天寳以後幽薊為反逆之區天子視之無異敵國然朱滔刼其民如此不得已而後從之亦足見其本非好亂也君人者可以省己而修政矣詩序曰小雅盡廢則四夷交侵先王不以罪四夷而以咎中國反求諸己自修而已矣人君茍行仁政使民親其長愛其上驅之為亂莫肯從也姦雄豈得而詐之哉朱泚涇原范祖禹論泚僭號樊系譔冊文旣成仰藥曰司馬遷有言曰知死必勇非死者難也處死者難使樊系能拒朱泚不作冊文而死豈不為忠臣乎而文成乃死是亦為逆而已矣惜哉其為忠與逆在於作與不作而已系之不敢拒泚不過畏死而怯耳而卒不免於死其愚豈不甚哉能死而不能拒泚此特臧獲婢妾之引決者耳非能勇也士有不幸而身處危亂者其亦視此以為戒哉又論朱泚引兵逼興元曰徳宗以饑羸之卒守一縣之地而當朱泚十萬之師備禦俱竭危不容喘所恃者人心未去也卒能克復宗社不失舊物而况以天下之大億兆之衆守之以道徳用之以仁義其誰能敵之故人君茍得民心則不在地之廣狭兵之衆寡王天下猶反掌也湯以七十里文王以百里豈不信哉又論涇原兵救襄城至滻水以宴犒薄作亂還趨京城曰昔秦逐匈奴戌五嶺而陳勝起大澤隋伐突厥征髙麗而楊元感亂黎陽自古攻戰不已傾國以外向者必召内患民疲而本揺故也襄城之危徳宗以為至憂故竭天下之力以救之而不知大盗之覆都邑譬之欲除瘍疥而疾潰於腹心欲救四支而禍發於頭目兵革既起天下之變其可勝慮乎又論涇原兵叛召禁兵無一人至者上自出幸興元曰周公作立政以戒成王自左右常伯至于綴衣虎賁皆選忠良而勿以憸人是時齊侯吕伋掌天子之兵故康王之立太保命仲桓南宫毛取二干戈虎賁百人以逆之周家以為天子心膂爪牙者太公之子也其發之也以宰相之命二諸侯往焉慎重如此王室其可亂乎晉悼公使弁糾御戎荀賔為右使訓諸御知義羣騶知禮故可用也至漢之時宿衛者猶以忠力之臣與公卿之子蓋古之遺法也夫以天子之尊必使諸侯與天下之賢者共扞衞之訓其徒旅使知禮義不如是不足以為固也後世茍簡人君多疑寜與小人而不與君子徳宗之世所任尤非其人至於變起京邑而無一卒之衛其後懲前之失委之宦者而其禍愈深夫聚天下不義之人使執利器而環天子之居不以付之忠賢臣是以知後世人主之不尊國家之無法也張唐英論王翃召朱泚之亂曰徳宗建中四年詔涇原節度姚令言率兵五萬討希烈京兆尹王翃犒軍唯以糲食菜饌軍士皆怒曰吾輩棄父母妻子將為國家死於患難不能得一頓飽食國家瓊林大盈府庫寳貨堆積不取之如何為活遂倒戈入京師徳宗惶恐幸興元世之議者但以朱泚之叛而不知召泚者翃也且朝廷大臣及后妃權勢之家將相臺閣之臣其皁𨽻臧獲非有毛髪之功彼皆厭膏粱而曵紈綺彼三軍之士暑不得就清涼之䕃寒不得附暖燠之所荷戈被甲出入行陣當無事之際亦須以恩信而責以功效况當擾攘之際故宜先以重賞以死其心又以重罰以盡其力而翃惜一飯之費流四海之禍卒使狂蕩竊發汙辱廟社瀆亂神器腥穢天地禍害生靈非翃召之而孰召之耶昔弦髙犒師而鄭國除患魯人酒薄而邯鄲致圍翃以繭栗之質不知國家致逺之道而惜毫毛之利豈能知此哉厯代名賢確論卷八十三
