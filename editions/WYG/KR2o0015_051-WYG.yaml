body:
  text: 歴代名賢確論卷五十一兩漢通論興亡人材劉禹錫權徳輿子由東坡少㳺歴代委任人臣子由荆公張禹江充梁冀王莽之流樂天興亡人材劉禹錫山陽城賦曰山陽故城遺趾數雉四百之運終於此墟裔孫作賦盖閔漢也詞曰我止行車霣涕于山陽之墟是何蒼莽與慘悴舂陵之氣兮焉如踣昌運於四百辭至尊而伍匹夫有利器而倒持兮曽何芒刃之足舒懿王迹之肇基暨坤維之再敷邈氾陽與鄗上恍蛇變而龍攄痛人亡而事替終此地焉忽諸嗟乎積是為治積非成虐文景之欲處身以約播其德芽迄武乃穫桓靈之欲從心於昏爇其妖焰逮獻而焚彼伊周不世兮奸雄乗釁而騰振物象漼以易位被虚號而陽尊終世殫而事去胡竊揖讓以為文嗚呼維神器之至重兮盖如山之不騫使人得譬乎逐鹿固徤歩者所先諒人事之云爾孰云當塗之兆也自夭亂日久矣莫可追升彼墟兮噫嘻獨遺武兮貽後王之元龜子由論兩漢之患曰天下之患無常處也惟見天下之患而去之就其所安而從之則可久而無憂有賤丈夫見其生於東也而盡力於東以亡其西見其起於外也而銳意於外以忘其中是以禍生於無常而變起於不測莫能救也昔者西漢之禍當文景之世天下莫不以為必起諸侯之太强也然則武帝之時七國之餘日以漸衰天下坦然四顧以為無虞而陵夷至於元成之間朝廷之强臣實制其命而漢以不祀世祖顯宗既平天下以為世世所患莫不在乎朝廷之强臣矣而東漢之亡其禍乃起於宦官由此觀之則天下之患安在其防之哉人之將死也或病於太勞或病於飲酒天下之人見其死於此也而曰必無勞力與飲酒則是不亦拘而害事哉其死也必有以啓之是以勞力而能為災飲酒而能為病而天下之人豈必皆死於此東坡論兩漢之衰曰西漢之衰其大臣守尋常而不務大畧東漢之末士大夫多竒節而不循正道元成之間天下無事公卿將相安其祿位顧其子孫各欲樹私恩買田宅為不可動之計低回畏避以茍嵗月而皆依倣儒術六經之言而取其近似者以為口實孔子曰惡居下流而訕上惡訐以為直而劉歆谷永之徒又相與彌縫其闕而縁飾之故其衰也靡然如蛟龍釋其風雲之勞而安豢畜之樂終以不悟使其肩披股裂登於匹夫之爼豈不悲哉其後桓靈之君懲往昔之弊而欲樹人主之威權故頗用嚴刑以督責臣下忠臣義士不容於朝廷故羣起於草野相與力為險怪驚世之行使天下豪傑奔走於其門得為之執鞭而其自喜不啻若公卿之榮於是天下之士囂然皆有無用之虚名而不通於實効故其亡也如人之病狂不知堂宇宮室之為安號呼奔走以自顛仆昔者太公治齊舉賢而尚功周公曰後世必有簒弑之臣周公治魯親親而尊尊太公曰後世寖㣲矣漢之事迹誠大類此豈其當時公卿士大夫之行與其風俗之剛柔各有以致之邪古之君子剛毅正直而守之以寛忠恕仁厚而發之以義故其在朝廷則士大夫皆自洗濯磨淬戮力於王事不敢為非常可怪之行此三代王政之所由興也曽子曰上失其道民散久矣天下之人幸而有不為阿附茍容之事者則務為倜儻矯異求如東漢之君子惟恐不及可悲也已又論兩漢之亡於王莽曹操曰古之聖人制為君臣之分天子以其一身立乎天下之上安受天下之奉已而不辭天下之人竒才壯士爭出其力以自盡於天子之下而無所逃遁此二者何為如此也天下之事固其賢者為之也仁人君子盡其心以制天下之事而無所不成武夫猛士竭其力以剪天下之􅍊亂而無所不定此其類非不智且勇也然而不得其君則其心常鰓鰓然曠四海而不能以自安功成事立缺然反顧而莫之能受是以天下之賢才其才雖足以取之而常喜天下之有賢君者利其有以受之也盖古之人君收天下之英雄而不失其心故天下皆爭歸之而英雄之士因其君之資以用力於天下功成求得而不敢為背叛之操故上下相守而可以至於無窮惟其君臣相戾而不能以相用君以為無事乎其臣臣以為無事乎其君君無所用以至於天下之不親臣無以用之以至於惸惸而無所底麗而天下始大亂矣且彼不知夫天下之意也天下之人皆人臣也而誰能以相從惟其因天子之權而用之是以雖其比肩之人而莫敢抗彼見天下之莫吾抗也則以為天下之畏我而不知己之戴君之威而行也故或狃天下之畏已而反以求去其君其君既去而天下之人孰畏而不為變哉昔者西漢之衰王莽竊取其人君之權而執之以求取其天下方其執之而未取也天下不知其將取之是以俛首而奉其所為何者天下之心猶以為漢役之也至於天下在莽而其英雄之士遂起而共攻之不數年而莽以大敗何者天下不服無漢之王莽也其後東漢之亂獻帝奔走於草莽之中曹操出之以為帝王當是之時則天下已無漢矣而唯曹氏之為聽然天下之英雄猶以為名皆起而爭之終曹公之身而不能以自安猶幸其當時之人皆知漢之天下已去而操取之也是以心服曹氏而安為之臣故孔子曰天下有道禮樂征伐自天子出天下無道禮樂征伐自諸侯出自諸侯出盖十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣盖天下之情居下而干其上之政者以為己之享其利也而不知天下之爭心皆將囂然而不平是以其素所服者愈狹則其失之也愈速何則其不平者衆故曰祿之去公室五世矣政在大夫四世矣而三桓之子孫㣲矣嗚呼公室既㣲則三桓之子孫天下之所謂宜盛者也而終以衰弱而不振則夫君臣之分可知也矣少游論兩漢之臣曰取天下者必有功臣守天下者必有名臣雖然有國家者寧無功臣不可以無名臣何則功臣以乗逐利便為能名臣以伏節死義為任也昔西漢之末海内承平四夷賔服而王莽竊持國柄談笑而輒移之東漢之季姦雄崛起中原大亂而曹公睥睨神器終身而不敢取愚嘗疑焉及讀李固傳見固與杜喬之誅門生子弟貫械要鐵鎻願俱死者相屬然後始知其所以然也何則西漢多功臣也盖西漢自髙祖以馬上得天下不恱諸生其取人也先器識所以朝多功臣則乗便逐利者衆形不便勢不利彼不為也晚節末路王鳳用事王章以直言被誅而天下靡然以茍患失之為風矣其大臣如張禹孔光軰皆持祿取容偷為一切之計其清節之士如龔勝郭欽蔣詡之徒亦不過謝病免歸而已其風如此亂臣賊子奈何而有懼哉此王氏所以談笑而移之也東漢自光武不任功臣銳意文士其取人也先經術所以朝多名臣則伏節死義者衆節之所在義之所存彼必為也故晚節末路梁冀擅命固與杜喬以死抗之而天下靡然以殺身成仁為俗矣其大臣如陳蕃黄琬輩皆捐軀覆族以急國家之難黨錮之士如李膺杜宻范滂之徒至連頸就誅而無愠色其俗如此亂臣賊子奈何而不懼哉此曹公之所以終身而不敢取也然西漢易亡而復興東漢難亡而易絶者何也孟子曰三代之得天下也以仁其失天下也以不仁故歴代之君其始也雖勢强大非有仁心則不興及其季也雖徳失政亂非有不仁之罪則不絶哀成之君失徳甚矣然其事止於女寵佞倖而已未犯不仁之罪也故國亡而復興桓靈之時無道極矣鈎黨之獄忠臣義士死者百有餘人諸所夷滅至於不可勝數則是不仁之罪已貫盈矣故國亡而遂絶此亦理之必至事之固然不足怪也嗚呼國者天下之大器也君臣者相與持此器也視器之安危則知人之能否視國之理亂則知君臣之賢不肖以二漢論之報施之道其不殊也如此然則為君臣者可不戒哉權徳輿兩漢辨亡論曰言兩漢所以亡者皆曰莽卓予以為莽卓簒逆汙神器以亂齊人自賈夷滅天下耳目顯然聞知靜證厥初則亡西京者張禹亡東京者胡廣皆以假道儒術得伸其邪心徼一時大名致位公輔詞氣所𤼵損益係之而多方善柔保位持祿或䧟時君以滋厲階或附兇沴以結禍胎故其蕩覆之機簒奪之兆皆指𨗳馴致之雖年祀相逺猶手受頥指之然也其為賊害豈直莽卓之比乎禹以儒術為帝師身被漢相特見尊信當王臣之重極儒者之貴永始元延之間天地之眚屢見言事者皆譏切王氏専政時成帝亦悔懼天變而未有以決駕至禹第辟左右以問之湏其一言以為律度為禹計者亦宜陳大易堅冰之誡誦小雅十月之刺乗其嚮納痛言得失反以罕言命不語怪為詞致成帝不疑之心授王氏寖盛之勢上下恬然奄忽亡國儻帝慮不至是猶當開陳切劘靣别廷辨矧當就第宴間之際虚懐咨決之時方且眩小男於牀下官子婿於近郡欵欵然用家人匹婦為心以身圖安不恤國患致使羣盗弄權迭執魁柄禍稔毒流至於新都不可遏也斯可憤也逮至東都順桓之間國統三絶胡廣以巨儒柄用位極上台初梁冀席外戚之重貪戾當國既鴆質帝議立嗣君公卿大臣皆以清河王蒜年長有徳属最尊親可以靖人亦既定䇿冀乃憚其明哲且不利長君私於蠡吾獨異羣議為廣計者亦當中立如石介然不回率趙誡之徒同李杜所守然後與三事百工正詞於朝雖冀之􅍊恣豈能一旦盡誅漢廷羣公邪反徇一息之安首䑕畏懦竟使清河徙廢蠡吾為梗邦家陵夷漢道日蹙結黨錮之獄成閹寺之禍禍亂循環以至董卓赫赫漢室化為當塗盖棟撓鼎折之所由来久矣彼梅福以孤逺上疏張綱以卑秩埋輪獨何人哉而不是思也噫嘻就利違害榮通醜竆大凡有生之常性也暨乎手持政柄體國存亡則謹之於初決之於始以𨗳善氣以遏亂源若禍胎既萌則死而後已白刃可蹈鴻毛斯輕奈何禹廣以宴安之時則務小忠立細行數數然獻吉筮於露蓍沮立后於探籌及夫安危之際邦家之大則甘心結舌隂拱觀變豈止然也方又熾熖熖以燎原決湯湯以襄陵投天下於煙煨擠萬人於昬墊百代之下無所指名雖史賛粗言而不究論本末且出不越境書弑君之惡言偽而辯有兩觀之誅若當春秋之時明禹廣之罪作誡来世可勝紀乎向若西京抑損王氏尊君卑臣則庶乎無哀平之壞東京登庸清河王主眀臣忠則庶乎無靈獻之亂大漢之祚未易知也或以國之興亡皆有隂隲之數非人謀能亢則但取瞽聾者而相之立土木偶而尊之被以章組列於廊廟斯可矣何堯舜之或咨或吁商周之或夢或卜憂勤日昃之若是然後為理邪歷代委任人臣子由曰髙帝舉天下後世之重属之大臣大臣亦盡力以報之故呂氏之亂平勃得致力焉誅産祿立文帝若反覆手之易當是時大臣權任之盛風流相接至申屠嘉猶召辱鄧通議斬鼂錯而文景不以為忤則髙帝之用人其重如此景帝之後此風衰矣大臣用舎僅如僕𨽻武帝之老也將立少主知非大臣不可乃委任霍光光之權在諸臣右故能翊昭建宣天下莫敢異議至於宣帝雖眀察有餘而性本忌刻非張安世之謹畏陳萬年之順從鮮有能容者惡楊惲盖寛饒害趙廣漢韓延夀悍然無惻怛意髙才之士側足而履其朝陵遲至於元成朝無重臣養成王氏之禍故莽以斗筲之才濟其欺罔而士無一人敢指其非者光武之興雖文武之畧足以鼔舞一世而不知用人之長以濟其所不足幸而子孫皆賢權在人主故其害不見及和帝㓜小竇后擅朝竇憲兄弟恣横殺都鄉侯暢於朝事發請擊匈奴以自贖及其成功又欲立北單于以樹恩固位袁安任隗皆以三公守義力爭而不能勝而憲以逆謀敗盖光武不任大臣之積其弊乃見於此其後漢日以衰其誅閻顯立順帝功出於宦官黜清河王殺李固事成於外戚大臣皆無所與及其末流梁冀之害重天下不能容復假宦官以去之宦官之患極天下不能堪至召外兵以除之外兵既入而東漢之祚盡矣盖光武不任大臣之禍勢極於此夫人君不能皆賢若有不能而属之大臣朝廷之正也事出於正則其成多其敗少歴觀古今任事而禍至於不測者必有故也今畏忌大臣而使他人得乗其隙不在外戚必在宦官外戚宦官更相屠滅至以外兵繼之於乎殆哉王荆公委任論曰人主以委任為難人臣以塞責為重任之重而責之重可也任之輕而責之重不可也愚無他識請以漢之事眀之髙祖之任人也可以任則任可以止則止至於一人之身才有長短取其長則不問其短情有忠偽信其忠則不疑其偽其意曰我以其人長於某事而任之在他事雖為短何害焉我以其人忠於我心而任之在他人雖偽何害焉故蕭何刀筆之吏也委之闗中無復西顧之憂陳平亡命之虜也出捐四萬斤金不問出入韓信輕猾之徒也與之百萬之衆而不疑是三子者豈素著忠名哉盖髙祖推已之心而寘於其心則他人不能離間而事以濟矣後世循髙祖則鮮有敗事不循則失故孝文雖愛鄧通猶逞申屠之志孝武不疑金霍終定天下大䇿當是時守文之盛者二君而已元成之後則不然雖有何武王嘉師丹之賢而脅於外戚䜿宦之寵牽於帷嬙近習之制是以王道寖㣲而不免負謗於天下也中興之後唯世祖能馭大臣以寇鄧耿賈之徒為任職所以威名不減於髙祖至於為子孫慮則不然反以元成之後三公之任多脅於外戚䜿宦帷嬙近習之人而致敗由是置三公之任而事歸臺閣以虚尊加之而已然而臺閣之臣位卑事冗無所統一而奪於衆多之口此其為脅於外戚䜿宦帷嬙近習者愈矣至於治有不進水旱不時災異或起則曰三公不能燮理隂陽而䇿免之甚者至於誅死豈不痛哉冲質之後桓靈之間因循以為故事雖有李固陳蕃之賢皆挫於閹寺之手其餘則希世用事全軀而已何政治之能立哉此所謂任輕責重之弊也噫常人之性有能有不能有忠有不忠知其能則任之重可也謂之忠則委之誠可也委之誠者人亦輸其誠任之重者人亦荷其重使上下之誠相照恩結於其心是豈禽息鳥視而不知荷恩盡力哉故曰不疑於物物亦誠焉且蘇秦不信天下為燕尾生此一蘇秦傾側數國之間於燕獨不然者誠燕君厚之之謂也故人主以狗彘畜人者人亦狗彘其行以國士待人者人亦國士自奮故曰常人之性有能有不能有忠有不忠顧人君待之意何如耳子由論髙祖光武眀帝曰人主之徳在於知人其病在於多才知人而善用之若已有焉雖至於堯舜可也多才而自用雖有賢者無所復施則亦僅自立耳漢髙帝謀事不如張良用兵不如韓信治國不如蕭何知此三人而用之不疑西破强秦東服項羽曽莫與抗者及天下既平政事一出於何法令講若畫一民安其生天下遂以無事又繼之以曹參終之以平勃至文景之際天下晏然凡此皆髙帝知人之餘功也東漢光武才畧文武破尋邑取趙魏鞭笞羣盗算無遺䇿計其武功宜若優於髙帝然使當髙帝之世與項羽為敵必有不能辦者及其履大位懲王莽簒奪之禍雖置三公而不付以事専任尚書以督文書繩姦詐為賢政事察察下不能欺一時稱治然而異己者斥非䜟者棄以一身任天下其知之所不見力之所不舉者多矣至於眀帝好察愈甚故東漢之治寛厚樂易之風逺不及西漢賢士大夫立於其朝志不獲伸雖號稱治安其父子才志之所止君子不尚也張禹江充梁冀王莽之流白樂天有木詩八首序曰余讀漢書列傳見佞順媕娿圖身忘國如張禹輩者見惑上蠱下交亂君親如江充輩者見㬥很跋扈壅君樹黨如梁冀輩者見色仁行違先徳後賊如王莽輩者又見外狀恢洪中無實用者又見附離權勢隨之覆亡者其初皆有動人之才足以惑衆媚主莫不合於始而敗於終也云云歴代名賢確論卷五十一
