body:
  text: 歴代名賢確論卷二十二闔廬孫武老泉樊川六一東坡夫差伍子胥栁州李白盧元輔荆公潁濱勾踐事吳東坡種蠡潁濱昌黎東坡子胥種蠡東坡通論國之興亡潁濵孫武老泉曰求之而不窮者天下之奇才也天下之士與之言兵而曰我不能者幾人求之於言而不窮者幾人言不窮矣求之於用而不窮者幾人嗚呼至於用而不窮者臣未之見也孫武十三篇兵家舉以為師然以臣評之其言兵之雄乎今其書論奇權密機出入神鬼自古以兵著書者罕所及以是而揣其為人必謂有應敵無窮之才不知武用兵乃不能必克與書所言逺甚矣吳王闔廬之入郢也武為將軍及秦楚交敗其兵越王入踐其國外禍内患一旦迭發吳王奔走自救不暇武殊無一謀以弭斯亂若按武之書以責武之失凡有三焉九地曰威加於敵家則交不得合而武使秦得聽包胥之言出兵救楚無忌吳之心斯不威之甚其失一也作戰曰久暴師以鈍兵挫銳屈力殫貨則諸侯乘其弊而起且武以九年冬伐楚至十年秋始還可謂久暴矣越人能無乘間入國乎其失二也又曰殺敵者怒也今武縱子胥伯嚭鞭平王屍復一夫之私忿以激怒敵此司馬成子期所以必死讎吳也勾踐不頽舊塜而吳服田單譎燕掘墓而齊奮智謀與武逺矣武不達此其失三也然始吳能以入郢乃因胥嚭唐蔡之怒及乘楚瓦之不仁武之功蓋亦鮮矣夫以武自為書尚不能自用以取敗北況區區祖其故智餘論者而能將乎且吳起與武一體之人也皆著書言兵世稱之曰孫吳然而吳起之言兵也輕法制草略無所統紀不若武之書詞約而意盡天下之兵說皆歸其中然吳起始用兵於魯破齊及入魏又能制秦兵入楚楚復霸而武之所為反如是書之不足信也固矣今夫外御一𨽻内治一妾是賤丈夫亦能夫豈必有人而教之及夫御三軍之衆闔營而自固或且有亂然則是三軍之衆惑之也故善將者視三軍之衆與覩一𨽻一妾無加焉故其心常若有餘夫以一人之心當三軍之衆而其中恢恢然猶有餘地此韓信之所以多多而益辦也故夫用兵豈有異術哉能勿視其衆而已矣樊川序註孫子曰自古以兵著書列於後世可以教於後生者凡十數家且數萬言其孫武所著十三篇自武死後凡千歲將兵者有成者有敗者勘其事迹皆與武所著書一一相抵當猶印圈模刻一不差跌武之所論大約用仁義使機權也武所著書凡十數萬言曹魏武帝削其繁剩筆其精切凡十三篇成為一編曹自為序因註解之曰吾讀兵書戰策多矣孫武深矣然其所為註解十不釋一此書葢非曹不能盡註解也予尋魏志見曹自作兵書十餘萬言諸將征伐皆以新書從事從令者剋捷違教者負敗意曹自於新書中馳驟其說自成一家事業不欲隨孫武後盡解其書不然者曹豈不能耶今新書已亡不可復知予因取孫武書備其註曹之所註亦盡存之分為上中下三卷後之人有讀武書予解者因而學之猶盤中走丸丸之走盤横斜圓直計於臨時不可盡知其必可知者是知丸不能出於盤也議於廊廟之上兵形已成然後付之於將漢祖言指蹤者人也獲兔者犬也此其是也彼為相者曰兵非吾事吾不當知君子曰勿居其位可也六一曰世所傳孫武十三篇多用曹公杜牧陳皥註號三家孫子余頃與撰四庫書目所見孫子註者尤多至二十餘家武之書本於兵兵之術非一而以不窮為竒宜其說者之多也凡人之用智有短長其施設各異故或膠其說於偏見然無出所謂三家者三家之註皥最後其說時時攻牧之短牧亦慨然最喜論兵欲試而不得者其學能道春秋戰國時事甚博而詳然前世言善用兵者稱曹公曹公嘗與董呂諸袁角其力而勝之遂與吳蜀分漢而王傳言魏之諸將出兵千里公每坐計勝敗授其成算諸將用之十不失二有違者兵輒敗北故魏世用兵悉以新書從事其精於兵也如此牧謂曹公於註孫子尤畧葢借其所得自為一書是曹公悉得武之術也然武嘗以其書干吳王闔閭闔閭用之西破楚北服齊晉而霸諸侯夫使武自用其書止於强霸及曹公用之然亦終不能滅吳蜀豈武之術盡於此乎抑用之不極其能也後之學者徒見其書又各牽於已見是以註者雖多而少當也獨吾友聖俞不然常評武之書曰此戰國相傾之說也三代王者之師司馬九伐之法武不及也然亦愛其文略而意深其行師用兵料敵制勝亦皆有法其言甚有次序而註者汩之或失其意乃自為註凡膠於偏見者皆抉去傅以已意而發之然後武之說不汩而明吾知此書當與三家並傳而後世取其說者獨於吾聖俞多焉聖俞為人謹質温恭仁厚而明衣冠進趨眇然儒者也後世之視其書者與太史公疑張子房為壯夫何異東坡曰古之言兵者無出於孫子矣利害之相權奇正之相生戰守攻圍之法葢以百數雖欲加之而不知所以加之矣然其所短者智有餘而未知其所以用智此豈非其所大闕歟夫兵無常形而逆為之形勝無常處而多為之地是以其說屢變而不同縱横委曲期於避害而就利雜然舉之而聽用者之自擇也是故不難於用而難於擇擇之為難者何也銳於西而忘於東見其利而不見其所窮得其一說而不知其又有一說也此豈非用智之難歟夫智本非所以教人以智而教人者是君子之急於有功也變詐汩其外而無守於其中則是五尺童子皆欲為之使人勇而不自知貪而不顧以陷於難則有之矣深山大澤有天地之寶無意於寶者得之操舟於河舟之逆順與水之曲折忘於水者見之是故惟天下之至廉為能貪惟天下之至静為能勇惟天下之至信為能詐何者不役於利也夫不役於利則其見之也明見之也明則其發之也果古之善用兵者見其害而後見其利見其敗而後見其成其心閒而無事是以若此明也不然兵未交而先志於得則將臨事而惑雖有大利尚安得而見之若夫聖人則不然居天下於貪而自居於廉故天下之貪者皆可得而用居天下於勇而自居於静故天下之勇者皆可得而役居天下於詐而自居於信故天下之詐者皆可得而使天下之人欲有功於此而即以此自居則功不可得而成是故君子居晦以御明則明者畢見居隂以御陽則陽者畢赴夫然後孫子之智可得而用也易曰介于石不終日貞吉君子方其未發也介然如石之堅若將終身焉者及其發也不終日而作故曰不役於利則其見之也明見之也明則其發之也果今夫世俗之論則不然曰兵者詭道也非貪無以取非勇無以得非詐無以成廉静而信者無用於兵者也嗟夫世俗之說行則天下紛紛乎如鳥獸之相搏嬰兒之相撃强者傷弱者廢而天下之亂何從而已乎伍子胥溧陽義女附栁州論子胥仗劍而死曰伍子胥者非吳之昵親也其始交闔閭以道故由其謀今於嗣君已不合言見進則讒者勝國無可救者於是焉去之可也出則以孥累於人而又入以致死是固非吾之所知也然則員者果狠人也歟盧元輔胥山銘曰有周行人伍子胥陪吳之職得死直言吳人求忠者之屍禱水星之舍將瞰鴟革遂臨浙江千五百年廟貌不改漢史遷曰胥山今云青山者繆也吁善父為孝記曰父讐不與共戴天諫君為忠經曰諸侯有諍臣不失國當抗于宋鄭絶楚出疆在平為未宦臣在奢為既壯子坎􅇄仗節乞師於吳軍鼓丁寜五戰至郢先喆王建邦啟土著以話言戴后惟人人虐惟后成湯用為大義孔子立為大經子胥修為大仇騷人賦為大怨咸令在上慢惡不生則前戈鞭墓非倒行也後戈走昭非逆施也夫差既王宰嚭受賂二十年内越恁又顛太伯廟血將乾闔閭劍光且失公朝焉宴焉入則諫焉孰謂矢毒孰謂刀寒雖言屢出口而車甲巳困於齊矣蟹稻已奪於歲矣屬鏤之賜竟及其身荆公曰子胥出死亡逋竄之中以客寄之一身卒以說吳折不測之楚仇執恥雪名震天下豈不壯哉及其危疑之際能自慷慨不顧為死畢諫於所事此其志與夫自恕以偷一時之利者異也孔子論古之士大夫若管夷吾臧武仲之屬茍志於善而有補於當世者咸不廢也然則子胥之義人曷可少耶潁濱曰伍員以父兄之怨破楚入郢鞭平王之墓世皆憐其志多其才然士不幸至此不足以言功名矣而員至鞭舊君以逞逆天而傷義卒以盡忠而喪其軀豈非天哉李白曰貞義女溧陽黄山里史氏之女以家溧陽史闕書之歲三十弗移天于人清英潔白事母純孝手柔荑而不龜身擊漂以自業當楚平王時平王虐忠助讒苛虐厥政芟於尚斬於奢血流于朝赤族伍氏怨毒於人何其深哉子胥始東奔勾吳月涉星遁或七日不火傷弓于飛逼迫於昭闗匍匐於瀨渚捨車而徒告窮此女目色以臆授之壺漿全人自沉形與口滅卓絶千古聲淩浮雲激節必報之仇雪誠無疑之地難乎哉借如曹娥潛波理貫於孝道聶姊殞肆槩動於天倫魯姑棄子以卻三軍之衆漂母進飯没受千金之恩方之於此彼或易爾卒使伍君開張闔閭傾蕩鄢郢吳師鞭屍於楚國申胥泣血於秦庭我亡爾存亦各壯志張英風於古今雪大憤於天地㣲此女之力雖云為忠孝之士焉能咆哮烜赫施於後世耶過其溺所愴然低徊而不能去事吳東坡曰讀吳越世家觀勾踐困於㑹稽之上而行成於吳凡金玉子女所以為賂者不可勝計既反國而吳之百役無不從者使大夫女女於大夫士女女於士春秋貢獻不絶於吳府嘗竊怪其以蠻夷之國承敗亡之後救死扶傷之餘而賂遺費耗又不可勝計如此然卒以滅吳則為國之患果不在費也彼其内外不相擾是以能有所立使范蠡大夫種二人分國而制之范蠡曰四封之外種不如蠡使蠡主之凡四封之外所以待吳者種不知也四封之内蠡不如種使種主之凡四封之内所以强國富民者蠡不知也二人者各專其能各致其力是以不勞而滅吳其所以賂遺於吳者甚厚而有節也是以材不匱其所以聽役於吳者甚勞而有時也是以本不揺然後勾踐得以安意肆志焉而吳國固在其股掌中矣種蠡昌黎曰范蠡既辭越到齊廼移書文種亦令云去以逃其長頸之難遂使種假疾不朝竟承賜劍之詔悲夫為人謀而不忠者范蠡其近之矣夫君存與存君亡與亡備三才之道未有不顯然而自知矣勾踐奮鳥棲之勢申鼠竄之息竟能焚姑蘇虜夫差方行淮泗之上以受東諸侯之朝范蠡文種有其力也既有其力則宜閉雷霆藏風雲截斷三江叱開四方髙提霸王之器大𢎞夏禹之烈使天下徘徊知越有人矣奈何反未及國則背君而去既行之於身又移之於人人臣之節合如是耶且臣之於君其道在於全大義𢎞休烈生死之際又何足道哉況君者天也天可逃乎君以長頸之狀難以同樂則舉吳之後還越之日汎輕舟游五湖者豈惟范子乎静而言之則知范子有匡君之智而無事君之義明矣其所以移文種之書亦由扳勾踐之劍也句踐何過哉予所謂為人謀而不忠者其在於此也東坡曰越既滅吳范蠡以謂勾踐為人長頸鳥喙可與共患難不可與同安樂乃與其徒屬浮海而行以書遺大夫種曰蜚鳥盡良弓藏狡免死走狗烹子可以去矣蘇子曰范蠡獨知相其君而已以吾相蠡蠡亦鳥喙也夫好貨天下之賤士也以蠡之賢豈聚歛積貨者何至耕於海濱父子力作以營千金屢散而復積此何為者哉豈非才有餘而道不足故功成名遂身退而心終不能自放者乎使勾踐有大度能終始用蠡蠡亦非清静無為以老於越者也吾故曰蠡亦鳥喙也魯仲連既退秦軍平原君欲封連千金為夀笑曰所貴於天下士者為人排難解紛而無所取也即有取者是商賈之士連不忍為也遂去終身不復見逃隠於海上曰吾與富貴而屈於人寧貧賤而輕世肆志焉使范蠡之去如魯連則去聖人不逺矣嗚呼春秋以來用舍進退未有如蠡之全者也而不足於此吾是以累歎而深悲焉潁濱曰天下未嘗無智者也而難於擇君田豐陳宫其智皆足以制曹公而豐事袁紹宫事吕布不用其言而君臣皆亡此固無足言者如陸遜之於孫權高熲之於隋文言聽計從致君於王伯矣而忮心一起二臣不得其死可不哀哉范蠡知勾踐可與共患難則為之滅吳以致其功知其不可與同安樂則棄之浮江湖如去仇讐是以君臣免於惡名可不謂賢哉子胥種蠡東坡曰子胥種蠡皆人傑而揚雄曲士也欲以區區之學瑕疵此三人者以三諌不聽鞭尸藉館為子胥之罪以不强諫勾踐而棲之㑹稽為種蠡之過雄聞古有三諫當去之說即欲以律天下士豈不陋哉三諫而去為人臣交淺者言也如宫之奇洩冶乃可爾至如子胥吳之宗臣與國存亡者也去將安往哉百諫不聽繼之以死可也孔子去魯未嘗一諫又安用三父受誅子復讐禮也生則斬首死則鞭屍發其至痛無所擇也是以昔之君子皆哀而恕之雄獨非人子乎至於藉館闔廬與羣臣之罪非子胥意也勾踐困於㑹稽乃能用二子若先戰而强諫以死之則雄又當以子胥之罪罪之矣此皆兒童之見無足論者不忍三子之見誣故為一言國之興亡潁濱曰吳以蠻夷争盟中國陵滅齊晉結怨楚越再世而亡何者地逺而民勞勢不順也越王勾踐既克夫差雖號伯王而實斂兵自守無大征伐分吳故土以畀楚宋魯遂以保國傳世彼親見其害知所以自監矣哉至無疆無闔閭之知而有夫差之愚其殘國宜矣昔楚王克陳宋鄭力能取之而不有諸侯安之而楚遂以興靈王大城陳蔡不羹經營中夏貪而不止則身受其咎蓋東南之常勢於是可見矣自東晉以至於陳皆國於吳越之墟成敗之迹無不然者雖桓温劉裕善用兵或能一勝而民以敗弊訖於無成至殷浩庾亮蓋不足數也如謝安之賢猶勉强北征失䇿而死亦眩於其名而未安其實故耶嗟夫謀國如蔡謨吾有取焉歴代名賢確論卷二十二
