body:
  text: 歴代名賢確論卷二十六孔門弟子弟子仕不仕潁濱范文正公顏淵荆公潁濱東坡昌黎子夏潁濱仲由冉求公西華曾晳言志潁濱曾參不列四科李觀樂天鄭獬樊遲學稼圃潁濱宰予從田常作亂潁濱東坡孔門學道教人潁濱弟子仕不仕潁濱曰惟夫子生於亂世周流齊魯宋衛之間無所不仕其弟子之髙第亦咸仕諸國宰我仕齊子貢冉有子游仕魯季路仕衛子夏仕魏弟子之仕者亦衆矣然其稱德行者四人獨仲弓嘗為季氏宰其上之三人皆未嘗仕季氏欲以閔子為費宰閔子辭曰如有復我者則吾必在汶上矣且以夫子之賢猶不以仕為汙也而三子之不仕獨何歟言未卒有應者曰子獨不見夫適東海者乎望之茫洋不知其邊即之汗瀾不知其深其舟若蔽天之山其色若浮空之雲然後履風濤而不僨觸蛟蜃而不懾若夫以江河之舟楫而跨東海之難則亦十里而返百里而溺不足以經萬里之害矣周之衰禮樂崩弛天下大壞而欲有救之譬若涉海有甚焉者今夫子之不顧而仕則其舟楫足恃也諸子之汲汲而忘返蓋亦有漏舟而將試焉則亦隨其力之所及而已若夫三子者願為夫子而未能下顧諸子以為不足為也是以止而有待夫子嘗曰世之學栁下惠者未有若魯之男子而吾於三子亦云衆曰然退而書之范文正公曰孔子門人七十子之徒天下皆知其賢焉或為邑宰或為家臣或不願仕蓋顯於諸侯者寡矣然則七十子之徒與孔子語而未嘗及怨何哉君子之道充乎已加乎人窮與達外也彼戰國豪士不由孔子之門者則有脫賤貧逐貴高弗奪弗厭滅身覆宗而不悔何哉不循聖人之道挾數以進求行其欲得與失其所重也吾乃知夫由孔子之道者雖困窮以死不害其為賢矣顏淵荆公曰君子所求於人者薄而辨是與非也無所茍孔子罪宰予曰於予與何誅罪冉有曰小子鳴鼔而攻之可也二子得罪於聖人若當絶也及為科以列其門弟子取者不過數人於宰予有辭命之善則取之於由求有政事之善則取之不以不善而廢其善孔子豈阿其所好哉所求於人者薄也管仲功施天下孔子小之門弟子三千人孔子獨稱顏回為好學問其餘則未是好學者閔損原憲曾子之徒不與焉冉求宰我之得罪又如此孔子豈不樂道人之善哉辨是與非無所茍也所求於人者薄所以取人者蓋辨是與非者無所茍所以明聖人之道如宰予冉求二子之不得列其善則士之難全者衆矣惡足以取人善乎如管仲無所貶則從政者若是而止矣七十子之徒皆稱好學則好學者若是而止矣惡足以明聖人之道乎取人如此則吾之自取者重而人之所處者易明道如此則吾之與人其所由可知已故薄於責人而非匿其過不茍於論人而非缺其全聖人之道本乎中而已春秋之㫖豈易於是哉潁濱曰孔子於諸弟子獨稱顏回之好學弟子之賢者衆矣而孔子不以好學許之豈妄言哉吾嘗論之弟子之知孔子者獨顏子耳孔子之道如天然在賢者識其大者不賢者識其小者顏子識其大者也故仰之而知其有髙者存焉鑽之而知其有堅者存焉故曰語之而不惰者其回也歟此孔子所以獨稱其好學也人誠有見於此譬如為山雖覆一簣未有能止之者也茍誠無見矣雖既九仞不復能進也此顏子與衆弟子之辨也又曰予少年讀書竊嘗怪顏子簞食瓢飲居於陋巷人不堪其憂顏子不改其樂私以為雖不欲仕然抱關擊柝尚可以自養而不害於學何至困辱貧窘自苦如此及來筠州勤勞米鹽之間無一日之休雖欲棄塵垢解覊縶自放於道德之塲而事每刼而留之然後知顏子所以甘心於貧賤不肯求升斗之禄以自給者良以其害於學故也嗟夫士方其未聞大道沉酣世利以玉帛子女自厚自以為樂矣及其循理以求道落其華而收其實從容自得不知天地之為大與生死之為變而況其下者乎故其為樂也足以易窮餓而不變雖南面王樂不能加之蓋非有德不能任也予方區區欲磨洗濁汙晞聖賢之萬一自視缺然而欲庻幾顏氏之樂宜其不可得哉若夫孔子周行天下髙為魯司寇下為委吏乘田惟其所遇無所不可葢達者之事而非學者之所望也東坡曰昔夫子以簞食瓢飲賢顏子而韓子乃以為哲人之細事何哉蘇子曰古之觀人也必於其小焉觀之其大者容有偽焉人能碎千金之璧不能無失聲於破釜能搏猛虎不能無變色於蜂蠆孰知簞食瓢飲不為哲人之大事乎乃作顏樂亭詩以遺孔君正韓子之說以自警云天生烝民為之鼻口美者可嚼芬者可嗅美必有惡芬必有臭我無天游六鑿交鬭騖而不返跬步商受偉哉先師安此㣲陋孟賁股慄虎豹卻走𦕈然其身中亦何有我求至樂千載無耦執瓢從之忽焉在後昌黎曰登孔氏之門者衆矣三千之徒四科之目孰非由聖人之道為君子之儒者乎其於過行過言亦云鮮矣而夫子舉不貳過惟顏氏之子其何故哉請試論之夫聖人抱誠明之正性根中庸之正德茍發諸中形諸外者不由思慮莫非規矩不善之心無自入焉可擇之行無自加焉故惟聖人無過故所謂過者非謂發於行彰於言人皆謂之過而後為過也生于其心則為過矣故顏子之過此類也不貳者蓋能止之於始萌絶之於未形不貳之於言行也中庸曰自誠明謂之性自明誠謂之教自誠明者不勉而中不思而得從容中道聖人也無過者也自明誠者擇善而固執之者也不勉則不中不思則不得不貳過者也故夫子之言曰回之為人也擇乎中庸得一善則拳拳服膺而不失之矣又曰顏氏之子其殆庻幾乎言猶未至也而孟子亦云顏子具聖人之體而㣲者皆謂不能無生于其心而不暴之於外考之於聖人之道差為過耳顏子自惟其若是也於是居陋巷以致其誠飲一瓢以求其志不以富貴妨其道不以隠約易其心確乎不拔浩然自守知高堅之可尚忘鑽仰之為勞任重道逺竟莫之致是以夫子歎其不幸短命今也則亡謂其不能與己並立於至聖之域觀教化之大行也不然夫行發於身加於人言發乎邇見乎逺茍不慎也敗辱隨之而後思欲不貳過其於聖人之道不亦逺乎而夫子尚肯謂之其殆庻幾孟子尚復謂之具體而㣲者哉則顏子之不貳過盡在是矣子夏潁濱曰善乎子夏之教人也始於灑掃應對進退而不急於道使其來者自盡於學日引月長而道自至故曰百工居肆以成其事君子學以致其道譬如農夫之植草木既為之區别溉種而時耨之風雨既至小大甘苦莫不咸得其性而農夫無所用巧也孔子曰君子上達小人下達達之有上下出乎其人而非教者之力也異哉今世之教者聞道不明而急于夸世非性命道德不出於口雖禮樂刑政有所不言矣而況於灑掃應對進退也哉教者未必知而學者未必信務為大言以相欺天下之偽自是而起此子夏所謂誣也仲由冉求公西華曾晳言志潁濱曰四子之言皆其志也夫子之哂由也以其不讓而其與點也以其自知之明與如曾晳之狂其必有不可施於世者矣茍不自知而强從事焉禍必隨之其欲從弟子風乎舞雩樂以忘老則其處已者審矣不然孔子豈以不仕為貴者哉曾參不列四科李觀曰客有言曰仲尼聖人也曾參孝子也十哲皆仲尼門人也察其能孝於家能忠於君能友於兄弟能信於朋友可以臨事可以成章故加其美目也而曾參雖不聞兼此數者乃其近者小者而仲尼區别四科前後十哲曾參不及者何也主人對之曰噫非仲尼區别四科前後十哲之名乃一時之言也非燕居之時門人盡在而言也于時仲尼圍於陳畏於匡曾參不在從行之中故仲尼言左右者揚其德行言語政事文學皆可邀時之遇行已之材不得者是以美而類之傷而歎之非曾參不當此數子也使曾子于時得與數子從行則仲尼之聖不遺參之孝不後冉伯牛仲弓之目也必矣客於是稱謝而退或者止之曰客之問知其一未知其二主人對得其細未得其大且仲尼抱至聖之德值多難之代周遊栖遲不遇天下仕魯不終過宋伐樹之衛不用適楚逢患而四科之徒未嘗離其起居闕其絃誦不以師道窮而曰妨已之進不以身之私而越去終日温温孜孜提攜負荷從其行止如手足羽翼時仲尼有仁思德慮未言者顏回輒發之故謂之德行矣仲尼言有所陳未達而端木賜輒達之故謂之言語矣子路勇毅果正之士也侍仲尼而不善之道不得入焉故謂之政事矣子游子夏之文春秋之外得與聖人論之故謂之文學矣故數子居則講仲尼之道行役則任仲尼之事而曾參則安在焉患難則未嘗有用焉且夫孝者人性當然也不至者非人也參茍至之乃得為人矣夫何異也且十哲之徒孰有非孝乎而參獨以有孝之名加其數子之長故不得與之同目也何謂不在從行之中而遺之也夫孝者不止於家也事君慎其事忠其命乃孝也事師聘其道敬其事乃孝也不去危即安不冒利背誼乃孝也而參不敬其事矣不能冐義背利矣乃孝其孝也非孝也子從儒守學宜識所言何言之介也主人拊几而起曰爾之辨則辨矣如何斯可謂攻乎異端斯害也已樂天曰曾參不列四科者非為德行才業不及諸人也蓋繫於一時之事耳請為始終言之昔者仲尼有聖人之德無聖人之位棲棲應聘七十餘國與時竟不偶知道終不行感鳳泣麟慨然有吾已矣夫之嘆然後自衛反魯删詩書定禮樂修春秋立一王之法為萬代之教其次則叙十哲論四科以垂示將來當此之時顏閔游夏之徒適在左右前後目擊指顧列入四科亦一時也孝經云仲尼居曾子侍此言仲尼閒居之時曾參則多侍從曾參至孝不忍一日離其親及仲尼旅遊歴聘自衛反魯之時曾參或歸養於家不從門人之列論擬之際偶獨見遺由此明之非曾參德行才業不及諸門人也所以不列四科者蓋一時之闕耳因一時之闕為萬代之疑從此辨之可無疑焉鄭獬曰四科非夫子擇之也吾疑其為曾子之言論語曾子之出也蓋曾子常與其弟子評先師之門人賢其賢者次第之非曾子自著之則曾子之弟子拾記之云爾􅂚以解之以其字之也語之稱弟子自相謂則字之師語弟子則名之弟子之於師雖朋友亦名之今四科皆字也茍夫子言固名之矣曰德行顏回閔損冉耕冉雍言語宰予端木賜政事冉求仲由文學言偃卜商而反曰顏淵閔子騫云云如是曾子為其朋友而字之吾用是固知非夫子擇之而曾子之出也亡疑矣按而言則曾子不當於四科也亦宜或曰此據從蔡者言之字者所以褒也曰行於蔡吾不知其果盡從與否也然七十子尚能踰此十人者乎語非春秋書􅂚以用其字褒也曰上曷不明著之曰曾子云而無有發者何也曰記者云耳或著焉或去焉不必例於此子曰晏平仲善與人交子曰賢哉回也著之矣柴也愚參也魯堯曰咨汝舜子温而厲子在鄉黨則皆去之於此獨不著曾子豈不得耶樊遲學稼圃潁濱曰樊遲之學為農圃蓋將與民並耕而食歟此孟子所謂許行之學也孟子曰有大人之事有小人之事堯以不得舜為己憂舜以不得禹臯陶為己憂以百畝之不易為己憂者農夫也此孔子所謂樊遲小人也宰予從田常作亂潁濱曰太史公言宰我為臨淄大夫與田恒作亂夷其族孔子恥之余以為宰我之賢列於四科其師友淵源所從來逺矣雖為不善知不至於從畔逆弑君父也宰我不幸平居有晝寢短喪之過儒者因遂信之蓋田恒之亂本與闞止争政闞止亦曰子我也田恒既殺闞止而宰我䝉其惡名豈不哀哉且使宰我信與田恒之亂恒既殺闞止弑簡公則尚誰族宰我者事蓋必不然矣夫使宰我陷於逆亂猶不足惜也而使孔子之門人高弟至此豈不為孔子惜哉東坡曰常病太史公言宰我與田常作亂夷其族使吾先師之門乃有叛臣焉而天下通祀者容叛臣其間豈非千載不蠲之惑也耶近令邁考閱經書究其所自則宰我不叛尤驗明甚太史公因陋承疑使宰我負寃千歲而吾先師與蒙其垢自兹一洗亦古今之快也李斯上書諫二世其畧曰田常為簡公臣布德施惠下得百姓上得羣臣陰取齊國殺宰予於庭是宰我不從田常為常所殺也而弟子傳乃云宰我與田常作亂而滅其族孔子恥之李斯事荀卿去孔子不逺宜得其實弟子傳妄也孔門學道教人潁濱曰孔子之所以教人者始於灑掃應對進退及其安之然後申之以絃歌廣之以讀書曰道在是矣仁者見之斯以為仁智者見之斯以為智矣顏閔由是以得其德予賜由是以得其言求由由是以得其政游夏由是以得其文皆其才而成之譬如農夫墾田以植草木大小長短甘辛鹹苦皆其性也吾無加損焉能養而不傷耳孔子曰十室之邑必有忠信如丘者焉不如丘之好學也如孔子猶養之以學而後成故古之知道者必由學學者必由讀書傅說之詔其君亦曰學于古訓乃有獲念終始典于學厥德修罔覺而況餘人乎子路之於孔子有兼人之才而不安於學嘗謂孔子有人民社稷何必讀書然後為學孔子非之曰汝聞六言六蔽矣乎好仁不好學其蔽也愚好智不好學其蔽也蕩好信不好學其蔽也賊好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂凡學而不讀書者皆子路也信其所好而不知古人之成敗與所遇之可否未有不為病者雖然孔子嘗語子貢曰賜也汝以予為多學而識之者歟曰非也予一以貫之非多學之所能致則子路之不讀書未可非耶曰非此之謂也老子曰為學日益為道日損以日益之學求日損之道而後一以貫之者可得而見也孟子論學道之要曰必有事焉而勿正心勿忘勿助長也心勿忘則莫如學必有事則莫如讀書朝夕從事於詩書待其久而自得則勿正勿助之謂也譬之稼穡以為無益而捨之則不耘苗者也助之長則揠苗者也以孔孟之說考之乃得先君之遺意歴代名賢確論卷二十六
