body:
  text: 歴代名賢確論卷十二二帝三代通論中湯武范文正公湯仁文王畏利牛僧孺商剛周柔潁濱唐虞三代建官東坡三代勸勉其民潁濱三代富而教之六一堯舜周公李商隱湯武范文正公曰明夷隂上明下其義病矣火入地中其光翕矣蔽賢傷善之時也夫文明在上則賢者遂進文明在下則善人用傷其商之末世耶君子用晦然後免於其難然則文王其不用晦乎何以嘗幽之耶文王盖有國焉德加于人晦之難也故以文明入于難終以柔順而出矣箕子雖無政焉而最近於闇故自辱其身以晦其道然後乃免故文明在下難哉聖賢其猶病諸變斯時者惟九三乎得其大者其湯武之事歟又曰革水火相薄變在其中聖人行權革易之時也夫澤有水則得其宜今澤有火是反其常矣天下無道聖人革之以反常之權然而反常之權天下何由而從之以其内文明而外說也内卦文明外卦兑說以此之文明易彼之昏亂以天下之説易四海之怨以至仁易不仁以有道易無道此所以反常而天下聽矣其湯武之作耶茍道德不去雖湯武日生當為天下之助何反常之有焉湯仁文王畏利牛僧孺曰救天下者皆曰仁得天下者皆曰利則可乎曰不可也不得已而有天下則曰仁得已而有者則曰利也若畏其利善以其仁皆聖也湯文王是也原意曰聖人眎生民以天下襁穉在焚溺無不挈者然則挈而授其家乎將遂挈而有之乎彼家無人而有之不得已而仁矣有人而有之則得已而利矣夏無人也謂無㣲子湯有以仁殷有人也文王畏其利前賢明湯意故無伯夷後聖明文王意故曰周之德可謂至德也已矣商剛周柔潁濱曰商有天下者三十世而周之世三十有七商既衰而復興者五王而周之既衰而復興者宣王一人而已盖商之多賢君宜若其世之過於周周之賢君不如商之多而久於商者數世其故何也周公之治天下務以文章繁縟之禮和柔馴擾剛强之民故其道本於尊尊而親親貴老而慈幼使民之父子相愛兄弟相悅而無犯上難制之氣行其至柔之道以揉天下之戾心而去其剛毅果敢之志故其享天下至久而諸侯内侵京師不振卒于廢為至弱之國何者優柔和易可以為久而不可以為强也若夫商人之所以為天下者不可復見矣嘗試求之詩書詩之寛緩而和柔書之委曲而繁重者皆周也而商人之詩駿發而嚴厲其書簡潔而明肅以為商周之風俗盖在乎此矣夫惟天下有剛强不屈之俗也故其後世有以自振於衰㣲然至其敗也一散而不可復止盖物之强者易以折柔忍者可以久存柔者可以久存而常困于不勝强者易以折而其末也可以有所立此商之所以不長而周之所以不振也嗚呼聖人之為天下亦有所就而已不能使之無弊也使之能久而不能强能以自振而不能以及遠此二者存乎其後世之賢與不賢矣太公封於齊尊賢而上功周公曰後世必有簒弑之臣周公治魯親親而尊尊太公曰後世寖衰矣夫尊賢上功則近於强親親尊尊則近于弱終之齊有田氏之禍而魯人困于盟主之令盖商之政近于齊而周公之治周者其所以治魯也故齊强而魯弱魯未亡而齊先亡也書稱伊尹去亳適夏既醜有夏復歸于亳盖伊尹耕於有莘之野既以處士從湯矣及其適夏非其私行也湯必與知之其君臣之心以謂從湯伐桀以濟斯民不若使伊尹事桀以正其亂雖使夏不亡商不興無憾也及其不可復輔於是捨而歸耳其後文王事紂亦身為之三公至將囚而殺之然後棄之而西盖湯之於桀文王之於紂其不欲遽奪之者如此此其所以為湯文王而後世之所不及也唐虞三代建官東坡曰天下之事古略而今詳天下之官古寡而今衆聖人非有意于其間勢則然也火化之始燔黍捭豚以為糜矣至周而醯醢之屬至百二十甕棟宇之始茅茨采椽以為泰矣至周九尺之堂山節藻梲聖人隨世而為之節文豈得已哉周書曰唐虞稽古建官惟百夏商官倍亦克用乂聖人不以官之衆寡論治亂者以為治亂在德而不在官之衆寡也禮曰夏后氏官五十商二百周三百與周官異學者盖不取焉夫唐虞建官百簡之至也夏后氏安能減半而辨此理之必不然也孔安國曰禹湯建官二百不及唐虞之清要榮古而陋今學者之病也自夏商觀之則以官百為清要自唐虞而上雲鳥紀官之世而觀之則官百為陋矣夫豈然哉愚聞之叔向曰昔先王議事以制不為刑辟故子産鑄刑書而叔向非之夫子産之刑書末世之先務也然且得罪于叔向是以知先王之法亦簡矣先王任人而不任法勞于擇人而逸于委任故法可以簡法可以簡故官可以省古人有言省官不如省事省事不如清心至矣三代勸勉其民潁濱曰王道之至於民也其亦深矣賢人君子自潔於上而民不免為小人朝廷之間揖讓如禮而民不免為盗賊禮行於上而淫辟邪放之風起于下而不能止此猶未免為王道之未成也王道之本始于民之自喜而成于民之相愛而王者之所以求之於民者其粗始于力田而其精極于孝弟亷恥之際力田者民之最勞而孝弟亷恥者匹夫匹婦之所不悦强所最勞而使之有自喜之心勸所不悅而使之有相愛之意故夫王道之成而及其至于民其亦深矣古者天下之災水旱相仍而上下不相保此其禍起于民之不自喜於力田天下之亂盗賊放恣兵革不息而民不樂業此其禍起于民之不相愛而棄其孝弟亷恥之節夫自喜則雖有大勞而其事不遷相愛則雖有强狠之心自顧其親戚之樂以不忍自棄于不義此二者王道之大權也方今天下之人狃於工商之利而不喜於農惟其最愚下之人自知其無能然後安于田畝而不去山林饑餓之民皆有盗跖趦趄之心而閨門之内父子交忿而不和及朝廷之上雖有賢人而其教不逮于下是故士大夫之間莫不以為王道之逺而難成也然臣竊觀三代之遺文至于詩而以為王道之成有所易而無難者夫人之不喜乎此是未得為此之味也故聖人之為詩道其耕耨播種之勤而述其歲終倉廩豐實婦子喜樂之際以感動其意故曰畟畟良耜俶載南畝播厥百榖實函斯活或來瞻女載筐及筥其饟伊黍其笠伊糾其鎛斯趙以􅘥荼蓼當此時也民既勞矣故為之言其室家來饁而慰勞之者以勉卒其事而其終章曰荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有捄其角以似以續續古之人當此之時歲功既畢民之勞者得以與其婦子皆樂於此休息閒暇飲酒食肉以自快於一歲則夫勤者有以自忘其勤盡力者有以輕用其力而狼戾無親之人有所慕悦而自改其操此非獨于詩云爾道之使獲其利而教之使知其樂亦如是也且民之性固安於所樂而悅于所利此臣所以為王道之無難者也三代富而教之六一日惟三代仁政之本始于井田而成于學記曰國有學遂有序黨有庠家有塾其極盛之時大備之制也凡學本于人惟磨揉遷革使趨于善至于風俗成而頌聲興盖其功法施之各有次第其教于人者勤而入于人者漸勤則不倦漸則遲久而深夫以不倦之意待遲久而成功者三王之用心也故其為治必久而後致太平而為國皆至于六七百年而未已此其効也三代學制甚詳而後世罕克以舉盖或不知本末而不備又求于速不待其成而殆故學之道常廢而僅存蕘舜周公李商隱曰堯去子舜亦去子周公去弟後世人以為能斷此絶不知聖人事者斷之為義疑而後定者也聖人所行無疑又安用斷聖人持天下以道民不得知聖人理天下以仁義民不得知害去其身未仁也害去其家未仁也害去其國亦未仁也害去其天下亦未仁也害去其後世然後仁也宜而行之謂之義子不肖去子弟不順去弟家國天下後世皆蒙利去害矣不去則反宜然而為之堯舜周公未嘗疑又安用斷故曰斷非聖人事歴代名賢確論卷十二
