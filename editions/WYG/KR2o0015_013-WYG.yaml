body:
  text: 歴代名賢確論卷十三二帝三代通論下二帝三王君臣梁肅伊尹太公李商隱老泉伊尹伯夷栁下惠荆公許由龍逄伯夷昌黎巢許夷齊白樂天二帝三王君臣梁肅磻溪銘曰隂陽和而萬物生聖賢合而天下平和者時也合者運也在昔堯舜合禹抑洪水而天下平者四百年湯合伊尹革桀驁而天下平者六百年文武合太公一戎衣而天下平者八百年與夫風雨寒暑五行四時代天生物一也天之數不可以不變時則有懷山襄陵浩浩滔天之災君之運不可以不極時則有作威殺戮毒逋四海之變變則通時則有四載之庸極則反時則有放伐之功於戲惟尚父鍾其運而遇其主躡其機而作其合者歟于後伯陽不顯仲尼旅人其不合者歟故曰君子得其時則大行不得其時則龍蟠也嘉尚父之動静不失其時作磻溪銘曰至人無心與道出處處則土木出則雷雨惟殷道絶粤有尚父爰宅于幽盤桓草莽天地闔闢隂陽運行明極而昏昏極而明遇主水濱謨泰八紘牧野桓桓一麾而平惟彼日月得天而光惟彼聖賢得時而彰獨夫昏迷我乃豹藏文武作周我乃鷹揚故曰大道無體大人無方運用變通至虚而常作銘磻溪今古茫茫伊尹太公李商隱曰世以為能讓其國能讓其天下者為賢此絶不知賢人事者能讓其國能讓其天下是不茍取者耳湯故時非無臣也然其卒佐湯有陞陑之役鳴條之戰竟何人哉非伊尹不可也武故時非無臣也然其卒佐武有牧野之誓白旗之懸果何人哉非太公望不可也茍伊尹之讓汝鳩仲虺太公望之讓泰顛閎夭則商周之命其集乎故伊尹之醜夏復歸太公望之發揚蹈厲當此時雖百汝鳩百仲虺伊尹不讓也百泰顛百閎夭太公望亦不讓也故曰讓非賢人事老泉曰孫武既言五間則又有曰商之興也伊摯在夏周之興也吕牙在商故明君賢將能以上知為間者必成大功此兵之要三軍所恃而動也按書伊尹適夏醜夏歸亳史太公嘗事紂去之歸周所謂在夏在商誠矣然以為間何也湯文王固使人間夏商耶伊吕固與人為間耶桀紂因待間而後可伐耶是雖甚庸亦知不然矣然則武意天下存亡寄于一人伊尹之在夏也湯必曰桀雖㬥一旦用伊尹則民心復安吾何病焉及其歸亳也湯必曰桀得伊尹不能用必亡矣吾不可以安視民病與天下共亡之吕牙之在商也文王必曰紂雖虐一旦用吕牙則天禄必復吾何憂焉及其歸周也文王必曰紂得吕牙不能用必亡矣吾不可以久遏天命遂命武王與天下共亡之然則夏商之存亡待伊吕用否而决今夫問將之賢者必曰能逆知敵國之勝敗問其所以知之之道必曰不愛千金故能使人為之出萬死以間敵國或曰能間敵國之使而探其隂計嗚呼其亦勞矣伊吕一歸而夏商之國為决亡使湯武無用間之名與用間之勞而得用間之實此非上智其誰能之夫兵雖詭道而本于正者終亦必勝今五間之用其歸于詐成則為利敗則為禍且與人為詐人亦將且詐我故能以間勝者亦或以間敗吾間不忠反為敵用一敗也不得敵之實而得敵之所偽示者以為信二敗也受吾財而不能得敵之隂計懼而以偽告我三敗也夫用心于正一振而羣綱舉用心於詐百補而千穴敗智于此不足恃也故五間者非明君賢將之所尚明君賢將之所尚者上智之間也是以淮隂曲逆義不事楚而髙祖擒籍之計定左車周叔不用于趙魏而淮隂進兵之謀决嗚呼是亦間也伊尹伯夷栁下惠荆公曰孟子曰可欲之謂善有諸已之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖之為名道之極德之至也非禮勿動非禮勿言非禮勿視非禮勿聽此大賢者之事也賢者之事如此則可謂備矣而猶未足以鑽聖人之堅仰聖人之髙以聖人觀之猶泰山之於岡陵河海之于陂澤然則聖人之事可知其大矣易曰與天地合其德與日月合其明與鬼神合其吉凶此盖聖人之事也德茍不足以合于天地明茍不足以合于日月吉凶茍不足以合於鬼神則非所謂聖人矣孟子論伯夷伊尹栁下惠皆曰聖人也而又曰伯夷隘栁下惠不恭隘與不恭君子不由也夫動言視聽茍有不合于禮者則不足以為大賢人而聖人之名非大賢人之所得擬也豈隘與不恭者所得僭哉盖聞聖人之言行不茍而巳將以為天下法也昔者伊尹制其行于天下曰何事非君何使非民治亦進亂亦進而後世之士多不能求伊尹之心者由是多進而寡退茍得而害義此其流風末俗之弊也聖人患其弊於是伯夷出而矯之制其行于天下曰治則進亂則退非其君不事非其民不使而後世之士多不能求伯夷之心者由是多退而寡進過亷而復刻此其流風末世之弊也聖人又患其弊于是栁下惠出而矯之制其行于天下曰不羞汙君不辭小官遺逸而不怨阨窮而不憫而後世之士多不能求栁下惠之心者由是多汙而寡潔惡異而尚同此其流風末世之弊也此三人者因時之偏而救之非天下之中道也故久必弊至孔子之時三聖人之弊各極于天下矣故孔子集其行而制成法於天下曰可以速則速可以久則久可以仕則仕可以處則處然後聖人之道大具而無一偏之弊矣其所以大具而無弊者豈孔子一人之力哉四人者相為終始也故伯夷不清不足以救伊尹之弊栁下惠不和不足以救伯夷之弊聖人之所以能大過人者盖能以身救弊于天下耳如皆欲為孔子之行而忘天下之弊則惡在其為聖人哉是故使三人者當孔子之時則皆足以為孔子也然其所以為之清為之仕為之和者時耳豈滯于此一端而已乎茍在於一端而已則不足以為賢人也豈孟子所謂聖人哉孟子之所謂隘與不恭君子不由者亦言其時爾且夏之道豈不美哉而殷人以為野殷之道豈不美哉而周人以為鬼所謂隘與不恭者何以異于是乎當孟子之時有教孟子枉尺直尋者有教孟子權以援天下者盖其俗有似于伊尹之弊時也是以孟子論是三人者必先伯夷亦所以矯天下之弊耳故曰聖人之言行豈茍而已將以為天下法也許由龍逄伯夷昌黎曰今之人以一善為行而恥為之慕達節而稱夫通才者多矣然而脂韋汩没以至于老死者相繼亦未見他人之稱其豈非害教賊名之術歟且五常之教與天地皆生然而天下之人不得其師終不能自知而行之矣故堯之前千萬年天下之人促促然不知其讓之為美也於是許由哀天下之愚且以爭為能乃脫屣其九州髙揖而辭堯由是後之人竦然而言曰雖天下猶有薄而不售者况其小者焉故讓之教行于天下許由之為師也自桀之前千萬年天下循循然不知忠易其死也故龍逄哀天下之人不仁觀君父百姓入水火而不救於是進盡其言退就其割烹故後之人竦然而言曰雖萬死猶有忠而不懼者况其小者焉故忠之教行于天下由龍逄之為師也自周之前千萬年渾渾然不知義之可以捐其生也故伯夷哀天下之偷且以强則伏食其葛薇逃山而死于是後之人竦然而言曰雖餓死猶有死而不懼者况其小者焉故義之教行于天下由伯夷之為師也是三人俱以一身立教而為師于千萬年間其身亡而其教存於扶持天地而功亦厚矣嚮令三師恥獨行慕通達則堯之日必曰得位而濟道安用讓為夏之日必曰泰進而否退安用死為周之日必曰和光而同塵安用餓為若然者天下之人促促然而争循循然而佞渾渾然而偷其何懼而不為哉是則三師生于今必謂偏而不通者矣其可不謂之大賢人哉嗚呼今之人其慕通達之為弊也且古聖人言通者盖百行衆藝備於身通而行之者也今恒人之言通者盖百行衆藝闕于身而求合者也是故古人言通者通于道義今之人言通者通于私曲其亦異矣將欲齊之者其猶矜糞九而擬質隋珠者乎且令今父兄教其子弟者曰爾當通于行如仲尼雖愚者亦知其不能耶曰爾尚力一行如古之賢雖中人亦希其能矣豈不由聖可慕而不可齊耶賢可及而可齊也今之人行未能及乎賢而欲齊乎聖者亦見其病矣夫古人之進修或幾乎聖人今人行不及乎中人而恥乎力一行為獨行且曰我周通同如聖人彼其欺心耶吾不知矣彼其欺人而賊名耶吾不知矣余懼其說之將深為通解巢許夷齊白樂天曰君子之為君子者為能先其道後其身守其常則以道萃乎身罹其變則不以身害其道故明哲保身亦道也巢許得之求仁殺身亦道也夷齊得之雖殊時異致同歸于一揆矣何以覈諸觀乎古聖賢之用心也茍守道而死死且不朽是非死也茍失道而生生而不仁是非生也向使夷齊生于唐虞之代安知不明哲保身歟巢許生于殷周之際安知不求仁殺身歟蓋否與泰各繫于時也生與死同歸于道也歴代名賢確論卷十三
