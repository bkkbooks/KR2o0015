body:
  text: 歴代名賢確論卷九十三宣宗上欲用蕭鄴為相王龜長馬公儒佑之乃更用崔慎由范祖禹崔慎由請立太子尋罷相范祖禹上命王龜長等立䕫王龜長謀出王宗實宗實入見上已崩乃迎立鄆王誅龜長等范祖禹李徳裕范祖禹孫之翰白敏中秦少㳺總論宣宗之政范祖禹孫之翰懿宗上好音樂賜與動及千緡范祖禹高駢破南詔范祖禹令狐綯孫之翰韋保衡路巖孫之翰上欲用蕭鄴為相王龜長馬公儒佑之乃更用崔慎由范祖禹論曰堯舜疇咨四嶽詢謀僉諧而後用人既以為可則用之而不疑矣二使之請亦有司之常職也何疑於蕭鄴而遽易之宣宗以此為明防其羣下知臣之道其不然乎崔慎由請立太子尋罷相范祖禹論曰三代之時自天子至于庶人皆有常職以食其力有常行以勤其生壯而强勉馬老而教訓焉修身以俟死而已天下無異道未有衆人皆死而欲一已獨不死者也執左道以亂政者殺故無迂怪之士凡藥所以攻疾豈有服之而不死者哉後世去聖寖逺異端競起由秦漢以來乃有神仙服食不死之説故人心多惑聖道不明此其一端也而人主尤甘心焉以唐考之自太宗至于武宗惑於方士而餌藥以敗者六七君皆求長生而反夭其天年亦可以為戒矣而宣宗又敗以藥至以儲嗣為諱惡豈不蔽甚矣哉夫心術不可不慎也一有所惑將無所不至不足以語學矣而况可為聖賢乎上命王龜長等立䕫王龜長謀出王宗實宗實入見上已崩乃迎立鄆王誅龜長等范祖禹論曰古者受遺託孤必求天下之忠賢伊周聖人不可及己漢武帝總攬英俊及其末年所得者霍光金日磾而已其可謂難也齊威公定嗣於易牙故其國大亂宣宗不能早立太子而以非次屬諸宦者至使宗實挟正立長以相屠滅自文宗以後立不以正矣然皆出於宦者之專命非人主使之也宣宗不懲其禍而以委之蓋以宰相為外臣宦者為腹心溺於所習而不自知其非也安在其為明哉李徳裕范祖禹論曰裴度之相憲宗李徳裕之相武宗皆有功烈為唐賢相大中以後無能繼之者徳裕才優於度而徳器不及也度為小人所傾無所不至危亦極矣而能以功名終徳裕一失勢斥死海上何哉度不為黨徳裕為黨故也自今觀之牛僧孺李宗閔之黨多小人徳裕之黨多君子然因私以害公挟勢以報怨則一也夫惟天吏可以伐燕徳裕自為黨而欲破朋黨此以燕伐燕也孔子曰克伐怨欲不行焉可以為難矣又曰君子矜而不爭羣而不黨徳裕克伐怨欲必行焉矜而爭羣而黨其能免乎孫之翰論曰李徳裕以傑才為武宗任用經綸夷夏屢成大功復振舉法令致朝廷之治誠賢相矣但宣宗乆不得位又不為武宗所禮蓄怨固深既怨武宗徳裕用事大臣自不容矣况徳裕性剛少恕不忘讎怨與李宗閔輩相排斥凡十數年略無悛意宗閔固姦人然嘗任宰輔已逐為逺郡刺史矣復乗成功之時譖以罪流竄焉牛僧孺雖宗閔黨然有一時名望斥之遐裔物議豈平焉王涯賈餗之禍本仇士良誣譖中外所知徳裕於二人不問所隙但以怨李訓陷已而忿及涯餗子孫避禍於上黨已為亂兵所害又於敕書實涯餗之罪言已戮其後嗣布告中外且宗閔已逐涯餗子孫已戮尚譖其事聲其罪用快忿心則在朝之人嘗有不足者得不懼乎不惟不足者懼凡有勢位於朝者非大賢至公之人鮮不畏之矣何哉大賢至公之人自知才用不在徳裕下彼雖大任我豈不能施為哉又或徳裕專權不容己之施為彼之謀國事固得宜何必功效須出我哉此所以無所畏也如白敏中令狐綯輩才能望徳裕絶逺又固寵保位無至公之心於徳裕雖無所隙然彼出而我用矣彼負才而好勝若復相則不便於已故乗人主不容之意盡力陷之也無隙者尚爾有所不足者可知也以徳裕之傑才大功不能忘怨怨而及禍後之相者自顧才用與徳裕如何得乗不平之心有怨忌於人乎白敏中秦少游論曰白敏中因李徳裕薦入翰林為學士及徳裕貶敏中為相抵之甚力或曰人臣事君公義而已何以私恩為乎敏中之事未足深咎也愚竊以為不然人臣能盡私恩然後能盡公義敏中之罪不容誅矣孔子曰事親孝故忠可移於君事兄弟故順可移於長推此言之則背師賣友之人必不能以身許國何則於所厚者薄則所施無不薄也昔吕布為丁原主簿為董卓而殺原為卓父子又為王允而殺卓及兵敗被執魏祖欲生之劉先主曰明公不見布之事丁建陽董太師乎於是殺布漢封陳平辭曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知其後誅吕氏而安劉氏者平與周勃也夫以布之不忠於丁董也其肯忠於曹氏乎以陳平之不負魏無知也其肯負於劉氏乎此魏所以誅布漢所以屬平者也然則敏中之事葢可見矣雖然敏中所以負徳裕也亦有繇焉傳曰盜憎主人主人何負於盜而盜憎之乎葢自度其事必為主人所惡故也白氏素與楊虞卿姻家居易又與李宗閔牛僧孺厚若敏中本無英氣雖縁徳裕以進而不能無意於僧孺宗閔虞卿之徒自度其事必為徳裕惡也故因其勢盡力以擠之耳夫徳裕忠臣也以非罪被斥天下皆知其寃使敏中素與仇猶當為社稷而救之况因之以進也然則敏中豈惟不忠於徳裕亦不忠於唐也愚故曰人臣能盡私恩然後能盡公義敏中之罪不容誅矣然則公義私恩適不兩全則如之何以道權之而已義重而恩輕則不以私害公若河曲之役趙宣子使人以乗車干行韓厥執而戮之是也恩重而義輕則不以公廢私若庾公之斯追子濯孺子抽矢叩輪去其鏃發乗矢而後反是也夫公義私恩適不兩全猶當以道權其輕重奈何無故而廢之哉雖然逢䝉殺羿孟子以為是亦羿有罪焉以此言之徳裕之薦敏中亦不得為無罪也總論宣宗之政范祖禹論明察强記曰宣宗抉擿細㣲以驚服其羣臣小過必罰而大綱不舉欲以一人之智周天下之務而不能與賢人共天職也譬如亷刻之吏謹治簿書期㑹而不知為政特一縣令之才耳豈人君之徳哉又論臨朝莊重有節曰古者臣進戒於君君申敕其臣上下交脩所以勤於徳也宣宗視輔相之臣禮貌雖恭而實防之如遇胥吏惟恐其欺也拘之以利禄憚之以威嚴故所用多流俗之人而賢者不能有所設施白敏中令狐綯之徒崇極將相持寵保位或十餘年其相如此則其君之功烈亦可知也又論人謂宣宗為小太宗曰宣宗之治以察為明雖聴納規諫而性實猜刻雖吝惜爵賞而人多僥倖外則藩方數逐其帥守而不能治内則宦者握兵柄制國命自如也然百吏奉法政治不擾海内安靖幾十五年繼以懿僖不君唐室壞亂是以人思大中之政為不可及書曰自成湯至于帝乙罔不明徳恤祀若宣宗豈不足為賢君哉孫之翰論小節曰宣宗乆居藩邸頗知時事故在位十三年尚儉徳以恤人隠謹法令以肅臣下恩厚宗室禮重宰輔至㣲行以察取士得失焚香以讀大臣章疏誠好徳之君也然知為君之小節而不知其大節懿安太后嫡母也不能盡禮事之及致暴崩為世所駭白敏中乏濟時之才功徳無聞令狐綯復容子納賄有紊時政故懿宗朝諫臣疏綯之罪曰大中威福又欲行於今日當時事可知也其河湟歸順夷夏粗安葢承武宗用徳裕經營天下事威令已盛而然也不然宣宗用敏中輩於時事有何經畫哉至寵愛次子不定長子儲位裴休奏請則曰若立太子便是閒人此尤見昧人君之大節也卒致内臣争立嗣君幾至於亂是宣宗區區為善止於小節爾上好音樂賜與動及千緡范祖禹論曰國之將興其君未嘗不儉將亡未嘗不侈也懿宗不徳而㬥天産窮人力其能乆有國乎髙駢破南詔范祖禹論南詔為患十年至是始平曰戎狄自古迭為中國患由秦以來未有得志於南蠻者也葢以瘴毒險阻不得天時地利所恃者人和而已而民從征役皆知必死如往棄市則是三者皆亡矣秦發閭左戍五嶺而陳項起秦遂以亡漢初吕后欲誅趙佗士卒不能踰嶺武帝擊越發兵江淮因巴蜀罪人等放棄之蓋不可以中國之師涉其地也遂滅南越以為九郡元帝卒罷珠崖光武遣馬援擊交趾最為有功然三年而後克士卒死者什五六乃得一女子之首其難也如是唐太宗欲討馮盎而用魏徴之䇿卒招懷之明皇之末李宓敗於雲南死者二十萬自是以後南詔盛彊至于懿宗陷安南圍成都中國首尾疲於奔命其後龎勛之亂起於桂林之戍黄巢之冦本於徐方之餘唐室之衰宦者蠧其内南詔擾其外財竭民困海内大亂而因以亡矣夫蠻夷非能亡中國也而中國之亡蠻夷常為之資是以聖王不重外而輕内不勤逺而忘邇恐征伐不息變生於内而揺其本也易曰高宗伐鬼方三年克之髙宗賢王鬼方小夷也以賢王伐小夷三年乃克言用兵之難也唐自開元至于咸通南鄙之師皆由邊臣貪利邀功以啓羣蠻自我致冦大為國患非高宗不得已之伐也十年而克亦速矣哉令狐綯孫之翰論令狐綯縱龎勛至淮南不擊曰令狐綯大臣也當同國休戚天下有患可救則盡力救之况帥淮南一道小寇入境方憂討除未敢為㬥部將見其必敗之勢言討之甚易不討必致禍亂綯曰長淮以南他不為㬥從他過去餘非吾事也觀其言豈大臣憂國之意其庸人茍且之見尋致大亂屠害十數郡生靈集天下兵討之周嵗方平則綯之罪不容誅矣綯為宣宗寵待位極將相一日致國患至此後罪露懿宗止命罷為太子太保罰典如是何以戒大臣姦庸不忠之罪宜乎天下大勢去矣韋保衡路巖孫之翰論韋保衡及巖相曰唐自天寳而下巨盜繼起時有忠傑將相救世定難加元和㑹昌英主賢輔功業甚盛故歴年滋乆天下大勢不衰懿宗居位固中智以下之才復將相不賢於前世天下日以多事矣兵亂濮徐蠻寇蜀方連年用兵民力困弊於時人君勤勞政事倚任忠賢尚可救時之患懿宗及用韋保衡路巖姦險之人為宰輔納賄樹私大紊時政仍以一女之殁刑殺無辜甚衆大臣忠諫逐之遐裔保衡與巖益乗勢陷人恣行貶逐二兇為患中外所憂懿宗方崇奉佛事恭黙自安故時事不理國政多僻賢才既逐忠諫無聞生民困弊徳澤不及天下大勢自是去矣歴代名賢確論卷九十三
