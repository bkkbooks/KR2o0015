body:
  text: 歷代名賢確論卷八十六順宗王叔文以杜佑掌財賦而已副之范祖禹賈耽鄭珣瑜相次歸卧范祖禹劉禹錫東坡董侹劉禹錫憲宗一憲宗求聽諫爭范祖禹于頔勸峻刑上曰欲使朕失人心耳范祖禹上不以平蔡鄆事付史范祖禹以張𢎞靖為河東節度范祖禹罷鄭絪相李藩范祖禹罷權德輿相范祖禹憲宗任相孫之翰帝暴崩宫中范祖禹石守道宦官范祖禹藩鎮范祖禹溫公淮西昌黎王叔文以杜佑掌財賦而已副之范祖禹論曰易曰咸其股執其隨往吝象曰咸其股亦不處也志在隨人所執下也春秋傳曰凡師能左右之曰以皆言制於人而無所能為也杜佑以舊相不恥與小人共事而為之用其可賤也賈耽鄭珣瑜相次歸卧范祖禹論曰孔子曰行已有恥可謂士矣孟子曰人不可以無恥恥之於人大矣賈耽鄭珣瑜當小人用事而為相碌碌無補知其不可引疾而去能知恥矣方之杜佑髙郢豈不有間哉劉禹錫東坡論禹錫文過曰禹錫既敗為書自解言王叔文實工言治道能以口辨移人既得用所施為人不以為當太上久疾宰臣及用事者不得對宫掖事祕建桓立順功歸貴臣由是及貶後漢宦者傳論云孫珵定立順之功曹騰參建桓之䇿騰與梁冀比捨清河而立蠡吾此漢之所以亡也與廣陵王監國事豈可同日而語哉禹錫乃敢以為比以此知小人之為姦雖已敗猶不悛也其可復置之要地乎董侹劉禹錫曰片言可以明百意坐馳可以役萬景工於詩者能之風雅體變而興同古今調殊而理一達詩者能之工生於才達生於明工者還相為用而後詩道備矣云云詩者其文章之藴邪義得而言喪故微而難能境生於象外故精而寡和千里之謬不容秋毫非有的然之姿可使戶曉必俟知者然後鼓行於時自建安距永明已還詞人比肩唱和相發有以朔風零雨髙視天下蟲噪鳥鳴蔚在史䇿國朝因之粲然復興由篇章以躋貴仕者相踵而起兵興已還右武尚功公卿大夫以憂濟為任不暇器人於文什之間故其風寢息樂府協律不能足新詞以度曲夜諷之職寂寥無紀則董生之貧卧于裔土也其不得於時者歟其不試故藝者歟憲宗求聽諫爭范祖禹論上謂宰相事有違宜卿當諫論曰憲宗以太宗納諫厲其羣臣其有意於貞觀之治乎夫能自防如此庶可以寡過矣詩曰無念爾祖聿修厥德憲宗有焉又論上責宰相當力諫曰人君患不從諫人臣患不納忠人君唯不從諫也是以君子日踈小人日親君子立人之朝豈以踈而遂易其心哉有官守者不失其職有言責者不失其言君從之亦諫也君不從之亦諫也諫而不入則去之臣之義也君惡正直而説諂諛然而未嘗殺一正士戮一諫者也而其臣懷祿畏罪而不言則曰君不能從此孟子所謂賊其君者也憲宗之責宰相其以未盡人臣之義乎又論上詰李綘久不諫曰憲宗可謂能自克矣書曰僕臣正厥后克聖夫能求諫如此豈非親正直之益乎説命曰后克聖臣不命其承茍能恱而從之又責以求之何患乎臣之不諫也于頔勸峻刑上曰欲使朕失人心耳范祖禹曰守位以仁不聞以威有罪而刑之曰天討先王豈敢輕重於其心哉故書曰惟我在天下曷敢有越厥志言刑在人而不在已所以為無私也然則人君患無德不患無威人臣勸之以峻刑是納君於惡也孔子曰不知言無以知人憲宗懲于頔之姦謀其可謂知言矣夫如是邪説何自而入哉上不以平蔡鄆事付史范祖禹曰憲宗勞而不伐有功而不矜此大禹之德也豈不賢哉其行已如此而不能勝其驕侈之心卒任小人以隳盛業何其撥亂之易而守成之難邪蓋危則懼懼則善心生安則泰泰則逸心生是以天下既平而禍患常生於所忽也以張𢎞靖為河東節度范祖禹論𢎞靖請併力平淮西乃征恆冀帝不從遂求罷明年以為節度曰張𢎞靖言不失職進退以禮有大臣之體矣其後卒捨恆冀併力淮西如其所慮憲宗雖得之於裴度而失之於𢎞靖豈未之思乎罷鄭絪相李藩范祖禹曰憲宗以循默罷鄭絪以忠直相李藩責任如此可謂正矣其中興唐室不亦宜乎罷權德輿相范祖禹曰德輿依違中立無所適從自以為得固位之術矣且於同列猶不敢忤而况於君乎茍無所發明則焉用相矣憲宗黜之足以厲其臣下豈不明哉憲宗任相孫之翰論曰古人謂天下安注意相天下危注意將此非通論夫天下安固注意於相天下危亦當注意於相相得人將自出矣今觀唐事大可驗德宗建中中以兩河亂鋭意平定時得馬燧李抱真李晟輩數名將任之竟不能平魏博淄青之亂反致大變者相不得人也相者盧杞也無大公至忠之心無經營處置之才雖有名將故不能成功也憲宗自即位有興復大業之志首得杜黃裳陳安危之本啓其機斷繼得武元衡裴垍李絳裴度謀議國事數賢皆大忠至明之人故能選任將帥平定寇亂六十年叛渙之地復為王土四方之人再見太平光采者相得其人也則所謂天下危亦當注意於相相得人將自出矣非其驗歟或曰建中叛者李希烈田恱朱滔等皆劇賊非元和中劉闢李錡盧從史王承宗吳元濟李師道之比也故馬燧輩不能平希烈等數賊髙崇文輩能平闢等數叛臣也此由賊之強弱將之用力難易又何繫於相之事焉答曰希烈等雖劇賊過於闢等然馬燧抱真李晟之為將亦過於髙崇文李光顔李訴之徒也以是論之將才賊勢正等爾但前日之將不能成功後日之將能成功者實繫於相爾建中元和之事難以疏舉今舉一二事最顯者證之馬燧輩敗田悅於洹水悅奔魏州城中敗卒無三二千人皆夷傷未起日夕俟降燧輩若乘勝進兵獲田悅收魏博反掌間爾時河北劇賊惟恱悅既平李納勢弱望風當降况朱滔等未叛河北無事矣河北無事河南一希烈凶賊既無黨援何能為哉但燧與抱真不和遷延不進致悅嬰城固守且誘朱滔等同叛遂成橫流之勢蓋燧窺朝廷之事盧杞所為險薄專報怨讎必無公平之法以御於外故少所畏憚敢乘私忿之心不了國事也杜黃裳薦髙崇文使討劉闢崇文固盡心軍事黃裳尚慮未得成功以其所憚之人制之使人諭之曰若不盡力當用劉澭代之黃裳為宰相已薦用名將復以能者制之崇文不得不速於立功也裴度請督戰淮西諸將聞之益用命知度必能賞功罰罪也以此證之天下安危繫於相豈不彰彰乎然相之賢非天子之明不能任也又見憲宗之明能任賢相則德宗以政柄付於姦人何如主哉元和之治建中之亂後之君天下者深鑒之帝暴崩宫中范祖禹曰憲宗伐叛討逆蕩平河南唐室威令赫然復張而變生於左右近習身陷大禍由任相非其人故也可不為深戒哉又論曰陳洪志弒憲宗而穆宗不討賊故舊史於憲宗之崩疑以傳疑其後文宗謀誅宦者本討元和之亂宣宗追怨穆宗以為豫謀窮治逆黨誅之殆盡其子孫皆以為弒則無疑矣臣故正其事曰為陳洪志所弒石守道論曰天寶之後唐室失御中官內握兵權各擅威福諸侯外據土宇罕有臣順憲宗皇帝英威神聖聰明睿武初斬劉闢後平淮蔡遂定東夏威德逺暢華夷畏服聖功卓然神人柔格信乎中興之聖主矣然不能鑒祖宗之失革中官之弊而溺於近狎親任閹寺終於弒戮惜哉宦官范祖禹論上以李拭請吐突承璀討王承宗上以拭姦黜之曰憲宗以李拭逢迎其意謂之姦臣可謂明矣知拭之不可用豈不知承璀之不可將哉而必將承璀是不能以公滅私以義勝欲也夫不知其非而為之其過小知其非而為之其過大己為不正則邪之招也君人之道可不慎其在己者哉又論以吐突承璀為招討使曰憲宗以中官為大將此亂政也然其羣臣皆以為不可強諫而力爭者相屬於朝此則治世之事也亦足以見其賢臣之多矣天下之禍莫大於人君過舉而下莫敢言如皆莫敢言則至於亡而不自知也又論談忠説田季安謂以中人為將乃天子自為謀將誇服臣下曰朝廷伐叛討逆以一四方此天下之公義也必與天下賢者共為之克以天下不克以天下天子無私焉憲宗欲自有其功故任中人不任將相是天子與臣下爭功也何其不廣哉夫天下之功在用人而不自用用伊尹者湯之功用傳説者髙宗之功用十亂者武王之功用周公者成王之功未聞獨用家臣而後功由己出也憲宗一將承璀而天下之人皆見其情知其將以夸服臣下人君之動可不慎哉藩鎮范祖禹論杜黃裳對帝請以法度裁藩鎮曰藩鎮之亂異於諸侯諸侯自上古以來有之皆聖賢之後王者不得而滅絶也王畿不過千里其外皆以封國故王者不勤於德則諸侯強大其理勢然也唐之藩鎮皆起於盜賊其始也天子封殖之又從而姑息之至于不可制人主自取之也憲宗一裁以法而莫不畏威猶反掌之易天下治亂豈有不由君相者哉又論以內庫錢百五十萬緡賜魏博軍士曰憲宗不愛府庫之積以慰魏博三軍之心可謂知所取與能用善謀矣其德厚如此猶不過於一傳而復失之雖穆宗御失其道亦由人心不固而王澤易竭也况不懷之以德而臨之以兵其能有之十年乎又論上以愛女妻于頔之子頔遂入朝曰天子之於天下其為政必可繼也憲宗不愛一女以悅于頔天下藩鎮焉得人人而悅之古之王者所與為婚姻而嫁以女者必先聖之後不然則甥舅之國也頔方命不朝而天子以女妻其子不亦替乎又論李絳言河北諸鎮不同浙西劒南未易取曰人君之患在狃於一勝而欲事所難不知敵之強弱堅脆而輕用其武一戰不克喪威長冦征伐不息或起內患德宗興元之亂是也夫根深則難拔疾固則難攻亂日淺者治之亦易亂日久者除之亦難先王內修政事外攘夷狄其為之有本末圖之有先後是以無欲速輕舉之悔也又論四年方平淮西曰人君之御天下其失之甚易其取之甚難以憲宗之明斷將相之忠賢竭天下之兵力以伐三州四年而後克其難如此則人君豈可不兢兢業業慎其所以守之者哉又論橫海節度烏重胤奏罷鎮將令刺史領兵曰後世郡縣古之諸侯也委之以土地人民而不與之兵是以匹夫而守一州也天下有變則城郭不守而朝廷無藩籬之固何異於無郡縣乎是故為法者必關盛衰焉使一縣之衆必由於令一郡之衆必由於守守之權歸於按察按察之權歸於天子則天下如網綱之相維臂指之相使矣唐自中葉郡置鎮兵主將有擅兵之勢而刺史無専城之任是以郡縣愈弱藩鎮愈強橫海一帥制之得宜而數世順命况天下處之皆得其道何危亂之有哉溫公論沂州軍亂王辨殺王遂而曹華屠軍卒千二百人曰春秋書楚子虔誘蔡侯般殺之于申彼列國也孔子猶深貶之惡其誘討也况為天子而誘匹夫乎王遂以聚斂之才殿新造之邦用苛虐致亂王辨庸夫乘釁竊發茍沂帥得人戮之易於犬豕耳何必以天子詔書為誘人之餌乎且作亂者五人耳乃使曹華設詐屠千餘人不亦濫乎然則自今士卒孰不猜其將帥將帥何以令其士卒上下盻盻如冦讎聚處得間則相魚肉惟先發者為雄耳禍亂何時而弭哉惜夫憲宗削平僭亂幾致太平其美業所以不終由茍徇近功不敦大信故也淮西昌黎平淮西碑曰唐承天命遂臣萬方孰居近土襲盜以狂往在玄宗崇極而圯河北悍驕河南附起四聖不宥屢興師征有不能克益戍以兵夫耕不食婦織不裳輸之以車為卒賜糧外多失朝曠不嶽狩百𨽻怠官事亡其舊帝時繼位顧瞻咨嗟惟汝文武孰恤豫家既斬吳蜀旋取山東魏將首義六州降從淮蔡不順自以為強提兵叫歡欲事故常始命討之遂連姦鄰隂遣刺客來賊相臣方戰未利內驚京師羣臣上言莫若惠來帝為不聞與神為謀乃相同德以訖天誅乃敕顔胤訴武古通咸統於宏各奏汝功三方分攻五萬其師大軍北乘厥數倍之常兵時曲軍士蠢蠢既剪凌雲蔡卒大窘勝之邵陵郾城來降自夏入秋復屯相望兵頓不勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者額額蔡城其疆千里既入而有莫不順俟帝有恩言相度來宣誅止其魁釋其下人蔡之卒夫投甲呼舞蔡人婦女迎門笑語蔡人告飢船粟往哺蔡人告寒賜以繒布始時蔡人禁不往來今相從戲里門夜開始時蔡人進戰退戮今旰而起左飱右粥為之擇人以收餘憊選吏賜牛教而不稅蔡人有言始迷不知今乃大覺羞前之為蔡人有言天子明聖不順族誅順保性命汝不吾信視此蔡方孰為不順往斧其吭凡叛有數聲勢相倚吾強不支汝弱奚恃其告而長而父而兄奔走偕來同我太平淮蔡為亂天子伐之既伐而飢天子活之始議伐蔡卿士莫隨既伐四年小大並疑不赦不疑由天子明凡此蔡功惟斷乃成既定淮蔡四夷畢來遂開明堂坐以治之歷代名賢確論卷八十六
