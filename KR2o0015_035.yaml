body:
  text: 歷代名賢確論卷三十五始皇四二世附茅焦諫遷太后陳黯甘羅栁州韓非溫公李斯趙髙潁濱東坡䝉恬溫公潁濵茅焦諫遷太后陳黯曰或問古之士能直諫不君之君者其誰為最曰有諫者齊人茅焦曰夏無龍逄耶殷無比干耶曰不以之無而功德相遼耳夫諫者不獨以言之忠而欲其氣雄不獨以名之彰而欲其事立四者克備是為難矣昔嬴政吞噬羣雄以取天下豪暴奢侈古初無先故非必為而諫必拒當遷太后於雍有及泉之誓凡諫者二十七人矣天下忠赤之士莫不囚氣鎖詞是時焦能獨奮勇果不顧其威肉視虎狼氷顧鼎鑊諤諤造廷折其四失俾暴主悔非遷善而從其言由是骨肉之恩斷而再續君臣之義捨而再交諫諍之路塞而再啓皆由焦之功也噫忘軀狥忠亦諫者之職然死於二十七人之後不難乎其心哉進諫於二十七人之後不難乎其詞哉斯可謂言忠氣雄名彰事立備矣豈若龍逄諌桀比干諫紂徒自柔聲婉詞而又身不免事不立其足為茅先生之徒歟問者喜而退矣甘羅栁州曰彼甘羅者左右返覆得利棄信使秦背燕之親已而反與趙合以致危於燕天下是以益知秦無禮不信視函谷關若虎豹之窟羅之徒實使然也韓非溫公論史記載韓王納地效璽於秦請為藩臣使韓非來聘非因上書說王曰今秦地方數千里師名百萬號令賞罰天下不如臣昧死願望見大王言所以破天下從之計大王誠聽臣說一舉而天下之從不破趙不舉韓不亡荆魏不臣齊燕不親霸王之名不成四鄰諸侯不朝大王斬臣以狥國以戒為王謀不忠者也王悅之未任用李斯嫉之曰韓非韓之諸公子也今欲并諸侯非終為韓不為秦也此人情也今王不用久留而歸之此自遺患也不如以法誅之秦王以為然下吏治非李斯使人遺非藥令自早殺韓非欲自陳不得見秦王復悔使赦之非已死矣楊子法言曰或問韓非作說難之書而卒死乎說難敢問何反也曰說難蓋所以死乎曰何也曰君子以禮動以義止合則進否則退確乎不憂其不合也夫說人而憂其不合則亦無所不至矣或曰非說之不合非邪曰說不由道憂也由道而不合非憂也溫公曰君子親其親以及人之親愛其國以及人之國是以功大名美而享有百福也今非為秦畫謀而欲反覆其宗國以售其言罪固不容於死矣烏足愍哉李斯趙髙潁濵曰始皇以詐力兼天下志得意滿諱聞過失李斯燔詩書誦功德以成其氣至其晚節不可告語君老太子在外履危亂之機而莫敢以一言合其父子之親者雖始皇之暴非斯養之不至此也及其事二世知趙髙之姦復偷合取容使髙勢已成天下已亂乃欲力諫不亦晚乎至於國破家滅非不幸也東坡曰始皇時趙髙有罪䝉毅按之當死始皇赦而用之長子扶蘇好直諫上怒使監䝉恬兵於上郡始皇東游㑹稽並海走琅琊少子胡亥李斯䝉毅趙髙從道病使䝉毅還禱山川未及還而上崩李斯趙髙矯詔立胡亥殺扶蘇䝉恬䝉毅而卒以亡秦蘇子曰始皇制天下輕重之勢使內外相形以禁姦備亂者可謂密矣䝉恬將三十萬人威震地方扶蘇監其軍而䝉毅侍帷幄為謀臣雖有大姦賊敢睥睨其間哉不幸道病禱祠山川尚有人也而遣䝉毅故髙斯得成其謀始皇之遣毅毅見始皇病太子未立而去左右皆不可以言智然天之亡人國其禍敗必出於智所不及聖人之治天下不恃智以防亂恃吾無致亂之道耳始皇致亂之道在用趙髙夫閹尹之禍如毒藥猛獸未有不裂肝碎首也自書契以來唯東漢吕强後唐張承業二人號稱善良豈可望一二於千萬以徼必亡之禍哉然世主皆甘心而不悔如漢桓靈唐肅代猶不足深怪始皇漢宣皆英主亦湛於趙髙恭顯之禍彼自以為聰明人傑也奴黨熏腐之餘何能為及其亡國亂朝乃與庸主不異吾故表而出之以戒後世人主如始皇漢宣者或曰李斯佐始皇定天下不可謂不智扶蘇始皇子秦人戴之久矣陳勝假其名猶足以亂天下而䝉恬持重兵在外使二人不即就誅而復請之則斯髙無遺類矣以斯之智而不慮此何哉蘇子曰秦之失道有自來矣豈獨李斯之罪自商鞅變法以誅死為輕典以夷三族為常法人臣狼顧脅息以得死為幸何暇復請方其法之行也求無不獲禁無不止鞅自謂軼堯舜駕湯武矣及其出亡而無所舍然後知其為法之弊夫豈獨鞅悔之秦亦悔之矣荆軻之變持兵者熟視始皇環柱而走莫之救者以秦法重故也李斯之立胡亥不復忌二人者知秦法之素行而臣子之不敢復請也二人不敢復請亦知始皇鷙悍而不可回也豈料其僞為也哉周公曰平易近民民必歸之孔子曰有一言而可以終身行之者其恕乎夫以忠恕為心平易為政則上易知而下易逹雖有賣國之姦無所投其隙倉卒之變無自發焉然其令行禁止蓋有不及商鞅者矣而聖人終不以彼易此鞅立信於徙木立威於棄灰刑其親戚師傅積威信之劇以及始皇秦人視其君如雷電鬼神之不可測者也古者公族有罪三宥然後制刑今至使人矯殺太子而不忌太子亦不敢請則威信之過也故夫以法毒天下者未有不反中其身及其子孫也漢武與始皇皆果於殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寧反而不訴知訴之必不察也戾太子豈欲反者哉計出於無聊也故為二君之子者寧死與反而已李斯之智蓋足以知扶蘇必不反也吾又表而出之以戒後世人主之果於殺者䝉恬溫公曰䝉恬為秦築長城二世囚而誅之始皇方毒天下而䝉恬為之使恬不仁可知矣然恬明於為人臣之義雖無罪見誅能守死不二斯亦足稱也潁濵曰䝉氏為秦吞滅諸侯其所以殘暴多矣子孫無罪戮死此天意也恬以長城之役竭民力斷地脉自知當死而毅以忠信事上自計無罪死而不厭夫偷合取容咎亞李斯此其所以不免者哉然始皇病於琅琊使毅還禱山川至于沙丘而崩使毅尚從則趙髙李斯廢適之謀殆不能發烏乎天之所廢人謀固無所復施耶歷代名賢確論卷三十五
