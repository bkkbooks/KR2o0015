body:
  text: 歴代名賢確論卷四十三武帝上孝武免亡秦之禍温公窮兵四夷張祐何去非子由王恢韓安國論擊匈奴子由東坡封田千秋為富民侯溫公張詠李廣利伐宛取馬封海西侯溫公用主父偃策削諸侯地荆公用宦者典尚書王元之戾太子溫公封禪林簡言羅隱好神仙李華李徳裕狄山與張湯爭議東坡見衛青汲黯東坡汲黯東坡司馬相如東坡劉蛻李白栁子厚孝武免亡秦之禍温公曰孝武窮奢極欲繁刑重斂内侈宫室外事四夷信惑神怪廵遊無度使百姓疲弊起為盜賊其所以異於秦始皇者無幾矣然秦以之亡漢以之興者孝武能遵先王之道知所慕效受忠直之言惡人欺蔽好賢不倦誅賞嚴明晚而改過顧託得人此其所以有亡秦之失而免亡秦之禍乎窮兵四夷張祜詩曰漢代非良計西戎世世塵無何來善馬不算苦生民外國讐虚結中華憤莫伸卻教為後恥昭帝遠和親又曰留名魯連去於世絶遺音盡愛聊城下寧知滄海深偶然飛一箭無事在千金迴望凌煙閣何人是此心何去非曰兵有所必用雖虞舜太王之不欲固當舉之有所不必用雖蚩尤秦皇之不厭固當戢之古之人君有忘戰而惡兵其敝天下皆得以陵之故其勢蹙於弱而不能振有樂戰而窮兵其敝天下皆得以乗之故其勢蹷於强而不知屈然則兵於人之國也有以用而危亦有以不用而殆矣西漢之興歴五君而至於孝武自高帝之起匹夫誅强秦蹙暴楚已而平反亂征不服迄於其世而天下伏尸流血者二十餘年吕后惠文乗天下初定與民休息深持柔仁不校之德其於兵也固憚言而厭用之也可謂知天下之勢矣孝景之於漢也蓋威可抗而兵可形之時也然而即位未幾卒然讙於七國之變故其心氣創艾亦姑安天下之無事未暇為天下之勢慮也然其為漢之勢亦浸以趨弱矣孝武帝以雄才大畧承三世涵育之澤知夫天下之勢將就弱而不振所當濟之以威强而抗武節之時也方是時也内無姦變之臣外無强偪之國而世為漢患者獨匈奴耳夫匈奴自楚漢之起乗秦之亂復踐河南之地而其勢始强高帝嘗以三十萬之衆困於白登之圍蓋士不食者七日已解而歸不思有以復之而和親始議矣高后被其嫚書之辱臨朝而震忿矣終之以婉辭順禮慰適其桀驁之情凡此者皆欲與民息肩姑置外之而不校也孝文之立其所以順悅輸遺者甚至飾遣宗女以固其懽蓋送車未返而敵已大舉深入矣候騎達於甘泉雍都其後乍親乍絶益為㓂患至於近嚴霸上棘門細柳之屯以衛京都以孝文之寛仁慎靜攝衣發憤親駕而驅之者再乃至乎輟飯搏髀而思頗牧之良能也孝景之世其所以悦奉之情與夫遺給之數又加至矣然其㓂侵之暴信然其不止也由是觀之漢之於匈奴非深懲而大治之則其為後患也可勝備哉是以孝武抗其英特之氣選徒習騎擇命將帥先發而倡誅之蓋師行十年斬刈殆盡名王貴人俘獲百數單于捧手窮遁漠北遂收兩河之地而郡屬之刷四世之侵辱遺後嗣之安强至於宣元成哀之世單于頓顙臣順謁期聽令以朝位次比内諸侯雖曰勞師匱財而功烈之被逺矣使微孝武則漢之所以世被邊患其戍役轉餉以憂累縣官者可得而預計哉甚矣昧者之議不知求夫天下之勢强弱之任所當然者而猥曰文景為是慈儉愛民而武帝瀆於兵師祈祀至與秦皇同日而非詆之豈不痛哉使孝武不溺於文成五利之姦以重耗天下攘外之役止於衛霍之既死而不窮貳師之兵則其功烈與周宣比隆矣子由曰天下有三病好戰則財竭而民貧畏戰則多辱而無威欲民之無貧則無疾乎國之無威欲君之無辱則無望乎財之不竭此二患者天下未嘗兼有也古之人君各從其所安而處其偏是以不獲全享其利而亦未嘗有兼受其病者昔匈奴之於漢可以見矣文景之世天下治安民至老死不知征伐之勞府庫盈溢其賦於民者三十而取一可謂至盛矣然而匈奴傲慢侵侮至甚不遜輸金繒納錦繡天子之至辱而文景不以為意以求全其民至於武帝不忍數世之忿盡天下之鋭而攻之闢地千里斬馘百萬匈奴之民死者大半洗除先帝之宿恥而誇大中國之氣得志滿意無以加矣而内自疲弊中民之家大抵皆破無復千金之户此二者皆有所就其成功是以有所忍而不顧而智者之論已謂非中國之長算矣王恢韓安國論擊匈奴子由曰天下利害不難知也士大夫心平而氣定高不為名所眩下不為利所怵類能知之人主生於深宫其聞天下事至鮮矣知其一不達其二見其利不覩其害而好名貪利之臣探其情而逢其惡則利害之實亂矣漢武帝即位三年年未二十閩越舉兵圍東甌東甌告急帝問田蚡蚡曰越人相攻其事常耳又數反復不足煩中國往救帝使嚴助難蚡曰特患力不能救德不能覆誠能何故棄之小國以窮困來告急天子不救尚何所愬帝詘蚡議而使助持節發會稽兵救之自是征南越伐朝鮮討西南夷兵革之禍加於四夷矣後二年匈奴請和親行人王恢請擊之御史大夫韓安國請許其和帝從安國議矣明年馬邑豪聶壹因恢言匈奴初和親親信邊吏可誘以利致之伏兵襲擊必破之道也帝使公卿議之安國恢往反議甚堅帝從恢議使聶壹匿馬邑城以誘單于單于覺之而去兵出無功自是匈奴犯邊終武帝無寧歳天下㡬至大亂此二者田蚡韓安國皆知其非而迫於利口不能自伸武帝志求功名不究利害之實而遽從之及其晚歳禍災並起外則黔首耗散内則骨肉相賊殺雖悔過自咎而事已不救矣然嚴助以交通淮南張湯論殺之王恢以不擊匈奴亦坐棄市二人皆罪不至死而不免大戮豈非首禍致罪天之所不赦故耶東坡曰王恢與韓安國論擊匈奴上前至三反復安國初持不可擊甚堅復乃云意者有他謬巧可以禽之則臣不可知也安國揣知上意所向故自屈其議以信恢爾不然安國所論殆天下所以存亡者豈計於謬巧哉安國少貶其論兵連禍結至漢幾亡可以為後世君子之戒又曰漢武帝違安國而用王恢然卒殺恢是有秦繆公違蹇叔之罪而無用孟明之之德也封田千秋為富民侯温公曰天下信未嘗無士也武帝好四夷之功而勇鋭輕死之士充滿朝廷闢土廣地無不如意及後息民重農而趙過之儔敎民耕耘民亦被其利此一君之身趣好殊别而士輒應之誠使武帝兼三王之量以興商周之治其無三代之臣乎張詠擬富民侯傳贊曰漢武晚年以丞相為富民侯富民大本也侯爵勸功也惟導之若此將復古王之功歟嘻大朴未散民命在天風敎既闢民命在賢賢不可黷黷之非賢先王本仁孝以辨之民不可擾擾之生弊先王本簡儉以御之粤自桀作瑶臺民始知勞秦易井田民始知弊所謂上闊其欲而下散其束四人桓桓去勞就安百途鑿鑿彫偽散朴衰周之民也真可哀哉一作之百取之斑白不得息稚齒而趨驅焦勞力竭而飢凍繼之浮民姧我利非賢盜我食何嘗少得佑助徒俾日攻之故謂令德日埋窮兵亦私末途喧喧而大本取弊者於斯也哉非有大聖上智其誰拯之歟漢洗秦弊七十年武緯文經漸被四海以高祖之仁文帝之儉尚不能推民壽鄉功磨三代加於武皇事威窮侈四十年間民力凋半亟下富民之詔尊為上公之號憂勞誠思亦至矣乎徒知民富而後國富不知國正而後民治吁不能師三代育民之法以事末術良可悲矣亦猶止奔流之舟雖萬斯篙未若五尺之纜之要也療已弊之民雖百斯術未若一正其本之仁也烏乎末途未塞本弊不正欲民富國昌者未之有也漢雜霸道史或過矣余愛其君有富民之志臣榮富民之號又憤不能開通之因附史氏作贊以矯之贊曰五后之世事簡而民靜夏商周之世事正而民治故貧富之名稀所稱焉二代之季四人亂倫百途競新蚩蚩餓甿無階休存之遂使抱仁義智能者易以要功於其間如武皇帝命富民侯又如何哉又如何哉使李廣利伐宛取馬封海西侯溫公曰武帝欲侯寵姬李氏而使廣利將兵伐宛其意以為非有功不侯不欲負高帝之約也夫軍旅大事國之安危民之死生係焉茍為不擇賢愚而授之欲徼幸咫尺之功藉以為名而私其所愛則不若無功而侯之為愈也然則武帝有見於封國無見於置將謂之能守先帝之約愚曰過矣用主父偃策削諸侯地王荆公曰始讀孟子見孟子言王政之易行心則為誠然及見與慎子論齊魯之地以為先王之制國大抵不過百里者以為今有王者起則凡諸侯之地或千里或五百里皆將損之至於數十百里而後止於是疑孟子雖賢其仁智是非一天下亦安能毋刼之以兵革而侵數百千里之强國一旦肯損其地之十八九而比於先王之諸侯至其後觀漢武帝用主父偃之策令諸侯王地悉得推恩分其子弟而漢親臨定其號名輒别屬漢於是諸侯王之子弟各有分土而勢强地大者卒以分析弱小然後知慮之以謀計之以數為之以漸則大者固可使小强者固可使弱而不至乎傾駭變亂無敗傷之釁孟子之言不為過用宦者典尚書王元之曰武帝以遊宴後庭公卿不得入改用宦者典尚書尚書之官起於秦代漢因置之自高祖已來並用士人矣所以出納詔命通掌圖書擬元象則謂之文昌考上古則謂之司㑹專席而坐華省以居服進賢之冠納言之幘拜則為之冊命薨則為之發哀居三獨座之尊當二千石之貴茍非明故事識舊典者得非尸祿而曠位乎武帝以遊宴之樂任閹豎之徒於是乎失正名矣書曰任官惟賢材左右惟其人傳曰器與名不可以假人且官得其人民受其賜非其人民罹其苦為國者可不慎乎况夫國之有尚書猶天之有北斗李固謂之喉舌韋彪比之樞機可不慎選其人乎且宦者四星在帝座之側聖人法天而置之耳所以於宫掖之間備閽守之用持觴進膳而已今使之總領五曹提挈百揆專臺閣之任同冡宰之司不亦難矣哉亦猶授豹舄於跣夷遺龍章於裸壤也歴觀往古有國之君親比於宦人者鮮不亂於邦家矣嗚呼黑貂絳服天閣禮闈漢之重秩也為宦者有之可痛惜耳遂使姦倖求進摩肩于朝廷忠直偷安遁迹於林麓夫如是則百工三事能無轍亂者乎且恐後之有國者迹為故事因議以明之戾太子溫公論皇子弗陵之生因命其母鈎弋宫門曰堯母門曰為人君者動靜舉措不可不慎發於中必形於外天下無不知之當是時也皇后太子皆無恙而命鉤弋之門曰堯母非名也是以姦臣逆探上意知其竒愛少子欲以為嗣遂有危皇后太子之心卒成巫蠱之禍悲夫又曰古之明王敎養太子必為之擇方正敦良之士以為保傅師友使朝夕與之游處左右前後無非正人出入居處無非正道然猶有淫放邪僻而陷於禍敗者焉今乃使太子自通賓客從其所好夫正直難親諂諛易合此固中人之常情宜太子之不終也封禪林簡言曰仲尼以季氏旅於泰山為僭觀漢武封泰山非僭歟抑聞無其位無其德為事僭也有其位無其德為事亦僭也又聞封泰山報成功也斯皆德稱乎位者為之若伏羲神農者也若黄帝顓頊者也若堯舜禹湯者也漢武封禪奚慕哉秦乎伏羲乎堯舜乎秦封禪二代而秦滅固不可慕也若以伏羲堯舜為心亦宜訪伏羲堯舜之道歟以所行之道侔之乎不侔之乎彼茅茨不翦而木不呈材豈曰侔哉彼舞干羽於兩階而黷武窮邊豈曰侔哉彼用䕫典樂而李延年進豈曰侔哉彼設謗木而捕人誹者死豈曰侔哉凡所舉雖厮養之人亦知不侔矣在漢武計宜罷去不侔行其侔者已行之則卿大夫行之卿大夫行之則國人行之夫如是雖不封禪而伏羲堯舜之德之美自至矣奈何不遵此道取司馬相如諛佞遺草内欺於方寸而不能自忖外欺於千古矯名竊德冐烟雲躡淩兢封泰山禪梁父好商辛夏癸之好迹伏羲堯舜之迹季氏之僭安可逃乎昔齊桓公議封禪管夷吾用他辭以罷之以其無帝王位故也夫無德與無位相去幾何儻漢朝有人如管夷吾應用三脊茅以藉口不使其君與季氏等羅隱論山呼曰人之性未有生而侈縱者茍非其正則人能壞之事能壞之物能壞之雖貴賤則殊及其壞一也前後左右之諛佞者人壞之也窮游極觀者事壞之也發於感寤者物壞之也是三者有一於是則為國之大蠧孝武帝承富庶之後聽左右之説窮游觀之靡乃東封焉蓋所以祈其禎而不祈其歳時也由是萬歳之聲發於感寤然後踰遼越海勞師弊俗以致於百姓困窮者東山萬歳之聲也以一山之聲猶若是況千口萬舌乎是以東封之呼不得以為祥而為英主之不幸好神仙李華詩曰日照崑崙山羽人披羽衣乗龍駕雲霧欲往心無違此山在西北乃是神仙國靈氣皆自然求之不可得何為漢武帝精意徧羣山縻費鉅萬計宫車終不還蒼蒼茂陵樹足以戒人間李德裕曰秦皇漢武非好道者也始皇擒滅六國兼羲唐之帝號漢武翦伐匈奴恢商周之疆宇皆開闢所未有也雖不能尊周孔之道以為教化用湯武之師以行弔伐而英才遠畧自湯武已降鮮能及矣豈不寤方士之詐哉蓋以享國既久歡樂已極馳騁弋獵之力疲矣天馬碧雞之求息矣魚龍角觝之戲倦矣絲竹鞞皷之音厭矣以神仙為竒以方士為翫亦庶幾黄金可成青霄可上固不在於嗇神鍊形矣何以知之荀卿稱千人萬人之情一人之情是也百王之道後王是也余聞武宗之言是以知耳嘗於便殿言及方士皆譎詐丕誕不可信也上曰吾知之矣宫中無事以此遣悶耳余嘗覽曹植論左慈對君達之類家王及植兄弟以優笑蓄之耳斯言信矣大抵方士皆習靜者為之隱身巖穴不求聞達如山鹿野麋是其志也豈樂翹車之召哉敢自衒其術面欺明主者亦鮮矣時既不用逐之可也殺之非也若以其詐而可誅則公孫卿欒大無非行詐殺其干勢利以自衒者足以大戒蘭艾同焚斯為甚矣貞觀末高宗不誅天竺方士那邏邇婆娑寐逐之歸國斯可謂後王法矣狄山與張湯爭議東坡曰謹按漢制博士秩皆六百石爾然朝廷有大事必與丞相御史九卿列侯同議可否盖親儒臣尊經術不以小臣而廢其言故狄山得與張湯爭議上前此人臣之所甚難而人主之所欲聞也温顔以來之虚懐以受之猶恐不敢言又況如武帝作色憑怒致之於死乎故湯之用事至使盜賊半天下而漢室幾亂蓋起於狄山之不容也見衛青汲黯東坡曰漢武無道無足觀者惟據厠見衛青不冠不見汲長孺為可佳耳若青奴才雅宜䑛痔據厠見之正其宜也汲黯東坡曰古之賢君知直臣之難得忠言之難聞故生盡其用殁思其言想見其人形於夢寐亦可謂樂賢好德之至矣漢武帝雄才大畧不減太宗汲黯之賢過於世南世南已死太宗思之汲黯尚存而武帝厭之故太宗之治幾至刑措而武帝之政盜賊半天下由此也夫司馬相如東坡曰司馬長卿始以汚行不齒於蜀人既而以賦得幸天子未能有所建明立絲毫之善以自贖也而創開西南夷逢君之惡以患苦其父母之邦乃復矜其車服節旄之美使邦君負弩先驅豈詩人致恭桑梓萬石君下里門之義乎卓王孫暴富遷虜也故眩而喜耳蜀多君子何喜之有又相如歸臨卭臨卭令王吉謬為恭謹日往覲相如相如稱病使從者謝吉及卓氏為具相如又稱病吉自往迎相如觀吉意欲與相如為率錢之㑹耳而相如遂竊妻以逃大可笑其喻蜀父老云以諷天子以余觀之不獨不能諷殆幾於勸也諂諛之意死而不忘猶作封禪書如相如真所謂小人也哉又詩曰相如偶一官蚩鄙蜀父老不記犢鼻時滌器混庸保著書曾幾許渴肺灰土燥琴書有遺魄笑我歸不早作書遺故人皎皎我懐抱余生幸無媿可與君平道又曰陳皇后廢處長門宫聞相如工為文奉百金為相如文君取酒相如為作長門賦以悟主上皇后復得幸予觀漢武雄猜忍暴而相如乃以微詞褻慢及宫闈間太史公一說李陵事以為意沮貳師遂下蠶室陳皇后得罪止坐衛子夫子夫之愛不減李夫人豈區區貳師所能比乎而於相如之賦獨不疑其有間於子夫者豈非幸與不幸固自有命歟世以禍福論工拙而以太史公不能保身於明哲者皆非通論也劉蛻曰漢武帝聞子虚賦初恨不與相如同時既而復喜其人之在世也若然者居蓬蒿而名聞之於天子富貴固不足疑其来爵土固不足畏不大今按其本傳云官則止使者居家初則甚貧嗚呼有才如相如者好才如漢武帝然而不逮者蛻知之矣於時武帝以四境為心中國耗弱爵土酬於謀臣金帛竭於戰士雖念一篇之子虛固不能減十夫之口食宜矣李白大獵賦序曰賦者古詩之流辭欲壯麗義歸博逺不然何以光贊盛美感天動神而相如子雲競誇辭賦歴代以為文雄莫敢詆訐臣請語其大畧竊或褊其用心子虚所言楚國不過千里夢澤居其大半而齊徙吞若八九三農及禽獸無息肩之地非諸侯禁淫述職之義也上林云左蒼梧右西極考其實地周袤纔經數百長楊誇胡設網為周阹放麋鹿其中以搏攫充樂羽獵於靈臺之囿圍經百里而開殿門當時以為窮壯極麗逮今觀之何齷齪之甚也但王者以四海為家萬姓為子則天下之山林禽獸豈與衆庶異之而臣以為不能以大道正君示物周博乎文論苑囿之小竊為微臣不取也柳子厚曰昔漢室方盛文章之徒合於京師亦既充金馬盈石渠則又溢於諸侯求達其道故枚乗客於吳相如遊於梁其或致書匡主用極其志節之大者也適時觀變以成其性道之茂者也歴代名賢確論卷四十三
