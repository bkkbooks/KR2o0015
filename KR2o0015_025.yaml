body:
  text: 歷代名賢確論卷二十五孔子下歷聘荆公盛均潁濱見陽貨見南子公山不狃佛肸召潁濱荆公東坡子西晏嬰毁孔子溫公厄陳蔡范文正公曾子固王元之祭祀夫子昌黎六一有若似孔子潁濱歷聘荆公曰古之人僕僕然勞其身以求行道於世而曰吾以學孔子者惑矣孔子之始也食於魯魯亂而適齊齊大夫欲害己則反而食于魯魯受女樂不朝者三日義不可以留也則烏乎之曰甚矣衛靈公之無道也其遇賢者庶乎其猶有禮耳於是之衛衛靈公不可與處也於是不暇擇而之曹以適于宋鄭陳蔡衛楚之郊其志猶去衛而之曹也老矣遂歸于魯以卒孔子之行如此烏在其求行道也夫天子諸侯不以身先於賢人其不足與有為明也孔子而不知其何以為孔子也曰沽之哉沽之哉我待價者也僕僕然勞其身以求行道於世者是沽也子路曰君子之仕行其義也道之不行已知之矣蓋孔子之心云耳然則孔子無意於世之人乎曰道之將興歟命也道之將廢歟命也茍命矣則如世之人何盛均論曰學者多稱仲尼歷聘不遇吾謂仲尼觀禮行道不歷聘不遇吾謂仲尼觀禮也夫二國交歡曰聘以臣使於君亦曰聘男輸財於女國駕帛於士皆曰聘故無財與無君國之命一不聘也當德蝕衰周道徂七國蓋仲尼傷禮樂不起是以學韶於齊求師於周將欲鑄義以鏡國張仁以羅俗使明笥為宗資也且去國適衛蓋辭在於仕矣自宋之鄭殆非臣矣絶糧於陳蔡亦無財矣官至司寇果不為士安謂聘哉吾聞夫子觀夏道則之杞觀殷道則之宋較是而言雖他國可知也安謂歷聘哉潁濱曰孔子一用於魯有成功矣而魯定公季桓子皆庸人一為女樂所娛視棄孔子如脫弊屣孔子去魯而遊諸侯有意於擇君矣乎當是時諸侯無可言者衛靈公雖無道而善用人仲叔圉治賓客祝鮀治宗廟王孫賈治軍旅以無失其國孔子宜可輔焉是以去魯三年而往反於衛者四及知其不用然後適陳適蔡皆再孔子之於陳蔡無取焉耳陳蔡近於楚而楚昭王葉公諸梁一時賢君臣也盤桓以俟焉前後六年見葉公不合卒見昭王將用之矣而子西間之昭王亦死知諸侯無復可與共事者然後浩然有歸老之意然反於衛五年以須魯人之招也蓋翔而後集故歟孔子於衛見南子於魯欲從公山弗擾於晉欲從佛肹弟子或疑之而後世亦未免焉昔栁下惠嫗不建門之女魯人不以為淫魯有男子與婦人皆獨居婦人有急將從之拒而弗納婦人曰子何不為栁下惠男子曰栁下惠則可吾則不可孔子聞之曰學栁下惠者未有若此人也然則此亦孔子之所獨歟孔子見陽貨見南子公山不狃佛肸召潁濱曰孔子居魯陽貨欲見而不往陽貨瞰其亡也而饋豚孔子亦瞰其亡也而往拜之遇諸途與孔子三言孔子答之無違孔子豈順陽貨者哉不與之較耳孟子曰當是時陽貨先豈得不見夫先之而必答禮之而必報孔子亦有不得已矣孔子之見南子如見陽貨必有不得已與子路疑之而孔子不辨也故曰豫所否者天厭之以為世莫吾知而自信於天也東坡曰孔子之事可疑者三公山不狃佛肸之召南子之見此三者皆非常道惟孔子則可故曰聖達節聖人之於元惡大憝皆許其悔過無絶法也二子叛臣而孔子欲從之二子聞之必曰孔子不吾絶也吾猶得為君子也雖不能為君子其為惡必有齊量矣雖然示欲往而卒不往示欲往者權也卒不往者正也設網以取魚不可使魚知其為網也設權以來小人不可使小人知其為權也故孔子於公山不狃佛肸之事皆未嘗正言之言其必不然者曰如有用我者吾其為東周乎又曰吾豈匏瓜也哉焉能繫而不食使叛臣為東周而自比於匏瓜此豈誠然哉雖至愚知其不然也至於南子之事亦猶是也而弟子之疑甚不可以不一出故孔子矢之矢之者正言之謂也著此之為正言以明昔者之非正言也曰子之於人也無所不受子之所不受則天之所棄也天豈棄人哉人自棄也子之所不受則人自棄人自棄則天棄之此子之所以不敢輕絶於人也又論公山弗擾召曰孔子之不助畔天下之所知也畔而召孔子其意必不在於惡矣故孔子因其有善心而收之使不自絶而已佛肸之不能為東周亦明矣然而用孔子則有可以為東周之道故子欲往者以其有是道也卒不往者知其必不能也又論佛肸召曰雖有君子不入之言亦有不磷不緇之說是或一道也子路知其一不知其二然而二者舉非也孔子之意則有在矣荆公論見南子背蒲盟曰孔子見南子為有禮則孔子不可告子路曰是禮也而曰天厭之乎孟子曰男女授受不親禮也嫂溺援以手者權也若有禮而無權則何以為孔子天下之理固不可以一言盡君子有時而用禮故孟子不見諸侯有時而用權故孔子亦見南子孔子與蒲人盟而適衛者將以行法也不如是則要盟者得志矣且有志于人而不得行則聖人之無所奈何孔子適衛非蒲之所能至則孔子何為而不適衛蓋適衛然後足以明義此孔子之所以適衛也子西晏嬰毁孔子溫公論史載楚昭王將以書社地七百里封孔子令尹子西曰文武百里之君卒王天下今孔丘得據土壤賢弟子為佐非楚之福也乃止溫公曰子西楚之賢令尹也楚國賴之亡而復存危而復安其志猶晏嬰也其言豈容鄙淺之如是哉又論齊景公欲以尼溪田封孔子晏嬰進曰夫儒者滑稽而不可執法倨傲自順不可以為下游說乞貸不可以為國溫公曰晏嬰忠信以有禮愛君而樂善於晉恱叔向於鄭恱子反於吳恱季札豈以孔子獨不知而毁乎厄陳蔡范文正公曰困水在澤下澤方竭焉其道不加於物君子困窮之時也夫水者漫於外而後施於物今伏於其內何施之有是則川澤竭而伏其流君子困而隱其道困於險而不改其說坎險也兌說也其惟君子乎能固窮而樂道哉茍不安其困欲尚口而去之窮斯甚矣如此時者卷而懷之極然後反其困必亨故曰困亨夫子之於陳蔡也豈其憂乎曾子固曰天地欲泰而先否欲明而先晦天地不否萬物豈知大德乎日月不晦萬物豈知大明乎天下至聖者堯舜禹湯文武周公孔子也堯有洪水之災舜有井廩之苦禹有殛鯀之禍湯有大旱之厄文王有羑里之囚周公有管蔡之謗孔子有絶糧之難噫聖人承萬古之美豈以一身為貴乎是知合天地之德不能逃天地之數齊日月之明不能違日月之道泰而不否豈見聖人之志乎明而不晦豈見聖人之道乎故孔子在陳也講誦弦歌不改常性及犯圍之出列從而行怡然而言美之為幸又曰君子不困不成王業果哉身沒之後聖日皎然文明之君封祀不絶有開必先信其然也於戲先師夫子聘於時民不否遁於世民不泰也否則否於一時泰則泰於萬世是使後之王者知我先師之道捨之則微用之則昌習之則貴敗之則亡道之美此孰為厄乎王元之厄臺銘曰天地厄於晦暝日月厄於薄蝕山川厄於崩竭聖人生而肖天地且禀日月之靈粹得無有于厄乎所以虞舜厄于歷山帝禹厄于洪水成湯厄于夏臺文王厄于羑里我先師夫子厄于陳其道一也于時周室卵危魯道糜潰仁義路絶奢僭源開列國用權蝟芒而起壞禮樂于糟粃視詩書于芻狗孩介王室糞壤儒風俎豆不修軍旅用事茍有衣縫掖而冠章甫者鮮不拔㦸而刺之三綱五常蓋掃地矣夫子抱帝王之道處衰亂之世痛五教之大壞嫉四維而不張刳道德為船航將欲濟天下之墊溺斫禮法為耒耜將欲芟天下之荒穢故不程其力不顧其世聚三千之徒聘七十之國應機設教與世垂範然佩蘭于鮑肆孰聞其熏施法于亂主孰聞其正斯謂天柱將傾折建一指而扶之艱哉為力乎故教不用于哀定位不崇于季孟遜辭于陽貨見忌于子西至於樹迹亦必削而伐之況文行忠信果得用於世耶卒致天厭聖道絶糧于陳顏冉之徒餒目相視我先師則坦爾無悶怡然自居腹虛腸乾未始太息蓋聖人為人也不為已也憂道也不憂巳也但欲綴皇綱之絶緒闢帝道為坦途酌三代禮文垂萬古典憲與被王澤浸于生民茍道至于是雖不食而死固無恨哉不然夫豈不知列國有膏粱之祿陪臣竊鍾鼎之食但詭辭婉貌取之如拾芥豈獨區區于六合中以寒餓而自苦耶聖人之用心也不其逺乎吁姦喉佞舌者圖一日之飫飽道醉德者謀萬民之利故教不用乎當時而用于今世位不顯于生前而顯于沒後何則祖述憲章之義雷行天地之間俾夫為君父為臣子者不可斯須而離也得非用于今世耶名載典籍身饗廟食得非顯乎沒後耶與夫圖一日之飫者又何遼哉銘曰僭祿尸位沒則絶祀所謂伊人莫敖之鬼夫子恥之不其餒而飽德醉義沒則垂世所謂伊人箕山之士夫子求諸可謂仁乎巍巍聖人生而道迍歷聘求合絶糧於陳箕山之士可齊其仁莫敖之鬼且非其倫廟食不匱祀典惟新我來舊國荒臺磷磷拂石勒銘德聲益振祭祀夫子昌黎曰自天子至郡邑守長通得祀而遍天下者唯社稷與孔子焉然而社祭土稷祭榖勾龍與棄乃其佐享非其專主又其位所不屋而壇豈如孔子用王者事巍然當座以門人為配自天子而下北面拜跪薦祭進退誠敬禮如親弟子者勾龍棄以功孔子以德固自有次第哉自古多有以功德得其位者不得常祀勾龍棄孔子皆不得位而得常祀然其祀事皆無如孔子之盛所謂生民以來未有如夫子者其賢過於堯舜逺者此其效歟六一曰釋奠釋菜祭之略者也古者士之見師以菜為贄故始入學者必釋菜以禮其先師其學官四時之祭乃皆釋奠釋奠有樂無尸而釋葉無樂則又其略也故其禮亡焉而今釋奠幸存然亦無樂又不遍舉於四時獨春秋行事而已記曰釋奠必有合樂國有故則否謂凡有國各自祭其先聖先師若唐虞之夔伯夷周之周公魯之孔子其國之無焉者則必合於鄰國而祭之然自孔子沒後之學者莫不宗焉故天下皆尊以為先聖而後世無以易學校廢久矣學者不知所師則又取孔子門人之高弟曰顔回者而配焉以為先師隋唐之際天下州縣皆立學置學官生員而釋奠之禮遂以著令其後州縣學廢而釋奠之禮吏以其著令故得不廢學廢矣無所從祭則皆廟而祭之荀卿子曰仲尼聖人不得勢者也然使其得勢則為堯舜矣不幸無時而沒特以學者之故享弟子春秋之禮而後之人不推所謂釋奠者徒見官為立祠而州縣莫不祭之則以為夫子之尊由此為盛甚者乃謂生雖不得位而沒有所享以為夫子榮謂有德之報舉堯舜莫若何其謬論者與祭之禮以迎尸酌鬯為盛釋奠薦饌直奠而已故曰祭之略者其事有樂舞授器之禮今又廢則於其略者又不備焉然古謂吉凶鄉射賓燕之禮民得而見焉者今皆廢而州縣幸有社稷釋奠風雨雷師之祭民猶得以識先王之禮器焉其牲酒器幣之數升降俯仰之節吏又不多能習至其臨事舉多不中而色不莊使民無所瞻仰見者怠焉以為古禮不足復用可勝歎哉宋之興於今八十年天下無事方修禮樂尊儒術以文太平之功以謂王爵未足以尊夫子又加至聖之號以褒崇之講正其禮下於州縣而吏或不能諭上之意凡有司簿書之所不責者謂之不急非師古好學莫肯盡心焉有若似孔子潁濱曰茍至於君子未有無恥者也孟子稱禹崩益避禹之子於箕山之陰朝覲訟獄者皆不之益而之啓然後益不敢踐天子位太史公稱孔子既沒弟子以有若貌類孔子師之如孔子時及問而不能答乃斥去之夫以益有若之賢而其無恥至此極歟且月宿于畢而雨不應商瞿四十而生五子此卜祝之事而鄙儒所以謂孔子聖人者也戰國雜說類此者多矣孟子猶不能擇而況太史公乎歷代名賢確論卷二十五
