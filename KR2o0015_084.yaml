body:
  text: 歴代名賢確論卷八十四徳宗二崔祐甫温公盧杞范祖禹孫之翰石守道陸贄范祖禹權徳輿李泌范祖禹溫公蕭復范祖禹姜公輔范祖禹楊炎孫之翰裴延齡范祖禹崔善正李錡范祖禹張唐英李晟東坡范祖禹孫之翰崔祐甫司馬溫公論為相未二百日除官八百人曰臣聞用人者無親疎新故之殊惟賢不肖之為察其人未必賢也以親故而取之固非公也茍賢矣以親故而捨之亦非公也夫天下之賢固非一人所能盡也若必待素識熟其才行而用之所遺亦多矣古之為相者則不然舉之以衆取之以公衆曰賢矣已雖不知其詳姑用之待其無功然後退之有功則進之所舉得其人則賞之非人則罰之皆衆人所共然也已不置毫髪之私於其間茍推是心以行之又何遺賢曠官之足病哉盧杞范祖禹論崔祐甫盧杞曰徳宗性本猜克故小人易入用崔祐甫則治用盧杞則亂祐甫輔之以寛大固益其徳矣杞輔之以嚴刻則合其性焉由其本猜克故也當其即政之始勵精求治猶能任賢一為小人之所指導而終身不復使祐甫用於貞元之後亦豈得行其志哉又論杞為相引裴延齡為學士曰君子與小人莫不引其類而聚於朝人君得一賢者而相之為相者舉其類而進之後之進者亦舉其類繼之者莫非賢也其國未嘗無人焉則是得一賢而百姓被其徳澤者數十年而未已也其任小人也豈特一時之患哉亦舉其類而進之後之進者亦舉其類繼之者莫非小人也是以任一不肖而天下被其災害者亦數十年而未已焉徳宗旣相盧杞而杞復引延齡以自助則其國政可知矣盧杞相於建中之初而延齡用於貞元之後是始終之以小人也故徳宗之世賢人君子常阨窮而道不得行由小人之彚進不已也人君置相可不慎哉又論盧杞保朱泚必不反曰人君如欲知其臣聽其言而以事驗之則忠邪賢不肖可得而見矣姜公輔䇿朱泚必反蕭復言鳳翔必亂見幾知變何其明也盧杞以百口保泚請遣大臣宣慰而吳溆沒於賊又誤援軍興元益危宰相謀國乖刺如此則其人可知也興元之守實公輔與復是頼徳宗雖以為相不旋踵而踈斥之杞幾亡社稷至死而猶以為賢自古論禍難而不悟鮮有如徳宗者也又論帝迫衆議不得已貶杞新州司馬曰徳宗之性與小人合與君子殊故其去小人也難逺君子也易忠正之士一言忤意則終身擯斥盧杞裴延齡之徒至死而念之不衰迫於危亡不得已然後去之君子則於其不可去而逐之矣夫賢之與佞正之與邪聽其所言觀其所行亦足以知之矣徳宗反而易之豈惡治而欲亂哉蓋其性與小人合也孫之翰論杞姦邪曰李勉以盧杞姦邪天下皆知獨徳宗不知所以為姦邪此勉知其一未知其二杞姦邪惑主固有其術其始未必能辨也及以大罪貶竄徳宗復念之此由性所合爾蓋徳宗性忌盧杞性險人臣希主所忌之意而行其險計此固易合也當李懷光赴難興元杞懼言己之罪故沮其朝見致懷光怨望以叛徳宗悟其事已逐杞矣悟其事是辨其姦邪也旣辨而復念之蓋當危難則不敢狥己之情復有過失懼臣下不盡力於平賊也賊旣平復歸京師又欲肆己所為顧朝廷之臣未有如杞能希其意者故念之念之必將用之豈非性有所合也賴忠賢之徒力諫其事杞復早死不然杞必再用用則天下再亂矣後之人君性忌者得不戒之石守道論曰嘗讀唐史見徳宗信任盧杞知大姦有似乎忠大佞有似乎賢深心厚貌外不可知巧邪善諂君不能察使覽袁髙之奏諫官之踈雖幽厲之䝉蔽桓靈之昏暗猶將有以發寤而徳宗曾不少釋其惑待遇益厚蓋有以左道䝉其君也結君之心已深也固君之寵已堅也至杞死而天下為之快徳宗思之不已者信其大姦大佞有似乎忠賢而能蔽君聪明至於宗社崎危而莫之悟也海内怨嗟而莫之覺也任人之際可不察與觀其行括率税間架算除陌歛天下之怨賈禍於國家拒懷光之朝茍一身之安遺憂於宗社千載之下人猶憤惋請觀盧杞之邪徳宗之蔽塞可為後世之鑑矣陸贄范祖禹論贄上書論將兵并關中形勢財利曰賢者之知國如良醫之知疾察其形色視其脈理而識死生之變不待其顛仆而後以為病也陸䞇論用兵之亂如蓍龜之先見何其智哉夫豈如瞽史之知天道乎亦觀其事而知之也非獨如䞇之賢者能知之意天下之凡民亦必有知之者惟人君不覺也天下之患在於人莫敢言而君不得知言之而不聽則末如之何也必亂而已矣又論䞇上䟽勸帝從諫帝謂其失在推誠曰徳宗播遷幾於亡國不能反求諸己而以為失在推誠既過而不改又諫而不從乃疑臣下之揚其惡而掠其美因不復以聽納為事甚矣其無人君之德也陸贄之言曲盡其情者其聽從曾無一二愚故剟其大畧以見徳宗之性與其行事以為戒哉又論上與䞇謀事人謂内相上行止必與之俱曰徳宗於危亂之中斯須不可無䞇及其用裴延齡之譖則棄之如脱屣然于所厚如此宜其無所不薄也詩曰將恐將懼惟予與女將安將樂女轉棄予其徳宗之謂矣又論䞇上䟽諫上疑山北來者為窺覘欲拘之曰徳宗好察而不明是以致亂而不自知其非陸贄欲正其心術故必原其禍之所起而極論之使之懲既往之失防未然之悔也詩曰猶之未逺是用大諫陸贄有焉又論䞇諫帝下詔訪裹頭内人曰徳宗不能虚已以納諫雖勉從陸贄之言不降詔而遣使是閉其門而由戸出也人君茍不能强於為善諫之為益也少哉又論贄諫帝不可對趙憬論政事曰凡此皆徳宗心術之蔽也故蕭復諫之於前陸贄論之於後而終不改蓋自以為得馭下之術而不知失為上之道是以愈疑而愈闇也又論裴延齡趙憬譖陸贄罷相曰人君欲聞外事豈不有賢者可任以為耳目乎徳宗知延齡誕妄而信之是自蔽耳目也其惑亦甚矣夫姦臣之立於朝非獨狡佞足以惑其君心必有大臣之不忠者附益而封植之故不可去也延齡之親寵陸贄之廢黜趙憬實為之助憬之罪大矣必若治之以春秋之法憬其為誅首歟權德輿曰嘗讀賈誼書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能達四聰而盡其善排羣議而試厥謀道之難行亦已乆矣東陽絳灌何代無之嘻一薰一蕕善惡不能同其器方鑿圓枘良工無以措巧心所以治世少而亂世多大雅衰而正聲寢漢道未融既失之於賈傅吾唐不幸復擯棄於陸公公之秉筆内署也㩁古揚今雄文藻思敷之為文誥伸之為典謨俾􅘀狡向風懦夫增氣則有制誥集一十卷覽公之作則知公之為文也潤色之餘論思獻納軍國利害巨細必陳則有奏草七卷覽公之奏則知公為臣也其在相位也推賢與能舉直措枉將斡璿衡而掲日月清氛沴而平泰階敷其道也與伊説争衡考其文也與典謨接軫則有中書奏議七卷覽公之奏議則知公之事君也古人以士之遇也其要有四焉才位時命也仲尼有才而無位其道不行賈生有時而無命終於一慟唯公才不謂不長位不謂不髙逢時而不盡其道非命歟裴氏之子焉能使公不遇哉説者又以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏爭列蓋道未至也應之曰道雖自我宏之在人蜚蝗竟天農稷不能善稼奔車覆轍丘軻亦廢規行若使四君與公易時而相則一否一臧未可知也而致君不及貞觀開元者蓋時不幸也豈公不幸哉以為其道未至不亦誣乎李泌范祖禹論帝使李泌分主職事泌對宰相之職不可分曰古之王者惟任一相以治天下唐虞有百揆夏商官可知也周之冡宰實總六卿自司徒以下分職以聽焉詔王廢置者宰也是以治出於一政有所統相得其職君得其道恭己無為而治蓋以此也後世多疑於人宰相之職分而不一君以為權在於己臣亦以為政在於君國之治亂民之休戚無所任責故賢者不得行其所學不肖者得以茍容於其間由官不正任不專也其有功烈見於世稱為賢相者必其得君之專任職之乆言行計從出於一人者也古者名與實稱而後事成功立焉後世不能正名而其實必合於古然後能有成功如欲稽古以建官必以一相統天下始可以言治矣又論上欲廢太子泌諌止之曰李泌善處父子兄弟之間故能以其直誠正言感悟人主卒使父子如初可謂忠矣諂䛕之人助君之決者必曰家事非他人所預陷君於惡率由此言泌以為天子以四海為家則莫非家事以君之子為己任其知相之職業哉又論泌言君相造命曰易曰窮理盡性以至於命自君臣而言之為君盡君道為臣盡臣道此窮理也理窮則性盡性盡則至於命矣孟子曰莫非命也順受其正夫順受其正者人事也人事極矣而後可以言命故知命者不立巖牆之下立巖牆之下而死者人之所取也非天之所為也順其道而死者天之所為非人之所取也故曰命若夫建中之亂有以取之乎無以取之乎若無以取之則不窮兵不暴歛不相盧杞而致亂乃可謂命也若有以取之而曰命豈異於紂乎夫為人君不知相之姦邪不省己之闕失而歸之術者之言以為命宜其德之不建政之不修也李泌之論不亦正乎司馬温公論元友直運錢帛二十五萬泌悉輸之大盈庫上猶有宣索曰王者以天下為家天下之財皆其有也阜天下之財以養天下之民已必豫焉或乃更為私藏此匹夫之鄙志也古人有言曰貧不學儉夫多財者奢欲之所自來也李泌欲弭徳宗之欲而豐其私財財豐則欲滋矣財不稱欲能無求乎是猶啓其門而禁其出也雖徳宗之多僻亦泌所以相之者非其道故也蕭復范祖禹論上以復輕已使宣慰淮南陸贄言復去就帝竟不復辨曰德宗惡正直而保姦邪故親盧杞疎蕭復嫌隙既開無事而疑陸贄之言蓋欲救其心術而執疑恥過不欲辨明寜蓄諸心晻昧不決而已此讒賊之所由入也孟子曰不仁者可與言哉安其危而利其葘樂其所以亡者其徳宗之謂矣又論復謂李勉盧翰在相位不可不與共議政事遂罷相曰蕭復欲黜陳少游賞韋臯此朝廷之公議也德宗茍以為然在於一言使宰相行之而已何疑于李勉盧翰而獨與從一為宻耶且既以為相而不待之以誠則踈逺之臣其可信者幾希矣夫如是忠臣賢者豈得盡其心乎姜公輔范祖禹論公輔以諫厚𦵏唐安公主罷相曰人君置相必求天下之賢蓋欲聞其忠言嘉謀以交修其所不逮也書曰朝夕納誨以輔台徳而後宰相與諫諍之臣分其所職人君得失相不豫焉必責之諌臣此諂䛕之人持禄保位之計非賢者之職業也姜公輔一諫徳宗而徳宗以為非所宜論卒廢黜之不明之君豈知所任相哉楊炎孫之翰論曰楊炎為宰相論内庫之弊使財賦一歸有司言租庸之害定兩稅以便天下才力頗稱其位矣及建議復陵陽渠不從嚴郢之言以起民怨城原州不納段秀實之計以致兵叛何其自欺功業也宰相之任固在盡其才力以當國事茍謀議未至安得不從人之善也况浚渠之事嚴郢引内園植稻之費以明之利害甚顯何故不從其言也原州之議秀實請俟農隙興功是使衆安而事立又何故不納其計也不惟不從不納且讎其人矣蓋炎自恃才力方持大權不欲天下之人一違其議故樹威如此殊不思宰相之議繫天下利害必在於是爾未至於是有違之者安得不從也能從於善人稱賢矣已有賢名則何損於才力何害於大權乎兹至公之道也炎雖有才而心不公故不能成就功業卒至禍敗後之為相者戒之又論貶崖州司馬賜死曰炎懷元載私恩讎劉晏害之此固大罪若正名誅之宜矣然炎之害晏本出私惡徳宗殺炎又非公法始炎誣晏言嘗託附獨孤妃欲立韓王德宗不察虚實便以晏不利於已至遣使先殺晏後詔以忠州叛罪之此君與相俱以私怨心殺害勲賢仍誣其罪用掩己過是上欺於天下欺於人中外寃惜固不能已炎懼人言之多奏遣腹心使於四方言殺晏之事本由君怒以解己罪徳宗聞之又惡殺勲賢之事在已乃怒炎有意誅之若下詔述己聽讒殺賢之過深自咎責雪晏之枉優加贈典正炎之罪肆諸市朝猶可戒己失道明國常憲使姦險者知懼忠憤者快心反擢用盧杞姦惡甚於炎乃加炎他罪殺之又豈公法也為君為相逞怨如是相欲無禍君欲不危難矣裴延齡范祖禹論别置四庫虚張名數以惑上曰自古聚歛興利之臣非有生財之術皆移東於西指虚為實徒張官吏置簿書以罔惑人主取功賞而已由明皇至於徳宗其事不謀而同蓋興利必用小人小人莫不為欺故其所行者由一律也崔善正李錡范祖禹論崔善正言錡不法上械送錡錡坑殺之曰徳宗本惡崔善正直言故使李錡甘心焉善正之死非特以告錡也鉗天下之口而長姦臣之威實徳宗殺之是朝廷殺諫者非錡殺告者也張唐英論曰浙西布衣崔善正上封事言李錡反德宗械善正以賜錡俾坑殺噫善正一布衣也茹藜藿則有八珍之甘處蓬蓽則有藻梲之樂非食國家之禄有憂國家之心蓋以慮肉食者失於廟堂而黎民抱骸於草莽故越數千里至京師一言者言錡之叛為徳宗計者宜念古人之戒欲入澤者問牧童欲入水者問漁師以其知之審也宜先遣一詔使巡行江浙察錡之志有無叛上之謀察善正之言審與不審然後以善正付法未為晚也何至閉聰遏明械之以賜錡使忠義之士死於無辜以箝天下直臣之口哉為錡之計者已既有不臣之迹致善正諫言朝廷釋然不以為信則宜翻然悔過納土歸朝亦不失一節度使彼善正者雖發己之惡宜寛而恕之上章於朝請徳宗任用之以來天下直言之士則可謂善補過矣徳宗旣褊急而以善正賜之李錡又不悔過從而殺之至憲宗之初錡果叛則善正不為狂妄宜下詔旌賞爵其子孫可也而天子與公卿大夫卒不議及於此善正可謂生死無一人知者可哀也哉李晟東坡李西平畫贊曰以吾觀西平王提孤軍自比方赴行在走懷光斬朱泚如反掌及其後帥鳳翔與隴右瞰河隍兵益振謀旣臧終不能取尋常墮賊計困平涼卒罷兵仆三將誰之咎在廟堂斬馬劒誅延賞為菹醢不足償覽遺像涕泗滂范祖禹論以張延賞罷晟兵柄晟謂與吐蕃盟事可憂曰人君於其所不當疑而疑之則於其所不可信而信之矣此必然之理也李晟有復唐室之大功又再敗吐蕃社稷是賴而徳宗猜忌使勲賢憂懼不保朝夕至於讒邪之詭計吐蕃之甘言則推誠而信之不疑一旦罷晟兵柄中外莫不解體行張延賞之私意中尚結贊之隂謀忠賢至計確不可入而奸臣敵國得以欺賣由其心術顛倒見善不明故也延賞以私憾敗國殄民刑孰大焉徳宗曽不致詰使之得保首領死牖下幸矣孫之翰論李晟論張延賞曰初徳宗用延賞相舊史言晟與延賞不協表論其過故改授僕射初觀其事似晟恃功挾怨以沮延賞及詳其本末乃晟忠於徳宗非恃功挾怨也晟雖一代元勲位任崇極常慕魏鄭公為人思致君如貞觀之治事有當言犯而無隱至徳宗用延賞相表論其過者知延賞非宰相器也但徳宗注意延賞必欲大用乃諭晟與之釋憾㑹劉佐韓滉入朝以徳宗意勸晟表薦延賞不得已言之此又見晟不敢恃功固拒君意為强臣之態也延賞既相為徳宗寵待言無不從齊映居相位雖無顯赫事業薦賢頗稱純直延賞與不足逐之逺郡怒晟不解以讒言罷其兵權又忌栁渾忠直擠之罷相本嫉晟社稷大功欲用劉佐李抱真輩收河隴以髙之遂建議减官收俸錢以助軍旣罷晟兵權抱真輩不平遂辭邊任又减官詔下衆言不便延賞復請量留員數以解謗議作相數月銳意報怨舉事輕脫如此此固非宰相器則晟之表論其過豈非忠於徳宗也但徳宗好任姦人必使延賞作相尚以早卒未能大害天下然時政亂矣或曰李晟言張延賞不可大用於主誠忠矣然將帥方成大功領兵權進退宰相可乎答曰將帥賢如晟名徳為天下信服如晟者見天子命相非其人言之可矣不及晟者言之則為强横之臣也歴代名賢確論卷八十四
