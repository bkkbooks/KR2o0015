body:
  text: 歴代名賢確論巻八十九穆宗復失河北孫之翰范祖禹張唐英朋黨范祖禹裴度范祖禹張𢎞靖張唐英張平叔東坡敬宗宦官劉克明弑帝孫之翰范祖禹裴度范祖禹韋處厚孫之翰劉禹錫復失河北孫之翰論曰長慶失河北穆宗昏主崔植杜元穎輩常材皆不足議迹其本由憲宗失之也元和十年憲宗用裴度相至十四年兩河平定天下藩鎮無一跋扈之臣時方治平憲宗遂有驕逸之意以姦人皇甫鏄相逐度出鎮憲宗既逐度穆宗正得用崔植杜元穎輩矣逐賢相而任常才欲天下無事不可得所以復失河北也一賢者相凡四年平定天下數常才相不二年河北復亂所謂天下安危繫於相事豈不明乎或曰憲宗用裴度相雖能平定兩河然鎮之受代在蕭俛段文昌崔植作相之時幽之納土在元穎作相之後二鎮雖復失之本亦由數相得之何闗度事耶答曰裴度初得幽鎮雖在植輩作相之時然本由裴度能定兩河致國威大振鎮州覩諸賊伏誅無所援助納徳棣質愛子朝夕憂懼不敢保首領鎮既懼幽自懾伏矣致國威如是非度而誰植輩相穆宗得鎮得幽乗其時爾有何施為乎亦猶李林甫牛仙客初相明皇尚致天下獄訟稀少也况蕭俛文昌建消兵之議先已失䇿則植輩常才可知也兼不止失幽鎮魏博亦為賊臣所獲矣若憲宗既平天下深念安危之本不縱驕逸不任姦人使度乆於其位經制國事以固大業穆宗雖中常之主顧大勲徳為輔必不至荒僻姦邪恩倖之人憚宰相剛正必不敢肆其所為藩鎮之臣懼宰相威畧必不敢跋扈若是天下豈有事乎憲宗既已逐去賢相穆宗為君僅及中智數常才相之衆邪倖惑之朝政不修法度弛廢藩臣何所憚而不亂也長慶君相之事不足議其本憲宗夫之也范祖禹曰憲宗平河南開魏博由宰相得其人也穆宗拱手而得幽鎮不唯不能有而并魏博失之由宰相非其才也其得之也以相其失之也以相相者治亂之所繫豈不重歟張唐英曰穆宗時范陽節度劉總入朝請分所獻之地以幽營涿為一道請張𢎞靖處之瀛漢為一道盧士政主之平媯檀為一道薛苹主之又籍軍中裨校宿將如朱克融輩薦之闕下兾朝廷擢用以激厲燕薊之俗而宰臣崔植杜元頴無經國謀畧不從其請惟瀛漢置觀察使餘皆俾𢎞靖統領之又朱克融輩日詣中書求官不能得日夕丐食於人及克融隨𢎞靖歸鎮既怨朝廷不用又𢎞靖制馭無術克融遂因𢎞靖與王庭湊連衡為叛既詔遣將出征又毎軍置中官監軍選驍勇以自衛遣羸弱以禦敵王師十五萬不能當克融等一萬皆由左右牽制所致也且憲宗任用才智宵衣旰食焦勞十數年方得河朔地及劉總又納地歸國是賢人君子有為之時也宜用總策及任克融輩以視藩鎮然後選用英才經營天下澄世之所不能澄裁世之所不能裁而乃硜硜自固因循茍且優游嵗月幸須㬰之安而不為乆逺計復稔天下之禍誰使然哉且克融本兇暴之餘宜以好爵羈致之若不用則當除去之奈何既不能用又不能去使其在京師則衣食不給求食於人彼豈無怨憤之心哉譬之養虎當飽其肉食剪其爪牙則無咥人之患若使其有爪牙以自雄復餓且饑豈得不攫人而噬之哉故謂復失河朔非克融遽能為之也崔杜二相失之也所謂規規守文之士不能意外行事其二相之謂乎以此知濟天下者須英豪偉傑之才爾章句書生誰能了國家事哉又論蕭俛段文昌獻消兵之議曰兵者威武之目聖人以是除天下之惡興天下之善其不可去之者乆矣穆宗承章武恢復之後志在偃革宰臣段文昌蕭俛因獻消兵之術宻詔天下之兵毎百人限八人逃亡逃亡者入山林藪澤聚為冦盗蜂屯蟻聚鶚飛隼搏所至村落悉遭毒螫生民於是漸無憀矣及朱克融王廷湊之亂其逃亡之兵多歸之朝廷議討二賊召新兵皆市井烏合累為賊所敗而威沮氣喪不復有師伍之勢於是河朔之地復為賊所有噫章武以雄睿之姿中興唐室驅駕豪英選任將帥區區然二十餘年方定兩河之寇其勤勞宵旰固已至矣而蕭段二子謬于一言遂復失之是時國家所費億萬之財而不得河朔斗粟尺帛可謂差之毫釐而失之千里也夫二子者必欲去冗兵省調度則三代兩漢已來固有制度在方冊可考而行若未能及此則可選其老耄疾病者俾之為農其他驍銳勇敢熟於戰陣者自可有養以備征伐何必立為定制百人限八人逃亡若以當時禁衛言之有兵二十萬毎百人限八人逃亡是天下有一萬六千人逃亡為冦矣此豈不為天下患哉其後至宣宗已後所在寇盗充斥石順起於湖南毛約起於江南康全起於歙州至於恭定乾符之際王郢王仙芝尚君長畢鷂子全繳山一文黑李摩雲劉漢宏李重霸之徒侵陷嶺浙騷繹青徐以至襄漢悉被其毒其中多有逃亡之兵為之聲影其禍皆胎於消兵之謀也朋黨范祖禹論李徳裕李宗閔始為朋黨曰昔漢之黨錮始於甘陵二部相譏而成於太學諸生相譽海内塗炭二十餘年唐之朋黨始於牛僧孺李宗閔對策而成於錢徽之貶皆自小以至大因私以害公凡羣臣有黨由主聽不明君子小人雜進於朝不分邪正忠讒以黜陟之而聴其自相傾軋以養成之也是以穆宗以後權移於下朝無公政士無公論爵賞僭濫刑罰放紛士之附㑹者不入於牛則入於李不憂國家之不治而惟恐其黨之不進也與夫三君八俊厲名節立廉恥以抗權邪者斯為下矣何則漢之黨尚風節故政亂於上而俗清於下及其亡也人猶畏義而有不為唐之黨趨勢利勢窮利盡而止故其衰季士無操行不足稱也為國家者可不防其漸哉裴度范祖禹論度言元稹魏𢎞簡姦蠧以謂朝中姦臣存則逆賊縱除無益曰昔周宣王任賢使能吉父征伐於外而王之所與處者張仲孝友也夫使文武之臣征伐而左右前後得貞良之士善其君心則讒言不至而忠謀見用此所以能成功也茍使憸邪之人從中制之則雖吉父無以成其功宣王能復文武之業以致中興者内順治而外威嚴也穆宗庸昏姦諂在側裴度欲先正其本而後治其末圖其大而後憂其小此輔相之職業也而其君多僻卒無成功蓋自古命將出帥而小人沮之於内未有能克勝者也可不為深戒哉張𢎞靖張唐英論曰𢎞靖之帥范陽也朝廷以其嘉貞之孫延賞之子三世為相委以重柄譬如取嬰兒而投之河謂其父善泅也𢎞靖亦以世胄之貴偃然自尊以誇耀燕俗不能與下同其甘苦復以安史之亂皆自范陽欲革其俗乃發禄山之墓用毁辱燕人復縱從事韋雍張宗厚輩酣肆夜飲呵責士為反虜嘗曰天下無事汝輩挽得兩石弓不如識一丁字於是其下皆怨克融乗人心之二遂囚𢎞靖殺韋雍張宗厚又擊殺義士張徹皆𢎞靖為之也夫以狸而致䑕不可致之是不以致之之道致之也腥致蠅而蠅畢至以致之之道致之也且𢎞靖欲革燕俗則宜以仁厚革彼凶殘宜以純約革彼奢僭宜旌忠良革彼不軌宜執禮法革彼踰軼然後又召燕之父老百姓及三軍之士告以朝廷恩信為善者有賞為惡者有罰其次勸之以孝悌督之以耕戰謹身節用務寜其人而先斵墓以求革風俗豈革之之道哉彼克融者既在部伍亦宜推赤心以置之腹中與說利害禍福曰汝能信順効忠朝廷自有爵賞他日無慮不富貴彼非木石其肯不順信哉設自顧不能則乞朝廷别除賢者以安反側而𢎞靖曾不慮及於此乃恣其僚屬酣酩罵辱彼焉得不相從而唱難哉然則克融非囚𢎞靖乃𢎞靖自囚也而尚不䝉顯戮貶守撫州穆宗真有恩於𢎞靖也張平叔東坡曰樂天作張平叔户部侍郎判度支制詞云與吾坐而決事丞相以下不過四五而主計之臣在焉以此知唐制主計蓋坐而論事也不知四五人者悉何人平叔議鹽法至為刻剥事見退之集樂天制詞亦云計能析秋毫吏畏如夏日度其人必小人也宦官劉克明弑帝孫之翰論昭愍弑曰昭愍年十六即位非上智之性不無童心然能納韋處厚忠言辨李逢吉姦黨知裴度大賢而召之復相從李程之諫輟土木之役得李徳裕所奏令罷進繚綾聴裴度陳論止東都巡幸復數視朝勤於聴政以是觀之本非荒暗之主若忠賢乆於輔導亦庶幾漢昭之比也但為内臣惑亂極其荒僻而崩原其事迹不止昭愍之過乃近世積習之患也何以驗之觀内臣仇士良致仕教其黨曰今日與諸君言久逺計天子莫教閒閒則讀書讀書則重文臣重文臣則廣納規諫減翫好省游幸如此則吾輩恩澤漸薄權力不重諸君但常以毬獵聲樂惑之㳺幸之所極奢侈盡竒技使一處盛於一處如此則天子不暇觀書不親萬機不知外事吾輩恩澤權力永無踈間觀士良之言則内臣姦巧者惑亂人主之術盡見矣内臣以此術惑之在位嵗乆功業之君如憲宗者不能免况沖年之君即位之初乎雖忠賢之臣輔導於外間數日一見率不過數刻接對退則窮日夜内臣姦巧者誘惑之矣以忠賢間日數刻接對所言者多逆意之事姦巧内臣窮日夜惑亂所言者多狥欲之事在沖年之君中人之性何事為勝哉此内臣所以惑亂昭愍之甚也既至於甚沖年之性喜怒無定矣内臣又恨其怒而責罰及慮他禍乃行弑逆之謀七年之間弑逆再矣後之人君觀是事得不懔懔范祖禹曰周公作無逸曰在昔商王中宗享國七十有五年髙宗五十有九年祖甲三十有三年自時厥後立王生則逸或十年或七八年或五六年或四三年夫人君在位之淺深享壽之多少繫其治之逸勤徳之厚薄不可不知也裴度范祖禹論上不信李逢吉之黨毁度復以為相曰孔子言衛靈公無道而不喪曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪言其國猶有人也敬宗狂童足以取亡而能不惑姦言復相裴度雖其身不免而社稷有主天下未亂由得一相故也賢人所繫豈不重哉又論劉克明弑敬宗立絳王悟王守澄誅之立文宗以裴度攝冡宰曰裴度位為上相安危所繫君弑而不討賊君立而不豫謀宫闈有變而外庭不知惟宦者所立則奉以為君耳且二日之間而三易君主廢置皆由宦者不闗宰相則安用大臣矣唐之綱紀於是大壞以度之勲徳處之猶如此而况不賢者乎韋處厚孫之翰論處厚乞相裴度曰韋處厚不顧李逢吉兇威而斥其黨不念裴度舊隙而言其賢此公忠之性過人而益之以至明也當昭愍即位以童年方倚大臣大臣逢吉姦兇人也欺天子幼弱大樹朋黨専報私怨有所貶逺者百僚賀於中書以明快意其姦兇氣艶至此矣在朝之人孰敢犯之者處厚一侍臣孤直自立任郎官日嘗為裴度因事貶官逢吉於度亦所深怨也處厚犯權臣之威稱其所怨復不念己之隙力言其賢蓋以逢吉所為乃兇狂之態我公直無過何畏彼哉度嘗逐我未知我之善也河北之亂非度之才謀不能平定當天子憂憤之時度方為逢吉所抑不得大用我近臣也安得以所隙而不言賢哉是公忠之性過人而益之以至明也夫公忠則専計國事而不為身謀至明則深辨事理之歸處厚盡是道宜乎位至宰輔才業名徳重於天下劉禹錫曰公未為近臣已前所著讚論記述銘志皆文士之詞也以才麗為主自入為學士至宰相以往所執皆經綸制置財成潤色之詞也以識度為宗觀其發徳音福生人沛然如時雨畏元老諭功臣穆然如景風命相之冊和而莊命將之誥昭而毅薦賢能其氣似孔文舉論經學其博似劉子駿發十難以摧言利者其辨似管夷吾噫逢時得君奮智謀以取髙位而令名随之豈不偉哉歴代名賢確論卷八十九
