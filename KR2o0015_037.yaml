body:
  text: 歷代名賢確論卷三十七莊子莊子之道荆公魯直潁濵楊墨楊墨之道昌黎黃垍荆公鄭獬孟子孟子之道皮日休昌黎魯直潁濵孟子養浩然之氣潁濵以佚道使民以生道殺民東坡闢楊墨昌黎孟子言不嗜殺人潁濵孟子將朝玊溫公孟子謂蚳蛙溫公荀子荀卿之道荆公荀卿之學六一荀卿之失東坡荆公諸子通論孟揚荀昌黎孟揚荀言性樊川甫湜昌黎荆公東坡潁濵皇莊子之道荆公曰世之論莊子者不一而學儒者曰莊子之書務詆孔子以信其邪說要焚其書廢其徒而後可其曲直固不足論也學儒者之言如此而好莊子之道者曰莊子之德不以萬物干其慮而能信其道者也彼非不知仁義也以為仁義小而不足行已彼非不知禮樂也以為禮樂薄而不足化天下故老子曰道失後德德失後仁仁失後義義失後禮是知莊子非不逹於仁義禮樂之意也彼以為仁義禮樂者道之末也故薄之云耳夫儒者之言善也然未嘗求莊子之意也好莊子之言者固知讀莊子之書也然亦未嘗求莊子之意也昔先王之澤至莊子之時竭矣天下之俗譎詐大作質朴並散雖世之學士大夫未有知貴己賤物之道者也於是棄絶乎禮義之緒奪攘乎利害之際趨利而不以為辱殞身而不以為怨漸漬陷溺以至乎不可救已莊子病之思其說以矯天下之弊而歸之於正也其心過慮以為仁義禮樂皆不足以正之故同是非齊彼我一利害而以足乎心為得此其所以矯天下之弊者也既以其說矯弊矣又懼來世之遂實吾說而不見天地之純古人之大體也於是又傷其心於卒篇以自解故其篇曰詩以道志書以道事禮以道行樂以道和易以道隂陽春秋以道名分由此觀之莊子豈不知聖人者哉又曰譬如耳目鼻口皆有所明不能相通猶百家衆技皆有所長時有所用用是以明聖人之道其全在彼而不在此而亦自列其書於宋鈃慎到墨翟老聃之徒俱為不該不遍一曲之士蓋欲明吾之言有為而作非大道之全云耳然則莊子豈非有意於天下之弊而存聖人之道乎伯夷之清栁下惠之和皆有矯於天下者也莊子用其心亦工聖人之徒矣然而莊子之言不得不為邪說比者蓋其矯之過矣夫矯枉者欲其直也矯之過則歸於枉矣莊子亦曰墨子之心則是也墨子之行則非也推莊子之心以求其行則獨何異於墨子哉後之讀莊子者善其為書之心非其為書之說則可謂善讀矣此亦莊子之所願於後世之讀其書者也今之讀者挾莊子以謾吾儒曰莊子之道大哉非儒之所能及知也不知求其意而以異於儒者為責悲夫又曰學者詆周非堯舜孔子余觀其書特有所寓而言耳孟子曰說詩者不以文害辭不以辭害意以意逆志是為得之讀其文而不以意原之此為周者之所以訟也周曰上必無為而用天下下必有為而為天下用又自以為處昏上亂相之間故窮而無所見其材孰為周之言皆不可措乎君臣父子之間而遭世遇主終不可使有為也及其引太廟犧以辭楚之聘使彼蓋危言以懼衰世之常人耳夫以周之才豈迷出處之方而專畏犧者哉蓋孔子所謂隱居放言者周殆其人也然周之說其於道既反之宜其得罪於聖人之徒也夫中人之所及者聖人詳說而謹行之說之不詳行之不謹則天下弊中人之所不及者聖人藏乎其心而言之略矣不略而詳則天下惑且夫諄諄而後喻譊譊而後服者豈所謂可以語上者哉惜乎周之能言而不通乎此也魯直曰莊周內書七篇法度甚嚴彼鵾鵬之大鳩鷃之細均為有纍於物而不能逍遙唯體道者乃能逍遙耳故作逍遙遊物之不齊物之情也大塊噫氣萬竅殊聲吾是以見萬物之情狀俗學者心窺劵之外有企尚而思齊道之不著論不明也故作齊物論生生之厚動而之死地立於羿之彀中其中也因論以為命其不中也因論以為智養生者謝養生而養其生之主幾乎無死也矣故作養生主上下四方古者謂之宇往來不窮古者謂之宙以宇觀人間以宙觀世而我無所依彼推也故去彼挽也故來以德業與彼有者而我常以不材故作人間世有德者之驗如印印泥射至百步力也射中百步巧也箭鋒相直豈巧力之謂哉子得其母不取於人而自信故作德充符族則有宗物則有師可以為衆父者不可以為衆父父故作大宗師堯舜出而應帝湯武出而應王彼求我以是與我此名彼俗學者因以塵埃粃糠據見四子故作應帝王二十六篇者解剝斯文稱由莊周以來未見賞音者晚得向秀郭象陷莊周為齊物之書湣湣以至今悲夫潁濵曰按史記莊子與梁惠王齊宣王同時其學無所不窺然其要本歸於老子之言故其著書十餘萬言大抵率寓言也作漁父盜跖胠篋以詆訾孔子之徒以明老子之術此知莊子之粗者余以為莊子蓋助孔子者要不可以為法耳楚公子微服出亡而門者難之其僕操箠而罵曰𨽻也不力門者出之事固有倒行而逆施者以僕為不愛公子則不可以為事公子之法亦不可故莊子之言皆實豫而文不豫陽擠而隂助之其正言也蓋無幾至於詆訾孔子未嘗不微見其意其定天下道術自墨翟禽滑釐彭䝉慎到田駢關尹老聃之徒以至於其身皆以為一家而孔子不與其尊之也至矣然余嘗疑漁父盜跖則若真詆孔子者至於讓王說劍皆淺陋不入於道反復觀之得其寓言之終曰陽子居西遊於秦遇老子老子曰而睢睢而盱盱而誰與居太白若辱盛德若不足陽子居蹙然變容其往也舍者將迎其家公執席妻執巾擳舍者避席煬者避竈其返也舍者與之爭席矣去其讓王說劒漁父盜跖四篇以合於列禦冦之篇曰列禦冦之齊中道而返曰吾驚焉吾食於十漿而五漿先饋然後悟而笑曰是固一章也莊子之言未終而昧者勦之以入其說耳凡分章名篇皆出於世俗非莊子本意楊墨之道昌黎曰儒譏墨以尚同兼愛尚賢明鬼而孔子畏大人居是邦不非其大夫春秋譏専臣不尚同哉孔子泛愛親仁以博施濟衆為聖不兼愛哉孔子賢賢以四科進褒弟子疾沒世而名不稱不尚賢哉孔子祭如在譏祭如不祭者曰我祭則受福不明鬼哉儒墨同是堯舜同非桀紂同修身正心以治天下國家奚不相悅如是哉余以為辨生於末學各務售其師之說非二師之道本然也孔子必用墨子墨子必用孔子不相用不足為孔墨黃垍反讀墨曰墨以尚同兼愛右鬼非命尚儉為本仲尼賢賢惡惡褒貶是非尚同乎哉仲尼尊君卑臣坐父伏子內親外疏别逺近以歸一本兼愛乎哉仲尼不語亂神又不對弟子問鬼神事右鬼乎哉仲尼教人遷善背惡曰性相近習相逺又曰困而不學民斯為下非命乎哉仲尼曰儉則固又譏晏子祭先豚肩不掩豆又曰禮與其奢也寧儉蓋非中制尚儉乎哉墨之道與儒者相戾甚矣使其人不為夷狄禽獸難矣哉或曰韓子云墨與儒同是堯舜同非桀紂治心教人奚不相合如是何謂也對曰誰不克是堯舜非桀紂雖童子婦人聞堯舜喜桀紂罵自然之道也顧其道何如爾小堯舜而大異端又云以非道治心教人其能歸於正乎儒道之正者也墨子反是墨必戾儒儒必譏墨不譏不戾不可謂之儒墨荆公曰楊墨之道得聖人之一而廢其百者是也聖人之道兼楊墨而無可無不可者是也墨子之道摩頂放踵以利天下而楊子之道利天下拔一毛而不為也夫禹之于天下九年之間三過其門聞呱呱之泣而不一省其子此亦可謂為人矣顔回之於身簞食瓢飲以獨樂於陋巷之間視天下之亂若無者此亦可謂為己矣楊墨之道獨以為人為己得罪於聖人者何哉此蓋所謂得聖人之一而廢其百者也是故由楊子之道則不義由墨子之道則不仁於仁義之道無所遺而用之不失其所者其唯聖人之徒歟二子之失於仁義而不見天地之全則同矣及其所以得罪則又有可論者也楊子之所執者為己為己學者之本也墨子之所學者為人為人學者之末也是以學者之事必先為己其為己有餘而天下之勢可以為人矣則不可以不為人矣故學者之學也始不在於為人而卒所以能為人也今夫始學之時其道未足以為己而其志已在於為人也則亦可謂謬用其心矣謬用其心者雖有志於為人其能乎哉由是言之楊子之道雖不足以為人固知為己矣墨子之志雖在於為人吾知其不能也嗚呼楊子知為己之為務而不能逹於大禹之道也則亦可謂惑矣墨子者廢人物親踈之别而方以天下為己任是其所欲以利人者適所以為天下害患也豈不過甚哉故楊子近於儒而墨子逺於道其異於聖人則同而其得罪則宜有間也鄭獬論儒墨使人得失曰天下烏乎治治於儒也天下烏乎亂亂於墨也亂之曰吾禦之不固盜其隙而乘之也儒何道也聖人道也芽于羲蔓于黃堯舜實之禹禹以實于周孔矣諸侯淫汙肆而相翦獵塗汙棘塞涅而不洗獨夫子大攘中截其駻流偃而築之然不遂於用也末俗人眊百家始勝嵬墨唱其徒汩吾夫子之築孟荀懇惻逮病此也夫孰誨斯民也君師者司之也敢原乎古總總然而居倀倀然而趨燠寒渴饑擴于內適知鳥獸穴土巢木以養以處不相用則决然怒攫然鬭强者奪勇者殺君師者發於仁義不忍其溺也拱觀揉伏必徐引而進之不遽以刑迫也男女有合禮以婚聘飲食有燕禮以賔饗哀也為之喪葬思也為之祠祭樂有金石威有鈇鉞凡所措注一原於情性而間以節奏無過也無不勉也矩於家繩於國衡於天下禮義明而情性定是吾道所以兩得之也彼墨者方且溝瞀固弊不特泥其說本儉刻於體非鬭也民拏而目爭非樂也民確而益不和兼愛無父上同漫等級籍嵬墨相天下戕滅禮樂顓律以己俾其君茅茨土階啜土鉶既耕且治天下將槁然相與戾矣啜菽飲水曷充哉禮義去則情性肆是墨者所以兩失之也禮義中也大本也情性之檢也儉愈則陋陋則性情有不能其說不較益可白已嗚呼楊墨不作邪世今無有邪老者獨善不幾於楊乎釋者兼愛不幾於墨乎是楊墨遺俗尚㹞㹞於世而又决其流而漲之築無少完矣吾民于于日怵於邪如炳禮義以曉之性魁嵬墨使之潛化佛然治平之迹繇今日起是亦荀子之志也孟子之道皮日休謂孟子為學科曰聖人之道不過乎經經之降者不過乎史史之降者不過乎子子不異乎道者孟子也捨是子者必戾乎經史又率于子者則聖人之盜也夫孟子之文粲若經傳天惜其道不燼於秦自漢氏得之常置博士以専其學故其文繼乎六藉光乎百氏真聖人之微㫖也若然者何其道曄曄於前其書汲汲於後得非道拘乎正文極乎奧有好邪者憚正而不舉嗜淺者鄙奧而無稱耶蓋仲尼愛文王嗜昌歜以取味後之人將愛仲尼者其嗜在乎孟子矣嗚呼古之士以湯武為逆取者其不讀孟子乎以楊墨為逹智者其不讀孟子乎由是觀之孟子之功利於人亦不輕矣今有司除茂才明經外其次有熟莊周列子書者亦登于科其誘善也雖深而懸科也未正夫莊列之文荒唐之文也讀之可以為方外之士習之可以為鴻荒之民有能汲汲以救時補教為志昌黎曰吾常以為孔子之道大而能博門弟子不能遍觀而盡識也故學焉而皆得其性之所近其後離散分處諸侯之國又各以所能授弟子原逺而末益分蓋子夏之學其後有田子方子方之後流為莊周故周之書喜稱子方之為人荀卿之書語聖人必曰孔子子弓子弓之事業不傳惟太史公書弟子傳有姓名字曰馯臂子弓子弓受易於商瞿孟軻師子思子思之學蓋出曾子自孔子沒羣弟子莫不有書獨孟軻氏之傳得其宗故余少而樂觀焉魯直曰由孔子以來求其是非趨舍與孔子合者唯孟子一人孟子聖人也荀卿著書號為祖述孔氏而詆訾孟子以為略法三王而不知其統蓋荀卿見孟子道性善言必稱堯舜義不見諸侯其迹與孔子不合故云爾曽不知前聖後聖所謂若合符契者要於歸潔其身者觀之孟子論孔子去魯不知以為為肉其知者以為為無禮乃若孔子則欲以微罪行以微罪行此聖人之忠厚非孟子不足以知之學者欲知孟子率以是觀之其智不足以知孟子安能知孔子然則荀卿所謂知孔子者特未可信聖人無名而淳于髠以名實求孟子固不足以知之荀卿曽未能逺過淳于髠也揚子雲曰孟子勇於義而果於德知言之要知德之奧非茍知之亦允蹈之言雖不多以子雲之言行反覆考之足以發子雲之知言司馬遷號稱博極群書至如論伊尹百里奚皆不信孟子此所以得罪於子雲也由孔子以來力於學者多矣而才有孟子由孟子以來力學者多矣而才有揚雄來者豈可不勉潁濵曰昔者仲尼自衛反魯網羅三代之舊聞蓋經禮三百曲禮三千終年不能究其說夫子謂子貢曰賜爾以豫為多學而識之者歟非也豫一以貫之天下苦其難而莫之能用也不知夫子之有以貫之也是故堯舜禹湯文武周公之法度禮樂刑政與當世之賢人君子百氏之書百工之技藝九州之內四海之外九夷八蠻之事荒忽誕謾而不可考者雜然皆列乎胸中而有卓然不可亂者此固有以一之也是以博學而不亂深思而不惑非天下至精其孰能與於此蓋嘗求之於六經至於詩與春秋之際而後知聖人之道始終本末各有條理夫王化之本始於天下之易行天下固知有父子也父子不相賊而足以為孝矣天下固知有兄弟也兄弟不相奪而足以為悌矣孝悌足而王道備此固非有深逺而難見勤苦而難行者也故詩之為教也使人歌舞佚樂無所不至要在於不失正焉而已矣雖然聖人固有所甚畏也一失容者禮之所由廢也一失言者義之所由亡也君臣之相攘上下之相殘天下大亂未嘗不始於此道是故春秋力爭於毫釐之間而深明乎疑似之際截然其有所必不可為也不觀於詩無以見王道之易不觀於春秋無以知王政之難自孔子沒諸子各以其所聞著書而皆不得其源流故其言無有統要若孟子可謂深於詩而長於春秋者矣其道始於至粗而極於至精充乎天地放乎四海而毫釐有所必計至寬而不可犯至密而可樂此其中必有所守而後世或未之見也且孟子嘗有言矣人能充其無欲害人之心而仁不可勝用也人能充其無欲為穿窬之心而義不可勝用也士未可以言而言是以言餂之也可以言而不言是以不言餂之也是皆穿窬之類也唯其不為穿窬也而義至於不可勝用唯其不可以言而言可以言而不言也而其罪遂至於穿窬故曰其道始於至粗而極於至精充乎天地放乎四海而毫釐有所必計嗚呼此其所以為孟子歟後之觀孔孟者無觀之他亦觀諸此而已矣孟子養浩然之氣潁濵曰孟子學於子思子思言聖人之道出於天下之所能行而孟子言天下之人皆可以行聖人之道子思言至誠無敵於天下而孟子言不動心與浩然之氣凡孟子之說皆所以求通於子思而已故不動心與浩然之氣誠之異名也誠之為言心之所謂誠然也心以為然則其行之也安是以心不動而其氣浩然無屈於天下此子思孟子之所以為師弟子也子思舉其端而言之故曰誠孟子從其終而言之故謂之浩然之氣一章而三說具焉其一論養心以致浩然之氣其次論心之所以不動其三論君子之所以逹於義逹於義所以不動心也不動心所以致浩然之氣也三者相須而不敢廢孟子曰我善養吾浩然之氣其為氣也至大至剛以直養而無害則塞于天地之間是何氣也天下之人莫不有氣氣者心之發而已行道之人一朝之忿而鬭焉以忘其身是亦氣也方其鬭也不知其身之為小也不知天地之大禍福之可畏也然而是氣之不養者也不養之氣橫行於中則無所不為而不自知於是有進而為勇有退而為怯其進而為勇也非吾欲勇也不養之氣盛而莫禁也其退而為怯也非吾欲怯也不養之氣衰而不敢也孔子曰人之少也血氣未定戒之在色及其壯也血氣方剛戒之在鬭及其老也血氣既衰戒之在得一人之身而氣三變之故孟子曰志一則動氣氣一則動志夫志意既修志盛奪氣則氣無能為而惟志之從志意不修氣盛奪志則志無能為而惟氣之聽故氣易致也而難在於養心孟子曰我四十不動心而告子先我不動心告子曰不得於言勿求於心不得於心勿求於氣不得於心勿求於氣可不得於言勿求於心不可何謂也告子以為有人於此不得之於其言勿復求其有此心不得之於其心勿復求其有此氣夫言之不然而心則然者有矣未有心不然而氣則然者也故曰不得於心勿求於氣可不得於言勿求於心不可由是言之氣者心之使也心之所欲為則其氣勃然而應之心所不欲而彊為之則其氣索然而不應人必先有是心也而後有是氣故君子養其義心以致其氣使氣與心相狎而不相難然後臨事而其氣不屈故曰志至焉氣次焉志之所至而氣從之故謂至昔之君子以其眇然之身而臨天下言未發而衆先諭功未見而志先信力不及而勢與之者以有是氣而已故曰志氣之帥也氣體之充也養志以致氣盛氣以充體體充而萬物莫敢逆然後其氣塞于天地雖然心之所以不動者何也博學而識之彊力而行之卒然而遇之有自失焉故心必有所守而後能不動其心之所守不可多也多學而兼守之事至而有不應也是以落其枝葉損之又損以至於不可損也而後能應故孔子謂子貢曰賜也女以豫為多學而識之者歟曰然非歟曰非也豫一以貫之北宫黝之養勇也曰吾無辱於爾也孟施舍之養勇也曰吾無懼於爾也無辱勇矣而未見所以必勇也無懼而後能必勇故曰北宫黝之守氣不如孟施舍之守約北宫黝似子夏孟施舍似曾子曽子之所以自守者曰自反而不縮雖褐寬博吾不惴焉自反而縮雖千萬人吾往矣夫縮入也入受也自反而心受之以為可為者無憾於吾心也則吾心囂然為之而吾氣勃然應之矣孟子曰其為氣也配義與道無是餒也行有不慊於心則餒矣夫餒不充之謂也有行於此而義不受則心不慊心不慊則氣不能充體氣不能充體謂之餒矣故心不能不動也而有待於義君子之所由逹於義者何也勉彊而行之則勞苦而失其真放之而不求則終身而不獲孟子曰必有事焉而勿正心勿忘勿助長也夫君子之於道朝夕從事於其間待其自直而勿彊正也中心勿忘待其自生而勿助長也而後得其真彊之而求其正助之而望其長是非誠正而誠長也迫於外也子夏曰百工居肆以成其事君子學以致其道待其自至而不彊是學道之要也又曰新喻吳若曰孟子吾師也其稱曰我善養吾浩然之氣吾竊喜焉而不得其說請為我言其故豫應之曰子居於江南亦嘗觀於江乎秋雨時至溝澮盈滿衆水既發合而為一汪濊淫溢充塞坑谷然後滂洋東流蔑洲渚乘丘陵肆行而前遇木而木折觸石而石隕浩然莫能支豫嘗試考之彼何若此以浩然也哉今夫水無求於深無意於行得髙而停得下而流忘已而因物不為易勇不為險怯故其發也浩然放乎四海古之君子平居以養其心足乎內無待於外其中演漾與天地相終始止則物莫之測行則物莫之禦富貴不能淫貧賤不能憂行乎夷狄患難而不屈臨乎死生得失而不懼蓋亦未始不浩然者也故曰其為氣也至大至剛以直養而無害則塞乎天地之間以佚道使民以生道殺民東坡曰使民為農民曰是食我之道也使民為兵民曰是衛我之道也使民為郭溝池民曰是域我之道也雖勞而不怨也曰盤庚之民何以怨民可以樂成而不可與慮始蓋終於不怨也詩曰晝爾于茅宵爾索綯亟其乘屋其始播百榖可謂勞矣然民豈不思之曰上之人果誰為也哉若夫田獵之娛宴好之奉上之人所自為為之者君子蓋不以勞民也古之水衡少府天子之私藏大司農錢不以給共養勞費共養勞費一出少府為是也孟子曰以佚道使民雖勞不怨以生道殺民雖死不怨殺者以佚道使民可也以生道殺民君子蓋難言之易曰古之聰明睿知神武而不殺季康子曰如殺無道以就有道何如孔子曰子為政焉用殺夫殺無道就有道先王之所不免也孔子諱之然則殺者君子之所難言也闢楊墨昌黎曰孟子有云今天下不之楊則之墨楊墨交亂而聖賢之道不明聖賢之道不明則三綱淪而九法斁禮樂崩而異端橫幾何其不為禽獸也故曰能言距楊墨者皆聖人之徒也楊子雲曰古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢且將數百年以至於秦卒滅先王之法燒除經書坑殺學士天下遂大亂及秦滅漢興且百年尚未知修明先王之道其后始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乖隔不合不公二帝三王羣聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何補然賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不收所謂存十一於干百安在其能廓如也然向無孟氏則皆服左衽而言侏離矣故愈嘗推尊孟氏以為功不在禹下者為此也孟子言不嗜殺人潁濵曰孟子生於戰國知仁義可以化服暴强以此游說諸侯諄諄言之冀其或信而諸侯皆習於鄙詐莫以為然者梁襄王問孟子天下惡乎定孟子對曰定于一曰孰能一之曰不嗜殺人者能一之當是之時諸侯皆將以多殺人一天下誠有不嗜殺人之君招而撫之天下必將歸之孟子之言非茍為大而已也然不深原其意而詳究其實未有不以為迂者矣豫觀戰國之後更始皇項籍殺人愈多而天下愈亂及漢髙祖雖以兵取天下而心不在殺人然後乃定子孫享國二百餘年王莽之亂盜賊蜂起光武復以不嗜殺人收之及桓靈之禍曹公孫劉皆有蓋世之略而以喜怒殺人故天下卒於三分司馬父子力能一之而殺心益熾故既一復散裂為劉石離為南北隋文帝又能合之矣而好殺不已至子而敗及唐太宗始復不嗜殺人天下乃定其後五代之君出於盜賊乞養屠戮生靈如恐不及數十年之間天下五禪皆不能有天下之半及宋受命藝祖皇帝雖以神武誅鉏僭僞而不嗜殺人之心神民信之未及十年而削平之功比於漢唐天下既定輕刑厲禁凡所誅戮一附於法匹夫匹婦無寃死之獄其仁過於前代是以百有餘年兵革不試户口充溢有死於癘疫而無死於兵亂蓋自孟子以來能一天下者四君皆以不嗜殺人致之由此觀之孟子之言豈偶然而已哉孟子將朝王溫公疑曰孔子聖人也定哀庸君也然定哀召孔子孔子不俟駕而行過位色勃如也足躩如也過虛位且不敢不恭况召之有不往而他適乎孟子學孔子者乎其道豈異乎夫君臣之義人之大倫也孟子之德孰與周公其齒之長孰與周公之於成王成王幼周公輔之以朝諸侯及長而歸政北面稽首畏事之與事文武無異也豈得云彼有爵我有德齒可慢彼哉孟子謂蚳蛙溫公疑曰孟子居齊齊王師之夫師者導人以善而救其惡者也豈得謂之無官守無言責乎若謂之為貧而仕耶則後車數十乘從者數百人仰食於齊非抱關擊柝之比也詩曰彼君子兮不素餐兮夫賢者所為百世之法也余懼後之人挾其有以驕其君無所事而貪祿位者皆援孟子以自况故不得不疑荀卿之道荆公曰荀卿載孔子之言曰由智者若何仁者若何子路曰智者使人知己仁者使人愛己子曰可謂士矣子曰賜智者若何仁者若何子貢曰智者知人仁者愛人子曰可謂士君子矣子曰回智者若何仁者若何顔淵曰智者知己仁者愛己子曰可謂明君子矣是誠孔子之言歟吾知其非也夫能近見而後能逺察能利狹而後能澤廣明天下之理也故古之欲知人者必先求知己欲愛人者必先求愛己此亦理之所必然而君子之所不能易者也請以事之近而天下之所共知者論之今有人於此不能見太山於咫尺之內者則雖天下之至愚知其不能察秋毫於百步之外也蓋不能見於近則不能察於逺明矣而荀卿以謂知己者賢於知人者是猶能察秋毫於百步之外者為不若見太山於咫尺之內者之明也今有人於此食不足以厭其腹衣不足以周其體者則雖天下之至愚知其不能以贍足鄉黨也蓋不能利於狹則不能澤於廣明矣而荀卿以謂愛己者賢於愛人者是猶以贍足鄉黨為不若食足以厭腹衣足以周體者之富也由是言之荀卿之言其不察理已甚矣故知己者智之端也可推以知人也愛己者仁之端也可推以愛人也夫能盡智仁之道然後能使人知己愛己是故能使人知己愛己者未有不能知人愛人者也能知人愛人者未有不能知己愛己者也今荀卿之言一切反之吾是以知其非孔子之言而為荀卿之妄矣揚子曰自愛人之至也蓋言能自愛之道則足以愛人耳非謂不能愛人而能愛己者也噫古之人愛人不能愛己者有之矣然非吾所謂愛人而墨翟之道也若夫能知人而不能知己者亦非吾所謂知人矣荀卿之學六一曰三代之衰學廢而道不明然後諸子出自老子厭周之亂用其小見以為聖人之術止於此非仁義而詆聖智諸子因之益得肆其異說至於戰國蕩而不反然後山淵齊髙堅白異同之論興聖人之學幾乎其息最後荀卿子獨用詩書之言貶異扶正著書以非諸子尤以勸學為急荀卿楚人嘗以學干諸侯不用退居蘭陵楚人尊之及戰國平三代詩書未盡出漢諸大儒賈生司馬遷之徒莫不盡用荀卿子蓋其為說最近於聖人而然也滎陽鄭昊少為詩賦舉進士以中第遂棄之曰此不足學也始從先生長者學問慨然有好古不及之意鄭君年尚少而性淳明輔以强力之志得其是者而師焉無不至也將更其名數以請豫使之自擇遂改曰荀於是又見其志之果也夫荀卿者未嘗親見聖人徒讀其書而得之然自子思孟子已下意皆輕之使其與游夏並進於孔子之門吾不知其先後也世之學者茍如荀卿可謂學矣而又進焉則孰能禦哉荀卿之失東坡曰嘗讀孔子世家觀其言語文章循循莫不有規矩不敢放言髙論言必稱先王然後知聖人憂天下之深也茫乎不知其畔岸而非逺也浩乎不知其津涯而非深也其所言者匹夫匹婦之所共知而所行者聖人有所不能盡也嗚呼是亦足矣使後世有能盡吾說者雖為聖人無難而不能者不失為寡過而已矣子路之勇子貢之辨冉有之智此三者皆天下之所謂難能而可貴者也然三子者每不為夫子之悅顔淵默不見其所能若無以異於衆人者而夫子亟稱之且夫學聖人者豈必其言之云哉亦觀其意之所嚮而已夫子以為後世必有不足行其說者矣必有竊其說而為不義者矣是故其言平易正直而不敢為非常可喜之論要在於不可易也昔者常怪李斯事荀卿既而焚滅其書大變古先聖王之法於其師之道不啻若冦讎及今觀荀卿之書然後知李斯之所以事秦者皆出於荀卿而不足怪也荀卿者喜為異說而不讓敢為髙論而不顧者也其言愚人之所驚小人之所喜也子思孟軻世之所謂賢人君子也荀卿獨曰亂天下者子思孟軻也天下之人如此其衆也仁人義士如此其多也荀卿獨曰人性惡桀紂性也堯舜僞也由是觀之意其為人必也剛愎不遜而自許太過彼李斯者又特甚者耳今夫小人之為不善猶必有所顧忌是以夏商之亡桀紂之殘暴而先王之法度禮樂刑政猶未至於絶滅而不可考者是桀紂猶有所存而不敢盡廢也彼李斯者獨能奮而不顧焚燒夫子之六經烹滅三代之諸侯破壞周公之井田此亦必有所恃者矣彼見其師歷詆天下之賢人以自是其愚以為古先聖王皆無足法者不知荀卿以快一時之論而荀卿亦不知其禍之至於此也其父殺人報仇其子必且行劫荀卿明王道述禮樂而李斯以其學亂天下其髙談異論有以激之也孔孟之論未嘗異也而天下卒無有及者茍天下果無有及者則尚安以求異為哉荆公曰楊墨之道未嘗不稱堯舜也未嘗皆不合於堯舜也然而孟子之所以疾之若是其至者蓋其言出入於道而已矣荀卿之書備仁義忠信之道具禮樂刑政之紀上祖堯舜下法周孔豈不美哉然後世之名遂配孟子則非所宜矣夫堯舜周孔之道亦孟子之道也孟子之道亦堯舜周孔之道也荀卿能知堯舜周孔之道而乃以孟子雜於楊朱墨翟之間則何知彼而愚於此乎昔墨子之徒亦譽堯舜而非桀紂豈不至當哉然禮樂者堯舜之所尚也乃欲非而棄之然則徒能尊其空名爾烏能知其所以堯舜乎荀卿之尊堯舜周孔亦誠知所尊矣然孟子者堯舜周孔之徒也乃以雜於楊朱墨翟而并非之是豈異於譽堯舜而非禮樂者耶昔者聖賢之著書也將以昭道德於天下而揭教化於後世爾豈可以託尊聖賢之空名而信其邪謬之說哉今有人於此殺其兄弟戮其子孫而能盡人子之道以事其父母則是豈得為孝人邪荀卿之尊堯舜周孔而非孟子則亦近乎是矣昔告子以為性猶杞栁也義猶杯棬也孟子曰率天下之人而禍仁義者必子之言矣夫杞栁之為杯棬是戕其性而後可以為也蓋孟子以謂人之為義非戕其性而後可為故以告子之言為禍仁義矣荀卿以為人之性惡則豈非所謂禍仁義者哉云云孟揚荀昌黎曰始吾讀孟軻書然後知孔子之道尊聖人之道易行王易王霸易霸也以為孔子之徒沒尊聖人者孟氏而已晚得揚雄書益尊信孟氏因雄書而孟氏益尊則雄者亦聖人之徒歟聖人之道不傳於世周之衰好事者各以其說干時君紛紛籍籍相亂六經與百家之說錯雜然老師大儒猶在火于秦黃老于漢其存而醇者孟軻氏而止耳揚雄氏而止耳及得荀氏書於是又知有荀氏者也考其辭時若不醇要其歸與孔子異者鮮矣抑猶在軻雄之間乎孔子刪詩書筆削春秋合於道者著之雜於道者黜之故詩書春秋無疵余欲削荀氏之不合者附于聖人之籍亦孔子之志歟孟氏醇乎醇者也荀與揚大醇而小疵孟揚荀言性樊川曰孟子言人性善荀子言人性惡揚子言人性善惡混曰喜曰哀曰懼曰惡曰欲曰愛曰怒夫七者情也情出於性也夫七情中愛怒二者生而自能是二者性之根惡之端也乳兒見乳必拏求不得即啼是愛與怒與兒俱生也夫豈知其五者焉既壯而五者隨而生焉或有或亡或厚或薄至於愛惡曾不須臾與乳兒相雜而至於壯也君子之性愛怒淡然不出於道中人可以上下者有愛拘於禮有怒懼於法世有禮法其有踰者不敢恣其情世無禮法亦隨而熾焉至於小人雖有禮法而不能制愛則求之不得即怒怒則亂故曰愛怒者性之本惡之端與乳兒俱生相隨而至於壯也凡言情性言善者多引舜禹言不善者多引丹朱商均夫舜禹二君子生人以來如二君子者凡有幾人不可引以為喻丹朱商均為堯舜子夫生於堯舜之世被其化皆為善人况生於其室親為父子蒸不能潤灼不能熱是其惡與堯舜之善等耳天止一日月耳言光明者豈可引以為喻人之品類可與上下者衆可與上下之性愛怒居多愛怒者惡之端也荀言人之性惡比於二子荀得多矣昌黎曰性也者與生俱生也情也者接於物而生也性之品有三而其所以為性者五情之品有三而其所以為情者七曰何也曰性之品有上中下三上焉者善焉而已矣中焉者可導而上下也下焉者惡焉而已矣其所以為性者五曰仁曰禮曰信曰義曰智上焉者之於五也主於一而行於四中焉者之於五也一不少有焉則少反焉其於四也混下焉者之於五也反於一而悖於四性之於情視其品情之品有上中下三其所以為情者七曰喜曰怒曰哀曰懼曰愛曰惡曰欲上焉者之於七也動而處其中中焉者之於七也有所甚有所亡然而求合其中者也下焉者之於七也亡與甚直情而行者也情之於性視其品孟子之言性曰人之性善荀子之言性曰人之性惡揚子之言性曰人之性善惡混夫始善而進惡與始惡而進善與始也混而今也善惡皆舉其中而遺其上下者也得其一而失其二者也叔魚之生也其母視之知其必以賄死揚食我之生也叔向之母聞其號也知其必滅宗越椒之生也子文以為大戚知若敖氏之鬼不食也人之性果善乎后稷之生也其母無灾其始匍匐也則岐岐然嶷嶷然文王之在母也母不憂既生也傅不勤既學也師不煩人之性果惡乎堯之朱舜之均文王之管蔡習非不善也而卒為姦瞽瞍之舜鯀之禹習非不惡也而卒為聖人之性善惡果混乎故曰三子之言性也舉其中而遺其上下者也得其一而失其二者也曰然則性之上下者其終不可移乎曰上之性就學而愈明下之性畏威而寡罪是故上者可教而下者可制也其品則孔子所謂不移也曰今之言性者異於此何也曰今之言者雜佛老而言也雜佛老而言也者奚言而不異東坡曰昔之為性論者多矣而不能定于一始孟子以為善而荀子以為惡揚子以為善惡混而韓愈者又取夫三子之說而折之以孔子之論離性以為三品曰中人可以上下而上智與下愚不移以為三子皆出乎其中而遺其上下而天下之所是者於愈之說多焉嗟乎是未知乎所謂性者而以夫才者言之夫性與才相近而不同其别不啻若白黑之異也聖人之所與小人共之而皆不能逃焉是真所謂性也而其才固將有所不同今夫水得土而後生雨露風氣之所養暢然而遂茂者是木之所同也性也而至於堅者為轂柔者為輪大者為楹小者為桷桷之不可以為楹輪之不可以為轂是豈其性之罪耶天下之言性者皆雜乎才而言之是以紛紛而不能一也孔子之所謂中人可上下而智與下愚不移者論其才也而至於言性則未嘗斷其善惡曰性相近也習相逺也而已韓愈之說則又有甚者離性以為情而合才以為性是故其論終莫能通彼以為性者果泊然而無為耶則不當復有善惡之說茍性而有善惡也則夫所謂情者乃吾所謂性也人生而莫不有饑寒之患牝牡之欲今告乎人曰饑而食渴而飲男女之欲不出於人之性也可乎是天下知其不可也聖人無是無由以為聖而小人無是無由以為惡聖人以其喜怒哀懼愛惡欲七者御之而之乎善小人以是七者御之而之乎惡由此觀之則夫善惡者性之所能之而非性之所能有也且夫言性者安以其善惡為哉雖然揚雄之論則固以近之曰人之性善惡混修其善則為善人修其惡則為惡人此其所以為異者唯其不知性之不能以有夫善惡而以為善惡之皆出乎性而已乎太古之初本非有善惡之論唯天下之所同安者聖人指以為善而一人之所獨樂者則名以為惡天下之人固將即其所樂而行之孰知夫聖人唯其一人之獨樂不能勝天下之所同安是以有善惡之辨而諸子之意將以善惡為聖人之私說不已踈乎而韓愈又欲以書傳之所聞一人之事迹而折夫三子之論區區乎以后稷之岐嶷文王之不勤瞽瞍管蔡之迹而明之非聖人之論性也聖人之論性也將以盡萬物之理與衆人之所共知者以折天下之疑而韓愈欲以一人之才定天下之性且其言曰今日言性者皆雜於佛老愈之說以為性之無與乎情而喜怒哀樂皆非性者是愈流入於佛老而不自知也潁濵曰一隂一陽之謂道繼之者善也成之者性也一隂一陽隂陽之未形也猶喜怒哀樂之未發也隂陽之未形也謂之道喜怒哀樂之未發也謂之中中則道也其在人為性及其發而中節仁義禮智之用見於物則所謂善亦所謂和也故孔子曰性相近也習相逺也聖人之言性止於是而已矣孟子學於子思得其說而漸失之則指善以為性至於荀卿自任而好異因孟子而反之則曰人性惡夫善惡皆習也指習以為性而不知其非二子之失一也然而性之有習習之有善惡譬之火之能熱與其能焚也孟子之所謂善則火之能熱者也是火之得其性者荀卿之所謂惡則火之能焚者也是火之失其性者也荀卿之失則逺矣皇甫湜論孟荀曰孟子曰人之性善荀卿曰其善者僞也是於聖人皆一偏之論也推而言之性之品有三下愚中人上智是也聖人言性之品亦有三可上可下不移是也黃帝生而神靈幼而狥齊文王在母不憂在師不煩后稷不坼不堛克岐克嶷之謂上智矣齊桓公以管仲輔之則理以易牙輔之則亂子夏出見紛華而悅入聞仁義而樂之謂中人矣越椒之生熊虎之狀叔魚之生溪壑之心謂下愚矣是故有生而惡者得稱性善乎哉有生而善者得稱性惡乎哉故曰孟子荀卿之言其於聖人皆一偏之說也窮理盡性惟聖人能之宜乎微言絶而異端作大義乖而偏說行夫孟子大儒也荀卿亦大儒也是豈特開異門故持曲辨哉蓋思有所未至明有所不周耳即二子之說原其始而要其終其於輔教化尊仁義亦殊趨而一致異𣲖而同源也何以明之孟子以為惻隱之心人皆有之是非之心人皆有之性之生善由水之趨下物誘於外情動於中然後惡之焉是勸人汰心源返天理者也荀卿曰人之生不知尊親長習於教然後知焉人之幼不知禮讓長習於教然後知焉是勸人黜嗜欲求善良也一則舉本以推末一則自葉而流根故曰二子之說殊趨而一致異𣲖而同源也雖然孟子之心以人性皆如堯舜未至者期勉矣荀卿之言以人之性皆如桀跖則不及者期殆矣書曰惟人最靈記曰人生而靜感於物而動則軻之言合經而多益故為尤乎荆公論揚孟曰賢之所以賢不肖之所以不肖莫非性也賢而尊榮夀考不肖而厄窮死喪莫非命也論者曰人之性善不肖之所以不肖者豈性也哉此學乎孟子之言性而不知孟子之指也又曰人為不為命也不肖而厄窮死喪豈命也哉此學乎揚子之言命而不知揚子之指也孟子之言性人之性善揚子之言性人之性善惡混孟子之言命莫非命也揚子之言命人為不為命也孟揚之道未嘗不同二子之說非有異也其所以異者其所指者異耳此孔子所謂言豈一端而已各有所當者也故孟子之所謂性者獨正性也揚子之所謂性者兼性之不正者言之也揚子之所謂命者獨正命也孟子之所謂命者兼命之不正者言之也夫人之生莫不有羞惡之性且以羞惡之一端以明之有人於此羞善行之不修惡善名之不立盡力乎善以充其羞惡之性則其為賢也孰禦哉此得乎性之正者而孟子之所謂性也有人於此羞利之不厚惡利之不多盡力乎利以充羞惡之性則其為不肖也孰禦哉此得乎性之不正而揚子之兼所謂性者也有人於此才可以賤而賤罪可以死而死是人之所自為也此得乎命之不正者而孟子之所兼謂命者也有人於此才可以貴而賤德可以生而死是非人之所為也此得乎命之正者而揚子之所謂命也今夫羞利之不厚惡利之不多盡利乎利而至乎不肖則揚子豈以為其人哉亦必惡其失性之正也才可以賤而賤罪可以死而死則孟子豈以謂其人之命而不以其人之罪哉亦必惡其失命之正也孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安逸也性也有命焉君子不謂性也仁之於父子也義之於君臣也禮之於賔主也智之於賢者也聖人之於天道也命也有性焉君子不謂命也然則孟揚之說果何異乎今學者是孟子則非揚子是揚子則非孟子蓋知讀其文而不知求其指耳而曰我知性命之理誣哉東坡曰昔者夫子之文章非有意於為文是以未嘗立論也所可得而言者唯其歸於至當斯以為聖人而已矣夫子之道可由而不可知可言而不可議此其不爭為區區之論以開是非之端是以獨得不廢以與天下後世為仁義禮樂之主夫子既沒諸子之欲為書以傳於後世者其意存乎為文汲汲乎唯恐其汩沒而莫吾知也是故皆喜立論論立而爭起自孟子之後至於荀卿揚雄皆務為相攻之說其餘不足數者紛紛於天下嗟夫夫子之道不幸而有老聃莊周楊朱墨翟田駢慎到申不害韓非之徒各持其私說以攻乎其外天下方將惑之而未知其所適從奈何其弟子門人又內自相攻而不决千載之後學者愈衆而夫子之道益晦而不明者由此之故歟昔三子之爭起於孟子孟子曰人之性善是以荀子曰人之性惡而揚子又曰人之性善惡混孟子既以據其善是故荀子不得不出於惡人之性有善惡而已二子既已據之是以揚子不得出於善惡混也為論不求其精而務以為異於人則紛紛之說未可以知其所止且夫夫子未嘗言性也蓋亦嘗言之矣而未有必然之論也孟子之所謂性善者皆出於其師子思之書子思之書皆聖人之微言篤論孟子得之而不善用之能言其道而不知其所以為言之名舉天下之大而概之以性善之論昭昭乎自以為的於天下使天下之過者莫不欲援弓而射之故夫二子之為異論者皆孟子之過也若夫子思之論則不然曰夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉聖人之道造端乎夫婦之所能行而極乎聖人之所不能知造端乎夫婦之所能行是以天下無不可學而極乎聖人之所不能知是以學者不知其所窮夫如是則惻隱足以為仁而仁不止於惻隱羞惡足以為義而義不止於羞惡此不亦孟子之所以為性善之論歟子思論聖人之道出於天下之所能行而孟子論天下之人皆可以行聖人之道此無以異者而子思取必於聖人之道孟子取必於天下之人故夫後世之異議皆出於孟子而子思之論天下同是而莫或非焉然後知子思之善為論也歷代名賢確論卷三十七
