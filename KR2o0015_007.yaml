body:
  text: 歷代名賢確論卷七武王克商東坡伯夷叔齊昌黎劉敞皮日休章栁識潁濱表民李德裕東坡荆公鄭獬克商東坡曰武王克殷以殷遺民封紂子武庚祿父使其弟管叔鮮蔡叔度相祿父治殷武王崩祿父與管蔡作亂成王命周公誅之而立微子於宋蘇子曰武王非聖人也昔者孔子蓋嘗罪湯武顧自以為殷之子孫而周人也故不敢然數致意焉大哉巍巍乎堯舜也禹吾無間然其不足於湯武也亦明矣曰武盡美矣未盡善也又曰三分天下有其二以服事殷周之德可謂至德也已矣伯夷叔齊之於武王也蓋謂之弒君至不食其粟而孔子與之其罪武王也甚矣此孔氏之家法也世之君子茍自孔氏必守此法國之存亡民之死生將於是乎在其孰敢不嚴而孟子始曰吾聞武王誅獨夫紂未聞弒君也自是學者以湯武為聖人若當然者皆孔氏之罪人也使當時有良史如董狐者南巢之事必以叛書牧野之事必以弒書而湯武仁人也必將為法受惡周公作無逸曰殷王中宗及髙宗祖甲及我周文王兹四人迪哲上不及湯下不及武王亦以是哉文王之時諸侯不求而自至是以受命稱王行天子之事周之王不王不計紂之存亡也使文王在必不伐紂紂不見伐而以考終或死於亂殷人立君而事周命為二王後以祀殷君臣之道豈不兩全也哉武王觀兵於孟津而歸紂若改過否則殷人改立君武王之待殷若是則已矣天下無王有聖人者出而天下歸之聖人所不得辭也而以兵取之而放之而殺之可乎漢末天下大亂豪傑並起荀文若聖人之徒也以為非曹操莫與定海內故起而佐之所以與操謀者皆王者之事也文若豈教操反者哉以仁義救天下天下既平神器自至將不得已而受之不至不取也此文王之道文若之心也及操謀九錫則文若死之故吾嘗以文若為聖人之徒者以其才似張子房而道似伯夷也殺其父封其子子非其人也則可使其子而果人也則必死之楚人將殺令尹子南子南之子棄疾為王馭士王泣而告之既殺子南其徒曰行乎曰吾與殺吾父行將焉入然則臣王乎曰棄父事讎吾弗忍也遂縊而死武王親以黃鉞斬紂使武庚受封而不叛豈復人也哉故武庚之必叛不待智者而後知也武王之封武庚蓋不得已焉耳殷有天下六百年賢聖之君六七作紂雖無道其故家遺俗未盡滅也三分天下有其二殷不伐周而周伐之誅其君夷其社稷諸侯其有不恱者故封武庚以慰之此豈武王之意哉故曰武王非聖人也伯夷叔齊昌黎曰士之特立獨行適於其義而已不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者寡矣至於一國一州非之力行而不惑者蓋天下一人而已矣若至於舉世非之力行而不惑者則千百年乃一人而已耳若伯夷者窮天地亘萬世而不顧者也昭乎日月不足為明崒乎泰山不足為高巍乎天地不足為容也當殷之亡周之興微子賢也抱祭器而去之武王周公聖也率天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也彼伯夷叔齊者乃獨以為不可殷既滅矣天下宗周彼二子乃獨恥食其粟餓死而不顧繇是而言夫豈有求而為哉信道篤而自知明者也今世之所謂士者凡一人譽之則自以為有餘凡一人沮之則自以為不足彼獨非聖人而自是如此夫聖人乃萬世之標準也余故曰若伯夷者特立獨行窮天地亘萬世而不顧者也雖然微二子亂臣賊子接迹於後世矣皮日休曰天必從道道不由天其曰人乎哉大聖應千百年之運仁發於祥義動於瑞上聖帝也次素王也莫不應乎天地亘乎日月動乎鬼神或有守道以介死秉志以窮生確然金石不足以為貞淡然氷玉不足以為潔非其上古聖人不以動其心況當世富貴之士哉斯其自信乎道則天地不可得而應也嗚呼夷齊之志嘗以神農虞夏形於言由是觀之豈有意於文武者哉然迹其歸周不從諫而死彼當求西伯也而得武王不曰得仁乎既得其仁而不取其諫則夷齊之死宜矣太史公以其餓死責乎天道嗚呼若夷齊之行可謂道不由天者乎如不得仁而餓死天可責也茍夷齊以殷亂可乎而臣於周則周召之列矣奚有首陽之厄乎若夷齊者自信其道天不可得而應者也天尚不可應況於人乎況於鬼神乎栁識曰初先生鴻逸中州鸞伏西山顧薇蕨之離離歌唐虞之不還謂易暴兮又武謂墨縗兮胡顏一吒兮忘飢若有誚兮于巖之關豈不以冠弊在於上履新處於下且曰一人之正位孰知三聖之純嘏讓周之意不其然乎是以知先生所恤者偏矣當昔夷羊在牧殷網解結乾道息坤維絶鯨吞噬兮鬼孽王奮厥武天意若曰覆昏暴資濬哲於是二老歸而八百會一戎衣而九有截況乎旗錫黃鳥圭命赤烏俾荷巨橋之施俾申羑里之辜故能山立雨集電掃風驅及下車也五刃不礪於武庫九駿伏轅於文途雖二士不食而兆人其蘇既而溥天周土率土周人吁嗟先生逃將奚臻萬姓歸飾兮獨鬱乎方寸六合莾蕩兮終局乎一身雖忤時而過周終臣心而惻殷所以不食其食求仁得仁然非一端事各其志若旁通以阜厥躬應物以濟其利則焉有貞節之規各親之事靈乎靈乎雖非與道而保生乃朂為臣之不二李德裕曰昔夷齊不食周粟餓于首陽之下仲尼稱其仁孟軻美其德孟子稱伯夷聖人之清者蓋以取其節而激貪也所謂周粟者周王所賦之祿是也諫而不從不食其祿可矣至於聞淑媛之言輟餐薇蕨斯所謂不智矣夫薇蕨者元氣之所發生四時之所順成日月之所燭風雨之所育周焉得而有之哉若以粟者周人之播殖則夷齊得非周人乎反覆其道盡未當理然夷齊之行實誤後人於陵仲子慕夷齊者也乃至不義其兄之祿潔則潔矣仁豈然哉厥後商洛四友畏秦之酷避秦之禍豈止為其身而已然餐紫芝以為糧飲清泉以為漿終老南山以養其夀斯可謂仁智兼矣劉敞曰世皆以伯夷叔齊諫武王不用退而隱於首陽之山不食周粟採薇而食之以至於餓死以豫考之不然彼伯夷叔齊者仁人也愛其君如恐傷之故矯世厲俗達天下之大義而不私焉其進以道退以義此孔子所謂求仁得仁者也豈若小丈夫哉諫其君而用則欣欣然見於色諫其君而不用則悻悻然見於色終身不向國而坐也彼所謂不食其粟者言其致為臣而去不在廩膳之列夫致為臣而去不在廩膳之列是乃所謂餓也安得采薇事乎蓋少飾矣自堯舜以來高世之士不可勝紀然夷齊為之首學者皆稱之始周之亂鮑焦疾之不忍食其粟采蔬於道而食人謂鮑焦曰今不食其粟而食其蔬此非焦所濟也於是鮑焦輟蔬吐哺立斃其處然孔子不以為仁學者無稱焉潁濱曰武王以大義伐商而伯夷叔齊亦以義非之二者不得兩立而孔子與之何哉夫文武之王非有求而得之也天下從之雖欲免而不得紂之存亡不復為損益矣文王之置之知天命之不可先也武王之伐之知天命之不可後也然湯以克夏為慙而孔子謂武未盡善則伯夷之義豈可廢哉宋昭公以無道弒春秋雖書曰宋人弒其君杵臼然晉荀林父衛孔達陳公孫寧鄭石楚伐宋以不討賊稱人晉靈公為之會諸侯于扈以不討賊不敘明君臣之義不以無道而廢之也章表民曰伯夷之道古今之難能也不以死生撓其志而以仁義殞其身始沮武王之代紂非剛也終餓死首陽非懦也篤仁義而已夫紂為暴君其醜行昭昭矣武王一天下之心以伐之當是時也非人之棄商蓋商之棄人譬隄必決焉而水流乃潰也是紂之為惡非湯德可能掩之也天下之怒非一人可能遏之也惟伯夷叔齊乃諫而止之或謂武王宜其諫焉或謂之好異耳矣是皆未然也二聖賢之事蓋非常人之所為也濟天下而絶一夫者武王也非私天下於己也一言而靖萬世之亂者伯夷也非咎武王於伐紂也武王之視紂虐民如與同虐之也伯夷恐後人之賊君如與同賊之也其道同歸於救人所以救者不同而已故使不君者聞武王之誅則欲得其為君不臣者聞伯夷之諫則欲得其為臣君臣定則國家定國家定則天下定矣噫武王之功世亦有之是功可能也與數而興者也伯夷之死今數十百千年矣前有能繼者獨未之聞也後有能繼者未可易知也是死不可能也與身而廢者也故平桀紂者莫仁於湯武而能救人於治亂之際者莫仁於伯夷商之敗周之興伯夷所不動心焉動心於理亂之際而已猶衆人之鬬鬬者既繁而力能止之所救者將不少也東坡論夫子為衛君曰衛君輒也與其父爭國而子路助之故冉有疑而問焉聞伯夷叔齊之不怨何以知夫子之不為輒也曰夷齊之事逺矣傳失其詳意其出也父子之間有間言焉若申生之事也歟故曰伯夷叔齊不念舊惡不如是何惡之可念臯落之役申生若從梁餘子養之言逃而去之則復一伯夷也荆公曰事出於千世之前聖賢辨之甚詳而明然後世不深考之因以偏見獨識遂以為説既失其本而學士大夫共守之不為變者蓋有之矣伯夷是巳夫伯夷古之論有孔子孟子焉以孔孟之可信而又辨之反復不一是愈益可信也孔子曰不念舊惡求仁而得仁餓于首陽之下逸民也孟子曰伯夷非其君不事不立惡人之朝避紂居北海之濱目不視惡色不事不肖百世之師也故孔孟皆以伯夷遭紂之惡不念以怨不忍事之以求其仁餓而避不自降辱以待天下之清而號為聖人耳然則司馬遷以為武王伐紂伯夷叩馬而諫天下宗周而恥之義不食周粟而為采薇之歌韓子因之亦為之頌以為微二子亂臣賊子接迹於後世是大不然也夫商衰而紂以不仁殘天下天下孰不病紂而尤者伯夷也嘗與太公聞西伯善養老則往歸焉當是之時欲夷紂者二人之心豈有異耶及武王一奮太公相之遂出元元於塗炭之中伯夷乃不與何哉蓋二老所謂天下之大老行年八十餘而春秋固已髙矣自海濱而趨文王之都計亦數千里之逺文王之興以至武王之世歲亦不下十數豈伯夷欲歸西伯而志不遂乃死於北海耶抑來而死於道路耶抑其至文王之都而不足以及武王之世而死耶如是而言伯夷其亦理有不存者也且武王倡大義於天下太公相而成之而獨以為非豈伯夷乎天下之道二仁與不仁也紂之為君不仁也武王之為君仁也伯夷固不事不仁之紂以待仁而後出武王之仁焉又不事之則伯夷何處乎余故曰聖賢辨之甚明而後世偏見獨識者失其本也嗚呼使伯夷之不死以及武王之時其烈豈太公哉鄭獬曰特立之士有大功於聖人之教傑然喬于百世之上者後世皆得而公傳焉司馬氏作史記序七十列傳非公其傳者歟而以伯夷首之善乎司馬氏之為史矣伯夷叔齊力於仁義有激於當世輔聖人之教得其深者也為之傳首豈謬哉孤竹君欲以位授其子叔齊叔齊讓于兄伯夷伯夷曰父命也卒不受遂更相讓而俱逃之及武王順天下號義兵以伐紂天下無賢不肖皆曰武王是焉恐恐然恐武之不勝獨伯夷排天下之議非之曰父死不葬謀及干戈非孝也以臣伐君非仁也武王不聽遂取商天下既已周伯夷恥不食其粟乃餓死嗚呼一國之君民之所奉亦已尊矣而伯夷不敢廢父之命甘於遁去天下之讓孰加焉武王既興聖賢皆為之助亦足以樹勳矣而伯夷不敢廢君之分而甘於餓死天下之仁孰加焉讓齊之心非為齊也而為萬世之為國者焉諫武之心非為武也而為萬世之為臣者焉故後世之為國者子欲奪於父弟欲奪於兄交挺白刃以爭繼立者必宿栗挫縮不敢耀芒角以其有伯夷之讓然也後世之為臣者幸國之亂以肆姦謀紾君臂而欲其位者必靦汗驚爆不敢出氣以其有伯夷之仁然也是仁節者得不謂有大功于聖人之教者歟如天之覆健然其髙也如日月之照烈然其明也而萬百千世愈高愈明義風洗然照人毛髮使爭子賊臣畏服之如是顧其功可較也歷代名賢確論卷七
