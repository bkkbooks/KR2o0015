body:
  text: 歷代名賢確論卷七十四則天二岑長倩張唐英姚璹張唐英楊再思張唐英徐敬業張唐英陳子昂盧藏用劉知幾張唐英中宗中宗韋后范祖禹孫之翰韋月將告武三思逆亂中宗流之范祖禹睿宗帝以二女西城隆昌公主為女冠以資天皇天后之福范祖禹太平公主石守道追立劉竇二后招魂葬東都范祖禹景雲年孫之翰傳位太子自稱上皇仍決軍國大務孫之翰岑長倩張唐英論曰長倩垂拱中為文昌右相則天革命甚懼長倩上疏請改皇嗣姓武以為周室儲二則天悅而從之及張嘉福王慶之上表請立武承嗣為太子長倩與格輔元堅不從乃言曰皇嗣已在東宫不可更立承嗣由是大忤諸武下獄被誅而議者謂長倩不忠於唐誅之宜矣且則天之時唐室枝葉子弟及朝廷舊臣誅戮殆盡長倩懼皇嗣亦為諸武譖被殺乃請改姓武上以順則天之意下以全皇嗣之命豈謂不忠於唐耶使則天既死皇嗣即位握天下之柄豈肯不復姓李而姓武乎若以長倩不忠則當順從而立承嗣足以免誅豈得復執皇嗣已在東宫不可復立承嗣乎以此原其情則長倩之心乃陳平順吕后之心也兹可與言幾微之事焉惜乎人不明其心也姚璹張唐英論曰舊史狄仁傑王方慶姚璹同傳且仁傑有再造唐室之功方慶嘗諫則天曰陛下之子尚在廬陵臣之子何惜逺官姚璹乃唐之賊臣則天之佞臣也何得與狄王同傳哉且則天之時天下非無忠義之士欲復唐祚但以酷吏盈朝羅織成獄故忠義之士不能發耳璹既不能奮發忠節自可持節保身何至於桂林長史凡嶺外山川草木有武字者皆進為祥瑞符合國姓則天悅之召為平章事乃附三思督作天樞以紀周德及明堂災則天避殿璹乃以成周宣榭火卜世愈隆漢武建章焚盛德彌永且明堂布政之宫而武氏不稽古制徇意徑造上帝監戒火而燼之而璹乃逺引周漢為比又非經義且周室之災由禮崩樂壞之所致建章之火由窮奢極侈之所召豈卜世盛德之事乎又令宰臣親撰時政紀以送史館失史臣直筆之法皆璹姦佞所為也昔魏祖以文和為公貽笑孫后千秋以一言為相見咍外夷璹何人也亦執國政哉求其璹侣乃洛水進赤心石者可與同等豈可汙狄王二公之傳哉楊再思張唐英論曰姚璹不可與狄公同傳既已明矣而楊再思復與王杜同傳可乎且王及善有大臣之體杜景佺有宰相之器朱少連不附權要李懷逺能守簡素皆有一節可述而再思姿性邪巧不畏不義舞髙麗以悅同休喻蓮華以媚昌宗鞫王同皎而不明其枉絀戴令言而憾其有諷附宗楚客而貶魏元忠偷合冒寵不顧亷恥自始至末無一可稱附於張昌宗傳可也而使同李杜諸公是盜跖與夷齊聯鑣斯髙與伊皋並轡豈非黑白相混哉自古君子常少而小人常多若小人得與君子同等則愚恐君子之道愈剝而不振矣徐敬業張唐英論曰嘗觀髙祖太宗之時天下將相大臣合謀畢智經營締結其勤至矣一武氏奪而有之天下惴惴莫有異議獨徐敬業區區不量發憤舉兵以興復中宗為名議者必以焦僥之步而企夸父之跡要離之弱而追扛鼎之勢多見其不自知也然若使敬業從薛璋之計直据東都因人心之思唐則復中宗之位易如反掌惜乎不知茍且非英雄之事淺近非丈夫之為謀大志小卒無成功終就誅戮然觀自古有志於功名之士成則衆美歸之若使訓注石榴甘露之事成則其功亦赫然可稱今敬業既不幸而敗後世不復稱其忠愚恐後世之士不復有為舊君致命爾故豫嘗以敬業比翟義云陳子昂盧藏用曰昔孔宣父以天縱之才自衛返魯乃刪詩書述易道而作春秋數千百年文章粲然可觀者也孔子沒二百嵗而騷人作於是婉麗浮侈之法行焉漢興二百年賈誼馬遷為人傑憲章禮樂有老成人之風長卿子雲之儔瑰詭萬變亦奇特之士也惜其王公大人之言溺於流辭而不顯其後班張崔蔡曹劉潘陸隨波而作雖大雅不足然其遺風餘烈尚有典刑宋齊已來蓋憔悴逶迤陵頽流靡至於徐庾天之將喪斯文也後進之士若上官儀者繼踵而生於是風雅之道掃地盡矣易曰物不可以終否故受之以泰道喪五百嵗而得陳君君諱子昂字伯玉蜀人也崛起江漢虎視函夏卓立千古橫制頺波天下翕然質文一變非夫岷峨之精巫廬之靈則何以生此故有諫諍之辭則為政之先也昭夷之碣則議論之當也國殤之文則大雅之怨也徐君之議則刑禮之中也至於感激頓挫微顯闡幽庶幾見變化之朕以接乎天人之際者則感遇之篇存焉觀其逸足駸駸方將摶扶搖而凌泰清獵遺風而薄嵩岱吾見其進未見其止惜乎湮厄當世道不偶時委骨巴山年志俱夭故其文未極也嗚呼聰明精粹而淪剝貪叨桀驁以顯榮天乎天乎吾始未知夫天焉張唐英曰學者議子昂作大周受命神鳯頌乃詭悅武氏而不忠於唐始亦嗤鄙其文後因數四紬繹其㫖則知子昂之頌乃諷諫武后而保佑中宗之微㫖也其揚雄劇秦美新之亞乎何以名之子昂表云先有唐基以啓周室不改舊物天下惟新皇王已來未嘗有也此言自古未嘗有婦人革命之事又欲武氏不改唐室舊物乃不顯諫之義也又序云天無二日土無二王陛下受天之符為人聖母皇帝仁孝肅恭神明可以纂武承業以承武氏而有天下謂不可傳於武氏子孫此子昂之微㫖也孰謂諂悅武氏而為之哉昔子雲美新室栁開辨之而世之人方知子雲之心今辨子昂亦開之意然則賢者立言必俟後世之智者噫士君子仕於亂世以此微文而全身逺害可也然而子雲之美新子昂之頌周不為之愈於為之也若遇不知言者則直佞人爾劉知幾子餗附張唐英論曰劉知幾著史通二十卷徐堅曰居此職者宜置此書於座右因求其書而觀之則知劉子之用心亦勤矣馳騁古今發摘歷代史氏之失雖班馬壽曄皆為其輕重兹可尚矣至外篇惑經有未諭者十二條始亦竊疑孔子於春秋有所疏略乃取春秋而審詳之則劉子乃好辨而不知春秋之㫖不識聖人之心也劉子云齊鄭楚國弒君各以疾赴遂皆書卒而正卿返不討賊冢嫡藥不親嘗而被以惡名播諸來葉且躬為梟獍則漏網遺名跡涉瓜李乃凝脂顯戮其所未諭者一也謂昭公元年圍弒其君郟敖而書曰楚子麇卒哀公七年鄭子駟弒其君僖公而書曰鄭伯髠頑卒哀公七年齊人弒其君僖公而書曰齊侯陽生卒且彼三國雖弒其君而皆以疾赴告故魯史因其赴告以為實而書之於䇿及孔子修春秋若其事有可以為褒貶之法者則因其文而筆削以寄王法如無足示法則因其䇿書傳疑傳信之文實書其事故他國以弒君告者則書曰弒君他國以疾告者則書曰卒皆赴告䇿書之舊文也及授與丘明作傳則俾遍觀諸國簡牘實書其事備其本末以成其文至於盾不討賊止不嘗藥而以弒君父之罪加之者蓋孔子之志也若為正卿而不討賊是君之讎可得而觀望也若為冢子而不嘗藥則父之疾不在乎服勤就養也故書盾之弒以教天下人臣之為忠書止之弒以教天下人子之為孝所謂原情而定罪因罪以誅意故曰吾志在春秋彼親弒君父雖不書於經而傳能備載其事其罪逆不在言而可知矣豈可謂躬為梟獍則漏網遺名跡涉瓜李則凝脂顯戮哉以此知劉子徒好辨而不知春秋之㫖矣其他事以類推之聖人之志皆顯然明白故不復辨學者當自求之無惑劉子之異說可也又曰劉知幾又論太史公左丘明荀子班固於春秋有虛美者五此乃劉子議天地之不大笑日月之不明多見其不知量也其五美固不足與論其是非然尤可罪者謂汲冢書與魯史符同獲君曰止誅臣曰刺執我行人殺其大夫鄭棄其師隕石于宋五諸如此句多是古史全文則知孔子謂修者但用其成事就加雕飾仍書而已有何力哉噫劉子之罪過於楊墨也且聖人達則王道行於天下禹湯文武是也聖人否則王道隱於春秋孔子是也今劉氏取信於汲冢竹書瑣語而謂孔子何力於春秋何誣聖人之甚也夫孔子之於春秋有不合於王道者則定法於一字以褒貶之如其䇿書成文書所為法則因而直書蓋聖人之志也而劉子謂筆則筆削則削皆為虛言何狂悖之甚也汲冢等書所載蓋戰國之時好學者愛其語句乃録於竹簡以便記覽若今之抄集子史雅言之類後因其死乃藏於墓中至晉太康中其書始出而摰虞束晢荀顗干寶杜預之徒不知是當時好學者所記録竹簡之辭反謂春秋已前舊有此文遂使劉子惑之以聖人何力於春秋以此論之則劉子之罪過於楊墨逺矣茍不闢而歸坦塗愚恐學者徑馳於淫說矣又曰知幾之子餗著六說其叙詩書禮樂春秋周易之意捨其短取其長其間十有五六然其說云帝王既殁王者每五百嵗乃更姓商武周文當其㑹也周五百嵗而王者不作仲尼生焉仲尼無位其道見之文字今去此時眇出千載五百之數何其曠歟次言其纍世種文德云云而已作六說之意觀餗之言謂孔子之後千餘嵗而無其人謂已可以當之乃作六說噫是力蒼蠅而慕沖天之舉䇿跛鱉而追飛兔之軌蓋不量已之甚也且孔子剛詩書定禮樂贊易道修春秋非衒其文辭以誇後世矣皆以示萬古之教而餗乃自孔氏章至考亂凡八十九章皆取漢史詔書及羣臣奏議撰其名目以擬尚書又取房中歌至後庭鬭百草臨春樂小年子之類凡一百四十二篇以擬雅章此前代周公之勺吉甫之雅又取巴渝歌白頭吟折楊柳至談容娘以比前代國風之流且孔子之書斷自唐虞終於秦誓詩始關雎終於商頌皆有所藴以垂世立教不知餗之書始於孔子終於考亂詩始於房中終於談容娘何所取哉茍以孔氏比堯典則孔子無位不可比堯也若以考亂比秦誓則蜀劉備之事不可比穆公也若以房中樂比關雎則彼非類周召二公聖賢之事也以談容娘比商頌則彼非祭祀所歌之曲也不知餗之意何所法而為之哉昔揚雄以亞聖之才著太𤣥法言而班固尚比吳楚僭號而餗之學曽未及揚雄十之一而自専其能以孔子之後千載而無人已可以當之而妄為著述其罪又過於其父爾所謂惑而乘駻馬狂而操干將者乎蓋不自知其狂惑爾中宗韋后安樂公主附范祖禹論燕欽融言皇后宗楚客等危宗社楚客矯詔撲殺之曰易姤之初六曰繫于金柅貞吉有攸往見凶羸豕孚蹢躅姤之初六隂柔之始也以剛德制之則得貞吉縱之以往則無所不凶若羸豕之孚無時而自止也夫女子小人放而不制其惡必至於滔天弒父與君而後已是以聖人戒之中宗一怏怏不悅而其身已不保雖欲制之其可得乎孫之翰論韋后安樂公主弒帝曰中宗真下愚之人不可移之性也前代人君如太甲者中人之性爾始以失道為大臣所廢遂能深思前過自新厥德暨復正位享國永年中宗即位之初過寵后父因大臣切諫有不道之言為母所廢流離艱苦洎乎復辟又使韋后安樂公主用事殞身於二婦人之手宜乎韋月將告武三思逆亂中宗流之范祖禹曰自古殺諫臣未有不亡國者中宗愚暗足以取亡而髙祖太宗德澤未逺人心天命未厭唐也故禍及其身而已矣帝以二女西城隆昌公主為女冠以資天皇天后之福范祖禹曰孔子曰生事之以禮死葬之以禮祭之以禮可謂孝矣未聞以女子為女冠而可以資福於其親者也天子之女天下之所取則也不從先王之禮而從方士之言襲非法之服奉不享之祠以是為孝非所以率天下也夫古之人豈不欲捨其子而厚其親若其可為則先王為之矣不待後世而始能行也至於明皇亦以女追福於睿宗皆廢人倫蔑典禮不可為後世法也太平公主石守道曰中宗在位韋庶人安樂公主用事忠良屏失讒邪並用刑賞僭濫賄賂公行庶政盡隳彞倫攸斁宫闈恣醜穢之行朝廷扇朋比之風宗社﨑危海內咨怨睿宗時為相王目擊其事常扼腕嗟嘆不勝竊憤及乎身履帝位親握萬機則宜刷疵滌瑕洗穢濯垢沐浴中外咸使潔清緝熙謨猷皆有條理而乃不戒覆車復蹈危轍專縱太平公主恣橫以亂朝政遂使海內失望君子息心茍非繼之以聖主唐祚或去矣臣嘗謂中宗睿宗為庸主良以此也追立劉竇二后招魂葬東都范祖禹曰人之死也魂氣歸於天形魄歸於地葬所以埋藏體魄也若魂氣則無不之也茍無體魄則立廟以祀之而已魂氣不可得藏也夫棺槨所以掩形也墓所以藏棺槨也其形氣既無有矣而必為之陵墓不亦虛乎景雲年孫之翰論曰古之人君即位必踰年而改元者先君之年不可不終也繼大位不可無始也一年不可二君也先君之年不終則後嗣急於為君而忘孝心矣繼大位無始則布政立事無以正本矣一年二君則國統不一而民聽惑矣典法如是之重人君得不謹其事歟睿宗於中宗雖兄弟之序然繼其位則同於先君安得不待踰年而改元蓋大臣昧於經義而然也今書景雲年者不可分中宗所終之一年為二又不可記睿宗之始年謂之二年故變其例所以戒無禮而正不典也傳位太子自稱上皇仍決軍國大務孫之翰論曰睿宗以次子平王賢而有功取內外屬望之意從長子辭讓之誠立為太子又以時方多難上象示變自知行事不當天意遂傳位於子此實大公之心安宗社之計也然為一妹所惑雖傳位而不授以政使太子稱帝而主細務自稱太上皇而斷大事此體豈正乎故養成一妹之惡致姦人黨附從而逆謀賴太子英果先事誅之不然內難可測乎蓋睿宗雖有大公之心而明斷不至也惜哉歷代名賢確論卷七十四
