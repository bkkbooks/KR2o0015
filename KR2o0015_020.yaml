body:
  text: 歷代名賢確論卷二十莊公鄭伯克段于鄢東坡子産潁濱昌黎東坡通論國之興亡潁濱懿公許穆夫人賦載馳鄭獬靈公祝鮀之佞東坡出公世子蒯聵孫明復潁濱季路潁濱鄭伯克段于鄢東坡曰春秋之所深譏聖人之所哀傷而不忍言者三晉趙鞅帥師納衛世子蒯聵于戚齊國夏衛石曼姑帥師圍戚而父子之恩絶公與夫人姜氏遂如齊而夫婦之道喪鄭伯克段于鄢而兄弟之義亡此三者天下之大戚也夫子傷之而思其所以致此之由故其言尤為深且逺也且夫蒯聵之得罪於靈公逐之可也逐之而立其子是召亂之道也使輒上之不得從王父之言下之不得從父之令者靈公也故書曰晉趙鞅帥師納衛世子蒯聵于戚蒯聵之不去世子者是靈公不得乎逐之之道靈公何以不得乎逐之之道逐之而立其子也魯桓公千乘之君而陷於一婦人之手夫子以為文姜之不足譏而傷乎桓公制之不以漸也故書曰公與夫人姜氏遂如齊言其禍自公作也段之禍生於愛也鄭莊公之愛其弟也足以殺之耳孟子曰舜封象於有庳使之原原而來不及以政孰知夫舜之愛其弟之深而鄭莊公之賊也當太叔之據京城取廩延以為已邑雖舜復生不能全兄弟之好故書曰鄭伯克段于鄢而不曰鄭伯殺其弟段以為當斯時雖聖人亦殺之而已矣夫婦父子兄弟之親天下之至情也而相殘之禍至如此夫豈一日之故哉榖梁傳曰克能也能殺也不言殺見段之有徒衆也段不稱弟不稱公子賤段而甚鄭伯也鄢逺也猶曰取之其母之懷中而殺之云爾甚之也然則為鄭伯者宜奈何緩追逸賊親親之道也嗚呼以兄弟之親至交兵而戰固親親之道絶已久矣雖緩追逸賊而其存者幾何故曰於斯時也雖聖人亦殺之而已矣然而聖人固不使至此也公羊傳曰母欲立之已殺之如勿與而已矣而又區區於當國內外之言是何思之不逺也左氏以為段不弟故不稱弟如二君故曰克稱鄭伯譏失教求聖人之意若左氏可以有取焉子産昌黎子産不毁鄉校頌曰我思古人伊鄭之僑以禮相國人未知其教遊于鄉之校衆口囂囂或謂子産毁鄉校則止曰何患焉可以成美夫豈多言亦各其志善也吾行不善吾避維善繼否我於此視川不可防言不可弭下塞上聾邦其傾矣既鄉校不毁而鄭國以理在周之興養老乞言及其已衰謗者使監成敗之迹昭哉可觀維是子産執政之式維其不遇化止一國誠率是道相天下君旁暢交通施及無垠於乎四海所以不理者有君無臣誰其嗣之我思古人潁濱曰子産為鄭不以禮法假人凜乎其不可犯也將死戒子太叔曰我死子必為政惟有德者能以寬服人其次莫如猛火烈人望而畏之則鮮死水弱人狎而玩之則多死故寬難子太叔為政不忍猛鄭國多盜然後悔之由此言之子産豈徒寬惠者哉然孔子之稱子産惠人又以為古之遺愛儒者由此言之故孟子言子産以乘輿濟人於溱洧以為惠而不知為政甚者又曰子産猶衆人之母能食之而不能教也此皆非子産之實蓋惠而愛人無禮法以將之則有所不行若子産則以禮法行惠者也孔子之說云爾東坡曰子産為鄭作封洫立謗政鑄刑書其死也教太叔以猛其用法深其為政嚴有及民之近利而無經國之逺猷故渾罕叔向皆譏之而孔子以為惠人不以為仁蓋小之也孟子曰子産以乘輿濟人於溱洧惠而不知為政蓋因孔子之言而失之也子産之於政整齊其民賦完治其城郭道路而以時修其橋梁則有餘矣豈以乘輿濟人者哉禮曰子産衆人之母也能食之而不能教此又因孟子之言而失也國之興亡潁濱曰鄭之諸公桓武之後推莊公為賢然其為人喜權而任數桓武之風衰焉叔段之亂諸大夫皆欲早為之所莊公之明足以制之然釋而不問俟其惡成而後加之以大戮此非不忍於弟蓋忍之至也孔子深探其心故書曰鄭伯克段于鄢而丘明謂之鄭志蓋謂此也周平王桓王二於虢公莊公既質王子取麥禾矣則又率齊而朝之伐宋而說之政不可得於是兵交中原射王中肩嗚呼其忮心發於中卒不可得蓋如此鄭自莊公始畏楚穆襄之後無歲不被晉楚之兵子駟子展為政不知所出惟其來求者與之鄭幾於亡及晉悼公三帥諸侯以斃楚師不能爭而子産受之以禮自固雖晉楚之暴不能加焉詩云誰能執熱逝不以濯又曰無競維人四方其訓之吳季札過鄭謂子産政將及子子為政必慎以禮不然鄭國將敗子産用之鄭復以安如季子可謂知務矣許穆夫人賦載馳鄭獬曰衛懿公夷於狄戴公捃其餘而虜之漕許穆夫人其妹也許孱不能救覬它諸侯有為衛憂者亦亡有也且將衛而不可於是賦載馳之五章其言哀深以傷往反而盡寃悶之不泄計獨窮於此耳於時諸侯裂天子土捍夷狄暴亂者國相䟡也環拱而睨之卒不肯一枉臂起以植衛者俾夫人之懇懇不已而屢言之嗚呼彼誠男子耶不少有激乎率易以失人心則周孰有併國哉無秦可也後二年齊桓公始城而完之吾知其有發矣雖然吾獨憫其女子而有有憂亡國心彼冠冕而藩天下者尚且施施而安歟噫其亦足羞矣乎祝鮀之佞東坡曰祝鮀治宗廟孔子謂衛多君子靈公雖無道而不喪者子魚與數君子之力也左氏亦記其賢決非佞人蓋古者以佞為才智之稱故自貶則云不佞宋公子朝預於南子之亂非其意也使其不從必不免於禍故孔子哀其不幸曰有子魚之智而後免子魚之智史不得其詳矣然吾觀臧武仲之所以免齊侯之難意其若此也歟世子蒯聵孫明復曰正名者傳嗣立嫡之謂也為國之道莫大於傳嗣傳嗣之道莫大於立嫡所以防僭亂而杜篡奪也用能尊統傳緒承承而不絶故子路問於孔子曰衛君待子而為政子將奚先孔子以靈公無道不能先正厥嗣以靖其國卒使蒯聵父子爭立以亂於衛故對曰必也正名乎名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足謂諸此也何以辨諸按春秋定十四年衛世子蒯聵出奔宋哀二年晉趙鞅帥師納衛世子蒯聵于戚蒯聵出奔宋者蒯聵有殺母之罪懼而奔宋也納衛世子蒯聵于戚者靈公既死蒯聵為輒所拒不得入衛也且蒯聵有殺母之罪懼而奔宋靈公固宜即而廢之擇其次當立者以定嗣子之位也靈公不能先定嗣子之位故使公子郢得立輒于後以亂於衛夫蒯聵者靈公之子也輒者蒯聵之子也輒既立則蒯聵無以立矣蒯聵無以立則必反而爭其國既反而爭其國則輒必拒之輒既拒之是棄其父而立其子教其子以拒其父也噫君君臣臣父父子子邦國之大經也彼則棄其父而立其子教其子以拒其父君不君臣不臣父不父子不子禽獸之道也人理滅矣是故蒯聵出奔宋納于戚春秋皆正其世子之名而書之者惡靈公而不與輒也惡靈公者惡其不能正厥嗣以靖其國不與輒者不與其為人子而拒其父也或曰若蒯聵者獨無惡乎曰蒯聵有殺母之罪當絶反而爭其國是為篡國故經書納焉納者篡辭也孰謂蒯聵獨無惡哉然則蒯聵之篡國輒之拒父皆靈公為之也皆靈公為之者靈公生不能治其室死不能正其嗣也故春秋參譏之此乃聖人正君臣明父子救昏亂厚人倫之深㫖也而世之說者以為正百事之名者失之遠矣又曰春秋既正蒯聵世子之名而左氏公羊氏榖梁氏傳之俱無一言解經稱世子之義夫傳所以解經也傳而不解安用傳為唯江熙注榖梁曰齊景公廢世子世子還國書篡若靈公廢蒯聵立輒則蒯聵不得復稱曩日之世子也稱蒯聵為世子則靈公不命輒審矣此矛楯之喻然則從王父之言傳似失矣經云納衛世子鄭世子忽復歸于鄭稱世子明正也明正則拒之者非耶愚謂蒯聵稱世子之義傳既失之熙亦未為得也且蒯聵有殺母之罪當絶當絶則不得為嗣故經稱納衛世子納者篡辭也此則蒯聵還亦書篡非獨齊世子還而書篡也然蒯聵猶稱曩日之世子者乃孔子正其名而書之爾非為靈公不命輒而書之也熙安得謂稱蒯聵為世子則靈公不命輒審矣哉又忽稱世子者與蒯聵異矣觀鄭忽之出奔也非得罪而見逐也蓋以莊公既卒鄭忽當嗣為宋人執祭仲以立突篡而失國也況乎突之篡忽者兄弟也輒之拒蒯聵者父子也是故忽之出奔也書曰鄭忽出奔衛去世子者譏不能制其弟突以失國也及乎還也書曰鄭世子忽復歸于鄭稱世子者善其能反正于鄭也若蒯聵則不然蒯聵之出奔也書曰衛世子蒯聵出奔宋及乎還也書晉趙鞅帥師納衛世子蒯聵于戚出奔與納但稱世子者明蒯聵正嫡當嗣輒不得拒也由是言之則熙安得引鄭世子忽以解蒯聵稱世子之義哉則知世之說者不能辨傳嗣立嫡之道者由三傳失之於前說者惑之於後也潁濱曰衛之大亂者再皆起於父子夫婦之際宣公靈公專欲以興禍固無足言者伋子夀子爭相為死而莊公出公父子相攻二十餘年不以為恥賢愚之不同至此哉然伋夀勇於義惜其不為吳太伯而蹈申生之禍以重父之過可以為亷矣未得為仁也昔者孔子之門人季路高柴皆事出公孔子自陳反衛子路問曰衛君待子而為政子將奚先孔子曰必也正名乎名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所茍而已矣嗚呼衛之名於是可謂不正矣靈公黜其子而子其孫出公不父其父而禰其祖人道絶矣孔子於是焉而欲正之何為而不可靈公之死也衛人立公子郢郢不可則衛人立輒使輒而知禮必辭辭而不獲必逃輒逃而郢立則名正矣雖以拒蒯聵可也雖然孔子為政豈將廢輒而立郢耶其亦將教輒避位而納蒯聵爾蒯聵得罪於父生不養死不喪春秋書曰晉士鞅帥師納衛世子蒯聵于戚非世子而以世子名之以其得立於位成其為世子也若輒避位而納其父是世子為君也而名有不正乎名正而衛定矣季路潁濱曰冉有季路皆以政事稱於孔氏冉有才有餘而志不足其於季氏委曲從之不能有所立也至於季路忠厲而識暗事衛出公雖父子爭國而不知其危也方其攻莊公於臺上使幸而莊公舍孔悝季路與悝皆出猶可言也莊公方質孔悝以取衛其不釋孔悝明矣孔悝不出遂攻而勝之則為臣弒君季路雖生將安所容身乎嗚呼學於孔子而其慮害曾不若召獲悲夫歷代名賢確論卷二十
