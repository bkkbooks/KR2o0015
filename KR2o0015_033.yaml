body:
  text: 歷代名賢確論卷三十三始皇二罷封建朱敬則潁栁州東坡濵范祖禹曾子固罷封建朱敬則曰昔秦廢五等崔實仲長統王朗曹冏等皆以為秦之失余竊異之誠通其志云蓋明王之理天下也先之以博愛本之以仁義張四維尊五美懸禮樂於庭宇置軌範於中衢然復决𤣥波使橫流揚薰風以髙扇浮愷悌之甘澤浸曠蕩之膏腴正理革其淫邪淳風柔其骨髓使天下之人心醉而神足其於忠義也立則見其參於前其於進趨也皎若章程之在目禮經所及等日月之難踰聲教所行雖風雨之不輟聖人知俗之漸化也王道之已行也於是體國經野庸功勳親分山裂河設磐石之固內守外禦有維城之基連結遍於域中膠葛盡於封內雖道昏時喪澤竭政塞鄭伯逐王申侯殺主魯不供物宋不城周吳徴百牢楚問九鼎小白之一匡天下重耳之一戰諸侯無君之迹顯然篡奪之謀中寢者直以周禮尚有簡書不隕故曰不敢失墜天威在顔自春秋之後禮義漸頽風俗塵昏愧耻盡疾走先得者為上奪攘知命者為能加以八世專齊三家分晉子貢之亂五國蘇秦之鬭七雄苛刻薄與經籍道息莫不長詐術貴攻戰萬姓皆戴爪牙無人不屬觜距所以商鞅欺故友李斯囚舊交孫臏喪足於龎涓張儀得志于陳軫一旅之衆便欲稱王再戰之雄爭來奉帝先王㑹盟之禮昔時樽爼之容三代之風掃地盡矣况始皇削平區宇殊非至公李斯之作股肱罕循大道人無見德唯虐是聞當此時也主猜於上人駭於下父不能保之於子君不能得之於臣欲使始皇分土姦雄建侯薄俗若喻晉鄭之可依便借賊兵而資盜糧寄龍魚而助風雨不可行也是以秦鑒周德之綿深懼已圗之不逺罷侯置守髙下在心天下制在一人百姓不聞二主直是不得行其世封非薄功臣而賤骨肉也髙皇帝揭日月之明懷天地之量算財不足以分賞論功不足以受封邑皆百城土有千里人殷國富地廣兵强五十年間七國同反賈誼憂其國失鼂錯請削其地若言由大而反也不若召陵之師踐土之衆也若言有材而起也劉濞非王霸之材田祿無先管之略也且齊晉以逆禮為慚吳楚以犯上非愧釁由教起其所由來逺矣自此之後雜霸又衰中興不能改物創圗黃初不能深謀逺慮𬗟乎漢魏之際尋其經緯之初未有積德重光澤及萬物觀其教偷薄於秦風察其人豺狼於漢日故魏太祖曰若使無孤天下幾人稱帝幾人稱王明竊號議者觸目皆是欲以此時開賜履之祚垂萬代之封必有通車三川以窺周室介馬汾隰而逐翼侯王司徒屢請於當時曹元首又勤於宗室皆不知時也栁州曰天地果無初乎吾不得而知之也生人果有知乎吾不得而知之也然則孰為近曰有初近孰明之由封建而明之也彼封建者更古聖王堯舜禹湯文武而莫能去之蓋非不欲去之勢不可也勢之來其生人之初乎不初無以有封建封建非聖人之意也彼其初與萬物偕生草木榛榛鹿豕伾伾人不能摶噬而且無毛羽莫克自奉自衛荀卿有言必將假物以為用者也夫假物者必爭爭而不已必就其能斷曲直者而聽命焉其智而明者所伏必衆告之以直而不改者痛之而後畏由是君長刑政生焉故近者聚而為羣羣之分其爭必大大而後有兵德有大者衆羣之長又就而聽焉以安其屬於是有諸侯之列則其爭又有大者焉德又大者諸侯之列又就而聽命焉以安其封於是有方伯連率之類則其爭又有大者焉德又大者方伯連率之類又就而聽命焉以安其人然後天下㑹於一是故有里胥而後有縣大夫有縣大夫而後有諸侯有諸侯而後有方伯連率有方伯連率而後有天子自天子至於里胥其德在人者死必求其嗣而奉之故封建非聖人之意也勢也夫堯舜禹湯之事逺矣及周有天下裂土田而瓜分之設五等邦羣后布履星羅四周于天下輪運而輻集合為朝覲㑹同離為守臣扞城然而降于夷王害禮傷尊下堂而迎覲者歷于宣王挾中興復古之德雄南征北伐之威卒不能定魯侯之嗣陵夷迄于幽厲王室東徙而自列為諸侯厥後問鼎之輕重者有之射王中肩者有之伐凡伯誅萇宏者有之天下乖戾無尊君心余以為周之喪久矣徒建空名於公侯之上耳非諸侯之盛强末大不掉之咎歟遂判為十二合為七國威分于陪臣之邦國殄于後封之秦則周之敗端其在乎此矣秦有天下裂都㑹而為之郡邑廢侯衛而為之守宰據天下之雄圖都六合之上游攝制四海運於掌握之內此其所以為得也不數世而天下大壞有由矣亟役萬人暴其威刑竭其貨賄負鋤梃謫戍之徒圜視而合從大呼而成羣時則有叛人而無叛吏人怨於下而吏畏于上上下相咎殺守劫令而並起咎在人怨非郡邑之制失也漢有天下矯秦之枉修周之制剖海內而立宗子封功臣數年之間奔命扶傷而不暇困平城病流矢陵遲不救者三代後乃謀臣獻畫而離削自守矣然而封建之始郡邑居半時則有叛國而無叛郡秦制之得亦已明矣繼漢而帝者雖百代可知也唐興制州邑立守宰此其所以為宜也然猶桀猾時起虐害方域者失不在於州而在於兵時則有叛將而無叛州州縣之設固不可革也或者曰封建者必私其土子其人適其俗修其理施化易也守宰者茍其心思遷其秩而已何能理乎余又非之周之事蹟斷可見矣列侯驕盈黷貨事戎大凡亂國多治國寡侯伯不得變其政天子不得變其君私土子人者百不有一失在於制不在於政周事然也秦之事迹亦斷可見矣有理人之制而不委郡邑是矣有理人之臣而不使守宰是矣郡邑不得正其制守宰不得行其理酷刑苦役而萬人側目失在於政不在於制秦事然也漢興天子之政行於郡不行於國制其守宰不制其侯王侯王雖亂不可變也國人雖病不可除也及夫大逆不道然後掩捕而遷之勒兵而夷之耳大逆未彰姦利浚財怙勢作威大刻于民者無如之何及夫郡邑可謂理且安矣何以言之且漢知孟舒於田叔得魏尚於馮唐聞黃霸之明審覩汲黯之簡靖拜之可也復其位可也臥而委之以輯一方可也有罪得以黜有能得以奬朝拜而不道夕斥之矣夕拜而不法朝斥之矣假設漢室盡城邑而侯王之縱其令亂其人威之而已孟舒魏尚之術莫得而施黃霸汲黯之化莫得而行明譴而導之拜受而退已違矣下令而削之締交約從之謀周於同列則相顧裂眦勃然而起幸而不起削其半其半猶瘁矣曷若舉而移之以全其人乎漢事然也今國家盡制郡邑連置守宰其不可變也固矣善制兵謹擇守則理平矣或者又曰夏商周漢封建而延秦郡邑而促尤非所謂知理者也魏之承漢也封爵猶建晉之承魏也因循而不革而二姓陵替不聞延祚今矯而變之垂二百祀大業彌固何繫於諸侯哉或者又以為商周聖王也而不革其制固不當復議也是大不然夫商周之不革者是不得已也蓋以諸侯歸商者三千焉資以黜夏湯不得而廢歸周者八百焉資以勝商武王不得而易狥之以為安仍之以為俗湯武之所不得已也夫不得已非公之大者也私其力於已也私其衛於子孫也秦之所以革之者其為制公之大者也其情私也私其一已之威也私其盡臣畜於我也然而公天下之端自秦始夫天下之道理安斯得人者也使賢者居上不肖者居下而後可以理安今夫封建者繼世而理繼世而理者上果賢乎下果不肖乎則生人之理亂未可知也將欲利其社稷以一其人之視聽則又有世大夫世食邑以盡其封略聖賢生於其時則無以立於天下封建者為之也豈聖人之制使至于是乎吾固曰非聖人之意也勢也范祖禹曰栁宗元有言曰封建非聖人意也勢也蓋自上古以來有之聖人不得而廢也故制其爵位之等為之禮命之數合之以朝覲㑹同維之以長帥牧伯而後可治也周室既衰併為十二列為六七而封建之禮已亡秦以詐力一天下剗滅方國以為郡縣三代之制不可復矣後世惟知周之長久而不知所以長久者由其德不獨以封建也必欲法上古而封之弱則不足以藩屏彊則必至於僣亂此後世封國之弊也且堯舜有天下猶不私其子不以一人而害天下也况諸侯之後嗣或賢或不肖而必使之繼世乎是以一人而害一國然則如之何記曰禮時為大順次之堯舜禪授湯武征伐三代封國後世郡縣時也先王之禮或損或益因時制宜以便其民順也古之法不可用於今猶今之法不可用於古也後世如有王者親親而尊賢務德而愛民慎擇守令以治郡縣亦足以致太平而興禮樂矣何必如古封建乃為盛哉曽子固曰周之初天下列為諸侯而居者以千數力小易使也勢便易治也此所以不惟承號令奉職貢而已固實有以翼戴天子也及其衰也大國或兼數千里而王令之不能誅之不能加之并為六國合為秦而周亡矣非封建罪也地過王制也漢興襲其衰制尋亦大亂秦人壞列國而郡縣之其勢誠小而易使也尺兵不得制斗粟不得専視徙置守宰若奕碁然爾勢豈便而治豈得行也上之與吏吏之與民不異於燕越之相觀一有變則翻而從冦爾而能有以翼戴天子乎故一夫唱叛而秦滅矣非郡縣罪也守宰亡具甚耳今病封建者必曰用秦法病郡縣者必曰用周制皆不得其理也且而更其事以為天下可得更乎否也天下之存亡祇其大倫大法之治亂爾其次惟其所制制之使力小而易使勢便而易治皆善也地過王制勢奪於下皆害也借使韓魏燕趙列為百里之國而侯雖至今猶可也秦之郡縣勢足以自治力足以自衛雖以萬世無患可也天下之勢豈不誠易知哉後世矯前之敝法寢藩鎮權功成求遂矣然而尚未及守宰之分職伸州縣之幹翼豈計之善也萬一水旱疾疫其或有覬幸之人出者州縣其胡以備之徐樂山濤之論可不念耶誠念之不難擇人而任之分勢而使之如斯而已矣東坡曰秦初并天下丞相綰等言燕齊荆地逺不置王無以鎮之請立諸子始皇下其議羣臣皆以為便廷尉斯曰周文武所以封建子弟同姓甚衆其後屬疏逺相攻擊如仇讎諸侯更相誅伐天子不能禁止今海內賴陛下神靈一統皆為郡縣諸子功臣公賦稅重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬭不休以有侯王賴宗廟之靈天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下為三十六郡郡置守尉監蘇子曰聖人不能為時亦不失時時非聖人所能為也能不失時而已三代之興諸侯無罪不可奪削因而君之雖欲罷侯置守可得乎此所謂不能為時者也周衰諸侯相并齊晉秦楚皆千餘里其勢足以建侯樹屏至於七國皆稱王行天子之事然終不封諸侯不立强家世卿者以魯三桓晉六卿齊田氏為戒也久矣世之畏諸侯之禍也非獨李斯始皇知之始皇既并天下分郡邑置守宰理固當然如冬裘夏葛時之所宜非人之私智獨見也所謂不失時者而學士大夫多非之漢髙帝欲立六國後張子房以為不可世未有非之者斯之論與子房何異世特以成敗為是非耳髙帝聞子房之言吐哺罵酈生知諸侯之不可立明矣然卒王韓彭英盧豈獨髙帝子房亦與焉故栁宗元曰封建非聖人意也勢也昔之論封建者曹元首陸機劉頌及唐太宗時魏徴李百藥顔師古其後劉秩杜佑栁宗元宗元之論出諸子皆廢矣雖聖人復起不能易也故吾取其說而附益之曰凡有血氣必爭爭必以利利莫大於封建封建者爭之端而亂之始也自書契以來臣弒其君子弒其父父子兄弟相賊殺有不出於襲封而爭位者乎自三代聖人以禮樂教化天下至刑措不用然終不能已篡弒之禍至漢唐以來君臣父子相賊虐者皆諸侯王子孫其餘卿士大夫不世襲者蓋未嘗有也近世無復封建則此禍幾絶仁人君子忍復用之歟故吾以為李斯始皇之言栁宗元之論當為萬世法也頴濵曰諸侯之興自生民始矣至始皇滅六國而五帝三代之諸侯掃地無復遺者非秦能滅諸侯而勢之隆汚極於此矣昔禹㑹諸侯於塗山執玉帛者萬國傳商及周文武之間止千七百餘國夫人之必爭强弱之必相吞滅此勢之必至者也彼非諸侯獨能自存聖賢之君時出而齊之是以强者不敢肆弱者有以自立蓋自禹五世而得少康自少康十二世而得湯自湯六世而得太戊自太戊十三世亦得武丁自武丁八世而得周文武當是時雖有彊暴之諸侯不得以力加小弱然虞夏諸侯亡者已十八九矣自文武成康以來三十有三世獨一宣王能紀綱諸夏幽平以後諸侯放恣春秋之際存者百七十餘國而已雖齊桓晉文迭興以㑹盟征伐持之而道德不足其身所攻滅蓋已多矣陵遲至於六國獨有宋衛中山泗上諸侯在耳地大兵强皆務以詐力相傾雖使桓文復生號令將有所不行非有盛德之君不足以王是以至於蕩滅無餘而後止秦雖欲復立諸侯豈可得哉而議者乃追咎李斯不師古始使秦孤立無援二世而亡蓋未之思歟夫商周之初雖封建功臣子弟而上古諸侯碁布天下植根深固是以新故相維勢如犬牙數世之後皆為敵國不可復動今秦已削平諸侯蕩然無復立錐之國雖欲並建子弟而君民不親譬如措舟滄海之上大風一作漂卷而去與秦之郡縣何異且獨不見漢髙祖晉武帝之事乎割裂海內以封諸將諸子大者連城數十舉無根之人寄之萬民之上數十年之間隨即散滅不獲其用豈非惑於其名而未察其勢也哉古之聖人立法以御天下必觀其勢勢之所去不可以强反今秦之郡縣豈非勢之自至也歟然秦得其勢而不免於滅亡蓋治天下在德不在勢誠能因勢以立法務德以扶勢未有不安且治也使秦既一天下與民休息寬繇賦省刑罰黜奢淫崇儉約選任忠良放逺法吏而以郡縣治之雖與三代比隆可也歷代名賢確論卷三十三
