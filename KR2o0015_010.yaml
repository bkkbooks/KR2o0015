body:
  text: 歴代名賢確論卷十康王化商頑民東坡宣王中興栁州平王東遷洛邑東坡敬王萇洪栁州威烈王封趙韓魏為諸侯溫公通論周之仁禮溫公小雅兼周之盛衰東坡豳列國風宣王北伐列小雅東坡潁濱文王宣王陶冶人材荆公化商頑民東坡曰武王克商武庚禄父不誅也而列為諸侯周公相成王武庚禄父叛殷之頑民相率為亂不誅也而遷之洛邑武王周公其可謂至德也已矣曰羣飲汝勿佚盡執拘以歸于周予其殺商之工臣乃湎于酒勿庸殺之姑惟教之非至德能如是乎是以商之臣子心服而日化至康王之世三十餘年矣世變風移士君子出焉故命畢公曰道有升降政由俗革不臧厥臧民罔攸勸始則遷其頑者而教之非至德能如是乎終則擇其善者而用之周之於商人也可謂無負矣夫道何常之有應物而已矣物隆則與之偕升物汙則與之偕降夫政何常之有因俗而已矣俗善則養之以寛俗頑則濟之以猛自堯舜以來未之有改也故齊太公因俗設教則三月而治魯伯禽易俗變禮則五月而定三月之與五月未足為遲速也而後世之盛衰出焉以伯禽之賢用周公之訓而猶若是茍不逮伯禽者其變易之患可勝言哉中興栁州曰宣王時稱中興其道彰大于後罕及然徵於詩大小雅選徒出狩則車攻吉日命官分土則崧髙韓奕蒸民南征北伐則六月采芑平淮夷則江漢常武鏗鍧炳耀盪人耳目故宣王之形容與其輔佐由今望之若神人然此無他以雅故也東遷洛邑東坡曰太史公曰學者皆稱周伐紂居洛邑其實不然武王營之成王使召公卜居之居九鼎焉而周復都鎬至犬戎敗幽王周乃東徙于洛蘇子曰周之失計未有如東遷之謬也自平王至於亡非有大無道者也頃王之神聖諸侯服享然終以不振則東遷之過也昔武王克商遷九鼎于洛邑成王周公復增營之周公既没公欲葬成周而成王葬之畢此豈有意於遷哉今夫富民之家所以遺其子孫者田宅而已不幸而有至于敗乞假以生可也然終不敢議田宅今平王舉文武成康之業而大棄之此一敗而鬻田宅也夏商之王皆五六百年其先王之德無以過周而後王之敗亦不減幽厲然至于桀紂而後亡其未亡也天下宗之未有如東周之名存而實亡也是何也則不鬻田宅之効也盤庚之遷復殷之舊也古公遷于岐方是時周人如狄人也逐水草而居豈所難哉衞文公東徙渡河恃齊而存爾齊遷臨淄晉遷于絳于新田皆其盛時非有所畏也其餘避寇而遷都未有不亡雖不即亡未有能復振者也春秋時楚大飢羣蠻叛之申息之北門不啓楚人謀徙於阪髙賈曰不可我能往寇亦能往於是乎以秦人巴人滅庸而楚始大蘇峻之亂晉幾亡矣宗廟宫室盡為灰燼溫嶠欲遷豫章三吳之豪欲遷㑹稽將從之矣獨王導不可曰金陵王者之都也王者不以豐儉遷都若𢎞衞文大帛之冠何適而不可不然雖樂土為墟矣且北寇方强一旦示弱竄于蠻越望實皆喪矣乃不果遷而晉復安賢哉導也可謂能定大事矣嗟夫平王之初周雖不如楚之强顧不愈于東晉之㣲乎使平王有一王導定不遷之計収豐鎬之遺民而修文武成康之政以形勢臨東諸侯齊晉雖强未敢貳也而秦何自霸哉魏惠王畏秦遷于大梁楚昭王畏吳遷于郢頃襄王畏秦遷于陳考烈王畏秦遷于夀春皆不復振有亡徵焉東漢之末董卓刼帝遷于長安漢遂以亡近世李景遷于豫章亦亡故曰周之失計未有如東遷之謬也萇洪栁州弔萇洪辭曰有周之羸兮邦國異圖臣乗君側兮王易為侯威强逆制兮鬱命轉幽疹蠱膠密兮肝膽為仇奸權蒙貨兮忠勇以劉伊時云幸兮大夫之羞嗚呼危哉河渭潰溢兮横軀以抑嵩髙坼陊兮舉手排直壓溺之不慮兮堅剛以為式知死不可撓兮明章人極夫何大夫之炳烈兮王不寤夫讒賊卒施快于剽狡兮怛就制乎强國松柏之斬刈兮蓊茸欣植盗驪折足兮罷駑抗臆鷙鳥之髙翔兮㜸狐惴而不食竊畏忌以羣朋兮夫孰病百而伸一挺寡以校衆兮古聖人之所難矧援羸以威慠兮茲固蹈殆而違安殺身之匪予戚兮閔宗周之不完豈成城以夸功兮哀清廟之將殘嫉彪子之肆誕兮彌皇覽以為謾姑舍道以從世兮焉用夫考古而登賢指白日以致憤兮卒頹幽而不列版上帝以飛精兮黮寥廓而殄絶朅馮雲以羾愬兮終㝠㝠以鬱結欲登山以號辭兮愈洋洋以超忽心沍涸其不化兮形凝氷而自慄圖始而慮末兮非大夫之操蹈瑕委厄兮固衰世之道知不可而愈進兮誓不偷以自好陳誠以定命兮侔貞臣以與為友比干之以仁義類兮緬遼絶以不羣伯夷殉潔以莫怨兮孰克軌其遺塵茍端誠之内虧兮雖耆老其誰珍古固有一死兮賢者樂得其所大夫死忠兮君子所與嗚呼哀哉兮敬弔忠甫封趙韓魏為諸侯溫公曰天子之職莫大於禮禮莫大於分分莫大於名何謂禮紀綱是也何謂分君臣是也何謂名公侯卿大夫是也夫以四海之廣兆民之衆受制於一人雖有絶倫之力髙世之智莫不奔走而服從者豈非以權為之紀綱哉是故天子統三公三公率諸侯諸侯制卿大夫卿大夫治士庶人貴以臨賤賤以承貴上之使下猶腹心之運手足根本之制枝葉下之事上猶手足之衞心腹枝葉之庇本根然後能上下相保而國家治安故曰天子之職莫大於禮也文王序易以乾坤為首孔子繫之曰天尊地卑乾坤定矣卑髙以陳貴賤位矣言君臣之位猶天地之不可易也春秋抑諸侯尊周室王人雖㣲序於諸侯之上以是見聖人於君臣之際未嘗不惓惓也非有桀紂之㬥湯武之仁人歸之天命之君臣之分當守節伏死而已矣是故以㣲子而代紂則成湯配天矣以季札而君吳則太伯血食矣然二子寧亡國而不為者誠以禮之大節不可亂也故曰禮莫大于分也夫禮辨貴賤序親踈裁羣物制庶事非名不著非器不形名以命之器以别之然後上下粲然有倫此禮之大經也名器既亡則禮安得獨在哉昔仲叔于奚有功於衞辭邑而請繁纓孔子以為不如多與之邑惟器與名不可以假人君之所司也政亡則國家從之衞君待孔子而為政孔子欲先正名名不正則民無所措手足矣夫繁纓小物也而孔子惜之正名細行也而孔子先之誠以名器既亂則上下無以相有故也夫事未有不生於㣲而成于著聖人之慮逺故能謹其㣲而治之衆人之識近故必待其著而後救之治其㣲則用力寡而功多救其著則竭力而不能及也易曰履霜堅氷至書曰一日二日萬幾謂此類也故曰分莫大于名也嗚呼幽厲失德周道日衰綱紀散壞下陵上替諸侯專征大夫擅政禮之大體十喪七八矣然文武之祀獨綿綿相屬者盖以周之子孫尚能守其名分故也何以言之昔晉文公有大功于王室請隧於襄王襄王不許曰王章也未有代德而有二王亦叔父之所惡也不然叔父有地而隧又何請焉文公於是懼而不敢違是故以周之地則不大于曹滕以周之民則不衆於邾莒然歴數百年宗主天下雖以晉楚齊蔡之强不敢加者何哉徒以名分尚存故也至于季氏之于魯田常之于齊白公之於楚智伯之于晉其勢皆足以逐君而自為然而卒不敢者豈其力不足而心不忍哉乃畏干名犯分而天下共誅之也今晉大夫㬥蔑其君剖分晉國天子既不能討又寵秩之使列于諸侯是區區之名分復不能守而幷棄之也先王之禮於斯盡矣或者以為當是之時周室㣲弱三晉强盛雖欲勿許其可得乎是大不然夫三晉雖强茍不顧天下之誅而犯義侵禮則不請於天子而自立矣不請于天子而自立則為悖逆之臣天下茍有桓文之君必奉禮義而征之今請于天子而天子許之是受天子之命而為諸侯也誰得而討之故三晉之列於諸侯非三晉之壞禮乃天子自壞之也嗚呼君臣之禮既壞矣則天下以智力相雄長遂使聖賢之後者社稷無不冺絶生民之類糜滅幾盡豈不哀哉周之仁禮溫公曰平王東遷日以衰㣲至于戰國又分而為二其土地人民不足以比强國之大夫然而天下猶尊而事之以為其主守文武之宗祀綿綿焉久而不絶其故何哉植本固而發源深也昔周之興也禮以為本仁以為源自后稷以來至于文武成康其講禮也備矣其施仁也深矣民習于耳目浹于骨髓雖後世㣲弱其民將有陵慢之志則畏先王之禮而不敢為將有離散之心則思先王之仁而不忍去此其所以享國長久之道也不然以區區數邑處于七㬥國之間一日不可存况數百年乎小雅兼周之盛衰東坡曰詩之中惟周最備而周之興廢於詩為詳盖其道始于閨門父子之間而施及于君臣之際以被冒於天下者存乎二南后稷公劉文武創業之艱難而幽厲失道之漸存乎二雅成王纂承文武之烈而禮樂文章之備存乎頌其愈衰愈削而至夷於諸侯者存乎王黍離盖周之盛衰可以備見于此矣小雅言王政之小而兼陳乎盛衰之際者也夫幽厲雖失道而文武之業未墜宣王又從而中興之故雖怨刺並興而未列于國風者以為猶有王政存焉故曰小雅者兼乎盛衰之際者也昔之論者皆得其偏而未備者也季札觀樂歌小雅曰思而不貳怨而不言其周之衰乎文中子曰小雅烏乎衰其周之盛乎季札之所謂衰者盖其當時親見周道之衰而不覩乎文武成康之盛也文中子之所謂盛者言文武之餘烈久而未已雖其子孫之㣲而天下猶或宗周也故曰二子者皆得其偏而未備者也太史公曰國風好色而不淫小雅怨誹而不亂當周之衰也雖君子不能無怨要在不至於亂而已矣文中子乃以為周之全盛不已過乎故能病夫二子之說而後小雅之道備矣豳列國風宣王北伐列小雅東坡曰周公豳詩王業也而係之國風宣王北伐大事也而載之小雅盖豳詩言后稷公劉所以致王業之艱難者也其後累世而至於文王武王之時則王業已大成矣而其詩為二南二南之詩猶列於國風而至于豳獨何怪乎昔季札觀周樂以為大雅曲而有直體小雅思而不貳怨而不言夫曲而有直體者寛而不流也思而不貳怨而不言者狹而不迫也由此觀之則大雅小雅之所以異者取其詞之廣狹非取其事之大小也潁濱曰昔者周公遭變而作豳詩雖言王業之本而要以自明其身之無罪是以謂之國風宣王北伐其事雖大而其詩非大雅之體是以謂之小雅故夫寛柔敦厚者大雅之風也慷慨勁直者小雅之文也文王宣王陶冶人材荆公曰商之時天下嘗大亂矣在位貪毒禍敗皆非其人及文王之起而天下之才嘗少矣當是時文王能陶冶天下之士而使之皆有士君子之才然後隨其才之所有而官使之詩曰豈弟君子遐不作人此之謂也及其成也㣲賤兎罝之人猶莫不好德兎罝之詩是也又况於在位之人乎夫文王惟能如此故以征則服以守則治詩曰奉璋峨峨髦士攸宜又曰周王于邁六師及之言文王所用文武各得其才而無廢事也及至夷厲之亂天下之才又嘗少矣至宣王之起所與圖天下之事者仲山甫而已故詩人嘆之曰德輶如毛維仲山甫舉之愛莫助之盖閔人才之少而山甫之無助也宣王能用仲山甫推其類以新美天下之士而後人才復衆於是内修政事外討不庭而復有文武之境土故詩人美之曰薄言采芑于彼新田于此菑畝言宣王能新美天下之士使之有可用之才如農夫新美其田而使之有可采之芑也由此觀之人之才未嘗不自人主陶冶而成之者也所謂陶冶而成之者何也亦教之養之取之任之有其道而已歴代名賢確論卷十
