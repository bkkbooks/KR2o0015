body:
  text: 歷代名賢確論卷二舜象耕鳥耘陸龜蒙塗廩浚井陸龜蒙溫公瞽瞍殺人溫公潁濱舜制孫明復無為而治孫明復舉十六相去四凶孫明復坡曾子固公東鄭獬范文正南巡溫公昌黎命九官荆公象耕鳥耘陸龜蒙曰世謂舜之在下也田于歷山象為之耕鳥為之耘聖德感召也如是豫曰斯異術也何聖德歟孔子敘書於舜曰濬哲文明聖德止於是而足矣何感召之云云乎然象耕鳥耘之説吾得於農家請試辨之吾觀耕者行端而徐起撥欲深獸之形魁者無出於象行必端履必深法其端深故曰象耕耘者去莠舉手務疾而畏晚鳥之啄食務疾而畏奪法其疾畏故曰鳥耘試禹之績大成而後薦之於天其為端且深非得於象耕乎去四凶恐害於政其為疾且畏非得於鳥耘乎不然則雷澤之漁河濱之陶一無感召何也豈聖德有時而不德耶孟子曰堯舜與人同耳而好事者張以就其怪非聖人之意也吾病其書之異端驅之使合於道人其從我乎雖不從吾亦不能變其説塗廩浚井陸龜蒙曰先儒曰瞽瞍憎舜使塗廩浚井鴆于觴酒欲從而殺之舜謀於二女二女教以鳥工龍工藥浴注豕而後免矣夫勢之重壯夫不能不畏位之尊聖人不得不敬況舜壻于天子頑嚚嫚戾者獨不畏之又從而殺之且堯之妻二女帥九子觀舜之德舜乃受教於女子其術怪且如是是不教人以孝道教人以術免也固堯使朂之非觀德也何足以天下付溫公曰頑嚚之人不入德義則有矣其好利而畏害則與衆不殊也或者舜未為堯知而瞽瞍欲殺之則可矣堯已知之四嶽舉之妻以二女養以百官方且試以百揆而禪天下焉則瞽瞍豈得不利其子之為天子而尚欲殺之乎雖欲殺之亦不可得已藉使得而殺之瞽瞍與象將隨踵而誅雖甚愚人必不為也此特閭父里嫗之言而孟子信之過矣後世又承以為實豈不過甚矣哉瞽瞍殺人溫公曰書稱舜之德曰父頑母嚚象傲克諧以孝蒸蒸乂不格姦所貴於舜者為其能以孝和諧其親使之進進以善自治而不至於惡也如是則舜為子瞽瞍必不殺人矣若不能止其未然使至於殺人執於有司乃棄天下竊之以逃狂夫且猶不為而謂舜為之乎是特委巷之言也殆非孟子之言也且瞽瞍既執於臯陶矣舜惡得而竊之雖負而逃於海濱臯陶猶可執也若曰臯陶外雖執之以正其法而內實縱之以與舜是君臣相與為偽以欺天下也惡得為舜禹臯陶哉又舜既為天子矣天下之人戴之如父母雖欲遵海濱而處民豈聽之哉是臯陶之執瞽瞍得法而亡舜也所亡益多矣故曰是特委巷之言殆非孟子之言也潁濱曰孟子曰舜為天子臯陶為士瞽瞍殺人臯陶則執之舜則竊負而逃於海濱吾以為此野人之言非君子之論也舜之事親蒸蒸乂不格姦何至於殺人而負之以逃且天子之親有罪議之孰謂天子之父殺人而不免於死乎舜制孫明復曰舜既順堯命庸十六相放四凶也以帝天下之制猶有未至者焉乃窮神極慮以增以益夫所謂帝天下之制者君君臣臣上下貴賤之序歷久而不相瀆者是也厥初生民冥焉而無知浩焉而無防薿薿羣羣孰君孰師與鳥獸並黃帝觀乾坤創法度衣之裳之以辨君臣以正上下以明貴賤由是帝天下之制從而著焉黃帝創之於前帝堯奉之於後然二帝之間厥制未盡黃帝取乾坤分上下止為一人之服以至於堯無所增益逮乎虞舜再觀厥象以盡其神謂五等之制不可不正也於是分其命數異其等威殊其采章以登以降自公而下率之以兩然後一人之服五等之制煥然而備俾臣無以僭其君下無以陵其上賤無以加其貴僭陵篡奪之禍不作雖四海之廣億兆之衆上穆下熙可髙拱而視故易曰黃帝堯舜垂衣裳而天下治臯陶謨曰天命有德五服五章哉是也若五等之制非由虞帝而備則易何以兼言於舜臯陶謨何以繫之於虞書耶或曰舜三十登庸三十在位五十載陟方乃死其舜自歷試與居攝三十年在天子之位又五十年其八十年間作事垂法為萬世利者多矣今子止以舜因一人之服增五等之制者何願聞其説曰善乎爾之問也吾之所言者聖人之極致也夫乾者君之道也坤者臣之道也衣上而裳下者乾坤之象也衣之可加于裳示君之可加於臣也裳之不可加於衣示臣之不可加于君也聖人南嚮而治天下久久而不相瀆者始諸此也故舜增五等之制自下而上俾貴賤之序益明天子之位益增此舜所以杜萬世僭陵篡奪無窮之禍也雖後聖有作千制萬度無以逾於此矣故曰吾之所言者聖人之極致也無為而治孫明復曰無為者其虞帝氏之大德歟非曠然而不為也者不求于天下而天下自歸之終不受於天下而以天下授之于人自生民以來虞帝氏一人而已昔在歷山而耕焉雷澤而漁焉河濱而陶焉當是時也彼孰有意于天下哉及乎玄德升聞堯遽以天下禪之舜既受堯禪夙夜兢兢懼德弗類以其天下者堯之天下也不以堯之道治之則其天下之民有不得其所者矣於是盡履堯之道而行之俾其天下之民不異于堯之世也舜居位既久復以堯之天下堯之道盡與禹此舜之德其可謂大德也已夫舜之天下者堯之天下也舜之道者堯之道也舜始得之於堯而終傳之於禹以舜之治無為也章章矣噫上無堯下無禹孰可髙視而稱于無為哉上堯而下禹舜所以得髙視而無為也不然則孔子上觀伏羲下訖文武筆于六經為萬世法何不曰無為者伏羲也黃帝也堯也禹也湯也文武也而止曰舜也歟哉若以無為為曠然而不為則書何以曰齊七政類上帝禋六宗又曰覲四嶽頒瑞于羣后又曰東巡狩至于岱宗協時月正日同律度量衡修五禮五玉又曰南巡狩至于南嶽西巡狩至于西嶽北巡狩至于北嶽又曰肇十有二州封十有二山又曰流宥五刑又曰流共工放歡兜竄三苗殛鯀又曰詢四嶽闢四門明四目達四聰又曰禹汝平水土又曰黎民阻飢后稷播殖百穀又曰百姓不親五品不遜又曰臯陶蠻夷猾夏寇賊姦宄以至五十載陟方乃死之類此舜有為其繁也如是之甚矣且書者聖筆之親刪也孔子覩舜之有為其繁也如是之甚安可反謂之無為哉由是而觀之則知無為者非曠然而不為也此又章章矣吾故曰上無堯下無禹孰可髙視而稱于無為哉上堯而下禹舜所以得髙視而無為也舉十六相去四凶孫明復曰無為之道其至矣哉非虞帝孰能與於此後之帝天下者不思虞帝之大德而慕虞帝之無為吾未見其可也三代而下不思虞帝之大德而慕虞帝之無為者衆矣又世之憸佞偷巧之臣迎而啓導之既不能陳虞帝之大德以左右厥治則往往引佛老清淨虛無報應因果之説交亂乎其間敗於君德吁可痛也觀其惑佛老之説忘祖宗之勤罔畏天命之大靡顧神器之重天下至廣神器至重朱既不肖弗堪厥嗣故命于舜舜起微陋雖曰睿聖然世德弗耀四嶽十二牧未盡服其德九州四海未盡蒙其澤不可遽授以大位也若遽授之則四嶽十二牧其盡臣之乎九州四海其盡戴之乎不臣不戴則爭且叛矣堯懼其如是也非權曷以授之於是潛神隱耀厥用弗彰以觀于舜故八凱八元雖積其善而不舉也三苖四凶雖積其惡而不去也若盡舉八凱八元盡去三苗四凶則舜有何功於天下耶是故堯不舉而俾舜舉之堯不去而俾舜去之俟其功著于天下四嶽十二牧莫不共臣之九州四海莫不共戴之然後授以大位絶其爭且叛也非堯孰能與於此故孔子曰大哉堯之為君也巍巍乎惟天為大惟堯則之蕩蕩乎民無能名焉巍巍乎其有成功也煥乎其有文章蓋言堯以權授舜其道宏大高遠之若是而人莫有能見其迹者而先儒稱堯不能舉不能去妄哉曾子固曰或者問曰堯之聖不逮舜堯不能用九官誅四罪而舜能焉對曰虞舜之所以聖由唐堯之聖舜之用與誅宜也曰然則堯之時獨不可用與誅乎曰將以遺舜也其以遺舜奈何堯信舜之聖久矣將舉而禪焉且以信於衆因四嶽之舉遂試之其試由是夫起聖人不茍以名服天下必信其德於衆德莫大於用賢誅惡於是遂授以位焉而天下率信用與誅蓋假之舜云耳曰然則堯之聖將蔽賢縱惡乎曰否用與誅至于舜之時可也故堯遲之云耳以成乎舜也則其德在堯者多矣曰然則堯其私於舜乎非私舜也私其所以為天下也曰左氏傳所謂不能者何也曰吾所論聖人之説彼左氏何與焉范文正公曰夬一陰處髙而羣陽伐之以大制小以正黜邪之時也時皆剛正柔佞豈得而據乎夫君子道微之時法令常密而或失之者何也內有小人也小人道微之時法令常顯而無忌者何也內皆君子也此卦一柔而乘五剛危可知矣五陽而決一陰易可知矣故揚于王庭而不忌賞罰明行之際歟舜舉八元而去四凶此其時矣東坡曰史記舜本紀舜歸而言於帝請流共工於幽陵以變北狄放歡兜於崇山以變南蠻遷三苗於三危以變西戎殛鯀於羽山以變東夷太史公多見先秦古書故其言時有可考以正漢以來儒者之失四族者若皆窮姦極惡則必皆誅於堯之世不待舜矣屈原曰鯀悻直以亡身則鯀蓋剛而犯上者耳若四族者皆小人也則安能以變四夷之俗哉由是觀之四族之誅皆非誅死亦不廢棄但遷之逺方為要荒之君長耳如左氏之言皆後世流傳之過若堯世大姦在朝而不能去則堯不足以為堯鄭獬曰四凶果無以撓堯也堯孰有不能哉以其有舜也書曰耄期倦于勤堯老矣是天下必有窳而不起者故位舜以持之也於時四凶之惡始暴焉攓而鋤之在舜不在堯固然也堯得舜其猶窽然歟果堯以為能也撓堯者不若是猶之撓舜曰曷不若禹之於水也堯不去四凶以有舜也惡之未暴也不則堯去之矣舜不堙水得之禹也不則舜堙之矣故四凶之去舜事也能不能不以堯繫也聖人躡而起欲揭天下法必公於首誅焉天下熠然骨次而心螫則其鼓號令不須力而折之也周公也始相周管蔡為首誅天下不周公服者無有也孔子也始作魯司冦少正卯為首誅魯不孔子從者無有也舜也獨於四凶岐於是乎哉一誅惡而天下服聖人之用深矣故曰四凶之去舜事也能不能不以堯繫也曰有説者焉堯不已誅而屬之舜權也堯將天子舜猶慮夫戾舜者故豢而遺之舜俾自絶之也曰視繼者能乎否也舜果曰能之曷席于是哉藉堯已誅之舜已號天子果有戾者舜亦從而誅之矣戾者誅天下亦自舜服矣説者果有是是不以聖人期舜也已南巡溫公曰昔舜命禹曰朕耄期倦于勤汝惟不怠總朕師是以天子為勤故老而使禹攝也夫天子之職莫勤于巡狩而舜猶親之卒死於外而葬焉惡用使禹攝哉是必不然或曰虞書稱舜陟方乃死孔安國以為升道南方巡狩而死禮記亦稱舜葬于蒼梧之野皆如太史公之言子獨以為不然何如曰傳記之言不可據以為實藉使有之又安知無中國之蒼梧而必在江南耶虞書陟方云者言舜在帝位治天下五十載升於至道然後死耳非謂巡狩為陟方也嗚呼遂使後世愚悖之人或疑舜禹為非聖人豈非孔安國與太史公之過也歟昌黎曰湘旁有廟曰黃陵自前古立以祠堯之二女舜二妃者庭有古碑斷裂分散在地其文剝缺考圖記言漢荆州牧劉表景升所立題曰湘夫人碑今驗其文乃晉太康九年又題其額曰虞舜二妃之碑非景升立者秦博士對始皇帝云湘君者堯之二女舜妃者也劉向鄭玄亦皆以二妃為湘君而離騷九歌既有湘君又有湘夫人王逸之解以為湘君者自為水神而謂湘夫人乃二妃也從舜南征三苗不返道死沅湘之間山海經云洞庭之山帝之二女居之郭璞疑二女者舜之后不當降小君為其夫人因以二女為天帝之女以余考之璞與王逸俱失也堯之長女娥皇為舜正妃故曰君其次女女英自宜降曰夫人也故九歌辭謂娥皇為君謂女英為帝子各以其盛者推言之也禮有小君君母明其正自得稱君也書曰舜陟方乃死孔安國謂舜升道南方以死或又曰舜死葬蒼梧二妃從之不及溺死沅湘之間余謂竹書紀年帝王之歿皆曰陟陟升也謂升天也書曰殷禮陟配天言以道終其德協天也書紀舜之沒云陟者與竹書周書同文也其下言方乃死者所以釋陟為死也地之勢東南下如言舜南巡而死宜言下方不得言陟方也以此謂舜死蒼梧時二妃從之不及而溺死者皆不可信二妃既曰以謀語舜脫舜之厄成舜之聖堯死而舜有天下為天子二妃之力宜當為神食民之祭今之度湘江者莫敢不進禮廟下命九官荆公曰舜命其臣而教戒之未有不讓者焉至於夔則獨無所讓而又稱其樂之和美者何也夫禹垂益伯夷龍皆新命者也故疇於衆臣而後命之而皆有讓矣棄契臯陶夔當是時蓋已為是官因命是五人者而敕戒之焉耳故獨無所讓也孔氏曰禹垂益伯夷夔龍皆新命者蓋失之矣聖人之聰明雖大過於人然未嘗自用聰明也故舜之命此九人者未嘗不咨而後命焉則何獨於夔而不然乎使夔為新命者則何稱其樂之和美也使夔之受命之日已稱其樂之和美則賢人之舉措亦少輕矣孔氏之説蓋惑於命汝典樂之語爾夫汝作司徒汝作士之文豈異於命汝典樂之語乎且所以知其非新命者蓋舜不疇而命之而無所讓也舜之命夔也亦無疇夔之受命也亦無讓則何以知其為新命乎夫擊石拊石而百獸率舞非夔之所能為也為之者衆臣也非衆臣之所能為也為之者舜也將有治於天下則可以無相乎故命禹以宅百揆也民窘於衣食而欲其化而入於善豈可得哉故命棄以為稷也民既富而可以教矣則豈可以無教哉故次命契以為司徒也既教之則民不能無不帥教者民有不帥教則豈可以無刑乎故次命臯陶以為士也此皆治人之所先急者備矣則可以治末之時也工者治人之末者也故次命垂以為共工也於是治人之事具則宜及於鳥獸草木也故次命益以為虞也夫其所以治至於鳥獸草木則天下之功至矣治天下之功至則可以制禮之時也故次命伯夷以為典禮夫治至於鳥獸草木而人有禮以節文之則政道成矣可以作樂以樂其成也故次命夔以為典樂也借使禹不能總百揆稷不能富萬民契不能教臯陶不能士垂不能共工伯夷不能典禮然則天下亂矣天下亂而夔欲擊石拊石百獸率舞其可得乎故曰為之者衆臣也使舜不能用是衆臣則是衆臣亦不能成其功矣故曰非衆臣之所能為也為之者舜也夫夔之所以稱其樂之和美者豈以為伐耶蓋以美舜也孔子之所謂將順其美者其夔哉歷代名賢確論卷二
