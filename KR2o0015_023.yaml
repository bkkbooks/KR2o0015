body:
  text: 歴代名賢確論卷二十三列國通論王伯温公荆公五伯潁濱桓文譎正東坡楚吳越潁濱齊魯白樂天潁濱管蔡齊楚曹宋潁濱春秋諸小國潁濱春秋無賢臣孫邵范文正公三不欺吕温荆公王伯温公曰合天下而君之之謂王王者必立三公三公分天下而治之曰二伯一公處乎内一公處乎外皆王官也周衰二伯之職廢齊桓晉文糾合諸侯以尊天子因命之為侯伯修舊職也伯之語轉而為霸之名自是興自孟荀氏而下皆曰由何道而王由何道而霸道豈有二哉得之有淺深或功有小大耳譬諸水為畎為澮為谷為谿為川為瀆君所鍾則海也大夫士畎澮也諸侯谿谷也州牧川也方伯瀆也天子海也小大雖殊水之性奚以異哉荆公曰仁義禮信天下之達道而王霸之所同也夫王之與霸其所以用者則同而其所以名者則異何也蓋其心異而已矣其心異則其事異其事異則其功異其功異則其名不得不異也王者之道其心非有求於天下也所以為仁義禮信者以為吾所當為而已矣以仁義禮信修其身而移之政則天下莫不化之也是故王者之治知為之於此不知求之於彼而彼固已化矣霸者之道則不然其心未嘗仁也而患天下惡其不仁於是示之以仁其心未嘗義也而患天下惡其不義於是示之以義其於禮信亦若是而已矣是故霸者之心為利而假王者之道以示其所欲其有為也唯恐民之不見而天下之不聞也故曰其心異也齊桓公刼於曹沫之刃而許歸其地夫欲歸其地者非吾之心也許之者免死而已由王者之道則勿歸焉可也而桓公必歸之地晉文公伐原約三日而退三日而原不降由王者之道則雖待降焉可也晉文公退其師葢欲其信示於民者也凡所為仁義禮信亦無以異於此矣故曰其事異也王者之大若天地然天地無所勞於萬物而萬物各得其性萬物雖得其性而莫知其為天地之功也王者無所勞於天下而天下各得其治雖得其治然而莫知其為王者之德也霸者之道則不然若世之惠人耳寒而與之衣飢而與之食民雖知吾之惠而吾之惠亦不能及夫廣也故曰其功異也夫王霸之道則異矣其用至誠以求其利而天下與之故王者之道雖不求利之所歸霸者之道不主於利然不假王者之事以接天下則天下孰與之哉五伯潁濱曰五伯桓文為盛然觀其用兵皆出於不得已桓公帥諸侯以伐楚次于陘而不進以待楚人之變楚使屈桓如師桓公陳諸侯之師與之乘而觀之屈完見齊之盛懼而求盟諸侯之兵成列而未戰也桓公退舍召陵與之盟而去之夫豈不能一戰哉知戰之不必勝而戰勝之利不過服楚全師之功大於克敵故以不戰服楚而不吝也晉文公以諸侯遇楚於城濮楚人請戰文公報楚人之惠退而避之三舍軍吏皆諫咎犯曰我退楚還我將何求若其不還君退臣犯曲在彼矣師退而楚不止遂以破楚而殺子玉使文公退而子玉止則文公之服楚亦與齊桓等無戰勝之功矣故桓文之兵非不得已不戰此其所以全師保國無敵於諸侯者也至宋襄公國小德薄而求諸侯淩虐邾鄫之君争鄭以怒楚兵敗身死之不暇雖竊霸者之名而實非也其後秦穆公東平晉亂西伐諸戎楚莊王克陳入鄭得而不取皆有霸者之風矣然穆公聽杞子之計違蹇叔而用孟明千里襲鄭覆師於殽雖悔過自誓列於周書而不能東征諸夏以終成霸業莊王使申舟聘齊命無假道於宋舟知必死而王不聽宋人殺之王聞其死投袂而起以兵伐宋圍之九月與之盟而去之雖號能服宋然君子以為此不假道之師也齊靈公楚靈王之所為莊王亦為之而尚可以為霸乎於乎此二君皆賢君也兵一不義而幾至於狼狽不能與桓文齒而況其下乎桓文譎正東坡曰權以濟事曰譎鄒陽曰齊桓公殺哀姜于夷孔子曰正而不譎陽之時師傅蓋云爾以此推之晉文公譎而不正蓋納辰嬴之過也哀姜親也齊雖不誅君子不以罪桓公故曰正而不譎以為桓公可以譎而猶正蓋甚之也秦穆公賢君也文公雖辭辰嬴不害其反國縱使害其反國君子亦不以是亂男女之别故曰譎而不正以為文公可以正而猶譎葢罪之也楚吳越潁濱曰吳自泰伯至夀夢十九世不通中國夀夢以下始與諸侯盟㑹七世而亡然孔子作春秋終以蠻夷書之謂之吳而不人葢禮義不足故也春秋諸侯國而不人者三楚始稱荆而已僖元年書楚人伐鄭文九年書楚人使越椒來聘自是遂與諸侯齒而吳越終春秋不人此其禮義存亡之實也故余因春秋所書而推考三國得失成敗之效以為呉越皆戰勝攻取能服人矣而無禮義以自持吳欲以乘陵諸夏而不知止故闔閭之後覆亡而不救越能自安於蠻夷無意於王霸故勾踐之後固陋而無聞至於楚禮義雖不足道而亦無愧於齊晉故其後遂與戰國相終始由是觀之禮義之於為國豈誣也哉齊魯樂天曰夫欲使政化速成則在乎去煩擾𢎞簡易而已臣請以齊魯之事明之臣聞伯禽之理魯也變其禮革其俗三年而政成太公之理齊也簡其禮從其俗五月而政成故周公嘆曰夫平易近人人必歸之魯後代其北面事齊矣此則煩簡遲速之效明矣潁濱曰古者七介以相見三辭三讓而後至無所不致其文所謂敬也不敬則確確則易易則民慢古之君子其躬無所不敬其於人也則不然平易近民而後民安之太公之所以治齊則居敬而行簡者伯禽之所以治魯則居敬而行敬者也雖周公亦憂魯之不競則仲弓之言周孔之所詳也管蔡齊楚曹宋潁濱曰孟子有言王不待大而伯必有大國王者以德伯者以力以德服人凡有智者莫與之較以力服人力之所不勝則殆故湯以七十里文王以百里齊桓晉文皆因大國之資而後有成齊襄公楚靈王奮齊楚之力無德而求諸侯國未可亡而身死之曹伯陽宋王偃國小德劣而圖霸者之事身死而國隨以滅夫惟樂天者可以保天下畏天者可以保其國未能畏天而求樂天之功難哉春秋諸小國潁濱曰楚方北征諸夏而陳蔡許鄭適當其衝其為國也難矣吳季子札見鄭子産曰子為國慎之以禮不然鄭國將敗子産以區區之鄭立於晉楚之間敬而不懾卒免大國之患非禮何以當之若陳蔡許顛沛隕越之不暇卒先鄭以滅善哉鄭渾罕之論之也曰姬在列者蔡及曹滕其先亡乎偪而無禮鄭先衛亡偪而無法作丘賦鑄刑書皆廢法以便事故曰無法夫無禮則不能自立無以止大國之暴無法則不能安人民將不懷大國不予不折必仆民不予將以其力自斃此其所以為亡之先後也又杞宋皆天子之事守也蓋禮樂車服有焉故孔子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也文獻不足故也然宋雖不足徴然春秋之際晉楚大國有所不知未嘗不問焉晉悼公過宋觀桑林之舞楚靈王将㑹諸侯向戍獻公合諸侯之禮云如杞遂至於用夷無足言者昔孔子學官名於郯子郯至㣲矣而其先王之遺文於諸侯為詳孔子之於夏禮葢猶有考於杞焉而國無君子不能自别悲夫春秋無賢臣孫邵曰春秋列國周之諸侯受周之封分為五等五等之下臣為陪臣陪臣於諸侯君父也諸侯於周王亦君父也陪臣於周義猶大父也夫為子之道孝於父者必欲父孝於祖陪臣忠於諸侯者必欲諸侯忠於天子則忠孝兩全康乂天下今春秋陪臣張公室侵王室弱周以强諸侯是弱祖而强父佐諸侯而敵周是佐父而敵祖遺祖之怨成父之逆惡莫大焉言之於臣則非忠語之於子則非孝論之於道則傷義推之於情則孤恩遂使姬周削弱祀號而已桓文雖以為霸何能正之反有封禪請隧之僭管晏雖有其功何能諫之而有反坫毁孔之惡于時風教大壞海内焚如天不能陰隲下民降大聖以為木鐸歴國七十餘說而不遇奔走齊魯宋衛之郊反若喪家之狗知不可訓慮後世不懼乃修春秋明向背其有甚者或夷之或狄之弑君三十六亡國五十二奔走失社稷者不可勝紀書曰帝乃震怒致令海内無一嘉祥但有妖怪謂春秋亂世豈不誠然于時人不堪命何耶無賢臣哉予為此論警衆士大夫多稱之遂聞唆口鬲嘏唆口鬲嘏徴而奇之或謂可刋金石訓乎今後既而喧傳則有難僕曰春秋豈乏賢者子謂之無激之耶解之耶奈乎孔門何曰孔門仕者鮮又家臣耳子不讀聖賢書乎易云屯其膏小貞吉大貞凶春秋之大夫小貞耳葢以大貞取之以王道取五霸猶罪人范文正公曰論者曰春秋無賢臣罪其不尊王室也噫春秋二百四十年天地五行之秀生生不息何嘗無賢乎當東周之㣲不能用賢以復張文武之功故四方英才皆見屈於諸侯與霸者之為而王道不興與無賢同故論者傷之甚矣三不欺吕温曰昔宓子賤為單父也人不忍欺之國僑為鄭也人不能欺之西門豹為鄴也人不敢欺之此皆為政不同同歸于理作幹事之稱首胎牧人之經範汪洋古今輝焯圖史窮理而語固有優劣擇善而行豈無先後請試論之子賤仕衰亂之魯而邑偪強齊仗義為城池倚仁為干櫓當鯨吞之大敵鳩狼顧之遺黎渙離形檢妙用心術惠訓不倦乃無得而稱視民如傷而不有其愛感而動之隂陽運於無言誠而明之日月懸於方寸是則不求不欺於人而人不忍欺矣子産攝晉楚之間而靖共爾位役智利物飭躬勵俗守之以信行之以禮告之以慈惠臨之以明察如鏡同照如衡誠懸是則求人不欺而人亦不能欺矣西門豹當戰國之際而克修茂績身為紀律言有典章剛包其柔威克厥愛權之以法制董之以刑罰火烈人望霜清物止是則責人不欺而人固不敢欺矣夫不忍欺者至誠潛感是曰上德堯舜之吏也不能欺者明智旁達是曰有政三王之吏也不敢欺者嚴威允濟是曰能刑五伯之吏也誠不足至於智智不足至於威大小之間朗然可見然而事在折衷理資漸致德宜全舉道貴兼通必也修誠而棄智誠未至而政理或虧任智而廢威智未周而暴亂將起不若兼而行之迭收其效一之日二之日刑明威立使人畏而不敢欺三之日四之日智達政成使人敬而不能欺五之日六之日志孚誠格使人感而不忍欺以寛濟猛同二氣之和平自邇陟遐比三才之具美茍非全德大器其孰能至於此乎若不暇㑹其源流統其宗極而始定優劣直論先後則堯舜之吏與王霸不同年而語矣荆公曰昔論者曰君任德則下不忍欺君任察則下不能欺君任刑則下不敢欺而遂以德察刑為次蓋未之盡也此三人者之為政皆足以有取於聖人矣然未聞聖人為政之道也夫未聞聖人為政之道而足以有取於聖人者葢人得聖人之一端耳子賤之為政使人不忍欺古者任德之君宜莫如堯也然則驩兠猶或以類舉於前則德之使人不欺豈可獨任也哉子産之政使人不能欺夫君子可欺以其方故使畜魚而校人烹之然則察之使其人不欺豈可獨任也哉西門豹之政使人不敢欺夫不及於德而任刑以治是孔子所謂民免而無恥者也然則刑之使人不欺豈可獨任也故曰此三人者未聞聖人為政之道也然聖人之道有出此三者乎亦兼用之而已昔者堯舜之時比屋之民皆足以封則民可謂不忍欺矣驩兠以丹朱稱於前曰嚚訟可乎則民可謂不能欺矣四罪而天下咸服則民可謂不敢欺矣故任德則有不可化者任察則有不可周者任刑則有不可服者然則子賤之政無以正暴惡子産之政無以周隠㣲西門豹之政無以漸柔良然而三人皆能以治者葢足以治小具而高亂世耳使當堯舜之時所大治者則豈足用哉蓋聖人之政仁足以使民不忍欺智足以使民不能欺政足以使民不敢欺然後天下無或欺之者矣或曰刑亦足任以治乎曰所任者葢亦非專用之而足以治也豹治十二渠以利民至乎漢吏不能廢民以為西門君所為不從吏以廢也則豹之德亦足以感於民心矣然則尚刑故曰任刑焉耳使無以懐之而惟刑之見則民豈得或不能欺之哉歴代名賢確論卷二十三
