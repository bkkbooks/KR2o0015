body:
  text: 歷代名賢確論卷三十諸王楚之興亡潁濱溫公劉軻懷王屈原皮日休栁州潁濱襄王迎婦於秦溫公宋玉對風潁濱考烈王春申君皮日休潁濱諸王國之興亡潁濱溫公惠王樂毅潁濱東坡王喜燕丹荆軻溫公楚之興亡潁濱曰楚靈王因陳公子招之亂而滅陳追討蔡侯般之弒君而滅蔡假大義以濟私欲晉政已亂莫之能較沛然自以為得計矣不十年而有乾溪之禍秦惠王使張儀說楚懷王欺而賣之如劫嬰兒昭王又誘而執之咸陽加之以兵遂分楚之半此其惡甚於楚靈王然傳子孫纍世其禍乃應夫國天地有與立矣一日為惡禍未即報也本弱者速斃根深者徐拔彼方以得為幸而不知天網之不失也是故楚雖已滅而楚之父老知秦之禍曰楚雖三戶亡秦必楚卒之滅秦者皆楚人也楚莊王討陳夏徴舒圍鄭及宋力皆足以取之棄而不有夫豈不欲畏天故也莊王既霸諸侯而楚遂以興天命之不僭如此而可誣者哉溫公曰楚自祝融鬻熊以來其有國幾何年矣方其盛也奄有南海慿陵諸夏及懷王放廢忠良親近讒慝惑於張儀之口而耳目不能自守見欺而不悟亡師而不悔以失濟失客死於秦使其子孫銜涕忍恥以事仇讎強之女而不敢辭陵廟焚而不敢怨逃鼠伏自屏于陳束兵不戰而攻之不解割地請和而侵之不止卒不見赦而國以淪亡不亦悲乎劉軻代荀卿與楚相春申君書曰自重黎為火正光融天下鬻熊有婦德教西伯弟子洎蚡冒熊繹蓽路藍縷以啓荆蠻歷文武成始臣妾江漢至莊王始與中國爭伯此數君皆郢之祖宗而代亦稱臣之職五尺童子羞稱五伯臣又可必獨為相君道哉然楚君但成莊而已矣自莊而下楚亟不競平王嗣位耳目倒置伍奢以諫死費無極以讒用亡太子走昭王汙楚宫鞭郢墓豈不以一讒而至乎爾下及懷王知左徒屈原忠賢始能以楚政付之當諸侯盛以游說交鬬猶以楚為有人無何為上官靳尚所短王怒疏屈平平既疏秦果為張儀計啖楚以商於地儀計行秦果欺楚是以有藍田之役丹浙之敗懷王囚不出咸陽亡不越魏境客死而尸歸至今為楚痛豈不曰疏屈平親靳尚而至于爾人亦謂令尹子蘭不得皭然無非已不能嫉讒又從而惜之俾屈生溺離騷為之作襄王以前事歷來切骨雖有宋玉唐勒景差輩子弟賦諷弔屈不已又何能免王於矢石哉屈原皮日休遇謗曰靳尚之言兮美如㜲子蘭之氣兮醲於酲既怒矊以相向兮遂裹足而南征面㥾㥾以奚色心憡憡以何情耳方聰兮忽聧目正視兮忽盲日當午兮便昃天方晝兮不明欲泣兮有血將啼兮失聲望靈修兮似失出國門兮若驚軔識怨兮亦緩駟知愁兮復鳴既徜徉兮夏水復眷戀兮南荆嗟余夙秉於大訓兮涵清骨之忠貞即貿貿者之莫子容兮向重蒼以自盟既婪仁以慿義兮遂鈲信而摫誠將真宰之不仁兮胡為役余以此生彼鷽斯有賊兮固不能容乎鶬鶊彼茨菉之叢穢兮固不能讓乎杜蘅已矣乎國無人兮莫我留將訴帝于玉京栁州弔屈原曰先生之不從世兮惟道是就支離搶攘兮遭世孔疚華蟲薦壤兮進御羔褎牝雞咿嚘兮孤雄束咮哇咬環觀兮䝉耳大吕堇喙以為羞兮焚棄稷黍犴獄之不知避兮宫庭之不處陷塗藉穢兮榮若繡黼榱折火烈兮娛娛笑舞讒巧之嘵嘵兮惑以為咸池便媚鞠恧兮美逾西施謂謨言之怪誣兮反置瑱而逺違匿重痼以諱避兮進俞緩之不可為何先生之凜凜兮厲針石而從之仲尼之去魯兮曰吾行之遲遲栁下惠之直道兮又焉往而可施今夫世之議夫子兮曰胡隱忍而懷斯惟達人之卓軌兮固僻陋之所疑委故都以從利兮吾知先生之不忍立而視其覆墜兮又非先生之所志窮與達固不渝兮夫唯服道以守義矧先生之悃愊兮陷大故而不二沉璜瘞珮兮孰幽而不光荃蕙蔽匿兮胡久而不芳先生之貌不可得兮猶髣佛其文章託遺編而歎喟兮渙余涕之盈睚呵星辰而驅詭怪兮夫孰救於崩亡何揮霍雷電兮茍為是之荒茫耀姱辭之矘朗兮世果以是之為狂哀余衷之坎坎兮獨藴憤而增傷諒先生之不言兮後之人又何望忠誠之既內激兮抑銜忍而不長芉為屈之幾何兮胡獨焚其中腸吾哀今之為仕兮庸有慮時之否臧食君之祿畏不厚兮悼得位之不昌退自服以默默兮曰吾言之不行既偷風之不可去兮懷先生之可忘潁濱曰漢賈誼為長沙傅過汨羅為賦以弔屈原曰歷九州而相君何必懷此故都誼之言或一道也而非原志原楚同姓不忍棄其君而之四方而誼教之以孔子孟軻歷聘諸侯以求行道勢必不從矣栁下惠為士師三黜而不去曰直道而事人何往而不三黜枉道而事人何必去父母之邦惜哉屈原廉直而不知道徇兹以死然後為快此所以未合於聖人耳使原如栁下惠用之則行舍之則藏終身於楚優游以卒歲庶乎其志也哉迎婦于秦溫公曰甚哉秦之無道也殺其父而劫其子楚之不競也忍其父而婚其讎嗚呼楚之君誠得其道臣誠得其人秦雖强烏得陵之哉善乎荀卿論之曰夫道善用之則百里之地可以獨立不善用之則楚六千里而為讐人役故人主不務得道而廣有其勢是其所以危也宋玉對風潁濱曰昔楚襄王從宋玉景差於蘭臺之宫有風颯然而至者王披襟當之曰快哉此風寡人所與庶人共者耶宋玉曰此獨大王之雄風耳庶人安得而共之玉之言蓋有諷焉夫風無雌雄之異而人有遇不遇之變楚王之所以為樂與楚人之所以為憂此則人之變也而風何與焉士生於世使其中不自得將何往而非病使其中坦然不以物傷性將何適而非快春申君皮日休曰士以知已委用於人報其用者術茍不王要在强其國尊其君也上可以霸略次可以忠烈無王術而有霸略者可以勝人國無霸略而有忠烈者亦足以勝人國春申之道復何如哉憂荆不勝以身市竒計不曰忠乎荆太子既去歇孤在秦其俟刑待禍若自屠以當餒虎不曰烈乎然徙都於夀春失鄧室之固去方城之險捨江漢之利其為人謀下矣猶死以吳為宫室以魯為封疆春申之力哉當斯時也茍任荀卿之儒術廣聖人之道用之朞月荆可王矣然以猜去士以謗免賢於戲儒術聖道其奧藏天地其明燭鬼神春申且不悟況李園之陰謀豈易悟哉豈易悟哉潁濱曰黃歇相楚王患王無子而以己子盜為其後雖使聽朱英殺李園終擅楚國亦將不免大咎何以言之秦楚立國僅十歲矣無功於民而獲罪於天天以不韋歇陰亂其嗣而與之俱斃豈區區朱英所能為哉不然以黃歇之智而朱英之言獨無槩於中乎國之興亡潁濱曰燕召公之後然國於蠻貊之間禮樂微矣春秋之際未嘗出與諸侯㑹盟至於戰國亦以耕戰自守安樂無事未嘗被兵文公二十八年蘇秦入燕始以縱橫之事說之自是兵交中國無復寧歲六世而亡吳自太伯至夀夢十七世不通諸侯自巫臣入吳教吳乘車戰射與晉楚力爭七世而亡燕吳雖南北絶逺而興亡之迹大略相似彼說客策士借人之國以自快於一時可矣而為國者因而徇之猖狂恣行以速滅亡何哉夫起於僻陋之中而奮於諸侯之上如商周先王以德服人則可不然皆禍也至太子丹不聽鞠武而用田光欲以一匕首斃秦雖使荆軻能害秦王亦何以救秦之滅燕而況不能哉此又蘇秦之所不取也溫公曰燕在春秋時玉帛不通於中國簡策所書鮮焉及文侯始大與諸侯約以擯秦王噲慕堯舜以國授子之而敗死為天下笑求名失實乃至是乎昭王刻意勤身招賢下士卒用弱燕以報强齊有志者功無不成也惠王信讒以喪垂成之業惜哉丹以尺八匕首欲劫秦王以安社稷不亦戲乎遂使召伯之廟不祀忽諸樂毅潁濱曰梁惠王拔趙邯鄲而齊宣王敗之馬陵虜其太子申齊湣王伐宋而五國伐齊湣王出死於莒何者無德而有功諸侯之所共疾兵之招也故非有功之難而有以保其功之難耳樂毅為燕合諸侯破齊殺湣王舉全齊之富而歸之燕徇齊五年下齊七十餘城惟莒即墨未服兵久於外燕人無怨心諸侯無異議其所以鎮撫內外必有道矣湣王之暴神人之所共棄而伐齊之利諸侯之所共有此固毅之本意歟至與莒即墨相持田單拒之五年而不決此非戰之罪勇智相敵勢固然矣廉頗拒王齕於長平司馬懿拒諸葛亮於岐山智均力敵雖有小負莫肯先決而要之以久使毅不遭惠王之隙以燕之衆而臨二城磨以歲月雖田單之智將何能為乎其勢如燕將之守聊愈久而愈困耳至夏侯𤣥不達兵勢以謂毅不下二城將以成王者之業此書生之論非其實也東坡曰自知其可以王而王者三王也自知其不可以王而霸者五霸也或者之論曰圖王不成其弊猶可以霸嗚呼使齊桓晉文而行湯武之事將求亡之不暇雖欲霸可得乎夫王道者不可以小用也大用則王小用則亡昔者徐偃王宋襄公嘗行仁義矣然終以亡其身喪其國者何哉其所施者未足以充其所求也故夫有可以得天下之道而無取天下之心乃可與言王矣范蠡留侯雖非湯武之佐然亦可謂剛毅果敢卓然不惑而能有所必為者也觀吳王困於姑蘇之上而求哀請命於勾踐勾踐欲赦之彼范蠡者獨以為不可援桴進兵卒刎其頸項籍之解而東髙祖亦欲罷兵歸國留侯諫曰此天亡也急擊勿失此二人者以為區區之仁義不足以易吾之大計也嗟夫樂毅戰國之雄未知大道而竊嘗聞之則足以亡其身而已矣論者以為燕惠王不肖用反間以騎劫代將卒走樂生此其所以無成者出於不幸而非用兵之罪然當時使昭王尚在反間不得行樂毅終亦必敗何者燕之并齊非秦楚三晉之利今以百萬之師攻兩城之殘冦而數歲不決師老於外此必有乘其虛者矣諸侯乘之於內齊擊之於外當此時雖太公穰苴不能無敗然毅以百倍之衆數歲而不能下兩城者非智力不足蓋欲以仁義服齊之民故不忍急攻而至於此也夫以齊人苦湣王之强暴樂毅茍退而休兵治政令寬賦役反田里安老幼使齊人無復鬬志則田單者獨誰與戰哉奈何以百萬之師相持而不決此固所以使齊人得而徐為之謀也當戰國時兵强相吞者豈獨在我以燕齊之衆壓其城而急攻之使滅其誰曰不可嗚呼欲王則王不王則審其所處無使兩失焉而為天下笑也燕丹荆軻溫公曰燕丹不勝一朝之忿以犯虎狼之秦輕慮淺謀挑怨速禍使召公之廟不祀忽諸罪孰大焉而論者或謂之賢豈不過哉夫為國家者任官以才立政以禮懷民以仁交鄰以信是以官得其人政得其節百姓懷其德四鄰親其義夫如是則國家安如磐石熾如焱火觸之者碎犯之者焦雖有强暴之國尚何足畏哉丹釋此不為顧以萬乘之國決匹夫之怒逞盜賊之謀功隳身戮社稷為墟不亦悲哉夫膝行蒲伏非恭也復言重諾非信也糜金散玉非惠也刎首決腹非勇也要之謀不逺而動不義其楚勝白公之流乎荆軻懷其豢養之私不顧赤族欲以尺八匕首强燕而弱秦不亦愚乎故揚子諭之以要離為蛛螫之靡聶政為壯士之靡荆軻為刺客之靡皆不可謂之義又曰荆軻君子盜諸歷代名賢確論卷三十
