body:
  text: 歴代名賢確論卷五十九惠帝惠帝時陸機掌兵何去非孝懐帝愍帝劉曜之亂張籍王衍東坡通論西晉人君温公晉室之禍何去非晉祖尚浮虛張説惠帝時陸機掌兵何去非陸機論曰掃境内之衆而屬人以將持疎遠之身而將人之兵於君臣授受之際皆危機也善任將者不以其兵輕屬於人善為將者不以其身輕任其寄君必有以深得於臣而使之將臣必有以深得於君而為其將故武事可立而戰功可收君臣皆獲令名於天下古之人有行之者孫武之於吳王闔閭田穰苴之於齊景公周亞夫之於漢文帝是也始武以兵法干吳王也王試之以婦人武即因其所以試我者探其心而占之其意已在乎二姬之首也二姬王之所甚愛者武固知夫深宫之婦人且安王之寵豈嘗知枹鼓之約束而嚴將軍之令哉然必斬之而不釋者非有怨夫二姬者也且藉其首以探王之誠心所以信我者固與不固也吳王果不愠二姬之死而知孫武之善兵遂卒將之武亦知王之所以任我者固而安為其將故能西破强楚北威齊晉而吳以霸强齊景公以田穰苴之為將軍也受鉞之始因請其寵臣莊賈以監其軍穰苴豈真以人微權輕而有賴於賈哉其意固已在乎賈之戮也賈雖差頃刻之約可以情免也然卒不置其誅者非有忍於賈也姑借其死以探齊君之誠心而占其所以任我者篤與否也景公果賢其人而任之不疑故能大却燕晉之師而還其所侵漢文嚴三將軍之屯以備胡躬勞其軍至於細栁之亞夫雖天子之詔而屈於將軍之令方是之時細栁之士徒知亞夫之威而不知漢文之尊也豈亞夫於此悖君臣之分而為是不可犯哉亦以探孝文之誠心以占其待我者至與未至也漢文果高其才屬於景帝以為可以重任而亞夫亦以閫外之事自專故七國之反總制其軍遂能固拒救梁之詔而平關東之變世之淺者徒見夫三人得徇衆立威之道曽不知其為術之微非特主乎徇衆立威而已也至於君臣所以相得之始固結其心不可以間離毁敗而以勲名自全者皆出乎此故也甚矣陸生之不講乎為將之術也機以亡國羇旅之身委質上國於術無所持於氣無所養徒矜才傲物犯怒於衆司馬頴强肆不君舉犯順之師豈足為託身之主哉機以怨讎之府一朝身先羣士都督其軍而衆數十萬漢魏以來出師之盛未嘗有也彼既失所任矣而機内無術以探其所以任我者之心外無權以濟其所屬我者之事乃方欣然自擬管樂臨戎之始孟超以偏校干其令而辱之若遇僕虜而機不以為戮而舍之以是而將用是而戰雖提師百萬孰救其敗哉故鹿苑之潰死者如積衆毁因之遂致其誅為天下笑曽不知夫才不足勝其所寄智不足勝其所知一投足舉踵則顛踣隨之乃歸禍於三代之將豈不繆歟或曰機雖將世而儒者也軍旅之事非其素所嘗者遂喪其師此王衍房琯之徒皆以招敗也嗟乎以儒而將至乎喪師者才不足以任將故也必曰儒果不可以將將果不可用儒者非也才之所在無惡其儒也使儒而知將則世將有所不能窺也至若機者適足以殺其軀而已何足道哉劉曜之亂張籍永嘉行黃頭鮮卑入洛陽胡兒持㦸昇明堂晉家天子作降虜公卿齊走如牛羊紫陌旌旛暗相觸家家雞犬驚上屋婦人出門隨亂兵夫死眼前不敢哭九州諸侯自曠土無人領兵來䕶主北人避胡多在南南人至今能晉語王衍東坡論衍降石勒曰王夷甫既降石勒自解無罪且勸僭號其女惠風為愍懐太子妃劉曜陷洛以惠風賜其將喬屬屬將妻之惠風拔劒大罵而死乃知夷甫之死非獨慙見晉公卿乃當羞見其女也西晉人君温公曰宣帝始以重望高才策名魏室西却諸葛東舉公孫若以忠順終之足為良臣夫曹爽宴安忌疾乘間而發專制朝柄誅鉏異已平昔之美掃地盡矣及景文相繼遂遷魏祚武帝席卷吞吳纉禹舊服恃其治安荒於酒色以開基之始不為遠圖崇尚浮華敗棄禮法惠帝昏愚不辨菽麥譬之萬寶委之中衢無人守之安得不為他人有乎禍生於閨闥成於宗室骨肉相殘而劉石姚苻慕容爭承其弊割裂中原虀醢生民積骸如丘流血成淵幾三百年豈不哀哉晉室之禍何去非晉論曰神器之重有以自歸而後收之有以力取而後得之自歸而後收之者三代而上是也力取而後得之者秦漢而下是也夫歸我而收之與夫我取而得之固有間矣而其所以取之之道又有甚異者焉然則享天下者亦觀夫所取之道如何耳魏之取漢異於漢之所以取秦晉之取魏異於魏之所以取漢魏視晉以所取漢之迹晉襲魏以所取漢之權是晉之取魏者魏啓之也晉將蹈迹而取魏也是以汲汲而求執魏之權魏徒見權之去我而在晉猶昔之去漢而在魏也是以安其所取而以天下輸之乃自謂所當然者故晉於得魏之迹無以異於魏之得漢而於所以取魏之道最為無名葢有類夫王莽之盗漢也雖然晉室之禍亦魏有以遺之嗚呼豈亦天意者邪昔者秦為無道天下之民唯恐秦之不亡也是以豪傑相與起而誅秦秦亡而漢得之是漢無所負於秦也東漢自董卓之亂天下痛其禍漢之深相與建議㰱血起而誅卓者凡以為漢也卓既誅矣而曹操二袁乃始連兵相噬以爭天下而求代漢曹操先得挾漢之策以令天下終於漢不自亡而操取之是魏猶有負於漢也漢之亡也非天下亡之是操取之也雖然微曹操則漢之天下不得不亡以其有二袁之竊取之也操收天下於二袁竊取之中是漢嘗亡天下矣而操收之則魏猶為有名也故曰魏之取漢異乎漢之取秦也至於晉也則不然自司馬仲逹已韜藏禍姦於操之世操嘗悟之而不自決也以授之於丕而丕昏弱加全佑而倚任之故其於操之亡乃稍駸駸以立其盗權之功遂收其權而私執之所謂盗權之功者葢東定遼東而取孟逹南摧王淩而内誅曹爽耳非有存其既亡續其既絶之大勲若魏之於漢也蓋其知夫魏之取漢其道由此也是以汲汲求蹈其迹而竊收其權更四世而固執之至於一旦取魏於偃然無事之間而天下之人亦安之於無可奈何是最為無名而有類夫王莽之盗漢也及夫晉之宗室内叛戎夷外攻至於陵夷而不可勝歎者亦魏有以遺之魏亡公族之恩雖號加侯王而無尺土一民之奉晉人取而代之矯其無枝葉之庇於是大殖宗室假之制兵專國之權一旦八王内相屠噬至於禍結不可勝解而戎羯乘之關右秦川帝王之宅也魏武大徙戎夷種落而錯居之以扞蜀寇至於近發肘腋不可勝救以成永嘉之禍由是觀之則凡晉室之大變皆魏有以遺之嗚呼豈亦天意者耶晉祖尚浮虚張説論晉風曰晩尋莊周書以天地為國道徳為身老室之户牖孔門之棖闑足可反覆孝慈胎育仁義而晉朝賢士乃祖尚浮虚弛廢禮樂其所遺失將詣真宗不逾遠也老稱歸根曰静復命知見邪斯故反照耳孔云窮神知化徳之盛者神不可窮而窮之是神合於我化不可知而知之是化為我用唯此二義繄莊生亦未始盡言焉歴代名賢確論卷五十九
