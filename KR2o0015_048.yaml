body:
  text: 歷代名賢確論卷四十八光武劉伯升何去非世祖英雄何去非三輔復見漢官威儀子西卓茂為太傅溫公封子密為不義侯權德輿鄧禹溫公子由何去非邳彤東坡梁統東坡馬援劉禹錫伏波有功德於嶺南東坡嚴陵權德輿梁肅羅隱范文正公劉伯升何去非曰古之豪傑遭天下之變亂慨然而起皆有拯民撥禍之志其兵力威勢亦足以就功成業者已而一旦肝腦屠潰於庸夫孺子之手曾不少悟為天下笑者何也怙氣而易人矜衆而忽禍卒然變發於非意之所及故也昔者王莽之盜漢也而劉氏宗屬誅夷廢錮救死不睱幸而存者皆孱駑不肖習為佞媚茍生而已獨伯升憤然有興復絶緒之志收結輕俠起以誅莽雖莽亦深憚之方其起也獨率舂陵子弟八千人乃誘合新市平林數千之兵以助其勢而光武之衆亦倡於宛是以斬甄阜梁丘賜而破嚴尤陳茂之師不數月而衆至十萬其勢振矣於是豪傑相與議立宗室以從人望其意固在乎伯升也而新市平林憚其威明且樂更始之懦弛也遂定䇿立之伯升爭之而不得也已而伯升拔宛光武大破尋邑百萬之衆更始君臣愈不自安遂誅伯升嗟乎伯升之志固大矣而其死也愚夫且知及之而伯升之不悟也夫新市平林之將帥故羣盜耳方吾之起而籍其兵已而連郤大敵而擁衆十萬者功在我也人以其功而欲崇立之新市平林之不樂也舉而屬之駑弱之更始則三軍之權不在伯升而在乎新市平林矣權分於人而又固爭更始之立宜其不旋踵而誅矣昔者呂后之欲王諸呂也以問其相王陵陳平王陵力爭而陳平可之夫王陵之爭將欲以安漢而摧諸呂也不知陳平之可者乃所以安漢而摧諸呂也伯升所拒更始之立者王陵之爭也非所以自安矣雖然伯升之心固未嘗忘新市平林之與更始也惜其撫機而不知發而為人發之此其死而不悟也宋義之令軍中曰猛如虎很如羊貪如狼强不可使者斬之其意固在乎項羽也羽知其意之在我也是以先發而誅之使其不先發即羽亦誅矣伯升以新市平林之為附我是以德之而未忍負之耶孰若蜀先主之於劉璋李密之於翟氏也璋舉全蜀倚先主先主遂取之以為鼎足之資人不非其負璋而與其得取蜀之機也密始臣於翟氏翟自以其才之不逮密也推而主之已而微有間言密即誅之其權遂一而兵以大振使伯升舉宛之威而又因世祖破尋邑之勢勒兵誓師以戮新市平林之驕而黜更始則中興之業不在世祖矣嗟乎伯升之不忍者亦婦人之仁耳古之求集大事者常不忍於負人而終為人之所負者以其相伺之機間不容髮故也世祖之連兵決戰不及伯升而深謀至計乃甚過之蓋伯升似項羽而世祖類髙皇此所以定天下而復大業也始伯升之見殺而世祖馳詣更始逡巡引過深自咎謝不為戚傷是以更始信而任之卒至摧王郎定河北其資成矣乃徐正其位號遂以其兵西加更始而定長安使其遂形憤怏不平於伯升之禍則亦併誅而已矣世祖英雄何去非曰師不必衆也而效命者克士無皆勇也而致死者勝古之人有以衆而敗有以少而勝者王尋王邑以百萬而敗於三千之光武曹公以八十萬而敗於三萬之周瑜符堅以百萬而敗於八千之謝𤣥是也夫率師百萬以臨數千之軍者必勝之軍也然有時而至於敗者驕吾所以必勝而以輕敵敗也提卒數千以當百萬之衆必敗之道也然有時而至於勝者奮吾所以必敗而以致死勝也夫兵多在敵者智將之所貪而愚將之所懼也兵寡在我者愚將之所危而智將之所安也多固可懼而我貪之恃吾有以覆其驕也少固可危而我安之恃吾有以激其奮也提數千之兵以抗大敵使之人人自致其死而忘其為數千之弱者易能也連百萬之衆以臨小敵使之人人各效其命而忘其為百萬之强者難能也何者弱則思奮而强則易懈故也弱而奮則奮者其氣也强而懈則懈者其情也於氣則易乘於情則難率因易乘之氣而激之故有以寡而勝者矣就難率之情而驅之故有以多而敗者矣是以古之善論將者必知其所以勝任之多寡苟非所勝任雖多而纍矣韓信以髙祖才之所勝將者十萬耳而其自謂則雖多而益辦也是以古之善將者其用百萬如役一夫分數既定形名既飾節制素眀威賞素著有術以用其鋒故也趙括一用趙人四十萬束手而就長平之坑者敗於衆也王翦必用秦軍六十萬然後取勝於荆者辦於多也漢髙祖嘗一大用其軍矣劫五諸侯之兵合六十萬以攻楚也而項羽逡巡以三萬之鋭起而覆之濉水為之不流此將逾其分而韓信之所憂也曹公之於兵也巧譎竒變離合出沒其應無窮白首於兵未嘗不以少敵衆也卒喪赤壁之師而成劉備周瑜之名者驕荆州之勝恃水陸之衆而敗於懈也方尋邑百萬之衆以厭昆陽其視孤城之內外者皆几上肉也然而光武合數千之卒申之以必死之誓激之以求生之奮身先而搏之則其反視尋邑之衆者皆几上肉也是以勝之雖然是役也人見其為光武之能事而莫知其所以為能事也唯諸將覩其生平見小敵怯見大敵勇也皆竊怪之而不知光武為是勇怯者乃所謂能事而皆以求勝也夫怯於小敵者其真情也勇於大敵者其權術也蓋敵小而怯怯而戒戒而勵勝之道也敵大而勇勇而決決而奮亦勝之道也於敵之小而示其真情是以不易勝之也於敵之大而用其權術是以不畏勝之也光武非特能以少敗衆也固又至於多而益辦也嗚呼光武之於取天下者亦何獨不出於真情之與權術歟顧人莫之測耳始伯升之結賔客喜士規以誅莽以復劉氏而世祖乃獨事田業勤稼穡而已故伯升比之髙祖兄仲而人亦以謹厚目之不意其有他也及其部勒賔客絳衣大冠而起於宛則勇決之氣又有過於伯升者焉夫光武意之所以在莽者豈一日之間邪然於莽之世而為伯升之所為者固亦危矣是以光武之獨事田業為謹厚者其權術也卒然而起絳衣大冠者其真情也故伯升首事而光武收之嗚呼英雄若世祖者為難及也三輔復見漢官威儀唐子西曰漢時儀注大抵率意制造不應古誼者十至八九其文彩法度略矣然而天下之人見之即喜不見即悲中更王氏之亂廢棄不用者十餘年光武入洛東都之民始見司𨽻僚屬歡喜踴躍父老或至垂泣曰不圖今日復見漢官威儀自是天下翕然歸之相與出力鋤去禍難以成中興之功而復其宗廟社稷蓋又二百餘年王人之所以復興者不専在是然亦不可謂無助也矣且漢官威儀非若三代之盛也叔孫所為非有周公之學術智識也雜以秦制非復聖人之法也而遺民見之如盲者復視廢者復起如流浪積嵗而返其故鄉見其父子兄弟感慨之極至於咨嗟流涕其得民心如此此何理邪方是之時以三代車服示之吾知其民不復泣矣何者漢之為漢十世於此矣民知有劉氏而已夫救天下於戰國秦項水火之中而措之於安全逸樂之地百數十年海內無事斯民得以養生得以送死得以事父母而長育其子孫者漢之力也三代逺矣何有於我哉由是觀之古者帝王之興其正朔服色自為一王法而不慕前朝異姓已陳之迹者其用意深矣由是觀之國家舊物宜使斯民常見而熟識之以習其耳目而繫其心自非不得已者不宜輕有改易變置以自絶於民也亦灼然矣嚮使今日變其一眀日廢其二祖宗餘澤日益就盡不在目前不幸而姦人撼之則人心搖而天下去矣古者公卿大夫猶知守其家法至數十世不易其衣冠閥閲豈無隆替而國人信服終莫之敢抗謂之名家舊族而況數百年為天下國家者哉卓茂為太傅溫公曰孔子稱舉善而教不能則勸是以舜舉臯陶湯舉伊尹而不仁者逺有德故也光武即位之初羣英競逐四海鼎沸彼摧堅陷敵之人權略詭辨之士方見重於世而獨能取忠厚之臣旌循良之吏拔於草萊之中置諸羣公之首宜其光復舊物享祚久長蓋由知所先務而得其本原故也封子密為不義侯權德輿曰先師曰惟名與器不可以假人又曰必也正名乎又曰惟則定國於戲有國者可不務乎當東漢世祖之初天命再集宜於此時貞百度正三綱纂修德教允答天意時彭寵以南陽舊恩位列上將有舉漁陽之功饋邯鄲之忠竟以讒謗獲罪反側怨望遂攻朱浮於薊自稱燕王其時師旅孔熾元元苦甚時君宜以息人紓難為心當録德念功昭洗瑕穢次則布之威懷革其非心必不得已則仗大順以討之出師以征之眀君君臣臣之義此三者皆不能用或用之而不能盡及夫蒼頭子密有便室之逆運其狙忍時伺卧寢遂使命懸僕𨽻倉卒授首及詣闕也封為不義侯愚以為伯通之叛命子密之戕君同歸于亂罪不相蔽宜各致於法昭示王度反乃爵於五等又以不義為名且舉以不義莫可侯也而此侯漢爵為不足勸矣春秋書齊豹盜三叛人名之義無乃異於是乎若欒布之哭彭越孔車之葬主父使於東漢議罪罪孰甚焉况四方甫定傷夷未復不稽古訓以喜怒為刑賞使天下陪臺厮養各幸其君之亂而徼侯印授諸侯危疑之勢鼓臣下叛渙之原棄名器而汨彞訓且以憲令為戲時風浩浩蕩而不復至使桓靈不道山陽脅奪本其所以自庸詎知非封不義之效歟鄧禹溫公論光武以馮異代禹討關中曰昔周人頌武王之德曰敷時繹思我徂惟求定言王者之兵志在布陳威德安民而已觀光武之所以取關中用是道也豈不美哉子由曰禹初以兵入關乘勝獨克關輔響震是時赤眉方入長安諸將豪傑皆勸禹徑乘其亂禹曰吾衆雖多能戰者少前無可仰之積後無輕饋之資赤眉新拔長安財富兵鋭未易當也盜賊羣居無終日之計財榖雖多變故萬端非能堅守者也上郡北地安定三郡土廣人稀饒榖多畜吾且休兵北道就糧養士以觀其變乃可圖也於是引兵北屯栒邑光武聞之敕禹以時進討禹固執前意遲遲不進眀年赤眉西走扶風禹乃入長安謁髙廟收十一帝神主然卒不能定關中無功而歸蓋赤眉方强急之則難緩之為得逮其自敗西走扶風而乘之猶能還兵敗禹而況其未走也哉如光武之計蓋不知赤眉方强而禹兵力不足若審如此聽其堅守北道時出而撓之使别將挾其東東西戚之磨以嵗月而赤眉就擒矣禹之敗而西也與馮異相遇要異共攻赤眉異曰與賊相遇且數十日雖􅀈雄將餘衆尚多可稍以恩信傾誘難卒用兵破也上今使諸將屯澠池要其東而異擊其西一舉取之此萬全計也禹又不從而敗由此觀之禹本計不失而帝不能用禹亦迫其君命不能自固耳何去非曰善用兵者能驕敵之强而怠敵之鋭彼之勢誠强則吾形之以甚弱使其恃之以為獨强而至於驕彼之氣誠鋭則吾斂之以不應使其無得以逞其鋭而至於怠然後出吾所匿之强以加其驕出吾所伏之鋭以加其怠使其雖有巧者不及窺勇者不及備則制勝在我矣云云昔者冒頓之滅東胡李牧之大破胸奴者中之以其驕也趙奢之破秦軍周亞夫之敗吳楚者中之以其怠也雖然求驕以怠人之軍者必有夫堅制之氣與夫善待之度迫之而不為動撓之而不為應者其氣也辱之而不為忿激之而不為變者其度也持是之氣守是之度為其上者無得而令為其下者無得而議然後敵可勝而功可必也東胡之恃其强而易於冒頓也冒頓因其易我而遂驕之求馬畀之矣而復求婦婦畀之矣而復求土冒頓大議於羣臣悉誅其欲與土者馳馬而赴東胡令之曰後至者斬國人從之遂滅東胡秦人伐韓軍於閼與趙使趙奢救之奢因其鋭而欲怠之也去邯鄲三十里而止令於軍曰敢以軍事諌者死秦軍武安西鼓譟勒兵屋瓦盡振軍中一人言急救武安奢立斬之堅壁增壘三旬不行秦軍稍懈奢卷甲而趨之二日一夜至於閼與五十里而軍秦人不意其至悉甲逆之一戰而大破秦軍此冒頓趙奢所以驕而怠人者為其下者無得而議之也李牧之為趙守北邉也與士約曰胸奴即入盜急入收保有敢捕虜者斬如是者數嵗胸奴以其為怯趙王以譴牧牧如故態王怒召牧易以他將胸奴每至戰輒失利王復使牧往復如故約居數嵗胸奴誠以為怯牧乃隂飭車騎大縱畜牧以餌之胸奴小入佯北不勝單于遂以其衆大至牧設竒大破之斬騎十萬單于遁徙遂亡邉患吳楚以山東反漢而先攻梁漢使周亞夫討之梁王景帝之母弟亞夫以其鋒方鋭圖挫而怠之遂以梁委之而不救梁急訴於帝雖數詔亞夫救梁而不受也卒以破吳此李牧亞夫所以驕而怠人者為其主者無得而令之也雖然使夫四人者無氣以持之無度以守之主得以令而下得以議則亦無以驕怠於人而勝之矣昔者漢光武被命更始安集河北始得鄧禹於徒步之中恃之以為蕭何者以其言足以就大計其智足以定大業且非羣臣之等夷也遂以西方之事委之而禹亦能勝所屬任所向就功赤眉之入長安諸將豪傑皆欲擊之禹以其乘新勝之强財富鋒鋭然盜賊羣居無他逺計必生變故而吾衆雖多戰勝者少又乏資饋難與力爭而可以計破也且將休兵北道以觀其弊於是别軍北趨栒邑以就糧養士蓋將有以驕而怠之然後取也此禹之計得矣光武亟欲天下之集而緩其為計與功也遂迫以進討禹無以専制乃以其兵去栒邑而赤眉果不能守西走扶風雖得入關中然卒饑士敝無足以制賊者是以赤眉復還入之禹無以抗乃不勝其忿悁而數以憊兵徼戰至於屢北僅以身免聲威功烈一朝沮喪此知所以驕而怠人之術矣惜其為氣與度者不足以持守之是以一憤而不能復舉也故善於擇將者必先求其氣而後求其材先察其度而後察其智氣足以御材度足以養智然後可以授之兵而責之戰矣嗟乎以光武之眀於任人以鄧禹之篤於得君然至此而背戾者況夫以昏庸而御夫疏賤者功可得而必哉邳彤東坡曰王郎反河北獨巨鹿信都為世祖堅守世祖既得二郡議者以謂可因二郡兵自送還長安惟邳彤不可以為若行此䇿豈徒空失河北必更驚動三輔公若無復征戰之意則雖信都之兵偤難㑹也何者公既西則邯鄲之兵不肯捐父母背城主而千里送公其離散逃亡可必也世祖感其言而止蘇子曰此東漢興亡之決邳彤可謂漢之元臣也景德契丹之役羣臣皆欲避敵江南西蜀萊公不可武臣中獨髙瓊與萊公意同耳公既爭之力上曰卿文臣豈能盡用兵之利萊公曰請召髙瓊瓊至乃言避敵為便公大驚以瓊為悔也已而徐言避狄固為安但恐扈駕之士中路逃亡無與俱西南者耳上乃大驚始決意北征瓊之言大略似邳彤皆一時雄傑也梁統東坡論統議重法曰漢仍秦法至重髙惠固非虐主然習所見以為常不知其重也至孝文始罷肉刑與三夷之誅景帝復孥戮鼂錯武帝㬥戾有增無損宣帝治尚嚴因武帝之舊至王嘉為相始輕减法律遂至東京因而不改班固不記其事事見梁統傳固可謂疏略矣嘉賢相也輕刑又其盛德之事可不記乎統乃言髙惠文景宣武以重法興哀平以輕法衰因上言乞增重法律賴當時不從其議此如人少年時不節酒色而安老後雖節而病見此便為酒色延年可乎統亦東京名臣然一出此言遂獲罪于天其子松竦死皆非命冀卒滅族嗚呼悲夫戒哉疏而不漏可不懼乎馬援劉禹錫經伏波神祠詩曰蒙蒙篁竹下有路上壺頭漢壘麟鼯鬬蠻溪霧雨愁懷人敬遺像閲世指東流自負霸王略安知恩澤侯鄉園辭石柱筋力盡炎州一以功名纍翻思馬少游伏波有功德於嶺南東坡伏波將軍廟碑曰漢有兩伏波皆有功德於嶺南之民前伏波邳離路侯也後伏波新息馬侯也南越自三代不能臣秦雖稍通置吏後復為夷邳離始伐滅其國開九郡然至東漢二女子側二反嶺南震動六十餘城時世祖初平天下民勞厭兵力方閉玉門關以謝西域況南荒何足以辱王師非新息苦戰則九郡左衽至今矣由此論之兩伏波廟食於嶺南者均也嚴陵權德輿嚴陵釣臺下作詩曰絶頂聳蒼翠清湍石磷磷先生晦其中天子不得臣心靈棲皓元纓冕猶緇塵不樂禁中臥郤歸江上春潛驅東漢風日使薄者淳焉用佐天下持此報故人則知大賢心不獨私其身弛張有深致耕釣陶天真奈何清風後擾擾論屈伸交情同市道利欲相紛綸我行訪遺臺仰古懷逸民矰繳鴻鵠逺雪霜松桂新江流去不窮山色淩秋旻人世自今古清輝照無垠梁肅釣臺碑曰當哀平之後天地既閉先生韜其光隱而不見建武反正雲雷既定先生全其道而不屈消息治亂之際卷舒夷曠之域如雲出於山逰於天復歸於無間不可得而纍也則激清風聳髙節以遺後世先生之道可見於是矣或曰人倫大統莫大乎君臣崇德致用莫盛乎富貴而子陵以賤為貴以臣傲君二者其失於教歟君子曰不然夫賢哲之道一動一靜動而用者功濟乎當世靜而不用者化光於無窮故許由於堯先生於漢皆不易乎位遊方之外俾後之人聞清風而嚮慕焉蓋運有㑹事有行伊吕遇湯武而立大功子陵遇世祖而立大名去就不同同歸乎道焉頌曰季葉浩浩澆風蕩淳先生括囊鳥獸同羣四海既平故人為君富貴于我有如浮雲召至禁中告歸江濆下視天子上動星文接輿肆狂孤竹求仁介推山死龔勝蘭焚猗歟先生異乎斯人俯仰世道從容屈伸清溪悠悠白石磷磷遺風是仰終古不泯羅隱刻嚴陵釣臺曰巖巖而髙者嚴子之釣臺也寥寥不歸者光武之故人也故人之道何如睨蒼苔以言之尊莫尊於天子賤莫賤於布衣龍爭蛇蟄兮風雨相遺干戈載靡兮悠悠夢思何富貴不易節而窮逹無所欺故得脫邯鄲之難破犀象之師造二百年之業繼三尺劒之基者其唯有始有卒者乎下之世風俗偷薄祿位相尚朝為一旅人暮為九品官而親戚骨肉已有差等矣況故人乎鳴呼往者不可見來者未可期已而已而范文正公祠堂記曰先生漢光武之故人也相尚以道及帝握赤符乘六龍得聖人之時臣妾億兆天下孰加焉唯先生以節髙之既而動星象歸江湖得聖人之清泥塗軒冕天下孰加焉唯光武以禮下之在蠱之上九衆方有為而獨不事王侯髙尚其事先生以之在屯之初九陽德方亨而能以貴下賤大得民也光武以之蓋先生之心出乎日月之上光武之量包乎天地之外微先生不能成光武之大微光武豈能遂先生之髙哉而使貪夫廉懦夫立是大有功於名教也歌曰雲山蒼蒼江水泱泱先生之風山髙水長歷代名賢確論卷四十八
