body:
  text: 歴代名賢確論卷四十一惠帝吕后惠帝見太后殺趙王戚夫人因不聽政温公帝築複道叔孫通請立原廟温公曹參程晏張辟彊李德裕酈寄賣友東坡文帝文帝善繼漢老泉除肉刑樂天賈誼劉禹錫曽子由東坡子固皮日休樂天權徳輿季布盧照鄰温公直不疑東坡惠帝見太后殺趙王戚夫人因不聽政溫公曰為人子者父母有過則諫諫而不聽則號泣而隨之安有守髙祖之業為天下之主不忍母之殘酷遂棄國家而不恤縱酒色以傷生若孝惠者可謂篤於小仁而未知大誼者也帝築複道叔孫通請立原廟溫公曰過者人之所必不免也惟聖賢為能知而改之古之聖王患其有過而不自知也故設誹謗之木置敢諫之鼔豈畏百姓之聞其過哉是以仲虺美成湯曰改過不吝傅説戒高宗曰無恥過作非由是觀之則為人君者固不以無過為賢而以改過為美也今叔孫通諫孝惠則云人主無過舉是教人君以文過遂非也豈不謬哉曹參程晏蕭何求繼論曰讀漢史者多曰曹參守蕭何之規日醉以酒民歌之曰蕭何為法較若畫一曹參代之守而勿失載其清淨民以寧一漢之二賢相也至矣哉論曰非也暑牛之渴也孺子飲之渟淖之汚牛渴已久得其渟淖之汚寧圖於清泠之水乎設使孺子牽之於清泠之水則滌乎腹中之泥也牛然後知渟淖之汚不可終日而飲之百姓罹秦之渴已久矣蕭何曰吾所以為法律是權天下之草創也吾不止此將致君為成康之君使民為成康之民是牽民於清泠之水也曹參日荒於酒惠帝訊焉參㒺於惠帝曰高帝創之陛下承之蕭何造之臣參遵之陛下乗拱臣等守職惠帝以為是也民又歌之嗚呼漢之民以漢之汚愈於秦之渴不知牽於清泠之水滌乎腹中之泥也蕭何之傳曹參也若木工能造材而未果覆而終者必待善覆者焉何既造矣謂參為善覆者參守其造而不能覆徒欺君曰陛下不如高帝臣參不如蕭何善守可也何廢作哉若不可以廢作即文帝除肉刑不為漢主仁聖之最也參不能致其君於成康之政不知己不能覆何之造而荒於酒幸不同羲和之誅貪位畏勝飾情妄言以惑君也孰名為賢相耶吾病漢史以蕭何善求繼以曹參為堪其後故論之張辟彊李德裕論曰揚子美辟彊之覺陳平非也若以童子膚敏善揣吕氏之情竒之可也若以反道合權以安社稷不其悖哉授兵産祿幾危劉氏皆因辟彊啓之向使留侯尚存必執戈逐之將為戮矣觀高祖遺言吕后制其大事可謂謀無遺慮矣以王陵有廷諍之節置以為相謂周勃堪寄託之任令掌兵柄況外有齊楚淮南磐石之固内有朱虚東牟肺腑之親是時産祿皆匹夫耳吕后雖心不在帝將相何至危懼必當憂傷不食自促其壽豈能為將相之害哉漢高曰非劉氏而王者天下共擊之此慮屬在吕宗矣何可背之厥後稱制八年産祿之封植固矣若平勃二人溘先朝露則劉氏之業必歸吕宗及吕后之殁刼酈商以紿吕祿計亦窘矣周勃雖入北軍尚不敢公言誅諸吕豈不艱哉賴産祿皆徒𨽻之夫非英傑之士儻才出於世豈受其紿説哉嗟乎與其圖之於難豈若制之於易由是而言平勃用辟彊之計斯為謬矣留侯破産以報韓結客以沮秦招四皓以安太子所為必仗義居正由此知不尚權譎明矣酈寄賣友東坡曰班固有言當孝文時天下以酈寄為賣友夫賣友者謂見利忘義若寄父為功臣而又執刼雖摧諸吕以安社稷誼存君親可也東坡曰當是時寄不得不賣友也罪在於以功臣子而與國賊游且厚善也石碏之子厚與州吁遊碏禁之不從卒殺之君子無所譏曰大義滅親酈商之賢不及石碏故寄得免於死古之幸人也而固又為洗賣友之穢固之為義陋矣文帝善繼漢老泉曰古者非用兵決勝之為難而養兵不用之可畏今夫水激之山放之海決之為溝洫壅之為沼沚是天下之人能之委江河注淮泗滙為洪波瀦為大湖萬世而不溢者自禹之後未之見也夫兵者聚天下不義之徒授之以不仁之器而教之以殺人之事夫惟天下之未安盜賊之未殄然後有以施其不義之心用其不仁之器而試其殺人之事當是之時勇者無餘力智者無餘謀巧者無餘技故其不義之心變而為忠不仁之器加之於不仁而殺人之事施之於當殺及夫天下既平盜賊既殄不義之徒聚而不散勇者有餘力則思以為亂智者有餘謀則思以為奸巧者有餘技則思以為詐於是天下之患雜然而出矣葢虎豹終日不殺則跳踉大叫以發其怒蝮蝎終日不螫則噬齧草木以致其毒其理固然無足怪者昔者劉項奮臂於草莽之間秦楚無賴子弟千百為輩爭起而應者不可勝數轉鬭五六年天下厭兵項籍死而髙祖亦已老矣方將分王諸將改定律令與天下休息而韓信黥布之徒相繼而起者七國高祖死於介胄之間而莫能止也連延及於吕氏之禍迄孝文而後定是何起之易而收之難也劉項之勢初若決河順流而下誠有可喜及其崩潰四出放乎數百里之間拱手而莫能救也嗚呼不有聖人何以善其後絳侯社稷臣李德裕袁盎以周勃為功臣論曰袁盎對文帝曰絳侯所謂功臣非社稷臣夫社稷臣者主在與在主亡與亡盎見勃自德其功有以激之也非至理篤論此言足以惑文帝聰明傷仁厚之政俾其君有薄宗臣之意卒使周勃大功皆棄非罪見疑可為長歎息也當吕后之世惠帝已殂少帝非劉氏陳平用辟彊計權王産祿絳侯若不與之同心而制其兵柄必由此而階亂矣則劉氏安危未可知也然磨而不磷涅而不淄未嘗不心存社稷志在劉氏外雖遜順内守忠正得不謂之社稷臣乎其後絳侯繫請室盎始明其無罪所謂陷之死地而後生之徒有救焚之力且非曲突之義揚子稱盎忠不足而談有餘斯言當矣善哉賈生之説喻堂陛之峻高者難攀卑者易凌文帝感悟養臣下有節有以見賢人用心致君精識若袁公者難與並為仁矣盎惟有正慎夫人席塞梁王求嗣此二事守正不撓忠於所奉害錯之罪虐貫神明安陵之禍知天道不昧矣殺薄昭温公曰李德裕以為漢文帝誅薄昭斷則明矣於義則未安也秦康送晉文興如存之感況太后尚存唯一弟薄昭斷之不疑非所以慰母氏之心也愚以為法者天下之公器惟善持法者親疎如一無所不行則人莫敢有所恃而犯之也夫薄昭雖素稱長者文帝不為置賢師傅而用之典兵驕而犯上至於殺漢使者非有恃而然乎若又從而赦之則與成哀之世何異哉魏文帝嘗稱漢文帝之美而不取其殺薄昭曰舅后之家但當養育以恩而不當假借以權既觸罪法又不得不害譏文帝不始防閑昭也斯言得之矣然則慰母氏心者將慎之於始乎除肉刑樂天曰漢除肉刑逮今千有餘祀其間博聞達識之士議其是非者多矣其欲廢之者則曰刻膚革斷支體人主忍而用之則愷悌惻隱之心乖矣其緹縈所謂雖欲改過自新其道亡繇者也其欲復之者則曰任箠今用鞭刑酷吏倚而行之則專殺濫死之弊作矣此班固所謂以死罔人失本意者也愚以為議事者宜徵其實用刑者宜酌其情若以情實言之則可廢而不可復也何者夫肉刑者蓋取劓椓黥刖之類耳書所謂五虐之刑也昔苗人始淫為之而天既降咎及秦人又虐用之而天下亦離心夫如是則豈無濫死者耶漢文帝始除去之而刑罰以清我太宗亦因而棄之而人用不犯夫如是則豈有罔人者耶此愚所謂徵其實者也愚又聞聖人之用刑也輕重適時變用捨順人情不必乎反今之宜復古之制也況肉刑廢之久矣人莫識焉今一朝卒然用之或絶筋或折骨或面傷則見者必痛其心聞者必駭其耳又非聖人適時變順人情之意也徵之於實既如彼酌之於情又如此可否之驗豈不明哉傳曰君子為政貴因循而重改作又曰利不百不變法愚以為復之有害而無利也其可變而改作乎賈誼劉禹錫詩曰賈生明王道衛綰工車戲同遇漢文時何人居貴位子由詩曰賈生料吳楚竟斃大梁城一身不自保痛哭空傷生皮日休曰余嘗讀賈誼新書見其經濟之道大矣哉真命世王佐之才也自漢氏革嬴髙祖得於矢石不暇延儒人及為天子制缺度弛禮崩樂壊是時獨有叔孫生能定朝儀其制未悉唯生草其書欲以制屈諸侯推定正朔調革輿服通流貨幣天不祐漢絳灌興謗竟杜其道出傅湘沅生自以不得志哀屈平之放逐及渡湘沈文以弔之故其辭曰歴九州而相君兮何必懐此故都噫余釋生之意矣當戰國時屈平不用於荆則有齊趙秦魏矣何不捨而相他國乎余謂平雖遭靳尚子蘭之讒不忍捨同姓之邦為他國之相宜矣然則生之見棄又甚於平當漢時捨文帝則諸侯矣如適諸侯則新書之文抑諸侯而尊天子也捨諸侯則胡越矣則新書之文滅胡越而崇中夏也是以其心切其憤深其詞隱而麗其藻傷而雅余悲生哀平之見棄而生不能自明其道嗚呼聖賢之文與道也求知與用茍不在於一時而在於百世之後者乎其生之哀平歟余之悲生歟吾之道也廢與用幸未可知但不知百世之後得其文而有之者復何人也云云樂天曰漢文帝時賈誼上疏云可為痛哭者一可為流涕者二可為長太息者六是時漢興四十載萬方大理四海大和而賈誼非不見之所以過言者以為詞不切志不激則不能迴君聽感君心而發憤於至理也是以雖盛時也賈誼過言而無愧雖過言也文帝容之而不非故臣不失忠君不失聖書之史策以為美談權德輿曰嘗讀賈誼書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能達四聰而盡其善排羣議而試厥謀道之難行亦已久矣東陽絳灌何代無之嘻一薰一蕕善齊不能同器方鑿圓枘良工無以措巧此所以治世少而亂日多大雅衰而正聲寢漢道不融失之於賈傅焉東坡曰非才之難所以自用者實難惜乎賈生王者之佐而不能自用其才也夫君子之所取者逺則必有所待所就者大則必有所忍古之賢人君子皆有可致之才而卒不能行其萬一者未必皆其君之過或者其自取也愚觀賈誼之論如其所言雖三代何以逺過得君如漢文猶且以不用死然則是天下無堯舜終不可有所為邪仲尼聖人歴試於天下茍非大無道之國皆欲勉强扶持庶幾一日得行其道將之荆先之以冉有申之以子貢君子之欲得其君如此其勤也孟子去齊三宿而後出晝猶曰王庶幾召我君子之不忍棄去其君如此其厚也公孫丑問曰夫子何為不豫孟子曰方今天下舍我其誰哉而吾何為不豫君子之愛其身如此其至也夫如此而不用然後知天下果不足與有為而可以無憾矣若賈誼者非漢文之不用生生之不能用漢文也夫絳侯親握天子璽而授之文帝灌嬰連兵數十萬以決劉吕之雄雌又皆高帝之舊將此其君臣相得之分豈特父子骨肉手足哉賈生洛陽之少年欲使一朝之間盡棄其舊而謀其新亦已難矣為賈生者上得其君下得其大臣如絳灌之屬優游浸漬而深交之使天子不疑大臣不忌然後舉天下而唯吾之所欲為不過十年可以得志安有立談之間而遽為人痛哭哉觀其過湘為賦以弔屈原紆鬱憤悶趯然有逺舉之志其後卒以自傷哭泣至於夭絶是亦不善處窮者也夫謀之一不見用安知終不復用也不知黙黙以待其變而自殘至此烏乎賈生志大而量小才有餘而識不足也古之人有高世之才必有遺俗之累是故非聰明睿哲不惑之主則不能全其用古今稱苻堅得王猛於草茅之中一朝盡斥去其舊臣而與之謀其以匹夫畧有天下之半以此哉愚深悲賈生之志故備論之亦使人君得如賈誼之臣則知其有狷介之操一不見用則憂傷病沮不能復振而為生者亦慎其所發哉又曰世嘗謂漢文不用賈生以為深恨嘗推究其㫖竊謂不然賈生固天下之竒才所言亦一時之良策然請為屬國欲以繫單于則是處士之大言少年之鋭氣昔髙祖以三十萬衆困於平城當時將相羣臣豈無賈生之比三表五餌人知其疎而欲以困中行説尤不可信兵凶器也而易言之正如趙括之輕秦李信之易楚若文帝亟用其説則天下殆將不安使賈生嘗歴艱難亦必自悔其説用之晚歳其術必精不幸喪亡非意所及不然文帝豈棄材之主絳灌豈蔽賢之士至於晁錯尤刻薄文帝之世止於太子家令而景帝以為御史大夫申屠賢相發憤而死紛更政令天下騷然及至七國發難而錯之術窮矣文景優劣斯可見矣曾子固讀賈誼傳曰余讀三代兩漢之書至於竒辭奥㫖光輝淵澄洞達心腑如登高山以望長江之活流而恍然駭其氣之壯也故詭辭誘之而不能動淫辭迫之而不能顧考是與非若别白黒而不能浩浩洋洋波澈際涯雖千萬年之逺而若㑹於吾心益自喜其資之者深而得之者多也既而遇事輒發足以自壯其氣覺其辭源源來而不雜剔吾粗以迎其真植吾本以質其華其高足以凌青雲抗太虚而不入詭誕其下足以盡山川草木之理形狀變化之情而不入於卑汚及其事多而憂深慮逺而激扞有觸於吾心而干於吾氣故其言多而出於無聊讀之有憂患不忍之態然其氣要以為無傷也於是又自喜其無入而不宜矣使予位之朝廷親天子所以措置指畫號令天下之意作之訓辭鏤之金石以傳太平無窮之業蓋未必不有可觀者遇其所感寓其所志則自以為皆無傷也余悲賈生之不遇觀其為文經畫天下之便宜足以見其康天下之心觀其過湘為賦以弔屈原足以見其憫時憂國而有觸於其氣後之人責其一不遇而為是憂怨之言乃不知古詩之作皆古窮人之辭要之不悖於道義者皆可取也賈生少年多才見文帝極陳天下之事毅然無所阿避而絳灌之武夫相遭於朝譬之投䂓於矩雖强之不合故斥去不得與聞朝廷之事以奮其中之所欲言彼其不發於一時猶可寄文以攄其藴則夫賈生之志其亦可罪耶故予之窮餓足以知人之窮者亦必若此又嘗學文章而知窮人之辭自古皆然是以於賈生少進焉嗚呼使賈生卒其所施為其功業宜有可述者又豈空言以道之哉予之所以自悲者亦若此然已之知者其誰歟雖不吾知誰患耶季布盧照鄰詩曰季生昔未達身辱功不成髠鉗為臺隷灌園變姓名幸逢滕將軍兼遇曹丘生漢祖廣招納一朝拜公卿百金孰云重一諾良匪輕廷議斬樊噲羣公寂無聲處身孤且直遭時坦而平丈夫當如此唯唯何足榮温公曰曹丘與長君善而布與書使絶之是以曹丘為小人也及曹丘見以毁譽動已而已善之是養小人以自利也夫以毁譽動人及養小人以自利皆姦人之道也果如是則布烏得為賢大夫直不疑東坡曰直不疑買金償亡不辨盜嫂亦士之高行然非人情其所以䝉詬受名非不求名也求名之至者也太史公窺見之故其贊曰塞侯微巧周文處穢君子譏之為其近於佞也不疑䝉垢以求名周文穢跡以求利均以為佞佞之為言智也太史公之論後世莫曉吾是以疏解之歴代名賢確論卷四十一
