body:
  text: 歷代名賢確論卷三十一穆公先立晉夷吾皮日休獲晉侯栁州孟明焚舟髙邁由余老泉溫公三良李德裕孝公衛公子痤使衛鞅逃王元之商君程晏溫公潁濵東坡惠王張儀潁濵東坡昭王穰侯溫公潁濵范睢蔡澤潁濵白起潁濵樗里甘茂潁濵唐子西先立晉夷五口皮日休曰聖人務安民不先置不仁以見其仁焉不先用不德以見其德焉茍如是是見危者已墜而欲援觀鬭者將死而方救噫其亦不仁矣以髙辛之仁化用一摰摰之不善天下之民捕堯以為君以唐堯之仁化用一鯀鯀之不績天下之民譟禹以為功夫如是摰之與鯀是髙辛唐堯誠用之非先置也推其誠而用之人民尚倍之如是况先置者耶當晉獻驪姬之亂後奚齊卓子之死餘重耳在翟夷吾居秦以秦穆之力制翟而安晉其能必矣夫重耳之賢也天下知之又其從者皆足以相人國趙衰顛頡舅犯之謂如先立之必能誅亂公子去暴大夫翼德於成周宣化於汾晉而穆公乃取公子摰之言謂公子摰曰君若求置晉君以成名於天下則不如先置不仁者以猾其中矣乃先置夷吾是為惠公公之入也背內外之賂謂許里克以汾晉之田方百里㔻鄭負蔡之田方七十里許公子摰河外列城五黃金三十鎰白玉珩六雙誅本立之臣惠公二年春殺里克秋殺㔻鄭蒸先父之室謂惠公蒸於獻公夫人賈君是也故生民興誦謂輿人誦曰佞之見佞果喪其田死者無報謂惠公即位改葬恭世子而薨違於外也卒身獲于秦公以九月獲十月歸而子殺于晉謂十五年惠公卒懷公立秦乃召重耳於楚而納之晉人殺懷公於髙梁嗚呼致是也非晉人之罪秦人之罪也夫摰立八年不善而去鯀用九載弗績而誅况晉惠公之在位作宗廟之蠧蝎為社稷之稂莠一立十五年其為害也大矣今之學者以秦穆為繆尚疑其諡得斯文也可以諡繆為定獲晉侯栁州論國語曰秦穆公歸至于王城合大夫而謀曰殺晉君與逐出之與以歸與復之孰利公子摰曰殺之利公孫枝曰不可公子摰曰吾將以重耳代之晉之君無道莫不聞重耳之仁莫不知殺無道立有道仁也公孫枝曰恥一國之士又曰余納有道以臨汝無乃不可乎不若以歸要晉國之成復其君而質其適子使父子代處秦國可以無害栁州曰秦伯之不霸天下也以枝言之也耳且曰納有道以臨汝何故不可摰之言殺之也則果如而不用其言立重耳則義而順當是時天下之人君莫能宗周而能宗周者則大國之霸基也向使穆公既執晉侯以告于王曰晉夷吾之無道莫不聞重耳之仁莫不知且又不順既討而執之矣於是以正命黜夷吾而立重耳咸告于諸侯曰吾討惡而進仁既得命于天子矣吾將逹公道于天下則天下諸侯無道者畏有德者莫不皆知嚴恭欣戴而霸秦矣周室雖卑於是王命穆公以為侯伯則誰敢不服夫如是秦之所得者亦大矣棄至公之道而不知求姑欲離人父子而要河東之賂其舍大務小違義從利也甚矣霸之不能也以是夫孟明焚舟髙邁濟河焚舟賦曰昔孟明之載戰載北也空山肉填平地血流匹馬隻輪蕩然不收社稷包羞朝廷隱憂用兵至此不死何求誠以棄瑕之恩未報拜賜之言虛設砥名勵節易地改轍冀桑榆之未晚得雌雄之一决乃復總元戎申薄伐駟馬雲屯長劔電掣咆哮兮前貔後虎威稜兮左霜右雪火千旗而四面風動雷萬鼓而一道地裂小長平之瓦震凌不周之柱折朝出乎咸秦夕濟乎孟津其氣益振其屈欲伸於是指河中之舟示軍中之人曰吾與君子誓雪前恥負則入黃泉之下勝則入青雲之裏吹噓而霜露變叱咤而風塵弭雖無此舟誰無此舟爾否則骸骨為異鄉之土魂魄為鄰國之鬼雖有此舟誰有此舟矣乃命焚之夫其火與木相守水與火相煎烘大川焮長壖龍吼乎沸潭魚喁乎湯泉舳艫化而為炭楫棹揚而為煙水聲與軍聲合旁括于地火氣與兵氣鬭上衝于天是以天為我赫怒焉地為我震驚焉林木為我枯死焉山陵為我崩騫焉千里而髙鳥不過四遐而猛獸莫前况於人乎况於國乎於是晉君臣聞之心攢百箭背負芒刺形神無主手足若墜曰秦師德之修誠之至天將啓吾將避閉城郭而不出潛鋒鋩以自備以五廟茍存為幸以萬人茍免為智豈敢護其山河而虞其土地于時晉實為主反為客秦實為客反為主不戰而勝不攻而取掠地於大河之北封尸於崤陵之下既而鬼雪前恥人解厚顔四顧清野橫行而旋譟聲破晉山喜氣塞秦關曹沫復魯之勳自居其下范蠡平吳之力莫厠其間此役也見孟明之臨事暫否終泰圗之大也是子桑之舉人遺粗得精鑒之明也見秦伯之用賢責功捨過道之在也臣事君不必自致藉主司之公君使臣不必自得藉主司之忠由是觀之秦伯之有子桑猶耳目之在躬以其視視一國之明以其聽聽一國之聰自可以翊天子還淳風名與三五比崇身與二八爭功成强秦霸西戎不亦宜乎頌之曰析薪如之何匪斧不克事君如之何匪媒不得是知焚舟之役非孟明之力乃子桑之力也由余老泉曰古之取士取於盜賊取於殊方非以盜賊殊方之士可為也以賢之所在焉而已矣夫賢之所在貴而貴取焉賤而賤取焉是以盜賊下人殊方異類雖奴𨽻之所恥而往往登之朝廷坐之郡國而不以為恥繩趨而尺步華言而華服者往往反擯棄不用朝廷之政郡國之事非特如此而可治也彼雖不能繩趨而尺步華言而華服然而其才果可用於此則居此位可也古者天下之國大而多士大夫者不過曰齊與秦也而管夷吾相齊賢也而舉二盜焉穆公霸秦賢也而舉由余焉是其能果於是非而不牽於衆人之議也未聞有以用盜賊殊方而鄙之者也溫公論史記載戎王使由余於秦穆公對曰中國以詩書禮樂法度為政僅以小治及後世阻法度之威以督責於下下罷極則以仁義怨望於上上下交怨而相篡弒夫戎狄不然上含淳德以御其下下懷忠信以事其上此真聖人之治也穆公以為賢乃離間戎之君臣卒得由余而用之遂霸西戎溫公曰所謂貴有賢者謂其能治人國家也治人國家捨詩書禮樂法度無由也今由余曰是六者中國之所以亂也不如我戎狄無此六者之為善如此而穆公以為賢而用之則雖亡國無難矣若之何其能霸哉是特老莊之徒設為此言以詆先王之法太史遂以為實而載之過矣三良李德裕曰秦穆公之殺三良詩人刺之矣春秋譏之矣今不復議唯三良許之以死而前代無譏何也且臣道莫韙於咎繇孝友莫盛於周公咎繇尚不殉於舜禹二后周公尚不殉於文武二王三良詎可許之死乎如三良者所謂殉榮樂也非所謂殉仁義也可與梁丘據安陵君同譏矣焉得謂之百夫特哉昔荀息許晉獻以言繼之以死君子猶歎斯言之玷不可磨也豈得以生同榮樂歿共埃塵以為忠乎晏平仲言君為社稷死則死之斯言得之矣自周漢迄于巨唐殺身成仁代有髦傑莫不顯一身之義烈未有繫一國之存亡唯紀信乘黃屋以誑楚赴烈焰而存漢數千年間一人而已漢祚四百由此而興余謂漢祖封建紀氏宜在蕭曹之上報德未稱良可悲也衛公子痤使衛鞅逃王元之曰衛叔鞅嘗事公子痤痤知其賢而未能用㑹痤病衛君親視其疾且問國計痤曰臣之家宰鞅可與謀國事臣死君必用之衛君不然其請痤曰卒不能用不如殺之無使逃他國為衛之患既而復語鞅曰吾薦子于君君不用子必矣吾請殺子子其逃之吾方先君後臣故也嗚呼凡為社稷之臣計安危之事者在任賢去不肖而已且鞅果賢也可固請用之果不肖也可固請殺之用則為國之寶殺則去國之蠧烏有始請用中請殺而終使逃者得為忠乎且先君後臣之說非無稽之言乎司馬子長修史記至是而不言痤非豈史筆之有私邪將史才之未至邪僕恐後之為人臣計國事者復履其迹因論以明之商君程晏曰君子寧小窮而大逹小人寧小逹而大窮小者人之役大者人之道也孟子論帝王之道於諸侯諸侯不志我言則去之豈不以小窮而大逹歟商鞅論帝王之道於秦伯秦伯寐於是鞅乃易之以霸强之術而茍容之豈不謂小逹而大窮歟君子不患乎無才患乎不知窮逹之理也孟子大逹逺盜蹊而遵正路者也衛鞅大窮捨正路而趨盜蹊者也秦不知蹊以問鞅鞅指之趨盜蹊而強去也我知盜之蹊而反然之曷若遵正路而逺盜蹊哉溫公論商鞅為秦造令立木於國市募民徙之曰夫信者人君之大寶也國保於民民保於信非信無以使民非民無以守國是故古之王者不欺四海霸者不欺四鄰善為國者不欺其民善為家者不欺其親不善者反之欺其鄰國欺其百姓欺其兄弟欺其父子上不信下下不信上上下離心以至於敗所利不能藥其所傷所獲不能補其所亡豈不哀哉昔齊桓公不背曹沫之盟晉文公不貪伐原之利魏文侯不失虞人之期秦孝公不廢徙木之賞此四君道非粹白而商君尤稱刻薄又處戰攻之世天下趨於詐力猶且不敢忘信以畜其民况為四海治平之政者哉潁濵論商君變法令曰解牛之技恥於屠狗禦人之盜恥於穿窬衛鞅有帝王之術而肯以强國之事說孝公乎蓋鞅之志本於强國而已恐孝公之不能用是以極言其上以要之耳鄭子華欲以鄭為市於齊管仲不受而諸侯歸之鞅欺公子卬以取魏河西利之所在無所復顧鞅而知帝王之術其肯為此哉古之制刑輕重必與事麗殺人者死傷人及盜抵罪故人雖死而無憾今鞅使不告姦者腰斬告姦者與斬敵首同賞匿姦者與降敵同罰民有二男以上不分異者倍賦事未利及怠而貧者舉為收孥刑之輕重豈復與事麗哉其後始皇之世有子而嫁者有刑夫為寄猳者殺之無罪妻為逃嫁者子不得母法皆與情不應至於偶語詩書者棄市以古非今者族其端皆自鞅發之然鞅之死至於車裂而李斯之死至具五刑皆被赤族之禍天之報人豈誣也哉東坡曰商鞅用於秦變法令行之十年秦民大悅道不拾遺山無盜賊家給人足民勇於公戰怯於私鬭秦人富強天子致胙於孝公諸侯畢賀蘇子曰此皆戰國之遊士邪說詭論而司馬遷暗於大道取以為史吾以謂遷有大罪二其先黃老後六經退處士而進姦雄特其小者耳所謂大罪二則論商鞅桑𢎞羊之功也自漢以來學者恥言商鞅桑𢎞羊而世主獨甘心焉皆陽諱其名而隂用其實其甚者名實皆宗之庶幾其成功此司馬遷之罪也秦固天下之强國而孝公亦有志之君也修其政刑十年不為聲色遊田之所敗雖微商鞅有不富强乎秦所以富强者孝公敦本力穡之效非鞅流血刻骨之功也秦之所以見疾於民如豺虎毒藥一夫作難而子孫無遺種則鞅實使之至於桑𢎞羊斗筲之才穿窬之智無足言者而遷稱之曰不加賦而上用足善乎司馬光之言曰天下安有此理天地所生財貨百物止有此數不在民則在官譬如雨澤夏潦則秋旱不加賦而上用足不過設法隂奪民利其害甚於加賦也二子之名在天下如蛆蠅糞穢也言之則汚口舌書之則汚簡牘二子之術用於世者滅國殘民覆族亡軀者相踵也而世主獨甘心焉何哉樂其言之便已也夫堯舜禹湯世主之父師也諫臣拂士世主之藥石也恭敬慈儉勤勞憂畏世主之繩約也今使世主臨父師而親藥石履繩約非其所樂也故為商鞅桑𢎞羊之術者必先鄙堯笑舜而陋禹也曰所貴賢主者專以天下適已而已此世主所以人人甘心而不寤也世有食鍾乳烏喙而縱酒色以求長年者蓋始於何晏晏少而富貴故服寒食散以濟其欲無足怪者效彼之所為足以殺身滅族者日相繼也得死於服寒食散豈不幸哉而吾獨何為效之世之服寒食散疽背嘔血者相踵也用商鞅桑𢎞羊之術破國亡家者皆是也然而終不悟者樂其言之美便而忘其禍之慘烈也又曰聖人制刑賞知天下之樂乎賞而畏乎刑也是故施其所樂者自下而上民有一介之善不終朝而賞隨之是以上之為善者足以知其無有不賞也施其所畏者自上而下公卿大臣有毫髮之罪不終朝而罰隨之是以下之為不善者亦足以知其無有不罰也詩曰柔亦不茹剛亦不吐夫天下之所謂權豪貴顯而難令者此乃聖人之所借以狥天下也舜誅四凶而天下服何也此四族者天下之大族也夫惟聖人為能擊天下之大族以服小民之心故其刑罰至於措而不用周之衰也商鞅韓非峻刑酷法以督責天下然其所以為得者用法始於貴戚大臣而後及於疏賤故能以其國霸由此觀之商鞅韓非之刑非舜之刑而所以用刑者舜之術也後之庸人不深原其本末而猥以舜之用刑之術與商鞅韓非同類而棄之法禁之不行姦宄之不止由此其故也又曰商君之法使民務本力農勇於公戰怯於私鬭食足兵强以成帝業然其民見刑而不見德知利而不知義卒以此亡故帝秦者商君也亡秦者亦商君也其生有南面之福既足以報其帝秦之功矣而死有車裂之禍蓋僅足以償其亡秦之罰理勢自然無足怪者後之君子有商君之罪而無其功饗商君之福而未受其禍者吾為之懼矣張儀頴濵曰戰國之為縱橫者皆傾危反覆之士也然而汙賤無恥莫如張儀而其成功莫如儀之多儀之未信於楚也辭而之晉謂懷王曰王無求於晉國乎王曰黃金珠璣犀象楚産也吾何求於晉儀曰王獨不好色耳周鄭之女粉白黛黑立於衢閭不知而見者以為神也王獨不好色耳王說資之珠玉而遣之南后鄭袖聞而憂之奉之以千金儀將行謂王曰天下關閉不通未知見日也願王觴臣中飲儀請王召所便習王召鄭袖儀見之詭請罪曰儀行天下未嘗見人如此其美也而儀言得美人是欺王也王與后大喜而儀言得行儀之所以求用者其術至此此所以言必信而功多也可不悲乎東坡曰張儀欺楚王以商於之地六百里既而曰臣有奉邑六里此與兒戲無異天下莫不疾張子之詐而笑楚王之愚也夫六百里豈足道哉而張又非楚之臣為秦謀耳何足深過若後世之臣欺其君者曰行吾言天下舉安四夷畢服禮樂興而刑罰措其君之所欲得者非特六百里也而卒無絲毫之獲豈惟無所獲其所喪已不可勝言矣則其所以事君者乃不如張儀之事楚穰侯溫公曰穰侯援立昭王除其災害薦白起為將南取鄢郢東屬地於齊使天下諸侯稽首而事秦秦益强大者穰侯之功也雖其專恣驕貪足以賈禍亦未至盡如范睢之言若睢者亦非能為秦忠謀直欲得穰侯之所處故扼其吭而奪之耳遂使秦王絶子母之義失舅甥之恩要之睢真傾危之士也哉潁濵曰秦誅商君逐穰侯君臣皆失之矣彼二子者知得而不知喪雖智能伯秦而不能免其身蓋無足言者而惠王以怨誅鞅至誣以叛逆昭王以逼遷冉至出老母逐弱弟而不顧甚矣其少恩也彼公子䖍方欲報怨固不暇為國慮矣而范睢欲毁人以自成而至於是可畏也哉范睢蔡澤潁濵曰范睢相秦其所以利秦者少而害秦者多以魏冉之專忘其舊勳而逐之可也而并逐宣太后使昭王以子絶母不已甚乎宣太后之於秦非有鄭武姜莊襄后之惡也鄭武姜莊襄后猶不可絶而睢勇絶之獨不愧潁考叔茅焦乎及睢任秦事殺白起而用王稽鄭安平使民怨於內兵折於外曾不若魏冉之一二以豫觀之范睢蔡澤自為身謀取卿相可耳未見有益於秦也白起潁濵曰讀太史公白起傳秦之再攻邯鄲也起與范睢有怨稱病不行以亡其軀慨然歎曰起以武夫無所屈信而困於遊談之士使起勉强一行兵未必敗而免於死矣及讀戰國䇿觀起自陳成敗之蹟乃知邯鄲决不可再攻而起又非特以怨不行蓋為之流涕也趙充國征西羌守便宜不肯奉詔出兵辛武賢雖兵出有功充國竟為漢宣明其非是武賢怨之至骨雖不能害充國而卒陷其子卬嗚呼循道而不阿自古難之歟樗里甘茂潁濵曰蘇秦為諸侯弱秦而張儀為秦弱諸侯其說猶可言也如樗里疾公孫奭黨於韓甘茂黨於魏向壽黨於楚皆借秦之强以搖動諸侯而成其私民生其間其受害可勝言乎今世雖無戰國相傾之勢然士居其間其以喜怒成敗天下事者多矣人主誠能得其情其罪可勝誅乎唐子西曰昔樗里之葬渭南也曰後百年當有天子宫夾吾墓至漢興長樂宫在其東未央宫在其西謹按史記秦昭王七年嵗在辛酉樗里子卒漢髙帝七年長樂宫成八年營未央宫是嵗癸卯上距辛酉實一百有三年世知二宫作於髙帝之時而不知百年之前樗里子固己言之於秦昭王之世矣古稱得道至人能知城邑宫殿從何福業生此非虛語也凡物成就本非一生之所能為至其變滅亦非一事之所能廢業凝而成既泮而敗其所由來逺矣世無至人故莫識其所從也若樗里子者豈足名得道哉彼不過以數知之耳蓋萬物本於道故道能知之不外於數故數亦能知之戰國之士大抵皆深於數故知來事如此至詰其所從來彼亦不能知也歷代名賢確論卷三十一
