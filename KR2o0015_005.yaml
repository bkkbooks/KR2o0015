body:
  text: 歷代名賢確論卷五湯伊尹范文正公栁州東坡陳越石賞罰東坡紂三仁溫公劉敞東坡李翰栁州賈至伊尹范文正公曰晉順而上行奉于文明坤順離明君子嘉遇顯進之時也夫上無文明賢斯遁矣今文明麗于上君子可不進乎其進也柔順內融則上不拒其逼矣故曰晝日三接也英華外著則衆不疑其行矣故曰君子以自昭明德蓋明出地上如日之升君子當其象也豈復昧哉其伊尹之時歟栁州贊曰或疑曰湯之仁聞且見矣桀之不仁聞且見矣胡去就之亟也栁子曰惡是吾所以見伊尹之大者也彼伊尹聖人也聖人出於天下不夏商其心心乎生民而己曰孰能由吾言由吾言者為堯舜而吾生人堯舜人矣退而思曰湯誠仁其功遲桀誠不仁朝吾從而暮及於天下可也於是就桀桀果不可得反而從湯既而又思曰尚可十一乎使斯人蚤被其澤也又往就桀桀不可而又從湯以至於百一千一萬一卒不可乃相湯伐桀俾湯為堯舜而人為堯舜之人是吾所以見伊尹之大者也仁至於湯矣四去之不仁至於桀矣五就之大人之欲速其功如此不然湯桀之辨一恆人盡之矣又奚以憧憧聖人之足觀乎吾觀聖人之急生人莫若伊尹伊尹之大莫若於五就桀作伊尹五就桀贊曰聖有伊尹思德於民往歸湯之仁曰仁則仁矣非久不親退思其速之道宜夏是因就焉不可復反亳殷猶不忍其遲亟往以觀庶狂作聖一日勝殘至千萬冀一卒無其端五往不疲其心乃安遂升自陑黜桀尊湯遺民以完大人無形與道為偶道之為大為人父母大矣伊尹惟聖之首既得其仁猶病其久恆人所疑我之所大嗚呼逺哉志以為誨東坡曰聖人之所以能絶人者不可以常情疑其有無孔子為司冦墮郈墮費三桓不疑其害已非孔子能之乎伊尹去亳適夏既醜於有夏復歸於亳伊尹為政於商既二於夏矣桀之暴戾處其執政而不疑往來兩國之間而商人父師之非聖人能如是乎是以廢太甲太甲不怨復其位太甲不疑皆不可以常情斷其有無也後世惟諸葛孔明近之𤣥德將死之言乃真實語也使孔明據劉禪位蜀人豈有異詞哉讀栁宗元五就桀贊終篇皆妄伊尹往來兩國之間豈其有意欲教誨桀而全其國耶不然湯之當王也久矣伊尹何疑焉桀改過而免於討可庶幾也能用伊尹而得志於天下雖至愚知其不然宗元意欲以此自解其從二王之罪也又曰辦天下之大事者有天下之大節者也立天下之大節者狹天下者也夫以天下之至大而不足以動其心者則天下之大節有不足立而大事有不足辦者矣今夫匹夫匹婦皆知潔廉忠信之為美也使其果潔廉而忠信則其智慮未始不如王公大人之能也惟其所爭者止於簞食豆羮而簞食豆羮足以動其心則宜其智慮之不出乎此也簞食豆羮非其道不取則一鄉之人莫敢以不正犯之矣一鄉之人莫敢犯而不能辦一鄉之事者未之有也推此而上其不敢者愈大則其所辦者愈逺矣讓天下與讓簞食豆羮無以異也治天下與治一鄉亦無以異也然而不能者有所蔽也天下之富是簞食豆羮之積也天下之大是一鄉之推也非千金之子不能運千金之資販夫販婦得一金而不知其所措非智不若所居之卑也孟子曰伊尹耕於有莘之野非其道也非其義也雖祿之天下弗受也夫天下不能動其心是故其才全以其全才而制天下是故臨大事而不亂古之君子必有髙世之行非茍以為異而巳卿相之位千金之富有所不屑將以自廣其心使窮達利害不能為之芥蒂以全其才而欲有所為耳後之君子蓋亦嘗有其志矣得失亂其中而榮辱奪其外是以役役至於老死而不暇亦足悲矣孔子叙書至於舜禹臯陶相讓之際蓋未嘗不太息也夫以朝廷之尊而行匹夫之讓孔子安取哉取其不汲汲於富貴有以大服天下之心焉耳夫太甲之廢天下未嘗有是而伊尹始行之天下不以為驚以臣放君天下不以為僭既放而復立太甲不以為專何則其素所不屑者足以取信於天下也彼其視天下眇然不足以動其心而豈忍以廢放其君求利也哉後之君子蹈常而習故惴惴焉懼不免於天下一為希濶之行則天下羣起而誚之不知求其素而以為古今之變時有所不可者亦已過矣夫陳越石論放太甲曰商甲不惠于天下其臣放之後能改過亦為臣之所立或曰社稷之重必當如是淺於國者之為論也至若承湯之教全殷之統立臣之節豈如是耶君上之不肖與賢智豈臣下之有不知耶擇其嗣當求賢而立之不知其非賢以為不明因而放之令其自新如日蝕不吐河清難俟中原之鹿將軼時乘之龍待駕於臣之業何如又況乎體非金石而冒霧露如懷失國之詬以損其身則弒君之謗消無日矣陳子曰臣之忠有幸而忠者也君之立有幸而立者也知殷之君臣皆幸而成者噫浞浞接踵羿羿比肩君可放乎哉其後新取於西魏成於東司馬氏之有天下其始也未嘗不伊不周其終也未嘗不羿不浞皆取伊周以為蒿矢也孟子曰無伊尹之志則篡也有㫖哉賞罰東坡曰禮云商人先罰而後賞而漢武䇿董仲舒云商人執五刑以督姦傷肌膚以懲惡此百王之所同而獨云爾者漢儒之學固有以商為厚於威而薄於恩也耶三仁溫公曰孔子曰商有三仁焉蓋孔子之前為比干者則非微子矣為微子者則非比干矣為箕子者則非比干與微子矣至孔子然後知三子者皆仁人也孔子曰微管仲吾其被髮左袵矣如其仁如其仁孟荀氏之言曰仲尼之門五尺童子羞稱五伯以是觀之孟荀氏之道槩諸孔子其隘甚矣東坡曰夫道一而已君子之出處語默所以不同者其居異也今三子之於紂非父則兄其位則太師少師也其居不相逺其責宜若同然或去之或囚焉或諫而死孔子皆曰仁何也微子紂之庶兄也箕子欲立之帝乙不從而立紂故書曰我舊云刻子王子不出我乃顛隮刻害也我舊之所云者害子子若不去並我得禍也魏文帝之於陳王植晉武帝之於齊王攸自中主以下皆所不能容而況於紂乎故微子之所以出奔箕子之所以佯狂為奴者皆以居可疑之地而犯必死之怨也二者雖有言紂豈復信之故不諫而去或囚者其勢然也至於比干親則諸父位則少師也而無所嫌諫而不聽猶冀萬一焉雖繼之以死可也使二子無刻子之嫌者吾知其與比干俱死矣李翰曰商王受毒痡于四海德悖于三正肆厥淫虐丕罔敢諫於是微子去之箕子囚之而公獨死之非捐生之難處死之難非處死之難得死之難故不可死而死之是輕其生非孝也得其死而不死是重其死非忠也王之叔父親莫至焉國之元臣位莫崇焉崇髙不可以觀其危親昵不可以忘其祖則我成湯之業將墜于淵商王之命將絶于天整扶其顛遂諫而死剖心非痛商亡是痛公之忠烈也其若是乎故能獨立危邦橫抗興運周武以三分之業有諸侯之師資十亂之謀總一心之衆當公之存也則戢彼西土及公之喪也乃觀于盟津公存而殷存公喪而殷喪興亡所繫豈不重歟且聖人立教懲惡勸善而已矣人倫大統父子君臣而已矣太師存則正其統歿則垂其教奮乎千古之上行乎百王之末俾夫淫者懼佞者慙睿者思忠者勸其為式也不亦大哉而夫子稱殷有三仁豈無微㫖嘗敢賾之曰存其身存其祀亦仁也亡其身存其國亦仁也若進死者退生者狂狷之士將奔走焉褒生者貶死者宴安之人將置力焉故同歸諸仁各順其志殊途而一揆異行而齊致俾後之人優柔而自得焉蓋春秋微婉之義也必將建皇極叙彛倫𢎞在三之規垂不二之訓以昭於世則夫人臣者既移孝于親而致之於君焉有聞親失而不爭覩親危而不救從容安地而稱得禮甚不然矣夫孝于其親者人之親皆願其為子忠于其君者人之君皆欲其為臣故歷代帝王莫不旌顯周武下車而封其墓魏氏南遷而創其祠我太宗有天下禋百神而盛其禮追贈太師諡曰忠烈申命郡縣封墓葺祠致守塜五家以少牢時享著于甲令刻于金石於戲哀傷列辟主食舊封德為神明秩視羣望身滅而名益大世絶而祀愈長然後知忠烈之道其感激天人深矣天寶十祀余尉于衛拜乎祠堂魄感精動而廟在鄰邑官非軾閭刋石銘表以志丕烈詞曰糜軀非仁蹈難非智死于其死然後為義忠無二體烈有餘氣正直聰明至今猶視咨爾來代為臣不易栁州曰凡大人之道有三一曰正䝉難二曰法授聖三曰化及民殷有仁人曰箕子實具兹道以立于世故孔子述六經之㫖尤殷勤焉當紂之時大道悖亂天威之動不能戒聖人之言無所用進死以併命誠仁矣無益吾祀故不為委身以存祀誠仁矣與亡吾國故不忍具是二道有行之者矣是用保其明哲與之俯仰晦是謨範辱於囚奴昏而無邪隤而不息故在易曰箕子之明夷正䝉難也及天命既改生人以正乃出大法用為聖師周人得以序彛倫而立大典故在書曰以箕子歸作洪範法授聖也及封朝鮮推道訓俗惟德無陋惟人無逺用廣殷祀俾夷為華化及民也率是大道叢于厥躬天地變化我得其正其大人歟於戲當其周時未至殷祀未殄比干已死微子已去向使紂惡未稔而自斃武庚念亂以圖存國無其人誰與興理是固人事之或然者也然則先生隱忍而為此其有志於斯乎頌曰䝉難以正授聖以謨宗祀用繁夷民其蘇憲憲大人顯晦不渝聖人之仁道合隆汚明哲在躬不陋為奴冲讓居禮不盈稱孤髙而無危卑不可踰非死非去有懷故都時詘而伸卒為世模易象是列文王為徒大明宣昭崇祀式孚古闕頌辭繼在後儒賈至曰微子諱啓實帝乙元子帝乙懵賢之故而神器不集於君君肅恭神人恪慎克孝才兼八元之偉德首三仁之列始在擇嗣箕子贊焉尹兹東夏周公嘉焉殁而不朽仲尼稱焉覩其進思盡忠則忤主以竭諫退將保祀則全身以逃難去就生死之塗沉吟出處之域有以見聖達之情也若乃受為不道暴殄天物剖諫輔之心解忠良之骨億兆墜於塗炭宗祧困於􅑶危瓦而君崎嶇險阻避跡藏時免身龍戰之郊解縛鷹揚之師卒能修復舊物統承先祀七百餘年歆我神祗非明德至仁其孰能與於此於戲國之興亡不獨天命向使帝乙捨受而立啓前箕子而後少師則文王未可專征于諸侯武王未可誓師于牧野雖周公之聖不過子産善相矣太公之賢不過穰苴之法矣是太王立季歷而昌帝乙捨微子而亡成敗繫本不其昭彰劉敞曰儒者或稱殷道衰微子抱祭器入周紂殺比干箕子懼佯狂為奴孔子皆賢此兩人殊行而同名總其實弗獲正四方我出為狂自遜于荒野古者同姓雖危不出去國微子紂庶兄也何入周之有及紂殺比干箕子諫之猶力紂遂囚箕子而奴辱之武王告諸侯曰紂乃囚正士可伐矣武王伐紂敗之牧野紂自殺武王則使人釋箕子囚載與俱歸而作洪範由是言之也箕子之不死幸耳豈自茍全須㬰者哉然微子所以能去者以先其未亂也雖去猶不逾國斯仁矣如已亂無為去也必去之是逃也非仁者也歷代名賢確論卷五
