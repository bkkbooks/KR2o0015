body:
  text: 歴代名賢確論巻七十三則天一廢立中宗預朝政范祖禹張唐英孫之翰楊䕫狄仁傑范文正公子由孫之翰裴炎張唐英五王薛季昶附張唐英張柬之孫之翰廢立中宗預朝政范祖禹論黜武后年號曰昔季氏出其君魯無君者八年春秋每嵗必書公之所在及其居乾侯也正月必書曰公在乾侯不與季氏之專國也自司馬遷作吕后本紀後世為史者因之故唐史亦列武后于本紀其於記事之體則實矣春秋之法則未用也或曰武后母也中宗子也母雖不慈子不可以不孝中宗欲以天下與韋元正不得為無罪武后實有天下不得不列於本紀不没其實所以著其惡也臣以為不然中宗之有天下受之於髙宗也武后以無罪而廢其子是絶先君之世也況其革命乎中宗曰我以天下與韋元正何不可此乃一時拒諫之忿辭非實欲行之也若以為罪則漢哀帝之欲禪位董賢其臣亦可廢立也春秋呉楚之君不稱王所以存周室也天下者唐之天下也武氏豈得而間之故臣復繫嗣聖之年黜武氏之號以為母后禍亂之戒竊取春秋之義雖獲罪於君子而不辭也孫之翰不稱武后年號論曰武后僭竊位號唐之史官遂修實録撰國史亦為立紀繫后事於帝王之年列偽周於有唐之史名體大亂史法大失矣後史官沈既濟奏議曰中宗以始年登大位季年復舊業雖尊名中奪而天命未改足以首事足以表年昔魯昭公之出也春秋嵗書其居曰公在乾侯君雖失位不敢廢也今請併太后紀每於嵗首必書中宗所居曰某年春正月皇帝在房陵太后行某事改某制則紀稱中宗而事跡太后俾名不失正禮不違常此得春秋之法足正唐史之失也故從其議書武后事於中宗年中武后改年皆是妄作今起嗣聖繫以景龍武后所改但存其名備證他事而不表年焉所以正帝統而黜僭偽也楊䕫紀梁公對曰天后幽中宗之後有不下閫闈移六合之志故徐敬業唐之奇等於揚州起兵以興復唐室然皆不旋踵而敗遂引用酷吏開羅織之門以懾伏内外一日狄梁公獨對天后曰吾自用俊臣思止來朝臣知所懼否梁公曰朝廷小人不達天命或有異議然陛下以木有一實之蠧將剪樹而棄之乎錦有一㸃之汙將全疋而燔之乎養隼者誠欲其鷙也然則鷙於烏鳶乎鷙於鸞凰乎鷙而無别不如不鷙矣天后黙然孫之翰論張柬之廢武后曰舊史書武后傳位於中宗葢史官諱其事也然於桓彦範傳書武三思以武后為彦範等所廢常深憤怨又武后實録書彦範請太后復辟卧不語事是廢之為實事書柬之彦範等遂廢武氏所以明大法也唐之天下髙祖太宗之天下也髙宗傳受於祖宗及其崩也以子託后后擅威權乃逼奪其位僭竊大號恣行兇虐流毒内外踰二十年不道至此若終身無禍何以作戒於後況實廢之安得諱避也若以中宗武后之子也彦範等奉子而廢母於事不順是亦不達其理矣春秋莊公元年三月夫人遜於齊此莊公之母也以悖亂之事去其氏貶之則春秋之法可見矣武后奪嗣君之位變唐國號兇威虐法為害嵗久此安得無所貶也況書廢武氏者廢其僭妄之號彊大之權復后之位矣復后位所以奉祖宗之統豈不順乎故用春秋之法為唐貶絶罪人且作戒於後也張唐英曰武后之起其始袁天綱言其貴不可言李淳風亦云當有女主王天下已在宫中讀史至此未嘗不疑也且二帝三王之盛其隂陽日者䜟緯之説未之有也迨漢以來取天下不以仁義之道故將假符瑞以惑天下之人使信而歸之故董仲舒言三代受命之符而儒者嘗鄙之且武氏一女子焉能感動上帝而前兆如此哉上帝之心又豈故孕育不仁之女子使之雕琢唐室如此哉此必武氏僭竊之後其附麗姦諂之徒欲自掩其惡乃神其事因言天之所啟非由人事也忽於李淳風等傳増加其言以惑後人爾若曰不然則二帝三王之間賢后妃多矣上帝胡不前定其至貴之兆而獨區區私一武氏哉以愚觀之有堯舜禹湯之徳足以王天下自古符瑞之言皆不足信也何止一武氏哉狄仁傑范文正公狄梁公碑曰天地閉孰將闢焉日月蝕孰將廓焉大厦仆孰將起焉神器墜孰將舉焉巖巖乎克當其任者唯梁公之偉歟公諱仁傑字懐英太原人也祖宗髙烈本傳在矣公為子極于孝為臣極於忠忠孝之休揭如日月者敢歌於廟中公嘗赴并州掾過太行山反瞻河陽見白雲孤飛曰吾親舍其下久而不能去左右為之感動詩有陟岵陟屺傷君子于役弗忘其親此公之謂歟吁嗟乎孝之至也忠之所繇生乎公嘗以同府掾當使絶域其母老疾公謂之曰奈何重太夫人萬里之憂詣長史府請代行時長史司馬方眦睚不協感公之義歡如平生吁嗟乎與人交而先其憂況君臣之際乎公為大理寺丞決諸道滯獄萬一千人天下服其平武衛將軍權善才坐伐昭陵柏髙宗命戮之公抗奏不却上怒曰彼致我不孝左右語公令出公前曰陛下以一樹而殺一將軍張釋之所謂假有盜長陵一抔土則將何法以加之臣豈敢奉詔陷陛下於不道帝意解善才得恕死吁嗟乎執法之官患在少恩公獨愛君以仁何所存之逺乎髙宗幸汾陽宫道出妬女祠下彼俗謂盛服過者必有風雷之災并州發數萬人别開御道公為知頓使曰天子之行風伯清塵雨師洒道彼何害哉遽命罷其役又公為江南巡撫使奏毁淫祠千七百所所存唯夏禹太伯季子伍員四廟曰安使無功血食以亂明哲之祠乎吁嗟乎神猶正之而況於人乎公為寧州刺史能撫戎夏郡人紀之碑及遷豫州會越王亂後縁坐者七百人籍没者五千口有使促行刑公緩之密表以聞曰臣言似理逆臣不言則孤陛下好生之意表成復毁意不能定彼咸非本心唯陛下矜焉勑貸之流于九原郡道出寧州舊治父老迎而勞之曰我狄使君活汝輩耶相攜哭于碑下齊三日而去吁嗟乎古謂民之父母如公則過焉斯人也死而生之豈父母之能乎時宰相張光輔率師平越王之亂將士貪暴公拒之不應光輔怒曰州將忽元帥耶對曰公以三十萬衆除一亂臣彼脅從輩聞王師來乘城而降者萬計公縱暴兵殺降以為功使無辜之人肝腦塗地如得尚方斬馬劍加於君頸雖死無恨光輔不能屈奏公不遜左遷復州刺史吁嗟乎孟軻有言威武不能屈是為大丈夫其公之謂乎為地官侍郎同鳯閣鸞臺平章事為來俊臣誣譖下獄公曰大周革命萬物惟新唐朝舊臣甘從誅戮因家人告變得免死貶彭澤令獄吏嘗抑公誣引楊執柔公曰天乎吾何能為以首觸柱流血被面彼懼而謝焉吁嗟乎陷穽之中不義不為況廟堂之上乎契丹陷冀州起公為魏州刺史以禦焉時河朔震動咸驅民保郛郭公至下令曰百姓復爾業冦來吾自當之狄聞風而退魏人為之立碑未幾入相請罷戍疏勒等四鎮以肥中國又請罷安東以息江南之饋輸識者韙之北狄再冦趙定間出公為河北道元帥狄退就命公為安撫大使前為突厥所脅從者咸逃散山谷公請曲赦河北諸州以安反側朝廷從之吁嗟乎四方之事知無不為豈虚尚清談而已乎公在相日中宗幽房陵則天欲立武三思為儲嗣一日問羣臣可否衆皆稱賀公退而不答則天曰無乃有異議乎對曰有之憶昨陛下命三思募武士嵗時之間數百人及命廬陵王代之數日之間應者十倍臣知人心未厭唐徳則天怒令䇿出又一日則天謂公曰我夢雙陸不勝者何對曰雙陸不勝宫中無子也復命䇿出又一日則天有疾公入問閤中則天曰我夢鸚鵡雙翅折者何對曰武者陛下之姓相王廬陵王則陛下之羽翼也是可折乎時三思在側怒發赤色則天以公屢言不奪一旦感悟遣中使密召廬陵王矯衣而入人無知者乃召公坐於簾外而問曰我欲立三思羣臣無不可者惟俟公一言從之則與卿長保富貴不從則無復得與卿相見矣公從容對曰太子天下之本本一揺而天下動陛下豈以一心之欲輕天下之動哉太宗百戰取天下授之子孫三思何與焉昔髙宗寢疾令陛下權親軍國陛下奄有神噐數十年又將以三思為後如天下何且姑與母孰親子與姪孰近立廬陵王則陛下萬嵗後享唐之血食立三思則宗廟無祔姑之禮臣不敢愛死以奉制陛下其圗焉則天感泣命褰簾使廬陵王拜公曰今日國老與汝天子哭於地則天命左右起之拊公背曰豈朕之臣社稷之臣耶已而奏曰還宫無儀孰為太子於是復置廬陵王於龍門備禮以迎中外大悦吁嗟乎定天下之業斷天下之疑其至誠如神雷霆之威不得而變乎則天嘗命公擇人公曰欲何為曰可將相者公曰如求文章則今宰相李嶠蘇味道足矣豈文士齷齪思得奇才以成天下之務乎荆州長史張柬之真宰相才誠老矣一朝用之尚能竭其心乃召拜洛州司馬他日又問人於公對曰臣前言張柬之雖遷洛州猶未用焉改秋官侍郎及召為相果能誅張易之輩返正中宗復則天為皇太后吁嗟乎薄文華重才實其知人之深乎又嘗引拔桓彦範敬暉姚元崇等至公卿者數十人公之勲徳不可殫言有論議數十萬言李邕載之别傳論者謂松柏不夭金石不柔受於天焉公為大理丞抗天子而不屈在豫州日拒元帥而不下及居相位而能復廢主以正天下之本豈非剛正之氣出乎誠性見於事業當時優㳺薦紳之中顛而不扶危而不持者亦何以哉某貶守鄱陽移丹徒郡道彭澤謁公之祠而述焉又系之云商有三仁弗救其滅漢有四皓正於未奪嗚呼武暴如火李寒如灰何心不隨何力可回我公哀傷拯天之亡逆長風而孤騫愬大川以獨航金可革公不可革孰為乎剛地可動公不可動孰為乎方一朝感通羣隂披攘天子既臣而皇天下既周而唐七世發靈萬年垂光噫非天下之至誠其孰能當蘇子由論曰母后臨朝據人君之地而私其親有志之士將欲正之常患不克漢吕后欲王諸吕王陵以髙帝舊約爭之曰非劉氏而王者天下共擊之背之不可言雖直不見省陵幸而不死亦廢不用唐武后廢廬陵王立豫王豫王雖在位未嘗省天下事徐敬業為之起兵於外裴炎爭之於内皆不旋踵為戮何者位尊權重臣下無所奈何勢必至此也恵帝之亡也陳平聽張辟彊計封王諸吕吕后安之故平與周勃得執將相之柄以伺其間後聽陸賈交歡周勃將相之權不分周勃得入北軍左袒一呼而吕氏以亡豫王既立武后革命稱帝追尊祖考封王子弟戕殺天下豪雋志得意滿以為武氏有泰山之安矣狄仁傑雖為宰相而未嘗一言及后欲以三思為太子訪之大臣仁傑曰臣觀天人未厭唐徳頃匈奴犯邊陛下使三思募士逾月不及千人及使廬陵王不旬浹得五萬人今欲立嗣非廬陵王不可后怒罷議久之後召問曰朕數夢雙陸不勝何也對曰雙陸不勝無子也意者天以此儆陛下耶文皇帝身蹈鋒刃百戰以有天下傳之子孫先帝寢疾語陛下監國陛下奄神器而有之十餘年矣今又欲以三思為後且母子與姑姪孰親陛下立廬陵王則千秋萬歳血食宗廟三思立廟無祔姑之禮后感悟即日遣徐彦伯迎廬陵王於房州而立之葢王陵裴炎迎禍亂之鋒欲以一言折之故不廢則死陳平狄仁傑待其已衰而徐正之故身與國俱全惟吕后無子親止於姪故没身而後變武后有子母子之愛人情之所同故老而自復由此觀之陳狄之所以成功者皆以緩得之也然廬陵既立而張易之昌宗未去仁傑猶置之而不問復授之張柬之俟其惡穢而後取豈以禍亂之根生於母子之間不如是則必至於毁傷故耶老氏有言將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明柔勝剛弱勝强魚不可脱於淵國之利器不可以示人二公得之矣裴炎張唐英論炎廢中宗為廬陵王曰中宗欲以韋后父為侍中宰臣裴炎以為不可中宗曰我讓國與之豈不得何惜一侍中炎懼入白太后定䇿與劉褘之程務挺張䖍勗入宫挾帝下殿廢為廬陵王立豫王旦為帝炎以功封河東侯嗟乎裴炎真庸臣也且中宗讓國之言本以炎不與后父侍中乃激怒之言也非本意欲擅位於后父也奈何不思人主發憤之言遂定䇿而廢之設使中宗誠有此意已為執政大臣持天下之柄當諫曰天下者髙祖太宗之天下非陛下之天下陛下若倦於萬幾欲遊神於無為逍遥於太上則當傳之子孫不可輕議以神器而付於后族使宗廟絶食若終不可諫尚有伊尹放太甲於桐宫之事奈何不精思逺慮遽行霍光昌邑之大事遂使武氏得志革姓改氏誅戮李氏子孫幾盡豈非炎庸夫一言之失所致乎若萬乘之君可容易廢立則愚恐後世竊國而賣君者踵足而起爾其後以崔察誣奏誅死葢有以召之也中宗已反正不斲其棺庸夫之幸也孫之翰論殺裴炎曰裴炎之死雖由直議迹其本末亦自取之也武后篡奪之勢非一朝一夕之為方欲因事立威震懾中外然後行其所謀中宗即位之初欲過寵后父炎力爭之因有讓國之言葢一時忿激之詞也炎諫於外武后制於内一孱主豈能有為何得因一時忿激之詞便謂不堪輔佐遽議廢立葢炎自以忤意預憂禍及遂附武后之意為之謀爾殊不知武后既廢帝立少子天下之權皆在於已其勢至此事肯已乎況素有異謀也炎方區區諫正其過又請復政少子盜欲取人奇寳已預其謀既使得之乃以亷恥為責令歸其人言得從乎言既不得禍得免乎故謂炎之死亦自取之也夫為人臣者雖當盡力於事在擇主之正與不正爾主不正而盡力焉鮮有不罹其禍者葢共事之時知其計畫所長用心所向得志之後必慮復與之謀則不利於已故不無忌之之意也則炎與劉禕之程務挺輩相繼被戮皆自取之也五王薛季昶附張唐英曰薛季昶嘗勸敬暉等令誅武三思而暉等不從季昶曰吾不知死所矣其後因王同皎事羅織其事逺竄嶺外崔寔獻計遣御史周利用巡嶺外逼令自殺桓彦範死於龍州敬暉死於崖州崔曄死於白州張柬之死於新州袁恕已死於竇州讀史至此未嘗不歔欷流涕也嗟乎五王奮大忠仗大節誅張昌宗等掃除内難肅清宫闈復子明辟中興國祚其忠節足以貫神明純誠足以貫日月謂其延福錫慶宜與唐齊其盛衰而纔享封爵已陷網羅豈所謂漁於深淵者得禍亦大乎葢當斷不斷反受其亂也夫以三思之智豈賢於五王哉葢果於先幾而發使五王卒為所圗故五王能用季昶之計而誅韋氏梟三思則豈有後患哉昔漢之竇武晉之張華皆遲疑不斷盡為小人之所圗若五王之非辜其亦武華之徒歟後世忠義之士欲立大功弭大難茍徘徊乎寸心猶豫乎末路不能屈伸在我而枉直隨形則五王之禍嘗倚人門户之間爾可不畏哉又舊史以季昶載於良吏傳亦非也況季昶本與五王同謀誅易之其後又同得罪死於嶺外附於五王傳可也何必載於良吏傳哉張柬之孫之翰論曰觀武后用張柬之見其任賢人之術也武后臨朝僭號踰二十年所用之人姦賢相半葢后狡智之性有過於人必謂不用姦人無以成已欲不用賢人無以庇已過然持大權者多賢才也如狄仁傑姚元崇相於内婁師徳郭元振將於外天下事何慮乎故雖兇殘不道不至禍敗者以此也當傑崇相國才謀之士不乏於時尚孜孜訪於二相求大才以備任用二相力薦柬之立命作相其推心不疑如此則向之任用之意可知矣豈非得任賢之術也一婦人僭天下大號恣行兇虐尚以大權付得其人久不禍敗為人君者能推誠任賢天下豈有憂患乎歴代名賢確論巻七十三
