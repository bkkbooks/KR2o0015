body:
  text: 歷代名賢確論卷十八桓公管仲不死東坡管仲相桓公潁濱東坡管仲不能尊周元結管仲對害霸李德裕管仲四維論栁州管仲治兵東坡潁濱管仲奪伯氏駢邑東坡管仲無後東坡管仲子路潁濱桓公用管仲易牙豎刁開方李翺東坡景公晏子潁濱齊司寇對程晏梁丘據栁州司馬穰苴東坡潁濱管仲不死東坡曰管仲為仁則召忽為不仁歟曰否量力而行度德而處之管之不死仁也召忽死之亦仁也伍尚歸死于其父孝也伍員逃之亦孝也時有小大耳管仲相桓公潁濱曰三代之得天下其所以異於後世惟不求而得之爾世之論伊尹太公多以隂謀竒計歸之其說乃與陳平賈詡無異夫陳平賈詡之事張子房荀文若之所不為也而謂伊尹太公為之乎太公蓋善用兵老而不衰與文王治岐而司馬兵法出焉要之皆仁人豈以詭詐為之或傾人以自立者哉管仲相桓公霸諸侯一匡天下使人免左衽之禍孔子以仁許之然死不旋踵嫡庶爭立桓公不得葬幸而不亡以管仲之智而不免于此蓋物有所蔽之歟古者將治天下必先治家以為其道當自是往管仲為齊大夫塞門反坫身備三歸而桓公內嬖如夫人者六人其行甚穢管仲以為不害霸不禁也夫古之聖人為君臣父子夫婦之禮皆有本末不徒設也故以舊坊為無用而毁之者必有水患以舊禮為無益而去之者必有亂患古之君子身修而家治安而行之不知其難而亂自去今管仲偷去一時之欲而欲僥于長久難哉桓公季年將立世子管仲知其有嫡庶之禍遂與桓公屬孝公於宋襄公夫使桓公妻妾嫡庶之分素明家事素定則太子一言立矣而他人何與哉管仲智有餘而德不足於是窮矣又曰先君嘗言管仲九合諸侯一匡天下以桓公霸孔子稱其仁而不能止五公子之亂使其君死不得葬曰管仲有以致此也哉管仲身有三歸桓公內嬖如夫人者六人而不以為非此固嫡庶爭奪之亂所從起也然桓公之老也管仲與桓公為身後之計知諸子之必爭乃屬世子於宋襄公夫父子之間至使他人與焉智者蓋至此乎於乎三歸六嬖之害溺於淫欲而不能自克無已則人乎詩曰無競維人四方其訓之四方且猶訓之而况家人乎傳曰管仲病且死桓公問誰可相者曰知臣莫若君公曰易牙何如對曰殺子以適君非人情不可公曰開方何如曰倍親以適君非人情難近公曰豎刁何如曰自宫以適君非人情難親管仲死桓公不用其言卒近三子二年而禍作夫世未嘗無小人也有君子以間之則小人不能奮其智語曰舜有天下選于衆舉臯陶不仁者逺矣湯有天下選于衆舉伊尹不仁者逺矣豈必人人而誅之管仲知小人之不可用而無以禦之何益于事內既不能治身外復不能用人舉易世之憂而屬之宋襄公使禍既已成而後宋人以干戈正之於乎殆哉昔先君之論云耳東坡曰宋君奪民時以為臺而民非之無忠臣以掩其過也子罕釋相而為司空民非子罕而善其君齊桓公宫中七市女閭七百國人非之管仲故為三歸之家以掩公此戰國䇿之言也蘇子曰管仲仁人也戰國策之言庶幾是乎然世未有以為然也雖然管仲之愛其君亦陋矣不諫其過而務分謗焉或曰管仲不可諫也蘇子曰用之則行舍之則藏諫而不聽不用而已矣故孔子曰管仲之器小哉管仲不能尊周元結曰自兵興以來今三十年論者多云得如管仲者一人以輔人主當見天下太平矣元子異之曰嗚呼何是言之誤耶彼管仲者人耳止可與議私家畜養之計止可以修鄉里畎澮之事如此仲可當焉至於相諸侯材量已似不足致齊及霸材量極矣使仲見帝王之道識與國之禮則天子之國不衰諸侯之國不盛如曰不然請有所說仲之相齊及齊强富則合請其君恢復王室節正諸侯君若惑之則引禍福以喻之如約諸侯之說君既聽矣然後約諸侯曰今王室將卑諸侯更强文王風化殘削向盡武王疆域割奪無幾禮樂不知其由征伐何因而出我是故謹疆域勉日夜望振兵威可臨列國得與諸侯㑹盟一旦能新復天子之正朔更定天子之封畿上奉天子復先王之風化下令諸侯復先公之制度以為何如若皆不從我則以兵先臨于魯魯不敢不從魯從則與魯西臨宋鄭宋鄭從則與三國北臨燕衛燕衛從則與諸國西臨秦晉秦晉從則與七國以尺牘約吳楚吳楚從則天下無不從之國然後定約若有果不從者則約從者曰吾屬以禮義尊天子以法度正諸侯使小國不至患弱大國不敢怙强此誠長世之策若天子國亡則諸侯交爭兵戈相臨誰為强者則安得世世禮讓相服宗廟血食我是故力勸諸侯尊天子今某國猶豫宜往問之若不從約則與諸侯率兵伐之分其疆土遷其子孫留百里之地奉其宗社下為諸侯廣子孫之業上為天子除不順之臣何如如此則諸侯誰敢不從然後定天子封畿諸侯疆域輿服器玩禮樂法度征伐貢輸自齊魯節正節正即定乃共盟曰有二約者當請命天子廢其驕凶以立恭順廢其荒惑以立明哲敢不聽者伐而分之如初約制定於是諸侯先各造邸於天子之都諸侯乃相率朝覲已而從天子齊戒拜宗廟禮畢天子誓曰於戲王室之卑久矣豫不敢望皇天后土之所覆載將旦暮皂𨽻於諸侯不可則願全肌骨下見先王今諸侯不忘先王之大德先公之忠烈共力正王室俾豫主先王宗祀豫若昏荒淫虐不納諫諍失先王法度上不能奉宗祀下不能安人民爾諸侯當整爾軍卒修爾矛㦸約爾列國罪豫凶惡嗣立明辟子若能日勉孱弱力遵先王法度上奉宗祀下安人民爾諸侯當保爾疆域安爾人民修爾貢賦共豫郊祀豫有此誓豈云及豫將及來世豫敢以此誓誓于宗廟豫敢以此誓誓於天地諸侯聞天子之誓相率盟曰天子有誓俾我諸侯世世得力扶王室使先王先公德業永長諸侯其各銘天子之誓傳之後嗣我諸侯重自約曰諸侯有昏當如前盟若天子昏惑不嗣虐亂天下諸侯當力共規諷諫諍如甚不可則我諸侯共率禮兵及王之畿復諫諍如初又甚不可則進禮兵及王之郊終不可則進禮兵及王之宫兵及宫矣當以宗廟之憂咨之當以人民之怨咨之當以天子昔誓咨之當以諸侯昔盟咨之以不敢欺先王先公告之以不敢欺皇天后土告之然後如天子昔誓如諸侯昔盟使管仲能如此則周之天子未為奴矣諸侯之國未即亡矣秦於天下未至是矣如曰仲才及也君不從也仲知及也時不可也則仲曾是謀也乎君不從也歟仲曾是為也乎時之不可也歟况今日之兵不可以禮義節制不可以盟誓禁止如仲之輩欲何為乎管仲對害霸李德裕曰昔管仲對桓公曰宫中之樂無所禁禦不害霸也舉賢而不能任此害霸也竊見敬仲此對是欲一齊國之政滿桓公所以能九合諸侯之志然則非專任亦不能致霸故一則仲父二則仲父桓公為五霸之首蜀主之任孔明苻堅之用景略雖關公不能移樊世不能惑蜀與秦皆君安國理非專任之效歟桓公得敬仲則興隆霸業漢元信石顯而大穢明德信任同而理亂異者何也所任用非其人也近世有以宫中之樂餌其君者而苞苴日行紀綱日壞朋黨益熾讒言益昌得非竊管仲之術違管仲之道莊周稱所謂至智者有不為大盜積者乎又曰跖不得聖人之道不行豈斯之謂也管仲四維論栁州曰管子以禮義亷恥為四維吾疑非管子之言也彼所謂亷者曰不蔽惡也世人之命亷者曰不茍得也彼所謂恥者曰不從枉也世人之命恥者曰善為非也然則是二者果義歟非歟吾見其有二維未見其所以為四也夫不蔽惡者豈不以蔽惡為不義而去之乎夫不茍得者豈不以茍得為不義而不為乎雖不從枉與羞為非皆然然則亷與恥義之小節也不得與義抗而為維聖人之所以立天下曰仁曰義仁主恩義主斷恩者親之斷者宜之而理道畢矣蹈之斯為道得之斯為德履之斯為禮誠之斯為信皆由其所之而異名今管氏所以為維者殆非聖人之所立乎又曰一維絶則傾二維絶則危三維絶則覆四維絶則滅若義之絶則亷且恥其果存乎亷與恥存則義果絶乎人既蔽惡矣茍得從枉矣為非而無羞矣則義果存乎使管子庸人則為此言管氏子而少知理道則四維者非管子之言也管仲治兵東坡曰嘗讀周官司馬法得軍旅什伍之數其後讀管夷吾書又得管子所以變周之制蓋王者之兵出於不得已而非以求勝敵也故其為法要以不可敗而已至于桓文非决勝無以定霸故其法在必勝繁而曲者所以為不可敗也簡而直者所以為必勝也周之制萬二千五百人而為軍萬之有二千二千之有五百其數竒而不齊唯其竒而不齊是以知其所以為繁且曲也今夫天度三百六十均之十二辰得三十者此其正也五日四分之一者此其竒也使天度而無竒則千載之日雖婦人孺子皆可以坐而計唯其竒而不齊是故巧厯有所不能盡也聖人知其然故為之章㑹統元以盡其數以極其變司馬法曰五人為伍五伍為隊萬二千五百人而為隊二百五十十取三焉而為竒其餘七以為正四竒四正而八陳生馬夫以萬二千五百人而均之八陳之中宜其有竒而不齊者是以多為之曲折以盡其數以極其變鈎聨蟠屈各有條理故三代之興治其兵農軍賦皆數十百年而後得志于天下自周之亡秦漢陳法不復三代其後諸葛孔明獨識其遺制以為可用以取天下然相持數歲魏人不敢决戰而孔明亦卒無尺寸之功豈八陳者先王所以為不可敗而非以逐利爭勝者耶若夫管仲之制其兵可謂截然而易曉矣三分其國以為三軍五人為軌軌有長十軌為里里有司四里為連連有長十連為鄉鄉有鄉長五鄉一帥萬人而為一軍公將其一髙子國子將其二三軍三萬人如貫繩如畫棊局疏暢洞達雖有智者無所施其巧故其法令簡一而民有餘力以致其死昔者嘗讀左氏春秋以為丘明最好兵法蓋三代之制至於列國猶有存者以區區之鄭而魚麗鵝鸛之陳見于其書及至管仲相桓公南伐楚北伐孤竹九合諸侯威震天下而其軍壘陳法不少概見者何哉蓋管仲欲以歲月服天下故變古司馬法而為是簡略速勝之兵是以莫得而見其法也其後吳晉爭長於黃池王孫雄教夫差以三萬人壓晉壘而陳百人為行百行為陳陳皆徹行無有隱蔽援桴而鼓之勇怯盡應三軍皆譁晉師大駭卒以得志由此觀之不簡而直不可以決勝深惟後世不達繁簡之宜以取敗北而三代什伍之數與管子所以治齊之兵者雖不可盡用而其近於繁而曲者以之固守近于簡而直者以之決戰則庶乎其不可敗而有所必勝矣潁濱曰管仲治齊始變周法使兵民異處制國為二十一鄉工商之鄉六而士鄉十五制鄙以為五屬立五大夫使各治一屬之政國中之士為兵鄙野之民為農農不知戰而士不知稼各治其事而食其力兵以衛農農以資兵發兵征行暴露戰鬭而農夫不知其勤深耕疾耨霑體塗足而士卒不知其勞當是之時桓公南征伐楚濟汝踰方城望汶山北伐山戎制零支斬孤竹西攘白狄逾太行渡辟耳之溪九合諸侯築夷儀城楚丘徜徉四方國無罷弊之民而天下諸侯往來應接之不暇及秦孝公欲並海內商君為之倡謀使秦人莫不執兵以事戰伐而不得反顧而為農隂誘六國之民使專力以耕關中之田而無戰攻守禦之役二者更相為用而天下卒以不抗何者我能纍纍出兵不息而彼不能應我能外戰而內不乏食而彼必不戰而後食可足此二者管仲商鞅之深謀也自管仲死其遺謀舊䇿後世無復能用而獨其分兵與民之法遂至于今不廢何者其事誠有以便天下也管仲奪伯氏駢邑東坡曰管仲勳烈之在人者多矣而獨言此者奪邑而人不怨德之至者也吾嘗以為北伐山戎南服强楚易而服伯氏之心難管仲之于伯氏諸葛孔明之於李平廖立蓋古今二人而已管仲無後東坡曰左氏云管仲之世祀也宜哉謂其有禮也而管仲之後不復見于齊者余讀其書大抵以魚鹽富齊爾余然後知管子所以無後于齊者孔子曰管仲相桓公霸諸侯一匡天下微管仲吾其被髮左衽矣又曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁夫以孔子稱其仁丘明稱其有禮然不救其無後利之不可與民爭也如此桑𢎞羊滅族韋堅王鉷楊慎矜王涯之徒皆不免于禍孔循誅死有以也夫管仲子路潁濱曰孔子稱管仲相桓公九合諸侯不以兵車民到于今受其賜以仁許之至于子路稱其果而已曰仁則吾不知也然孟子以為子路曾子之所畏而管仲曾西之所不為何哉夫管仲之所以為國者至矣然其所以不若三代者蓋求而後得之非有餘而自及之也孟子有言居下位不獲於上民不可得而治也獲于上有道不信於友弗獲於上矣信於友有道事親弗悅弗信於友矣悅親有道反身不誠弗悅於親矣故人必先自信自信之餘而後治民皆以其有餘及之未有不能誠身而能治民者也雖或能之民之報之也必粗矣夫子路自其誠身而為之矣而其政未足以及民管仲其政足以及民矣而其身未嘗自信也故三歸反玷子路之所不為而九合諸侯亦子路之所不能也由子路之道惟其不成成則堯舜是也由管仲之道止于是而已矣此孔子之所以取之而孟子之所以不豫也桓公用管仲易牙堅刁開方李翺曰齊桓公不疑於其臣管夷吾信而霸天下攘戎翟匡周室亡國存荆楚服諸侯莫不至焉豎刁易牙信而齊國亂身死不葬五公子爭立兄弟相反者數世桓公之信于其臣一道也所信者賢則格于天地功及後世不得其人則不得其死其知人不易也豈惟霸者為然雖聖人亦不能免焉帝堯之時賢不肖人皆立于朝堯能知舜於是乎歡兜放共工流殛鯀竄三苗舉禹稷臯陶二十有二人加諸上位故堯崩三載四海遏密八音後世之人皆謂之帝堯焉向使堯不能知舜而遂尊歡兜共工之黨于朝禹稷臯陶之下二十有二人不能用則堯將不得為齊桓公爾豈復得曰大哉堯之為君乎唯天為大惟堯則之蕩蕩乎民無能名焉哉春秋曰夏滅之蓋齊滅之曷不言齊滅之為桓諱也春秋為賢者諱此滅人之國何賢爾君子之惡惡也嫉始善善也樂終桓公嘗有繼絶存亡賢者之事也管夷吾用所以能繼絶世存亡國焉耳豎刁易牙用則不能也向使桓公始不用管夷吾未有豎刁易牙爭權不葬而亂齊國則幽厲之諸侯也始用賢而終身諱其惡君子樂用賢也如此始不用賢以及其終而幸後世之掩其過也則微矣然則居上位流德澤于百姓者何所勞乎勞于擇賢得其人加諸上使天下皆化之焉而已矣東坡曰書曰朕聖讒說殄行傳曰君子之所為為可傳為可繼也凡行之不可傳繼者皆殄行也堯舜之所聖也世衰道喪士貴茍難而賤中庸故邪慝者進焉齊桓公欲用豎刁易牙開方三子管仲曰三子者自刑以近君去親殺子以求合皆非人情難近桓公不聽卒以亂齊齊桓賢主也管仲信臣也夫以賢主而不用信臣之言豈非三子者似忠而難知也歟甚矣似之亂真也故曰惡紫謂其奪朱也惡莠謂其亂苗也惡鄉原謂其亂德也孟子憂之故曰君子反經而已矣君子之所貴必其可傳可繼者也是以謂之經經者常也君子茍常而為貴則彼茍難殄行無為為之矣茍難者無所獲殄行者無所利則庶民並興巧者不能獨進拙者不可自效吾虛心而察之賢者可事能者可使而天下治矣晏子潁濱曰管仲以桓公霸然其身淫侈不能身蹈禮義晏子之為人勇于義篤于禮管仲蓋有愧焉然晏子事靈景莊公皆庸君功業不足道使晏子而得君如管仲之于桓公其所成就當與鄭子産等耳至于糾合諸侯攘郤戎狄未必能若管子也唐姚崇宋璟皆中興賢相然崇好權利事武后立于羣枉之中未嘗有一言犯之及事明皇帝亦有所縱弛太廟棟毁巡遊東都以為無害至于宋璟介潔特立於武后世排斥權幸身危者數矣其于明皇帝未嘗有取容之言故世嘗以崇比管仲璟比晏子或庶幾焉齊司寇對程晏曰齊境多寇司寇不理景公召司寇讓之反諍公曰請理君朝廷之寇也公曰君廢其職反責我欲亂其責也曰不然君不聞鼷鼠之牙乎食人與百類雖齧盡而不痛俗謂之甘口鼠也魯國之牛聞食其角矣請以是諷焉牛之寢齕有蚊蚋撓其膚毛必知鼓耳搖尾以揮之及鼷鼠食之即不知痛也鼠之一牙豈不甚於蚊蚋千噆乎以其口甘雖貫心徹骨而不知也况其角乎公誠職臣以司寇請司朝廷之寇然後司封疆之寇也朝廷之寇其鼷鼠乎食君之角矣又將貫骨與心也是患大而君不知也封疆之寇蚊蚋乎但撓君之膚毛耳君將鼓耳搖尾以揮之是患小而不知大也臣所以急其大而不知慢其小而得知也景公不喻竟坐司寇以不事晏子曰司寇死田氏為鼷鼠於齊矣梁邱據栁州贊曰齊景有嬖曰梁邱子同君不爭古號媚上君悲亦悲君喜亦喜曷賢不贊卒贊于此媚余所仇激贊有以梁邱之媚順心狎耳終不撓厥政不嫉反已晏子躬相梁丘不毁恣其為政政實允理時睹晏子食寡肉缺味愛其不飽告君使賜中心樂焉國用不墜後之嬖君罕或師是導君以諛聞正則忌讒賢協惡民蠧國圯嗚呼豈唯賢不逮古嬖亦莫類梁邱可思又况晏氏激贊梁邱心焉孔瘁司馬穰苴東坡曰史記司馬穰苴齊景公時人也其事至偉而左氏不載余嘗疑之戰國䇿云司馬穰苴為政者也閔王殺之大臣不親則其去景公也逺矣太史公取戰國䇿而作史記當以戰國䇿為信凡史記所言大事而左氏無有者皆可疑如程嬰公孫杵臼之類是也穰苴之事不可誣抑不在春秋之世矣當更徐考之潁濱曰太史公為司馬穰苴傳言齊景公時晉伐阿鄄燕侵河上齊師敗績晏子薦穰苴景公拔以為將使寵臣莊賈監軍穰因其後期戮之三軍畏之為之用命遂以成功為大司馬大夫髙國害之譖而殺之其言甚美世皆信之豫以春秋左氏考之景公七年北燕伯欵奔齊十二年公朝于晉請伐燕而納欵十三年伐燕取賂而還十八年使髙偃以兵納欵于陽是歲公二于晉投壺有言明年晉侯㑹諸侯于平丘齊不欲盟晉人怒自是始二于晉而未絶也四十五年公盟鄭伯于醎盟衛侯于沙始叛晉自是凡四伐晉蓋未有燕晉伐齊者也而戰國策稱司馬穰苴執政者湣王殺之故大臣不附意者穰苴湣王之臣嘗為湣王卻燕晉而戰國雜說妄以為景公時耶事既不信故刪去穰苴而獨為孫武吳起立傳戰國雜說其妄者非一今皆正之矣然曹沫之劫齊威穰苴之卻燕晉游談著書者時以藉口史記李克稱吳起穰苴且不能過魯仲連談燕將稱曹沫之盟其襲謬妄久矣故特見于篇今亦不能盡正也歷代名賢確論卷十八
