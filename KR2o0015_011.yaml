body:
  text: 歷代名賢確論卷十一二帝三代通論上帝王世次年紀六一舜禹受禪潁濱帝王所尚李翺李華潁濱劉敞帝王世次年紀六一曰堯舜禹湯文武此六君子者可謂顯人矣而後世猶失其傳者豈非以其逺也哉是故君子之學不窮逺以為能而闕其不知慎所傳以惑世也方孔子時周衰學廢先王之道不明而異端之說並起孔子患之乃修正詩書史記以止紛亂之說而欲其傳之信也故略其逺而詳其近於書斷自唐虞以來著其大事可以為世法者而已至於三皇五帝君臣世次皆未嘗道者以其世逺而慎所不知也孔子既沒異端之說復興周室亦益衰亂接乎戰國秦遂焚書先王之道中絶漢興久之詩書稍出而不完當王道中絶之際竒書異說方充斥而盛行其言往往反自託於孔子之徒以取信於時學者既不備見詩書之詳而習傳盛行之異說世無聖人以為質而不自知其取捨真僞至有博學好竒之士務多聞以為勝者於是盡集諸說而論次初無所擇而惟恐遺之也如司馬遷之史記是矣以孔子之學上述前世止於堯舜著其大略而不道其前遷逺出孔子之後而乃上述黃帝以來又詳悉其世次其不量力而務勝宜其失之多也遷所作本紀出于大戴禮世本諸書今依其說圖而考之堯舜夏商周皆同出于黃帝堯之崩也下傳其四世孫舜舜之崩也復上傳其四世祖禹而舜禹皆夀百歲稷契于髙辛為子乃同父異母之兄弟而以其世次而下之湯與王季同世湯下傳十六世而為紂王季下傳一世而為文王二世而為武王是文王以十五世祖臣事十五世孫紂而武王以十四世祖伐十四世孫而代之王何其謬哉嗚呼堯舜禹湯文武之道百王之取法也其盛德大業見於行事而後世所欲知者孔子皆已論著之矣其久遠難明之事後世不必知不知不害為君子者孔子皆不道也夫孔子所以為聖人者其智知所取捨皆如此又曰今既略論帝王世次而見本紀之失猶謂文武與紂相去十五六世其謬較然不疑而堯舜禹之世相去不逺尚冀其理有可通乃復以尚書孟子孔安國皇甫謐諸書參考其夀數長短而尤乖戾不能合也據書及諸說云堯夀一百一十六歲舜夀一百一十二歲禹夀百歲堯年十六即位在位七十年年八十六始得舜而試之二年乃使攝政時舜年三十居試攝通三十年而堯崩舜服堯喪三年畢乃即位在位五十年而崩方舜在位三十三年命禹攝政凡十七年而舜崩禹服舜喪三年畢乃即位在位十年而崩由是言之當堯得舜之時堯年八十六舜年三十以此推而上之是堯年五十七已見四世之𤣥孫生一歲矣舜居試攝及在位通八十二年而禹夀百歲以禹百年之間推而上之禹即位及居舜喪通十三年又在舜朝八十二年通九十五年則當舜攝試之初年禹才七歲是舜為𤣥孫年五十時見四世之髙祖方生六歲矣至于舜娶堯二女據圖為曾祖姑雖古逺世異與今略有不同然人倫之理乃萬世之常道必不錯亂顛倒之如此然則諸家世次夀數長短之說聖經之所不著者皆不足信也决矣舜禹受禪潁濱曰學者言堯舜之事有三妄焉太史公得其一不得其二莊子稱堯以天下讓許由許由不受恥之逃隱莊子蓋寓言焉而後世信之太史公曰舜禹之間嶽牧咸薦試之於位典職數十年功用既興然後授政示天下重器王者大統傳天下若斯之難而許由何以稱焉孟子曰堯將舉舜妻以二女瞽瞍不順不告而娶既而猶欲殺舜而分其室然舜終不以為怨余考之于書孟子蓋失之矣世豈有不能順其父母而能治天下者哉四嶽之薦舜曰蒸蒸乂不格姦益之稱舜曰夔夔齊栗瞽亦允若則舜之為庶人既以能順其親使不至于奸矣父母兄弟之際智力之所不施也有頑父嚚母傲弟而能和之以不失其親唯至仁能之此堯所以用舜而不疑也父子相賊奸之大也豈其既已用之而猶欲殺之哉孟子又言堯舜禹之終皆薦人于天堯崩舜避堯之子於南河之南舜崩禹避舜之子於陽城天下皆往歸之然後之中國踐天子位禹崩益避禹之子於箕山之隂朝覲訟獄者皆不之益而之啓故益不得為天子以書觀之此亦非君子之言也舜禹之攝格于祖考郊祀天地朝見諸侯巡狩方嶽行天子之事矣及其終而又避之何哉使舜禹避之天下歸之而其子不順將從天下而廢其子歟將奉其子而違天下歟此事之至逆由避致之也至益不度天命而受位于禹避之而天下不從然後不敢為匹夫猶且恥之而謂益為之哉帝王所尚李翺曰夏尚忠殷尚敬周尚文何也帝王之道非尚忠也非尚敬與文也因時之變以承其弊而已矣救野莫如敬救鬼莫如文救僿莫如忠循環終始迭相為救如火蔓而燒也人知其勝之于水也勝于水者土也水之潰過其流者則必大為之防矣故夏之政尚忠湯之政尚敬武王之政尚文各適其宜也如武王居禹時則尚忠矣湯居武王之時則尚文矣禹與湯交地而居則夏尚敬而殷尚乎忠矣故適時之宜而補其不得者三王也使黃帝堯舜居三王之天下則亦必為禹湯武王之所為矣繇是觀之五帝之與夏商周一道也若救殷之鬼不以文而曰我必以夏之忠而化之是猶適于南而北轅其到也無日矣孔子聖人之大者也若孔子王天下而傳周其救文之弊也亦必尚乎夏道矣是文與忠敬皆非帝王之所尚也乃帝王之所以合變而行權者也因時之變以承其弊者也不可體而作為之者也李華曰天地之道易簡易則易知簡則易從先王質文相變以濟天下易知易從莫尚乎質質弊則佐之以文文弊則復之以質不待其極而變之故上無從亂記曰國奢則示之以儉國儉則示之以禮禮謂易知易從之禮非酬酢裼襲之煩也儉謂易知易從之儉非茅茨土簋之陋也蓋逹其誠信安其君親而已質則儉儉則固固則愚其行也豐肥天下愚極則無恩文則奢奢則不遜不遜則詐其行也痼瘠天下詐極則賊亂故曰不待其極而變之因而文之無害于訓又不遜而質之艱難於成俗苦不化而過則愚之病淺於詐之病也無恩之病緩於賊亂之極也故曰莫尚乎奢也奢而後化之求固而不獲也利害遲速不其昭昭歟前王之禮世滋百家之言世益欲人化而不為誠難乎哉吉凶之儀刑賞之級繁矣使生民無適從巧者弄而飾之拙者眩而失守誠僞無由明天下浸為陂池蕩為洪流雖神禹復生誰能救之夫君人者修德以治天下不在智不在功必也質而有制制而不煩而已太康啓子禹孫當斯時有堯舜遺人親受禹之賜國為羿奪內則夏之六卿外則夏之四嶽而羿浞愚弄鬭爭內外默然一以聽命至少康艱難而後復原是觀之則聖有謨訓何補哉漢髙除秦項煩苛至孝文𤣥默仁儉斷獄幾措及武帝修三代之法而天下荒耗則文不如質明矣漢氏雖歷産祿吳楚之亂而宗室異姓同力合心一舉而安其漢德結於人心不如夏家諸吕吳楚之强倍於羿浞安漢至易而復夏至難何也商德最深周公大聖親則管蔡為亂逺則徐奄並興夷多難復明辟兼虞夏商之典禮後王之法備矣太平之階厚矣至成王季年而後理唯康王垂拱囹圄虛空逮昭王南征不返因是陵夷則郁郁之盛何為哉周法文官備數四時盛祭車服盛飾至於下國方五十里卿大夫士之多軍師之衆大聘小聘朝覲㑹同地狹人寡不堪覲謁大何得不亂小何得不亡記云周之人强仁窮賞罰故曰殷周之道不勝其弊考前後而論之夏衰失於質而無制周弱失於制而過煩故也愚以為將求致理始於學習經史左氏國語爾雅荀孟等家輔佐五經者也及藥石之方行于天下考試仕進者宜用之其餘百家說䜟緯之書存而不用至于喪制之縟祭禮之繁不可備舉者以省之考求簡易中于人心者以行之是可以淳風俗而不泛於坦明之路矣學者局於恆教因循而不敢失於毫釐古人之說豈或盡善數骨肉之罪而褒叔向不忍聞之言而書昭伯敬龜策之信而陳僂句使不仁之人萌芽賊心而仁義之士閉目掩卷何如哉其或曲書常言無補世教不習可也則煩瀆日亡而易簡日用矣海內之廣億兆之多無聊於煩彌世曠久今以簡質易煩文而使之則晨命而夕周踰年而化成蹈五常享五福理必然也子言以約失之者鮮矣與其不遜也寧固傳曰以欲從人則可記曰大樂必易大禮必簡顔子曰無施勞經義可據也如是為政者得無以為惑乎潁濱曰傳曰夏之政尚忠商之政尚質周之政尚文而仲尼亦云周監於二代郁郁乎文哉吾從周余讀詩書歷觀唐虞至於夏商以為有生民以來未嘗一日而不趨於文也文之為言猶曰萬物各得其理云爾父子君臣之間兄弟夫婦之際此文之所由起也昔者生民之初父子無義君臣無禮兄弟不相愛夫婦不相保紛然而淆亂忿鬭而相苦文理不著而人倫不明生不相養而死不相葬天下之人舉皆戚然不寧於中然後反而求其所安屬其父子而列其君臣聨其兄弟而正其夫婦至于虞夏之世乃益去其鄙野之制然猶以天子之尊飯土塯啜土鉶土階三尺茅茨不翦至于周而後大備其粗始于父子之際其精布于萬物其用甚廣而無窮蓋其當時莫不自謂文于前世而後世之人乃更以為質也是故祭祀之禮陳其籩豆列其鼎爼備其醪醴伏俯以薦思其飲食醉􅋳之樂而不可見也於是灌用鬱鬯藉用白茅既沃而莫之見以為神之縮之也體魄降于地魂氣升于天恍惚誕謾而不知其所由處聲音氣臭之類恐不能得當也於是終祭于屋漏繹祭于祊以為人子之心無所不至也薦之以滋味重之以膾炙恐鬼神之不屑也薦之以血毛重之以體薦恐父祖之不吾饗也於是先黍稷而飯稻粱先大羮而飽庶羞以為不敢忘禮亦不敢忘愛也丁寧反覆以為可以盡人子之心而人子之心亦可以少安矣故世之所謂文者皆所以安其人之所不安而人之所安者事之所當然也仲尼區區於衰周之末收先王之遺文而與曾子推論禮之所難處至於毫釐纎悉蓋以為王道之盛其文理當極於此焉耳及周之亡天下大壞强凌弱衆㬥寡而後世乃以為用文之弊夫自唐虞以至於商漸而入於文至周而文極於天下當唐虞夏商之世蓋將求周之文而其勢有所未至非有所謂質與忠也自周而下天下習于文非文則無以安天下之所不足此其勢然也今夫冠昏喪祭而不為之禮墓祭而不廟室祭而無所仁人君子有所不安於其中而曰不文以從唐虞夏商之質夫唐虞夏商之質蓋將求周之文而未至非所以為法也劉敞曰古者有言夏后氏尚忠忠之敝小人以野救野莫如恭商人尚恭恭之敝小人以鬼救鬼莫如文周人尚文文之敝小人以僿救僿莫如忠三王之道若循環此非君子之言好事者飾之也聖人之道同而王者之政一也同故能同不同一故能一不一同者道也不同者物也一者德也不一者俗也故自伏羲氏神農氏黃帝氏少昊氏顓頊氏髙辛氏陶唐氏有虞氏天下之生久矣一盛一衰一治一亂然而所以盛者常同所以治者常一何以言之耶凡聖王之後而至于衰者非其道衰也物使之衰也其至于亂者非其德亂也俗使之亂也繼而起者明道以待物則衰逺矣正德以訓俗則亂逺矣故可以革物者道也而道未嘗變可以革俗者德也而德未嘗變夏后氏有天下四百餘歲桀為無道顛覆禹之典刑夏人不忍成湯伐而攻之四海之內歸之如一非畔夏也以成湯為能復禹之績也故仲虺稱之曰天錫王勇智纘禹舊服此之謂也商有天下六百餘歲紂為無道顛覆湯之典刑商人不忍武王伐而殺之四海之內歸之如一非畔商也以武王為能反湯之政也故武成曰乃反商政政由舊此之謂也故湯復禹之績則得禹之天下武王反商之政則得湯之天下當是時也禹沒而復起湯滅而復見同焉而已矣一焉而已矣安得忠恭文之三而異之且夫忠也恭也文也是三者之於道本末也表裏也相待而成相須而行者也不可一日離而以謂千歲而代興故曰非君子之言好事者飾之也奚以論之凡父子之道君臣之義夫婦之親賓友之好長幼之序此謂人之大端也人道之大端不同則不足以相讓故先王之為禮必本于忠忠也者禮之本也然而不恭則忠不見故先王表之以恭恭也者禮之體也然而不文則恭不昭故先王著之以文文也者禮之成也是先王非尚此三道也其變節次序不相緣則禮不立然而相緣之甚密喘而言蠕而動一皆雜于是有隆有殺有左有右而已矣是以凡正於內者則隆於忠接于外者則隆於恭旁暢曲折極意之變則隆于文唯君子能體之能體之則能言之能言之則能述之未有文而不原於恭者也未有恭而不因于忠者也未有忠而不恭不文能成其忠者也故曰三者之於道本末也表裏也相待而成相須而行者也不可一日離然而以謂千歲而代興故曰非君子之言好事者飾之也又曰古者有言有虞氏貴德而尚齒夏后氏貴爵而尚齒商人貴富而尚齒周人貴親而尚齒此非君子之言好事者飾之也夫聖賢之治國家天下所以率民而教之也有達貴者有公貴者有私貴者有無貴者德者其達貴也爵者其公貴也親者其私貴也至於富則無貴也所以謂德達貴者德之于天下無所不貴也在朝廷則貴于朝廷在鄉黨則貴于鄉黨在市井則貴于市井在夷狄則貴于夷狄是百王之所同也故謂之達貴所以謂爵公貴者爵之貴在朝廷則重在宗族則屈是又百王之所同也故謂之公貴所以謂親私貴者親之貴在宗族則伸之在朝廷則屈之是百王之所同也故謂之私貴此數者人情之紀王事之本聖人所不能奪是以推而任之故以德王天下以爵尊朝廷以親定宗族以德王天下故天下不可不貴德以爵尊朝廷故朝廷不可不貴爵以親定宗族故宗族不可不貴親三者不失其所則王道成三者失其所則王道不成是以有九德者治天下有六德者治一國有三德者治一邑有一德者治一職此所以見德之貴也治天下者爵天子臣兆民治一國者爵諸侯臣萬民治一邑者爵大夫臣陪𨽻治一職者爵為士臣輿皂此所以見爵之貴也雖為天子必有父雖為諸侯必有兄故三年之喪達乎天子期之喪達乎諸侯大功之喪達乎大夫在宗廟則皆以齒所以見親之貴也其義並隆而不相害並行而不相悖錯之而安施之而通王者之盛也未有能尚其一而遺其二者也故曰非君子之言好事者飾之也所謂富無貴者彼富非德之修也非爵之隆也非親之懿也以世祿多財長人而已矣則為義者必恥之為吏者必疾之是又百王之所同也故謂之無貴然而曰商人貴富則是又以商之為商者殆乎秦之為秦乎者也昔者秦之有天下右貨而尊利以倣於滅吾未始知秦之所以滅非蔽于商人貴富之為禍也昔者魏有天下棄親而倣於滅吾未始知魏之所以滅者非蔽于夏后貴爵為之禍也昔者晉有天下侈親而滅制以倣于亡吾未始知晉之所以亡非蔽於周人貴親為之禍也故聖王不然以德王天下以爵尊朝廷以親定宗族三者並隆而不相害並行而不相悖有偏而不起則亂豈及于虞夏商周異世而貴之哉故曰非君子之言好事者飾之也又曰古者有言夏道尊命商人尊神周人尊禮此非君子之言好事者飾之也彼謂命者四時教令以教民勤事云爾是非夏道也夏后氏以建寅為正其數得天于以示教令宜此有由然者也非固以是為道而尊之也彼謂神者四時祭祀所以訓民事君云爾是非商之道夏之末山川鬼神莫不億寧而葛伯不祀成湯誅而放桀正天地之祭定社稷之祀修山川之典此亦有由然者也非固以是為道而尊之也彼謂禮者君臣相㑹與國相交接相施豫云爾是非周之道也武王伐紂天下之諸侯㑹于孟津者八百餘國既入定商駿奔走執豆籩受命于周廟武王於是班宗彛分玉寶竒物以懷諸侯諸侯端冕乎太學養老乎東序耕乎籍田此亦有由然者也非固以是為道而尊之也若聖人之治王者之法宰制萬物兼覆天下則此三者無不修也無不慎也不能一廢矣故當其尊命則雖周復夏當其尊神則雖夏由商當其尊禮則雖商由周何以言之耶民事則尊命鬼事則尊神王事則尊禮同時可也同日可也同月可也當其義則今所用者先不當其義則向所用者後後者復先先者復後一物不應而亂起矣豈及於夏商周異代而尊之哉故曰非君子之言好事者飾之也夫好事者知三王之異物而不知其道之同也知三王之異俗而不知其德之一也道者所以格物而非格于物也德者所以變俗而非變于俗也故三王之所改者正朔緣于厯而改律吕緣于聲而改都邑緣于地而改徽號緣于色而改樂舞緣于功而改官職緣于事而改及夫以性為內以情為外以名為制以禮為體此所謂道德之本也不可改也茍不可改則忠也恭也文也三代同尚矣德也爵也齒也三代同貴矣命也神也禮也三代同尊矣奚獨三代哉吾以此推之昔者伏羲氏神農氏黃帝氏少昊氏顓頊氏髙辛氏陶唐氏有虞氏封于泰山禪于梁甫者七十有一君其實一也歷代名賢確論卷十一
