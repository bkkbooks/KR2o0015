body:
  text: 歷代名賢確論卷八十二代宗大厯中秋霖損稼渭南令劉澡阿附度支韓滉稱縣境苖獨不損范祖禹顔真卿降峽州别駕孫之翰藩鎮僕固懷恩附范祖禹孫之翰宦官石守道楊綰范祖禹元載范祖禹孫之翰石守道李光弼張唐英常衮溫公總論代宗之政子由大厯中秋霖損稼渭南令劉澡阿附度支韓滉稱縣境苖獨不損范祖禹曰代宗責縣令職在字人無恤隱之心而阿黨權勢黜之當矣韓滉掌邦計之臣敢為靣欺乃置而不問是刑罰止行於卑賤而不行於貴近也蔣鎮以諌官受委覆實而共為姦罔人主卒受其欺廷臣亦無敢言此二臣者豈非以其君雖欲恤民而卒歸於好利受佞可以蒙蔽故敢行詐而無所忌憚也是以雖有仁心而民不被其澤天下愈受其弊由賞罰不平聽任不明故也且在縣令與御史則始疑而察之在户部與諌官則始疑而終信之其為欺一也明於疏逺而眩於貴近是朝廷無公道也書曰無偏無黨王道蕩蕩若代宗者其何責焉顔真卿降峽州别駕孫之翰曰君之逐臣也或自見其過或為人所言自見其過必無忌心可矣為人所言尤在觀其狀察其情也顔真卿之立朝論議風節時無倫比元載作相方引用私黨惡人之言遂請百官言事必先咨宰相而後上聞真卿極論其事以為蔽塞言路過於林甫國忠時中外傳布稱真卿言為當故載深銜之因真卿攝祭太廟以祭器不修言於朝誣以誹謗而逐之且祭器不修衆所共見况繫有司之事言之豈為誹謗也代宗雖非英睿之君亦非昏主真卿之賢非不知也載怨真卿之情非不察也何不能辨其事而逐真卿豈非以載方擅權不能違其意爾代宗行事素尚寬厚且容宰相擅權而逐賢臣則尚寬之為害也如此夫君之為國也必有駕馭大臣之術有主張賢人之力然後大臣不敢擅權賢人得以立事矣代宗不通是道故元載積惡真卿不容於朝大厯之政法度弛廢由此類也藩鎮范祖禹論僕固懷恩恐史朝義平寵衰奏以降將薛嵩田承嗣等分帥河北曰僕固懷恩既平河北而除惡不絶其本復留賊黨以邀後功亦由任蕃人為制將故也唐失河北實由此始使郭李為將其肯遺國患乎孫之翰懷恩留賊將分帥河北論曰懷恩留賊將之降者分帥河北以為已援此固不忠之罪然觀其情有所憚而為之也肅宗寵信內臣為將帥之患郭子儀討平大亂收復二京元勳厚德天下瞻望不與魚朝恩相叶為其讒間遂罷兵權李光弼戰賊盡力動有竒功材謀忠勇冠於諸將亦為朝恩所撓致有敗衄懷恩前從子儀知其事後事光弼憚其嚴不附遂與朝恩叶議以敗其功又施其計矣以郭李之功不能固其權任況他帥乎又觀代宗即位之始程元振輩用事於內甚於朝恩來瑱居將相之任一不從元振請託無罪被殺此懷恩所以不肯盡忠也若以懷恩止慮賊平寵衰他無所憚則其父子力戰不踰年平定劇賊一門之內死王事者四十餘人此豈欲養賊乎何其已平大盜而存其餘孽是有所憚而然也人君任用將帥使之盡忠有常道矣駕馭之術賞罰之典固不可失其機會能不容權幸之人間其恩沮其謀使內無所憚外無所撓天下有事則當大任而無他憂天下無事則荷寵數而不覺衰能盡是道則盡忠者衆矣肅宗代宗寵內臣過厚待將帥不至致懷恩懷二自為身謀狡計一生河北非天子所有范祖禹論懷恩叛上自愧信不及人致功臣顛越厚遇懷恩母并恐李光弼成嫌隙亦加厚遇曰傳曰禹湯罪已其興也勃焉代宗之責已也厚其待人也恕而誠不能感物何哉賞罰無章而善惡不明上下之情不通讒巧得行於其間故也是以有功者不自保無罪者恐見誅以恩加人而人不親以信示人而人益疑紀綱壞亂恩威不立為唐世姑息之主由不得其道也又論以公主妻田承嗣子承嗣益驕曰齊景公涕出而女於吳以為既不能令又不受命是絶物也齊與吳皆列國也後世且猶羞之代宗德不足以柔服刑不足以御姦以天子之尊而以女許嫁叛臣之子茍欲姑息而又以納侮君道卑替亦已甚矣此公卿大臣之恥也孫之翰李寶臣為馬承倩所辱復叛論曰天子遣使方鎮所以禮將帥恩軍民察事機也非謹厚有識之人惡可充其任况方鎮承朝廷姑息養成跋扈之勢久矣一日有奉詔立功者遣使撫勞尤在擇人天子但信任內臣不擇而使之可乎河北自天寶末為賊所據至寶應年始平之尋為懷恩留賊將之降者李寶臣田承嗣輩分帥諸鎮逺擁強兵署將吏擅其土地不貢不覲交相親結勢不可破凡十餘年間朝廷止以目前未叛為安固不能制馭也大厯十年田承嗣叛會李寶臣與之有隙表請討之代宗遂命出師寶臣果能與李正已破承嗣之衆擒其將歸之京師是讎怨已深功效已著此天賜之機便將使唐統制河北也於是時朝廷當選賢明公勤之臣使勞其師恩其軍以厚禮安之以正言論之則前日桀黠之心必盡變今日已有成效必盡力使乘勝破滅承嗣魏博自歸朝廷命賢帥守之寶臣正已自以有功於國各荷恩奬欲不效順不可得茍復跋扈必有一先動者别帥討之尤易為力焉豈非天使唐統制河北之機便也何乃使中官劉清潭勞賜將士所至高會不時進發故恩賞失時已沮三軍之氣矣又遣中官馬承倩宣勞寶臣尤是貪愚之人不知亷恥不識事宜寶臣遺之百縑承倩詬詈擲於道中寶臣慙怒復與承嗣相結正已窺之亦不盡力於是玩養承嗣朝廷終不能制數年河北叛亂遂成橫流之勢是由不選中使所致也則天子任使內臣非材效已著行實已彰為中外所信者惡可用哉范祖禹曰齊寺人貂漏師於多魚夙沙衛殺馬以塞道而殖綽郭最見獲皆以宦寺敗國喪師承倩一怒寶臣而諸鎮解體巨猾逋誅終唐之世不能取魏其為害也過於寺人貂夙沙衛逺矣宦官石守道論曰明皇以寵任髙力士遂啓祿山之亂天寶之禍肅宗﨑嶇危難親被矢石賴元臣勳將克復兩京而國祚復興大寶不去故乃推功於李輔國使此閹腐之餘輒弄權柄朝綱隳壞忠賢道梗代宗即位為人主而敢凌蔑其怙權恃勢驕恣如此代宗豈無英武能忍受侮辱者蓋權在於彼而不在於已也噫人君所以南靣而治天下不下堂而朝諸侯御六服偶合之衆持兆人生死之柄者以其權在手也今權在輔國雖代宗英武其能制之乎故但忍之而已猶賴代宗淵深有謀始外示優容而內思有以去其權乃虛加尚父以尊寵之而漸罷之兵柄既失盜入其室而首臂俱去無權胡能為也是知人君所重者權也固不可以假於人則萬乘之尊匹夫爾戒哉又曰代宗為李輔國凌蔑幾至不臣蓋以其方握兵柄權在其手不能制也幸而奪其權輔國不敢驕悖乃復以兵柄授於元振則宜乎致吐蕃之犯闕乘輿之奔竄也且自安祿山反後藩臣稍稍不順非以長䇿逺馭信賞明罰則無以賔服之矣而來瑱當時賢帥有功國家裴冕本朝元臣立績無毫髮之罪纎介之過元振誣捃其獄皆使誅竄夫賞有功旌有德懼人不知勸今賢臣勳帥無罪而被誅天下不得不離心諸侯不得不解體吐蕃犯闕諸道之師不至誰之過與由元振一怒也吁元振一怒致萬乘倉皇京師陷覆可嗟矣夫可為深戒楊綰范祖禹論綰上疏官進士明經之弊請舉孝亷曰自三代以後取士之法不本於鄉里學校至唐而其弊極矣惟楊綰貢舉之議最為近古可行而卒為庸人沮止况先王所以致治之具欲舉而措之天下不亦難乎又論綰為相郭子儀減樂黎幹省騶從崔寬徹第舍曰上之化下如風靡草也楊綰以清名儉德為相而天下從之如此况人君能正己以先海內其有不率者乎是以先王必正其心修其身而天下自治孟子曰君仁莫不仁君義莫不義君正莫不正一正君而國定矣此之謂也元載范祖禹論載忌李泌帝匿於江西曰代宗以萬乘之主不能庇一臣而匿之於逺藩既相元載知其不可則退之而已矣乃欲稔其惡而誅之且載方見任而與泌密約除載然則人臣誰敢自保皆非人君之道此天下所以多亂也孫之翰論上厭元載以李栖筠為御史大夫曰天子擇宰相患不能知其人故所用或不賢賢者或不用代宗於元載知其不賢也於李栖筠知其賢也知不賢而久用之知賢而不大用何哉大厯六年代宗察載姦貪故任栖筠為御史大夫使制之自是數年栖筠雖盡公忠之節而載姦貪日甚卒不能制蓋宰相任天下事大夫主風憲權固不侔况載內結幸臣外樹姦黨使栖筠二相守道寡援尚慮未勝一風憲職誠難制之也代宗既知賢與不賢胡不罷載而相栖筠何至使憂憤而終也必以載有內外之助未易可罷則內外之黨知能惑人主始為之助代宗知載姦貪既已不惑其黨安能為助設不能助夫何憚而不罷之也至十二年發載罪誅之既誅之欲加其黨者誅又何難哉豈非稔載之惡俟其極而去之也殊不思稔其惡數年間亂國事害生民多矣蓋代宗優柔之主雖能察載為惡之迹而斷之不早遂使姦臣大害於國賢者憂憤而終惜哉范祖禹曰代宗知元載之惡欲罷其相位一言而已可也誰敢不從且載所以方命專政者挾君以為重也君去之則失其所恃何惡之能為乃立黨自助以便其相視之如敵國主勢不已卑乎石守道論曰宰相之任上則調和隂陽下則撫安黎庶內以平章百姓外以鎮撫四夷國家之爵賞刑罰所由關也天下之政教化令所由出也軒階之下論道德而佐一人朝廷之上執陶鈞而宰萬物其任豈輕哉國家之治亂天下之安危常必由之固不可易其人也唐虞之臯夔稷契湯之伊尹伊陟高宗之傅説周之太顚閎夭周召太公漢之蕭張平勃唐太宗之房杜明皇之姚宋憲宗之裴度皆任得其人故至於今法唐虞之隆推湯周之治稱漢唐之盛也茍捨是而任之必致傾危故後世宰相非人而覆亡接踵噫任宰相之事必有宰相之才不求其人但以年高久次或柔弱易制或佞邪諂進或結託外戚或附麗中人便使居具瞻之地處論道之職姦邪者則樹權作福鬻官賣法以亂天下軟弱者則承違順旨循默不言以固恩寵大則危社稷小則隳紀綱宰相之任何可輕授也元載巧邪􅏽佞庸近凡鄙結託閹臣李輔國遂為宰相故姦邪朋附而為之用忠賢擯斥而不得進綱紀隳壞政令頽弛貪猥盈滿賄賂公行海內怨嗟朝廷危殆猶賴代宗聰明早察其姦克行誅戮不然幾何不喪國也宰相之任豈可忽哉戒之戒之李光弼張唐英曰光弼平安史有大功於社稷古之名將無以加之然非純臣也何以明之廣德初吐蕃冦京師詔發兵赴難光弼與中人程元振魚朝恩不協遷延不至此不忠也十月代宗幸陜避冦實倚光弼為外援乃除東都留守以觀去就光弼辭以久待詔勑不至乃歸徐州欲取江淮租賦以自給此有二志也光弼母在河中詔屢存問又令郭子儀輿其母以歸京師以弟光進為渭北節度代光弼終以魚程之故不入朝而死於徐州大不孝也且吐蕃寇於京師天子出居於外當此之時若以天下為憂不以一身之禍為慮奔赴行在掃清國難然後密疏於上請誅二竪不為難也若度二竪不可遽除則功成之後退歸私第以養老母况代宗寬仁必察曲直未必遂有不測之禍何至疑惑不以忠節自全坐視國難仍拒朝命遂為自安之計哉忠嗣曰假如明主見責豈失一金吾羽林而歸宿衛其次豈失一黔中上佐又魚朝恩遣人發郭子儀父墓子儀入朝中外甚憂子儀乃入言臣久在軍中不禁兵士殘人墳墓多矣此臣不忠不孝所致朝廷乃安以忠嗣子儀而觀光弼則光弼之議淺矣昔貫澤之會威公有憂天下之心不召而至者數國葵丘之會驕而自矜叛者九國惜乎光弼無憂天下之心也其後部曲皆不奉約束此由已致之也若乃代宗猜忌有所屈辱愚恐光弼非唐臣也寬仁之主尚使不萌跋扈之節光弼之幸也常袞司馬溫公論袞乞停賜御饌并欲辭堂厨曰君子恥食浮於人袞之辭祿亷恥存焉與夫固位貪祿者不猶愈乎詩云彼君子兮不素餐兮如袞者亦未可以深譏也總論代宗之政子由論曰豫嘗論代宗唐之庸主也而承安史壞亂之後百度草創事出一切人情震搖易以生變此非常才所能定而代宗承之又嘗一為吐蕃所驚跳奔於陜然國遂以定不及其身者何也余考代宗行事有類英主者二焉誠率是道而充之其身安而國定蓋無足怪何也容大功之臣背之而不疑外無姑息之迹也僕固懷恩李光弼二人之功著懷恩之恃恩犯上自敵以下誰能忍之而代宗不與之較優容包納卒待其自斃豈不曰與之較力則彼驕兵也與之較理則彼逆臣也其乘氣而凶悖蓋其衰乃可圖也是其料懷恩於目中矣李光弼身兼將相功無與二而幸陜之役堅坐不應此其意非持兩端則高卧以觀變也而代宗之恩終始不衰豈不曰以光弼而傷之天下其謂我何彼之不赴吾急吾不問則已問之則必討彼非束手受死者而吾誰使敵之哉代宗之待二臣如是天下不謂之姑息者理宜爾也德宗之於懷光則姑息之迹不可勝掩矣人有當其意則用之衆怒不與則必殺之其用其殺莫或能間之者焉始用元載委已聽之載惡已甚誅之不疑寵魚朝恩幾危郭子儀然其橫也則殺之程元振之寵固矣栁伉一言而逐之易如反掌卒棄不用元載之獄問目皆從中出則是平日載雖擅權於外而代宗居中無不知也去三大姦如殺犬羊中外不驚上下厭伏觀此則昏且孱者不能為也是二者英主之所難而代宗有焉所以能保國而安身也歷代名賢確論卷八十二
