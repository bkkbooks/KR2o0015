body:
  text: 歷代名賢確論卷三十九髙祖中叔孫通制禮儀荆公皮日休溫公東坡陸賈叔孫通朱敬則東坡漢攻石守道建五等封異姓李翰蕭何治未央宫溫公史剡髙祖唐帝之後栁子厚赦季布東坡髙祖御將老泉叔孫通制禮儀荆公詩曰先生秦博士泰禮頗能熟量王欲有為兩生皆不欲草具一王儀羣豪果知肅黃金既遍賜短衣亦已瀆儒術自此雕何為反初服皮日休曰古之所謂禮不相襲樂不相沿者何哉非乎彼聖人此聖人也此不相襲者角其功利之深淺爾不相沿者明文武之優劣爾故三王迭作五帝更制夏商文武遞述其禮昭昭然若兩曜爭朗百川注瀆者矣然由周公刋之仲尼正之以周公之才之美謂後世無其人乎乃有仲尼仲尼之後迄今望其道如顔閔文如遊夏者鮮矣况聖人哉是後之制禮作樂宜取周書孔䇿為標凖也漢氏受命禮壞儀毁時無聖人茍措其儀立其禮不沿襲於聖制者妄也夫國之大祭不過乎郊祀宗廟也漢之既命其郊止於五畤之祀者禮不曰兆五帝之郊者乎止於昭靈之園者禮不曰天子七廟者乎而叔孫生不為之正郊祀立宗廟去秦畤之非制議昭靈之非禮汲汲於朝會之儀俾漢天子為髙祖其身不得郊見饗不及七廟臆生其制吻刋厥式非不標凖於聖人乎將以漢新去水火方弭兵械難改作乎將不明壇墠之位禘祫之儀者乎若然者湯伐桀周伐紂其制可知也嗚乎不明於古制樂通於時變君子不由也其叔孫生之謂也溫公曰禮之為物大矣用之於身則動靜有法而百行備焉用之於家則內外有别而九族睦焉用之於鄉則長幼有倫而俗化美焉用之於國則君臣有敘而政治成焉用之於天下則諸侯順服而紀綱正焉豈直几席之上户庭之間得之而不亂哉夫以髙祖之明逹聞陸賈之言而稱善覩叔孫通之儀而嘆息然所以不能肩於三代之王者病於不學而已當是之時得大儒而佐之與之以禮為天下其功烈豈若是而止哉惜夫叔孫通之為器小也徒竊禮之粳粃以依世諧俗取寵而已遂使先王之禮淪沒而不振以迄於今豈不痛甚矣哉是以揚子譏之曰昔者魯有大臣而史失其名曰何如其大也曰叔孫通欲制君臣之儀召先生於魯所不能致者二人曰若是則仲尼之開迹諸侯也非耶曰仲尼開迹將以自用也如委已而從人雖有規矩凖繩焉得而用之善乎揚子之言也夫大儒者惡肯毁其規矩凖繩以趨一時之功哉東坡論叔孫通不能致二生曰叔孫通制禮雖不能如三代然亦因時施宜有補於世者魯二生非之其言未必皆當通以為不知時變亦宜也然謹按揚子法言昔者齊魯有大臣史失其名或曰如何其大也曰叔孫通欲制君臣之儀聘先生於齊魯所不能致者二人由此觀之大臣以道事君不可則止然後可以託六尺之孤寄百里之命若與時上下隨人俯仰雖或適用於一時何足謂之大臣為社稷之衛哉陸賈叔孫通朱敬則曰李斯之相秦也行申商之法重刑名之家杜私門張公室棄無用之費損不急之官惜財愛功疾耕急戰人繁國富乃屠諸侯此救弊之術也故曰刻薄可施於進取變詐可陳於攻戰兵猶火也不戢將自焚况鋒鏑已銷石城又毁諒可易之以寬泰潤之以淳和八風之樂以柔之三代之禮以導之秦既不然淫虐滋甚往而不返卒至亡崩此不知變之禍也陸賈叔孫通之事漢王曰當滎陽成臯之間糧饋已窮智勇俱困不敢開一説效一竒惟進豪猾之材薦貪暴之客及區宇適平干戈向戢金鼓之聲未歇傷痍之民未起二子願時綽有餘態及陳詩書説禮樂問王道謀帝圗髙皇帝忿然曰吾以馬上得之安事詩書乎對曰馬上得之可馬上治之乎髙帝默然於是陸賈著新語叔孫通定禮儀始知天子之尊此知變之善也向使髙皇排二子而不取置詩書而不顧重攻戰之吏尊首級之科復道爭功張良已知其變拔劍擊柱吾屬不得無謀即晷難逾何二十帝乎亡秦是續何二百年乎故曰仁義者聖人之蘧廬禮經者先王之陳迹然則祝辭向畢芻狗須投淳精已流糟粕可棄仁義尚捨况輕此者乎東坡曰聖人之於天下也無意於取之也譬之江海百谷赴焉譬之麟鳯鳥獸萃焉雖欲辭之豈可得哉禹治洪水排萬世之患使溝壑之地疏為桑麻魚鱉之民化為衣冠契為司徒而行五教棄為后稷而蒸民乃粒世濟其德至於湯武拯塗炭之民而置之仁夀之域故天下相率而朝之此三聖人者蓋推之而不能去逃之而不能免者也於是益修其政明其教因其民不易其俗以是得之以是守之傳世數十而民不叛豈有它道哉周室既衰諸侯並起力征爭奪者天下皆是也德既無以相過則智勝而已智既無以相傾則力爭而已至秦之亂天下蕩然無復知有仁義矣漢髙祖以三尺劔起布衣五年而并天下雖稍輔以仁義然所用之人常先於智勇所行之䇿常主於權謀是以戰必勝攻必取天下既平思所以享其成功而安於無事以為子孫無窮之計而武夫謀臣舉非其人莫與為之者故陸賈譏之曰陛下以馬上得之豈可以馬上治之乎而叔孫通亦曰儒者難與進取可與守成於是酌古今之宜興禮樂之中取其簡而易知近而易行者以為朝覲會同冠昏喪祭之法雖足傳數百年上下相安然莫若三代聖人取守一道源深而流長也夫武夫謀臣譬如藥石可以伐病而不可以養生儒者譬之五榖可以養生而不可以伐病宋襄公爭諸侯不禽二毛不鼓不成列以敗於泓身夷而國蹙此以五穀伐病也秦始皇燔詩書殺豪傑東築臨洮北屬遼水民不得休息傳之二世宗廟蕪滅此以藥石養生也善夫賈生之論曰仁義不施而攻守之勢異也夫世俗不之察直以攻守為二道故悉論三代以來所以取守之術使知禹湯文武之盛德亦儒者之極功而陸賈叔孫通之流蓋儒術之粗也漢政石守道曰夫二帝之道至於禹而遂分三王之道至於漢而乃降舜襲堯之爵改正朔易服色以順天命而已其餘盡循堯之道禹襲舜之爵不能盡循舜之道帝之道遂分焉湯革夏改正朔易服色以順天命而已其餘盡循禹之道周革商改正朔易服色以順天命而已其餘盡循湯之道漢革秦不能盡循周之道王之道遂降焉夫皇之道失則降為帝帝之道失則降為王王降則霸矣吾觀漢以下其不得王道之粹也夫井田三王之法也什一三王之制也封建三王之治也鄉射三王之禮也學校三王之教也度量以齊衣服以章宫室以等三王之訓也三王市㕓而不稅關譏而不征林麓川澤以時入而不禁用民之力嵗不過三日五十者養于鄉六十者養于國七十者養于學孤寡鰥獨皆有常餼周衰王道息秦并天下遂盡滅三王之道漢革秦之祚而已矣不能革秦之亂猶襲秦之政而井田卒不用也什一卒不行也鄉射卒不舉也學校卒不興也度量卒不齊也衣服卒不章也宫室卒不等也市㕓而稅關譏而征林麓川澤不以時而入用民之力無日五十六十七十者不養孤寡鰥獨無常餼三王之道不復三王之道不復非秦滅之也漢滅之也昔桀滅夏道湯亦受命克承禹烈故夏之民歸於湯不見湯之政而見禹之政紂滅商政武亦受命克循湯治故商之民歸于周不見周之政而見湯之政秦滅周道漢亦受命不襲周之政而踵秦之弊故秦之民歸于漢見漢之政而不見周之政蓋以漢之禮樂易三王之禮樂也以漢之制度易三王之制度也以漢之爵賞易三王之爵賞也以漢之法律易三王之法律也以漢之政令易三王之政令也噫漢順天應人以仁易暴以治易亂三王之舉也其始何如此其盛哉其終何如此其卑哉三王大中之道置而不行區區襲秦之餘立漢之法可惜矣又曰或曰漢改三王之道作之者其誰歟曰曹參陸賈叔孫通之罪也漢髙祖以干戈而定天下陸賈曰陛下馬上得之不可馬上治之於是使賈著秦所以失天下漢所以得天下及古今成敗之國賈凡著十二篇每奏一篇帝輒稱善髙祖已并天下羣臣飲爭功或妄呼拔劔擊柱上患之叔孫通乃與弟子百餘人雜古禮與秦儀以為漢儀帝用之曰今日知為皇帝之貴也漢髙祖豁逹大度聰明神聖溫恭濬哲英威睿武其資材固不下於禹湯與文武也導之使為帝則帝矣使為王則王矣方平定其禍亂思為漢家改正朔定禮樂立制度明文章施道德張教化一風俗興太平以垂於千萬世賈若能逺舉帝皇之道致於人君施於國家布於天下通若能純用三王之禮施於朝廷通於政教格於後世以髙皇之材而不能行之乎乃齪齪進夫當時之近務王霸之猥略貴乎易行孜孜舉夫近古之野禮亡秦之雜儀求乎疾效使髙祖上視湯武有慙德漢家比蹤三王為不侔可惜也哉初蕭何為相天下未甚乂而何死曹參代之參以為蕭為之規當守之勿失日夜飲醇酒寬縱不治事雖復惠帝求治參不能竭才輔之直以髙祖之初定禍亂蕭何之草創律令民僅出塗炭為己太平國僅立法式為己大備當其髙祖之既平禍亂蕭何之既定律令惠帝之方求治參能竭伊尹致君如堯舜之心周公輔成王致太平之道以事惠帝制度之未修者修之教化之未格者格之文章之未備者備之禮樂之未明者明之刑政之未和者和之盡循三王之道而行之賈與通既施之於前參復行之於後漢豈有不及三王之治者乎故曰陸賈叔孫通曹參之罪也又曰或曰時有澆淳道有升降當漢之時固不同三代之時盡行三王之道可乎曰時有澆淳非謂後之時不淳於昔之時也道有升降非謂今之道皆降於古之道也夫時在治亂道在聖人非有先後耳桀紂興則民性暴湯武興則民性善湯之時固在桀之後武之時固在紂之後而湯武之時豈不淳於桀紂之時其道亦已降乎其民亦已難教乎時治則淳時亂則澆非時有澆淳也聖人存則道從而隆聖人亡則道從而降非道有升降也民厭周久矣苦秦甚矣秦之政檻穽也民得出檻穽唯使之從使從三王之政三王之政非如檻穽之深閉可畏也既出檻穽而得適非檻穽人皆樂然從之况使從三王大中之道而躋於泰然安樂乎當髙祖提秦之民於千萬丈不測深淵中置之於平地君示之以三王之政革之以三王之化鼓之以三王之號令明之以三王之律度民有不肯從之乃曰不如在千萬丈不測深淵中之樂邪吾未之信也當乎天下初定也民未有富兼地民未有強凌弱民未有衆吞寡民未有大并小因定之經界因為之井田民有爭乎國未有巡行之費國未有兵衆之動國未有土木之耗因為之什一之法因立之中正之道國闕用乎封建以域之鄉射以仁之庠序以教之養老以厚之秦之民不為漢民為三王之民民不見漢政見三王之政伊尹俾其君不及堯舜其心愧恥若撻于市湯去堯舜數百年矣而又承桀之大亂其時固亦澆漓矣且能以堯舜之道事其君使其君如堯舜曹參陸賈叔孫通乃獨不能以三王之道事於漢使漢不及三王誠可罪也或曰漢之輔政者前有蕭張中有平勃後有霍光魏相公孫𢎞博陽侯韋賢父子而獨責於賈與通暨曹相國不亦偏乎曰易之革曰天地革而四時成湯武革命應乎天而順乎人君子以治厯明時鼎曰君子以正位凝命當髙祖定天下而革去故鼎取新之日也曹參陸賈叔孫通正當君子以治厯明時正位凝命之際也會其時乘其際不能創制度明律令以垂萬世法適當其罪也至於後世法令已定矣條章已著矣制度已行矣朝廷循之已成熟矣百姓信之已貫習矣而遽更之得無亂乎富者已連田兼地矣強已凌弱矣衆已吞寡矣大已并小矣而遽正之以經界居之以井田民肯從乎後嗣奢縱日作土木不息內畜媚侍外耽畋遊殫天下之財疲天下之力猶供億不足而遽行中正之道取什一之賦罷關市開山澤國而不乏乎故朝錯請削國地而被誅仲舒請限民田而不用霍光魏相公孫韋賢博陽侯雖有其才豈復能為漢家革制度乎適不當其時也吾故罪曹參陸賈叔孫通也建五等封異姓李翰曰或稱漢祖建五等封異姓其計得乎髙后立四王非劉氏其事順乎嘗試論之曰夫思治惡亂體國之常理去危就安宅生之大域然而制業圖逺隨化會機是非較於毫釐得失差於興滅可不謂然乎揆夫髙祖造漢鼎鑒亡秦宗族無尺寸之封子弟立虛空之地故衆枝莫助而孤根易拔封建之心肇於此矣又謂大業可以力取神器推於命歸思得攬四海以獨富舉百郡以從欲而外誘異端內疑成計及見羣心交沮偶語間興適悟天下不可獨理專欲不能蓋衆分利推恩先封雍齒然後將士斂手不懷反覆豪俊息慮知難搖動五等之制於是行焉既而鑾輅龍旗皆王室昭穆黼衣朱黻即功臣子孫君利世祚人安定主上敦子愛之情下結體信之志羣后固犬牙之勢匹夫絶烏合之舉此所以為計之是也何創五等之議不遵三代之典境土踰隘隄防漏下權敵上都制方偶國過當啓陵僭之端怙強連交爭之兆賈誼痛其時亂朝錯憂其必危卒使諸侯失節朝廷忿忌此所以為計之非也且夫中興之主不讓肇基之勳成務之臣有髙佐命之力故禮樂大備取惟新之格言琴瑟不調除仍舊之弊法觀乎孝惠既崩髙后稱制侯王諸吕何不可哉當若卑署祿産之位宜序親踈之節小其國以圖全薄其勢以逺害而陳平周勃亦分茅錫土將相之後誓同山河舅甥之國穆若唇齒預閉覬覦之心不踐嫌猜之路克復明辟決自我躬髙謝夀陵無負先帝安有齊兵之觀變代邸之危疑哉此所以為計之得也神害久盈物無兩大以吕氏之盛跨漢朝之權專禁兵以候疑秉大政以速謗趦趄異姓蓄姦候隙刺促大臣側目相視自投機穽實履憂虞此所以為計之失也烏乎物有益之而損損之而益凡人臨事多惑視往則明向使髙祖吕后觀既往之勢折當時之疑斷必全之䇿杜未萌之禍則惠文之間無劉吕之難哀平之末有晉鄭是依况復周陳諸家休戚連漢黎獻思德謳歌未改雖天命興廢孰能明之然人謨協密必無悔矣蕭何治未央宫溫公曰王者以仁義為麗道德為威未聞以其宫室鎮服天下也天下未定當克己節用以趨民之急而顧以宫室為先豈可謂之知所務哉昔禹卑宫室而桀為傾宫創業垂統之君躬行節儉以訓示子孫其末流猶入於淫靡况示之以侈乎乃云無令後世有以加豈不謬哉至於孝武卒以宫室罷敝天下未必不由酇侯啓之也又史剡曰是必非蕭何之言審或有之何惡得為賢相哉天下方未定為之上者拊循煦嫗之不暇又安可重為煩費以壯宫室哉古之王者明其德刑而天下服未聞宫室可以重威也創業垂統之君致其恭儉以訓子孫子孫猶淫靡而不可禁况示之以驕侈乎孝武卒以宫室靡敝天下惡在其無以加也是皆庸人之所及而謂何固肯為此言乎髙祖唐帝之後栁子厚漢原廟銘曰昔在帝堯光有四海元首萬邦時則舜禹稷契佐命垂統股肱天下聖德未衰而內禪元臣繼天而受命四姓承休迭有中邦五神環運炎德復起周道削滅秦德暴戾皇天疇庸審厥保承乃命唐帝之後振而興之又俾元臣之後翊而登之所以紹復丕績不墜厥祀故曲逆起為䇿士輔成帝圖吐謀洞靈奮竒如神舜之胄也汝隂脫帝密網摧虜暴氣扶乘天休運行嘉謀禹之苗也酇侯保綏三秦控引漢中宏器廓度以大帝業卨之裔也淮隂整齊天兵導揚靈威覆趙夷魏拔齊殄楚平陽破三秦虜魏王絳侯定楚地固劉氏皆稷之裔也克復堯緒昭哉甚明天意若曰建大德者必唐帝之胄故漢氏興焉翼炎運者必唐臣之孫故羣雄登焉是以髙帝誕膺聖祚以垂德厚探昊穹之奧旨載幽明之休祐殺白帝於大澤以承其靈建赤旗於沛邑以昭其神假手于嬴以混諸侯憑力于項以離關東奉纘堯之元命而四代之後咸獻其用德乘木之大統而秦楚之盛不保其位既建皇極設都咸陽撫征四方訓齊天下乃樂沛宫以追造邦之本乃歌大風以昭武成之德乃奠舊都以壯王業之基生為湯沐之邑沒為思樂之地且曰萬嵗之下魂遊于此惟兹原廟沛宫之舊也祭蚩尤於是庭而赤精降導靈命於是邦而羣雄至登布衣於萬乘而子孫得以纘其緒化環堵為四海而黎元得以安其業基岱嶽之髙源洪河之長蓄靈擁休此焉發迹蓋以道備于是而後行之天下制成于是而後廣之宇內天下備其道而神復乎本宇內成其制而心懷于舊宜其正名以表功用成其始俾生靈盡其敬焉陳本以宅神用成其終俾生靈盡其慕焉故髙帝定位建兹閟宫惠皇嗣服爰立清廟綿越千祀至今血食此所以成終而成始也且夫以斷蛇之威安知不運其密用佐嵗功以流澤歟以約法之仁安知不流其神眷相舊邦之遺黎歟以紹唐之餘慶統天之遺烈安知不奮其神化大祐於下土歟然則展敬乞靈烏可已也赦季布東坡曰漢髙帝唐髙祖皆創業之賢君季布屈突輩皆一時之烈丈夫故能以身徇主有死無二惟賢君故能推至公之心不以私怨殺士此可以為萬世臣主之法髙祖御將老泉曰近之論者或曰將之所以畢智竭力犯霜露蹈白刃而不辭者冀賞耳為國家者不如勿先賞以邀其成功或曰賞所以使人不先賞人不為我用是皆一隅之説非通論也將之才固有小大傑然於庸將之中者才小者也傑然於才將之中者才大者也才小志亦小才大志亦大人君當觀其才之小大而為之制御之術以稱其志一隅之説不可用也夫養騏驥者豐其芻粒潔其羈絡居之新間浴之清泉而後責之千里彼騏驥者其志常在千里也夫豈以一飽而廢其志哉至於養鷹則不然獲一雉飼以一雀獲一兔飼以一鼠彼知不盡力於擊搏則其勢無所得食故然後為我用才大者騏驥也不先賞之是養騏驥者飢之而責其千里不可得也才小者鷹也先賞之是養鷹者飽之而求其擊搏亦不可得也是故先賞之説可施之才大者不先賞之説可施之才小者兼而用之可也昔者漢髙帝一見韓信而授以上將解衣衣之推食哺之一見黥布而以為淮南王供具飲食如王者一見彭越而以為相國當是之時三人者未有功於漢也厥後追項籍垓下與信越期而不至捐數千里之地以畀之如棄弊屣項氏未滅天下未定而三人者已極富貴矣何則髙帝知三人者之志大不極於富貴則不為我用雖極於富貴而不滅項氏不定天下則其志不已也至於樊噲滕公灌嬰之徒則不然拔一城陷一陳而後增數級之爵否則終嵗不遷也項氏已滅天下已定樊噲滕公灌嬰之徒計百戰之功而後爵之通侯夫豈髙帝至此而嗇哉知其才小而志小茍或先賞之則彼將泰然自滿而不復以立功為事故也噫方韓信之立於齊蒯通武涉之説未去也當是之時而奪之王漢其殆哉夫人豈不欲三分天下而自立者而彼則曰漢王不奪我齊也故齊不捐則韓信不懷韓信無內心則天下非漢之有嗚呼髙帝可謂知大計者矣歷代名賢確論卷三十九
