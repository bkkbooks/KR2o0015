body:
  text: 歷代名賢確論卷四十七通論漢之人君溫公高祖以周勃遺惠文武帝以霍光遺昭宣老泉高祖元成哀平制御之術子由高帝武帝待臣下東坡漢之人臣權德輿趙廣漢張敞尹翁歸王尊皆出吏胥中老泉文武元成近侍李德裕韓信酈寄吕溫袁盎汲黯李德裕人臣有後李德裕東坡漢風俗東坡胸奴樂天陳子昂西漢興亡東坡馬周漢之人君溫公曰高祖奮布衣提三尺劍八年而成帝業其收功之速如是何哉惟其知人善任使而已故高祖自謂鎮國家撫百姓不如蕭何運籌䇿決成敗不如子房戰必勝攻必取不如韓信三者皆人傑吾能用之所以取天下韓信亦曰不善將兵而善將將斯言盡之矣呂氏之亂漢氏不絶如線然而卒不能為患者外有宗藩之彊內有絳灌之忠也文景之時天下家給人足幾致刑措後世皆稱慕而莫及之夫民之情何嘗不欲安樂而富壽哉文景能勿擾而已矣孝武喜淫侈慕神仙宮室無度巡遊不息窮兵於四夷嚴刑而重賦迹其行事視秦皇何逺哉至其崇儒重道求賢納諫故其成敗若此之殊也孝昭以童稚之年辨霍光之忠確然不可動何天資之明也然光猶專政而不歸此則光之罪矣孝宣綜核名實信賞必罰使吏稱其職民安其業方之孝武功烈優焉孝元優游不斷漢業始衰孝成荒於酒色委政外家孝哀狠愎不明嬖幸盈朝陵夷至於孝平以幼冲嗣位王莽因之遂移漢祚莽恃其詐慝煩民玩兵罪盈怨積而天下叛之矣高祖以周勃遺惠文武帝以霍光遺昭宣老泉曰或曰機者創業之君所假以濟耳守成之世其奚事機而安用夫腹心之臣嗚呼守成之世能遂熙然如太古之世矣乎未也吾未見機之可去也且夫天下之變常伏於安田文所謂子少國危大臣未附如此等事何世無之當是之時而無腹心之臣可為寒心哉昔者高祖之末天下既定矣而又以周勃遺孝惠孝文武帝之末天下既治矣而又以霍光遺孝昭孝宣蓋天下雖有泰山之勢而聖人常以纍卵為心故雖守成之世而腹心之臣不可去也傳曰百官總已以聽于冢宰彼冡宰者非腹心之臣天子安能舉天下之事委之三年而不置疑於其間邪又曰五載一巡狩彼無腹心之臣五載一出捐千里之畿而誰與守邪今夫一家之中必有宗老一介之士必有密友以開心胸以濟緩急奈何天下而無腹心之臣乎高祖元成哀平制御之術子由曰善治天下者必明於天下之情而後得御天下之術術者所謂道也得其道而以智加焉是故謂之術古之聖人惟其知天下之情而以術制之也故萬物皆可得而役其生皆可得而制其死牛服於箱馬服於轅鷹隼服於鞲牛不可以有所觸馬不可以有所踶鷹隼不可以有所擊此三者喜怒好惡之情發於外而見於人也是以因其所忌而授之以其術至於終身制於人而不去且治天下何異於治馬也馬之性剛狠而難制急之則敝而不勝緩之則惰而不進王良造父為之先後而制其遲速驅之有方而掣之有時則終日蹀躞而不知止此術之至也古之聖人驅天下之人而盡用之仁者使效其仁勇者使效其勇智者使效其智力者使效其力天下之人雜然皆列於前安得仁人君子而後任之且雖有天下之善人與之處而不知其情御之而不中其病則雖有好善之心而不獲好善之利何者彼不徒為吾用也而况乎天下之英雄欲收其功而不制其心哉昔者秦漢之際姦宄猛悍之人所在而為冦髙祖發於豐沛之間行而收之黥布彭越之倫皆撫而納諸其中其所以制之者甚備也玊帛子女牛羊犬馬以極其豪侈之心輕財好施敦厚長者以服其趦趄之懷倨肆傲岸輕侮淩辱以折其彊狠之氣其視天下之英雄不啻若匹夫孺子然皆得其歡心而用其死力至於元成之世天下久於太平士大夫生於其間無復英雄難制之風天下之士皆書生好儒其才氣勇力無足畏者俯首下氣求為之用而不暇元成哀平亦欲得天下之賢才而用之然而不知其情不獲其術賢人君子避讒畏譏遠引而去小人宦豎縱橫放肆而制其事此甚可憫也夫人之平居朋友之間僕妾之際莫不有術以制其變蓋非有深遠難見之事也欲其用命而見其所害欲其樂從而見其所利欲其喜而致其所悅欲其懼而致其所忌欲其開心見誠而示之以無所恐欲其守死不去示之以無所往此天下之人皆能知之至於治天下則不能用且此過矣天下以為天子之尊無所事術也而不知天下之士惟英雄而後能有大功而世之英雄常苦豪橫太過而難制由此觀之治天下愈不可無術也高帝武帝待臣下東坡曰君以利使臣則其臣皆小人也幸而得其人亦不過健於才而薄於德者也君以禮使臣則其臣皆君子也不幸而非其人猶不失廉恥之士也其臣皆君子則事治而民安士有廉恥則臨難不失其守小人反是故先王謹於禮禮以欽為主宜若近於弱然而服㬥者莫若禮也禮以文為飾宜若近於僞然而得情者莫若禮也哀公問君使臣臣事君如之何孔子曰君使臣以禮臣事君以忠不有爵祿刑罰也乎何為其專以禮使臣也以爵祿而至者貪利之人也利盡則逝矣以刑罰而用者畏威之人也威之所不及則解矣故莫若以禮禮者君臣之大義也無時而已也高祖以神武取天下其得人可謂至矣然恣慢而侮人洗足箕踞溺冠跨項可謂無禮矣故陳平論其臣皆嗜利無恥者以是進取可也至於守成則殆矣髙帝晚節不用叔孫通陸賈其禍豈可勝言哉呂后之世平勃背約而王諸呂幾危劉氏以廉恥不足故也武帝踞厠而見衛青不冠不見汲黯青雖富貴不改奴僕之姿而黯社稷臣也武帝能禮之而不能用可以太息矣漢之人臣權德輿曰蕭曹以清靜熙帝載良平以謨明贊王業至宣帝之時則魏相通故事丙吉知大體斯皆章章可言者也洎夫張蒼之律歷孫𢎞之文章韋賢之好學平當之有恥然亦號為賢相抑次焉至若孔匡張馬服儒衣冠被阿諛之譏不勝其任最下則陶青劉舍莊翟趙周之徒皆齪齪備位故身名皆泯夫此數子者豈不粗知君臣之道古今之變哉病於無所發明保持祿位而已有時無功可不謂大哀哉趙廣漢張敞尹翁歸王尊皆出胥吏中老泉曰昔者漢有天下平津侯樂安侯輩皆號為儒宗而卒不能為漢立不世大功而其卓絶雋偉震耀四海者乃其賢人之出吏胥中者耳夫趙廣漢河間之郡吏也尹翁歸河東之獄吏也張敞太守之卒史也王尊涿郡之書佐也是皆雄雋明博出之可以為將而內之可以為相者也而皆出於胥吏者有以也夫吏胥之人少而習法律長而習獄訟老姦大豪畏懼懾伏吏之情狀變化出入無不諳究因而官之則豪民猾吏之弊表裏毫末畢見於外無所逃遁而又上之人擇之以才遇之以禮而其志復自知得奮於公卿故終不肯自棄於惡以賈罪戾而敗其終身之利云云文武元成近侍李德裕曰自古中主以降皆安於近習疏遠忠良其主非不知君子可親小人可去而不可改者其蔽有二一曰性相近二曰嗜欲深桓靈之主與小人氣合如水之就下火之就燥皆自然而親結不可解也侯覽張讓所以得蔽君矣元成二后皆有所嗜吹簫撾鼓之娛微行沉湎之樂非幸臣無以承意非近習無以共歡石顯張敞所以得蠧政矣唯人君少欲英明者則能反是如文帝雖有鄧通趙談所信者賈誼張釋之袁盎此所謂少欲也武帝雖有韓嫣李延年而所貴者公孫𢎞倪寬卜式所謂英明也故君聽不惑政無頗纇近則開元初內有姜皎崔滌以極宮中之樂外有姚盧蘇宋以修天下之政得元成之欲享舜禹之名六合晏然千古莫及其故何邪幸臣不得干政事也後代能知漢之文武及開元致理之要雖有幸臣亦何害於理哉韓信酈寄呂溫由鹿賦曰豫南出襄樊之間遇野人縶鹿而至者問之答曰此為由鹿由此鹿以誘致羣鹿也備言其狀且曰此鹿每有所致輒鳴嘷不飲食者纍日余喟然嘆曰虞之即鹿也必以其類致之人之即人也亦必以其友致之實繁有徒古之然矣嗟乎鹿無情而猶知痛傷人之與謀宴安殘酷者彼何人斯彼何人斯物微感深遂作賦曰云云借如淮隂遇禍寃在伸理通說且拒豨謀寧起堂堂蕭公實曰知己紿致鍾室胡寧忍此呂祿之難誰非漢臣交則不義賣亦不仁彼美酈生既為交親誘襲軍印豈無他人於戲微獸傷類如不自容伊人賣友而享其功滅交道兮墜義風曽麋鹿之不若何仁信之可宗已焉哉諒此世之茫茫吾未見其始終袁盎汲黯李德裕曰袁盎汲黯皆豪俠者也若非氣蓋當世義動明主豈有是名哉袁盎曰緩急人所有故善劇孟匿季心汲黯好遊俠任氣節善灌夫所以知其然也余斯言豈徒妄發揚子所謂孟子之勇類於是夫俠者非常之人也雖以然諾許人必以節義為本義非俠不立俠非義不成難兼之矣所謂不知義者感匹夫之交格君父之命為貫髙危漢祖者是也所利者邪所害者正為梁王殺袁盎者是也此乃盜賊耳焉得謂之俠哉唯鉏麑不賊宣孟承基不忍志寧斯為真俠矣淮南王憚汲黯以其守節死義所以易公孫𢎞如發䝉耳黯實氣義之兼者士之任氣而不知義皆可謂之盜矣然士無氣義者為臣必不能死難求道必不能出人近代房孺復問徑山大師欲習道可得至乎徑山對曰學道者唯猛將可也身首分裂無所顧惜由是而知士之無氣義者雖為桑門亦不足觀矣人臣有後李德裕曰陳平稱吾多隂謀道家所禁吾世即廢終不復興以吾多隂禍也至曾孫何國絶班生善陳平之言以為世戒理當然矣而丙丞相才及子顯黜為關內侯至孫昌乃絶國絶三十二歲復續而張湯杜周子孫世有令名皆在顯位其故何哉丙丞相於漢宣之德可謂至矣晋荀息以忠貞之故不敢負獻公程嬰以託孤之義不忍欺趙氏所以繼之以死終不食言丙丞相於史皇孫微君臣之分無親戚之情而保養曾孫仁心惻隱置於閒燥給以私財介然拒天子之使因是全四海之命及奏記霍光决定大䇿既而顯徵卿之美削仕伍之辭其深厚不伐古所未有夏侯勝以為有隂德者必享其樂以及子孫是宜篤生賢人世濟其美古所謂有後者良謂是矣焉在傳爵邑而已哉張杜有後豈用法雖深而治者或能去天下之惡除生人之害所以然也東坡論張湯揚雄曰達賢者有後張湯是也張湯宜無後者也無其實而竊其名者無後揚雄是也揚雄宜有後者也達賢者有後吾是以知蔽賢之無後也無其實而竊其名者無後吾是以知有其實而辭其名者之有後也賢者民之所以生也而蔽之是絶民也名者古今之達尊也重於富貴而竊之是欺天也絶民欺天其無後不亦宜乎故曰達賢者與有其實而辭其名者皆有後吾嘗誦之云耳漢風俗東坡曰西漢風俗諂媚不為流俗所移惟汲長孺耳司馬遷至伉簡然作衛青傳不名青但謂大將軍賈誼何等人也而云愛幸於河南太守吳公此等語甚可鄙而遷不知習俗使然也本朝太宗時士大夫亦有此風至今未衰吾嘗發䇿學士院問兩漢所以亡者難易相反意在此也而答者不能盡吾亦嘗於上前論之胸奴樂天曰丐奴者一氣所生不可剪而滅也五方異族不可臣而畜也故為侵㬥之患久矣而備禦之略亦多矣考其要者大較有四焉若乃選將練兵長驅深入之謀自王恢始建以三表誘以五餌之術自賈誼始厚以賂遺結以和親之計自婁敬始徙人實邊勸農教戰之䇿自鼂錯始然則用王恢之謀則殫財耗力罷竭生人禍結兵連功不償費故漢武悔焉而下哀痛之詔也用賈誼之術則羌胡之耳目心腹雖誘而荒矣而華夏之財力風教亦隨時而弊矣故漢文知其不可而不行也用婁敬之計則啓寵納侮厚費偷安雖侵略之患漸寧而和好之約屢背故漢氏四代為胸奴所欺也用鼂錯之䇿則邊人有安土之患未免攻戰之勞胸奴無得志之虞亦絶歸心之望故漢武病之有廣武之役也是以討之以兵不若誘之以餌誘之以餌不若和之以親和之以親不若備之有素斯皆前代已驗之事可覆而視也陳子昂論突厥曰胸奴為中國之患自上代所苦久矣請以秦漢已來事跡證明之始皇之時併吞六國制有天下按劒叱咤八荒奔馳然胸奴彊梁威不能服牧馬河內以侵邊疆始皇赫然使䝉恬將四十萬衆北築長城因以逐胡取其河南之地七百餘里當時燕齊海嶽贏糧給費徭役煩苦人以不堪故長城未畢而閭左之戍巳為其患二代而亡莫不始於丐奴也至漢興高祖受命率羣雄乘利便以三十萬衆窘迫白登七日被圍僅而獲免自是歷呂太后至孝文帝單于桀驁益陵漢家文帝徒以遜辭致獻金帛但求其善和而已不敢有圖賈誼所以哭之痛文帝以天下之盛而卑事丐奴以倒懸天下也景帝時邊受其患於是漢武踐祚以承六代鴻業屬乎文景元默之化海內乂安太倉之粟紅腐而不可食內庫之錢貫朽而不可校財力雄富士馬精彊忿胸奴之驕慢將報先帝之辱遂使王恢韓安國將三十萬衆以馬邑誘單于師出徒費竟無毫髮之功於是大命六師專以伐胡為務首尾二十餘年中國騷然大受其弊至於國用不足軍興不給租及六畜算及舟車盜賊羣興京師起亂竟不能制單于之命一日而臣服之漢宗衰殘幾自覆社稷也故漢武晚年厭兵革之弊乃下哀痛之詔罷輪臺之田封丞相為富民侯將以蘇中國也至宣帝代罕復出師屬胸奴數窮天降其禍虛閭權渠單于病死右賢王屠耆堂代立骨肉大臣自不相服又立虛閭權渠子為呼韓邪單于於是屠耆堂諸名王貴人各自分立為王單于更相攻擊以至大亂殘虐死者計萬億數畜産耗減十至八九又以饑餓相燔燒以求食於是寄命無所諸名王貴人右伊狄訾且渠當戶以下將兵五萬稽首來降於是北方晏然靡有兵革之事直至哀平之際邊人以安愚竊以此觀胸奴之形察天時之變盛衰存亡之機事可見也然則胸奴不滅中國未可安卧亦明矣夫以漢祖之略武帝之雄謀臣勇將勢盛雷電窮兵黷武傾天下以事之終不能屈一王服一國宣帝承衰竭之後撫瘡痍之人不敢煬然有出師之意然而未有遺矢之費而臣僕於單于其故何哉蓋盛衰有時理亂有數故曰聖人修備以待時是以正天下如拾遺耳西漢興亡東坡曰天下者器也天子者有此器者也器久而不用而置諸篋笥則器與人不相習是以扞格而難操良工者使手習知其器而器亦習知其手手與器相信而不相疑夫是故所為而成也天下之患非經營禍亂之足憂而養安無事之可畏何者懼其一旦至於扞格而難操也昔之有天下者日夜淬礪其百官撫摩其人民為之朝聘㑹同燕享以交諸侯之歡歲時月朔致民讀法飲酒蠟臘以遂萬民之情有大事自庶人以上皆得至于外朝以盡其詞然猶以為未也而五載一巡守朝諸侯於方嶽之下親見其耆老賢士大夫以周知天下之風俗凡此者非以為茍勞而已將以馴致服習天下之心使不至於扞格而難操也及至後世壞先王之法安於逸樂而惡聞其過是以養尊而自高務為深嚴使天下拱手以貌相承而心不服其腐儒老生又出而為之說曰天子不可以妄有言也史且書之後世且以為議使其君臣相視而不相知如此則偶人而已矣天下之心既已去而倀倀焉抱其空器不知英雄豪傑已議其後愚嘗觀兩漢之初髙祖創業之際事變之興亦已繁矣而高祖以項氏創殘之餘與信布之徒爭馳於中原此六七公者皆以絶人之姿據其土地甲兵之衆其勢足以為亂然天下終以不搖卒定於漢傳十數世矣而至於元成哀平四夷嚮風兵事不試而王莽一豎子乃舉而移之不用寸兵尺鐡而天下屏息莫敢或爭此其故何也創業之君出於布衣其大臣將相皆握手之歡凡在朝廷者皆其嘗試擠掇以知其才之短長其視天下如一身茍有疾痛其手足不期而自救當此之時雖有近憂而無遠患及其子孫生於深宮之中而狃於富貴之勢尊卑濶絶而上下之情疏禮節繁多而君臣之義薄是故不為近憂而常為遠患及其一旦固已不可救矣聖人知其然是以去苛禮而務至誠黜虛名而求實效不愛高位重祿以致山林之士而欲聞切直不隱之言者凡皆以通上下之情也馬周請崇節儉及制諸王疏曰昔唐堯茅茨土階夏禹惡衣菲食如此之事臣知不可復行於今漢文帝惜百金之費輟露臺之役集上書囊以為殿帷所幸愼夫人衣不曳地至景帝以錦繡纂組妨害女工特詔除之所以百姓乂安後至孝武帝窮奢極侈而承文景遺德故人心不動向使高祖之後即有武帝天下必不能全此於時代差近事跡可見竊尋往代以來成敗之事但有黎庶怨叛聚為盜賊其國無不滅亡人主雖欲改悔未有重能安全者凡修政教當修之於可修之時若事變一起而後悔之則無益也故人主每見前代之亡則知其政教之所由喪而皆不知其身之失是商紂笑夏桀之亡幽厲亦笑紂滅隋煬帝大業之初又笑齊魏之失國然今之視煬帝亦猶煬帝之視齊魏也故京房謂漢元帝云臣恐後之視今亦猶今之視古此言不可不誡也歷代名賢確論卷四十七
