body:
  text: 歷代名賢確論卷二十九文侯國之興亡潁濱惠王惠王不肖溫公孟子對王以仁義溫公移粟救飢荆公安僖王公子無忌潁濱東坡溫公武靈王武靈王之亡溫公惠文王藺相如潁濱孝成王長平之敗潁濱平原君潁濱虞卿潁濱魯仲連潁濱頗牧溫公潁濱獻子韓之興不在獻子潁濱昭侯賞罰公而享國溫公諸王齊國之興亡溫公威王誅賞老泉牛僧孺淳于髠東坡宣王陳仲子潁濱溫公湣王孟嘗伐秦潁濱孟嘗養士溫公東坡荆公襄王田單東坡潁濱齊王建顏蠋東坡國之興亡潁濱曰魏文侯非戰國之君也內師事卜子夏友田子方敬段干木被儒者服身無失德用吳起西門豹李悝盡力耕戰民賴以富而敵不敢犯外以禮與信交接諸侯與韓趙無怨終其身魏人不知戰國之患雖非盛德之主使當平世得行其志雖漢文帝不能逺過也一時諸侯無足言者矣至子武侯稍以侵暴鄰國至孫惠王藉父祖之業結怨韓趙齊乘其弊殺龐涓虜太子秦人因之遂取西河地魏由此衰不然以全魏之力據山河之利秦豈能動之哉惠王不肖溫公曰魏文侯以列國大夫好賢禮士終為天下顯諸侯至于今稱之惠王有一商鞅不能用而棄之於秦使還為國害喪地七百里竄身大梁子孫遂微賢不肖之相望豈不逺哉孟子對王以仁義溫公載孟子告梁惠王曰何必曰利子思告孟子牧民之道先利之仁義固所以利之也易曰利者義之和利用安身以崇德此皆利之大者也溫公曰子思孟子之言一也夫惟仁者知仁義之利不仁者不知也故孟子之對梁王直以仁義而不及利者所與言之異故也移粟救飢荆公曰梁惠王嘗移粟以救飢饉孟子論而非之所謂徒善不足以為政徒法不能以自行若夫治不由先王之道者是徒善徒法也五帝三王之世可謂隆盛亦不能使五榖常登水旱不至然無凍餒民者上有美政而下有儲蓄之備也公子無忌侯嬴朱亥潁濱曰魏公子始用侯嬴之計盜兵符殺晉鄙而奪其軍擊秦以全趙成桓文之功矣然兄弟自是相失十年不敢還魏幾無以安其身殆哉其後秦兵攻魏無忌無還魏之心毛薛惎之翻然而歸合諸侯破秦軍使宗廟復安兄弟如故然後得名因以立於世蓋無忌之名發於侯生而全於毛薛侯生之竒毛薛之正廢一不可而正之所全者多矣東坡朱亥墓銘曰崔嵬髙邱其下為誰唯魏烈士朱亥是依時惟布衣不震不驚晉鄙在師孔嚴不孤進取其顱視如豚豭昔在屠肆誰養其威鼓刀市人誰者畏之仡仡勇夫殺人如蒿及其所難或失其刀惟是貧賤無以自豪賤而能豪是謂真勇士之布衣其亦在養有或不養臨事而恐唯是屠者其養可取溫公曰無忌去而魏輕還而魏重安僖王猶以為疑無忌死而魏亡賢者之於國家如何哉武靈王之亡溫公曰武靈王不顧流俗變常服習騎射以制林胡滅中山大啓土宇威加强秦可謂賢君矣及溺於嬖寵欲分國以王二子卒餓死沙丘宫佚欲之為敗也如此藺相如潁濱曰藺相如非戰國之士也以死行義不屈於强秦以禮為國不較於廉頗其處剛柔進退之際頗類學道者使居平世可以為大臣矣非戰國之士也長平之敗潁濱曰趙於戰國强國也非大失計未遽亡也孝成王貪上黨之利不聽趙豹而聽趙勝以致秦怒一失矣使廉頗拒長平聽秦之間而使趙括代頗再失矣趙括既敗邯鄲被圍虞卿請以重寶附楚魏以援國示秦則秦媾可合王不能用而聽趙豹使鄭先入秦求媾諸侯由此莫敢救趙三失矣積此三失以致大敗僅能自存由此觀之非秦獨能敗趙而趙之所以自敗者多矣故善為國者必先定計慮計慮既定雖有禍敗不至亡國也平原君潁濱曰趙勝傾身下士以竊一時之聲可矣至於為國計慮勝不知也趙欲拒燕有廉頗趙奢不能用而割地與齊以借田單知單之賢而不知其不為趙用也及韓馮亭以上黨嫁禍於趙趙豹明其不可而勝貪取之長平之禍成於趙勝一言此皆貴公子不知務之禍也乃欲使之相危國拒强秦難哉虞卿潁濱曰游說之士皆歷詆諸侯以左右網其利虞卿終始事趙專持從說其言前後可考無反覆之病觀其赴魏齊之急捐相印棄萬户侯而不顧此固義俠之士非說客也哉然太史公記虞卿與趙謀事皆秦破長平後而卿為魏齊棄相印走大梁則前此矣意者魏齊死卿自梁還復相趙而太史公失不言之耳魯仲連潁濱曰戰國游說之士非縱即橫說行交合而寵祿附之故士不厭詭詐爭走於利魯仲連辨過儀秦氣淩髠衍而從橫之利不入於口因事放言切中機㑹排難解紛如決潰堤不終日而成功逃避爵賞脫屣而去戰國以來一人而已頗牧溫公曰趙於三晉最強及貪上黨之田以喪長平之師用郭開之讒而棄廉頗李牧使宗廟不血食言之可為長欷矣潁濱曰廉頗李牧皆以將亡之趙抗方興之秦其為力艱矣卒以用舍為趙之存亡趙能用之而不能終悲夫韓之興不在獻子潁濱曰韓之先獻子厥最賢然春秋之際諸侯之賢大夫如獻子者多矣而子孫莫興太史公以獻子存趙氏之孤為天下之隂德故宜有後余謂不然韓之先與晉同祖皆周武王之後也史伯謂鄭桓公武實昭文之功文之祚盡武其嗣乎武王之子應韓不在韓其在晉乎晉自文公伯諸侯至平公八世猶未足以究武之烈而繼之以韓此天意也獻子何足以當之然周衰姬姓復興者三國燕與韓魏皆據地千里后稷播種百榖以濟飢饉其報固當然哉賞罰公而享國溫公曰韓以貧弱之國居天下之衝首尾腹背莫不受敵然猶社稷血食幾二百年豈非昭侯奉法之謹賞不加無功罰不失有罪後世雖不肖猶得䝉遺烈以自存乎嗚呼有國者安可以無法哉齊國之興亡溫公曰齊地廣而民衆負滄海以臨中夏重以桓宣之賢國家富强及湣王驕汰不可盈厭自取顛沛茍無田單齊不國矣凡遊士言縱橫者雖更相傾覆要之合從者中國之利也齊為三晉燕楚之根柢三晉燕楚為齊之藩蔽秦雖强暴百餘年不能一諸侯以表裏相鈎帶也及齊王建用后勝之謀信秦間之言拱手以事秦不救五國五國已亡而齊并為虜理勢然也誅賞老泉曰夫齊古之强國也而威王又齊之賢王也當其即位委政不治諸侯並侵而人不知其國之為强國也一旦發怒裂萬家封即墨大夫召烹阿大夫與常譽阿大夫者而發兵擊趙魏衛趙魏衛盡走請和而齊國人人震懼不敢飾非者彼誠知其政之弱而能用其威以濟其弱也牛僧孺論齊誅阿大夫語曰齊威王謂阿大夫曰汝孰願吾左右哉曰近吾君者也王曰吾以阿民寄汝是則割吾憂於心者而謂給吾使於宫者為近耶夫宫中之近不過為吾折支矣吾體有所貴是亦有所賤豈以反貴於心乎故入宫之職非近也入心之職為近也順顧走指出入無方者藝之至也授印于外不必在宫者信之至也汝在吾所以信而比吾所以藝不愧冕衣裳哉今則戮汝使卿大夫識逺近之正於是羣臣快賀而國大治君子曰正室之明莫盛乎午者左右陰不至也而齊威安有不明乎淳于髠東坡曰淳于髠言一㪷亦醉一石亦醉至於州閭之㑹男女雜坐幾於勸矣而何諷之有以吾觀之蓋有微意以多方之無常知飲酒之非我觀變識妄而平生之嗜亦少衰矣是以託於放蕩之言而能已荒主長夜之飲世未有識其趣者陳仲子潁濱曰陳仲子處於於陵齊人以為廉孟子曰仲子所居之室伯夷之所築歟抑亦盜跖之所築歟所食之粟伯夷之所樹歟抑亦盜跖之所樹歟人安能待伯夷而後居而後食若是則孟子之責人也以難曰否居於陵而食其食非孟子所謂不可而仲子之所謂不可也仲子以兄之祿為不義之祿而不食也以兄之室為不義之室而不居也天下無伯夷仲子之義為不居且不食也天下不可待伯夷而後居而後食然則非其居於於陵食於辟纑之果汙也而不食於母避兄之室事之不可繼也故曰以母則不食以妻則食之以兄之室則不居以於陵則居之是尚為能充其類也乎君子之行為可充也為可繼也然後行有類若仲子將何以繼之故曰禦人於國門之外而餽以道則不受以不義取之於民而餽以道則受於孔子以不義取之於民者猶禦也其交於孔子何也曰以其非禦也非禦而謂之禦充類至義之盡也君子充其類而極其義則仲子之兄猶盜也仲子之兄猶盜則天下之人皆猶盜也以天下之人皆猶盜而無所答則誰與立乎天下故君子不受於盜而猶盜者有所不問而後可以立於世若仲子者蚓而後充其操也子曰鳥獸不可同羣吾非斯人之與謂是也溫公曰仲子以兄之祿為不義之祿蓋謂不以其道事君而得之也以兄之室為不義之室蓋謂不以其道取於人而成之也仲子蓋嘗諫其兄而其兄不用也仲子之志以為吾既知其不義矣然使食而居之是口非之而身享之也故避之居於於陵於陵之室與粟身織屨妻辟纑而得之也非不義也豈當更問其築與樹之者誰耶以所食之鵝兄所受之饋也故哇之豈以母則不食以妻則食之耶君子之責人當探其情仲子之避兄離母豈所願耶若仲子者誠非中行亦狷者有所不為也孟子過之何其甚歟孟嘗伐秦潁濱曰戰國以詐力相侵伐二百餘年兵出未嘗有名秦昭王欺楚懷王而囚之要之以割地諸侯熟視無敢以一言問秦者惟田文免相於秦幾不得脫歸而怨之乃借楚為名與韓魏伐秦兵至函谷秦人震恐割地以與韓魏僅乃得誰能禦之使田文能奮其威則是役也齊可為壯秦為老有名之兵誰能禦之使田文能奮其威則是役也齊可以東伯惜其聽蘇代之計臨函谷而無攻以求楚國而出師之名索然以盡東國既不可得而懷王卒死於秦由此觀之秦惟不遇威文是以橫行而莫之制耳豈有大義而屈於不義者哉孟嘗養士溫公曰君子之養士以為民也易曰聖人養賢以及萬民夫賢者其德足以敦化正俗其才足以頓綱振紀其明足以燭微慮逺其强足以結仁固義大以利天下小以利一國是以君子豐祿以富之隆爵以尊之養一人而及萬人者養賢之道也今孟嘗君之養士也不恤智慮不擇臧否盜其君之祿以立私黨張虛譽上以侮其君下以蠧其民是姦人之雄也烏足尚哉書曰紂為天下逋逃主萃淵藪此之謂也東坡曰田文所賓禮者至於狗盜皆以客禮食之其取士亦陋矣然微此二人幾不脫於死當是之時雖道德禮義之士無所用之然道德禮義之士當救之於未危亦無用此士也荆公曰世皆稱孟嘗君能得士士以故歸之而卒賴其力以脫於虎豹之秦嗟乎孟嘗君特雞鳴狗盜之雄耳豈足以言得士不然擅齊之强得一士焉宜可以南面而制秦尚取雞鳴狗盜之力哉雞鳴狗盜之出其門此士之所以不至也田單東坡曰田單使人食必祭以致鳥鳶又設為神師皆近兒戲無益於事蓋先以疑似置齊人心中則夜見火牛龍文足以駭動取一時之勝此其本意也潁濱曰樂毅以全燕之兵兼強齊之衆棲田單於即墨諸侯之救不至使天祚燕昭王不死樂毅不亡田單雖智要之歲月兵殘食盡齊之亡可立而待也然單兵不滿萬人堅守一城以抗百倍之師相持五年而無可乘之隙遷延稽故以須天命之復可不謂智過人哉顏蠋東坡曰顏蠋與齊王遊食必太牢出必乘車妻子衣服麗都蠋辭去曰玉生於山制則破焉非不寶貴也然而璞不完士生於鄙野推選則祿焉非不尊達也然而形神不全蠋願得歸晚食以當肉安步以當車無罪以當貴清淨貞正以自娛嗟乎戰國之士未有如魯連顏蠋者也然而未聞道也曰晚食以當肉安步以當車是猶有意於肉與車也夫晚食自美安步自適取於美與適足矣何以當肉與車為哉雖然蠋可謂巧於居貧者也未飢而食雖八珍猶草木也使草木如八珍惟晚食為然蠋固巧矣然非我之久於貧不能知蠋之巧也歷代名賢確論卷二十九
