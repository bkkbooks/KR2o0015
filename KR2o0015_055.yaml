body:
  text: 歴代名賢確論卷五十五先主後主攻劉璋子西東坡子由荆州闗侯子西少游子由孫權稱尊孔眀不與之絶子西龐統中流矢卒子西張温敗子西漢業劉禹錫温公後主即位改年子西陳夀謂蜀不置史注記無官子西法正報德與怨子西攻劉璋子西論先主置酒大㑹於涪曰涪之役陋何足論哉至於樂與不樂之義則有可得而言者傳曰師有功則奏凱歌又曰戰勝以喪禮居之二義孰是吾聞聖人無心以百姓心為心其戰也本所以憂民之憂其勝也不得不樂民之樂故師有功則奏凱歌此無足怪者然道失而後德德失而後仁仁失而後義義失而後禮道至於禮其去本逺矣而況於兵乎欲戰勝以喪禮居之亦無足怪者言樂與不樂皆未之盡也古之處此者外則歌舞而内以喪禮居之東坡嚴顔詩曰先主反劉璋兵意頗不義孔眀古豪傑何乃為此事劉璋固庸主誰為死不二嚴子獨何賢談笑傲碪几國亡君已執嗟子死誰為何人刻山石使我空涕涙吁嗟斷頭將千古為病悸子由詩曰古碑殘缺不可讀逺人愛惜未忍磨相傳昔者嚴太守刻石千嵗字已訛嚴顔平生吾不記獨憶城破節最髙被擒不辱古亦有吾愛善折張飛豪軍中生死何足怪乗勝使氣果若何斫頭徐死了無怒我豈畏死如兒曹匹夫受戮或不避所重壯氣吞黃河臨危閒睱有如此覽碑慷慨思横戈荆州闗侯子西論魯肅以荆州借備曰漢時荆州之地為郡者七劉表之歿南陽入于中原而荆州獨有南郡江夏武陵長沙桂陽零陵備之南奔劉琦以江夏從之其後四郡相繼歸附於是備有武陵長沙桂陽零陵之地曺仁既退闗侯周瑜錯處南郡而備領荆州牧居公安則六郡之地備已悉據之矣其所以云借者猶韓信之言假也雖欲不與得乎魯肅之議正合良平躡足之㡬而周瑜獨以為不然屢勝之家果不可與料敵哉少㳺論魯肅以荆州借備曰魯肅勸吳以荆州之地借先主先主因以取蜀吳王悔之歸咎於肅夫以肅之籌畧過人而其昧有至於此乎以臣觀之吳王雖不欲借荆州以資先主不可得也肅之䇿善矣何則是時曹氏已據中原挾天子以令天下毅然有幷吞諸雄之心袁紹呂布皆為擒滅其能合從并力以抗之者獨仲謀與𤣥德耳此所謂胡越之人未甞相識一旦同舟而遇風波則相應如左右手勢使然也吳人雖欲不借荆州以資先主其可得乎且吳不借荆州則先主必還公安不然則當殺之二者皆不可也昔髙祖入闗與秦父老約法三章秋毫無所犯秦民大恱項羽雖徙之於漢中而髙祖還定三秦如探囊中物耳何則秦民之心已系於漢也方先主東下荆州之人歸者十餘萬或勸速行以據江陵先主曰舉大事必以人為主今人歸吾何棄去是時先主若在公安吳為仇也夫以董卓之罪上通於天王允以罪誅之而李傕郭汜糾合黨與猶能為之報仇何則卓雖兇逆亦一時之望也先主以宗室之英名盖當代士之歸者如水之赴海烏林之役曹公以百萬之衆㳂江而下非其雄畧則周瑜水軍豈能獨勝耶吳若殺之豪傑四靣而至必矣孫氏之亡可立待也由是言之先主借荆州之事拒之則為仇殺之則招禍因而借之則可以合從幷力而抗曹公肅之為吳䇿者豈不善乎然則周瑜嘗欲徙先主置吳盛為築宫多其美女玩好其䇿如何此又大不可也先主常見其髀肉生慨然流涕歎功業之不建其在許也曹公與之出則同輿與之坐則同席竟亦不留此其志豈以美女玩好老於吳者邪史稱曺公聞孫權以土地借備方作書落筆於地彼知先主得荆州輔車之勢成天下未可以遽取也由是言之借荆州之事豈惟劉氏所以取蜀亦孫氏之所以保吳者矣子西論使闗侯爭荆州并與吳連和曰曹公征漢中先主聞之與吳連和分荆州是矣引軍還蜀非也是時蜀有南郡之地而先主以蜀兵五萬居公安若進據襄陽闗侯帥五萬之衆以襲許卷甲疾趨五日而可至事成則天下未可量不成則漢中之師不攻而自退此兵法所謂攻其所必救者初曹公征栁城備勸表以襲許及備據荆州亦不能辦此信天命有在哉子由論先主為闗侯伐吳曰事固有當作而不可作者矣智者論其公私權其輕重而可否可決也蜀先主之於闗侯名雖君臣義則父子也先主入蜀而侯攻曹仁於荆州吳乗其敝侯以敗死先主欲為侯報讎義不可已也然吳蜀之於魏國小而兵弱本以漢季君臣之分締交相親與魏為敵則報讎之義其公且重者在魏也釋魏而事侯之怨則為失所先後矣先主之在白帝也吳之君臣懼而乞和若以讎魏之重俛而從之義無不可也先主念侯之厚拒而不許君臣之義則至矣奮不慮害兵敗而繼之死忘兩國之大計而狥一夫之遺怨則未為得矣諸葛孔眀有言法孝直在必能止君此行雖行亦必不至於敗然則孔眀亦以伐吳為失計矣孫權稱尊孔眀不與之絶子西曰或曰孔眀之不絶吳權耶正耶曰正也非權也六國之時諸侯皆僭矣孟子以為有王者作不皆比而誅之必教之不從而後誅之然則未教之罪王者所不誅孔眀之勢既未能有教吳則吳之僭號疑未可以遽責此王者之法也非權也龐統中流矢卒子西曰龐德公以孔眀為卧龍以士元為鳳雛則士元之齒當少於孔眀孔眀卒時年五十四而士元先卒二十有二年則士元物故尚未三十也豈不惜哉建安二十四年先主始王漢中是嵗闗侯卒眀年黄忠法正卒又眀年張飛卒又眀年馬超馬良卒基業未就而一時功臣相繼淪謝如有物奪之者眀年後主踐阼而舊人獨有孔眀趙雲後七年雲卒又五年孔眀卒而勲舊於是乎盡正卒時四十五超四十七良三十五自餘不著其年飛傳稱少與闗侯俱事先主侯年長數嵗飛兄事之則飛卒時年纔五十許霍峻年四十此數傑者皆以髙才早世而譙周至七十餘而終天不祚漢眀矣孔眀言張温敗子西曰善惡太眀誠取敗之道然人之禍敗有以其道得之者有不以其道得之者若張温之敗可謂不以其道矣尚安可以推求其故哉漢業劉禹錫蜀先主廟詩曰天下英雄氣千秋尚凛然勢分三足鼎業復五銖錢得相能開國生兒不象賢淒涼蜀故妓来舞魏宫前司馬溫公蜀論曰昭烈以敗亡之餘羇旅漢南而能屈體英傑要結同志摧沮勍敵因敗為功顛沛之際不忘德義美矣劉璋昧弱侮而兼之遂奄有巴蜀君臨一隅安樂公材雖不中然委任賢相抗衡中國及姜黄用事而靣縛為虜宜矣後主即位改元子西曰人君繼體踰年改元而章武三年五月改為建興此陳夀所以短孔眀矣以吾觀之似不為過古者人君雖亡尚未即位也眀年正月行即位之禮然後書即位而稱元年後世承襲之初固已即位矣稱元不亦可乎故曰不為過也古者人君襲位未踰年不稱君故子猛不書王子般子亦不書公後世承襲之初固已稱君矣稱元不亦可乎故曰不為過也春秋之時未有一年而二名者如隠公之末年既名之為十一年矣不可復名為桓公元年自紀元已来有一嵗而再易者矣有一嵗而三四易者矣豈復以二名為嫌而曰不可乎故曰不為過也非特此也今之所謂元年與古異矣古之所謂元年者某君之一年也故必踰年而後稱之如前所云後世所謂元年者某號之一年耳嗣位而稱之可也踰年而後稱之亦可也陳夀謂蜀不置史注記無官子西曰禮記人君言則左史書之動則右史書之周禮建官備矣獨不聞有所謂左右史者雖有太史然不以注記為職是時諸侯皆有史豈天子獨闕乎春秋之時卜田宅者占雲日者皆稱太史則太史殆隂陽家流然書趙盾者書崔杼者亦稱太史則太史又似掌注記者盖方是時學者通知天人而卜興廢者亦不純用蓍龜太史伯以祝融之功而推楚國之必興太史趙以虞舜之德而占陳氏之未亡其論誼證據有絶人者故隂陽注記得兼掌之漢司馬談父子為太史令以論著為己任而又掌天官則兼掌之効於茲可見魏晉之際始置著作郎自是太史之職分而為二孔眀之時未也按後主景耀元年史官奏景星見於是大赦改元而曰蜀不置史妄矣法正報徳與怨子西論孫盛非諸葛亮不罪法正太横曰秦昭王以范睢之故至質平原君移書趙王以求魏齊之首李廣誅霸陵尉上書自劾武帝詔曰報恩復讎朕之所望於將軍也復何疑哉國初郭進為山西巡檢民訴進畧奪其女太祖怒曰汝小民也配女當得小民今得吾貴臣顧不可邪驅出之而三人者卒皆有以報國古之英主所以役使豪傑彼自有意哉孫盛所見者小矣歴代名賢確論卷五十五
