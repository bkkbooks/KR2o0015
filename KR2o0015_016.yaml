body:
  text: 歷代名賢確論卷十六哀公三桓陪臣東坡孔子沐浴請討齊潁濱孔子獵較荆公孔子誅少正卯東坡宓子賤賈至子貢存魯亂齊破吳强晉伯越老泉潁濱荆公三桓陪臣東坡論哀公問社宰我對以使民戰栗曰或曰建國各以其土之所宜木為社而宰我不知故孔子非之曰信其然也孔子亦告之以不然而已何必曰成事不說遂事不諫既往不咎者有所不可追悔者何哉昔者哀公患三桓之逼欲以越去之謂孟武伯曰豫及死乎武伯不對由是觀之哀公未嘗斯須忘三桓也古者戮人于社哀公之問社有意于誅也宰我答以戰栗勸之誅也蓋相與為隱焉耳三桓之盛自宣公以來而至于此極矣釋政而授之棄民而豫之五世而不知取也一朝而欲誅之可乎昭公之亡哀公之出皆三桓之禍也故曰成事不說遂事不諫既往不咎以為自修而三桓服無庸誅之也又論季孫之憂在蕭墻之內曰舊說以蕭牆之憂為陽虎之難以吾考之定公五年陽虎始專季氏囚桓子至九年欲殺桓子不克而出奔齊前此者季氏之所為惟虎之聽非二子之罪也定公五年孔子年四十有七冉有少孔子二十九歲蓋年十八而已未能相季氏也定公十二年子路為季氏宰哀公十一年冉求為季氏宰皆見于春秋則伐顓臾非陽虎出奔之前其在季康子之世歟哀公七年季康子伐邾以召吳寇故曰逺人不服而不能來也十四年公孫宿以成叛故曰邦分崩離析而不能守也公患三桓之侈而欲以越去之故曰吾恐季孫之憂不在顓臾而在蕭牆之內也又論天下有道庶人不議曰古者士傳言庶人謗有大事謀及庶人而曰庶人不議非此之謂也天下無道政在大夫至其極也則在陪臣陽虎起于陪臣而執國命當是時蓋有姦民處士襲虎之餘風設為讒言殄行以動搖人主傾覆世臣者故曰天下有道則庶人不議為是類發也史記孔子相魯誅魯大夫亂政者少正卯少正卯若大夫也必書于春秋其不書蓋微者也微而聞政陽虎之類也歟又論諸侯十世大夫五世陪臣三世希不失矣故三桓之子孫微矣曰魯自平王東遷隱公始專征伐至昭公十世而大夫逐諸侯自宣公失政季氏始專魯至定公五世而家臣囚大夫定公之初平子之時季氏用事蓋四世矣陽虎事平子至桓子而亡歷昭公定公蓋二世而曰三世者孔子於其未亡也言之與以為不過是也是時齊晉皆失政髙國鮑晏范中行之徒皆相繼破滅蓋禮樂征伐自諸侯大夫出者其喪敗世數大約不逺是矣禮樂征伐自諸侯出宜諸侯之强也而齊晉及魯皆以失政政逮于大夫宜大夫之强也而三桓以微何也强生于安安生于上下之分定今諸侯大夫皆凌其上而無以令其下矣故諸侯專不過十世而大夫取之大夫專不過五世而家臣取之在易履之六三說而應乎乾則履虎尾不嘻人亨去乾而自用則履虎尾嘻人凶其是之謂乎或曰田常三晉何以不失曰孔子之所言無其德而用其事者也茍有其德雖湯武以諸侯用天子之事猶可若田常三晉雖不足言然其所以有國者豈徒然哉非季氏之比也孔子沐浴請討齊潁濱曰陳成子弒簡公孔子沐浴而朝告於哀公曰陳恆弒其君請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告也孔子為魯大夫鄰國有弒君之禍而恬不以為言則是許之也哀公三桓之不足與有立也孔子既知之矣知而猶告以為雖無益於今日而君臣之義猶有警于後世也子瞻曰哀公患三桓之逼嘗欲以越伐魯而去之以越伐魯而去之豈若從孔子而伐齊既克田氏則魯公室自張三桓將不治而自服此孔子之意也豫以為不然古之君子將有立于世必先擇其君齊桓雖中主然其所以任管仲者世無有也然後九合之功可得而成今哀公之妄非可以望桓公也使孔子誠克田氏而返將誰與保其功然則孔子之憂固在克齊之後此則孔子所不為者也孔子獵較荆公曰獵較刺時也昔孔子仕于魯魯人獵較孔子亦獵較或問乎孟軻曰孔子之仕非事道歟曰事道也事道奚獵較也曰孔子先簿正祭器不以四方之食供簿正不獵較則若無以祭然蓋孔子所以小同於俗猶有義也義固在于可為之域而後之人習於隨者一不權義以之可否汚身貶道豫然以和衆自得甚者傷人倫敗風俗至于無號則諉曰孔子亦嘗獵較矣悲夫作是詩以刺焉獵較獵較誰禽我有國人之恘君子所醜獵較獵較祭占其祥國人之序君子何傷孔子誅少正卯東坡曰孔子為魯司寇七日而誅少正卯或以為太速此叟蓋自知其頭方命薄必不得久在相位故汲汲及其未去發之使更遲疑三日已為少正卯所圖爾宓子賤賈至碑頌曰清靜致理中庸之德至髙明柔克簡易之體大繹微㫖而徵遺論何先生道蔚其威蕤者也先生宣慈在躬精義入神德順乎天性根于仁殷其如雷暖然如春始受業於仲尼終委質于魯君爾乃周道凌遲王風哀思夷狄竊于位號干戈亂于原野則我魯國無齊晉之强定哀非桓文之主三卿有僭虐之政先生處此亂邦從容理邑平心氣而全耳目晏然躋富夀之域焉自非知微知章變化無窮孰能臻此觀夫為政之大體元之要恤孤哀喪舉事問弔訓之以悌加之以孝借五更而悟君賢三老而禀教然後燕居以佚其體張樂以和其人夜漁不戒而信欺吏不威而息是以宣尼惜君之理小子期問君之政暇何其逺哉向使移於有國之君則陶唐之理也施于有政之臣則二南之化也昔舜左禹而右臯陶不下席而天下理周公肴膳在御不解懸而四夷伏小大則異其揆則同天寶初至始以校書郎尉于單父想先生行事徵其頌聲而古碑殘缺苔篆磨滅使立志之士何以揖其遺風焉嗚呼其道存而其事往其人亡而其政息哀哉遂作頌曰鳴琴湯湯宓子之堂清靜無為邑人以康澆風化淳霸俗致王誰謂陽鱎革而為魴皤皤黃髮或師或友芃芃麥苗不稂不莠齊師已卻魯俗斯阜諫或剖心伊人引肘穆穆伊人希聖之才堯舜既往孰為來哉從時卷舒與道徘徊遊泳孔門取容定哀泱泱千古顯顯令德聲隨牧收惠與順息人亡政弊道播神默寂寥夜川惆悵舊園荒祠尚掃苔篆將磷尋風聆韻想見其人年代邈殊精誠暗親再表貞石頌聲惟新子貢存魯亂齊破吳强晉伯越老泉曰君子之道智信難信者所以正其智也而智常至于不正智者所以通其信也而信常至于不通是故君子慎之也世之儒者曰徒智可以成也人見乎徒智之可以成也則舉而棄乎信臣則曰徒智可以成也而不可以繼也子貢之以亂齊滅吳存魯也臣悲之彼子貢者遊說之士茍以邀一時之功而不以可繼為事故不見其禍使夫王公大人而計出于此則臣未見其不旋踵而敗也臣聞之王者之兵計萬世而動霸者之兵計子孫而舉强國之兵計終身而發求可繼也子貢之兵是明日不可用也故子貢之出也臣以為魯可存也而齊可無亂吳可無滅何也田常之將篡也憚高國鮑晏故使移兵伐魯為賜計者莫若抵髙國鮑晏弔之彼必愕而問焉則對曰田常遣子之兵伐魯吾竊哀子之將亡也彼必詰其故則對曰齊之有田氏猶人之養虎也子之於齊猶肘股之於身也田氏之欲肉齊久矣然未敢逞志者懼肘股之捍也今子出伐魯肘股去矣田氏孰懼哉吾見身將磔裂而肘股隨之所以弔也彼必懼而咨計于我因教之曰子悉兵趨魯壓境而止吾請為子濳約魯侯以待田氏之變帥其兵從子入討之彼懼田氏之禍其勢不得不聽歸以約魯侯魯侯懼齊伐其勢亦不得不聽因使練兵搜乘以俟齊釁誅亂臣而定新主齊必德魯數世之利也臣觀仲尼以為齊人不與田常者半故請哀公討之今誠以魯之衆從髙國鮑晏之師加齊之半可以轘田常於都市其勢甚便其成功甚大惜乎賜之不出於此也齊哀王舉兵誅吕氏吕氏以灌嬰為將拒之至滎陽嬰使使諭齊兵及諸侯連和以待吕氏變共誅之今田氏之勢何以異此有魯以為齊有髙國鮑晏以為灌嬰惜乎賜之不出于此也荆公曰豫讀史所載子貢事疑傳之者妄不然子貢安得為儒哉夫所謂儒者用于君則憂君之憂食於民則患民之患在下而不用則修身而已當堯之時天下之民患于洚水堯以為憂故禹于九年之間三過其門而不一省其子也回之生天下之民患有甚於洚水天下之君憂有甚于堯然回以禹之賢而獨安陋巷之間曾不以天下憂患介其意也夫二人者豈不同道哉所遇之時則異矣蓋生于禹之時而由回之行則是楊朱也生于回之時而由禹之行則是墨翟也故曰賢者用于君則以君之憂為憂食于民則以民之患為患在下而不用於君則修其身而已何憂患之與哉夫所謂憂君之憂患民之患者亦以義而後可以為之謀也茍不義而以能釋君之憂除民之患賢者亦恥為之矣史記曰齊伐魯孔子聞之曰魯墳墓之國國危如此二三子何為莫出子貢因行說齊伐吳以救魯復說越復說晉五國由是交兵或强或破或亂或霸卒以存魯觀其言迹其事乃與夫儀秦軫代無以異也嗟乎孔子曰巳所不欲勿施於人已以墳墓之國而欲全之則齊吳之人豈無是心哉奈何使之亂歟吾所以知傳者之妄一也于史考之當是時孔子子貢窮為匹夫非有卿相之位萬鍾之祿也何以憂患為哉然則異于顔回之道矣吾所以知其傳者之妄二也墳墓之國雖君子之所重然豈有憂患為謀之義哉借使有憂患為謀之義則豈可以變詐之說亡人之國而求自存哉吾所以知其傳者之妄三也子貢之行雖不能盡當于義然孔子賢弟子也孔子之賢弟子之所為固不宜至于此矧曰孔子使之也太史公曰學者多稱七十子之徒譽者或過其實毁者或損其真子貢雖好辨詎至于此耶亦所謂毁損其真者哉潁濱曰太史公稱子貢一出存魯亂齊破吳强晉伯越豫觀春秋左傳齊之伐魯本于悼公之怒季姬而非陳恆吳之伐齊悼公之反覆而非子貢吳楚之戰陳乞猶在而恆未任事凡太史公所記皆非也蓋戰國說客設為子貢之辭以自託于孔氏而太史公信之耳孔子有言誦詩三百授之以政不達使於四方不能專對雖多亦奚以為孔子之門所謂言語者初止于此至于子貢加之以巧辨可以解紛結救患難如今所載而已若如公孫衍張儀騁其詭辨傾覆諸侯以快意一時此則孔氏所諱也歷代名賢確論卷十六
