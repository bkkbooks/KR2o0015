body:
  text: 歷代名賢確論卷四十二景帝文景優劣子由朝錯李觀老泉子由少遊何去非竇嬰田蚡東坡郅都權德輿文景優劣子由論曰漢之賢君皆曰文景文帝寬仁大度有高帝之風景帝忌克少恩無人君之量其實非文帝比也帝之為太子也吳王濞世子來朝與帝博而爭道帝怒以博局提殺之濞之叛逆勢激於此張釋之文帝之名臣也以劾奏之貶斥死淮南鄧通文帝之幸臣也以吮癰之怨困迫至死朝錯始與帝謀削諸侯帝違衆而用之及七國反袁盎一説譎而斬之東市曾不之恤周亞夫為大將折吳楚之鋭鋒不數月而平大難及其為相守正不阿惡其悻悻不屈遂以無罪殺之梁王武母弟也驕而縱之幾致其死臨江王榮太子也以母失愛至使酷吏殺之其於君臣父子兄弟之際背理而傷道者一至如此原其所以能全身保國與文帝俱稱賢君者惟不改其恭儉故耳春秋之義弒君稱君君無道也稱臣臣之罪也然陳侯平國蔡侯般皆以無道弒而弒皆稱臣以為罪不及民故也如景帝之失道非一也而猶稱賢君豈非躬行恭儉罪不及民故耶此可為不恭儉者戒也鼂錯李觀曰讀漢史見景帝殺御史大夫鼂錯以姑息吳王濞痛其非罪也故直筆而議按錯潁川人起於諸生事文帝為太常掌故以英詞射策纍擢為中大夫及景帝即位極言獻替未嘗不忠於心乃命副丞相錯所以推心不顧思永漢室而患諸侯侈大上書請削其土是用剪其翼而固其本也度錯之志豈有負漢哉原吳濞之反誠有由然間人骨肉而塞小忿自非上達能不生怨怨端既立臣節安附欲無為逆終不可得也蓋以南方富殖而諸夏初乂狂夫為計料勝一舉遂搖長舌交結七國借誅錯為名景帝無非常之見而聽亂臣一説乃斬錯不問冀其紓難而七國之兵曾不少減是以察其來不為錯明矣且袁盎與錯宿不相善於景帝豈不知二臣之不叶而聽偏議是為臣之報隙也若宗社何及鄧公吳還乃欷􅒣長悲益為天子之羞爾始高祖封濞於吳已識東南之必亂于時豈有錯削地之議蓋天之厯數有理亂也脫使無梁國以絶其道無條侯以耀其武則秦之鹿復駭盎之肉可食初錯介然孤立指畫高議大臣疾小臣怖人人束約各欲倳刃其父知其必戮也而深病之答曰所以尊君上安宗廟父曰劉氏安鼂氏危矣吾不忍見禍及先禍死矣噫夫史臣責錯之父不逮趙括母何其鄙也夫趙括持必敗之勢而母言於趙王不可使將及括失律母以先見獲宥鼂錯用至忠之略與必敗之勢異也其父雖懼禍至奈其子所籌國之大事也且使括母言之足稱明婦人也使錯父言之是沮其子為忠也孰可擬議或人有復言錯忠則有矣而智不足愚則不爾夫忠所以補君智所以濟身茍圖濟身則忠有不遂忠有不遂是臣不臣亦何生為賊由袁盎昧在景帝非智之短時不與也古云直木先伐愚智何道哉老泉曰昔者高祖急於滅項故舉數千里之地以王諸將項籍死天下定而諸將之地因遂不可削當是時非劉氏而王者八國高祖懼其且為變故大封吳楚齊趙同姓之國以制之既而信越綰皆誅死而吳楚齊趙之強反無以制當是時諸侯王雖名為臣而其實莫不有帝制之心膠東膠西濟南又從而和之於是擅爵人赦死罪戴黃屋刺客公行匕首交於京師罪至彰也勢至逼也然當時之人猶且徜徉容與若不足慮月不圖歲朝不計夕循循而摩之喣喣而吹之幸而無變以及於孝景之世有謀臣曰鼂錯始議削諸侯地以損其權天下皆曰諸侯必且反錯曰固也削亦反不削亦反削之則反疾而禍小不削則遲而禍大吾懼其不及今反也天下皆曰鼂錯愚吁七國之禍終於不免與其發於逺而禍大不若發於近而禍小以小禍易大禍雖三尺童子皆知其當然而其所以不與錯者彼皆不知其勢將有逺禍與知其勢將有逺禍而度已不及見謂可以寄之後人以茍免吾身者也然則錯為一身謀則愚而為天下謀則智人君又安可捨天下之謀而用一身之謀哉今者胸奴之強不減於七國而天下之人又用當時之議因循維持以至於今方且以為無事而愚以為天下之大計不如勿賂勿賂則變疾而禍小賂之則變遲而禍大畏其疾也不若畏其大樂其遲不若樂其小天下之勢如坐弊船之中駸駸乎將入於深淵不及其尚淺也舍之而求所以自生之道而以濡足為解者是固夫覆溺之道也聖人除患於未萌然後能轉而為福今也不幸養之以至此而近憂小患又憚而不決則是逺憂大患終不可去也赤壁之戰惟周瑜吕蒙知其勝伐吳之役惟羊祜張華以為是則宏逺深切之謀固不能合庸人之意此朝錯所以為愚也雖然錯之謀猶有遺憾何者錯知七國必反而不為備反之計云云東坡曰天下之患最不可為者名為治平無事而其實有不測之憂坐觀其變而不為之所則恐至於不可救起而強為之則天下狃於治平之安而不吾信唯仁人君子豪傑之士為能出身為天下犯大難以求成大功此固非勉強期月之間而茍以求名者之所能也天下治平無故而發大難之端吾發之吾能收之然後能免難於天下事至而循循焉欲去之使他人任其責則天下之禍必集於我昔者鼂錯盡忠為漢謀弱山東之諸侯諸侯並起以誅錯為名而天子不察以錯為説天下悲錯之以忠而受禍不知錯之有以取之也古之立大事者不惟有超世之才亦必有堅忍不拔之志昔禹治水鑿龍門決大河而放之海方其功之未成也蓋亦有潰冒衝突可畏之患唯能前知其當然事至不懼而徐為之所是以得至於成功夫以七國之強而驟削之其為變豈足怪哉錯不於此時捐其身為天下當大難之衝而制吳楚之命乃為自全之計欲使天子自將而已居守且夫發七國之難者誰乎已欲求其名安所逃其患以自將之至危與居守之至安較易知也己為難首擇其至安而遺天子以至危此忠臣義士所以憤惋而不平者也當此之時雖無袁盎錯亦未免於禍何者已欲居守而人主自將以情而言天子固已難之矣而重違其議是以袁盎之説得行於其間使吳楚反錯以身任其危日夜淬厲東向而待之使不至纍其君則天子將恃之以為無恐雖有百袁盎可得而間哉嗟夫世之君子欲求非常之功則無務為自全之計使錯自將而擊吳楚未必無功惟其欲自固其身而天子不悅姦臣得以乘其隙錯之所以自全者乃其所以自禍歟子由論曰老子曰柔勝剛弱勝強文帝以柔弱御天下剛強者皆乘風而靡尉他稱號南越帝修其墳墓召貴其兄弟他去帝號俯伏稱臣胸奴桀敖凌駕中國帝屈體遺書厚以繒絮雖未能調伏而兵革之禍比武帝世十一二耳吳王濞包藏禍心稱病不朝帝賜之几杖濞無所發怒亂以不作使文帝尚在不出十年濞亦已老死則東南之亂無由起矣至景帝不能忍用鼂錯之計削諸侯地濞因之號召七國西向入關漢遣三十六將軍竭天下之力僅乃破之錯言諸侯強大削之亦反不削亦反削之則反疾而禍小不削則反遲而禍大世皆以其言為信吾以為不然誠如文帝忍而不削濞必未反遷延數歲之後變故不一徐因其變而為之備所以制之者固多術矣猛虎在山日食牛羊人不能堪荷戈而往刺之幸則虎斃不幸則人死其為害亟矣鼂錯之計何以異此若能髙其垣墻深其陷穽將伺而謹防之虎安能必為害此則文帝之所以備吳也嗚呼為天下慮患而使好名貪利小丈夫制之其不為鼂錯者鮮矣少遊曰世之論者皆以為漢用袁盎之謀斬鼂錯以謝天下為非是以臣觀之漢斬錯七國之兵所以破也何則勝敗之機係於理之曲直理直則師壯師壯勝之機也理曲則師老師老敗之機也善戰者戰理昔晉欲報楚之惠退師三舍軍吏以為師老子犯曰師直為壯曲為老若子犯可謂善戰理矣蓋不退師則背惠食言而曲在晉師退而楚不還則曲在楚我直彼曲所以勝也漢斬鼂錯之事何異於此夫漢之諸侯連城數十地方千里雖號強大然皆高帝之封也一旦用錯計摘其罪過而削奪之則天下忿然皆有不直漢之心當此之時諸侯直而漢曲故吳王得以藉口反也然吳即山鑄錢煮海為鹽以其子故招致天下亡命欲為反者三十餘年其稱兵也發憤削地以誅錯為名耳漢斬錯而兵不罷則逆節暴露天下亦忿然有不直七國之心當此之時諸侯曲而漢直故太尉得以破其兵也雖然漢之斬錯也其謀發於袁盎盎與錯有隙故世之論者以錯死為寃此正樓緩所謂以母言之則為是以妻言之則為妬夫言之者異而其言同也使盎與錯素無眥睚之嫌其為漢計亦當出此然則漢不斬錯奈何即七國之兵未易破也何以知之以唐安祿山之事可知也方明皇之時姦臣楊國忠用事天下皆切齒不平故祿山以誅國忠為名而反是時唐若斬國忠以謝天下則祿山安得而至長安乎惜其不知此至賊入潼關人神共怒然後為陳元禮之所殺也由是言之漢不斬錯則七國之兵豈易破哉或曰王思禮之徒嘗以此勸哥舒翰用其計留卒三萬守關悉精鋭渡滻水以誅君側祿山可遂破乎曰不然漢斬錯事出景帝袁盎發其端而已故足以激忠義之氣而折姦雄之心使翰雖斬國忠事不出於人主亦不能感動天下祗足以危身矣尚為祿山之成敗哉斬國忠以破祿山事非明皇不可為也何去非曰古者持國任事有四臣焉杜患於未兆弭災於未形者賢臣也禍結而排之使安難立而勘之使平者功臣也國安矣挈而措之危世治矣汨而屬之亂者非愚即姦臣也蓋姦臣之不足者忠愚臣之之不足者知忠知不足而持國任事禍之府也昔者鼂錯嘗忠於漢矣而其知不足以任天下之大權也是以輕發七國之難而其身先戮於人之一言可不謂愚乎彼錯者為申商之學鋭氣而寡恩好謀而喜功之臣者也自孝景之居東宫而錯説之以人主之術數也固以智籠之矣及其即位而以天下聽之彼挾其君之以天下聽之也欲就其所謂術數之效是以輕為而不疑決發而不顧卒以憂君危國幾成劉氏之大變而後世之士猶或智之獨子雲乃謂之愚子雲之愚錯也非以其智不足以衛身而愚之也亦以其不能杜七國未發之禍而故趣之其亂也東諸侯之勢誠強矣強而驕驕而反亦其理也然而束之而使無驕御之而使無反者豈固無術耶而錯之策曰削之不削皆且反也削之則反速而禍小不削則反遲而禍大是錯之術無他趣之以速反而已錯之所謂禍小者以吾朝削其地而暮得其民故也安有數十年拊循之民一旦而遂不為之役也吳王所發五十萬之衆者皆其削郡之民也連七國百萬之師西嚮而圖危關中乃曰禍小者真愚也夫七國之王獨吳少嘗軍旅為宿姦故惡其六王皆驕夫孱稚非有高材絶器挾智任術足以就大計者其謀又非前締而宿合之也今一旦徜徉相視而起皆吳實迫之欲并以為東帝之資耳當孝文之世濞之不朝發於死子之隙而反端著矣賈誼固嘗為之痛哭矣然而孝文一切包匿不窮其姦而以恩禮羈之是以迄孝文之世三十餘年而濞無他變也濞之反於孝景之三年而其王吳者四十二稔矣齒髮固已就衰而鄉之勇決之氣與夫驕悍之情窺覬之姦皆已沮釋矣今一旦奮然空國西嚮計不反顧者濞豈得已哉有錯之鞭趣其後以起之也昔高帝之王濞者三郡且南面而撫其國者四十餘年錯之任事一旦而削其二郡楚趙諸齊皆以暗隱微慝奪其封國之半彼固知其地盡而要領隨之是以出於計之無聊為一決耳向使景帝襲孝文之寬假而恩禮有加焉而錯出於主父偃之策使諸侯皆得以其封地分侯支庶以弱其勢則濞亦何事乎白首稱兵冀所非望而楚趙諸齊不安南面之樂而甘為濞役也吳王反虜也固天人之所共棄未有不至於敗滅者然亦幸其未為曉兵者也使其誠曉兵則關東非漢有而錯之罪可勝戮哉方濞之起也其謀於宿將則曰必先取梁其謀於新將則曰必先據洛二策者皆勝策也而吳王昧於所用故敗亡隨之其曰必先取梁者梁王親景帝之母弟國大而強北距泰山而西界高陽今釋梁不下而兵遂西則漢衝其膺梁搗其脊不戰而成擒矣此宿將以先取梁為功者圖全之策也所謂以正合者也雒陽阻山河之固扼西兵之衝積武庫之械豐敖倉之粟今不疾據而徐行留攻則漢騎騰入梁楚之郊以蹙之敗可立待也此新將以先據雒為功者立竒之策也所謂以竒勝者也二策者皆勝策也雖反國之虜無所恃之亦兵家之至數也幸其當時無以雙舉而並施之以教之也是以吳王用其攻梁而不用其據雒此所以亟敗也所謂雙舉而並施者鋭師卷甲以趨洛陽重兵疾攻以覆梁都雖無能入關而山東舉矣知取梁而不知取雒則漢兵得以東下知據雒而不知取梁則梁兵得以躡後使鋭師據雒而重兵攻梁雒已據則漢兵不能即東漢兵不東則必舉梁梁舉而山東定矣幸其不出於此乃屯聚而不分以壓梁壁梁未及下而亞夫之軍馳入滎陽而壁昌邑矣求戰不得欲去不可倣徨無所而坐成擒故曰幸其未為曉兵者也向使吳王兩用其策而又假田祿伯之偏師提之以趨武關周丘長驅遂歷陽城之北反雖不遲而禍實大矣嗚呼孰謂鼂錯非真愚者哉竇嬰田蚡東坡曰竇嬰田蚡俱好儒術推轂趙綰王臧迎魯申公欲設明堂令列侯就國除關以禮為服制欲以興太平會太后不悅綰臧下吏嬰蚡皆罷觀嬰蚡所為其名亦善矣然嬰既沾沾自喜蚡又專為姦利太平豈可以文致為哉申公始不能用穆生言為楚人所辱亦可以少懲矣晚乃為嬰蚡起又可以一笑鳯凰翔於千仞烏鳶彈射不去誠非虛語也郅都權德輿酷吏傳議曰詩美仲山甫曰剛亦不吐柔亦不茹故體備健順是謂全德不然則直已循性能秉一方事舉於中皆理道也得柔之道者為循吏失剛之理者為酷吏司馬氏修史記始作三傳以誡世爾而復以郅都為酷吏傳首愚有惑焉都之為中郎將上欲搏野彘活賈姬從容奏議引宗廟太后之重其為濟南守誅豪猾首惡又道不拾遺其為中尉宗室貴臣斂手側目為鴈門守胸奴不敢近邊至為偶人像之騎射莫能中然其勇敢氣節根於公亷不發私書不受請寄具此數者為漢名臣且入居公卿出總列郡堅剛忠純終始若一坐臨江之嫌當太后之怒身死漢庭手是異處有以見漢氏之不綱王澤之弛絶也蓋在史氏發而明之以旌事君以勵使臣俾百代之下有所懲創子長既首冠酷吏班氏又因而從之善善惡惡之義於此缺矣夫以推埋沈命侮文巧詆之徒目為等夷雜列篇次至其述贊雖云引是非爭大體又何補焉噫嘻洪範之沈潛大易之直方皆臣道也都雖未蹈之斯近之矣不隱忠以避死不枉道以蒞官無處父之華異申棖之欲所至之邦必以稱職聞其古之剛而無虐怒而中節者歟剛似酷弱似仁在辨之不惑而已天下似是而非失之多矣豈獨是哉歷代名賢確論卷四十二
