body:
  text: 歷代名賢確論卷七十二髙宗廢立皇后石守道孫之翰追尊上祖并髙祖太宗文穆文德二后帝自稱天皇后自稱天后孫之翰追諡太子為皇帝范祖禹改元顯慶孫之翰封禪改元乾封孫之翰于志寧請衡山公主俟三年喪成婚范祖禹責五品以上言事范祖禹斥許敬宗對彗星為髙麗滅之兆范祖禹來公敏諫止幸涼州范祖禹劉仁軌請李敬立鎮洮河以陷之孫之翰李績范祖禹孫之翰長孫無忌范祖禹孫之翰上官儀郝處俊孫之翰劉仁軌張唐英總論髙宗范祖禹子由廢立皇后石守道曰吁虐哉髙宗也隋氏酷民塗炭太宗援之以仁義躋之於富壽民方出死地而登樂土髙宗溺於一婦人輕以天下授之民復塗炭者二十年信矣髙宗之虐也初太宗不豫執髙宗手顧謂褚遂良長孫無忌曰我好兒我好新婦今付卿暨王皇后廢立則天後唐室幾為丘墟李氏子孫繼踵殺戮皆髙宗之虐毒及於祖先流於後世也噫皇后者宗廟之本也天下之母也天子理陽道后理隂德君治外事后聽內政君之與后猶日之與月也隂之與陽也立之必以存天下之大公繫宗廟之大本為社稷之大計合於天地人心而後可以得立也廢之必以存天下之大公係宗廟之大本為社稷之大計合於天地人心而後可以得廢也髙宗專一人之欲徇一人之愛不顧天下大公宗廟大本社稷大計而以一時之私情自廢立卒貽武氏之禍幾乎覆宗絶祀為虐不亦甚乎孫之翰曰髙宗即位數年奉先帝成法以臨天下頗得守文之體一日昏惑自恣不奉天戒雖前代荒亂之主少過之者天子之貴嬪御之衆何至私先帝才人使逞險譎之計誣陷中宫為國大醜且晉邸升為皇儲即位之年地震久而不止是天意以隂盛為戒也太宗臨終顧無忌遂良稱好兒好婦是以家國之事付託於大臣也武氏詭計初行方議廢立遂良以死爭之是不負先帝之付託也嗚呼先帝付託於臨終天地示戒於連年大臣力爭於所議稍近中常之主當知事理甚明不可不念況髙宗少為聖父教訓正人輔導豈全不辨事理乎但內惑嬖者之計外納姦人之言上不奉天戒次不遵父命下不顧忠議徇一時之欲以至於此心知皇后無辜而憫之反為嬖者戕殘都不敢問此又孱懦之態甚矣使文武之臣蕃夷之長共朝嬖者此又亂禮之甚前代未之有卒使嬖者擅人主之權害宗室殺大臣幾移宗社實髙宗之過也然髙宗之過雖姦黨所贊亦由李績微言于志寧顧望致之爾李績荷先帝付託志寧任宰弼之重若稍助遂良無忌韓瑗來濟之言姦黨豈能動乎是極諫髙宗之過者遂良也成就髙宗之過者李績志寧也故書曰右僕射河南郡公褚遂良諫廢立皇后降漳州都督書其官爵明稱大臣之任也諫廢立明廢者不當廢立者不當立也因諫而明無罪也遣績志寧立皇后不書其官但名之者明績志寧無大臣之節所以賤之也書臨軒立皇后而不曰帝見髙宗無人君之體矣追尊上祖并髙祖太宗文穆文德二后帝自稱天皇后自稱天后孫之翰曰諡所以尊名也古之天子諸侯卿大夫善名雖多惟取一大善為稱不使名浮於善也歷代帝王諡號或實或虛不能盡如古制然必以祔廟之始一二字為定髙祖起義兵雖出太宗之謀然親平大亂成就王業諡武宜矣太宗本以武功定天下即位之後行王道致太平推誠人心幾致刑措紀綱號令與治古同諡文宜矣今髙宗加諡髙祖曰神堯不惟越禮適所以辱之也髙祖於堯之道安可擬況稱曰神堯人必謂不稱其名既知不稱得非辱之也二后加號神聖尤乖其實孟子曰大而化之之謂聖聖而不可知之謂神豈中宫之位可當其號乎此蓋武后自欲尊大妄稱天后髙宗遂稱天皇髙宗與后既欲稱號不常遂追尊祖宗二后用掩其迹嗚呼為天子徇后之欲僭大其稱瀆祖宗亂典禮使後嗣觀之益尚崇飾此髙宗之過也髙宗之過亦由大臣有司不守經義逢君之惡所致爾追諡太子為皇帝范祖禹曰皇帝者有天下之號茍無其位非所以為贈諡也父沒而後子立今父在而追尊其子豈禮也哉李泌以為武后欲謀篡位鴆太子洪蓋髙宗不之知而後復加之尊名以掩其迹是時政出於后髙宗尸位而已其後明皇追諡寧王憲代宗追諡建寧王倓以此為故事皆不正之禮不可為後世法也改元顯慶孫之翰曰人君即位之年謂之元年者元始也人君布政自兹而始首月謂之正月取其正始之義也厥後以數繼之終於一世焉此前古聖人不易之法也至漢文帝惑方士之言改後元年始亂古制孝武因事别立年名歷代帝王皆遵尚之唐武德貞觀雖為年號各終一世不復改元此於古制不失髙宗守成何為不奉祖宗之法且在位七年矣而謂之元年於理安乎若以立太子之始得以改元不知天下事統於天子乎統於太子乎事不師古而至於此由大臣昧於經義而然也封禪改元乾封孫之翰曰太宗以大功大德平治天下其朝廷之事則賢才在位法度施設其生民之樂則刑罰幾措嵗時屢穰其四夷之服則大者來臣小者安帖前古聖王之治何以加焉尚謂封禪盛德之事慮已所為未當天心終不行其禮髙宗在位十餘年雖賴先帝遺德生民安業四夷不動奈朝廷之事姦人亂政忠賢竄戮太子廢殺臨朝聽斷則中宫埀簾於後得以預聞威福之施不専於已此大亂已見有何功德可以告成蓋徇后之欲舉稀闊儀物誇耀天下爾登封之後嵗飢民困日食彗見連年不已豈非功德之薄妄告於天又千乘萬騎之行勞費民力干動和氣所致也姦人預慮天時不順先引漢乾封故事建為年號若以嵗旱為乾封則民之飢困災變頻仍是果天祐哉為天下者切戒於此勿輕議盛德之事于志寧請衡山公主三年喪畢成婚范祖禹曰書曰三載四海遏密八音君喪三年自古以來未之有改也漢文率情變禮薄於喪紀始令吏民三日羣臣三十六日而釋服雖欲自損以便人而不知使人入於夷狄也自是以後民不知戴君之義而嗣君遂亦不為三年之服唐之人主鮮能謹於禮者故有公除而議昏亮隂而舉樂內無父子外無君臣而欲教化行禮俗成難矣夫君者父道也臣者子道也無君是無父也況人君而可以無父乎若君服於內臣除於外是有父子無君臣也為國家者必務革漢文之薄制遵三代之隆禮教天下以方喪三年則衆著於君臣之義矣責五品以上言事范祖禹曰太宗嘉納直言導羣臣以諫爭是以論闕失者日相繼也後嗣承其餘烈以髙宗之暗而求言於臣下如此由其祖宗為之法也詩曰貽厥孫謀以燕翼子太宗之謂矣斥許敬宗對彗星為髙麗滅之兆范祖禹曰天垂象聖人則之三辰之眚天所以警戒人君也昔齊景公欲禳彗星晏子曰彗所以除穢也君無穢德又何禳焉若德之穢禳之何損而許敬宗諂諛人主歸咎髙麗豈不矯誣上天乎髙宗庸昏而猶能出人君之言其至誠足以動天矣然則自古失道之君未必其身親為不善也姦佞之臣納之於惡者蓋多矣亦可以為戒哉來公敏諫止幸涼州范祖禹曰自褚遂良韓瑗來濟之逐長孫無忌之死天下以言為諱久矣而髙宗責羣臣之不言若賢主之所為何哉蓋親見太宗孜孜求諫聽受直言於心不忘而欲慕其名是以時亦為之及其溺於所愛不顧禮義則雖以元舅之親顧命之臣以先帝遺言爭之確乎其不可入也涼州之不行得非武后之意乎何其從其細雖曰能聽諫而謹其細行亦不免陷於大惡也劉仁軌請李敬玄鎮洮河以陷之孫之翰論李敬玄統兵曰王者能知人能駕馭臣下不欺矣將相不忌賢不私怒國事盡濟矣敬玄不練邊事與仁軌立異此於廟堂之上恥所不能忌其賢而違其議也仁軌知敬玄非將帥才決請鎮守使之敗辱此恃其功名欺君以逞私怒也髙宗不察敬玄不能統兵但徇仁軌意遣之尋致兵師敗衄自損國威此昧知人之明失馭臣之術也是舉也君臣之間俱不免過然仁軌之過大矣李績范祖禹論帝欲求諫績對以陛下所為盡善羣臣無得而諫曰甚矣李績之佞也陷君於過又諂以悅之君有求諫之心而人臣無納忠之志其罪大矣績本羣盜不學無識可為將而不可為相以輔少主居伊周之地非其任矣又論績將死以房杜為戒曰易曰積善之家必有餘慶積不善之家必有餘殃君子如欲澤及其子孫世守其門户則莫若積善以遺之而已矣房杜事君以忠其子孫不肖覆宗絶祀出於不幸非其積不善也李績一言而廢母后立孽女殺忠臣罪不容誅得死牖下幸矣至於子孫率羣不逞以起兵以興復為辭而希覬非望之福戮及父祖剖棺暴尸豈非餘殃哉而績之將死乃以房杜為戒可謂不能省已者矣古者父子之間不責善骨肉之親無絶也而有志氣不倫交遊非類者遽使殺之殘忍無親何異於夷貊乎非所以為訓也孫之翰論命績為僕射曰唐采魏晉而下歷代任宰輔之制以僕射侍中中書令為正宰相故僕射二品侍中中書門下三品本由李績自尚書授詹事詹事卑於尚書藉其輔翊太子而授之同中書門下三品者得預聞國政比侍中中書令之任也今績授開府儀同三司又改僕射開府從一品僕射從二品今同三品者豈不與立號意乖乎又杜佑通典曰同中書門下三品當以階卑官髙今所給祿秩同品爾按此似非位署後同三品者止記初命率不以為位號也長孫無忌范祖禹論髙宗欲立武后先官無忌妾子曰髙宗欲廢后而立妾故官無忌妾子又重賂以悅之誘之以利非德賞也而無忌受其官與賜豈未之思乎大臣欲以義正君而先役於利則不足以為重矣無忌茍辭其官反其賜而不受使其君知大臣之不可誘以利亦足以格其非心而益見憚矣無忌不知出此卒使武后怨其受賜而不助已姦臣得以入謀髙宗無足譏焉惜乎無忌之不學也孫之翰論帝以許敬宗告無忌反遂逐無忌曰人主之惑讒言由不知其人為弊爾髙宗於許敬宗非不知其人也且如敬宗修太宗實録移威鳯賦事髙宗明知不足傳信修史尚髙下其筆事不可信鞫獄之際事外言所嫉之人大罪豈得信乎況無忌親則元舅位則三公忠亮之誠許國甚大一姦人讒之不自臨問遂竄遐裔此非不知敬宗之誣陷無忌之非辜正欲快嬖者之意使元舅以勳德重望寃死遐裔不惟昏惑之甚實不仁不孝之過也范祖禹論帝責李義琰令舅氏遷墓曰髙宗責義琰為宰相而陵其母家不可率天下斯言當矣然已以讒殺元舅而不自知其惡何以責臣下之薄於母黨乎由此觀之自古人主能知其過者鮮矣上官儀郝處俊孫之翰論帝殺上官儀曰易有君不密失臣之戒春秋有君漏言之譏聖人垂法使人君與臣下謀議不可輕露致罹其患故申於易著於春秋丁寧如是也況君乘怒自謀使臣預議一日推過於臣殺之此豈人君之道髙宗立武后過惡甚矣后延人行厭勝法廢之固宜方與上官儀定議后遽伸訴兹已不密之致若便行廢黜后何所為反懼后怨言儀教我此乃婦人童子之態爾遂使姦人承后之意誣皇子大臣殺之士大夫無罪被逐者甚衆后威權日盛養成篡奪之勢皆由髙宗之不君矣又論郝處俊不令后攝政曰處俊諫髙宗不令武后攝政可謂社稷之臣也自上官儀被殺髙宗為后所制奪其威權內外畏之無敢忤其意者髙宗數因疾欲令攝政亦勢逼而然也處俊不顧禍患懇諫其事至引魏令不許皇后臨朝為證是時也處俊之心止知有社稷計不知有身計也言既激切復經義明白又得義琰為助雖昏主悍后義不能違矣夫人臣之事君也見大過而不敢言臨大事而不敢當者正欲保位而避禍也處俊當武后擅權上下危逼之際忠言確論力救其事義琰協心助為之言二公竟保大位不罹其禍如于志寧輩預廢立皇后之議顧望不言乃保位避禍之意也然竟不免譴黜止一刺史而殁但得畏懦不忠之名為世所罪又豈能保位避禍乎則人臣事君不可自計利害也夫邪正在於所守禍福繫於所值守者已也不可不固值者時也此不可必惟不失忠義大節則窮通死生賢矣劉仁軌張唐英曰咸亨中戴至德與仁軌為左右僕射每有申訴寃枉仁軌輒美言許之時號解事僕射至德即據理詰難未嘗與奪有理者密為申奏時號不解事僕射噫二子優劣可見之矣夫臣子之道勤勞所以立功忠恕所以立名退讓所以全美朴厚所以任事若至德之心近此四者矣仁軌則不然掠公家之美以為公務容悅之容以求名啓奔竸之塗以為美煽澆薄之風以為任乃乾沒邀利之徒非謀猷稱后之臣而世之庸庸者不責其實不原其心探其言樂其多可從而倡和以為賢者而至德名反在其下昔王莽好諂諛悅人以收天下之心卒移漢祚雖仁軌非有此心然恐後世好名邀美之士飾正於外藏詐於內迹而行之則賢不肖混殽而姦邪之漸浸潤矣故論之以為後世容悅之戒總論髙宗之政范祖禹論永徽有貞觀風曰髙宗即位之初日引刺史問民疾苦尊禮輔相恭已以聽故永徽之政有貞觀之風察道裕希旨而自責行已之不足取信觀胡人進戲而知所好之不可不慎率是道也豈不足為賢君哉不數年而悖繆昏惑忠臣不可諫骨肉不相保雖享國日久卒成武氏之篡何哉初親賢後用佞也書曰孺子其朋孺子其朋其往周公所以戒成王也況髙宗乎子由論髙宗知足以保身曰髙宗之淫昏孱暗又內為悍妻操制其柄外聚羣不逞於朝而禍不及其身者有以也非幸也其智蓋有足以自衛者彗見東方言者謂髙麗將亡之祥上曰髙麗小夷且亦吾民也夫是言能出諸口則亦有不可欺者以廢子賢故怒其人常與賢交通令其父訓之其父即手殺之上聞而不善也更貶其父夫刑政能如是則希其意者必相戒而天下聞之猶有父子之義焉夫能酌理而不可盡欺參以義而諂有所不受其應物之際不失十五此足以保其身矣歷代名賢確論卷七十二
