body:
  text: 歷代名賢確論卷四十五昭帝明察燕王之譖霍光李德裕子由宣帝昌邑王東坡霍光東坡溫公陳無巳宣帝論漢家以王道雜霸溫公蕭望之殺韓延壽溫公宣帝詰責杜延年東坡黃霸東坡張安世少遊趙充國東坡元帝用儒李德裕孫明復任用恭顯李德裕吳筠溫公白樂天免諸葛豐左遷周堪張猛溫公貢禹溫公韋玄成少遊王昭君程晏六一二疏東坡明察燕王之譖霍光李德裕曰人君之德莫大於至明明以照姦則百邪不能蔽矣漢昭帝是也年十四而知燕王書詐後有譖霍光者上輒怒曰敢有譖毁者坐之周成王有慙德矣髙祖文景俱不如也成王聞管蔡流言覩召公不悅遂使周公狼跋而東鴟梟之詩作矣漢髙聞陳平去魏背楚欲捨腹心臣漢文惑季布使酒難近罷歸股肱郡疑賈生擅權紛亂復疏賢士景帝信盎誅鼂錯兵解遂戮三公所謂執狐疑之心來讒賊之口使昭帝得伊吕之佐則成康不足侔矣惜哉霍光不學無術未稱其德然輕徭薄賦與人休息胸奴和親百姓充實議鹽鐵而罷榷酤亦信任忠臣之效也才弱冠而殂功德未盡良可痛也子由曰周成王以管蔡之言疑周公及遭風雷之變發金縢之書而後釋然知其非也漢昭帝聞燕王之譖霍光懼不敢入帝召見光謂之曰燕王言將軍出都肄郎道上稱蹕又擅調益幕府校尉二事屬耳燕王何自知之且將軍欲為非不待校尉左右聞者皆伏其明光由是獲安而燕王與上官皆敗故議者以為昭帝之賢過於成王然成王享國四十餘年治致刑措及其將崩命召公畢公相康王臨死生之變其言琅然不亂昭帝享國十三年年甫及冠功未見於天下其不及成王者亦逺矣夭夀雖出於天然人事常參焉故吾以為成王之夀者周公之功也昭帝之短折霍光之過也昔晉平公有蠱疾醫和視之曰是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不祐國之大臣榮其寵祿任其大節有災禍興而無改焉必受其咎以此譏趙孟趙孟受之不辭而霍光何逃焉成王之幼也周公為師召公為保左右前後皆賢臣也雖以中人之資而起居飲食日與之接逮其壯且老也志氣定矣其能安富貴易生死蓋無足怪者今昭帝所親信惟一霍光光雖忠信篤實而不學無術其所與共國事者惟一張安世所與斷幾事者惟一田延年士之通經術識義理者光不識也其後雖聞久陰不雨之言而貴夏侯勝感蒯聵之事而賢雋不疑然終亦不任也使昭帝居深宫近嬖幸雖天資明斷而無以養之朝夕害之者衆矣而安能及逺乎人主不幸未嘗更事而履大位當得篤學深識之士日與之居示之以邪正曉之以是非觀之以治亂使之久而安之知類通達強立而不反然後聽其自用而無害此乃臣之職也不然小人先之悅之以聲色犬馬縱之以馳騁田獵侈之以宫室器服志氣已亂然後入之以讒説變亂是非移易白黑紛然無所不至小足以害其身而大足以亂天下大臣雖欲有言不可及矣語曰君子學道則愛人小人學道則易使故人必知道而後知愛身知愛身而後知愛人知愛人而後知保天下故吾論三宗享國長久皆學道之力至漢昭帝惜其有過人之明而莫能導之以學故重論之以為此霍光之過也昌邑王東坡論霍光疏昌邑王罪曰觀昌邑王與張敞語真風狂不慧者爾烏能為惡廢則已矣何至誅其從官二百餘人以吾觀之其中從官必有謀光者光知之故立廢賀非専以淫亂故也二百人方誅號呼於市曰當斷不斷反受其亂此其言謀明矣特其事祕密無緣得之著此者亦欲後人微見其意也武王數紂之罪孔子猶且疑之光等疏賀之惡可盡信邪霍光東坡曰古之人惟漢武帝號知人蓋其平生所用文武將帥郡國邊鄙之臣左右侍從隂陽律厯博學之士以至錢穀小吏治刑獄使絶域者莫不獲盡其才而各當其處然猶有所試其所試皆功效著見天下之所共知而信者至于霍光先無尺寸之功而才氣數術又非有以大過於羣臣而武帝擢之于稠人之中付以天下後世之事而霍光又能忘身一心以輔幼主處於廢立之際其舉措甚間而不亂此其故何也夫欲有所立于天下擊搏進取以求非常之功者則必有卓然可見之才而後可以有望于其成至于捍社稷託幼子此其難者不在乎才而在乎節不在乎節而在乎氣天下固有能辦其事者矣然才高而位重則有僥幸之心以一時之功而易萬世之患故曰不在乎才而在乎節古之人有失之者司馬仲達是也天下亦有忠義之士可託以死生之間而不忍負者矣然􅀈介廉潔不為不義則輕死而無謀能殺其身不能全其國故曰不在乎節而在乎氣古之人有失之者晉荀息是也夫霍光者才不足而氣節有餘此武帝之所為取也書曰如有一個臣斷斷無他技其心休休焉其如有容人之有技若己有之人之彥聖其心好之不啻若自其口出實能容之以保我子孫黎民嗟夫此霍光之謂歟使霍光而有他技則其心安能休休焉容天下之才而樂天下之彥聖不忌不克若自己出哉才者爭之端也夫惟聖人在上驅天下之人各走其職而爭用其所長茍以人臣之勢而居于廊廟之上以捍衛幼沖之君而以其區區之才與天下爭能則姦臣小人有以乘其隙而奪其權矣霍光以匹夫之微而操殺生之柄威蓋人主而貴震天下其所以歷事三主而終身天下莫與爭者以其無他技而武帝亦以此取之歟溫公論光薨禹等謀反誅夷曰霍光之輔漢室可謂忠矣然卒不能庇其宗何也夫威福者人君之器也人臣執之久而不歸鮮不及矣以孝昭之明十四而知上官桀之詐圖可以親政矣況孝宣十九即位聰明剛毅知民疾苦而光久專大柄不知避去多置親黨充塞朝廷使人主蓄憤于上吏民積怨于下切齒側目待時而發其得免于身幸矣况子孫以驕侈趣之哉雖然嚮使孝宣專以祿秩賞賜富其子孫使之食大縣奉朝請亦足以報盛德矣乃復任之以政授之以兵及事叢釁積更加裁奪遂至怨懼以生邪謀豈徒霍氏之自禍哉亦孝宣醖釀以成之也昔鬬椒作亂于楚莊王滅其族而赦針尹克黃以為子文無後何以勸善夫以顯禹雲山之罪雖應夷滅而光之忠勳不可不祀遂使家無噍類孝宣亦少恩哉陳無己曰有其才而無其節者司馬懿是也有其節而無其才者荀息是也有是二者成功而去伊周是也有是二者守而不去霍光是也光承武帝孤幼之託天下之寄黜昏陟明全而歸之承征伐之後公私兩弊而十數年間內豐外服光之功有三焉然以私愛冒大義鄰于奪矣其幸宣帝知而不爭使之爭則未可知也昭喪而宣立既不能去又不歸政光之失亦三焉史氏謂不學無術暗于大理而或以謂人倫逆順雖不學而知之日磾老胡而著忠孝何待于學嗚呼學則明否則蔽理之常也不學而能者資也資可常乎夫義有由之者有畏之者由之者道也畏之者學也學而後知畏也畏聖人之言也光之不勝私以其不知畏也光善人也使其學而知畏其肯出此乎豈特如此其肯以婢為妻乎則除患于未然光之三失其皆出于此乎或者又謂節而不才然保人之幼全人之國天下危而復安此皆才之大者至其結昏人主與上官以宰相子守關與武庫親同列而慮患有急而求符璽又皆有以過人特其才有能否爾雖然中人而下亦不能具也或又謂日磾不肯納女後宫而光以為后日磾殺弄兒而光隂妻為不軌光之守節誠有不如至其功亦非日磾所及也始光推日磾而日磾謂胸奴輕漢此其智有過人者惜乎不之盡也宣帝論漢家以王道雜霸溫公曰王霸無異道昔三代之隆禮樂征伐自天子出則謂之王天子微弱不能治諸侯諸侯有能率其與國同討不庭以尊王室者則謂之霸其所以行之也皆本仁祖義任賢使能賞善罰惡禁暴誅亂顧名位有尊卑道德有深淺功業有巨細政令有廣狹耳非若白黑甘苦之相反也漢之所以不能復三代之治者由人主所為非先王之道不可復行于後世也夫儒有君子有小人彼俗儒者誠不足與為治也獨不可求真儒而用之乎稷契臯陶伯益伊尹周公孔子皆大儒也使漢得而用之功烈豈若是而止耶孝宣謂太子懦而不立暗于治體必亂我家則可矣乃曰王道不可行儒者不可用豈不過甚矣哉殆非所以訓示子孫垂法將來者也蕭望之殺韓延壽溫公曰以孝宣之明魏相丙吉為丞相于定國為廷尉而趙蓋韓楊之死皆不厭衆心惜哉其為善政之纍大矣周官司寇之法有議賢議能若廣漢延壽之治可不謂能乎寬饒惲之剛直可不謂賢乎然則雖有死罪猶將宥之况罪不足以死乎楊子以韓馮翊之訴蕭為臣之自失夫所以使延壽犯上者望之激之也上不之察而延壽獨蒙其辜不亦甚哉宣帝詰責杜延年東坡曰古者賢君用人無內外輕重之異故雖杜延年名卿不免出為邉吏治效不進則詰之既進則褒之所以歷試人才考核事功蓋如此孝宣之治優於孝文者以此也馬周諌唐太宗亦以為言治天下者不可以不知也黃霸東坡曰吾先君友人史經臣彥輔豪偉人也嘗云黃霸本尚教化庶幾乎富而教之者乃復用烏攫肉小數陋哉潁川鳳凰蓋可疑也霍以鶡為神雀不知潁川之鳳以何物為之雖近於戲亦有理也張安世少遊曰張安世匿名迹逺權勢自前史皆以為賢以愚觀之安世亦具臣耳賢則未也何則有大臣者有具臣者有姦臣者天下之士於道可退則請於君而退於道可進則請於君而進進退在道而不在我進之不從退之不聽有去而已此之謂以道事君不可則止大臣者也進賢而不能用退不肖而不能必取充位而已此具臣者也同乎己雖不肖必與異乎己雖賢必擠專為利而已此姦臣也安世身為漢之大臣與聞政事者當天下進賢退不肖之責而竊竊焉專為匿名迹逺權勢之事進之不從退之不聼也能致為臣而去乎愚知安世之不能也蓋安世與霍光同功一體之人其女孫敬又霍氏之外屬婦也光薨而子禹謀反夷宗族敬尚相坐宣帝雖赦之而安世心不自安顧上懲博陸之顓方貪權勢在己是以深思熟計欲以自媚于上故每定大政己決輒移疾出聞詔令乃驚使騎之丞相府問焉謂其長史曰明主在上賢不肖較然臣下自修而已何知士薦之嗚呼其視姦臣則有間矣豈大臣之所以事君者乎愚故曰安世則具臣矣賢則未也昔伊尹之相湯曰阿衡周公之相周曰太宰衡者所以權萬物之輕重而歸于平宰者所以制百味之多寡而適于和惟其和平而已矣故為重為多者無所于德為輕為寡者無所於怨衡宰之工實無心也伊尹周公所以事其君者如此曾若安世逺權勢者乎雖號不同而其於有心則一也昔叔向被囚祁奚免之叔向不告免焉而朝范滂被繫霍諝理之滂往候之而不謝管仲奪伯氏駢邑三百沒齒無怨言諸葛亮廢廖立李平及亮卒立涕泣平致死嗚呼國之大臣其好賢也如祈奚之于叔向霍諝之于范滂其疾惡也如管仲之於伯氏諸葛亮之於廖立李平名迹之或匿或見權勢之或近或逺皆可以兩忘矣山濤為吏部拔賢進善時無知者身歿之後天子出其奏于朝然後知羣才皆濤所進而王通以為密不以仁豫之也嗚呼知通之不與濤則知愚之不與安世矣趙充國東坡曰始豫觀充國策先零胸奴情偽曰何其明也又觀遣雕庫行羌中告諭沮辛武賢先攻罕开守便宜不出師畫屯田十二利專務以恩信積穀招降以謂此從容以義用兵與夫逞詐詭疲人于一戰者絶矣最末觀其語將校曰諸君皆便文自營爾非為公家忠計也語郎中曰是何言之不忠也吾固以死守之語浩星賜曰吾老矣豈嫌伐一時事以欺明主哉老臣不以餘命為陛下言之卒死誰當復言之卒以其意白上云嗚呼使有位君子皆用其心如充國則古今天下豈有不治者哉嘗觀于內公卿士大夫之議曰法當然奈何觀于外將之議曰詔如是不當違詔也凡在我一皆遵稟無有止障也脫有能言一事其言不用則矜語于人曰某事吾常言之上不我用也我則無負終不更犯顔色往復論也况于以死守而不欺豈復有哉而以餘命受祿位者併肩立也豈惟才不及充國忠又不如可歎也夫充國之用心人臣常道爾然與充國同時在漢庭人未聞皆然而充國獨然故可重也噫今之人不及往時逺矣則充國益可重也豫既觀充國而感今之人又觀宣帝與之上下議而格排羣疑用之遂無勞兵下羌冦不知其能功名亦遇主然也噫宣帝充國可重也况三代君臣間哉下其肯有欺上上其容有間然乎而觀掦子雲贊不及此區區論功爾功古今豈無大者哉不若原其心以勵事君也班固又不出語山東氣俗故著云爾用儒李德裕曰荀悅論略曰高帝天下初定庶事草創文帝躬行玄默遂至升平而古典未備制度多闕武帝內修文學外耀武威而不盡其術不克其終宣帝任法審刑總核名實而不用儒術理化不成歷數三代以及元帝崇尚儒學從諫如流引班固贊賔禮故老優繇亮直又曰貢薛韋匡迭為宰相其旨以為專用儒術莫盛于此班固荀悅皆文雅之士以元帝好儒徵用儒生故以兹為美而深罪石顯痛心泣血稱詩人投畀豺虎嫉之甚也異乎余之所聞矣任恭顯始于宣帝當宣帝之世石顯豈能隳其大業哉則知惡不在于顯矣蕭望之周堪者皆廊廟之器有師傅之恩石顯所忌廢而不用朋寵上書遂致于理其後劉向廢錮張猛自殺豈得謂之優繇亮直乎賈捐之京房雖不忠其身亦皆英特雋才道術竒士于元帝可謂忠矣亦因譖而死惑于讒邪豈得謂之牽于文義乎于讒邪則不斷于髦俊則用法亦不得謂之優繇矣貢薛雖能忠諫止于諷諭恭儉未嘗禦姦觸邪矣韋匡從容守位未嘗犯顔干主矣所以得乘時而進久安其位昔桀紂殺一龍逢比干而天下之惡歸焉桀紂以拒諫而殺之其悖已甚元帝以信讒而殺抑又甚焉王業既衰至成哀陵替才三世而王莽篡奪宣帝稱亂吾家者太子也知子莫若父信哉是言孫明復書元帝贊後曰儒者長世御俗宣教化之大本也宣帝不識帝王逺略故鄙之曰俗儒好是古非今使人眩于名實不知所守何足委任及夫元帝即位徒有好儒之名復無用儒之實雖外以貢薛韋匡為宰相而內以𢎞恭石顯為腹心是時天下之政皆自恭顯出貢薛之徒言不必行計不必從但具員備位而已自恭顯殺蕭望之京房之後羣臣側足喪氣畏權懼誅雖睹朝廷之失刑政之濫莫復敢有抗言于時元帝昏然不寤益信恭顯是故姦邪日進紀綱日亂風俗日壞災祥日見孝宣之業職此而衰矣而史固贊稱上少而好儒及即位登用儒生委之以政云云噫史固所謂牽制文義者非儒者之文義乎昔宣帝常怒元帝言用儒生曰亂我家者太子也今觀史固之贊宛是元帝用儒生亂其家者也此史固不思之甚矣向使元帝能納蕭望之劉更生京房賈捐之之謀退去憸人進用碩老與之謀求治道以天下為心則邦家之休祖宗之烈可垂于無窮矣安有衰滅者哉史固筆削論定善惡之際何不書曰上即位登用儒生不能委之以政牽制佞幸優遊不斷孝宣之業衰焉如是則褒貶得其中矣吾大懼後世繼體守文之君覽史固之贊以為自昔儒生之不足為用也而委任佞幸以致衰亂禍不淺矣任用恭顯李德裕曰漢元帝習武帝遊宴後庭又隆好音樂與𢎞恭石顯圖議帷幄之中進退天下之士史臣贊曰優遊不斷漢宣之業衰焉余以班固之言未盡其辭此蓋懦而不才權移所嬖非不斷也夫帝王者天也天以剛健為氣粹精為體氣剛而明則三光不昏體粹而精則四氣不亂剛也者不息之謂也故權衡獨運嵗時不忒粹也者不雜之謂也故乖氣消散隂陽不謬若運動不在于權軸鎔鑄不由于大冶蕩蕩上帝復何為哉書曰天聰明自我民聰明又曰天視自我民視天聽自我民聽豈堯舜之時上下皆公論説不行人與其聰明哉豈幽厲之君上下盡邪讒言相蔽人不與其聰明哉元帝自稱淫亂之君各賢其臣令皆覺悟天下安得危亡之君元帝蓋自以恭顯為賢而任之不疑也司馬溫公論京房宴見言恭顯曰人君之德不明則臣下雖欲竭忠何自入乎觀京房之所以曉孝元可謂明白切至矣而終不寤悲夫詩曰匪靣命之言提其耳匪手攜之言示之事又曰誨爾諄諄聽我藐藐孝元之謂矣吳筠京房詩曰達者貴量力至人尚知幾京房洞幽贊神奧咸發揮如何疾元惡不悟禍所歸謀物間謀己誰言爾精微溫公論蕭望之自殺曰甚矣孝元之為君易欺而難寤也夫恭顯之譖訴望之不肯就戮恭顯以為必無憂己而果自殺則恭顯之欺亦明矣其中智之君孰不感動奮發以底邪臣之罰孝元則不然雖涕泣不食以傷望之而終不能誅恭顯才得其免冠謝而已如此則姦臣安所懲乎是使恭顯得肆其邪心而無復忌憚者也白樂天傷蕭京詩曰禾黍與稂莠雨來同日滋桃李與荆棘霜降同夜萎草木既區别榮枯那等夷茫茫天地意無乃太無私小人與君子用置各有宜奈何西漢末忠邪並信之不然盡信忠早絶邪臣窺不然盡信邪早使忠臣知優遊兩不斷盛業日已衰痛矣蕭京輩終令陷禍機每讀元成紀憤憤令人悲寄言為國者不得學其時寄言為臣者可不鑒于斯免諸葛豐左遷周堪張猛溫公曰諸葛豐之于堪猛前譽而後毁其志非為朝廷進善而去姦也欲比周求進而已矣斯亦鄭朋楊興之之流烏在其為剛直哉人君者察美惡辨是非賞以勸善罰以懲姦所以為治也使豐言得實則豐不當絀若其誣罔則堪猛何辜焉今兩責而俱棄之則美惡是非果何在哉貢禹溫公曰忠臣之事君也責其所難則其易者不勞而正補其所短則其長者不勸而遂孝元踐位之初虛心以問禹禹宜先其所急後其所緩然則優遊不斷讒佞用權當時之大患也而禹不以為言恭謹節儉孝元之素志也而禹孜孜言之何哉使禹之智不足以知烏足為賢知而不言為罪愈大矣韋玄成秦少遊曰愚觀韋玄成等議漢宗廟之事未嘗不竊笑之以為此乃不達時變腐儒之論也何則禮非天降地出出于人心而已合于先王之迹而不合于人心君子不以為禮也夫事死如事生事亡如事存古今之情一也上古之世生養之具未備巢居而穴處食草木之實鳥獸之肉飲其血茹其毛則祭其先也亦不過薦毛血于中野而已中古以來養生之具漸備範金合土以為臺榭宫室以炮以燔以烹以炙以為醴酪夫以備者自奉而以不備者奉其先則非人心之所安也于是始制宗廟之禮祭祀之儀故有天下者事七世日有祭月有祀時有享嵗有貢終始有歸其物則天之所生地之所長茍可薦者莫不咸在夫豈求勝于上古之世哉蓋以謂不如是則人心怵焉而不安此制禮之本意也昔惠帝作復道叔孫通因以為原廟又嘗出遊離宫因請獻櫻桃夫原廟與諸果之獻前此未嘗有通輒以為請者知制禮之本意則可以義起之也彼玄成等不然徒見漢之宗廟祭祀不合六藝之文遂欲一切毁之不知六藝之文中古之事也上古之事不可盡行于中古中古之事豈可盡行于後世哉古之君子將營宫室宗廟為先廄庫次之宫室為後將毁宫室廄庫為先宗廟為後何則營之先親而後身毁之先身而後親可知也漢之制度不合于六藝之文者多矣彼玄成等徒知陵廟園寢便殿祭之為過而不知神仙長年合歡增成飛廉象玉之為過也知廟在郡國月遊衣冠之為非而不知千門萬戶之宫神明通天之臺離宫别館百有餘區之為非也元帝初元中雖以侈異嘗罷角抵上林宫館希御幸者而永元中幸長楊射熊館布車騎大獵則是宫室宴享之事未能如禮也宫室宴享非禮則置而不議宗廟祭祀非禮則議而毁之漢之祖宗神靈不存則已神靈若存能不發怒于子孫乎元帝寢疾而夢祖宗譴責也豈非以此乎史稱元帝少好儒及即位用玄成等為宰相而孝宣之業衰焉後世遂以儒為不足用鳴呼以玄成等議宗廟祭祀之事言之元帝所用者蓋腐儒耳安得真儒用之哉王昭君程晏設毛延壽自解語曰帝見王嬙美召延壽責曰君欺我之甚也延壽曰臣以為宫中美者可以亂人之國臣欲宫中之美者遷于胡庭是臣使亂國之物不逞于漢而移于胡也昔閎夭獻美女于紂而免西伯齊遺女樂于魯而孔子行秦遺女樂于戎而間由余是豈曰選其惡者遺之美者留之邪陛下以為美者是能亂陛下之德也臣欲去之將靜我而亂彼陛下不以為美者是不能亂我之德安能亂彼謀哉臣聞太上無亂其次去亂其次遷亂今國家不能無亂陛下不能去亂臣為陛下遷亂耳惡可以彼為美乎帝不能省君子曰良畫工也孰誣其貨哉六一明妃曲曰漢宫有佳人天子初未識一朝隨漢使逺嫁單于國絶色天下無一失難再得雖能殺畫工于事竟何益耳目所及尚如此萬里安能制夷狄漢計誠已拙女色難自誇狂風日暮起飄泊落誰家紅顔勝人多薄命莫怨春風當自嗟二疏東坡二疏圖贊曰惟天為健而無己時沉潛剛克以燮和之於赫漢高以智力王凛然君臣師友道喪孝宣中興以法馭人殺蓋楊韓蓋三良臣先生憐之振袂脫屣使知區區不足驕士此意莫陳千載于今我觀畫圖涕淚沾襟歷代名賢確論卷四十五
