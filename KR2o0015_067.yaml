body:
  text: 歴代名賢確論卷六十七唐高祖起義兵東坡孫之翰范祖禹高祖推李密為盟主以驕其志范祖禹世民誅佞人高德儒范祖禹高祖辭九錫殊禮范祖禹録用隋子孫范祖禹高祖闢言路賞孫伏伽之諌范祖禹徐世勣降賜姓李氏范祖禹宇文士及封德彞來降帝責德彞不忠於唐德彞以祕策干帝帝悦用之范祖禹晉州人自言見白衣老人稱老君為唐祖詔於其地立廟范祖禹蕭銑降斬於都市范祖禹定官職令范祖禹復置十二軍孫之翰從裴矩言許突厥昬范祖禹賞裴矩力爭司馬温公太子建成孫之翰范祖禹温公殺劉文靜恩裴寂孫之翰張唐英殺劉世讓孫之翰竇建德張唐英高君雅張唐英蘇世長張唐英傅弈張唐英起義兵東坡論曰唐高祖起兵汾晉間時三子建成元吉楚哀王智雲皆畱河東䕶家高祖起兵乃密召之隋購之急建成元吉能間道赴太原智雲幼不能逃為吏所誅高祖以父子之故獨不能少緩義師數日以須建成等至乎以此知為秦王所逼高祖逼於裴寂亂宫人之事不暇復為三子性命計矣秦王本謀於是時借隋吏以殺兄弟其意明甚新舊史曲為太宗潤飾殺兄弟事然難以欺後世矣建成元吉之惡亦孔子謂下流之歸也歟孫之翰論求助突厥曰義師之起本救世亂若威德漸盛則四夷欵附矣故周武興師致庸蜀羌髳微盧彭濮之衆助牧野之戰漢高平定天下亦有北貊燕人梟騎之助今唐師方起當以德義為勝何可聴劉文靜一時之謀遽求助於突厥斯自小也財帛金寶皆民力所致當舉義之始許之外域可乎不盡賂之又自失信後突厥恃其微功連嵗入寇蓋由兹失策也范祖禹論太宗脅父并求助突厥曰匹夫欲自立於鄉黨猶不可不自重也况欲圖王業舉大事而可以不正啓之乎太宗陷父於罪而脅之以起兵高祖昵裴寂之邪受其宫女而不辭又稱臣於突厥倚以為助何以示後世矣夫創業之君其子孫則而象之如影響之應形聲尤不可不慎舉也是以唐世人主無正家之法邉人多内侵之亂蓋高祖以此始也或曰太宗茍不為此則高祖或終不從而突厥將為後患二者權以濟事也臣竊以為不然古之王者行一不義殺一不辜而得天下不為也太宗恐高祖之不從懼突厥之為患終守臣節可也豈有脅父臣敵以得天下而可為歟此而可為則亦無所不至矣惜乎太宗有濟世之志撥亂之才而不知義也高祖推李密為盟主以驕其志范祖禹曰晉文公譎而不正孔子譏之當是時李密方圍洛邑高祖乘虚席卷入關密進則前有太原之敵後有東都之師是以聚兵洛口而不能西其勢亦可見矣然則高祖何賴於密而招之以納侮及其自欲為盟主也又何憚於密而驕之以行詐哉且舉義兵而勸進於叛人非所以為名也臣以為此非太宗劉文靜之謀必出於高祖與裴寂之徒怯懼之計得已而不已者也世民誅佞人高德儒范祖禹曰昔武王克商釋箕子之囚封比干之墓式商容之閭戮飛亷惡來於海隅顯善除惡如恐不及何哉使民知嚮方示以征伐之本意也故海内莫不革心易慮以聴上之所為去商之汙俗被周之美化如水之走下草之從風也太宗始起兵而戮一佞人民知所好惡矣如是則誰不欲為忠而不為佞宜其成王業之速也德儒佞於隋而戮於唐為佞者果何利哉高祖辭九錫殊禮范祖禹曰自魏晉之君欺孤蔑寡以奪天位考其實無異於寒浞王莽而必欲效唐虞之文後世因襲而莫之改其君臣皆不以為羞也惟唐高祖知其出於諂諛者所為故繁文偽飾有所不行亦可謂不自欺者矣然以兵取而必為之文曰受禪於隋是亦未免襲衰世之迹也雖不能正其名實如三代之王而優於魏晉遠矣録用隋子孫范祖禹曰商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常武王數紂曰昬棄厥遺王父母弟不迪故致討焉誅其罪人之身而立其子天下之公義也况其父兄宗族乎自魏晉以下强臣簒奪除君之族而代其位以非道得之亦以非道失之易姓之禍如循一軌傳曰君以此始必以此終信矣唐高祖始即位而録隋之子孫由漢以來最為忠厚其享國長世宜哉高祖闢言路賞孫伏伽之諌范祖禹曰國將興必賞諫臣國將亡必殺諫臣故諫而受賞者興之祥也諫而被殺者亡之兆也天下如人之一身夫身必氣血周流無所壅底而後能存焉諌者使下情得以上通上意得以下逹如氣血之周流於一身也故言路開則治言路塞則亂治亂者係乎言路而已高祖鑒隋之所以亡王業初基庶事草創而首闢言路以通下情可謂知所先務矣是以海内聞風如熱者之得濯廢者之得起民知上之憂已而疾痛將有所赴愬也唐室之興不亦宜乎徐世勣降賜姓李氏范祖禹曰古者天子建國賜姓命氏姓氏所以别其族類之所出也自三代之衰稱姓者或以國或以族或以地或以官子孫各本於其祖不可改也漢高祖賜婁敬姓為劉鄙陋無稽而唐世人主遂以為法非其親者附之屬籍或加於盗賊夷狄以逆族異類為同宗然則古之賜姓者别之而後之賜姓者亂之也夫惟天親不可以人為而强欲同之豈循理者乎上瀆其姓下忘其祖非先王之制不可為後世法也宇文士及封德彞來降帝責德彞不忠於唐德彞以祕策干帝帝悦用之范祖禹曰高祖以女寵進士及責德彞之諂巧既斥之矣復悦其計策而驟用之甚矣佞人之難遠矣自古君子易疏小人易親蓋君子難於進而果於退小人不恥於自售而戚於不見知其進也無所不至人君一為所惑不能自解鮮有不至禍敗者也晉州人自言見白衣老人稱老君為唐祖詔於其地立廟范祖禹曰商祖契周祖后稷皆本其功德所起不可誣也唐之出於老子由妖人之言而諂諛者附㑹之高祖啓其原高宗明皇扇其風又用方士詭誕之説躋老子於上帝卑天誣祖悖道甚矣與王莽稱王子喬為皇祖叔父何以異哉蕭銑降斬於都市范祖禹曰蕭銑故梁子孫屯難之世民思其主銑因隋亂保據荆楚欲復其祖考之業雖僭大號非唐之叛臣也唐師伐而取其地執其主亦足矣而銑以百姓之故不忍固守而降完府庫奉圖籍而歸之唐然則唐初割據之主銑最無罪高祖誅之淫刑甚矣我太祖太宗平四方僣偽之國係纍其主致之闕下雖無道如劉鋹拒命如繼元窮天下之力而後取之不誅一人皆死牖下自三代以來未之有也此所以祈天永命者歟定官職令范祖禹曰三公論道經邦燮理陰陽故不以一職名官太尉掌武蓋古者大司馬之職也司徒主民司空主土皆六卿之任非三公之官也自漢以來失之矣唐不能革正而復因之是以官名之紊莫甚於唐且既有太尉司徒司空而又有尚書省是政出於二也既有尚書省而又有九寺是政出於三也夫天地之有四時百官之有六職天下萬事備盡於此如網之在綱裘之挈領雖百世不可易也人君如欲稽古以正名茍捨周官臣未見其可也復置十二軍孫之翰曰國之用武固常事不可一日而懈也中夏之廣外夷之衆雖太平之世黠惡者畏威服德而不敢動其心常幸國之有事起而為患爾則武之備可一日懈乎况大亂初定人心未寧便欲為安逸之態而偃武事及突厥入寇但謀遷都以避經世之略何其淺也賴秦王堅議不行謬策令復置十二軍以教諸府之兵中國之威自兹盛矣從裴矩言許突厥昬范祖禹曰自漢以女嫁匈奴而後世習為故常結昏異域不以為失以為畏之邪則是以天下之大而畏人至於納女失也以為謀之邪則是以女為間而欲奪人之國亦失也高祖不謀於衆賢而問諸亡國之臣宜其有此失也且西突厥不若頡利之强弱者猶許其昏則强者何以制之此不足以示威適足取侮於逺人而已其後太宗以女分妻諸國将相中宗以後皆嫁公主於蕃國夫齊甥舅之國吳太王之裔也涕出而女景公猶羞之婁敬和親之策豈足效哉而終唐之世人君行之不以為難其臣亦不以為非高祖太宗實啓之是貽謀不善也賞裴矩力爭溫公曰古人有言君明臣直裴矩佞於隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠是知君者表也臣者景也表動則景隨矣太子建成孫之翰論立建成為太子曰王者立太子必嫡長者使天下之心有系以止爭奪之患也行之平世固為常法若夫大公之世子不賢尚求聖人以傳大位况長子不賢次子聖乎安得局於常法也唐有天下本秦王之謀秦王功德之大海内屬望其勢可終為人臣乎建成自舉義以來無一事可稱道但以年長使居聖子上至愚者知其不可也雖秦王以常禮為讓胡不虚其位待天命之歸况受命之初天下未定何汲汲於立太子也善哉寧王憲讓太子之言曰時平則先嫡長國難則歸有功此萬世不易之論也范祖禹論王珪魏徵勸建成擊劉黑闥為自安計曰立子以長不以有功以德不以有衆古之道也晉獻公使太子申生伐東山里克入而諌君出見太子而勉之以孝君子曰善處父子之間矣王魏以輔導東宫為職當勸建成以孝於高祖友於秦王則儲位安矣秦王有定天下之功高祖茍欲立之能為太伯不亦善乎且建成既為太子則國其國也安在於有功乃使之擊賊以立威結豪傑以自助是導之以爭也禍亂何從而息乎夫以王魏之賢其為建成謀猶如此况庸人乎又論建成募士兵欲圖秦王并使楊文幹反為相應曰建成為太子而擅募兵甲於東宫又使楊文幹反於外以危君父此天下之惡也罪孰大焉高祖不以公義廢之乃外惑於姦臣之計内牽於妃嬪之請至使兄弟不相容於天下此高祖不明之過也温公論秦王射殺建成曰立嫡以長禮之正也然高祖所以有天下皆太宗之功隠太子以庸劣居其右地嫌勢逼必有不容曏使高祖有太王之明隠太子有泰伯之賢太宗有子臧之節則亂何自而生矣既不能然太宗始欲俟其先發然後應之如此則事非獲已為愈也既而為羣下所迫遂至蹀血禁門推刃同氣貽譏千古惜哉夫創業垂統之君子孫之所儀刑也彼中明肅代之傳繼得非有所指擬以為口實乎范祖禹曰建成雖無功太子也太宗雖有功藩王也太子君之貳父之統也而殺之是無君父也立子以長不以功所以重先君之世也故周公不有天下弟雖齊聖不先於兄久矣論者或以太宗殺建成元吉比周公誅管蔡臣竊以為不然昔者象日以殺舜為事舜為天子也則封之管蔡啓商以叛周周公為相也則誅之其迹不同而其道一也舜知象之將殺已也故象憂亦憂象喜亦喜盡其誠以親愛之而已矣象得罪於舜故封之管蔡流言於國將危周公以間王室得罪於天下故誅之非周公誅之天下之所當誅也周公豈得而私之哉後世如有王者不幸而有害兄之弟如象則當如舜封之是也不幸而有亂天下之兄如管蔡則當如周公誅之是也舜處其常周公處其變此聖人所以同歸於道也若夫建成元吉豈得罪於天下者乎茍非得罪於天下則殺之者已之私也豈周公之心乎或者又以為使建成為天下又輔之以元吉則唐必亡臣曰古之賢人守死而不為不義者義重於死故也必若為子不孝為弟不悌悖天理滅人倫而有天下不若亡之愈也故為唐史者書曰秦王世民殺皇太子建成齊王元吉立世民為皇太子然則太宗之罪著矣殺劉文靜恩裴寂孫之翰曰恩與刑人主之大權也恩當其功刑當其罪則中外勸戒矣反是道何以服人心裴寂劉文靜俱以佐命為大臣文靜才略功名過寂遠甚高祖任情親寂而疏文靜文靜失律則除名及與寂有隙出怨言遂聴寂䜛殺之寂當將相之任怯而無謀屢為賊敗既入朝不加深罪幸矣顧待彌重可乎施恩於寂太優用刑於文靜太暴二者俱出於私非聖子功德之大人心去矣張唐英曰自古佐命之臣皆無心於舊君故志士仁人嘗恥之若裴寂劉文靜之迹故不在别白然二子皆首為謀主唱難起義及高祖登極而裴寂賞賜無極恩寵至厚爵位至重雖有罪惡之迹皆原而不問文靜出入征伐嵗不寧止顧遇既以不厚爵位復又不崇以妄告厭勝之事而遽加殺戮太宗極力營救而不得免復籍没其家且雨露之澤不私萬物仁義之主不枉一人而以功名重賞士之所競不平致怨古人所戒不知高祖之意於二子厚薄何其殊也豈非以裴寂始盗隋之宫人密侍高祖之際文靜嘗以此脅寂故高祖恨之不然何寂之功業智識皆不逮文靜而高祖遇之獨厚耶以此窺高祖之心是喜裴寂私眤之愛而恨文靜形之於言故讎之酷也噫嗜欲好色移人之性有如是哉殺劉世讓孫之翰曰兵之用間為神妙者以其術之不可窺也高祖歴戰伐多矣用兵之事不可謂不曉劉世讓素有忠義之名既以知邊機使備突厥方制其要害功效甚明突厥使人入朝言世讓有異謀殊不思世讓既荷任用已有功效何故與突厥通謀况突厥入寇本以馬邑為便今得其地守之是扼其入寇之路世讓經畫如是戎人反言與已國通謀其情固易察爾高祖不察而殺世讓何昏暗之甚也竇建德張唐英曰建德陷黎陽虜皇妹同安公主及淮安王神通大將軍李世勣世勣乃逃歸國或勸誅世勣之父建德曰世勣本唐臣逃還本朝忠臣也其父何罪又舍公主神通於别館以客禮而厚之生令歸國建德之於神通世勣可謂有恩矣於唐可謂有禮矣及兵敗俘歸斬於長安世勣等無一言以救建德之死於建德真少恩哉或曰建德抗拒王師外為世充之援若赦而不誅何以懲天下之惡曰誅之宜也然當此之時羣盗擾攘蜂結蟻聚凡得忠良之士率皆屠滅無有存者建德乃厚禮公主神通又不誅世勣之父乃姦雄之中仁人也世勣若念其父嘗拘於建德而卒保首領誠出一言救之設使朝廷不從亦足以報彼不誅父之恩全於忠孝豈非仁人之心哉朝廷既不原情而定罪世勣等又不能出力以一援其後劉黑闥之徒以誅建德為戒連衡復叛擁衆不降八月之中盡復建德故地兵連禍結者復數年此由失於斬建德而致爾故曰彎弓之鳥難安而黷武之衆易動刑人之際可不慎乎高君雅張唐英曰高祖將舉義旗而副畱守王威高君雅覺其事欲因晉祠之㑹以害高祖而太宗與劉文靜謀詐遣劉政㑹告王威高君雅之變君雅在高祖坐上大詬曰此反人欲殺我也文靜遂叱左右執而殺之嘗觀威與君雅之心乃隋之忠臣也當被執大詬之際必有至直至切之言責高祖為隋室懿戚重臣不當墟其社稷然而史臣不載其辭者蓋為唐而諱之故使二子忠烈之名不彰於世夫鉛刀尚能一割病虎猶能一搏使君雅稍有權力豈不能一奮而報隋乎今乃洗玉之汙而使之潔抉月之霾而使之明庸以勸後世不忘舊君者若當時既没其美後世又不顯其節則愚恐忠烈之道由是而寖息矣蘇世長張唐英曰世長侍高祖宴於披香殿見其華麗乃曰此殿煬帝造乎高祖曰卿好諫似直其心實詐此是吾造卿何言之世長曰昔陛下居於武功之時宅纔庇風雨當此之時亦以為足今初有天下於隋宫室又加雕飾其可得乎以此知世長之於諌諍得諷諌之道也且有天下之君窮奢極侈以厚奉養園苑畏其不廣宫室畏其不壯娥嬪畏其不麗車服畏其不高不美竭生民之力務為自奉之計不念創業之艱難惟見守成之容易自漢而下結怨於民敗亂繼踵率皆由此世長見高祖初得天下而遽追秦皇漢武之侈仍諌以武功舊宅纔庇風雨此管仲所謂願君無忘射鈎臣亦不敢忘檻車之謂也傅弈張唐英曰傅弈武德中嘗上書請除釋氏時蕭瑀方崇信釋氏弈與難詰瑀辭屈乃合掌曰地獄所設正謂此也歴代名賢確論卷六十七
