body:
  text: 歷代名賢確論卷八十五德宗三陽城昌黎栁子厚范祖禹顔真卿范祖禹曾子固六一子由段秀實栁子厚陸長源鄭通誠樂天張唐英髙愍女李翺何蕃昌黎陸參李翺總論德宗之政范祖禹陽城昌黎諫臣論曰或問諫議大夫陽城於愈可以為有道之士乎哉學廣而問多不求聞於人也行古人之道居於晉之鄙晉之鄙人薰其德而善良者幾千人大臣聞而薦之天子以為諫議大夫人皆以為華陽子不色喜居於位五年矣視其德如在野彼豈以富貴移易其心哉愈應之曰是易所謂恆其德貞而夫子凶者也惡得為有道之士乎哉在易蠱之上九云不事王侯髙尚其事蹇之六二則曰王臣蹇蹇匪躬之故夫不以所居之時不一而所蹈之德不同也若蠱之上九居無用之地而致匪躬之節以蹇之六二在王臣之位而髙不事之心則冒進之患生曠官之刺興志不可則而尤之不終無也今陽子在位不為不久矣聞天下之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政視政之得失若越人視秦人之肥瘠忽焉不加喜戚於其心問其官則曰諫議也問其祿則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉且吾聞之有官守者不得其職則去有言責者不得其言則去今陽子以為得其言乎哉得其言而不言與不得其言而不去無一可者也陽子將為祿仕乎古之人有云仕不為貧而有時乎為貧謂祿仕者也宜乎辭尊而居卑辭富而居貧若抱關擊柝者可也蓋孔子嘗為委吏矣嘗為乘田矣亦不敢曠其職必曰會計當而已矣必曰牛羊遂而已矣若陽子之祿秩不為卑且貧章章明矣而如此其可乎哉或曰否非若此也夫陽子惡訕上者惡為人臣招其君之過而以為名者故雖諫且議使人不得而知焉書曰爾有嘉謨嘉猷則入告爾后于內爾乃順之于外曰斯謨斯猷唯我后之德夫陽子之用心亦若此者也愈應之曰若陽子之用心如此滋所謂惑者矣入則諫其君出則不使人知者大臣宰相者之事非陽子之所宜行也夫陽子本以布衣隱於蓬蒿之下主上嘉其行誼擢在此位官以諫為名誠宜有以奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僭賞從諫如流之美庶巖穴之士聞而慕之束帶結髮願進於闕下而伸其辭説致吾君於堯舜熙鴻號於無窮也若書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓之也或曰陽子之不求聞而人聞之不求用而君用之不得已而起守其道而不變何子過之深也愈曰自古聖人賢士皆非有心求於聞用也閔其時之不平人之不乂得其道不敢獨善其身而必以兼濟天下也孜孜矻矻死而後已故禹過家門不入孔席不暇暖而墨突不得黔彼二聖一賢者豈不知自安佚之為樂哉誠畏天命而悲人窮也夫天授人以賢聖才能豈使自有餘而已誠欲以補其不足者耳目之於身也耳司聞而目司見聽其是非視其險易然後身得安焉聖賢者時人之耳目也時人者聖賢之身也且陽子之不賢則將役於賢以奉其上矣若果賢則固畏天命而憫人窮也惡得以自暇逸乎哉或曰吾聞君子不欲加諸人而惡訐以為直者若吾子之論直則直矣無乃傷於德而費於辭乎好盡言以招人過國武子之所以見殺於齊也吾子其亦聞乎愈曰君子居其位則思死其官未得位則思修其辭以明其道我將以明道也非以為直而加人也且國武子不能得善人而好盡言於亂國是以見殺傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以為有道之士也今雖不能及已陽子將不得為善人乎哉栁子厚陽公遺愛碣曰四年五月皇帝以銀印赤紱即隱所起陽公為諫議大夫後七年廷諍懇至纍日不解帝尤嘉異遷為國子司業旌直優賢道光師儒又四年九月己巳出拜道州刺史太學生魯郡李償廬江何蕃等百六十人投業奔走稽首闕下叫閽籲天願乞復舊朝廷重更其事如己巳詔翌日會徒北嚮如初行至延禧門公使追奪其章遮道願罷遂不果獻生徒嗷嗷顧盼徘徊昔公之來仁風扇揚暴慠革面柔懦有立聽聞嘉言樂甚鐘鼓瞻仰德宇髙逾嵩岱及公當職施政示人準程良士勇善偽夫去飾惰者益勤誕者益恭沉酗腆酒斥逐郊遂違親三嵗罷退鄉黨令未及下乞歸就養者二十餘人禮順克彰孝弟以興則又講貫經籍俾逹奧義簡習孝秀俾極儒業冠屨裳衣由公而嚴進退揖讓由公而儀公征甚遐吾黨誰師遂相與咨度署吏布告諸儒願立貞珉侔髙狀明乃訪於學古之士紀公名字垂憲于後云云又與太學諸生書曰始朝廷用諫議大夫陽公為司業諸生陶煦醇懿熙然大洽於兹四祀而已已詔出為道州僕時通籍光範門就職書府聞之悒然不喜非特為諸生戚戚也乃僕亦失其師表而莫有所矜式焉既而署吏有傅致詔草者僕得觀之蓋主上知陽公甚熟嘉美顯寵勤至備厚乃知欲煩陽公宣風裔土覃布美化於黎獻也遂寬然少喜如獲慰薦于天子休命然而退自感悼幸生明聖不諱之代不能布露所蓄論列大體聞於下執事冀少見採取而還陽公之南也翌日聞諸生愛慕陽公之德教不忍其去頓首西闕下懇悃至願乞留如故者百數十人輒用撫手喜甚震抃不寧不意古道復形於今僕嘗讀李元禮嵇叔夜傳觀其言太學生徒仰闕赴訴者僕謂訖千百年不可覩聞乃今日聞而覩之誠諸生見賜甚盛於戲陽公有博厚恢𢎞之德能并容善偽來者不拒曩聞有狂惑小生依託門下或乃飛文陳愚醜行無賴而論者以為言謂陽公過於納汙無人師之道是大不然仲尼吾黨狂狷南郭獻譏曾參徒七十二人致禍負芻孟軻館齊從者竊屨彼一聖兩賢人繼為大儒然猶不免如之何其拒人也俞扁之門不拒病夫繩墨之側不拒枉材理固然也范祖禹論陽城救陸贄欲壞裴延齡麻曰韓愈作諍臣論當城未有言之時也世之論者或祖襲愈之餘意譏城以在職久而不言及陸贄之貶而後發向若贄不貶則無所成其名矣豈得遂默而已乎臣以為不然揚雄曰或問賢曰為人所不能城有待而為者也遏裴延齡為相救陸贄將死此人所不能非賢孰能之一奮其忠名震四方終身廢放死而無憾自古處士之有益於國如城者鮮矣後世猶責之無已其不成人之美亦甚矣顔真卿范祖禹論盧杞使真卿使希烈被殺曰關播薦李元平盧杞陷顔真卿宰相之所好惡如此其事暴於天下非難見也而德宗不知惟其不好直而好佞所以蔽也相非其人欲不亂其可得乎曾子固顔魯公祠堂記曰初公以忤楊國忠斥為平原太守䇿安祿山必反為之備祿山既舉兵公與常山太守杲卿伐其後賊之不能直窺潼關以公與杲卿撓其勢也在肅宗時數正言宰相不悅斥去之又為御史唐旻所譖連輒斥李輔國遷太上皇居西宫公首率百官請問起居又輒斥代宗時與元載爭論是非載欲有所壅蔽公極論之又輒斥楊炎盧杞既相德宗益惡公所為連斥之尤不滿意李希烈陷汝州杞即以公使希烈希烈初慙其言後卒縊公以死是時公年七十有七矣天寶之際久不見兵祿山既反天下莫不震動公獨以區區平原遂折其鋒四方聞之爭奮而起唐卒以振者公為之倡也當公之開土門同日歸公者十七郡得兵二十餘萬由此觀之茍順且誠天下從之矣自此至公沒垂三十年小人繼續任政天下日入於弊大盜既起天子輒出避之唐之在朝臣多畏怯觀望能居其間一忤於世失所而不自悔者寡矣至於再三忤於世失所而不自悔者蓋未有也若至於起且仆至於七八遂死而不自悔者則天下一人而已若公是也公之學問文章往往雜於神仙浮圖之説不皆合於理及其奮然自立能至於此者蓋天性然也故公之能處其死不足以觀公之大何則及至於勢窮義有不得不死雖中人可勉焉况公之自信也歟惟歷忤大姦顛跌撼頓至於七八而始終不以死生禍福為秋毫顧慮非篤於道者不能如此足以觀公之大也夫世之治亂不同而士之去就亦異若伯夷之清伊尹之任孔子之時彼各有義夫既自比於古之任者矣乃欲眷顧回隱以終於世其可乎故孔子惡鄙夫不可以事君而多殺身以成仁者若公非孔子所謂仁者歟六一跋麻姑壇記曰麻姑壇記顔真卿撰并書顏公忠義之節皎如日月其為人尊嚴剛徑象其筆畫而不免惑於神仙之説釋老之為斯民患也深矣唐子西曰仁之勝不仁久矣然有時乎不勝而反為所陷焉者命也史臣論公晚節偃蹇為姦臣所擠見隕賊手是未必然公孫丞相以仲舒相膠西梁冀以張綱守廣陵李逢吉以韓愈使鎮州而盧杞以公使希烈其用意正相類爾然於數君子者皆不能有所傷而公獨不免於虎口由是觀之士之成敗存亡豈不有命耶而小人軒然自以為得計不亦謬乎段秀實栁子厚與昌黎書致段太尉逸事曰太尉大節古固無有然人以為偶一奮遂名無窮今大不然太尉自有難在軍中其處心未嘗虧側其蒞事無一不可紀會在下名未達以故不聞非直以一時取笏為諒也陸長源鄭通誠樂天哀二良曰丞相隴西公出鎮于汴州軍司馬御史大夫陸長源實左右之二年而軍用寧司空南陽公作藩於徐州軍副使祠部員外郎鄭通誠實先後之三年而民用康暨十五年春隴西薨浹辰而師亂大夫以直道及禍十六年夏南陽薨翌日而難作員外以危行遇害惜乎大夫人之望也員外國之良也咸克潔于身儉于家勤于邦又申之以言行文學智謀政事故其歷要官參劇務如刀劒發硎割而無滯如鐘磬在懸動而有聲識者以為異時登天子股肱耳目之任必能經德秉哲紹復隴西南陽之事業以藩輔王家嗚呼善人宜將鍾奕葉之慶而不免及身之禍天乎報施之朕何其昧歟昔詩人有黃鳥之章以哀三良不得其死今斯文亦以哀二良其篇云伊大化之無形兮浩浩而茫茫中有禍身兮若機之張梁之亂兮陸受其毒徐之難兮鄭罹其殃惟善人兮邦之紀綱邦之瘁兮而人先亡謂天之惡下民兮胡為生此忠良謂天之愛下民兮胡為生此豺狼我欲階冥冥問蒼蒼蒼蒼之不可問兮俾我心之䀌傷悲夫而今而後吾知夫天難諶而命靡常張唐英論陸長源曰嘗觀韓子汴州亂詩及白氏哀二良文言陸長源人之望也以直道受禍今覩其臨事之迹則長源乃自貽伊戚也始朝廷徙董晉為宣武軍節度使長源自汝州刺史為晉行軍司馬然資性輕佻言語驕傲務酷其刑以威驕兵及晉死而長源為留後藩鎮舊例凡有大變皆厚賞三軍或以此論之長源曰我不同河北賊以錢物買健兒旌節又不給布帛但髙其鹽直以折之兵士人得鹽一二斤而已又從事楊儀孟叔度浮薄不檢常戲入軍營玩弄婦女自稱孟郎三軍怨怒遂執長源并楊孟殺之噫是不知機也譬之良醫治疾也病有萬變藥亦萬變若病變而藥不變則壽民者皆為殤子矣故賢智之士見機以成天下之務通變以立天下之功故身亦全名亦立國家之事亦濟而長源徒執匹夫介訐之節非有通變之才不知適道論有不合權不能委順其辭卒陷屠戮所謂病變而藥不變矣孟子曰盆成括小有才而不知君子之大道卒死於齊趙政曰大雅先人福之所聚小智自私藏怨之府若長源者其亦小智自私之謂乎髙愍女李翺髙愍女碑曰愍女姓髙妹妹名也生七嵗當建中二年父彥昭以濮陽歸天子前此者有質妹妹與其母兄者使彥昭守濮陽及彥昭以城歸妹妹與其母兄皆死其母李氏也將死憐妹妹之幼無辜請獨免其死而以為婢衆皆許之妹妹不欲曰生而受辱不如死母兄皆不免何獨生為其母與兄將被刑咸拜於四方妹妹獨曰我家為忠宗族誅夷四方神祗尚何知問其父所在之方西嚮哭再拜遂就死明年太常諡之曰愍當此之時天下之為父母者莫不欲愍女之為子也天下之為夫者莫不欲愍女之為室家也天下之為女與妻者聞之莫不欲愍女之行在身也昔者曹娥思父即自沉于江獄吏呼囚章女悲號思唁其兄作詩載馳緹縈上書丐除肉刑彼四女者或孝或智或義或仁噫此愍女厥生七年天生其知四女不備向遂推而布之於天下其誰不從而化焉雖有逆女必改行雖有悍妻必易心賞一女而天下勸亦王化之大端也何蕃昌黎太學何蕃傳曰蕃淮南人父母俱全初入太學嵗率一歸父母止之其後間一二嵗乃一歸又止之不歸者五嵗矣蕃純孝人也閔親之老不自克一日揖諸生歸養于和州諸生不能止乃閉蕃空舍中於是太學六館之士百餘人又以蕃之義行言於司業陽先生城請諭留蕃於是太學闕祭酒會陽先生出道州不果留歐陽生詹言曰蕃仁勇人也或者曰蕃居太學諸生不為非義葬死者之無歸哀其孤而字焉惠之大小必以力復斯其所謂仁歟蕃之力不任其體其貌不任其心吾不知其勇也歐陽生詹曰朱泚之亂太學諸生舉將從之來請起蕃蕃正色叱之六館之士不從亂兹非其勇歟惜乎蕃之居下其可以施之於人者不流也譬之水其為澤不為川乎川者髙澤者卑髙者流卑者止是故蕃之仁義充諸心行諸太學積者多施者不遐也天將雨水氣上無擇於川澤澗溪之髙下然則澤之道是亦有施乎抑有待於彼者歟故凡貧賤之士必有待然後能有所立獨何蕃歟吾是以言之無亦使其無傳焉陸參字公佐李翺陸歙州述曰凡人之所不能窮者必推之於天天之注膏雨也人之心以為生旱苖然也雨與苖運相違或雨于海于山旱苖不得仰其澤惟人也亦然天之生俊賢也人之心以為拯憔悴之人然也賢者與憔悴之人時不合或死於野或得其位而道不能行憔悴之人不得被其惠膏雨之降也適然唯賢者之生於時也亦然運相合旱苖仰其澤憔悴之人賴其力傅説甘盤尹吉甫管夷吾之類也時弗合膏雨降雖終日賢哲生雖比肩旱苖之不救百姓之弗賴顔子子思孟軻董仲舒之類也故賢哲之生自有時百姓之賴其力亦天也嗚呼公佐之官雖列於朝雖刺於州其出入始二年道之不行與居於田時弗差也公佐之賢雖日聞也其德行亦未必昭昭然聞于天子公佐是以不得其職出刺一州又短命道病而死矣天下之人未蒙其德固宜然也則天之生君也授之以救人之道不授之以救人之位如膏雨之或雨於海或降於山旱苖之不沐其澤者均也故君之不得其位以行其道者命也其亦不足於心者邪得是道者窮居於野非所屈冠冕而相天下非所伸其何有不足於心者邪總論德宗之政范祖禹曰唐歷世二十歷年三百德宗享國二十有六年不為不久矣以其時君考之粃政尤多而大弊有三一曰姑息藩鎮二曰委任宦者三曰聚斂貨財本夫志大而才小心褊而意忌不能推誠御物尊賢使能以為果敢聰明足以成天下之務初欲削平僭叛剗滅藩鎮一有興元之亂而心隕膽破惴畏姑息惟恐生事既猜防臣下則専任宦者思其窮窘則聚斂掊尅益甚於初矣自古治愈久而政愈弊年彌進而德彌退鮮有如德宗者惟不知其過也是以藩鎮強而王室弱宦者専而國命危貪政多而民心離唐室之亡卒以是三者其所從來者漸矣歷代名賢確論卷八十五
