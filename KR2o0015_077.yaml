body:
  text: 歷代名賢確論卷七十七𤣥宗三宇文融王鉷子由孫之翰范祖禹李林甫范祖禹孫之翰張唐英楊國忠范祖禹髙力士范祖禹宇文融王鉷蘇子由論宇文融曰開元之初天下始脫中睿之亂𤣥宗勵精政事姚崇宋璟彌縫其闕而補其過庶幾貞觀之治矣在易天下雷行物與無妄開元之初無妄之世也無妄之為言無一不正之謂也君子之處此也亦全其大正而略其小不正而已蓋詳其小必廢其大古語有之銖銖而稱之至石必差寸寸而量之至丈必過石稱丈量徑而寡失故無妄之六二曰不耕穫不菑畬利有攸往其三曰無妄之災或繫之牛行人之得邑人之災其五曰無妄之疾勿藥有喜夫必耕而後穫必菑而後畬小人之所謂無妄也而君子不然於義可穫不必其所耕也於道可畬不必其所菑也然後無所不行今有失牛於此得之者行人也而責得於邑人其意亦以求無妄也而邑人罹其橫故無妄之疾雖勿藥可也藥之其損或有甚於病者開元之初雖號富庶而户口未嘗升降監察御史宇文融得其隙而論之請治籍外羡田逃户命攝御史令行括實𤣥宗喜之朝臣莫敢言其非者唯陽翟尉皇甫憬户部侍郎楊瑒以為籍外取稅百姓困弊得不償失而二人皆左遷諸道所括凡得客户八百餘萬田亦稱是州縣希旨多張虛數以正田為羡編户為客嵗終籍錢數百萬緡其名似是而實失民心淺言之則失在求詳深言之則失在貪利時帝方以耳目之奉責得於人行之不疑羣臣爭為聚斂以迎侈心天寶之亂實始於此吾觀近世士大夫多有此病賢者不忍天下有小不平而欲平之小人僥幸其利以為進取之計故天下每每多弊宰相李沆近世之賢相也嘗言吾在朝廷十餘年無功可紀唯四方之言利者未嘗有一施行特此聊以報國古之善言醫者患醫之難以為有病不服藥常得中醫蓋良醫不可必得愚醫舉目皆是愚醫類皆殺人而不服藥者未必死李公之言蓋類此也孫之翰論帝用聚斂臣王鉷曰貞觀十年治書侍御史權萬紀奏銀坑事太宗惡其言利遂斥之不令立朝詳味當時致治之風堯舜何以加焉天子富有天下惟患德義之不充不患財用之不足貞觀中天子勤勞政治敦尚儉德非賢者不厚禮非功臣不寵賜內無嬖人専其恩外無姦臣竊其澤所用固有節所斂固不厚但慮賢才未盡用生民未盡泰意常不足爾天子務德如是此所以言利之臣不能合也天寶之初天子厭倦萬幾日恣侈逸內有嬖人擅其寵外有姦臣導其欲恩賜寖廣用度日增天下常入之物不足以充其費必誅剝生民而後足其欲此所以言利之臣大用於時也故韋堅以漕運寵楊慎矜以聚財進至王鉷任用則斂剝極矣民以戌死逺理舊課詔恩給復廣收腳費怨苦之聲遍於天下鉷方以所聚之物謂之羡餘納於內庫以奉天子私費嗚呼天子之費豈有私乎天子為生民之主民乃勤力以奉之財賦之入國有常數入既有常用得無節乎故行賞於人必使內外稱之曰中也施惠於人必使內外稱之曰宜也以是費用豈為私乎今乃恣奢逸廣恩賜使嬖寵之家竸為僭侈權幸之輩各極其欲是明皇寵聚斂之臣誅剝天下割肌膚椎骨髓以快姦人女子之心爾快姦人女子之心而取天下之怨欲天下不亂不可得也王鉷聚斂極矣繼以楊國忠用事尤恣無名之取故明皇私費滋廣而內庫盈積季年之亂復資盜賊之用是明皇寵姦巧之臣窮生民之力則奉私欲終乃為賊費也世之治亂者多謂繫之時數今以太宗明皇之事驗之太宗勤於政治斥言利之臣而天下自治矣明皇倦於政治寵姦巧之臣而天下自亂矣以此論之治亂果繫於時乎後之王者宜鑒於是范祖禹論楊國忠告鉷與弟銲通謀反賜死曰昔榮夷公好専利厲王悅之芮良夫知王室之將卑以為王人者將導利而布之上下者也而或専之其害多矣夫利百物之所生而天地之所以養人也専之必壅壅則所害者多故凡有利必有害利於已必害於人君子不盡利以遺民所以均天地之施也聖王寧損己以益人不損人而益己記曰與其有聚斂之臣寧有盜臣是以興利之臣鮮不禍敗自桑𢎞羊以來未有令終者也唐世言利始於宇文融融既流死而韋堅楊慎矜王鉷繼起又益甚之極于楊國忠皆身首異處宗族塗地其故何哉壅利而所害者衆也天下之怨歸之故其惡必復其禍必酷而唐室幾亡其後以劉晏之能猶不免況其非道者乎必若公劉之厚民管仲之富國李悝之平糴耿壽昌之常平不為掊克上下皆濟則身享其榮後嗣䝉其慶矣吉凶禍福之效如此可不戒哉李林甫范祖禹論以徐嶠奏刑罰幾措賜李林甫牛仙客爵國公曰明皇一日殺三子而林甫以刑措受賞讒諂得志天理滅矣安得久而不亂乎孫之翰論曰或問開元二十五年明皇用姦人逐賢相戮直臣殺三子此國事大失人道幾喪也有何德化尚致天下獄訟稀少曰國政善惡皆有後效明皇即位之初厲精政事得姚崇宋璟張九齡之徒繼為輔相盡心贊助故德化被於民間風俗既厚獄訟幾息及在位漸久怠於政治雖姦邪乘間而進尚有忠賢任事未能大害於政及罷免賢相専任姦人直臣言事遂遭殺戮三子無辜俱以讒死其他流貶者不可勝道此固君之大過但惡在於內而未及於民前日為善之效流風未改故獄訟尚稀也林甫自以專任經嵗姦迹漸露取天下一善事掠之為功將以掩罪嶠輩小人得希其意妄託微物用為靈異上以固主心下以愚民聽明皇惑其事從而賞之自此擅威權起大獄姦惡日甚無所不為天寶之亂乃為惡之效也為君為相者勿以目前善迹便為已功當顧己之行事何如爾善惡之事未有不效者也范祖禹論林甫欲杜邊帥入相之路請以寒族吐蕃為將曰林甫巧言似忠明皇故信而不疑然以吐蕃為制將則不必聰明聖知之主而後能知其非也明皇蔽於吞滅四夷欲求一切之功是以林甫得行其計以中其欲人君茍不能以義制欲迷而不復何所不至哉孫之翰論林甫平章事曰帝王之命輔相或自知其人或大臣所薦然必名德有素才能已試者始可協天下之望林甫先圗郎官源乾曜薄其無才行不許郎官不可為則其人不賢衆所知矣及宇文融引之為黨歷中丞侍郎無一善績可稱雖為韓休所薦休之言亦未能必信於主但武妃力士內為之助遂至大用爾假如明皇以林甫是韓休所薦休有一時之名其言可信豈不思武妃力士已之嬖寵者也林甫為近臣能使嬖寵者為之言則其人姦佞可知也假如惑嬖寵之言不辨其姦佞林甫既相之後能議何政謀何事況不知學術素無行實有何所長任之也是林甫凡有奏請但迎意希旨以取恩寵爾凡人臣奏請之事若有合於主意須經世濟民理道明白始可無疑若事事合於主意是明有所希㫖而然也況本因嬖寵所用又奏請之事皆合已意帝王之稍明理道者豈不覆慮其事也況明皇不為不明一日昏惑都無念慮遂使姦臣擅權終亂天下則嬖寵之為患也如此夫帝王荷宗社之重主生靈之命不得賢輔何以興起治道保固邦國求賢輔無他術必取名德有素才能已試者可矣若名德未著才能未彰但取嬖寵之言命之以迎意希㫖任之是上忘宗社之重下輕生靈之命欲天下不亂不可得也林甫任用寖久內則起大獄引楊國忠使倚貴妃勢以害良善致其權力外則保任蕃將使専節制利其蕃族武人無入相之路養成祿山凶威則天寶之亂林甫之致也噫天子一聽嬖寵之言任姦人相國以其迎意希㫖而寵之遂起大亂於已罹播遷之苦於民陷死亡之難後之人君得不深戒張唐英論林甫置節度曰唐自武德以來其武臣蕃將雖有大功者未嘗委以重權如馮盎阿史那社爾契苾何力黑齒常令其出於外止居副總管副節度之職其都總管節度大使常擇名臣而委之故自武德至開元已來藩鎮之臣未嘗有叛如張嘉正王晙張說蕭嵩杜暹皆出為節度入為宰相當時經始之慮亦已深矣何則名藩大鎮有城池之險有甲兵之彊有土地之廣有人民之衆有府庫之實茍非忠孝之臣忽有不軌之志是故文皇帝始立法制而付之名臣以杜禍亂之端至於天寶李林甫以姦詭狡媚因緣重任恣為氛翳蔽虧日月以已本非儒術文行才望而進慮賢者得進而在已之上欲杜中外名臣出將入相之路乃用髙仙芝為四鎮節度使封常清為安西節度使哥舒翰為隴右節度使牛仙客為河西節度使皆専大將之任利其不知文字不知典故而無輔政之望故祿山之叛由専范陽大將之任故敢西嚮欲爭天下此皆由林甫啓之也楊國忠范祖禹論國忠誣奏南詔之捷曰管子有言堂上逺於百里堂下逺於千里君門逺於萬里言壅蔽之為害深也明皇信一國忠喪師二十萬而不得知以敗為勝其不亡豈不幸哉國忠欺蔽如此而舉朝亦無一人敢以實告其君者蓋在位者皆小人無一賢也是時明皇享國四十餘年自以為太平有萬世之安而不知禍亂將發於朝莫由置相非其人也可不戒哉又論國忠趣哥舒翰進兵攻祿山曰國忠既激祿山使之速反以信其言又促舒翰出兵潼關恐其為已不利動為身計不顧社稷之患然其所以求全者適足以自族也夫就利避害小人之常也利於已而不利於人則為之害於國而不害於家則為之自以為得計矣而不知害於國則亦害於家不利於人則亦不利於已是以自古小人之敗必至於家國俱亡此先王所以戒小人之不可用也明皇以天下安危寄之一相而其人如此安得不傾覆乎髙力士范祖禹論以力士知內侍省并增宦者除三品將軍曰自古國家之敗未有不由子孫更變祖宗之舊也創業之君其得之也難故其防患也深其慮之也逺故其立法也密後世雖有聰明才智之君髙出羣臣之表然末若祖宗更事之多也夫中人不可假以威權蓋近而易以為姦也明皇不戒履霜之漸而輕變太宗之制崇寵宦者增多其員自是以後寖干國政其原一啓末流不可復塞唐室之禍基於開元書曰監於先王成憲其永無愆為人後嗣可不念之哉又論明皇寵任力士使省決章奏曰明皇不監石顯之事而寵任力士至使省決章奏以萬幾之重委之閽寺失君道甚矣其後李林甫楊國忠皆因力士以進迹其禍亂所從來者漸矣傳曰存亡在所任人君可不慎其細哉石守道論曰明皇在開元初鋭意政治登用姚崇宋璟韓休張九齡等為宰相百度修敕彞倫攸叙而開元三十年躋于太平逮髙力士用事引宇文融李林甫楊國忠等在內安祿山安思順髙仙芝等居外朝政蠧損治道剝喪綱紀大壞賄賂公行姦臣得以行其謀天子得以肆其欲忠謇戢舌佞邪成羣賢人道消萬民胥怨安祿山之禍由妃子鼓之於內力士導之於外也噫左右輔弼中外賢才森然滿朝謀劃泉涌不與議論萬幾之政進退四海之士䇿慮安危謀惟教化乃引此輩立帷幄之內與論議國政參決機務評品善惡黜陟士類不亦失乎觀夫天寶之亂則可為戒也已范祖禹論帝語力士朝事付宰相邊事付諸將力士因言將相任事曰明皇之言未為失也其失者任非其人也誠使朝事付之相如姚宋邊事付之將如王忠嗣夫復何憂哉而以姦宄為賢能巨猾為忠良是以禍亂成而不自知也自林甫時言路塞絶以妄言為實以實言為妖楊國忠知其君之可欺也而欺之公卿大夫百執事之人宴安寵祿諛佞成風大亂將作凡民且能知之而無一人敢言者蓋其君子皆去其立於朝者皆小人也髙力士帷幄之臣非有深謀逺慮心知其事而不忍噤默此非其忠義過人蓋朝廷無賢百官失職而至於宦者言天下之事明皇亦可以悟矣而曽不之省以及於亂不亦宜哉歷代名賢確論卷七十七
