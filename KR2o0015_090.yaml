body:
  text: 歷代名賢確論卷九十文宗一謀廢太子李德裕德裕請宗室散處方州竟以議所除官不決而罷范祖禹帝願處無過東坡宦官范祖禹石守道朋黨孫之翰溫公張唐英謀廢太子李德裕論曰余開成中作鎮淮服聞東宫為人所誣天子赫然大怒召宰臣及公卿大僚議於內殿其時諫者僉曰太子幼年思慮未至亦曰太子之年足以改過往復移時大略不出於此夫明主可以理奪其要在於聞所未聞昔千秋上書言子弄父兵罪當笞耳武帝一言而寤蓋以簡而當理魏太祖嘗謂諸子曰吾必不用左右之言以理汝曹何者使左右君子也必不離人父子之間使左右小人必言不可用其時無人以此言寤主因問主上太子之過得於何人言之者與太子恩愛厚薄何如哉文宗聰明睿智聞之必寤寤之後太子必安以余揣之不三數月則父子如初矣蓋以父子之愛發於天性言之必當易寤况一子乎是以漢高覩四皓上夀悲歌鴻鵠宣帝以𤣥成退讓令傳淮陽元帝聞史丹稱器人於絲竹默然而笑皆屈己捨愛可不謂之天性哉惜哉文宗竟不得一聞是言豈太子之命也歟德裕請宗室散處方州竟以議所除官不決而罷范祖禹曰昔三代之王分封同姓布於天下夏商天命雖改而杞宋之祀與周並傳其子孫歷千百嵗不可而滅絶也後世人主疑其骨肉寧為他人侮之惟恐同姓取之禁錮宗室甚於縲囚其國未亡而剪落枝葉以蹙其本故自魏晉以後一姓有天下逺者百餘年近者數十年而苗裔湮滅祀奠無主由其疑忌骨肉故也有唐之後五代之際已無聞焉者其祖宗之所致歟帝願處無過東坡論上訪鄭公後得魏謨曰觀唐文宗覽貞觀事而思魏鄭公之後亦有意於善治矣雖然唐室凌遲未易興起非高才偉人無足以圖之而信訓注之狂謀幾隕宗社良可嘆已至於奬魏謨之極諫願處於無過之地亦賢君之用心也宦官范祖禹論上語周墀以受制於家奴乃不如赧獻曰易曰言行君子之樞機樞機之發榮辱之主也文宗欲立非常之功為髙世之主發而不中危辱如此自取之也豈不可哀哉又論上自甘露事忽忽不樂曰文宗欲除宦官之逼以清宫闈正紀綱有其志而無其才暗於知人是以取敗雖恭儉寬厚勤於庶政以其時君較之身無過行而主威益削國命益微憤悶憂鬱至於沒世孟子曰徒善不足以為政其文宗之謂乎又論與李訓鄭注謀誅宦官不克曰文宗憤宦官之弒逆欲除其逼當擇賢相而任之朝廷既清紀綱既正賞罰之柄出於人主執其元惡付之有司正典刑而已乃與訓注為詭譎之計欲用甲兵於陛城之間不以有罪無罪皆夷滅之召外寇以攻內寇是以一敗塗地社稷幾亡非徒無益而愈重禍蓋自古不用君子而用小人以去小人未有不害及國家者也石守道曰中官黨盛自天寶後迄于大和百數十年矣歷肅宗代宗德宗憲穆六世矣其根柢固矣其巢穴深矣豈可容易動搖哉故申錫謀未發而受誅李訓計未行而被害雖文宗英武亦無如之何易曰履霜堅冰至非一朝一夕之故所由來者漸矣防其始戒其漸姦黨不能長也文宗區區積亂之後志欲去羣邪端治本清姦人闢政道而守澄之黨已盛矣如何哉可為歎息矣朋黨孫之翰辨朋黨論曰人君惡臣下朋黨者以其樹私而背公欺聰明竊威福亂國政也朋黨為患如是不可不防然在辨之精爾辨若不精君子為小人所陷矣蓋君子小人各有其徒君子之徒以道合小人之徒以利合以道合者思濟其功此同心於國事非朋黨也以利合者思濟其欲此同心於私計乃朋黨也二者混淆並進非明君曷能辨之君不能辨則君子為小人所勝必矣蓋君子之徒見義則果意以進誠其言直其道不能曲防非意之事小人窺之懼君子道行則不便於已取疑似之形讒之於君而君子被讒又恥自辨但守道自信而已小人之徒則不然見利則詭計以進巧其言曲其道復彌縫其隙用心無所不至但勝於人便於己險薄邪佞皆可為所以多勝於君子也情狀如是非君之明曷能辨也前代之君辨者少而不辨者多其事不能疏舉直以唐之四事論之君至明則人不能誣人以朋黨君雖明為情所惑則不能察小人之朋黨辨君子之不黨君雖明而弱雖辨君子小人之徒不能制其朋黨君明不足雖察其朋黨而不能辨其情之輕重貞觀中蕭瑀謂房喬輩數大臣相黨嘗獨奏云此等相與執權有同膠漆陛下不細諳知但未反爾太宗謂瑀曰為人君者須駕馭英才推心待士卿言不亦甚乎何至如此時房喬輩同心國事知無不為瑀雖非小人但以性剛躁復多猜惑妄言喬輩朋黨太宗英明方辨其事不然數賢何以免責不惟不免其責無以盡其才謀助成治平之業矣此所謂君至明則人不能誣人以朋黨也元和末裴度崔羣同相度以勳德羣以仁賢為天下瞻望及皇甫鏄以聚斂進復結幸臣取相位中外大以為非度羣纍言鎛邪險之狀憲宗反疑度羣朋黨寵鎛愈甚至謂度等曰人臣事君但力行善事自致公望何乃好樹朋黨度對曰君子小人未有無徒者君子之徒則同心同德小人之徒是為朋黨帝曰他人之言亦與卿言相似豈易辨之夫以度羣之大賢視鎛之邪黨如鸞凰之於蚊虻人人可見而憲宗惑之蓋方務侈樂惡忠而喜佞也觀初用度羣之意非為不明一日昏惑至此此所謂君雖明為情所惑則不能察小人之朋黨辨君子之不黨也昭愍即位其相李逢吉大樹朋黨明報讎怨排裴度逐李紳欺君冲年略無所憚賴韋處厚不顧凶險氣焰言度之大賢雪紳之非辜昭愍深信處厚之忠許度復相憫紳貶逐然不能罪逢吉之姦黨此所謂君雖明而弱雖辨君子小人之徒不能制其朋黨也至文宗辨德裕宗閔之黨大惡之觀二李之過似均然情之輕重有異矣亦在辨之也宗閔輩元和中對賢良䇿深詆時病時李吉甫作相怒所言薄其恩命故宗閔輩憾焉後宗閔得用必排德裕及其相與者德裕得用亦排宗閔相與者故交怨不解其過似均矣但德裕未相在穆宗昭愍朝論事忠直有補於時所歷方鎮大著政效又裴度嘗薦之作相為宗閔輩所沮而罷遂領劍南雖因監軍王踐言入言維州事文宗召德裕歸朝遂命為相本由功名用也及秉政羣邪不悅竟為姦人李訓鄭注所譖引宗閔代之宗閔未相絶無功效著聞任侍郎日結女學士宋若憲樞密楊承和求作相以此得之及其出鎮也又由注訓復用此德裕之賢與宗閔不侔矣又德裕所與者多才德之人幾乎不黨但剛彊之性好勝於人所怨者不忘所與者必進以此不免朋黨之纍然比宗閔姦人則情輕矣文宗但以德裕宗閔各有朋黨深嫉之不能辨其情之輕重明已不至矣又聽注訓所誣朝之善士多目為二李之黨而逐之此所謂君明不足雖察其朋黨而不能辨其情之輕重也夫太宗之明為人君者當法之憲宗之惑為人君者當戒之昭愍之弱為人君者當深思之深思之術尤在盡心焉且有臣言於君曰某人朋黨也若其人道未信功未明君當詰之曰朋黨有何狀言者必曰相援而欺君也君又當詰之曰所欺何事害於國病於人圖於利其狀明白此朋黨無疑大則罪之小則疏之宜矣若言者不能陳害人圖利之狀此乃誣人朋黨大則罪之小則疏之宜矣又或言者陳似是之狀未甚明白者當審其人與言者位不相逼乎素無讎怨乎何人以公議進何人以權幸用何人論議有補於國何人才行有稱於時復參驗他臣而究其本末則言者與被言之人是非辨矣人君能盡是道豈有臣下朋黨之事或曰何以盡是道答曰在明與公或曰中智之主性有所蔽明與公安得至也答曰不聽左右之偏言則明矣不以悅意親之忤意疏之則公矣能戒是事明與公庶乎可至也溫公論上謂去朋黨難曰夫君子小人不相容猶冰炭之不可同器而處也故君子得位則斥小人小人得勢則排君子此自然之理也然君子進賢退不肖其處心也公其指事也實小人譽其所好毁其所惡其處心也私其處事也誣公且實者謂之正直私且誣者謂之朋黨在人主所以辨之耳是以明主在上度德而叙位量能而授官有功者賞有罪者刑奸不能惑佞不能移夫如是則朋黨何自而生哉彼昏主則不然明不能燭强不能斷邪正並進毁譽交至取捨不在於已威福下移於人於是讒慝得志而朋黨之議興矣夫木腐而蠧生醯酸而蚋聚故朝廷有朋黨則人主當自咎而不當以咎羣臣也文宗茍患羣臣之朋黨何不察其所毁譽者為實為誣所進退者為賢為不肖其心為公為私其人為君子為小人茍實也賢也公也君子也匪徒用其言又當進之誣也不肖也私也小人也匪徒棄其言又當刑之如是雖使之為朋黨孰敢哉釋是不為乃怨羣臣之難治是猶不種不藝而怨田之蕪也朝中之黨且不能去況河北賊乎又論黃介夫作壞唐論五篇以為壞唐者非巢溫與閹豎乃李宗閔李德裕朋黨之弊也是誠得其本矣雖然介夫知其一未知其二彼盜賊之興由閹豎閹豎之橫由輔相則信然矣噫輔相樹立私黨更相排壓而不能正者又誰咎哉夫朋黨之患不專在唐自古有之以堯之明共工歡兜相薦於朝舜臣堯既流共工又放歡兜除其邪黨然後四門穆穆百工咸熙仲虺數夏之惡曰簡賢附勢實繁有徒武王數商之惡曰朋家作仇脅權相滅是則治亂之世未嘗無朋黨堯聰明故能别白善惡而德業昌明桀紂昏亂故不能區處是非而邦家覆亡由是言之興亡不在朋黨而在昏明矣洪範皇極曰無偏無陂遵王之義無有作好遵王之道無有作惡遵王之路無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直周公戒成王曰孺子其朋孺子其朋其往無若火始焰焰厥攸灼叙弗其絶是以舜誅禹父而禹為舜佐伊尹放太甲而相之周公放蔡叔而封蔡仲公之至也夫宗閔德裕雖為朋黨由文宗實使之文宗嘗曰去河北賊易去朝中朋黨難殊不知羣臣為朋黨誰之過也由是觀之壞唐者文宗之不明宗閔德裕不足專罪也張唐英論曰文宗用李宗閔為宰相宗閔引牛僧孺同知政事盡逐去李德裕之黨及德裕再相出宗閔以為興元節度宗閔結駙馬沈羲女學士宋若憲樞密楊承和而再求輔政㑹中人王守澄薦李訓鄭注而德裕惡其憸巧訓注居中用事復相宗閔而出德裕是時朋黨交熾兩相傾軋絀逐朝士無有虛日文宗嘗歎曰去河北賊甚易去此黨實難嗟乎文宗於此失政刑矣夫為天下之君治亂興亡唯在擇宰相而已宰相得其人則天下受其賜宰相非其人則天下受其禍進退任用繫於君上察其賢不賢耳夫君子小人各有朋黨以君子者為宰相則抱君子之道者皆以黨而進於朝矣以小人為宰相則懷小人之才者亦以黨而進於朝矣君子進則國體重而紀綱正小人進則國體輕而紀綱亂君人者欲知君子小人之分則察其器宇觀其議論驗其行事審其措置茍有益於國家有利於生民不私於身不貪其權使內外百官各得其職上下庶務各有其序是可任以大臣之事也茍反於此是不可任以大臣之事也今小人之黨日夕進見交亂於左右尚不能去之而曰去河北賊甚易此徒言耳嘗謂文宗有嫉惡之志而無嫉惡之斷何以言之文宗嘗自為詩曰輦路生春草上林花滿枝此蓋知小人浮艷者當路而滋蔓矣然終不能奮獨見之明剗除羣妖以彊國體徒嗚咽悒鬱於禁中此非有其志而無其斷耶歷代名賢確論卷九十
