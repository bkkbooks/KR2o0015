body:
  text: 歷代名賢確論卷九十六通論二髙祖太宗睿宗𤣥宗子由𤣥宗憲宗子由太宗𤣥宗駕馭人臣張唐英𤣥宗德宗不用張九齡姜公輔之言張唐英武后安祿山張唐英藩鎮范文正公張唐英子由髙祖太宗睿宗𤣥宗廢立子由曰髙祖起太原其謀發於太宗諸子不與也及克長安誅鋤羣盜天下為一其功亦出於太宗蓋天心之所付與人心之所歸嚮其在太宗也審矣至立太子髙祖以長立建成建成當之不辭於是兄弟疑間卒至大亂夫建成不足言也其咎在髙祖其後武氏之亂廢中宗立睿宗以睿宗長子憲為皇太子矣及中宗之復睿宗父子皆以王就第韋氏之亂臨淄以兵入討睿宗踐阼而唐室復安又將以長立憲憲辭曰時平先嫡長國亂先有功不如此必且有難敢以死請睿宗從之而後臨淄之位定以太宗之賢而不免於爭奪𤣥宗之賢不逮太宗而晏然受命則憲之讓賢於人逺矣吾嘗論之髙祖睿宗皆中主也其欲立長非専其私也以為立嫡以長古今之正義也謂之正義而不敢違何不考之前世乎昔太王捨太伯仲雍而立王季文王捨伯邑考而立武王而周以之興誠天命之所在而吾無心焉亂何自生雖然太伯奔吳以避王季亦畏亂故耳廢長而立少雖聖賢猶難之憲與元宗兄弟相安終身無間焉古今一人而已𤣥宗憲宗之政得失子由曰唐𤣥宗憲宗皆中興之主也𤣥宗繼中睿之亂政紊於內而外無藩鎮分裂之患約己任賢而正觀之治可復也憲宗承代德之弊政僨於朝而畿甸之外皆為畔國將以求治則其勢尤難然二君皆善其始不善其終所以失之者一道也齊威公用管仲隰朋九合諸侯一匡天下為五伯首及管仲死用豎刁易牙身死不得葬五公子爭立霸業隨毁蓋中人可以上下此三君者皆中主耳方其起於憂患厄困之中知賢人之可任以排難則勉强以從之然非其所安也及其寇難既平國家無事則其心之所安者佚樂所說者諛佞也故禍發皆不旋踵若合符節太宗既平天下始任房𤣥齡杜如晦魏徴終用長孫無忌岑文本褚遂良常不忘恭儉節用去冗官節浮費內無宫掖侈靡之求旁無近幸賜豫之失貞觀之治斯已過半矣侍書御史權萬紀嘗言宣饒部中鑿冶銀嵗可取數百萬緡以佐國用帝怒罵曰吾所乏忠言嘉謨有益於民者爾汝為御史不能進賢退不肖而訹吾以利豈謂我漢桓靈耶斥去不用於是士民莫敢以利言者故房杜諸人得效其忠力以致貞觀之盛及𤣥宗初用姚崇宋璟盧懷慎蘇頲後有張說源乾曜張九齡憲宗初用杜黃裳李吉甫裴度李絳後用韋貫之崔羣雖未足以方駕房杜然皆一時名臣也故開元元和之初其治庶幾於貞觀然𤣥宗方用宋璟而宇文融以括田幸遽至宰相後雖以公議罷去而思之不已謂宰相曰公等暴融過惡朕已罪之矣然國用不足將奈何裴光庭等不能答融既死而言利者爭進韋堅楊慎矜王鉷日以益甚至楊國忠而聚斂極矣故天寶之亂海內分裂不可復合憲宗方平淮蔡裴度未及還朝而程异皇甫鏄皆以利進度三上書極論不可帝以天下略平亦欲崇臺池宫觀以自娛樂异鎛揣知其意數進羡財以順所欲故度卒見逐而异鏄皆相不三年而禍發於宦官蓋𤣥宗在位嵗久聚斂之害遍於天下故天下遂分憲宗之世其害未究故禍止於其身然方鎮之彊宦官之盛遂與唐相終始可不哀哉嗚呼太宗之恭儉所忍無幾爾而福至於不可勝盡𤣥憲之淫佚所獲無幾爾而禍至於不可勝言而世主終莫之悟覆車相尋不絶於世蓋未之思焉太宗𤣥宗駕馭人臣張唐英論曰嘗觀太宗文皇帝之時其從征伐取天下之臣如李靖李績裴寂劉文靜唐儉商嶠尉遲敬德秦叔寶程知節張公謹侯君集李大亮薛萬徹之徒皆出入戰陳經營四方其休功元勳固已多矣而文皇帝駕馭而任使之有功者必賞有罪者必誅其或引之便殿伸以燕私則固有之至於君臣上下之分豈有瀆亂者哉天寶中安祿山來朝上特寵異之乃於殿之西偏設雞帳使坐其下肅宗時為太子諫曰自古正殿無有人臣者今寵之已過必有驕心上曰此胡有異相故以此厭之嗟乎明皇失駕馭之道矣昔衛青為大將軍至尊重矣而漢武帝踞厠而見之張飛關侯稠人廣衆立侍終日蓋有堂陛之限爾且祿山本蕃中種類素不由仁義忠孝詩書禮樂之訓一旦因緣際㑹遂忝大位彼來朝也當示以君臣上下之分使知尊卑之禮而反以家人之禮宴之於內又不以人臣之禮待之於外宜其自大而不軌矣且察此胡有異相因其來朝命一武士拉而煞之足以滅天下之禍奈何坐於殿上以厭勝之此非人君之道也與文皇駕馭英雄之禮一何異哉𤣥宗德宗不用張九齡姜公輔之言張唐英論曰天下之患常起於不足憂而致可憂故慮隄防之奔衝者先窒螻蟻之穴慮屋廬之燔爇者先徙曲突之薪書曰斷在朕志又曰惟克果斷乃罔後艱茍失機㑹則受制於人而徒有後悔亦何濟耶明皇德宗俱失於此始張九齡奏安祿山狼子野心而有反相請因張守圭所奏失律而誅之明皇曰汝以石勒待之耶寵之愈厚其後幸蜀始悔不用九齡之言德宗時涇師倒戈而翰林姜公輔奏朱泚失兵柄心常怨憤不如使人捕之恐羣凶取為戎首其患不細德宗不能決翼日果然始悔不用公輔之言設使二主不猶豫於行事任剛健以為德先除二凶則豈有後悔耶不能果斷徒有悔言詩所謂啜其泣矣何嗟及矣武后安祿山張唐英權柄論曰風雷震曜天之權也刑賞號令君之權也天之權不在於天則天之道幾乎息矣君之權不在於君則君之道亦幾乎息矣故君人者惜其權柄而不以假人以之制天下之命以之服臣子之心動靜重輕皆在於上明之如神茍失其所操持輕其所付與則天下之禍繇是起矣髙宗大帝以天下之權委於武氏卒使隂逞其志大肆所欲其後遂奪廬陵之璽造為周氏斫喪宗室毒螫海宇此雖由廬陵之不慧亦大帝先以權柄授之也明皇晚年以天下為戲玩刑賞號令一委狂夫凡殺一大臣非上之意也權臣之意也凡任一大臣非上之意也權臣之意也至於設施更張率不由於上故祿山觀朝廷之權不在於上而在於下矣於是以范陽之小而求兼河東節度以范陽少馬而求兼飛龍廄羣牧使而朝廷不復思慮惟遂其所求乃選羣牧斤腳駿馬送於范陽兵彊馬壯沛然自大遂圖不軌此由權柄失於上而下得窺其隙矣且明皇二十年孜孜以致開元之治一旦不顧而一擲與姦佞之臣致萌范陽之變崎嶇顛沛老幸井絡以逃中原之難兹可為萬世龜鑑也藩鎮范文正公曰李唐中微天下多事諸節度各聚州兵據征賦以自支故有尾大不掉之釁起矣此非唐之本謀但四方縱橫撲滅不暇故因其有功而分裂之蓋不得已也云云張唐英論曰唐之治由藩鎮之未専地也唐之弱由藩鎮之彊盛也唐之亡由藩鎮之削滅也何以言之唐自安史之亂天下之人耗減大半大厯已後干戈粗定事貴姑息權柄倒置彊臣驕將氣焰赫然而於是李正己有青淄齊海登萊沂密德曹濮徐兖鄆十五州之地養兵十萬李寶臣有常易深趙滄冀定七州之地養兵五萬田承嗣有魏博相衛洺貝澶七州之地養兵五萬梁崇義有襄鄧均房復郢六州之地養兵二萬詔增一城必飛語怨刺二十年間國家不敢興拳石撮土代宗寬柔一切容之德宗明察先誅劉文喜次欲盡除羣盜遂詔起關西兵以臨關東而涇兵倒戈朱泚乘人心之離遂肆不軌然而欲與李懷光合勢懷光不伏臣之故李晟之徒得以乘而滅之又李寶臣信妖人之言謂有天分而田承嗣玩以䜟文不與同惡卒自暴死又朱滔稔凶欲臣山東諸侯而王武俊曰我豈能捨九葉天子而臣田舍漢於是起兵攻滔又李希烈已僭大號而諸侯異謀劉稹堅據上黨而三鎮離心以此觀之則唐之藩鎮各萌問鼎之心者多矣然而卒不能遂其逆謀者蓋彼同則此異左逆則右順輕重相制小大相維忽恭王命以效順忽矜兵勢以相臨所以然也至于朱全忠遂墟唐祚者非其才智過於安史朱泚之徒也蓋是時藩鎮諸侯各已滅矣時溥朱瑄秦宗權羅紹威王鎔之徒各已亡矣全忠視天下之大不復有牽制之黨乃平揖神器若固有之設使當全忠之時朱滔在冀田悅在魏王武俊在趙李納在齊則全忠雖有曹馬之謀亦焉能披大裘而稱制哉故曰唐之亡由藩鎮之削滅也豈非治亂興亡之鑒哉子由論德宗憲宗誅平藩鎮成敗不同曰德宗憤藩鎮之彊潛有鞭撻海內之志竭其帑藏空其禁衛以從事於伐叛然師出無功兵連禍結大盜竊發身播國屯滅亡之禍間不容髮自是之後亂不得息至於憲宗用一裴度決䇿出師淮西既平山東河北彊藩大鎮靡耳聽命終憲宗之世海內略定二帝於用兵伐叛則同而功烈何其相萬也管子有言攻堅則瑕者堅攻瑕則堅者瑕德宗始使馬璲李抱真討田悅魏鎮自承嗣以來兵彊國富屹然大鎮非可易者也二將之力斃於田悅而王武俊朱泚相煽而起內自魏至燕數千里間莽為戰場而四方諸侯始輕京師淮西雖叛然數郡之地也暴取其財虛用其民為日久矣危亡之機已見而元濟昏童崛强其間此特不欲取之耳取之可以必得豈與河朔諸鎮比也憲宗乘其機察其時一舉而滅之而李師道承宗之徒或誅或臣而四方靡然效順矣此無他德宗先攻其堅敵未亡而已之氣先索力先弊矣已索之氣既弊之力人所易侮此朱泚懷光所以陸梁不忌也憲宗先攻其易攻其巢穴戮其鯨鯢兵雖未出而氣振於天下師道承宗所以消沮而不能抗也有扛鼎之力者使之負石而趨終日則必蹶立談之間而磔嬰兒則賁育在傍必悸此攻瑕之論也歷代名賢確論卷九十六
