body:
  text: 歷代名賢確論卷五十六先主下諸葛亮東坡殷潜之杜牧之王荆公老泉子西少遊何去非尚馳裴度吕溫孫樵李翰諸葛亮東坡斜谷五丈原詩曰南望斜谷口三山如犬牙西觀五丈原鬱屈如長蛇有懷諸葛公萬騎出漢巴吏士寂如水蕭蕭聞馬檛公才與曹丕豈止十倍加顧瞻三輔間勢若風卷沙一朝長星墜竟使蜀婦髽山僧豈知此一室老煙霞往事逐雲散故山依渭斜客來空弔古清淚落悲笳殷濳之題籌筆驛詩曰江東矜割據鄴下奪孤婺霸略非匡漢雄圖欲佐誰奏書辭後主仗劒出全師重襲褒斜路懸開反正旗欲將苞有截必使舉無遺沉慮經謀際揮毫決勝時圜觚當分畫前筯比操持山秀拔英氣川流入妙思算成功在彀運去事終虧命屈天方猒人亡國自隨艱難推舊姓開創拯初基總歎曾過地寧探作教資若歸新厯數誰復顧衰危報德兼眀道長留識者知杜牧之和曰三吳裂婺女九錫獄孤兒霸主業未半本朝心是誰永安宫受詔籌筆驛沉思畫地乾坤在濡毫勝負知艱難同草創得失計豪釐寂默經千慮分眀渾一期川流縈智思山聳助扶持慷慨匡時略從容問罪師褒中秋鼓角渭曲晚旌旗仗義懸無敵鳴攻固有辭若非天奪去豈復慮能支子夜星才落鴻毛鼎便移郵亭世自換白日事長垂何處躬耕者猶題殄瘁詩王荆公詩曰漢日落西南中原一星黃羣盜伺昏黑聮翩各飛揚武侯當此時龍卧獨摧藏掉頭梁父吟羞與衆爭光邂逅得所從幅巾起南陽﨑嶇巴漢間屢以弱攻强暉暉若長庚孤出照一方勢欲起六龍東迥出扶桑惜哉淪中路怨者為悲傷豎子祖餘策猶能走强梁東坡八陳磧詩曰平沙何茫茫倣佛見石蕝縱橫滿江上嵗嵗沙水囓孔眀死已久誰復辨行列神兵非學到自古不留訣至人心已悟後世徒妄說自從漢道衰鋒起盡姦傑英雄不相下禍難久連結驅民市無烟戰野江流血萬人睹一擲殺盡如沃雪不為久逺計草草常無法孔眀最後起意欲掃羣孽﨑嶇事節制隱忍久不决志大遂成迂嵗月去如瞥六師紛未整一旦英雄折唯餘八陳圖千古壯䕫峽東坡論八陳勢曰諸葛亮造八陳圖於魚腹平沙之上壘石為八行相去二丈桓溫征譙縱見之曰此常山蛇勢也文武皆莫識吾嘗過之自山上俯視百餘丈凡八行為六十四蕝蕝上圜不見凸凹處如日中蓋影耳就視皆卵石漫漫不可辨老泉論諸葛亮與魏角戰曰知有所甚愛知有所不足愛可以用兵矣故夫善將者以其所不足愛者養其所甚愛者士之不能皆鋭馬之不能皆良器械之不能皆利固也處之而已矣兵之有上中下也是兵之有三權也孫臏有言曰以君下駟與彼上駟取君上駟與彼中駟取君中駟與彼下駟此兵說也非馬說也下之不足以與其上也吾既知之矣吾既棄之矣中之不足以與吾上下之不足以與吾中吾不既再勝矣乎得之多於棄也吾斯從之矣彼其上之不得其中下之援也乃能獨全邪故曰兵之有上中下也是兵之有三權也三權也者以一而致三者也管仲曰攻堅則瑕者堅攻瑕則堅者瑕嗚呼不從其瑕而攻之天下皆彊敵也漢髙祖之憂在項籍耳雖然親以其兵而與之角者蓋無幾也隨何取九江韓信取魏取代取趙取齊然後髙帝起而取項籍夫不汲汲於其憂之所在而倣徨乎其不足恤之地彼蓋所以孤項氏也秦之憂在六國也蜀最僻最先取楚最彊最後取非其憂在蜀也諸葛孔眀一出其兵乃與魏氏角其亡宜也子西論亮建興五年出屯漢中曰是嵗丁未魏之太和元年吳之黃武六年也魏眀帝即位既已踰年君臣無間前此吳人攻夏口圍石陽不克是嵗四境不動初孔眀說先主以保有荆益西和諸戎南撫夷越外交孫權內修政理天下有變則遣上將向宛洛而將軍身出秦川則霸業可成漢室可興矣孔眀始議如此至是天下寧有變耶而遽有此舉何哉又論出祁山馬謖敗亮還漢中曰漢全盛時日月所照橫目之民皆漢赤子其後德薄不能保有黎庶則舉江以東而投之吳割渭以北而捐之魏則民不棄漢而漢棄其民亮出祁山三郡望風響應而亮不能守則亮負於民而民不負亮方是之時固當集其所獲之衆痛自引咎而謝遣之使岐隴之民曉然皆知吾心則後日之舉不患其不至如其不然在彼猶在此也而亮拔四縣千餘家遷之漢中既不足以傷敵而使無辜之民流離轉徙違其宗族去其墳墓豈三郡所以響應之意哉此雖邉郡之常然於孔眀則有不應爾者此吾所以為之惜也又論亮為後主寫申韓管子六韜曰學者責孔眀不以經術輔𨗳少主乃用六韜管子申韓之書吾謂不然人君不問撥亂守文要以制略為先後主寬厚仁義襟量有餘而權略智謀是其所短當時識者咸以為憂六韜述兵權竒計管子責輕重慎權衡申子核名實韓子引繩墨攻事情施之後主正中其病矣藥無善惡要以對病為妙萬金良藥與疾不相值亦復何補哉東坡跋三國名臣贊曰西漢之士多智謀薄於名義東京事風節短於權略兼之者三國名臣也而孔眀巍然三代王者之佐未易以世論也又論曰取之以仁義守之以仁義者周也取之以詐力守之以詐力者秦也以秦之所以取取之以周之所以守守之者漢也仁義詐力雜用以取天下者此孔眀之所以失也曹操因衰乘危得逞其姦孔眀耻之欲信大義於天下當此時曹公威震四海東據許兖南收荆豫孔眀之所恃以勝之者獨以其區區之忠信有以教天下之心耳夫天下廉隅節槩慷慨死義之士固非心服曹氏也特以威劫而强臣之聞孔眀之風宜其千里之外有響應者如此則雖無措足之地而天下固為之用矣且夫行一不義而得天下有所不為而後天下忠臣義士樂為之死劉表之喪先主在荆州孔眀欲襲殺其孤先主不忍也其後劉璋以好逆之至蜀不數月扼其吭拊其背而奪之國此其與曹操異者幾希矣曹劉之不敵天下之所共知也言兵不若曹操之多言地不若曹操之廣言戰不若曹操之能而以一勝之者區區之忠信也孔眀遷劉璋既已失天下義士之望乃使治兵振旅為仁義之師東嚮長驅而欲天下響應蓋已難矣曹操既死子丕代立當此之時可以計破也何者操之臨終召丕而屬之植未嘗不以談尚為戒也而丕與植終於相殘如此此其父子兄弟且為寇讎而何能以得天下英雄之心哉此有可間之勢不過捐數十萬金使其大臣骨肉內自相殘然後舉兵而伐之此髙祖所以滅項籍也孔眀既不能全其信義以服天下之心又不能奮其智謀以絶曹氏之手足宜其屢戰而屢却哉故夫敵有可間之勢而不間者湯武行之為大義非湯武行之為失機此仁人君子之大患也呂溫以為孔眀承桓靈之後不可强民以思漢欲其播告天下之民且曰曹氏利汝吾事之害汝吾誅之不知蜀之與魏果有以大過之乎茍無以大過之而又决不能事魏則天下安肯以空言竦動哉嗚呼此書生之論可言而不可用也少游論曰朝錯曰五帝神聖其臣莫及三王臣主皆賢五霸不及其臣愚竊以為不然夫覆杯水於坳堂之上置杯焉則膠鷦眀之翮拔而傅鳲鳩則纍矣故有帝者之君則有帝者之臣有王者之君則有王者之臣有霸者之君則有霸者之臣諸葛亮雖天下之竒才亦霸者之臣爾何則亮帝王之輔肯為蜀先主委身耶王通以為使亮而無死禮樂其有興乎尤非也愚以為亮雖無死曾不足以取天下况於興禮樂乎何則亮之所事者蜀先主而所自比者管仲樂毅也先主雖號人傑然取天下則不及曹孟德保一方則不若孫仲謀其所以得蜀者以劉璋之暗弱而已先主雖存司馬仲逹陸伯言諸公皆無恙尚不足以取魏而死其能取天下乎管仲相齊九合諸侯一匡天下然不能先自治而後治人故孔子以為小器樂毅為弱燕合五國之從夷萬乘之齊然曠日持久不能下莒與即墨至間者得行捐燕之趙管仲樂毅雖得志天下尚不能興禮樂亮而無死其能興禮樂乎夫古之君子進難而退易伊尹耕于有莘之野也則固已曰使是君為堯舜之君使是民為堯舜之民蓋求之而不用其道則彼有不出而已孔子曰如有用我者其為東周乎蓋用之而不盡其藴則彼有不留而已是故有所不出出則可以取天下有所不留留則可以興禮樂方先主之顧亮於草廬之中所言者取荆益二州耳至言天下有變則一軍出秦川所謂俟河之清人夀幾何者耶關侯之死大舉伐吳亮曾不能强諌及兵敗乃嘆曰法孝直若在能制主上令不東就東必不危也所謂虎兕出於柙龜玊毁於櫝中是誰之過歟以此論之亮之不足以取天下而興禮樂亦眀矣然亮與先主一言道合遂能霸有荆益成鼎峙之勢及受寄托孤義盡於主國無間言身死之日雖遷廢之人為之泣下有致死者雖古往社稷之臣何以加諸陳夀以謂管蕭之亞蓋近之矣然夀以謂應變將略非其所長信乎此非也亮之征孟獲七縱七擒之獲曰天威也南人不復反矣其卒於渭上司馬仲逹按行其營壘處所曰天下之竒才也所作八陳圖後世言兵者必稽焉則亮之應變將略不言可知矣嗚呼豈夀挾髠其父之故耶抑其所自見如此也何去非論曰或曰劉備之爭天下也不因中州而西入巴蜀此所以據非其地而卒以不振歟曰有之也備非特委中原而趨巴蜀也亦爭之不可得然後委之而西入耳備之西者由智窮力憊蓋晚而後出於其勢之不得已也方其豪傑並起而備已與之周旋於中原矣始得徐州而呂布奪之中得豫州而曹公奪之晚得荆州而孫權奪之備將興復劉氏之大業其志未嘗一日而忘中州也然卒無以暫寓其足委而西入者有曹操孫權之兵軋之也備之既失豫州而南依劉表也始得孔眀於羇窮困䠞之際而孔眀始𨗳之以取荆收益而自為資孔眀豈以中州為不足起而以區區荆益之一隅足以有為邪亦以魏制中原吳擅江左天下之未為吳魏者荆益而已顧備取此則無所歸者故也是以一敗曺公而遂收荆州繼逐劉璋而遂取益州者孔眀之略也雖然孔眀之於二州也得所以取之而失所以用之至於遂亡荆州而勞用蜀民功業亦以不就良有以也夫荆州之壤界於吳蜀之間而二國之所必爭者也自其勢而言之以吳而爭荆則近而順以蜀而爭荆則逺而艱蜀之不能有荆猶魏之不能有漢中也是以先主朝得益州而孫權暮求其荆州權之求之也非以備之得蜀而無事乎荆也亦以其自蜀而爭之不若乎吳之全故也故直求之者示吾有以收之也蓋備一不聽而權已奪其三郡備無以爭而中分畀之以分裂不全之荆州而有孫權之窺聽其後為之鎮撫則安動役則危亮不察此而恃關侯之勇使舉其衆以北侵魏之襄陽故孫權起躡其後賊侯而盡奪其荆州此孔眀失於所以用荆也然後備之所有獨岷益耳雖然地僻而固魏人不敢輕加之兵而鼎足之形遂成使備之不西而唯徘徊於中州則亦不知所以稅駕矣備之既死舉國而屬之孔眀孔眀有立功之志而無成功之量有合衆之仁而無用衆之智故嘗數動其衆而亟於立功功每不就而衆已疲此孔眀失於所以用蜀也夫蜀之為國巖僻而固非圖天下者之所必爭然亦未嘗不忌其動以其有以窺天下之變出而乘之也雖然蜀之與魏其為小大彊弱之勢蓋可見也曹公雖死而魏未有變又有司馬仲逹以制其兵孔眀於此不能因備之亡深自抑弱以盈怠其心使其無意於我勵兵儲粟伺其一旦之變因河渭之上流裏糧卷甲起而乘之則莫不得志乃以區區新造之蜀倡為仁義之師强天下以思漢日引而北以求吞魏而復劉氏故常千里負糧以邀一日之戰不以敗還即以饑退此其亟於有功而亡其量以待之也善為兵者攻其所必應擊其所不備而取勝也皆出於竒孔眀連嵗之出而魏人每雍容不應以老其師遂至於徒歸而又以吾小弱而向彊大未嘗出於可勝之竒蜀師每出魏延常請萬兵趨他道以為竒亮每拒之而延深以憤惋孔眀之出者六蓋嘗一用其竒矣聲言由斜谷而遂攻祁山以出魏人之不意一旦而降其三郡關輔大震卒以失律自喪其師竒之不可廢於兵也如此而孔眀之不務也此鋭於動衆而無其智以用之也嗚呼非湯武之師而惡夫出竒卒以喪敗其衆者可屢為哉雖然孔眀不可謂其非賢者也要之黠數無方以當司馬仲逹則非敵故也范蠡之謂勾踐曰兵甲之事種不如蠡鎮撫國家親附百姓蠡不如種范蠡自知其所長而亦不彊於其所短是以能濟孔眀之於蜀大夫種之任也今以種蠡之事一身而二任之此其所以不獲兩濟者也尚馳武侯廟碑銘曰漢代之季天下不得不三分蓋有由矣曹氏挾王室之威重孫氏藉父兄之餘業劉氏獨不階尺土開國於亡命行旅之間天贊一武侯即鼎足之勢均也公諱亮字孔眀身長八尺嘗躬耕壠畝好為梁甫吟先主既用自北徂南周爰執事夷險平亂靡所不之卒使劉氏以岷峨之地為己封梁益之人為己畜曹操不敢以兵彊驟進孫權不敢以境闊妄動彼相之力焉屬先主創業未半中道而殁遺詔邦家之事大録于公敕後主事公如事父至於職為臣行令如君其名近嫌也位為君事臣如父其形近猜也不然豈周公賦鴟梟之詩成王啓金縢之誥此雖大小有異託付不殊竟能上不生疑心下不興流言茍非誠信結於人格於神移於物則莫能至是公復總戎仗律無嵗不征將繼舊邦之業用復先君之命所以南擒孟獲而不殺志在綏戎狄矣西拔祁山而不賀志在吞河洛矣役木牛流馬濟人之力已紓矣制陳圖兵法敵國之軍可玩矣故得三關不封二邦喪氣大勳未集行師而殞戎夷野祠氓庶巷祭遺愛所使豈求而得之噫國之將亡本必先顛且以蜀之連山峻極其嶮不為公死而平沃土富饒其利不為公死而薄甲兵士卒其衆不為公死而減府藏穀帛其富不為公死而貧及鄧艾揚聲於前鍾㑹躡跡於後滅蜀三十萬户如撓羣羊劉禪竟不免面縳壘門身為降虜天事歟人事歟天事逺吾不知之矣以人事而論使武侯常存殷殷一敵國勝於本朝百萬之師北向爭衡司馬懿復惕息而不敢戰足眀中原非曹丕所有也舉其大略真命世之雄未可以身許小國之君延霸王之佐因曰才有所詣不逹前賢向令伊呂並世而生殷周易地而處則太甲不放桐宫而四海咸理諸侯不誓孟津而天下大定但為天不假年志畫莫就生居於後功績在其下耳然非先主之識武侯或不能輔成於王業使百代令君用人必由此道欲使社稷不振賢智逃於藪澤其可得耶公死之日遺令葬漢中定軍山祭法曰法施於民以死勤事以勞定國則祀之至今官書廟食成不刋之典一山之內每有風行草動狀帶威神若嵗大旱邦人禱之能為雲為雨是謂存與沒人皆福利生死古今一也死而不朽反貴於生焉銘曰漢室大壞掃地無依人心各動天命未歸角力爭負有翼者飛突兀卧龍吟嘯待時一論世事超拜軍師魚水相得生死以之仗順收兵行權略地氣蓋全吳胸吞大魏國政成三人臣莫二乃建社稷興王之器既得武侯甈􅀈魏都敵國未滅謀臣已殂大本去矣不降得乎荒墳四頽拱木皆枯尚餘精爽能禁樵蘇人生異代仰止山隅裴度武侯祠堂碑銘曰度嘗讀舊史詳求往哲或秉事君之節無開國之才得立身之道無治人之術四者備矣兼而行之則蜀丞相諸葛公其人也公本系在簡䇿大名蓋天地不復以云當漢祚衰陵人心競逐取威定霸者求賢如不及藏器在身者擇主而後動公是時也躬耕南陽自比管樂我未從虎時稱卧龍詩曰潛雖伏矣亦孔之昭崔州平心與元直神交洎乎三顧而許以驅馳一言而定其機勢於是翼扶劉氏纘承舊服結吳抗魏擁蜀稱漢刑政逹於荒外道化行乎域中誰謂阻深殷為彊國誰為遳脆勵為徑兵則知地無常形人無常性自我而作若金在鎔故九州之地魏有其七我無其一由僻陋而啓雄圖出封疆以延大敵財用足而不曰浚我以生干戈動而不曰殘人以逞其底定南方也不以力制而取其心服震懾諸夏也不敢角其勝負而止候其存亡法加於人也雖從死而無怨德及於人也雖奕葉而見思此所謂精義入神自誠而眀者矣若其人存其政舉則四海可平五服可傾而陳夀之評未極其能事崔浩之說又詰其成功此皆以變詐之略論節制之師以進取之方語化成之道不其謬歟噫夫委棄荆州不能遂有三郡此乃務增德以吞宇宙不黷武以爭尋常及出斜谷據武功分兵屯田謀久駐之計與敵對壘待可勝之期雜乎居人如適虛邑彼則喪氣我方飬威若天假之年繼大漢之祀成先主之志不難矣且權傾一國聲震八紘上下無異辭始終無愧色茍非運膺五百道冠生知曷以臻於此乎云云銘曰昔在先主思啓疆宇擾攘靡依英雄無輔爰得武侯先定蜀土道德城池禮義干櫓煦物如春化人如神勞而不怨用之有倫柔服蠻落鋪敦渭濵躡跡畏威雜居懷仁中原旰食不測不克以待可勝允臻其極天未悔禍公命不果漢祚其亡將星中墮反旗鳴鼓猶走司馬死而可作當小天下尚父作周阿衡佐商兼齊管晏總漢蕭張易代而生易地而理遭遇豐約亦皆然矣嗚呼竒謀奮發美志夭遏吁嗟嚴立咸受謫罰聞之痛之或泣或絶甘棠勿剪駢邑斯奪繇是而言殊途共轍本於忠恕孰不感恱茍非誠慤徒云固結古柏森森遺廟沈沈不殄禋祀以迄于今靡不駿奔若有照臨蜀國之風蜀人之心錦江清波玊壘峻岑入海際天知公德音呂溫曰天厭漢德俾絶其紐羣生墜塗四海飛水武侯命世實念皇極魏姦吳輕未獲心膂南陽堅卧待時而起三顧雖晚羣雄粗定必也彗掃是資鼎立變化消息謀成掌中龍戰元黃再得雲雨於是右揭如天之府左提用武之國因山分力與水合勢蟠亘萬里張為龍形亦欲首吞咸鎬尾束河洛翼乎中夏飛于天衢然後長驅句吳東入晏海大勳未集天奪其魄至誠無妄炳在日月烈氣不散長為風雷英雄痛心六百年矣於戲以武侯之才知已託國土雖狹國以勤儉富民雖寡兵以節制强魏武既沒晉宣非敵而戎車荐駕不復中原或竒謀非長則斬將覆軍無盛舉矣或餽糧不繼則築室反耕有成算矣嘗試念之頗賾其原夫民無歸德以為歸撫則思虐則忘其思也不可使忘其忘也不可使思當漢道方休哀平無罪王莽乃欲憑戚寵造符命脅之以威動之以神使人亡漢終不可得也及髙光舊德與世衰逺桓靈流毒在人骨髓武侯乃欲開季世振絶緒論之不以本臨之不以忠使人思漢亦不可得也向使武侯奉先主之命告天下曰我之舉也匪私劉琮惟活元元曹氏利汝乎吾事之曹氏害汝乎吾除之俾虐魏逼從之民聳誠感動然後經武觀兵長驅義聲咸洛不足定矣奈何當至公之運而强人以私此猶力爭彼未心服勤而靡獲不亦宜哉乃知務開濟之業者未能審時定勢而大順人心而克觀厥成吾不信也惜其才有餘而見未至云云孫樵刻武侯碑隂曰赤帝子火熾四百年天厭其熱洎獻燼矣武侯獨憤激不顧收死灰於蜀欲噓而再然之艱乎為力哉是以國稱用武岐雍間地不尺闊抑非智不周天意炳炳也夫以武侯之賢寧靡籌其不可耶蓋激備隆中以天下託不欲曲肱安榖終兒女子手將驅馳死備志耶由是核武侯之所為殆庶幾矣然跨西南一隅與吳魏抗國提卒數萬綽綽乎去留無我拒者是亦善為兵矣史夀以為短於應變真抑武侯哉俾武侯不早入蜀地曹之君臣將奔走固圉之不暇鍾鄧寧能越巖懸兵決勝指取耶是井絡之野與武侯存亡俱矣天殱武侯其不愛劉愈眀白矣其姜維何力焉曩蟠南陽時人不與仲毅伍洎受社稷寄擅刑賞柄曾心不愧畏人不疑黷何意氣眀信之卓卓也武侯死殆五百載許今梁漢之民歌道遺烈廟而祭者如在其愛於民如此而久也獨謂武侯之治比於燕奭彼屠齊城合諸侯在下矣李翰三名臣論諸葛比管樂曰或問於翰曰昔諸葛亮擁膝南陽為梁父吟每自比管仲樂毅州平元直以為信然此三名臣者亦優劣乎曰夫小者不足以論大近者不足以量逺奈何况議大賢然執律管者可以候四氣之微測日晷者可以知千里之度察微觀著由虛考實儻容寄言象於斯矣如僕所揣則管不逮樂孔眀其伯仲之間曰何謂其然也昔管仲相桓公九合諸侯一匡天下興齊定霸尊周勤王功其懋哉仁亦至矣孔明收荆州散敗之餘建䇿通吳合從破魏奉先主西入劍門下車而三分天下翊戴後嗣續修舊勳雖短祚中否而王業殆成樂生一為燕將才勝齊師挫衄於二城之間狼狽於返國之際軍不振旅身卒奔亡子獨推而崇之冠於二賢之首誠所未喻其有說耶翰曰語功則信然語才則不爾夫才生於代功興運成固有才優而功微運合而才劣當先格以道德核於終始審其邪正觀其去就然後事可明也夷吾當既亂之時輔有過之主功濟諸夏澤被生民信為美矣然徼功事讎務人之情通矣肆奢越禮盈量之意見焉故仲尼雖稱其仁終小其器止於霸者之佐殆非王臣之良孔眀從容三顧後起籌畫必當事屯而業亨主暗而國治兵弱而强鄰畏服功大而本朝不疑斯亦難矣然窺其軍令跡其用法必使中原可復然後厚賞寬刑元德嘗稱馬謖言過其實不可大用之卒致喪敗斯所謂濟於事而未全於道得諸已而未審於人樂生一戰舉齊二城未下從之以德收之以禮舍權變於攻取之際行王道於軍旅之間事雖不成業亦大矣向使昭王不死惠王不疑則其功未可量也夏侯太初論之詳矣及其逃燕之責亡而奔趙趙王問以圖燕之䇿樂生流涕而對曰臣昔日之事燕昭王猶今日之事大王也千秋萬嵗之言可謂懷祿不屑其榮周身不違於道比諸二子不亦優哉主恩非臣下之所圖天命豈生人之所制安可以功業之成敗斷才能之長短耶且夫運有通塞命有修短蓋天意也豈人事乎昔韓信將伐魏問得不以周叔為將乎聞不用乃大喜向使魏人用之則漢師不敢濟河矣然則周叔之才亦韓信流亞也終埋滅而無聞焉古之大才而功不著者亦何可勝道哉歷代名賢確論卷五十六
