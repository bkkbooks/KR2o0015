body:
  text: 歷代名賢確論卷三十四始皇三焚書坑儒司空圖劉蛻賈至長城陸參阿房宫杜牧築臺厭王氣王元之驪山墓皇甫湜大夫松廖復桃花源李白焚書坑儒司空圗銘秦坑曰秦術戾儒厥民斯酷秦儒既坑厥祀隨覆天復儒讎儒祀而家秦坑儒耶儒坑秦耶劉蛻曰無有天下而不知秦之焚書也無世而不謂不用聖人之道所以亡也嗚呼秦亡自亡也安能焚書為秦亡耳天下不用秦如聖人之道故秦不得其道而用也當其時天下一家而尊已外無非心之人故深法禁人之惡也則不當去法以禁人之善是則果習天下之離心而背已也豈秦區區之心歟蓋天必以秦之强暴非大敗無以叛其四海之心故先絶其事君敬長之術而後從天下以亡其天下焉夫天與秦則書存不與秦則書焚而秦終無自焚之心也且聖人宫先自藏其書是秦未始有焚書之心聖人之家先有其心矣故曰秦亡其自亡矣且聖人之道與天地合其久與鬼神合其微則不得毁置之在秦也然矣陶唐氏之水前有聖人之化後有聖人之覲而後民知事君敬長之術自秦之火前聖已逺後聖不作而其術不數世亦已成矣豈非天之欲有絶而先絶其術欲有立而先立歟今或怨秦之火不全其道也不如秦火息矣賈至曰昔秦滅羲軒之制廢唐虞之則大搜學徒竭索儒黨懷書捧檄者鱗集麏至然後罪九流之異論尤百氏之殊術無辜殺身有道併命寃骸積於坑谷流血染於泉壤蹈仁義而死者不可勝紀於戲秦皇帝以神武邁古并吞六合掃天下以一篲芟羣雄如衆草建官罷侯大權在已自軒轅以降平一宇宙未有若斯之盛也夫戡亂以武守武以文文以正業武以權勝秦皇知權之可以取不知正之可以守嚮使天下既定守正崇儒遵六經之謨訓用三代之文質則唐軒盛矣湯武𢎞業不若也觀夫坑儒焚書之意乃欲蓋先王之能事竊作者之鴻名黈衆耳以前聞逞私欲於當代此儒之所忌也秦之所志悲夫儒以恭儉為宗秦則疲弊生人極力宫室儒以道德柔逺秦則竭耗中國勞師四夷儒以宥過議賢秦則刻法峭刑賊虐諫輔儒以述先好古秦則師心狥智播棄典墳夫如是則秦不得不滅儒不得不坑事使然也長城陸參賦曰千城絶長城列秦民竭秦君滅嗚呼悲夫可得而說原夫恣無道戮無辜帝謂其朕亡秦者胡不可知也疑是胸奴於是先䝉恬次扶蘇帥兵伍役刑徒千里萬里雨驟而雲趨入胡之鄉卻胡之王比胡之黨削胡之疆然後自于洮至於遼江漢湯湯將池焉而共浚太山巍巍將城焉而共髙欲限華夷决安危一世萬世有中原而稱大帝想其初也闢遐荒窮下土極九泉而深望九霄而樹千夫力殫目不暇睹有力如虎亦不暇努咫尺之間或什而伍離婁瞪瞪亦不暇數人氣氲氲成一方之雲灑汗蕭蕭成半空之雨駕肩而趨踵步而履紛紛囂囂如日中之市國不得而寧役不得而停伊朝繼夕自昏逹明時若炎風熾烈川源盡竭枯肌外焚肉火中渴是民咿咿憂秦未拔至若苦雪初霽隂風雨霜凍折髭鬢氷寒腋腸是民惶惶憂秦未亡民之既酷載僵載仆饑兮不粟寒兮不服病不暇休蟣不暇沐基人之骸壓人之肉少者不遑老者不復秦民嗚嗚向城而哭邉雪夜明列雲鏵也白日晝黑揚塵沙也築之登登約之閣閣逺而聽也如長空散雹蟄蟄而征沓沓而營逺而望也如大江流萍其呼號也怒風匉訇其鞭撲也血流縱橫地祇業業終朝忽讋星辰悠悠畏其相接而况於夷狄而况於臣妾其運輸也巷無居人田無稼民牛首濈濈大車轔轔輪不暇徙蹄不暇奔其傷財也極民之賦虛民之賂糊口而供赤立而赴餓殍塞路亦不我顧其民呶呶面天而訴將以宏其基恢其堵盡韓齊之土固其壁崇其飾竭億兆之力太華方城乃一卷之石既而岌嶪崢嶸向秦而橫如山之成如雲之平繚繞之際亘如長鯨豎亥汲汲步不可及掩映天漢勢不可算丘陵峩峩不及其半影入沙磧勢侵西域殘陽不來未昏而夕其堅如金其峻如淋崇髙不可以日辨逺大不可以數尋鳥飛不前其歸翩翩雲不得施其隂綿綿風不得馳其聲喧喧下視關塞蝸牛蟬聨回顧宫闕壯如微烟胡人駢連望之巍然如登青天如臨深淵不敢久視鳬趨而旋嗟乎城即髙大民惟艱難聞之者攘臂而切齒覩之者泣涕而長歎夫如是刑不得不暴政不得不煩國不得不亂民不得不殘謂其城可以固宗社謂其暴可以定人寰奈何敵不在逺憂不在胡城未畢也而秦已無殊不知棄秦者身冦秦者臣喪秦者嗣敵秦者民而怒秦者鬼神此可憂也而秦弗憂徒欲竭生民壘胡塵萬里而塗炭十年而苦辛然且喪其民亡厥身非城也去仁義積土石非城也是曰禍之門是曰滅之根安得而為防安得而稱長嗚呼謂險之可恃城之可保則右彭蠡左洞庭不為堯之征面伊闕背羊腸不為湯之亡是以處堯之宫行堯之風雖無是城也不可得而亂不可得而攻用秦之威布秦之非雖有是城也如藩垣之微如閫閾之卑無以防其患扞其師不然者秦無得而殃城無得而荒本以為禦而反以為亡者哉阿房宫杜牧賦曰六王畢四海一蜀山兀阿房出覆壓三百餘里隔離天日驪山北搆而西折直走咸陽二川溶溶流入宫牆五步一樓十步一閣廊腰縵回簷牙髙啄各抱地勢鈎心鬭角盤盤焉囷囷焉蜂房水渦矗不知其幾千萬落長橋臥波未雲何龍復道行空不霽何虹髙低冥迷不知西東歌臺暖響春光融融舞殿冷袖風雨凄凄一日之內一宫之間而氣侯不齊妃嬪媵嬙王子皇孫辭樓下殿輦來于秦朝歌夜弦為秦宫人明星熒熒開曉鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也煙斜霧橫焚椒蘭也雷霆乍驚宫車過也轆轆逺聽杳不知其所之也一肌一容盡態極妍縵立逺視而望幸焉有不得見者三十六年燕趙之收藏韓魏之經營齊楚之精英幾世幾年收掠其人倚疊如山一旦不能有輸來其間鼎鐺玉石金塊珠礫棄擲邐迤秦人視之亦不甚惜嗟乎一人之心千萬人之心也秦愛紛奢人亦念其家奈何取之盡錙銖用之如泥沙使負棟之柱多於南畝之農夫架梁之椽多於機上之工女釘頭磷磷多於在庾之粟粒瓦縫參差多於周身之帛縷直欄橫檻多於九土之城郭管弦嘔啞多於市人之言語使天下之人不敢言而敢怒獨夫之心日益驕固戍卒呌函谷舉楚人一炬可憐焦土嗟乎滅六國者六國也非秦也族秦者秦也非天下也嗟乎使六國各愛其人則足以拒秦使秦復愛六國之人則遞二世可至萬世而為君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不鑑之亦使後人而復哀後人也築臺厭王氣王元之曰古之王者無靈臺視雲物察氣候之吉凶知政教之善惡茍理合天道垂休降禎則必日新其德以奉之化失民心為妖作沴則必夕惕其躬以懼之如是則變禍福而返災祥不為難矣烏有築髙臺厭王氣行巫覡之事禦天地之災者乎嬴政之有天下也始以利觜長距雞鬭六國而擅場復以鉤爪鋸牙虎噬萬方而擇肉終以多藏厚斂蠶食兆民而富國然后戍五嶺築阿房驅周孔之書盡赴回祿惑神仙之術但崇方士收大半之賦則黔首豆分用三夷之刑則赭衣櫛比鯨鯢國政螻蟻人命原膏野血風腥雨膻六合熬熬上訴求主天將使民息肩于炎漢故望氣者云東南有天子之氣于是祖龍巡狩築臺以厭之殊不知民厭秦也訴之于天天厭秦也授之于漢秦獨厭天厭民而自王乎向使築是臺告天引咎遷善樹德封六國之嗣復萬民之業薄賦斂省徭役銷戈融兵勗稼懋穡誅髙斯之暴政修唐虞之墜典下從人望上答天意則王氣不厭而自銷矣劉項之族何由而興哉驪山墓皇甫湜狠石銘曰狠石蒼蒼驪山之旁鑱朴礲瘢嶷然四方昔秦皇帝謀之不臧七十萬人兹焉惶惶發石此山言礎于墳若有憑依屹住中逵淫刑蹴迫人力無施故老相傳以狠名之自昔太古不封不樹有葛於溝有薪於野後聖有作緣情不忍為之棺槨其在唐虞則維窾木噫嘻暴秦虐用其人墳而象山下錮三泉窮珍總竒力瘁財殫驅驅而前如刈草菅天毒其衷神憤其凶謫戍一呼九州風從白梃荆棘指麾崤潼險阻不闔干戈倒鋒尸露于劫燧燔于童蓬顆無依不十年中禹葬㑹稽不改其行聖德洋洋厥響久長至于漢劉釋之而言中如可欲猶隙南山矧私其身以盡其人刻詞狠石炯戒千春大夫松廖復賦曰舜之興兮風雨弗迷松之生兮雖茂何為禹鑿九州櫛風沐雨隨山刋木民知攸處如穀如桑共生于商太戊修德其邦乃昌周室方隆拔樹而風時王以悟時和嵗豐嬴政肆虐并吞六雄虎視裁定鑾輿遂東謂蓬島可以立至謂太山可以升中遘天赫怒雷雨交攻羽葆莫能施其妙復陶何以效其蹤既避于五株之下乃行乎一命之封是何馳騁之極非君之德天罰斯盈以警其身惟松所茂亂虐以振嗟乎秦之為君封其樹不封其臣松之為臣庇其君不庇其民樹有爵位人遭斧斤委任姦邪兮言有枝葉誅戕殘賊兮絶其本根殊不知松之枝有軒墀之幹不能止趙髙之佞松之姿有淮淝之形不能卻陳涉之兵項氏繼踵劉氏建旌望夷烹亥軹道繁嬰大夫亭亭空守其名者也桃花源李白曰昔祖龍滅古道嚴威刑煎熬生人若墜大火三墳五典散寒灰築長城建阿房并諸侯殺豪俊自謂功髙羲皇國可萬世思欲凌雲氣求仙人登封泰山風雨暴作雖五松受職草木有知而萬象乖度禮刑將弛則綺皓不得不遁於商山魯連不得不蹈於東海則桃源之避世者可謂超升先覺夫指鹿之儔連頸而同死非吾黨之謂乎歷代名賢確論卷三十四
