body:
  text: 厯代名賢確論史評類提要臣等謹案厯代名賢確論一百卷不著撰人名氏前有明吳寬序稱皆唐宋人所著其説散見文集中或病其不歸於一輯成此編以便觀覽錫山錢孟濬因其書不能家有因刋以傳世云云而亦不詳作者為誰近世所行刋本或有題為華亭錢福所輯者然福以𢎞治三年庚戍登第寬序作於𢎞治十七年甲子二人同時不應不知為福書殆後來重刻者托福名以行殊不足信按諸家論著皆至北宋而止其書萇宏作萇洪猶避宣祖廟諱則理宗以前人所作考宋史藝文志有名賢十七史確論一百四卷蓋即此書惟此本較少四卷稍為不合或史衍四字或刋本併為百卷以取成數均未可知觀其評隲人物自三王以迄五季按代分系各標列主名其總論一代者則稱通論以别之雖不標十七史之名而核其始末恰應十七史之數其為宋志之所載益足證矣所引唐人之文如羅隱論子髙梅子真盧藏用論紀信張謂論劉宋代晉諸篇皆唐文粹諸書所未録蓋宋時場屋有試論之制故輯此書以為舉業標準雖亦揣摩程試之學然去取較有剪裁視陳繼儒古論大觀之龎雜叢脞者固不可同年而語爾乾隆四十四年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀厯代名賢確論序名賢確論一百卷皆唐宋人所著也其説散見於文集中或病其不歸于一輯成此編以便觀覽其所論逺自三皇近至五季或論其世或論其人或論其事或専論或通論上下數千百年皆具于此夫人生乎千百年之下而欲論乎千百年之上其世逺其人亡其事隱考其治忽辨其賢否求其得失以為定論其亦難矣蓋人生同時者每有愛憎之心其居異代者必無好惡之念此人之常情而名世之賢又不必以此語之也惟世之立論者逞異以為髙出竒以相勝人自為説不肯附和如法家之斷獄得其情者固多至失於慘刻流於姑息者其刑未必皆平也故雖文章大家君如武王以為非聖臣如馮道猶以為賢史筆操縱一至於此他尚何望哉錫山錢孟濬出江南大族好為義舉以此編不能家有因刻以傳世來請序於豫自顧區區末學何足以知此既久始克書而歸之惟此編特出於唐宋之人豫猶恨其不上及於漢如賈誼過秦之類豈漢以來别自有編耶𢎞治十七年夏四月吉旦資善大夫掌詹事府事禮部尚書兼翰林院學士長洲吳寬序
