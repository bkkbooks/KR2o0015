body:
  text: 歴代名賢確論卷十四伯禽用天子禮樂高郢隱公攝位六一桓公鄭伯以璧假許田東坡取郜大鼎于宋東坡曹劌言長勺之戰栁州僖公禘于太廟用致夫人東坡五石六鷁六一魯頌鄭獬用天子禮樂髙郢曰周公居攝七年致政而殁成王康王追思其德命魯侯代之祀以天子禮樂魯君得乗大輅建太常外祭郊社内祭嘗禘虞夏商周之服器與官兼而用之以廣魯于天下郢竊謂自天子至於庶人尊卑貴賤待禮而别豐者不可殺殺者不可豐成康過賜非禮也魯君受賜亦非禮也何則郢聞有位而後行典禮仲尼不臣門人非君也季札不嗣吳爵非長也周公不王而以禮樂王者是以非禮誣周公也設欲誣周公以非禮曾謂昊天上帝亦可誣乎奈何使魯人郊昔孔子憤歎于衰周而欲求禮于魯及覩其僭乃言曰魯之郊禘非禮也周公其衰矣魯用天子禮樂者本以郊上帝既非聲名文物之不當用可知矣又恐來者以杞宋用王禮為後因言杞之郊也禹也宋之郊也契也是天子之事守也杞宋二王後得守先祖禮樂魯何守而用之耶猶懼其未能又言曰天子祭天地諸侯祭社稷祝嘏莫敢易其常故是謂大嘏此乃申言名位不同禮亦異數之定分也夫子之言昭昭如掲日月而學者或以為事使聖人未聞可否難措辭于魯議者于謙黙之道則可矣於發揮之義恐未盡也詩曰爾之教矣人胥効矣魯侯用王禮其臣亦用侯之禮故季氏舞八佾旅泰山設公廟歌雍徹嗟乎禮之不早辨也如此古者父為天子諸侯子為士祭禮從子不得從其父晉應武王之穆得用備物享武王乎若享非禮之祭是周公不得為聖也知其不享是成康秪以王者禮樂餒周公于魯矣安在其廣乎且周公之績孰與伊尹佐商成康之明孰與太戊崇異伊尹不過號為保衡至于沃丁太戊亦不加以王禮或謂周公叔父也于伊尹而為親故尊而異之夫太伯太王之元子三以天下讓于王季王季得之以傳祚于文武故孔子曰太伯其可謂至德也已矣及武王克紂追王太王王季文王而不追王太伯豈武王忘太伯之德而不親乎盖以等威之禮名分之别為萬代之凖不為一人私也夫人情無常以禮為常以禮從情動則有悖且如王者祖有功而宗有德祖宗之廟代代不毁大凡繼體之君皆欲祖宗其父至于功德未著不敢妄加廟稱者情非不欲限禮而已矣故禮之行于宗廟父子不得遂其私而况成康又得以天地之公器大典獨私于周公乎周公有大勲于周土田附庸以益之則可秬鬯圭瓚以賜之則可若天子禮樂成康所恃以為尊也胡可以假人成康雖欲尊于周公伯禽其忍受之以出僭其君入陷其父乎若周公躬制禮樂墳土未乾而子孫不克負荷亂王者之度孔子稱其衰不亦宜乎攝位六一曰孔子何為而修春秋正名以定分求情而責實别是非明善惡此春秋之所以作也自周衰以來臣弑君子弑父諸侯之國相屠戮而争為君者天下皆是也當是之時有一人焉能好亷而知讓立乎争國之亂世而懷讓國之髙節孔子得之于經宜如何而别白之宜如何而褒顯之其肯没其攝位之實而雷同衆君誣以為公乎所謂攝者臣行君事之名也伊尹周公共知之臣嘗攝矣不聞商周之人謂之王也使息姑實攝而稱號無異于正君則名分不正而是非不别夫攝者心不欲為君而身假行君之事雖行君事而其實非君也今書曰公則是息姑心不欲之實不為之而孔子加之失其本心誣以虚名而没其實善夫不求其情不責其實而善惡不明如此則孔子之意踈而春秋繆矣春秋辭有同異尤謹嚴而簡約所以别嫌明㣲慎重而取信其于是非善惡難明之際聖人所盡心也息姑之攝也㑹盟征伐賞刑祭祀皆出于己舉魯之人皆聽命于已其不為正君者幾何惟不有其名爾使其名實皆在已則何從而知其攝也故息姑之攝與不攝惟在為公與不為公别嫌明㣲繫此而已且其有讓桓之志未及行而見殺其生也志不克伸其死也被虚名而違本意則息姑之恨何伸于後世乎其甚髙之節難明之善亦何望于春秋乎今說春秋者皆以名字氏族與奪為輕重故曰一字為褒貶且公之為一字豈不重于名字氏族乎孔子于名字氏族不妄以加人其肯以公妄加于人而没其實乎以此而言隱實為攝則孔子决不書曰公孔子書為公則隱决非攝難者曰然則何為不書即位曰惠公之終不見其事則隱之始立亦不可知孔子從二百年後得其遺書而修之闕其所不知所以傳信也難者又曰謂為攝者左氏爾公羊穀梁皆以為假立以待桓也故得以假稱公予曰凡魯之事出于已舉魯之人聽于已生稱曰公死稱曰薨何從而知其假東坡曰魯隱公元年不書即位攝也公子翬請殺桓公公曰為其少故也吾將授之矣使營莬裘吾將老焉翬懼反譖公于桓而使賊殺公歐陽子曰隱公非攝也使隱果攝則春秋不書為公春秋書為公則隱公非攝無疑也蘇子曰非也春秋孔子信史也隱攝而桓弑著于史也詳矣周公攝而克復子者也以周公薨故不稱王隱公攝而不克復子者也以魯公薨故稱公史有諡國有廟春秋獨不得稱公乎然則隱公之攝也禮歟曰禮也何自聞之曰聞之孔子曽子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北靣而西階南何謂攝主曰古者天子諸侯卿大夫之世子未生而死則其弟若兄弟之子以當立者攝主子生而女也則攝主立男也則攝主退此之謂攝主古之人有為之者季康子是也季桓子且死命其臣正常曰南孺子之子男也則以告而立之女也則肥也可桓子卒康子即位既葬康子在朝南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告于君與大夫而立之今生矣男也敢告康子請退康子之謂攝主古之道也孔子行之自秦漢以來不修是禮而以母后攝孔子曰惟女子與小人為難養也使與聞外事且不可曰牝雞之晨惟家之索而况可使攝位而臨天下乎女子為政而國安惟齊之君王后吾宋之曹髙后也盖亦千一矣自東漢馬鄧不能無譏而漢吕后魏胡武靈唐武后之流盖不勝其亂王莽楊堅遂因以易姓由是觀之豈若攝主之庶幾乎使母后而可信則攝主亦可信也若均之不可信則攝主取之猶吾先君之子孫也不猶愈于異姓之取哉或曰君薨而百官總已以聽於冡宰三年安用攝主曰非此之謂也嗣天子長矣宅憂而未出令則以禮設冡宰若太子未生生而弱未能君也則三代之禮孔子之學决不以天下付異姓其付之攝主也夫豈非禮而周公行之歟故隱公亦攝主也鄭𤣥儒之陋者也其傳攝主也曰上卿代君聽政者也使子生而女則上卿豈繼世者乎蘇子曰攝主先君之令典孔子之法也而世不知習見母后之攝也而以為當然故吾不可不論以待後之君子又曰公子翬請殺桓公以求太宰隱公曰為其少故也吾將授之使營菟裘吾將老焉翬懼反譖公于桓公而殺之蘇子曰盗以兵擬人人必殺之夫豈獨其所擬塗之人皆捕繫之矣塗之人與盗非仇也以謂不繫則盗且幷殺已也隱公之智曾不若是塗之人也哀哉隱公惠公繼室之子也為其非嫡與桓均爾而長于桓隱公追先公之志而授國焉可不謂仁乎惜乎其不敏于智也使隱公誅翬而讓桓雖夷齊何以尚茲驪姬欲殺申生而難里克則施優來之二世欲殺扶蘇而難李斯則趙髙來之此二人之智若出一人而其受禍亦不少異里克不免於惠公之誅李斯不免于二世之虐皆無足哀者吾獨表而出之以為後世戒君子之為仁義也非有計于利害然君子所為義利常兼而小人反是李斯聽趙髙之謀非其本意獨畏蒙氏之奪其位故勉而聽髙使斯聞髙之言則召百官陳六師而斬之其德于扶蘇豈有既乎何蒙氏之足憂釋此不為而具五刑于市非下愚而何嗚呼亂臣賊子猶蝮蛇也其所螫草木猶足以殺人况其所噬囓者耶鄭小同為髙貴鄉公侍中嘗詣司馬師師有密䟽未屏也如厠還問小同曰見吾疏乎曰不見師曰寧我負卿無卿負我遂酖之王允之從王敦夜飲辭醉先寢敦與錢鳯謀逆允之已醒悉聞其言慮敦疑已遂大吐衣靣皆汚敦果照視之見允之卧吐中乃已哀哉小同殆哉岌岌乎允之也孔子曰危邦不入亂邦不居有以也夫吾讀史得魯隱公晉里克秦李斯鄭小同王允之五人感其所遇禍福如此故特書其事後之君子可以覽觀焉鄭伯以璧假許田東坡曰鄭伯以璧假許田先儒之論多矣而未得其正也先儒皆知夫春秋立法之嚴而不知其甚寛且恕也皆知其譏不義而不知其譏不義之所由起也鄭伯以璧假許田者譏隱而不譏桓也始其謀以周公之許田而易泰山之祊者誰也受泰山之祊而入之者誰也隱既已與人謀而易之又受泰山之祊而入之然則為桓公者不亦難乎夫子知桓公之無以辭於鄭也故譏隱而不譏桓何以言之隱八年書曰鄭伯使宛來歸祊又曰庚寅我入祊入祊云者見魯之果入泰山之祊也則是隱公之罪既成而不可變矣故桓元年書曰鄭伯以璧假許田而已夫許田之入鄭猶祊之入魯也書魯之入祊而不書鄭之入許田是不可以不求其說也鄭伯使宛來歸祊庚寅我入祊見鄭之來歸而魯之入之也鄭伯以璧假許田者見鄭之來請不見魯之與之也則鄭之來請而不見魯之與之者見桓公之無以辭於鄭也嗚呼作而不義使後世無以辭焉則夫子之罪隱深矣夫善觀春秋者觀其意之所嚮而得之故雖夫子之復生而無以易之也公羊曰曷為繫之許近許也諱取周田也穀梁曰假不言以言以非假也非假而曰假諱易地也春秋之所為諱之者三為尊者諱敵為親者諱敗為賢者諱過魯親者也非敗之為諱而取易之為諱是夫子之私魯也取郜大鼎于宋東坡曰孔子何為而作春秋哉舉三代全盛之法以治僥倖茍且之風而歸之于至正而已矣三代之盛時天子秉至公之義而制諸侯之予奪故勇者無所加乎怯弱者無所畏乎强匹夫懷璧而千乗之君莫之敢取焉此王道之所由興也周衰諸侯相幷而强有力者制其予奪邾莒滕薛之君惴惴焉保其首領之不暇而齊晉秦楚有吞諸侯之心孔子嘅然歎曰久矣諸侯之恣行也後世將有王者作而不遇焉命也故春秋之法皆所以待後世王者之作而舉行之也鐘鼎龜玉天子之所以分諸侯使諸侯所以相傳而世守也桓二年取郜大鼎于宋戊申納于太廟且夫鼎也在魯之太廟則是魯鼎也不幸使齊人挈而有之是齊鼎也是百傳而百易未可知也仲尼曰不然是鼎也何為而在魯之太廟曰取之宋宋安得之曰取之郜故書曰郜鼎郜之得是鼎也得之天子宋以不義取之而又以與魯也後世有王者作舉春秋之法而行之魯將歸之宋宋將歸之郜而後已也昔者子路問孔子所以為政之先子曰必也正名乎故春秋之法尤謹於正名至于一鼎之㣲而不敢忽焉聖人之用意盖深如此夫以區區之魯無故而得器是召天下之争也楚昭襄王求鼎于周周武公曰周不愛鼎恐天下以器讎楚也鼎入宋而為宋入魯而為魯安知夫秦晉齊楚之不動其心哉故書曰郜鼎明魯之不得有以塞天下之争也穀梁傳曰納者内弗受也以為周公不受也又曰號從中國名從主人而左氏記臧哀伯之諫愚于公羊有取焉曰器從名地從主人器之在人非有即爾宋始以不義取之故謂之郜鼎至于地之與人則不然俄而可以為其有矣善乎斯言吾有取之曹劌長勺之戰栁州曰長勺之役曹劌問所以戰於嚴公云云公曰小大之獄必以情斷之劌曰可以一戰栁子曰劌之問洎嚴公之對皆庶乎知戰之本矣而曰夫神求優裕于饗不優神不福也是大不可方鬬二國之存亡以决民命不務乎實而神道焉是問則事幾殆矣既問公之言獄也則率然曰可以一戰亦問略之尤公也茍公之德可懷諸侯而不事乎戰則已耳既至于戰矣徒以斷獄為戰之具則吾未之信也劌之辭宜曰君之臣謀而可制敵者誰也將而死國難者幾何人士卒之熟練者衆寡器械之堅利者何若趨地形得上游以延敵者何所然後可以言戰若獨用公之言而恃以戰則其不誤國之社稷無幾矣申包胥之言戰得之語在吳篇中禘于太廟用致夫人東坡曰甚哉去聖之久逺三傳紛紛之不同而莫或折之也禘于太廟用致夫人左氏曰禘而致哀姜非禮也凡夫人不薨于寢不殯于廟不赴于同盟不祔于姑則弗致也公羊曰夫人何以不氏譏以妾為妻也蓋聘于楚而脅于齊媵女之先至者也穀梁曰成風也言夫人而不言氏姓非夫人也立妾之詞非正也夫人之我可以不夫人乎夫人卒葬之我可以不卒葬之乎一則以宗廟臨之而后貶焉一則以外之弗夫人而見正焉三家之說左氏疎矣夫人與公一體也存曰公曰夫人既葬公以諡配公夫人以諡配氏此其不易之例也蓋有既葬稱諡而不稱夫人者矣天王使宰咺來歸惠公仲子之賵秦人來歸僖公成風之襚而未有不稱諡而稱夫人者也公羊之說又非人情無以信于後世以齊楚之强齊能脅魯使以其媵女為夫人而楚乃肯安然使其女降為妾哉此甚可􅏜也且夫成風之為夫人非正也春秋以為非正而不可以廢焉故與之不足之文而已矣方其存也不可以不稱夫人而去其氏及其没也不可以不稱諡而去其夫人皆所以示不足於成風也况乎禘周公而致用焉則其罪固已不容于貶矣故公羊曰用者不宜用者也致者不宜致者也禘用致夫人非禮也五石六鷁六一曰魯僖公之十六年隕石于宋五六鷁退飛過宋都左氏傳之曰石隕于宋星也六鷁退飛風也公羊又曰聞其磌然視之則石察之則五故先言石而後言五視之則鷁徐而視之則退飛故先言六而後言鷁穀梁之意又謂先後之數有聚散之辭也石鷁猶盡其辭而况于人乎左氏則辨其物公穀則鑑其意噫豈聖人之㫖不一耶將後之學者偏見耶何紛紛而若是也且春秋載二百年之行事隂陽之所變見災異之所著聞究其所終各有條理且左氏以石為星者莊公七年星隕如雨若以所隕者是星則當星隕而為石何得不言星而直曰隕石乎夫大水大雪為異必書若以小風而鷁自退非由風之力也若大風而退之則衆鳥皆退豈獨退鷁乎成王之風有㧞禾之力亦未聞退飛鳥也若風能退鷁則是過成王之風矣而經獨不書曰大風退鷁乎以公羊之意謂數石視鷁而次其言且孔子生定哀之間去僖公五世矣當石隕鷁飛之際是宋人次于舊史則又非仲尼之善志也且仲尼隔數世修經又焉及親數石而視鷁乎榖梁以謂石後言五鷁先言六者石鷁㣲物聖人尚不差先後以謹記其數則于人之褒貶可知矣若乃西狩獲麟不書幾麟鸜鵒來巢不書幾鸜鵒豈獨謹記于石鷁而忽于麟鸜鵒乎如此則仲尼之志荒矣殊不知聖人紀災異著勸戒而已又何區區于謹數乎必曰謹物察數人皆能之非獨仲尼而後可也噫三者之說一無是矣而周内史叔興又以謂隂陽之事非吉凶所生且天裂陽地動隂有隂凌陽則日蝕陽勝隂則歲旱隂陽之變出為災祥國之興亡由是而作既曰隂陽之事孰謂非吉凶所生哉其失不亦又甚乎魯頌鄭獬曰頌天子事也魯安得有之魯詩變風也其體與商周固殊矣清廟文王之德也那髙宗之祀也駉之馬牧于此概可見矣指之頌天子尊尊之義也或以用天子禮樂豈其然耶㫖哉魯國之惡旁見齊詩矣春秋之法常事不書不常則書故禘未踰喪則書郊傷牛則書蒐狩失時則書廟逆祭則書納幣於喪則書季孫之聘盖歲聘其常也不得書宜矣或曰季孫盖㣲者也又曰以其頌請盖僭也伯禽固賢于僖而當成王時天下一政豈國有變風而為美哉僖見於春秋者是聖人公天下是非其將何逃焉歴代名賢確論卷十四
