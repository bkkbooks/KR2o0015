body:
  text: 歷代名賢確論卷四十六成帝朱雲折檻石守道王元之樂天張禹李德裕王商李德裕翟方進以熒惑自殺溫公多災異樂天梅子真羅隱哀帝平帝王氏之亂子由揚雄陳黯朱雲折檻石守道漢成帝詩曰鬱鬱朱雲志不伸上方寶劒欲生塵空留折檻旌忠直左右何嘗去佞臣王元之折檻銘曰朱雲折檻之說凡知書者悉之矣咸謂諌而必折彰忠節也折而不理旌直臣也靜徵厥由孝成未得任賢去衰之道何以旌其直臣哉張禹身為帝師手執國柄一人仰之為規矩諸侯繫之於慘舒內不能舉百揆之綱外不能振兆民之領懸邪道若前旒進巧言如黈纊矇瞽君視聾瞶帝聽錮天下之良臣啞天下之諌口元延永始之間災眚屢見當時識者鮮不以王氏為譏帝乃幸禹之私第議國之政事問其一言以為模範禹不能陳正道以御災祥戮佞臣而安宗社反以罕言命不語怪為正德致成帝無慮王氏益驕洎民出謗辭上有憂色則必整衣冠露蓍蔡卦吉則喜兆凶則悲此豈翊贊之道邪手決覆亡之機躬開殺逆之路是可忍也孰不可忍也于時雲為直臣身在下位觀莽之將亂嫉禹之不忠乃蹈白刃之危輕鴻毛之命鼎革弗顧宗祧是圖請尚方劒知不從也冀萬一而得之斷佞臣矣折天子檻知失禮矣冀再三而諫之悟時君矣孝成雖聽慶忌之言不能戮安昌之罪徒存折檻又何益哉向使誅禹於兩觀之前升雲於百工之上邪佞路塞忠讜源開新莽之禍何由而興乎銘曰檻之既折明朱雲之忠節兮終不能折檻之不理見新室之亂起兮亦不能理雲以折檻為忠帝以折檻為恥忠而不用恥實自貽尚方之劒匣而何施佞臣之頭惜而胡為任賢有二去邪而疑姦臣日離新室以盛漢室以衰禍實自取亡其咎誰遺編蠧簡歷歷可悲千古之下弔而為辭樂天曰漢成帝以朱雲廷辱張禹令持下殿雲攀檻檻折成帝容之後當理檻帝命勿易以旌直臣豈不以臣不受死雖鄰於死而必諌乎君能納諫雖折其檻而必容乎不然何雲之竭忠也如此而帝之見容也又如此張禹李德裕曰夫社稷之計安危之機人君不能獨斷者必咨於所欽之臣然臣有忠邪時有險易交有淺深義有厚薄范睢山東之匹夫也入虎狼之秦履不測之險可謂交疏義薄矣而能尊昭王去穰侯開秦霸業之基以安國復嗣可謂忠於昭王矣夫獨斷者英主也古人言謀之欲多斷之在獨蓋為此矣天有震雷之恐龍有逆鱗之狠所以人君在於能斷耳然親戚之際恩義之重斷之於己可也張敞所謂明詔以恩不聽羣臣以義固爭而後許而令明詔自親其文非策之得也漢文帝誅薄昭斷則明矣於義則未安也周宣餞申伯有孔碩之詩晉康送文侯興如存之感况太后尚存唯一弟薄昭斷之不疑非所以慰母氏之心也漢成帝車駕至張禹第辟左右親問禹以天變禹以年老子弱與曲陽有隙乃言新學小生亂道誤人宜無信用帝雅信愛禹由此不疑王氏致漢室之亡成王莽之篡皆因禹而發可謂漢之賊也國之妖也雖蛇鬭於鄭鷁退於宋妖不甚於禹矣朱雲欲以尚方斬馬劒斷佞臣頭斯言當矣後代有類於此者其臣可以范睢為師表張禹為鑒戒王商李德裕荀悅哀王商論曰夫獨智不用於世獨行不蓄於時昔人所以自退雖退猶不得自免是以離世深藏又曰六合之大一身之微而匹夫無所容焉豈不哀哉余三復斯論澘然出涕夫仲尼聖人也猶美顏子之行藏與我同志稱寧武愚不可及歎蘧瑗卷而懷之則聖人遵養時晦可謂至矣以仲尼之德足以塞叔孫之毁以仲尼之仁足以免陳蔡之困以仲尼之智足以避匡人之辱以仲尼之道足以容魯哀之世而逼迫多懼殆於危亡由是思之無非命也况王商者哉世人皆以貌陋質薄為數奇敦厚碩大為多福樂昌威重真漢相容貌懾單于而遭愍於時遇讒而隕豈命之否也龍虎不能免於患及命之泰也蛭蚓皆得保其生余又聞國之衰也忠賢先去故管仲知隰朋不久而齊國亂范燮令祝宗祈死而晉主憂伍胥戮而夫差亡汲黯出而劉安悖徒歎新都之奪孰救樂昌之禍昔秦繆以三良為殉君子曰秦繆之不為盟主也宜哉棄善人之謂也翟方進以熒惑自殺溫公曰晏嬰有言天命不慆不二其命禍福之至安可移乎昔楚昭王宋景公不忍移災於卿佐乃曰移腹心之疾置諸股肱何益也藉使其災可移仁君猶不肯為况不可乎使方進罪不至死而誅之以當大變是誣天也方進有罪當刑隱其誅而厚其葬是誣人也孝成欲誣天人而卒無所益可謂不知命矣多災異樂天司天臺詩曰司天臺仰觀俯察天人際羲和死來職事廢官不求賢空取藝昔聞西漢元成間上陵下替謫見天北辰微暗少光色四星煌煌如火赤耀芒動角射三台上台半滅中台坼是時非無太史官眼見心知不敢言明朝趨入明光殿唯奏慶雲壽星見天文時變兩如斯九重天子不得知不得知安用臺髙百尺為梅子真羅隱曰漢成帝時綱紐頽壞先生以書諫天子者再三夫大政雖去而劒履間健者猶數百位尚不能為國家出力以斷佞臣頭復何南昌故吏憤憤於其下得非南昌逺地也尉下寮也茍觸天子網突幸臣牙止於殛一狂人噬一單族而已彼公卿大臣有生殺喜怒之任有朋黨蕃衍之大出一言作一事必與妻子謀茍不便其家雖妾人婢子亦攖挽相制而况親戚乎況骨肉乎故雖有憂社稷心亦噤而不吐也嗚呼寵祿所以勸功而位大者不語朝廷事是知天下有道則正人在上天下無道則正人在下余讀先生書未嘗不為漢朝公卿恨王氏之亂子由曰哀帝自諸侯為天子方其在國好禮節儉知成帝優容舅家權奪於王氏及即位收攬威柄朝廷竦然庶幾於治既而傅太后侵侮王后僭竊名號始失天下心帝復寵幸臣董賢位至三公富擬王室雖欲貶損王氏而身既失德朝無名臣所以資之者多矣詩曰無競維人四方其訓之有覺德行四國順之二者帝皆失之其若王氏何方帝之崩也王太后召大司馬賢引見東廂問以襄事調度賢內憂不能對免冠謝太后曰新都侯莽前以大司馬奉送先帝大行曉習故事吾令莽助君賢頓首幸甚莽既至使尚書劾奏免賢賢即日自殺王氏代漢之禍實成於此昔高帝寢疾有吕氏之憂呂后問以後事帝曰陳平智有餘然難獨任王陵少戇可以佐之周勃厚重少文然安劉氏者必勃也可令為太尉及産祿之變王陵爭之於前平勃定之於後皆如高帝所慮文帝末年有七國之憂戒太子曰即有緩急周亞夫可任將兵及吳楚之變亞夫為大將破之數月之間亦如文帝所慮今王氏之亂與呂氏七國等爾而哀帝無其人漢遂以亡非特天命蓋人謀也揚雄陳黯詰鳯文曰嘗得揚雄云君子在治若鳯在亂若鳯謂隱見之宜得也將欲伸之以為鑒逮覽其劇秦美新則有異乎是雄仕漢遇新室之亂既不能去之又懼禍及乃為斯文以媚而取容嗚呼鳯故若是邪果若是則鳯遇繒繳而回翔無間耶君子之仕也所以行道道之不行也則可以明其節彼莽之不臣雄時在列宜以君臣之義興亡之理匡救之以行其道茍畏其威愛其死則可投簮高謝以明其節詎有茍祿貪生狥非飾詐廣引秦過以喻惡則是稔其篡逆也與古之持顚危死名節者背而馳也嚮者所著若鳳之說得不為誣鳳也哉雞常禽也曉晦而不迷其候鳳靈鳥也理亂而不知其時耶噫言之不思有如是邪或曰古人臨危制變亦權道也雄知莽之不可正也故矯為其辭姑務脫禍是亦權也何過之深歟曰不然夫權者聖人有焉所以不失其道未見捨其道而從其權昔仲尼仕魯以季桓子荒齊樂知其不可正也乃去之曾不聞矯為其辭以求庸於魯雖仲尼日月其德人之不侔然揚雄亦慕仲尼之教者以著書立言為事得自易哉夫立言者豈不欲人之從教邪且已不能信人况求信於人乎語曰君子先行其言而後從之斯言可欺也哉王荆公曰孔子叙逸民先伯夷叔齊而後栁下惠曰不降其志不辱其身伯夷叔齊也柳下惠降志辱身矣孟子叙三聖人者亦以伯夷居伊尹之首而揚雄亦曰孔子高餓顯下祿隱夫聖人之所言高者所取於人而所行於巳者也所言下者是所非於人而所棄於巳者也然而孔孟生於可避之世而未嘗避也蓋其不合則去則可謂不降其志不辱其身矣至於揚子則吾竊有疑焉爾當王莽之亂雖鄉里自售者知逺其辱而揚子親屈其體為其左右之臣豈君子固多能言而不能行乎抑亦有以處之非必出故能宗其道孟子曰伯夷柳下惠聖人也百世之師也如其高餓顯下祿隱而必出於所高則栁下惠安擬伯夷哉揚子曰塗雖曲而通諸夏則由諸川雖曲而通諸海則由諸蓋言事雖曲而通諸道則亦君子所當同也由是而言之餓顯之高祿隱之下皆迹矣迹豈足以求聖賢哉唯其能無係纍之迹是以大過於人也如聖賢之道皆出於一而無權時之變則又何聖賢之足稱乎聖者知權之大者也賢者知權之小者也昔紂之時微子去之箕子為之奴比干諫而死此三人者道同也而其去就若此蓋亦所謂迹不必同也易曰或出或處或默或語言君子無可無不可也使楊子寧不至于耽祿於弊時哉蓋於時為不可去必去則揚子之所知亦已小矣曽子固答人書曰䝉疏示某謂揚雄處王莽之際合於箕子之明夷常夷甫以謂紂為繼世箕子乃同姓之臣事與雄不同又謂美新之文恐箕子不為也又謂雄非有求於莽特以義命有所未盡某思之恐皆不然方紂之亂微子箕子比干者蓋皆諫而不從則相與謀以謂去之可也任其難可也各以其所守自獻于先王不必同也此見於書三子之志也三子之志或任其難乃人臣不易之大義非同姓獨然者也於是微子去之比干諫而死箕子諌而不從至辱於囚奴夫任其難者箕子之志也其諫而不從至辱於囚奴蓋盡其志矣不如比干之死所謂各以其所守自獻于先王不必同也當其辱於囚奴而就之乃所謂明夷也然而不去非懷祿也不死非畏死也辱於囚奴而就之非懷無恥也在我者固彼之所不能易也故曰內難而能正其志又曰箕子之正明不可息也此箕子之事見書易論語其說不同而其終始可考者如此也雄遭王莽之際有所不得去又不必死辱於仕莽而就之固所謂明夷也然雄之言著於書行著於史者可得而考不去非懷祿也不死非畏死也辱於仕莽而就之非無恥也在我者亦彼之所不能易也故吾以謂與箕子合吾之所謂與箕子合者如此非謂合其事紂之初也至于美新之文則非可已而不已者也若可已而不已則鄉里自好者不為況若雄者乎且較其輕重辱於仕莽為重矣雄不得而已則於其輕者其得已哉箕子者至辱於囚奴而就之則於美新安知其不為而為之亦豈有纍哉不曰堅乎磨而不磷不曰白乎涅而不緇顧在我如何耳若此者孔子所不能免故於南子非所欲見也於陽虎非所欲敬也見所不見敬所不敬此法言所謂詘身以信道者也然則非雄所以自見者歟孟子有言曰天下有道小德役大德小賢役大賢天下無道小役大弱役强二者皆天也順天者存逆天者亡而孔子之見南子亦曰豫所否者天厭之天厭之則雄於義命豈有不盡哉又云介甫以謂雄之仕合於孔子無不可之義夷甫以謂無不可者聖人微妙之處神而不可知者也雄德不逮聖人強學力行而于義命有所未盡故於仕莽之際不能無差又謂以美新考之則投閣之事不可謂之無也夫孔子所謂無不可者則孟子所謂聖之時也而孟子歷敘伯夷以降終曰乃所願則學孔子雄亦為太𤣥賦稱夷齊之徒而曰我異於是執太𤣥兮蕩然肆志不拘攣兮以二子之智足以自知而任巳者如此則無不可者非二子之所不可學也前世之傳者以謂伊尹以割烹要湯孔子主癰疽瘠環孟子皆斷以為非伊尹孔子之事蓋以理考之知其不然也觀雄之所既立故介甫以謂世傅其投閣者妄豈不亦猶孟子之意哉孫明復辨揚子作太𤣥曰千古諸儒咸稱揚子雲作太𤣥以準易今考子雲之書觀子雲之意且見其非凖易而作蓋疾莽而作也何哉昔者哀平失道賊莽亂常包藏禍心竊弄神器違天咈人莫甚於此雖火德中否而天命未改是以元元之心猶戴於漢是時不知天命者爭言符瑞稱莽之功德以濟其惡以茍富貴若劉歆甄豐之徒皆位至上公獨子雲恥從莽命以聖王之道自守故其位不過一大夫而已子雲既疾莽之篡位又懼來者蹈莽之迹復肆惡於人上乃上酌天時行運盈縮消長之數下推人事進退存亡成敗之端以作太𤣥𤣥有三方九州二十七家八十一部者三公九卿二十七大夫八十一元士之象也𤣥君象也總而治之起於牛宿之一度終於斗宿之二十二度而成八十一首七百二十九贊二萬六千二百四十四䇿大明天人終始逆順之理君臣上下去就之分順之者吉逆之者凶以戒違天咈人戕君盜國之臣此子雲之本意也孰謂凖易而作哉諸儒咸稱太𤣥凖易者蓋以易緯言卦氣起於中孚震離兌坎配於四方其六十卦各主六日七分以周一歲三百六十五日四分日之一執此而論之也殊不知易緯者隂陽家說非聖人格言若執此以為易則易道泥矣且太𤣥之於易猶四體之一支也可以謂之凖易者乎斯言蓋根於桓談稱太𤣥曰是書也與大易凖班固謂雄以經莫大乎易故作太𤣥使子雲被僭大易之名於千古是不知子雲者也東坡論揚雄文辨屈原賈誼司馬相如曰孔子曰辭達而已矣夫言止於達意則疑若不文是大不然求物之妙如繫風捕影能使是物了然於心者蓋千萬人而不一遇也而况能使了然於口與手者乎是之謂辭達辭至於能達則文不可勝用矣揚雄好為艱險之辭以文淺易之說若正言之則人人知之矣此正所謂雕蟲篆刻者其太𤣥法言皆是也而獨悔於賦何哉終身雕蟲而變其音節便謂之經可乎屈原作離騷經蓋風雅之再變者雖與日月爭光可也可以其似賦而謂之雕蟲乎使賈誼見孔子升堂有餘矣而乃以賦鄙之至與司馬相如同科雄之陋如此者甚衆可與知者道難與俗人言也歷代名賢確論卷四十六
