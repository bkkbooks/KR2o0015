body:
  text: 歴代名賢確論卷五十七孫堅孫策孫權黃初二年魏策孫權為吳王子西保全江東何去非權令太子登讀漢書子西諸葛恪子由潘濬平樊伷子由孫亮孫基盗乘御馬亮從刁元言降赦宫中以免基子西通論吳氏興亡温公三國通論曹操劉備子西曹操劉備孫權東坡三國亡先後李徳裕孔融諸葛亮之文東坡魏晉收録孔融諸葛亮文子西黃初二年魏策孫權為吳王子西曰是嵗吳蜀相攻大戰於夷陵吳人卑詞事魏受其封爵恐魏之議其後耳而魏略以為權有僭意而自顧位輕故先卑而後倨之先卑者規得封爵以成僭竊之基後倨者冀見討伐以激怒其衆且吳至權三世矣其勢足以自立尚何以封爵為哉受封爵則君臣矣供職貢矣除邊關矣國有警急則以事聞無得擅興兵攻擊矣羽書至則悉甲士從徵矣非身入朝則遣侍子入宿衛矣彼藩國固然亡足怪者一不從命則王師致討有詞矣然後發兵拒戰是抗上矣尚安能激怒其衆也哉既而魏責任子權不能堪卒叛之為天下笑方其危急之時羣臣無魯仲連之識出一切之計以寛目前之患而陳壽以勾踐竒之勾踐事吳則嘗聞之矣受吳封爵則未之聞也保全江東何去非孫堅論論孫策孫權曰孫策壯武術略過於其父又有周瑜魯肅之儔以輔其起惜乎堅之不善基也使其不得奮於中原以競天下然策一舉而遂收江東為鼎足之資使之不死當為魏之大患策之不得起於中原非其智力之不逺葢袁紹已據河北曹公已收河南獨無隙以投之故也以劉備之間關轉戰至於白首不獲中州一塊之壤以寓其足而策乃能以敝兵千餘渡江轉鬭不數嵗而席卷江東此其過備逺矣權之勇決進取無以逮其父兄然審機察變持保江東於權有焉夫三國之形雖號鼎足而其雌雄强弱固有所在魏雖不能遂并天下蓋不失其為雄强吳蜀雖能各據其國然不免為雌弱權唯能知乎此是以内加撫循而外加備禦而已時有出師動衆以示武警敵者北不逾合淝而西不過襄陽未嘗大舉輕發以求僥倖於魏而魏人之加於我亦常有以拒之未嘗困折是以終權之世而江東安由是觀之則權之為謀審於諸葛武侯之用蜀矣權令太子登讀漢書子西曰劉備教禪以漢書而權亦令張昭以漢書授其子登世以權備之智不足以知二帝三王故其所以貽謀者止於如此是大不然伊尹之訓太甲也稱有夏先后而不及唐虞周公之戒成王也稱商三宗而不及虞夏豈伊尹周公之智不足以知堯舜禹哉亦取其近於時切於事者而已權備之智誠不足擬伊尹周公至其教子不忽近而慕逺不貴名而賤實此亦伊尹周公之遺法也諸葛恪子由孫仲謀論曰任人莫難於託國漢武帝因文景富庻之後虐用其民厚自奉養征伐四夷幾喪天下逮其晩嵗託國於霍光光知用兵之害罷均輸榷酤與民休息而天下復寧凡武帝之所以得稱賢君者唯用霍光故也蜀先主知嗣子之暗弱舉國而付之諸葛孔明孔明又廢李嚴楊儀援蔣琬費褘而授之政雖後主不明而守國三十餘年君臣相安蜀人免於塗炭之患過於魏吳遠甚吳文帝方其任屬賢將抗衡中原曹公憚之及其老也賢臣死亡略盡喜諸葛恪之勁悍越衆而付以後事恪乘其用兵勞民之後繼起大役兵抑於外既歸而不能自克將復肆志於僚友恪既以之喪軀而孫氏因之三世絶統吳越之民陷於炮烙之地國隨以亡夫以進取之資用進取之臣以徼一時之功可耳至於託六尺之孤寄百里之命而亦屬之於斯人其勢必至是哉潘濬平樊伷子由曰權克荆州將吏悉降而濬獨堅臥不屈權輿致之濬伏牀而泣悲不自勝其於所事何其厚也既而樊伷欲以武陵自抜歸蜀濬為權畫策自將討平之其於所厚又何薄也意者在君為君有不得不然者乎吾聞樂毅去燕適趙趙欲與之伐燕毅泣曰昔之事燕猶今之事趙也毅若獲戾放於他國終身不敢謀趙之徒𨽻况其國乎使樂毅愚人也則可樂毅少知事君則濬不得為無罪矣孫基盗乘御馬亮從刁元言降赦宫中以免基子由曰吳之君臣可謂上下皆失其分矣漢世諸侯王有罪當誅丞相御史與宗正廷尉奏請論如法制曰朕不忍制法其與列侯二千石議之於是丞相御史又奏臣等謹與列侯二千石議皆曰宜論如法制曰朕不忍致法其廢勿王或削地若干夫請論如法者有司以法守不忍致法者人主以道揆今亮人主也而論法元有司也而論情故曰吳之君臣可謂上下皆失其分矣吳氏興亡温公曰破虜以孤遠之兵決忠憤之志首犯賊鋒深蹂川洛汎掃陵寢有足多者討逆以童子提一旅之衆揮馬箠以下江東耆儒宿將狼狽失據開地千里真英才也文帝承父兄之烈師友忠賢以成前志赤壁之役決策定慮以摧大敵非明而有勇能如是乎奄有荆揚薄於南海傳祚累世宜矣復觀景帝皆明惠敢決有先世之風歸命驕愎殘虐深於桀紂求欲不亡得乎曹操劉備子西論龎統説先主取益州云云評曰寛勝急仁勝暴忠勝譎然操强而備弱宜勝而反不如者何也操稊稗者也備五穀之不熟者也五穀不熟固不如稊稗非謂寛仁忠信不能勝急暴譎詐也備不能勝操耳故曰茍非其人道不虛行曹操劉備孫權東坡論曰天下皆怯而獨勇則勇者勝皆闇而獨智則智者勝勇而遇勇則勇者不足恃也智而遇智則智者不足用也夫唯智勇之不足以定天下是以天下之難鋒起而難平葢嘗聞之古者英雄之君其遇智勇也以不智不勇而後真智大勇乃可得而見也悲夫世之英雄其處於世亦有幸不幸邪漢世祖唐太宗是以智勇獨過天下而得之者也曹公孫劉是以智勇相遇而失之者也以智攻智以勇擊勇此譬如兩虎相捽齒牙氣力無以相勝其勢足以相擾而不足以相斃當此之時惜乎無有以漢高帝之事制之者也昔者項籍乘百戰百勝之威而執諸侯之柄咄嗟叱咤奮其暴怒西向以逆高祖其勢飄忽震蕩如風雨之至天下之人以為遂無漢矣然高祖以其不智不勇之身橫塞其衝徘徊而不得進其頑鈍椎魯足以為笑於天下而卒能摧折項氏而待其死此其故何也夫人之勇力用而不已則必有所耗竭而其智慮久而無成則亦必有所倦怠而不舉彼欲用其所長以制我於一時而我閉門而拒之使之失其所求逡巡求去而不能去而項籍固已敗矣今夫曹公孫權劉備此三人者皆知以其才相取而未知以不才取人也世之言者曰孫不如曹而劉不如孫劉備唯智短而勇不足故有所不若於二人者而不知因其所不足以求勝則亦已惑矣蓋劉備之才近似於高祖而不知所以用之之術昔高祖之所以自用其才者其道有三焉耳先據勢勝之地以視天下之形廣收信越出竒之將以自輔其所不逮有果鋭剛猛之氣而不用以深折項籍猖狂之勢此三事者三國之君其才皆無有能行之者獨有一劉備近之而未至其中猶有翹然自喜之心欲為椎魯而不能純欲為果鋭而不能達二者交戰於中而未有所定是故所為而不成所欲而不遂棄天下而入巴蜀則非地也用諸葛孔明治國之才而當紛紜征伐之衝則非將也不忍忿忿之心犯其所短而自將以攻人則是其氣不足尚也嗟夫方其奔走於二袁之間困於吕布而狼狽於荆州百敗而其志不折不可謂無高祖之風矣而終不知所以自用之方夫古之英雄唯漢高帝為不可及者夫三國亡先後李徳裕論曰魏蜀吳三分天下而亡有先後非形勢有輕重積仁有厚薄察其政柄所歸則亡之先後可知也蜀政在於黃皓皓𨽻人也内不能修武侯舊典外不能制姜維黷武紀綱日壊君子不服所以先亡也魏自明帝之後政歸仲逹齊王已降唯守空宫亡之淹速係於師昭之志將移神器之重須服天下之心未立大功亦不敢取所以蜀滅而魏亡也孫皓雖驕奢極欲殘虐用刑而自專生殺之柄不牽帷嬙之制運盡夭亡而後夷滅由是知人君不可一日失其柄也如神龍之脱深淵震雷之無煙氣威靈既露人得制之蔣濟覩魏文帝與夏侯尚詔曰作福作威為亡國之言所謂柄者威福是也豈可假於臣下哉後代觀三國之事可不戒懼哉孔融諸葛亮之文東坡曰孔北海志大而論高功烈不見於世然英偉豪傑之氣自為一時所宗其論盛孝章郄鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之姿綜練名實之意自見於言語至出師表簡而盡直而不肆大哉言乎與伊訓説命相表裏非秦漢以來以事君為悦者所能至也魏晉收録孔融諸葛亮之文子西曰魏文帝即位求孔融之文以為不減班揚晉武帝踐祚詔定諸葛亮故事而比之周誥融既魏武之讎恨而亮亦晉宣之仇敵二人之言宜非當時之所欲聞而並見收録惟恐其墜失蕩然無忌猶有先王大公至正之道存焉此吾所以特有取於魏晉也歴代名賢確論卷五十七
