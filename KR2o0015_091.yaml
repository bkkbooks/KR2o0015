body:
  text: 歷代名賢確論卷九十一文宗二牛僧孺李德裕子由溫公石介李訓鄭注少游李德裕溫公鄭覃孫之翰杜元頴孫之翰劉蕡范祖禹牛僧孺李德裕子由論曰唐自憲宗以來士大夫黨附牛李好惡不本於義而從人以喜慍雖一時公卿將相未有傑然自立者也牛黨出於僧孺李黨出於德裕二人雖黨人之首然其實則當世之偉人也蓋僧孺以德量髙而德裕以才氣勝德與才固不同古人鮮能兼之者使二人者各任其所長而不為黨則唐末之賢相也僧孺相文宗幽州楊志誠逐其將李載義帝召問計䇿僧孺曰是不足為朝廷憂也范陽自安史後不復係國家休戚前日劉總納土朝廷糜費且百萬終不能得斗粟尺布以實天府俄復失之今志誠猶向劉總也第付以節使捍奚契丹彼且自力不足以逆順治也帝曰吾初不計此公言是也因遣使慰撫之及武宗世陳行泰殺史元忠張絳復殺行泰以求帥德裕以為河朔命帥失在太速使姦臣得計遷延久之擢用張仲武而絳自斃僧孺以無事為安而德裕以制勝為得此固二人之所以異較之德裕則優矣德裕節度劒南西川吐蕃將悉怛謀以維州降維州西南要地也是時方與吐蕃和親僧孺不可曰吐蕃綿地萬里失一維州不害其强今議和好而自違之中國禦戎守信為上應變次之彼若來責失信贊普牧馬蔚茹川東襲汧隴不三日至咸陽雖得百維州何益帝從之使德裕反降者吐蕃族誅之德裕深以為恨雖議者亦不直僧孺然吐蕃自是不為邊患幾終唐世則僧孺之言非為私也帝方用李訓鄭注欲求奇功一日延英謂宰相公等亦有意於太平乎何道致之僧孺曰臣待罪宰相不能康濟天下然太平亦無象今四夷不內擾百姓安生業私室無强家上不壅蔽下不怨讟雖未及全盛亦足為治矣而更求太平非臣所及也退謂諸宰相上責成如此吾可久處此耶既罷未久李訓為甘露之事幾至亡國帝初欲以訓為諫官德裕固爭言訓小人咎惡已著決不可用德裕亦以此罷去二人所趨不同及其臨訓注事所守若出於一人是以知其皆偉人也然德裕代僧孺於淮南訴其乾沒府錢四千萬緡質之非實及在朱崖作窮愁志論周秦行紀言僧孺有僭逆意悻然小丈夫之心老而不衰也始僧孺南遷於循老而獲歸二子蔚藂後皆為名卿德裕沒於朱崖子孫無聞後世深悲其窮豈德不足而才有餘固天之所不豫耶溫公論李德裕追論維州悉怛謀事決牛李是非曰論者多疑維州之取捨不能決牛李之是非臣以為昔荀吳圍鼓鼓人或請以城叛吳弗許曰或以吾城叛吾所甚惡也人以城來吾獨何好焉吾不可以欲城而邇奸使鼓人殺叛者而繕守備是時唐新與吐蕃修好而納其維州以利言之則維州小而信大以害言之則維州緩而關中急然則為唐計者宜何先乎悉怛謀在唐則為向化在吐蕃不免為叛臣其受誅也又何矜焉且德裕所言者利也僧孺所言者義也匹夫徇利而忘義猶恥之况天子乎譬如鄰人有牛逸而入於家或勸其兄歸之或勸其弟攘之勸歸者曰攘之不義也且致訟勸攘者曰彼嘗攘吾羊矣何義之拘牛大畜也鬻之可以富家以是觀之牛李是非端可見矣又論僧孺太平無象之對曰君明臣忠上令下從俊良在位枉邪黜逺禮修樂舉刑清政平奸宄消伏兵革偃戢諸侯順附四夷懷服時和年豐家給人足此太平之象也于斯之時閽寺専權脅君於內弗能逐也藩鎮阻兵陵慢於外弗能制也士卒殺逐主帥拒命自立弗能詰也軍旅嵗興賦斂日急骨血縱橫於原野杼柚空竭於里閭而僧孺謂之太平不亦誣乎當文宗求治之時僧孺任居承弼進則偷安取容以竊位退則欺君誣世以盜名罪孰大焉石介論曰唐文宗皇帝既承父兄奢弊之餘自踐祚孜孜正道有意貞觀開元之治一日延英對宰相曰天下何由太平卿等有意於此乎宰相牛僧孺對曰臣等待罪輔弼無能康濟然臣思太平亦無象今四夷不至交侵百姓不至流散上無淫虐下無怨讟私室無强家公議無壅滯雖未及至理亦謂小康陛下若别求太平非臣等所及退至中書謂同列曰吾輩為宰相天子責成如是安可久處兹地乎旬日間三上章請退悖哉僧孺之不忠也伊尹恥致其君不及堯舜魏文公願為臯䕫夫湯與太宗又豈未有堯舜之資才邪伊尹魏文公致之遂如堯舜焉吾觀文宗夙夜勤治身復恭儉英智聰睿有聖人資僧孺若以堯舜之道輔之必為堯舜矣若以帝皇之道語之必能行帝皇之道矣凡人臣以道事君竭己之才以致于君惟恐君不能行盡己之道竭己之才以致于君君不能行猶盡日孜孜夙夜勉勉左輔右弼庶幾行之僧孺何嘗以堯舜之道語其君文宗何嘗有聞道而不能行者而僧孺不忠也且君可以為開元之君也則以開元之政啓之君既能為開元之政也則以貞觀之政啓之君既能為貞觀之政也則以三王之政啓之君既能行三王之政也則以五帝之道啓之君既能行五帝之道也則以三皇之道啓之然後致其君卓然在於羲軒之上躋其民沛然納乎仁夀之域此不為盛乎直指太和之間謂之太平可嗟矣夫唐自開寶已後藩臣崛强不順中官驕恣擅權文宗承穆宗昭愍之後履長慶寶厯之亂四海奢弊彛倫攸斁萬機隳曠庶政不緝當是時中官王守澄用事纎人得進幽州軍亂方逐其帥成都失守復陷于蠻而又姦黨羣行申錫遭誣興元兵亂李絳被害疾疫相繼民罹天傷水旱仍臻嵗數凶歉而僧孺謂四夷不至交侵百姓不至流散上無淫虐下無怨讟私室無彊家公義無壅滯不亦面欺其君歟復且怨君責成於已輒旬日三上章求退其悖亦甚矣人臣之禮固如是乎噫其後鄭注干政李訓亂國邪謀得行狂狡並進使太和之治不及貞觀開元之太平過在僧孺也惜乎文宗有君而無臣悲矣乎溫公論楊志誠逐李載義上從僧孺謀因以志誠為節度曰昔者聖人順天理察人情知庶民之莫能相治也故置帥長以正之知羣臣之莫能相使也故建諸侯以制之知列國之莫能相服也故立天子以統之天子之於萬國能褒善而黜惡抑彊而輔弱撫服而懲逆禁㬥而誅亂然後發號施令而四海之內莫不率從也詩云勉勉我王綱紀四方載義藩屏大臣有功於國無罪而志誠逐之此天子所宜治也若一無所責因以其土田爵位授之則是將帥之廢置生殺皆出於士卒之手天子雖在上奚為哉國家之有方鎮豈專利其財賦而已乎如僧孺之言姑息偷安之術耳豈宰相佐天子御天下之道哉李訓鄭注王涯賈餗舒元輿附淮海李訓論曰天下無易事非其人則難於登天天下無難事得其人則易於反掌難無定勢易無常形惟其人也昔漢有諸侯彊大之患連城數十地方千里擅爵人赦死罪戴黃屋刺客公行景帝用鼂錯之謀始議削平之法令未及行而七國合從而起矣何其難耶逮武帝用主父偃之謀令諸侯得推恩分其子弟詔下之日人人各得所願法令不更彊場不變而尾大之患亡矣又何其易耶以此言之則知天下之事惟其人也愚讀唐史至甘露之事未嘗不為文宗而歎息何則欲除纍世之姦而倚一區區之李訓豈不疏哉宦官之禍深矣自德宗懲北軍之變以左右神䇿天威等軍分委宦官主之由是太阿倒持不復可取憲宗之賊歷三世而不能討天下憤焉是時故老名臣如裴度李德裕之徒皆在也向使文宗有知人之明委任二臣俾之圖畫則刀鋸之賤豈難制哉何則以訓之輕躁寡謀尚能殺王守澄則知度與德裕可以制仇士良之屬無疑矣惟其不用二臣而委之訓與鄭注是以事敗謀泄害及忠良蹀血觀闕之前不勝飲恨而已非事之難不知人之過也或曰注之帥鳯翔也欲因宦者送守澄之喪以鎮兵誅之訓忌其功乃先五日舉事使注不為訓所忌也庶其有濟乎愚曰不然惟其訓之事敗則唐之禍在士良使注之功成則唐之禍在注矣何則袁紹董卓崔𦙍朱溫之事蓋嘗成矣其禍何如哉以此見之事敗亦受禍成亦受禍在用小人而已矣德裕嘗曰舉大事非北軍無以成功此所謂天下之常勢也又曰焚林而畋明年無獸竭澤而漁明年無魚既經李訓之猖獗則天下常勢亦不用臣以為德裕能不為於㑹昌時也則知其能為太和之時必矣李德裕論李訓奇才曰開成初余作鎮淮甸㑹有朝之茂彥亷問剖符于東南者相繼而至余與之宴言皆曰聖上謂丞相鄭公覃李公固言李公石曰李訓禀五常之性服人倫之教則不及卿等然天下奇才卿等皆不如也三丞相默然而退余曰李訓甚狂而愚曾不及於徒𨽻焉得謂之奇才也自古天下有常勢不可變也昔陳平之患吕宗而計無所出嘗閒居深念陸賈由户而進不之覺也賈揣知其情言曰將相和則社稷安矣因為畫䇿陳平乃寤由是以黃金為絳侯夀將相交歡以敗産祿近世五王之誅二張也漢陽王召大將軍李多祚謂曰將軍爵服隆貴誰人與之曰大帝與之將軍資産富侈誰人與之曰大帝與之將軍子弟榮祿誰人與之曰大帝與之因謂曰大帝恩乎多祚漼然泣下又曰今大帝之子深居鶴禁危若綴旒將軍豈有意乎多祚乃感激受命與之定䇿元載之圖魚朝恩也以崔昭尹神州俾昭日詣苑中以牢醴為朝恩饌因其北門大將軍王駕鶴等結歡共籌隂計而朝恩竟敗夫舉大事非北軍無以成功此所謂天下之常勢也李訓因守澄得幸雖職在近密而日夕遊於禁軍出入無礙此時挾守澄之勢與天子契於魚水北軍諸將望其顧盻與目覩天顔無異若以中㫖喻之許以爵賞即諸將從之勢如風靡矣訓捨此不用而欲以神州憲臺遊徼搏擊之吏抱關擁篲之徒以當精甲利兵亦猶霜蓬之禦烈火矣賴中人覺其變未及其亂向使訓計盡行所誅者不過侍從數百人而已其徒尚數千人與北軍協力報怨則天下橫流矣何以知之昔竇武之舉事也以五校士數千人屯都亭下中人矯詔令張奐率五營士與武對陳乃大呼武軍曰竇武及汝皆禁兵當宿衛宫省何故隨反者乎自旦至辰兵降略盡由是知前代已來禁軍惟畏伏中人宰臣焉得使其效死嗟乎焚林而畋明年無獸竭澤而漁明年無魚既經李訓猖蹶則天下常勢亦不可用也溫公論訓注謀誅宦官不克宰相王涯賈餗舒元輿皆坐腰斬親屬無問親疏皆死曰論者皆謂涯餗有文學名聲初不知訓注之謀橫罹覆族之禍憤歎其寃臣獨以為不然夫顛危不扶焉用彼相涯餗安高位餉重祿訓注小人窮妍極險力取將相涯餗與之比肩不以為恥國家危殆不以為憂偷合茍容日復一日自謂得保身之良䇿莫我如也若使人人如此而無禍則奸臣孰不願之哉一旦禍生不虞足折形渥蓋天誅之也士良安能族之哉鄭覃孫之翰論覃言開成政事曰鄭覃言開成政事元年二年好三年四年即漸不好頗得實楊嗣復不顧事理但謂覃譏已邀君求退意不容覃至有上纍聖德之言此姦人之計也開成之初覃與李石同相贊文宗致治言論勤切文宗勵精之意亦甚聽納如內置赦書使姦吏不違恩及天下紫宸與宰臣及諸司官論事各使舉職以郭承嘏任給事中有封駮之益不令外任湖南進羡餘錢令收貯以備水旱徐州稅急害人悉使除罷王彥威進度支羡餘錢求寵給邊軍衣賜不時黜授衛尉加李石剛直之議沮內臣仇士良威勢不使撓亂朝權此元年二年之政事至三年仇士良遣盜刺石文宗罷石政務使之出鎮朝廷待將相舊禮一皆寢罷以滋士良之勢中書門下凡奏事各挾所見動成忿競無至公同心之稱又奏改舊制不令僕射尚書等論朝廷事文宗取後宫之言議廢皇太子雖宰臣及憲官等論諫得以不廢然太子尋薨於少陽院仇士良用軍中誣謀之事枉害五十餘人此三年四年之政事也以是觀之鄭覃之言豈非得實嗣復但恨覃沮已引用李宗閔之意遂乘其言議指為瑕釁盡力排之覃與嗣復同相况居四輔之首既言政事一年不如一年覃亦自言其過嗣復不能深思極論共謀國政求其失而更之但快忿心以覃言為過至言非惟臣罪亦恐上纍聖德正以讒言激主之意爾及罷覃輩獨當國政又何所施為哉不踰年禍敗蓋自取也杜元頴孫之翰論曰杜元頴事憲宗為翰林學士穆宗即位自司勳員外郎加中書舍人不周嵗用為宰相時議詞臣進用之速未有其比宜罄所學盡忠節以輔時治茍謀議有失但竭心於事亦可見大臣報國之節何得略無能效著聞於時已負國矣及出鎮於蜀遇昭愍沖年即位首進罨畫打毬衣五百事自後廣求珍異玩好之具貢奉相繼用圖恩寵以至纎悉掊斂大取軍民之怨不忠無識一至於此人臣已為將相矣若守正自固為主所寵此固至榮然於將相之位又何以加若守正自固為主所疏已必無過亦不為辱至於名位亦未必失之也何乃遇人君沖年專道侈欲以圖恩寵恩寵果深欲何為哉如李德裕在浙而昭愍凡有宣索再三論奏罷其貢獻此以生民為意不奉君之侈欲也以德裕之賢視元頴何等人爾蓋元頴窺憲宗晚年及穆宗長年即位多縱侈樂厚纎人二長君尚若此昭愍童年嗣位尤當奢逸遂專以侈靡奉之殊不知窺時作事而不正者事極而變則禍矣使元頴不誅斂民人專奉君欲未必不入登三事外不失方面之任內不失尚書僕射之位矣反以圖寵之意専務誅剝以取衆怨蠻賊乘隙大害一方元頴坐是貶死遐裔矣後之為將相者深戒之劉蕡范祖禹論曰天之生斯人茍有聰明正直之資必將有用於時不使之汨沒而死也聖人順天理而感人心斂天下之賢者而聚之於朝使之施其所有以為國之有則賢者無不得其所而民物亦無不得其所矣唐則不然抑遏之廢斥之使身老巖穴不為世用豈不違天理逆人心乎歷代名賢確論卷九十一
