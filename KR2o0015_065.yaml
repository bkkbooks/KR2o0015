body:
  text: 歴代名賢確論卷六十五明元帝太武帝太武兇殘王轂崔浩少游孝文帝穆泰與陸叡安樂侯隆等謀作亂伏誅温公韓顯宗等諫取士當擇賢才不宜專取門望温公文帝至肆州慰勞所遇跛眇者赦軍士為盗者三人温公孝明帝李崇北征上表乞改鎮立州高平鎮民叛帝謂崇表之由温公通論魏之人君温公魏去夷即華六一北齊歴代人君温公文皇帝伊婁謙聘齊其參軍高遵辱命周高祖克齊執遵付謙任其報復謙請赦遵帝乃止謙待遵如初温公高祖平齊後務儉約露寢温公通論後周人君温公七代通論宋齊梁陳周北齊後魏東坡宋齊梁陳李白宋齊李德裕太武兇殘王轂後魏行曰力微皇帝謗天嗣太武兇殘人所畏一朝鮎䍽飛上天子孫盡作河魚餌崔浩少游曰有有道之士有有才之士至明而持以晦至智而守以愚與物並游而不離其域者有道之士也以明濟明以智資智穎然獨出不與衆為耦者有才之士也夫有道之與有才相去遠矣不可不知也史稱崔浩自比張良且謂稽古過之以愚觀之浩曾不及荀賈何敢望子房乎夫子房之於漢荀攸賈詡之於魏浩之於元魏運籌制勝筭無遺策實各一時之謀臣也高祖以子房與韓信蕭何為三傑用之以取天下韓信王楚數十城蕭何封侯第一而子房獨願封畱而已及太子監關中兵乃行少傅事晏然處於叔孫通之下了無矜伐不平之意故司馬以為無智名勇功可謂有道之士也荀賈雖不足以與於此然攸謀謨帷幄時人子弟莫知其言詡亦闔門自守退無私交皆以令終故陳壽以為良平之亞雖有才之士亦頗聞君子之道者也浩則不然其設心措意惟恐功之不著名之不顯而已李順之死浩既有力而奏五寅元厯章尤夸誕妄詆古人所撰圖書至鑱石道傍以彰直筆明哲之所為固如此乎正孟子所謂小有才未聞君子之大道適足以殺其身而已盆成括之流也以此論之浩曾不及荀賈明矣何敢望子房乎夫以其精治身以緒餘治天下功成事遂奉身而退者道家之流也觀天人察時變以輔人事明於末而不知本陰陽家之流也子房始遊下邳受書圮上老人終曰願棄人間事從赤松子游耳則其術蓋出於道家之流也浩精於術數之學其言熒惑之入秦彗星之滅晉與夫兎出後宫姚興獻女之事尤異及黜莊老乃以為矯誣之言則其術蓋出於陰陽而已此其所以不同也然高帝用子房之謀棄咸陽還定三秦滅項羽於垓下太武用浩亦取赫連昌破蠕蠕平沮渠牧犍於涼州惠帝得不廢本子房之謀而太武為國副主亦自浩發之其迹蓋相似也嗚呼豈欲為子房而不知所以為子房者歟穆泰與陸叡安樂侯隆等謀作亂伏誅温公曰夫爵禄廢置殺生予奪人君所以馭臣之大柄也是故先王之制雖有親故賢能功貴勤賔茍有其罪不直赦也必議於槐棘之下可赦則赦可宥則宥可刑則刑可殺則殺輕重視情寛猛隨時故君得以施恩而不失其威臣得以免罪而不敢自恃及魏則不然勲貴之臣往往豫許之以不死使彼驕而觸罪又從而殺之是不信之令誘之使陷於死地也則刑政之失莫此為大焉韓顯宗等諫取士當擇賢才不宜專取門望温公曰選舉之法先門地而後賢才此魏晉之深弊也而歴代相因莫之能改也夫君子小人不在於世禄與側微以今日視之愚智所同知也當是之時雖魏孝文之賢猶不免斯蔽故夫明辨是非而不惑於世俗者誠鮮矣文帝至肆州慰勞所遇跛眇者赦軍士為盗者三人温公曰人主之於其國譬猶一身視遠猶邇在境如在廷舉賢才以任百官修政事以利百姓則封域之内無不得其所矣是以先王黈纊塞耳前旒蔽明欲其廢耳目之近用推聰明於四遠也彼廢疾者宜養當命有司均之於境内今獨施於道路之所遇則所遺者多矣其為仁也不亦微乎况赦罪人以撓有司之法尤非人君之體也惜夫孝文魏之賢君而獨有是乎李崇北征上表乞改鎮立州高平鎮民叛帝謂崇表之由温公曰李崇之表乃所以銷禍於未萌制勝於無形也上既不能用及亂生之日曾無愧謝之言乃更以為崇罪彼不明之君烏可與謀哉詩云聴言如對誦言如醉匪用其良覆俾我悖其是之謂矣厯代人君温公曰神武以高世之略平爾朱之亂功大勢盛為魏孝武所疑雖有逐君之慙而能惓惓盡恭以事靜帝没身不怠此其可稱者也文襄有儁材而無重德悖慢無禮終隕身於奴𨽻文宣淫湎殘暴甚於桀紂能信用賢臣委之以政威加隣敵終其天年蓋亦有以得之矣孝武明逹愷悌實有齊之令主享國不永惜哉武成驕淫奢縱齊業始衰後主繼之昬狂尤甚誅翦忠良信用䜛邪十年而亡已為幸矣伊婁謙聘齊其參軍高遵辱命周高祖克齊執遵付謙任其報復謙請赦遵帝乃止謙待遵如初温公曰賞有功誅有罪此人君之任也高遵奉使異國漏泄大謀斯叛臣也周高祖不自行戮乃以賜謙使之復怨失政刑矣孔子謂以德報怨者何以報德為謙者宜辭而不受歸諸有司以正典刑乃請而赦之以成其私名美則美矣亦非公義也高祖平齊後務儉約露寢温公曰周高祖可謂善處勝矣他人勝則益奢高祖勝而愈儉後周人君温公後周論曰文帝以關中之衆東迎孝武收疲散之兵撫貧困之民任賢使能列官布職明部分務農桑以輔魏室雖以高氏之强不能陵也其所為典法施於後世可不謂賢乎武帝以英傑之資受制强臣恭黙端拱十有餘年須其罪盈惡熟為衆所棄一旦除之若撥麷振槁可謂知柔知剛智勇兼備者矣然後親統六師以征東夏齊之險阻不守士卒不戰數月之間縛其君臣致於鼓下使有周之境東漸於海南薄於江雖魏室全盛之時不能及也惜其宣帝恣其淫侈進其竒譎自絶於天結怨於民三年而為異姓所有悲夫宋齊梁陳周北齊後魏東坡七代論曰英雄之士能因天下之隙而遂成天下之勢天下之勢未有可以必成者也而英雄之士常因其隙而入於其間堅忍而不變是以天下之勢遂成而不可解自晉以下者天下何其紛紛也强者不能以相吞滅天下大亂離而為南北北又自離而為東西其君臣又自相簒取而為七代至於隋而後合而為一蓋其間百有餘年之中其賢君名臣累累而出者不為少矣然而南不能渡河以有北之民而北不能過江以侵南之地豈其百年之間南無間之足乘而北無隙之可入哉蓋亦其勢之有所不可者也七代之際天下嘗有變矣宋取之晉齊取之宋梁取之齊陳取之梁而周齊取之後魏此五釁者兵交而不解内亂而無救其間非小也而其四隣拱手遠望而莫敢入蓋其取之者誠有以待之而不可以乘其倉卒也嗟夫北方之人其力不足以并南而南方之勢又固不可以爭衡於中國則七代之際天下將合之際也姚興既死而秦地大亂武帝舉江南之兵長驅以攻秦兵不勞而關中定此天下之一時也夫劉穆之死關中未安席不及煖兵不及息而奔走以防江南之亂畱孺子孱將以抗四方强悍之虜則夫天下之勢亦隨去之而已矣且夫孫權曹操之事足以見矣曹操之不能過江以攻孫權力有所未足也而孫權終莫肯求逞於中國蓋其志將以僥倖乎北方大亂然後奮而乘其弊而非以為其地之足以抗衡於中原也嗟夫使武帝既入關因而居之以鎮撫其人民南漕江淮之資西引巴漢之粟而内因關中之盛厲兵秣馬以問四方之罪戾當此之時天下可以指麾而遂定矣而何江南之足以蔕芥夫吾心哉然而其事則不可不察也其心將有所取乎晉而恐夫人之反之於南是以其心憂懼顛倒而不見天下之勢孔子曰無欲速無見小利欲速則不達見小利則大事不成故夫有可以取天下之勢而不顧以求移其君而遂失之者宋武之罪也宋齊梁陳李白金陵歌曰石頭巉巖如虎踞凌波欲過滄江去鍾山龍盤走勢來秀色橫分歴陽樹四十餘帝三百秋功名事跡隨東流白馬小兒誰家子泰清之嵗來闗囚金陵昔時何壯哉席卷英豪天下來冠蓋散為煙霧盡金輿玉座成寒灰扣劒悲吟空咄嗟梁陳之國亂如麻天子龍沈景陽井誰歌玉樹後庭花此地傷心不能道目下離離長春草送爾長江萬里心他年來訪商山皓宋齊李德裕宋齊論曰宋齊以降繼體承祧者君德寖微王道凌替纉緒之初始革大運降宥解網以悦衆心仁義之風薄骨肉之情廢前史論之詳矣然政未得中改之可也如弓之高下者抑舉琴瑟之不調者更張此亦天之道也豈獨人事哉唯用其罪人不可甚矣天下之惡一也古人言一心可以事百君百心不可以事一君豈有不忠於前朝而能忠於後主者也毁泉臺春秋之所譏先儒之所惡宋齊之君有一於此必以為美政泉臺見妖尚不可毁况無妖者乎燕人之思召伯甘棠勿翦楚人之懐叔子望碑墮淚彼人臣也而見思若此雖時移政改莫匪舊臣昔伯益贊禹稱大舜之德曹參事惠帝守蕭何之法魏文帝初受漢禪羣臣皆揚魏德唯衛臻獨稱漢美文帝曰天下之珍當與山陽共之為人臣者罔念於此可謂有百心矣歴代名賢確論卷六十五
