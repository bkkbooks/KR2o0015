body:
  text: 歷代名賢確論卷二十四孔子上夫子之道程浩李雍李觀昌黎杜牧潁濱常仲孺栁州夫子賢於堯舜荆公孔子從先進東坡夫子之道程浩曰天地吾知至廣也以其無所不覆載日月吾知至明也以其無所不照臨江海吾知至大也以其無所不容納料廣以寸管測景以尺圭航大以一葦廣不能逃其數明不能私其質大不能亡其險偉哉夫子後天地而生知天地之始先天地而沒知天地之終非日非月光之所及者逺不江不海潤之所浸者博三代禮樂吾知其損益百王憲章吾知其消息君臣以位父子以親家國以肥鬼神以享道未可詮其有物釋未可證於無生一以貫之我先師夫子夫子聖人也帝之聖者曰堯王之聖者曰禹師之聖者曰夫子堯之德有時而息禹之功有時而窮夫子之道久而彌芳逺而彌光用之者昌捨之者亡昔否於周今泰於唐不然者何被衮而裳垂旒而王者哉李觀謁夫子廟文曰於皇夫子之道之德與天地周施與日月合明乃聖乃神煥乎典謨惟王者得之以事神使民庶人得之以不失其死生諸侯得之以事天子卿大夫得之以保祿位怨災不及其身四時得之而序行天下得之而大同然則天地神人之事昭乎夫子之道之德也至矣何小子之所竊歎焉斯歎也其惟來學乎其惟乞靈乎曰某不敢然也且夫禮樂浹於明夫子之善道也斯可謂以學矣鬼神瞰於幽夫子之明靈也斯可謂以敬矣孰敢捨道而來學黷敬而乞靈者乎於是再拜而起徊翔而觀章施足徴像設無喧我廟俎豆我王衣冠夫子得之亦無愧言七十之徒亦公亦侯外如君臣內實討論蒸蒸小子思得其門夫子聖人天錫元精其未生也若超然神遊與兩氣俱存其既生也遇三季之㑹飄飄湮淪絃歌之音拊而不和仁義之圖卷而靡陳及相魯而有喜色去宋而曰桓魋其如豫何聖人之窮乃有如是耶噫俾夫子生於堯之代堯必後舜而先夫子生於舜之代舜則必先夫子而後禹聖人得時化可知也如舜禹生於夫子之年則不過守於田畝之中安有夫子之教垂於無窮若今日之澶漫者乎惟夫子生實陪臣沒乃王爵有聖德也惟紂生實殷辟死曰獨夫有逆德也惟爵諡在德惟德有聖有逆惟聖逆在人不在於尊嗚呼夫子聖人之極歟鳳鳥不至無其時也秦人燒書文之衰也帝唐爵王德之興也惟夫子之德洎唐之德永而能安古而更新降康下民敻有烈光訖無間然小子忡忡栗栗拜奠而出匪作匪述杜牧曰天不生夫子於中國中國當何如曰不夷狄如也荀卿祖夫子李斯事茍卿一日宰天下盡誘夫子之徒與書坑而焚之曰徒能亂人不若刑名獄吏治世之賢也彼商鞅者能耕能戰能行其法基秦為强曰彼仁義蝨官也可以置之置之言不用也自董仲舒劉向皆言司馬遷良史也而遷以儒分之為九曰博而寡要勞而無功不如道家者流也自有天地已來人無有不死者海上迂怪之士特出言曰黃帝鍊丹砂為黃金以餌之晝日乘龍上天誠得其藥可如黃帝以燕昭王之賢破强齊幾於霸秦始皇漢武帝之雄才滅六强闢四夷盡非凡主也皆甘其說耗天下捐骨肉而不辭至死而不悟莫尊於天地莫嚴於宗廟社稷梁武帝起為梁國者以筍脯麵牲為薦祀之禮曰佛之教牲不可殺以天子之尊捨身為其奴散髮布地親命其徒踐之有天地日月為之主隂陽鬼神為之佐夫子巍然統而辨之復引堯舜禹湯文武周公為之助則其徒不為劣其治不為僻彼四君二臣不為無知一旦不信背而之他仍族滅之儻不生夫子紛紜冥昧百家鬭起是巳所是非已所非天下隨其時而宗之誰敢非之縱有非之者欲何所依據而為其辭是楊墨駢慎已降百家之徒廟貌而血食十年一變法百年一改教橫斜高下不知止泊彼夷狄者為夷狄之俗一定而不易若不生夫子是知其必不夷狄如也韓吏部夫子廟碑曰天下通祀惟社稷與夫子社稷壇而不屋取異代為配未若夫子巍然當座用王者禮以門人為配自天子至於庶人親北面師之夫子以德社稷以功固有次第哉因引孟子曰生人已來未有如夫子者也自古稱夫子者多矣稱夫子之德莫如孟子稱夫子之尊莫如韓吏部云云常仲孺曰立於水成於氣以位天地勇於震奮於乙是生萬物天地之大萬物之多若無聖人誰與凖繩故能範而不過類而不遺者也然則乘時設教必生大聖以首之庖羲氏甄才煥文君人子天神農以之首於皇而體至道也軒轅氏推策命官度方順紀顓頊奉之首於帝而法𤣥德也夏后氏奠山通川因地制賦殷湯繼之首於王而明大化也理亂相資質文代變洎有周而衰焉平桓以還鴻流蕩然非聖人之述易羲農之道消矣非聖人之辨問軒轅之帝衰矣非聖人之刪書夏殷之王微矣非聖人之作春秋周室卑而諸侯僭矣故夫子彰皇繫帝叙王尊周首於儒而開大教也是知前聖之遺風將絶夫子不得不生中古之彛訓將興夫子不得不作故禮云百世以俟聖人而不惑也有天下者遵其易簡遡其元命可以致於清靜遵其廣大𢎞其覆載可以致於雍熙遵其禮讓蹈其夷曠可以致於和平茍或失常滔滔淫源德滋非西霸功作矣代易於上教尊於下運否於既往位崇於將來則於國而達於家萬樂和而百禮成郁郁洋洋與日月而終矣其辭曰昭昭五星𤣥文之經浩浩五行元氣之形維上紀下災昏祥明聖人居中百化道成五星九𤣥醇朴不曜降及堯舜存乎典誥文王既沒孔子乃紹質文異時日月代照肇自開闢澒洞無跡考于六籍窮古盡昔微禹之功水土共融微儒之風華夷濛濛大聖同德垂訓作則山川九州禮樂萬國羲軒之道夫子明之百王纘焉仰而營之李雍曰元化陰藏上帝𤣥造雖道逺不際而運行有符揚榷大抵宣考神用逮人統之可復補天秩之將頽其揆一也昔蚩尤怙賊厥弟驕兵巨刃朋徒合緒運禍則黃帝興聖首出羣龍推下濟以君人警勤略以戡亂逮至橫流方割包山其咨轉死為魚鮮食不粒則堯禹並跡振拔隱憂導百川康四國粵若殷禮缺周德微宋公用鄫楚子問鼎則夫子卓立燦然成章闢邦家之正門播今昔之彛憲此天所以不言而成化聖所以有開而必先其若是者乎故夫子之道消息乎兩儀夫子之德經營乎三代豈徒小說蓋有異聞夫亭之者莫如天藉之者莫如地教之者莫如夫子且沐其亭而不識其道則不如勿生荷其藉而不由其德則不如勿運故曰消息乎兩儀者也夫博之者莫如文約之者莫如禮行之者莫如夫子且㑹其文而不揚其業則不如勿傳經其禮而不啓其教則不如勿學上代有以焯序中代有以宗師後代有以不訓故曰經營乎三代者也噫唐虞之美不必至是贊而大者進聖君也夏桀之惡不必至是擠而毁者激庸君也伊尹之忠不必至是演而數者勉誠節也趙盾之逆不必至是抑而書者誅賊臣也至若論慈廣孝輔仁寵義職此之由於是君臣之位序父子之道明朋友之事興夫婦之倫得雖朗日開覺膏雨潤黷和風清扇安足喻哉借如九皇繼統而政醇七聖同年而道合雖事業廣運而理齊一時未有雖遊大夫僻居下國德教既往言滿方來廟食列郡不假手於後續君長萬乘必歸心於素王若此之盛是以騰跨百辟孤絶一人曷成名而可稱蓋取與而為大者也昌黎曰夫子聖人也且曰自吾得子路而惡聲不入於耳其餘輔而相者周天下猶且絶糧於陳畏於匡毁於叔孫奔走於齊魯宋衛之郊其道雖尊其窮也亦甚矣賴其徒相與守之卒有立於天下向使獨言之而獨書之其存也可冀乎云云自文王沒武王周公成康相與守之禮樂皆在及乎夫子未久也自夫子而至乎孟子未久也自孟子而至乎揚雄亦未久也然猶其勤若此其困若此而後能有所立潁濱曰道有不可以名言者古之聖人命之曰一寄之曰中舜之禪禹也曰人心惟危道心惟微惟精惟一允執厥中聖人之欲以道相紹者至於一與中盡矣昔者孔子與諸弟子言無所不至然而未嘗及此也蓋嘗與子貢言之矣曰賜也汝以豫為多學而識之者歟曰然曰非歟曰非也豫一以貫之雖與子貢言而孔子之言之也難而子貢之受之也未信至於曾子不然孔子曰參乎吾道一以貫之曾子曰唯曾子出門人問曾子曰夫子之道忠恕而已矣蓋孔子之告之也不疑而曾子之受之也不惑則為與子貢異矣然曾子以為忠恕知門人之不足告也夫及孔子既沒曾子傳之子思子思因其說而廣之曰喜怒哀樂之未發謂之中發而皆中節謂之和中者天下之大本和者天下之達道也致中和天地位焉萬物育焉子思之說既出而天下始知一與中之在是矣然子思以授孟子孟子又推之以為性善之論性善之論出而一與中始枝矣嗚呼孔子之所以不告諸弟子者蓋為是歟栁州曰凡人之質不良莫能方且恆質良矣用不周莫能圓以遂孔子於鄉黨恂恂如也遇陽虎必曰諾而其在夾谷也視叱齊侯類蓄狗不震乎其內後之學孔子者不志於是則吾無望焉耳矣夫子賢於堯舜荆公曰孟子曰可欲之謂善有諸巳之謂信充實之謂美充實而有光輝之謂大大而化之之謂聖聖而不可知之謂神聖之為稱德之極神之為名道之至故凡古之所謂聖人者於道德無所不盡也於道德無所不盡則若明之於日尊之於上帝莫之或加矣易曰大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶此之謂也由此觀之則自傳記以來凡所謂聖人者宜無以相尚而其所知宜同宰我曰以豫觀於夫子賢於堯舜逺矣而世之解者必曰是為門人之私言而非天下公共之論也而孟子亦曰生民以來未有如夫子是豈亦門人之私言而非天下公共之論哉為是言者蓋亦未之思也夫所謂聖賢之言者無一辭之茍其發也必有指焉其指也學者之所不可不思也夫聖者至乎道德之妙而後世莫之增焉者之稱也茍有能加焉者則豈聖也哉然孟子宰我之所以為是說者蓋亦言其時而已也昔者道發乎伏羲而成乎堯舜繼而大之於禹湯文武此數人者皆居天子之位而使天下之道寢明寢備者也而又有在下而繼之者焉伊尹伯夷栁下惠孔子是也夫伏羲既發之也而其法未成至於堯而後成焉堯雖能成聖人之法未若孔子之備也夫以聖人之盛用一人之知足以備天下之法而必待至於孔子者何哉蓋聖人之心不求有為於天下待天下之變至焉然後吾因其變而制之法耳至孔子之時天下之變備矣故聖人之法亦自是而後備也易曰通其變使民不倦此之謂也故其所以能備者豈特孔子一人之力哉蓋所謂聖人者莫不預有力也孟子曰孔子集大成者萬世之法耳此其所以賢於堯舜也孔子從先進東坡曰君子之欲有為於天下莫重乎其始進也始進以正猶且以不正繼之況以不正進者乎古之人有欲其以君王者也有欲以其君霸者也有欲彊其國者也是三者其志不同故其術有淺深而其成功有巨細雖其終身之所為不可逆知而其大節必見於其始進之日何者其中素定也未有進以彊國而能霸者也未有進以霸而能王者也伊尹之耕於有莘之野也其心固曰使吾君為堯舜之君使吾民為堯舜之民也以伊尹為以滋味說湯者此戰國之策士以已度伊尹也君子疾之管仲見桓公於纍囚之中其所言者固欲合諸侯攘戎狄也管仲度桓公足以霸度其身足以為霸者之佐是故上無侈說下無卑論古之人其自知明也如此商鞅之見孝公也三說而後合甚矣夫鞅之懷詐挾術以欺其君也彼豈不自知其不足以帝且王哉顧其刑名慘刻之學恐孝公之不能從故設為高論以衒之君既不能是矣則舉其國惟吾之所欲為不然豈其負帝王之略而每見輒變以徇人乎商鞅之不終於秦也是其進之不正也聖人則不然其志愈大故其道愈高其道愈高故其合愈難聖人視天下之不治如赤子之在水火也其欲得君以行道可謂急矣然未嘗以難合之故而少貶焉者知其始於少貶而其漸必至於陵遲而大壞也故曰先進於禮樂野人也後進於禮樂君子也如用之則吾從先進孔子之世也其諸侯卿大夫視先王之禮樂猶方圓氷炭之不相入也進而先之以禮樂其不合必矣是人也以道言之則聖人以世言之則野人也若夫君子之急於有功者則不然其未合也先之以世俗之所好而其既合也則繼之以先王之禮樂其心則然然其進不正未有能繼以正者也故孔子不從而孟子亦曰枉尺直尋者以利言也如以利則枉尋直尺而利亦可為歟君子之得其君也既度其君又度其身君能之而我不能不敢進也我能之而君不能不可為也不敢進而進是易其君不可為而為是輕其身二人者皆有罪焉故君子之始進也曰君茍用我矣我且為是君曰能之則安受而不辭君曰不能天下其獨無人乎至於人君亦然將用是人也則先之以己所欲為要其能否而責成焉其曰姑用而試觀之者皆過也後之君子其進也無所不至惟恐其不合也曰我將權以濟道既而道卒不行焉則曰吾君不足以盡我也始不正其身終以謗其君是人也自以為君子而孟子之所謂賊其君者也歷代名賢確論卷二十四
