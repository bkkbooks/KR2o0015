body:
  text: 歷代名賢確論卷九十七通論三宦官溫公孫之翰石守道近侍張唐英女謁張唐英宦官溫公論曰宦者用權為國家患其來久矣蓋以出入宫禁人主自幼及長與之親狎非如三公六卿進見有時可嚴憚也其間復有性識儇利語言辨給善俟候顔色承迎志趣受命則無違忤之患使令則有稱愜之效自非上智之主燭知物情慮患深逺侍奉之外不任以事則近者日親逺者日疏甘言卑辭之請有時而從浸潤膚受之訴有時而聽於是黜陟刑賞之政潛移於近習而不自知如飲醇酒嗜其味而忘其醉也黜陟刑賞之柄移而國家不危亂者未之有也東漢之衰宦官最名驕橫然皆假人主之權依憑城社以濁亂天下未有能劫脅天子如制嬰兒廢置在其手東西出其意使天子畏之若乘虎狼而挾蛇虺如唐世者也所以然者非它漢不握兵唐握兵故也太宗鑑前世之弊深抑宦官毋過四品明皇始隳舊章是崇是長晚節令髙力士省決章奏乃至進退將相時與之議自太子王公皆畏事之宦官自此熾矣及中原板蕩肅宗收兵靈武李輔國以東宫舊𨽻參預軍謀寵過而驕不復能制遂至愛子慈父皆不能庇以憂悸終代宗踐祚仍遵覆轍程元振魚朝恩相繼用事竊弄刑賞壅蔽聰明視天子如委裘陵宰相如奴僕是以來瑱入朝遇讒賜死吐蕃深侵郊甸匿不以聞至狼狽幸陜李光弼危疑憤鬱以隕其生郭子儀擯廢家居不保丘壟僕固懷恩寃抑無訴遂棄勳庸更為叛亂德宗初立頗振綱紀宦官稍絀而返自興元猜忌諸將以李晟渾瑊為不可信悉奪其兵而以竇文場霍仙鳴為中尉使典宿衛自是太阿之柄落其掌握矣憲宗末年吐突承璀欲廢嫡立庶以成陳𢎞志之變寶厯狎昵羣小劉克明與蘇佐明為逆其後絳王及文武宣懿僖昭六帝皆為宦官所立勢益驕橫王守澄仇士良田令孜楊復恭劉季述韓全誨為之魁傑自稱定䇿國老目天子為門生根深蒂固疾成膏肓不可救藥矣文宗深憤其然志欲除之以宋申錫之賢猶不能有所為反受其殃况李訓鄭注反覆小人欲以一朝譎詐之謀翦纍世膠固之黨遂至漂血禁塗積尸省户公卿大臣連頸就誅闔門屠滅天子陽瘖縱酒飲泣吞氣自比赧獻不亦悲乎以宣宗之嚴毅明察猶閉目搖手自謂畏之况懿僖之驕侈茍聲色毬獵足以充其欲則政事一以付之呼之以父固無怪矣賊汚宫闕兩幸梁益皆令孜所為也昭宗不勝其恥力欲清滌而所任不得其人所行不由其道始則張濬覆軍於平陽增李克用跋扈之勢復恭亡命於山南啓宋文通不臣之心終則兵交闕廷矢及御衣漂泊莎城流寓華隂幽辱東內劫遷岐陽崔昌遐無如之何更召朱全忠以討之連兵圍城再罹寒暑御膳不足於糗糒王侯斃踣於飢寒然後全誨就誅乘輿東出翦滅其黨靡有孑遺而唐之廟社因以丘墟矣然則宦者之禍始於明皇盛於肅代成於德宗極於昭宗易曰履霜堅冰至為國家者防微杜漸可不慎其始哉此其為患章章尤著者也自餘傷賢害能召亂致禍賣官鬻獄沮敗師徒蠧害蒸民不可遍舉夫寺人之官自三王之世載於詩禮所以謹閨闥之禁通內外之言安可無也如巷伯之疾惡寺人披之事君鄭衆之辭賞吕強之直諫曹日升之救患馬存亮之弭亂楊復光之討賊嚴遵美之避權張承業之竭忠其中豈無賢才乎顧人主不當與之謀議政事進退士大夫使有威福足以動人耳果或有罪小則刑之大則誅之無所寬赦如此雖使之專橫孰敢哉豈可不察臧否不擇是非欲草剃而禽獮之能無亂乎是以袁紹行之於前而董卓弱漢崔昌遐襲之於後而朱氏篡唐雖快一時之忿而國隨以亡是猶惡衣之垢而焚之患木之蠧而伐之其為害豈不益多哉孔子曰人而不仁疾之已甚亂也斯之謂矣孫之翰論保全內臣曰內臣贈官非古典也然於此見旌善之事焉內臣自武后稱制始預事尚未有招權著名者至明皇朝高力士以權寵擅名李林甫楊國忠安祿山輩皆因之取將相位林甫輩既致時亂力士貶死遐裔矣肅宗朝李輔國以扈從微勞過受恩寵至專掌禁兵故輔國脅遷明皇升黜將相凶橫既極盜殺之於家矣肅宗又寵朝恩始命為觀軍容使代宗寵之又加以天下觀軍容使朝恩驕橫既甚勢不可容遂使之自縊矣代宗又寵程元振使典禁兵元振姦險擅權大為將相之害代宗避狄陜州詔諸鎮兵赴援將帥懼元振誣譖多不敢至及栁伉極言其狀元振貶死荒徼矣德宗寵竇文場霍仙鳴命為神䇿軍中尉纎人裴均輩附之往往外取方鎮內取要官文場仙鳴權任既盛內臣輩亦嫉之仙鳴被毒以死文場甚懼堅乞致仕僅免於禍憲宗寵吐突承璀至委鎮州征討之任卒無功效尋以其黨納賄事連出淮南監軍後復寵任以妄議太子事為穆宗誅死文宗寵王守澄聽其言遂致誣譖宰相宋申錫事幾陷大戮守澄凶惡既甚竟至賜死自明皇朝已後內臣以罪誅貶者不可勝紀但力士等八人大以權力著名於時此內臣之尤盛者然三人誅死二貶死一為盜殺一毒死文場禍至而避亦姦名不朽以是觀之內臣取恩於天子恩既盛鮮有不罹禍者蓋受恩不知紀極恣其所為以至過惡之甚也惟順宗朝俱文珍以剛直著稱又有翊戴憲宗之功位至右衛大將軍知內侍省事不聞驕暴之名其卒也贈開府儀同三司文宗朝馬存亮雖任中尉不與王守澄同惡力止其屠害宋申錫家屬又有保衛昭憲之力權寵既盛能奉身以退是年卒贈揚州大都督兹二人者生而獲令名歿而有光寵此無他為善之效也天子任內臣能常以力士存亮等善惡之效示之無使權寵之過不惟不害國事亦足以保全之也石守道論曰中官積亂僅二百年矣政道剝喪已盡矣綱紀隳壞已絶矣賢人消亡已無矣高祖太宗之遺德已殄矣天人已厭矣神祗已怒矣國祚不去何待雖盡殺之其可救乎猶水之浸潰始於針芒不補遂壞隄防一決汗漫中夏懷山襄陵不可禦也而能始塞一針芒水其止矣內官積亂二百年昭宗斬數百人望其遽治不亦難乎悲夫噫中官之亂國家覆社稷歷代罔不由之向若明皇肅宗能鑒前古之敗早絶其初不使滋蔓或順憲善懲祖宗之亂亟杜其漸無恣成姦則唐室豈有短促危亡之患哉臣觀東漢之覆壞李唐之傾弱皆自中官然則中官豈可任也臣每觀之寒心後世明王聖君宜深戒之又論肅宗代宗德宗任用宦官曰國家之權在乎兵也兵者王者生殺之柄也係天下安危之幾萬民存亡之命有國以來孰敢去兵兵在手則匹夫可以制萬乘兵去手雖人主不能制一夫故云古之命帥擇其文武兼才將相全器忠亮可以託社稷信義可以固危亡智謀可以決萬全籌䇿可以制千里故臨陳有必勝出師無敗兵伊尹所以興湯吕望所以興周房喬所以興唐李晟所以復定兩京子儀所以再造唐室裴度所以戡寧中夏得將將之道也得用兵之要也故兵為國家之利器嗟哉庸君暗主內疑宿將外忌功臣不能推腹心以示人用忠信而結下反以貔貅之衆授與閹腐之徒則是以王者生殺之柄天下安危之幾萬民存亡之命付之厠役也自至德已後天下亂略弗過兵鋒益熾肅宗代宗德宗三世蒙塵奔播不暇由命帥失其人也措置非其處也古者命將閫外之事將軍制之軍中聞將軍之令不聞天子之詔而乃使中官監以制之更取監軍指畫進退不由主帥號令不亦殆哉嗚呼兵柄豈可輕授於人哉况在宦官尤不可假之以權也戒之戒之近侍張唐英論曰文皇帝勵精治道力致太平制度牢密紀綱齊整刑賞號令爵祿賜豫如布帛之有邊幅如丈尺之有長短不可得而踰之矣公道大闢私途盡塞公卿臣妾戚里皇族不敢有僥幸之望至高宗中睿以來頗壞其法開元之盛首革其弊天寶之後仍蹈覆車順宗時韋執誼王伾叔文輩専政內結牛美人以伺上動靜朝廷刑賞之柄皆為所專章武英睿綜核名實任用正人一清王室至昭愍以童年嗣位怠於勤政悅於近習刑賞之柄出於閹人宫姬之手拾遺薛延老因入奏曰近日除拜往往不由中書總是內中宣出恐紀綱漸壞昭愍厲色不悅噫天下之大萬幾之繁以一人之寡而四方夷夏尊而歸之者以其有制度在爾今以一人之私而塞天下之公蓋不知天下者非巳之天下亦天下之天下也奈何不以公議而守之耶李玨曰太宗用宰臣天下事皆先平章故曰平章事若事不由中書則焉用平章事耶女謁張唐英論曰天下之禍常起於袵席之上情愛既遷嬖寵斯甚大至傾國小亦攝朝高宗不斷政出則天斫喪王室翦滅宗枝李氏宗廟不得血食孝和及武韋氏司晨朝廷政令盡由中饋而郡國夫人陸氏昭容上官氏沛國夫人鄭氏尚宫柴氏賀婁氏女巫隴西夫人趙氏及太平公主安樂公主長寧公主宜城公主等皆恃政挾寵依窟城社納受賄賂門若闤闠鬻獄賣官無有虛日常出斜封墨敕補授官爵以手掩其前令上以筆書其後上但笑而從之中外之官數踰十倍屠沽之輩盡衣朱紫僕𨽻之人亦為卿監皆無廳事可處時人謂之三無坐處官謂宰相御史員外也明皇之時楊氏專寵上方貢獻畢在私家其公主駙馬尚辱於楊氏之奴其餘卿士畏而附之者即可知矣歷代名賢確論卷九十七
