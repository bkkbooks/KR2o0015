body:
  text: 歷代名賢確論卷七十太宗三房𤣥齡杜如晦吕溫孫之翰魏鄭公吕溫禹張唐英翰曽子固范祖孫之潁濱白樂天房𤣥齡李靖魏鄭公司空圗張唐英房𤣥齡杜如晦吕溫房𤣥齡贊曰梁公先覺龍卧待君長彗流光掃天布新義師雷興公躍其鱗杖䇿千里來排帝閽婉婉梁公實懿實聰實光實融羽義翼忠若鸞若鴻大風動地儒服從容靜運胸中弛張折衝左右太宗夷屯廓䝉定髙祖功功告武成翊開太平我雖忘勞時靡有爭網羅遺賢推轂羣英玉不韜輝蘭不沈馨飛鴻出冥振鷺在庭濟濟多士太宗以寧公無事矣闕衮有補惟仲山甫經營四方方叔召虎大邦鈞軸至則委汝閒居台輔撝默自處亦莫敢余侮髙節令終鳴呼梁公杜如晦贊曰穆穆葉公奇姿粹靈藴元和氣為大國楨乘時恢能唐室大開故人相攜少與房梁公同有巨濟之志直上太階更為隂陽迭作日月佐明四海贊育萬物王度是欽如玉如金德音愔愔萬有千古永稱房杜如周申甫孫之翰論房杜相業曰或問房杜之相也謀議施為不見赫赫之事而世大賢之何也答曰宰相之功不必赫赫觀時事何如爾房杜自秦府遇王講天下事固詳太宗即位遂命作相付任之専不與他相同乃得盡心助治致時太平以事明之其功可見宰相之任莫先乎正官職用賢才若官得其才宰相總其大要庶事舉而天下治矣貞觀元年房相定文武官六百四十員官既少則才可擇才可擇則官不濫官不濫則職自舉況公於取士各盡其才此房杜得佐主興治之要道也至臺閣規模典章文物皆其所定又防姦邪抑權幸各有著法大概如此不惟一時之治固足垂憲於後也其他軍國機務雖謀議不著每籌事太宗從之以太宗之英睿專任二相而從其所籌其賢又可明也即貞觀時事之治二相之功可見矣或曰貞觀四年天下大治太宗惟稱魏公之力不及房杜何也答曰貞觀之初太宗求治方切魏公專論王道封倫橫議以沮之太宗不惑姦言力行王道及天下之治也嘉賢人之論足以明道故稱魏公之力嫉小人之言不能使之慙悔故恨封倫之不見其言自不及房杜也然魏公議臣也房杜宰輔也魏公論其治體房杜助其施為爾後世賢房杜而不見其功者惟詳觀太宗專任之意貞觀時事之要可也又論黜陳師合曰人主之任大臣不可不專亦不可專若深知其人可付國事不專任之何以責成功蓋任專則責重責重則人必盡其才力也若知人未至而專任之茍無成功則有敗事又或竊擅威福有難制之患二者惟在人主審之不可一失失則事機難追矣太宗可謂能審任人之術者也知房喬杜如晦賢而付以國事房杜方盡心職事已著功效陳師合以平常之見欲移主意如晦奏其事意似不廣然慮小臣間言漸害於事公言之爾太宗不惑師合之言喬如晦荷信任如是敢不盡其才力乎此所以成太平之治也然有太宗之明房杜之賢則可專任而不容人言人主知人未至當審其付任不可執此為法魏鄭公吕溫鄭公贊曰堂堂魏公崇節大志喬幹直聳摩天自致遭風雲時得霸王器一言委質有死無二撫我則后各盡其志事李密隱太子沈浮變通龍戰既息皇建其極俾補衮職其繩則直諤諤嶷嶷危言正色保太宗德弼違替否日月不蝕黜漢霸雜行周王道人或有言秉德不撓與封德彞廷爭禮興樂崇德合道豐保合大和昭明有融起四年中復三代風言出化成神哉厥功尹躬佐商有恥於湯公以其志匡飭聖唐為唐宗臣致唐無疆永式萬邦張唐英論鄭公言守成之難曰自古桀紂幽厲成哀桓靈晉懷愍隋煬帝皆守成之君矣天下大器皆由而失之蓋承豐泰之後府庫實而無所用則思窮土木之妖干戈戢而無所試則思拓邊疆之廣志氣既驕則恱諂諛之言嗜欲既惑則惡忠直之諫處瓊殿之華麗而不知下有拆廬屋以輸官者享太官之珍羞而不知下有啖糟糠以充腸者有嬪御之煽艷而不知下有鰥寡而亡告者有鄭衛之娛耳而不知下有哀怨可傷者天下已叛而堂上未聞蕭牆已釁而禁中未悟推此信魏公以守成為難矣曽子固曰豫觀太宗常屈已以從羣臣之議而魏公之徒喜遭其時感知己之遇事之大小無不諫諍雖其忠誠所自至亦得君以然也則思唐之所以治太宗之所以稱賢主而前世之君不及者其淵源皆出於此也能知其有此者以其書存也及觀鄭公以諫諍事付史官而太宗怒之薄其恩禮失終始之義則未嘗不反復嗟惜恨其不思而益知鄭公之賢焉夫君之使臣與臣之事君者何大公至正之道而已矣大公至正之道非滅人言以掩已過取小亮以私其君此其不可者也又有甚不可者夫以諫諍為當掩是以諫諍為非美也則後世誰復當諫諍乎況前代之君有納諫之美而後世不見則非惟失一時之公又將使後世之君謂前代無諫諍之事是啓其怠且忌矣太宗末年羣臣既知此意而不言漸不知天下之得失至於遼東之敗而始恨鄭公不在世未嘗知其悔之萌芽出於此也夫伊尹周公何如人也伊尹周公之諫切其君者其言至深而其事至迫也存之於書未嘗掩焉至今稱太甲成王為賢君而伊尹周公為良相者以其書可見矣令當時削而去之成區區之小讓則後世何所據依而諫又何以知其為賢且良與桀紂幽厲始皇之亡則其臣之諫詞無見焉非其史之遺乃天下不敢言而然也則諌諍之無傳乃此數君之所以益暴其惡於後世而已矣或曰春秋之法為尊親賢者諱與此其戾也夫春秋之所諱者惡也納諫諍豈惡乎然則焚藁者非歟曰焚藁者誰歟非伊尹周公為之也近世取區區之小亮者為之耳其事又未是也何則以焚其藁為掩君之過而使後世傳之則是使後世不見藁之是非而必其過常在於君美常在於已也豈愛其君之謂歟孔光之去其藁之所言其在正邪未可知也其焚之而惑後世庸詎知非謀己之姦計乎或曰造辟而言詭辭而出異乎此曰此非聖人之所曽言也今萬一有是理亦謂君臣之間議論之際不欲漏其言於一時之人耳豈杜其告萬世也噫以誠信待已而事其君而不欺乎萬世者鄭公也益知其賢云豈非然哉豈非然哉白樂天論魏公勸帝行仁義曰或者曰君臣之道至大也可以漸合不可以速合也天下之化至大也可以漸行不可以速行也賢人之事業至大也行之可以枉尺而直尋也易以為殆不然矣夫時之變事之宜其間不容息也先之則太過後之則不及故時未至聖賢不進而求時既來聖賢不退而讓蓋得之則不啻乎事半而功倍也失之則不啻乎事倍而功半也嗟乎或者徒知漸合其道而不知啓沃之時失於漸中矣徒知漸行其化而不知燮理之時失於漸中矣徒知枉尺而直尋而不知易失於時則難行於漸中雖枉尋不能直尺矣近者宰相道不行化不成事業不光明率由乎有志於漸矣請以前事明之愚嘗聞太宗顧謂羣臣曰善人為邦百年然後能勝殘去殺當今大亂之後將求致理寧可造次而望乎魏文貞曰不然夫亂後易理猶饑人易食也若聖哲施化人應如響期月而可信不為難三年成功猶謂其晚太宗深納其言時封德彞輩共非之曰不可三代以後人漸澆訛皆欲理而不能豈能理而不欲徵書生不識時務信其虛說必亂國家於是太宗卒從徵言力行不倦三數年間天下大安戎狄內附太宗曰惜哉不得使德彞見之斯則得其時行其道不取於漸之明效也范祖禹曰太宗可謂能審取捨矣魏徵仁義之言也欲順天下之理而治之封德彞刑罰之言也欲咈天下之性而治之夫民莫不惡危而欲安惡勞而欲息以仁義治之則順以刑罰治之則咈矣故治天下在順之而已咈之而能治者未之聞也太宗從魏徵而不從德彞行之四年遂致太平仁義之效如此其速也故治道在人主所力行耳孰不可為太宗乎及其成功復歸美於下此前世帝王之所不及也孫之翰曰帝王興治道在觀時而為之觀時在至明至明在至公至明則理無不通至公則事無不正通於理故能變天下之弊正其事故能立天下之教弊變而教立其治不勞而成矣孔子曰如有用我者期月而已可也三年有成則聖人之意可見矣或曰孔子言善人為邦百年然後勝殘去殺又言如有王者必世而後仁何謂也答曰孔子教為邦者久之之辭也為邦者若非聖哲或行仁政未能通變時事功業不速必中道而止故教以久行仁政乃有成功也若以聖哲之道則期月可矣但後之為天下者雖欲興起治道多非聖哲之才不能通究時弊以道變之務速其功以行一時之事故所為駮雜莫復前古之治也觀魏公之論誠得聖人之意文皇能納其言而不惑姦人之議力變時弊以行王道嗚呼明哉大亂之後興立教法不急其功致時太平德流於後嗚呼公哉曽子固唐令序曰唐令三十篇以常員定職官之任以府衛設師徒之備以口分永業為授田之法以租庸調為斂財役民之制雖未及三代之政然亦庶幾乎先王之意矣後世從事者多率其私見故聖賢之道廢而茍簡之術用太宗能超然逺覽詘封倫而納鄭公之議其為國家天下意故能及此而當是之時遂成太平之功使能推其類盡其道則唐之治豈難至於三代之盛哉讀其書嘉其制度有庶幾于古者而惜其不復行也故掇其大要可紀者論之于此焉范祖禹論鄭公陳十漸曰有國者不憂百姓之貧而疑其財之有餘取之不已不恤百姓之勞而疑其力之有餘使之不已此二者亡之道也人主曷不反諸己巳欲富而惡貧則富者民之所欲也已欲逸而惡勞則逸者民之所欲也與其所欲去其所惡而不王者未之有也以太宗之明而養民不及其初宜魏徵以為漸不克終也孫之翰論魏公諫諍曰魏公以忠直稱於世歷數百年而名愈髙李翺論修史之法則曰假如作魏公傳但記其諫諍之詞足以為正直是魏公得諫諍之道其言足傳信於後也觀貞觀十一年魏公上三疏乃諫詞之著者然不過以戒侈逸明任人平刑賞辨忠邪及引前代治亂為說未嘗深言君過亦不及安危大計詳味其意尤見當時之髙致夫不深言君過君無大過也不及安危大計君能自主威福了天下大事也君無大過能了大事真英主也但政有小失則諫之以前代治亂為戒使不至於甚此所以為忠直之臣也魏公事英主力贊政道已成太平之治見其小失尚孜孜諫諍以防其甚如事中常之君天下未治其君或有大過魏公諫諍之言必危切於是至安危大計必忘身以爭也蓋輔相之道不至此不足為忠魏公之心後之相者詳觀之又論鄭公不避形迹之對曰人臣之任國事莫若知無不為一存形迹非公忠之道也且如有賢才滯於下或已之親舊也或權勢之親舊也以此避嫌而不舉又如有臣下誤犯主怒枉為人譖將被刑戮將行竄逐其人或已之親舊也或權勢之親舊也以此避黨而不辨又如有姦惡之人將為國患其人或已之所不足者也或權勢之所不足者也以此疑避而不言凡此之類皆存形迹也人臣存形迹為身之謀爾非所為國計也夫有賢未用國之失也殺逐無辜君之過也姦人將起時之患也為人臣者知國之失而不陳見君之過而不正觀時之患而不救但曰我存形迹此罪不細故謂非公忠之道也溫彥博因魏公為人所毁遂言人臣須存形迹此不忠之言也賴魏公自陳太宗尋悟其事非君臣相信幾失大公之道張唐英曰溫彥博嘗奏魏公不存形迹遂被謗議帝令諭魏公今後須存形迹魏公因奏曰君臣叶契義均一體豈可不存公道唯事形迹若君臣上下同遵此路邦之喪亡未可知也上矍然改容悔之噫魏公之奏實萬世君天下之龜鑑也嘗觀前世治道之駁雜敝源之浸淫非無長謀逺慮之賢經時濟世之主慷慨決裂橫身為國以乂寧天下之蒼生然由君臣之志不通上下之情有間常立事者謂之專權激切敢諫者謂之好訐故朝廷議論之際有可言而不言所以避嫌疑有可行而不行所以逺謗議以致事多因循而不革政或偏弊而不舉始以突隙不徙終焚百尋之屋初以蟻穴不窒竟潰千里之隄魏晉而下何其紛紛之多也鄭公深識安危治亂之變極陳切當之論太宗遂改容悔之真改過不吝而聞諫必從之英主也溫公曽不慮此而反欲魏公存形迹則賢與不賢兹可知矣范祖禹論魏公論主明暗曰善哉太宗之問魏公之對也可謂得其要矣夫聖人以天下為耳目故聰明庸君以近習為耳目故暗蔽明暗之分惟在於逺邇大小而已矣又論鄭公望昭陵獻陵之對曰魏徵可謂能以義正君矣造次不忘納之於善恐其薄於孝而厚於愛也孟子曰惟大夫為能格君心之非若魏徵近之矣又論鄭公對帝天下未定擇人專取才既平取才行兼備曰太宗以治亂在庶官欲進君子退小人此王者之言也而魏公之所謂才行者不亦異乎夫才有君子之才有小人之才古人所謂才者君子之才也後世之所謂才小人之才也髙陽氏有子八人天下以為才其所以為才者曰齊聖廣淵明允篤誠髙辛氏有子八人天下以為才其所以為才者曰忠肅共懿宣慈惠和周公制禮作樂孔子以為才然則古之所謂才者兼德行而言也後世之所謂才者辨給以禦人詭詐以用兵辟邪險詖趨利就事是以天下多亂職斯人之用於世也在易師之上六曰開國承家小人勿用象曰小人勿用必亂邦也未濟曰髙宗伐鬼方三年克之小人勿用王者創業垂統敷求哲人以遺後嗣故能長世也豈其以天下未定而可専用小人之才歟夫有才無行之小人無時而可用退之猶懼其或進也豈可先用而後廢乃取才行兼備之人乎徴之學駮而不純故所以輔𨗳其君者卒不至於三王之治也又論以鄭公為太子太師曰魏公之於太宗知無有不言言無有不盡君臣之際人莫得而間也當是時太子魏王方爭羣臣有黨徴不知之是不明也知而不言是隱情也且君使之為太子師倚其正直以重太子也外不聞告其君以嫡庶之别內不聞訓太子以禍敗之戒受君之託而無所補救處父子兄弟疑危之際依違而已豈其疾而耄乎卒之身沒而見疑讒人得以間之惜哉潁濵論太宗信用鄭公曰古之人主自中君以上為理所屈皆能行之而誠未必加也若漢文帝之於務農唐太宗之於從諫幾於誠矣或問二君之誠孰愈豫謂文帝言不足而意有餘未嘗為外貌觀美繁於詞命而形於制度不過詔令丁寧而已而身之所履則可信不誣矣夫知稼穡者必尚儉彼身衣弋綈足履革舄集書囊為殿帷罷露臺却走馬此其意可見也太宗每見賢臣則求諫援引古今出入經傳此雖無害於聞過而有好名之心似於誠有所不足也意有餘者忘言實有餘者忘名理之必然也文皇嘗曰恨不撲殺此老文德皇后問誰帝曰魏徵夫太宗之信用徵如此而猶有殺心焉則平日之厚敬而深信之未必情也且好諫者不諱其過而魏徵以諫章與史官帝聞而怒遂有仆碑罷婚之事何怨之深如此二事或疑其不信豫謂或有之房𤣥齡李靖魏鄭公司空圖三賢贊并序曰隋大業末房公李公魏公同師文中公嘗謂其徒曰𤣥齡也志而密靖也惠而斷徵也直而遂俾其遭時致力必濟謨庸厥後果然宜有贊激云三賢志同夙尚儒風以植公忠出遇太宗諷議從容謀厥羣雄君勞臣惕荒夷阻闢百千年社稷張唐英論房魏曰夫得百騏驥不若得一伯樂得百太阿不若得一歐冶百騏驥有時而疲劣百太阿有時而缺毁若伯樂歐冶存則舉天下之良馬良劔何求之而不得哉房魏二公文皇帝之伯樂歐冶也當文皇時天下賢士大夫一才一能畢登於朝亦由二公啓沃薦引於上而任用之所以能稱其職而世之談良相者止曰房杜而不曰房魏者何哉房喬起於佐命平定天下輔成太平二十餘年百度修舉其功固大矣如晦與房喬共掌朝政亦多規畫然薨於貞觀三年則其功固不及房矣魏公得用知無不為前後奏議數十萬言著之行事者數百餘條政事大小罔有不論貞觀太平之功魏公之功最居多而言者不曰房魏而曰房杜者豈當太宗即位之初房杜執政天下之民喜見太平之初則言曰房杜及太平已久天下之人但酣樂太宗之德化而功不復歸於臣下是庖人調鼎而不敢食之時也故世不曰房魏焉然迹其行事考之實效魏公才智在杜之上而規畫並於房故曰房魏二公太宗之伯樂歐冶如晦乃溫彥博之流也奚逮於魏哉歷代名賢確論卷七十
