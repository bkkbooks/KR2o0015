body:
  text: 歷代名賢確論卷六十八太宗一帝悟弓工之言延五品以上問政事得失曰朕以弓矢定四方識之猶未能盡况天下之務其能遍知乎范祖禹朝廷之制孫之翰諌官預聞中書門下議事孫之翰責臣下詔敕有不便者皆應論執范祖禹言事告訐者以讒人罪之范祖禹問褚遂良舜造漆器何諌者之多范祖禹觀隋宫苑因戒羣臣諂諛蔽聰明范祖禹論隋文帝不委任臣下范祖禹責宰相求賢才范祖禹責封德彞未有竒材異能可舉之對孫之翰有上書者請帝陽怒以試直佞之臣帝對當以至誠接臣下范祖禹賞張玄素諌修洛陽宫范祖禹幸洛陽官吏以闕儲偫有被譴者魏公諌止之范祖禹指宇文士及為佞人范祖禹與蕭瑀論周秦修短曰取天下或可以逆得而守之不可以不順范祖禹與侍臣論創業守成之難范祖禹與侍臣論天下守之甚難范祖禹謂侍臣朕有二喜一懼范祖禹謂朝臣朕常兼將相之事張行成上書言不可與羣臣校功爭能帝善之范祖禹觀史范祖禹問過失於長孫無忌因論羣臣得失范祖禹欲立元吉妃楊氏為后魏公止之尋以楊所生皇子明繼元吉范祖禹馬周諫帝如貞觀之初節儉范祖禹自為終制戒厚葬范祖禹貶權萬紀言銀坑之利孫之翰殺盧祖尚孫之翰謂侍臣朕即位以來不欲數赦范祖禹詔有司覆奏死刑范祖禹封禪范祖禹即位踰年改元為貞觀孫之翰放宫人三千孫之翰委太子決訟范祖禹廢太子承乾黜魏王泰立晉王治為太子吳王恪附溫公孫之翰張唐英帝悟弓工之言延五品以上問政事得失曰朕以弓矢定四方識之猶未能盡况天下之務其能遍知乎范祖禹曰傳曰國之將興也君子自以為不足其亡也若有餘太宗因識弓之未精而知天下之理已不能盡詢謀於衆而不自用此其所以興也朝廷之制孫之翰曰太宗定天下之功固天授神武之才不待贊論而赫赫於無窮矣其朝廷之制又如是宜乎貞觀之治也夫定官之員不務多而務擇賢則不賢者安得用矣大臣議事使諌官御史史官並從而入或正其失或糾其非或書其過則大臣安敢不直議矣諸司長官正衙奏事使衆臣共聞之屬官不得奏本司外事非至公之事人不敢言則陰邪之事自絶矣疏賤之人言事者令門下司引奏又置立仗馬以備急事則天下之情無不逹矣內侍皆黃衣給事宫掖則姦人無所附而事權不假於人矣數者皆朝廷大法為人君者能遵行之雖未能及貞觀之治朝廷必尊而天下可治也何哉官少而賢必擇之精也大臣不敢曲議必聽之明也諸司官無邪言必制之公也言事者無壅而人情盡逹必采之詳也內侍不預事必御之嚴也數者非太宗英睿不能盡其道人君資性至此者鮮矣然設官少而務擇賢使諫官輩預聞大臣之議而救其失諸司奏事明陳於庭疏賤者言事無壅不任內侍以事必久其制而力行之雖不逮太宗之英睿朝廷豈有不尊天下豈有不治也諫官預聞中書門下議事孫之翰曰太宗之任諫官真得其道夫天下之務至廣也軍國之機至要也雖明主聽斷賢相謀議思慮之失亦不能免一失之則為害不細必藉忠良之士諫正夫忠良之士論治體補國事乃其志爾能密有所助則亦志伸而道行豈必欲張君過而取高名哉當君相議事之際使諫官預聞得以關説或有闕失從而正之天下但覩朝政之得宜不知諌者之所言上下誠通國體豈不美乎况大臣論事以諌官規正於人君之前安敢有不公之議兹亦制御大臣使之無過之術爾若以諌官小臣不可預聞國議必衆知闕失方許諌正事或已行而不可救過或已彰而不可言則剛直之臣有激訏不顧以爭之者君從之猶掩其過或不從則君之過大臣之罪愈大矣觀太宗任諌官可謂得其道責臣下詔敕有不便者皆應論執范祖禹曰朝廷設官分職非徒使上下相從欲交修其所不逮也書曰百官修輔茍取充位而奉行上令則是胥史而已不明之君自以無過惡人之言是以政亂而上不聞太宗敕責而使之言雖欲不治不可得也言事告訐者以讒人罪之范祖禹曰太宗欲聞直言而惡告訐不惟堲讒而又罪之可謂至明且遠矣此為君為長之道也問褚遂良舜造漆器何諌者之多范祖禹曰所貴乎賢者為其能止亂於未然間邪於未形也若其已然則衆人之所能知也何賴於賢乎危亡之言惟明主能信而暗主忽焉是以自古無事之時常患乎諌之難入也今有人康強而無疾或告之以多言之損氣多食之致死彼愛其身者聞之必惕焉兢兢而不忘則疾疢何自而生矣彼恃其強者聞之不惟不信而又艴然是人也不病則已病則忽焉而死雖欲救之無及矣從諌之與拒諌者何以異於是故聖主能從諌於未然賢主能改過於已然諌而不聽者斯為下矣忠臣之事上君也亦諌其未然事中君也多諌其已然事暗君也救其橫流故有以諌殺身者矣唐虞之時羣聖聚於朝無過舉矣憂其所當憂戒其所當戒而已故常有警懼之言其慮患豫也至於後世令王其賢臣多諌其已然而防其未然太宗求諫於羣臣其有意於防未然者乎觀隋宫苑因戒羣臣諂諛蔽聰明范祖禹曰太宗可謂不忘戒矣覩隋之宫苑而以諂諛掩蔽戒羣臣夫知彼之所以亡則圖我之所以存而不敢怠矣此三王之所由興也論隋文帝不委任臣下范祖禹曰書曰元首明哉股肱良哉庶事康哉又曰元首叢脞哉股肱惰哉萬事墮哉此舜皋陶所以賡歌而相戒也夫君以知人為明臣以任職為良君知人則賢者得行其所學臣任職則不賢者不得茍容於朝此庶事所以康也若夫君行臣職則叢脞矣臣不任君之事則惰矣此萬事所以墮也當舜之時禹平水土稷播百穀土穀之事舜不親也契敷五教臯陶明五刑教刑之事舜不治也伯夷典禮夔典樂禮樂之事舜不與也益為虞垂作共工虞工之事舜不知也禹為一相總百官自稷以下分職以聽焉君人者如天運於上而四時寒暑各司其序則不勞而萬物生矣君不可以不逸也所治者大所司者要也臣不可以不勞也所治者寡所職者詳也不明之君不能知人故務察而多疑欲以一人之身代百官之所為則雖聖智亦日力不足矣故其臣下事無大小皆歸之君政有得失不任其患賢者不得行其志而持祿之士得以保其位此天下所以不治也是以隋文勤而無功太宗逸而有成彼不得其道而此得其道故也責宰相求賢才范祖禹曰太宗責宰相以求賢而不使之親細務能任相以其職矣書曰惟説式克欽承旁招俊乂列于庶位此相之職也茍不務此而治簿書期會百吏之事豈所謂相乎責封德彞未有竒材異能可舉之對孫之翰曰封倫真姦人太宗真能照姦人之情者也大臣之職薦逹人材固非細事天下之大中外之任可容一日乏才乎然人之才有能有不能器而任之衆職舉矣豈有人主責其舉賢己未嘗有所推薦但言無竒才異能上欲欺主之明下欲蔽天下之善此真姦人也蓋姦人不樂進賢其情有三姦人保位固寵常懼失之以賢者既用必建立功業掩已之名見已之過已之名減過露則位不能保寵不能固此所以不樂進賢其情一也姦人樹私必人附已乃引之賢者懷才安命進退以道固不肯趍附於人姦人以謂不附已而引之則不知己之恩不知恩則不為己之黨此所以不樂進賢其情二也姦人無至公待人之心心既不公知人不明雖遇賢才不能深識慮引而進之或有大過為己之纍此所以不樂進賢其情三也封倫之情正在於此太宗以前代未嘗乏人折之使慙懼無辭可謂能照姦人之情者也國有姦如封倫者世世不無人主能照其情而責之則公卿悚動賢者進矣有上書者請帝陽怒以試直佞之臣帝對當以至誠接臣下范祖禹曰太宗可謂知君道矣夫君以一人之身而御四海之廣應萬機之衆茍不以至誠與賢而役其獨智以先天下則耳目心志之所及者其能幾何是故人君必清心以蒞之虛已以待之如鑑之明如水之止則物至而不能罔矣夫權衡設而不可欺以輕重者惟其平也繩墨設而不可欺以曲直者惟其正也我以其正彼以其頗我以其真彼以其偽何患乎邪之不察佞之不辨而必行詐以試之哉一為不誠則心且蔽矣邪正何能辨乎是故鑑垢則物不能察也水動則形不能見也已不明故也且待物以誠猶恐其不動也况不誠而能動物乎夫為君而使左右前後之人皆莫測其所為雖欲不欺不可得也惟能御之以至誠則忠直者進而憸邪者無自入矣賞張玄素諌修洛陽宫范祖禹曰上之所好者下之所競也太宗虛已以求直言故羣臣爭救其失惟恐其言之不切太宗不惟悅而從之又賞以勸之此人君之所難能也夫如是何患於有過乎幸洛陽官吏以闕儲偫有被譴者聞魏公諌止之范祖禹曰富而不忘貧則能保其富矣貴而不忘賤則能保其貴矣夫以萬乘之貴四海之富而猶以為不足何哉忘其始之賤貧而欲大無窮也是以高宗舊勞於外爰暨小人及其即位卒為賢君文王卑服即康功田功周公作書以戒成王恐其不知稼穡之艱難而驕逸也漢文有言曰朕能任衣冠念不至此是以恭儉愛民惟恐煩之嗚呼其可謂有德者矣若太宗聞諌而能自省不亦賢乎指宇文士及為佞人范祖禹曰大禹曰何畏乎巧言令色孔壬孔子曰佞人殆佞人者止於諛悅順從而已近之必至於殆何也彼佞人者不知義之所在惟利之從故也利在君父則從君父利在權臣則附權臣利在敵國則交敵國利在戎狄則親戎狄利之所在則從之利之所去則違之於君父何有哉忠臣則不然從義而不從君從道而不從父使君不陷於非義父不入於非道故雖有所不從其命將以處君父於安也君有不義不從也而况於權臣乎父有不義不從也而况於他人乎古之佞者其始莫不巧言令色未必有悖逆之心及其患失則無所不至終於弒君亡國者皆始之諛悅順從者也是故堯舜畏之以比歡兜有苗而孔子以為殆人君可不逺之乎與蕭瑀論周秦修短曰取天下或可以逆得而守之不可以不順范祖禹曰太宗於是失言矣易曰湯武革命順乎天而應乎人取之以仁義守之以仁義者周也取之以詐力守之以詐力者秦也此周秦之所以異也後世或以湯武征伐為逆取而不知征伐之順天應人所以為仁義也太宗曰取之或可以逆非也既謂之逆矣則無時而可也與侍臣論創業守成之難范祖禹曰自古創業而失之者寡守成而失之者多周公曰相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難故禍亂未嘗不生於安逸也然非特創業之君守成為難其後嗣守成尤難也可不慎哉與侍臣論天下守之甚難范祖禹曰書曰后克艱厥后臣克艱厥臣又曰無輕民事惟難孔子曰為君難夫知所難而後可以有為也傳曰君以為易則其難也將至矣君以為難則其易也將至矣太宗知守之之難所以能有終也謂侍臣朕有二喜一懼范祖禹曰太宗樂而不忘憂喜而不忘懼可謂能持盈守成矣夫惟憂於未然懼於無形故卒乎無憂懼也謂朝臣朕常兼將相之事張行成上書言不可與羣臣校功爭能帝善之范祖禹曰人主不患有過患不能改過也太宗一言之失而其臣已救正之惟能親賢以自輔聽諫以自防所以為美也雖過庸何傷乎觀史范祖禹論帝問褚遂良欲觀史曰人君言行被於天下炳若日月衆皆睹之其得失何可私也欲其可傳於後世莫若自修而已矣何畏乎史官之記而必自觀之邪劉洎以為天下亦皆記之斯言足以警其君心而全其臣職矣又論帝觀高祖實録命削去浮詞曰古者官守其職史書善惡君相不與焉故齊太史兄弟三人死於崔杼而卒不沒其罪此姦臣賊子所以懼也後世人君得以觀史而宰相監修欲其直筆不亦難乎司馬遷有言曰太史星厯近乎卜祝之間蓋止於執簡記事直書其實而已非如春秋有褒貶賞罰之文也後之為史者務褒貶而忘事實失其職矣人君任臣以職而宰相不與史事則善惡庶乎其可信也問過失於長孫無忌因論羣臣得失范祖禹曰君臣以道相與以義相正者也故先王以羣臣為友有朋友之義非徒以上下之分相使而已太宗欲聞過於無忌而無忌納諂以悅之君好直而臣不忠其罪大矣而太宗論羣臣之得失其言豈皆中於理哉褚遂良直道事君犯顔諌爭盡忠無隱王魏之比也而譬之飛鳥依人輕侮其臣不恭孰甚焉欲立元吉妃楊氏為后魏公止之尋以楊所生皇子明繼元吉范祖禹曰太宗手殺兄弟曾不愧恥而復納元吉之妃惡莫大焉茍非用魏徴之言過而遂立以為后何以示天下之人乎以明繼元吉後是章其母之為弟婦也其瀆人倫亦甚哉馬周諌帝如貞觀之初節儉范祖禹曰紂積巨橋之粟武王伐之人主不務德而務聚斂者民散而國亡太宗在位寖久將外事四夷內治宫室聚財積穀欲以有為馬周先事而諌欲如初年之節儉可謂將順其美而匡救其惡矣自為終制戒厚葬范祖禹曰厚葬之禍古今之所明知也夫藏金玉於山陵是為大盜積而標示其處也豈不殆哉是以自漢以來無不發之陵後之人主知其有害無益而姑為之以賈禍迹相接而莫之或戒也太宗雖為終制以戒子孫而昭陵之葬亦不為儉及唐之末不免暴露之患豈非高宗之過乎貶權萬紀言銀坑之利孫之翰曰觀太宗罪萬紀言利真得天子之體天子為天下所尊非止威勢之重由仁德之高也仁德之本莫大於愛民愛民之要莫先於節用用之有節天下貢賦之入嵗有餘矣何至殫山澤之利以困人力乎然自三代之衰秦漢而下人君好利者多由所為侈大而無節也用無節天下貢賦之入不足以充其費姦人得以言利矣人君顧所用不足必悅其言而從之好利日甚人力必窮人力窮則危亂自至縱未至危亂天子言為令動為法以好利聞於天下豈其體哉太宗斥言利之臣無他能自節用謹制度絶權幸無過費爾貞觀一朝其事可見初出宫人三千天下固已頌其仁愛及宫中欲修一殿則想秦皇之過不起其役體不耐熱公卿請營一閣以避暑亦想漢文罷露臺之意不從其請將幸東都敕預修乾陽殿給事張玄素極言隋室修乾陽勞民之事嘉其言立止出降長樂公主敕有司資送倍於長公主侍中魏鄭公引故事言長公主尊於公主豈得以親愛厚其資送納其言遂不越禮其設官之制則命宰輔房喬杜如晦定其員位文武官止六百四十員多得才能而少冗食其養兵之法畿內及諸路府兵止六十萬惟玄素禁兵三萬及府兵畨上或出征者有所給外皆散之農畝而自養焉其行賞之事功者厚賢者禮內無嬖人私其恩外無幸臣竊其澤天下嵗入之物有餘用矣故薄賦斂厚風俗其道德與前代聖王所為並自得天子之體矣嗚呼為天子皆可至是可至是而不至者由所為侈大制度不立權幸不抑所致爾所為侈大物力固難以給若制度不立則庶事無節而冗費益多權幸不抑則姦人競附而私恩益廣冗費多私恩廣天子獨尚儉德亦何能省用太宗自節其用復能謹制度絶權幸此所以不取山澤之利不困生民之力而財用自豐為天子而得其體者仁德於無窮也殺盧祖尚孫之翰曰人主操天下之勢不可一日失威令威令一失則下起慢上之漸漸若不止則紀綱弛而權移於下何以操天下之勢故謂人主不可一日失威令也然威令之行不可過中過中則暴暴則人心離矣太宗之用威令誠得其術故內外之臣聞一令罔不靡然從之此無他以聰明之性公正之心剛嚴之體御於內外也以此御內外天下得不從其令乎盧祖尚丁其時荷其任乃委曲思慮以身為計遂成驕慢之態宜乎獲罪矣然殺戮刑之極者施於驕慢之罪此又過矣人臣驕慢殺之復有罪之極者何以加刑若祖尚之罪逐於遐裔而永棄之未至失威令也謂侍臣朕即位以來不欲數赦范祖禹曰數赦之害前世論之詳矣夫良民不被澤而罪人獲宥政之偏黨莫甚於此欲以致和而措刑不亦疏矣而人君每以赦為推恩或祈陰德之報太宗懲之可謂善治者矣詔有司覆奏死刑范祖禹曰易中孚象曰君子以議獄緩死中孚者信發於中也議獄緩死者出於至誠也古者大司冦以獄之成告於王王命三公參聽之三公以獄之成告於王王三覆然後制刑先王慎重如此故刑清而民服者太宗之恤刑也可謂至誠而近於古矣幾致刑措不亦宜乎封禪范祖禹論文武百官請封禪鄭公止之曰古者天子巡守至於方嶽必告祭柴望所以尊天而懷柔百神也後世學禮者失其傳而諸儒之諂諛者為説以希世主謂之封禪實自秦始古無有也且三代不封禪而王秦封禪而亡人主不法三代而法秦以為太平盛事亦已謬矣太宗方明朝多賢臣而諂佞者猶倡其議獨魏徴以為時未可而亦不以其事為非也其後使顔師古議其禮房喬裁定之徵亦預焉貞觀之末屢欲東封以事而止高宗明皇遂踵行之終唐之世惟栁宗元以封禪為非以韓愈之賢猶勸憲宗則其餘無足怪也嗚呼禮之失也久矣世俗之惑可勝救哉孫之翰曰封禪之文不著於經典秦漢諸儒用管仲説以為帝王盛德之事無大此禮故秦皇漢武行之儀物侈大自謂光輝無窮然封禪之後災異數至天下多事蓋煩費生靈干動和氣所致則崇尚此禮惡足以當天意哉况此禮不著於經典也司馬遷作封禪書引經典之文但巡守之禮爾帝王巡守每至方嶽必燔柴以告至非謂自陳功於天也帝王治天下能以功德濟生民而致時太平則天必祐之以永久之福郊祀之禮足伸其報何待自告其功也太宗謂以事天至誠掃地足以致敬何必登山封數尺之土此實至論即位踰年改元為貞觀孫之翰曰或問春秋書國君即位必於元年正月明新君踰年即位改元也此書即位踰年豈春秋之法乎答曰尚書記天子傳位改元之法舜則曰月正元日禹則曰正月朔旦春秋即位改元之法本於此聖人以舜禹之法為天下之至正也然顧命康王之誥記成王崩康王既為天子乃釋冕反喪服蓋以先君不書所終之年天子之位不可一日而虛故於柩前即位明先君傳授之意不及行舜禹之法也但踰年稱君改元亦同其道矣以天子不待踰年即位則諸侯可知也春秋一國之史聖人修之遂見天下大法天下大法莫若舜禹至正也元年初即位説者引康誥之文為定以謂新年正月必改元正位百官以序國史書即位以表之此雖明不待踰年即位元年見新君之法不知聖人因而存舜禹之道也况魯侯即位雖稱元年必書王正月者上以明王道之序下以見諸侯奉王制而即位也若修天子之史可不知書元年即位之法乎又後代事艱天子繼統必待踰年稱君勢有不便矣固當依實書之雖略變古法其曰以即位踰年改元亦所以法尚書定位春秋改元見新君之意也放宫人三千孫之翰曰古之明王嬪御之數著於經典者可見也漢之後宫及千數賢如魏相者不肯出仕矣蓋以人君廣置嬪御其損有三侈費甚也內寵多也怨女衆也侈費甚則困民力內寵多則競私謁怨女衆則傷和氣人君之德所損如是賢者以為難諌止而不願仕也况隋煬荒虐自古無比強取良家女置後宫者固無其數高祖初入關放離宫之人還親屬此得美事之一節及受禪安然有其後宫欲不荒恣得乎賴聖子承之立矯其過計出三千之衆使天下聳動歌詠唐之盛德也委太子決訟范祖禹曰太子之職在於視膳問安古之教者必以禮樂而置師保以輔翼之茍問學明而德性成何患乎不能聽訟也且年十二而使之裁決民事不已早乎若其才則將不學而能不才則宫臣必教之以欺其君父非所以養德也廢太子承乾黜魏王泰立晉王治為太子吳王恪附司馬溫公曰唐太宗不以天下大器私其所愛以杜禍亂之原可謂能遠謀矣孫之翰曰王者立太子以嫡以年以德固有常禮若嫡與年者或庸昏或過惡固不可不擇於諸子也擇之之法取衆望決已意則天下歸心矣太宗英主也斷大事未嘗有疑晚年牽愛不能定一子泰長而有過立晉王固無疑何至投牀自苦取決於無忌之言太子君之副社稷之本豈使一臣立之仍命拜謝賴太子良人情有屬無忌忠不擅其恩不如是必起爭亂之階張唐英論吳王恪曰太子承乾得罪太宗欲立魏王泰褚遂良諌之以為不可因召長孫無忌房喬李績等謂曰我三子一弟如此我心無憀因投於牀抽佩刀欲刺無忌等爭前抱持奪其刀問上所欲上曰我欲立晉王無忌曰謹奉詔有異議者斬之既而又悔欲立吳王恪無忌切諍而止無忌等慮恪為患因房遺愛謀叛而誣殺之嗟乎太宗之立儲副不足為後世法也且立太子者非私於已之子也為天下國家之大本也既以承乾不軌而誅之則宜察諸子之賢不肖擇其有君人之德者立之不然則立嫡以長以絶爭奪之禍此三代之直道而行也奈何輕天下神器之重以一時之忿引刀自刺使顧命大臣奉詔於惶恐之際不暇議立嫡立賢之計此豈保家安國之道哉既立高宗而復欲立吳王恪卒使以猜疑而被羅織之罪皆太宗失於獨斷而致之也噫夫人之生貴為天子之子是天下之貴無以加之也以建立之失不保性命則與夫生於不貴之族反得終天年者豈不遠哉無忌其後卒被流竄死於黔南天下以為寃然而亦疑其誣殺吳王恪之報應也歷代名賢確論卷六十八
