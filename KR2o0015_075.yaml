body:
  text: 歷代名賢確論卷七十五玄宗一以宰相張説兼節度使巡邊范祖禹渤海王武藝母弟門藝來奔武藝請罪之上詐報云已流於嶺南溫公王毛仲掌監牧馬蕃育至四十三萬匹加開府范祖禹帝使王忠嗣攻石堡城忠嗣言不可後助董延光取之不克李林甫因譖忠嗣范祖禹引百官觀左藏賜物有差范祖禹始置翰林院下至僧道百工皆處之謂之待詔范祖禹尊奉道教范祖禹六一子由初令置太公廟以張良配享選古名將備十哲溫公制增太廟為九室范祖禹以符瑞相繼乃加聖祖號并諸帝后諡范祖禹羣臣上開元神武皇帝尊號范祖禹孫之翰設五王帳范祖禹諡岐王為惠文太子范祖禹廢太子瑛鄂王瑶光王琚為庶人皆賜死范祖禹孫之翰立貴妃范祖禹石守道安祿山范祖禹孫之翰子由幸蜀范祖禹以宰相張説兼節度使巡邊范祖禹曰宰相之職無不總統而兼節制一道此開元之亂制也孔子曰必也正名乎夫宰相百官之首也名且不正則何以正百官矣自古官制之紊未有如開元者也然則後世何所法乎渤海王武藝母弟門藝來奔武藝請罪之上詐報云已流於嶺南司馬溫公曰王者所以服四夷威信而已門藝以忠獲罪自歸天子天子當察其枉直賞門藝而罰武藝為政之體也縱不能討猶當正以門藝之無罪告之今明皇威不能服武藝恩不能庇門藝顧效小人為欺誑之語以取困於小國乃罪鴻臚之漏泄可不羞哉王毛仲掌監牧馬蕃育至四十三萬匹加開府范祖禹曰詩美衛文公曰秉心塞淵騋牝三千夫塞故能誠淵故能通誠於已而通於人所以致物之多也唐之國馬惟得一能臣而掌之不數十年而具多過於二百倍由其在職之専也傳曰冀之北土馬之所生夫馬必生於邊隅而養於苦寒之地稍近之中國則莫非壯也三代諸侯之國雖皆有馬以春秋之時考之未若晉之強也鄭之小駟出於河南故不可乘唐養馬於隴右非獨就其水草之美蓋置之西戎之地以求其健也凡欲制事得其人而善其法豈有不盛者乎帝使王忠嗣攻石堡城忠嗣言不可後助董延光取之不克李林甫因譖忠嗣范祖禹曰王忠嗣可謂賢將矣不為無益害有益不以所得易所亡不顧一身之危而惜士卒之命其可謂賢將矣然忠嗣知石堡之不可取莫若固守前議而勿分兵以助延光均之得罪不亦直乎既黽勉奉詔豫之兵而復撓其謀使讒人得以藉口豈忠嗣思之未至邪引百官觀左藏賜物有差范祖禹曰財者天地之所生而出於民之膏血先王知稼穡之艱難杼軸之勤勞故取之有制用之有節明皇暴斂而橫費之其不愛惜如此安得無禍乎始置翰林院下至僧道百工皆處之謂之待詔范祖禹曰中書門下出納王命之司也故詔敕行焉明皇始置翰林而其職始分既發號令豫謀議則自宰相以下進退輕重繫之矣豈特取其詞藝而已哉釋老之徒方外之士書畫琴棊數術藝技以事上不與士齒者也而使與文學之臣雜處非所以育材養賢也上失其制下懷其利為之者不亦可羞乎尊奉道教范祖禹論帝夢玄元得其像曰中庸曰誠則形形則著揚雄曰人心其神矣乎人之有夢也蓋亦誠之形而心之神也今夫入無人之室而其心惴焉則或聞肅肅之聲見罔象之形何也心之動也夢亦如是矣昔髙宗恭默思道誠心求賢故夢帝賚之良弼果求而得之此其心之神也開元之末明皇怠於庶政役志神仙惑方士之言自以老子其祖也故感而通之是宜其誠之形也自是以後言祥瑞者衆而迂怪之説且曰聞諂諛成風姦宄得志而天下之理亂矣人君心術可不慎哉又論田同秀言玄元錫寶符曰孟子曰上之所好下必有甚者矣明皇崇老喜仙故其大臣諛小臣欺蓋度其可為而為之也不惟信而惑之又賞以勸之則小人孰不欲為姦罔哉昔漢文一為新垣平所詐而終身不復言神明之事可謂能補過矣又論王元翼言玄元授妙寶真符曰昔秦始皇削平六國漢武帝驅攘四夷皆雄才之主也及其為方士之所欺玩無異於嬰兒人君惟恭儉寡欲清虛以居上則邪諂無自而入矣其心一有所蔽鮮不為惑也明皇不正其心故小人爭為幻以惑之其神明精爽既奪矣此所以養成大亂也又論追尊玄元皇帝父并皋陶為帝曰孔子曰非其鬼而祭之諂也傳曰神不歆非類民不祀非族唐祖老子茫昧荒忽矣老子之父書傳無見焉取方士附會之説而追尊加諡不亦誣乎書曰皋陶作士而作史者以為大理既不經矣又以為李氏所出而尊之尤非其族類也唐之先祖出於隴西狄道非如商周有世次皆可考也而必託之上古以耀于民非禮之禮適所以為後世笑也又論帝謂黃素俄升天空中為護藥曰明皇假於怪神以罔天下言之不怍而居之不疑何以使其臣下不為欺乎是率天下而欺已也昔漢武封太室而從官諂諛言有呼萬嵗者明皇乃自為詐又甚於漢武矣六一論華陽頌曰玄宗尊號曰聖文神武皇帝可謂盛矣而其自稱曰上清弟子者何其陋哉方其肆情奢淫以極富貴之樂蓋窮天下之力不足以贍其欲使神仙道家之事為不無亦非其所可冀矧其實無得哉甚矣佛老之為世惑也佛之徒曰無生者是畏死之論也老之徒曰不死者貪生之説也彼其所以貪之意篤則棄萬事絶人理而為之然而終於無所得者何哉死生天地之常理畏者不可以茍免貪者不可以茍得也惟積習之久者成其邪妄之心佛之徒有臨死而不懼者妄意乎無生之可樂勝其所畏也老之徒有死者則相與諱之曰彼超去矣彼解化矣厚自誣而託之不可詰或曰彼術未至故死爾前者茍以遂其非後者從而惑之以為誠也佛老二者同出於貪而所習則異然猶必棄萬事絶人理而為之其貪於彼者厚則捨於此者果若玄宗者方溺於此而又慕於彼不勝其勞是其可笑也子由論明皇好無為説而敗曰人主當務好要不當務無為夫無為之為言妙矣此羲農堯舜得道者之事也而庸君昏主聞其説而樂之深居奧處蒙塞耳目是非過前而不察姦臣愚弄而不悟視人之利害國之存亡若越人聞秦人之疾痛者曰我無為也耽樂飲酒嬖女色晏朝早罷遊蕩無度亦曰無為也是故莫若好要吾不治事付人以事而視其成吾不吝權分人以權而觀其趨事成而利則可成而害則必治其故而賞罰行焉分吾之權而志於公則任之盜吾之權而行其私則斥之而用舍公焉此之謂要知好要則進乎無為矣明皇任李林甫十餘年盡失賢者之助太宗之法度廢革殆盡貞觀之風俗廢壞無遺林甫朝夕從事者非聚斂奢侈以蕩移人主之心意則羅織刑獄以破滅人之家族也國門之內干戈砧鉞未嘗絶而間為神仙鬼怪之説以動其心而明皇恬不為慮漫不知察利器去手而不覺一敗塗地沒世不復凡此者其始好無為之説者也可不戒哉初令置太公廟以張良配享選古名將備十哲司馬溫公曰經緯天地之謂文戡定禍亂之謂武自古不兼斯二者而稱聖人未之有故黃帝堯舜禹湯文武伊尹周公莫不有征伐之功孔子雖不試猶能兵萊夷卻費人曰吾戰則克豈孔子専文而太公専武乎孔子所以祀於學者禮有先聖先師故也自生民以來未有如孔子者豈太公得與之抗衡哉古者有伐則命大司徒教士以車甲裸股肱決射御受成獻馘莫不在學所以然者欲其先禮義而後勇力也君子有勇而無義為亂小人有勇而無義為盜若専訓之以勇力而不使之知禮義奚所不為矣自孫吳以降皆以勇力相勝狙詐相髙豈足以數於聖賢之門而謂之武哉乃厚誣引以偶十哲之目為後世學者之師使太公有神必羞與之同食矣制增太廟為九室范祖禹曰書曰七世之廟可以觀德荀卿曰有天下者事七世天子七廟自古以來未之有改也其祖宗有功德而其廟不毁則無世數商之三宗周之文武是也然則三昭三穆之外猶足以祖有功而宗有德矣明皇始為九廟過其制矣夫禮不可多也不可寡也三代之禮所以為後世之法者盡矣唐制何所取乎以符瑞相繼乃加聖祖號并諸帝后諡范祖禹曰自堯舜禹湯文武之君諡號惟一而已既稱天以誄之則子孫不可得而改也髙宗不師古昔始改祖宗舊諡天寶以後增加復重至繁而不可紀夫祖宗茍有髙世之功德則曰文曰武足矣若其無功德而子孫妄加之則是誣之而使天下後世以為譏玩也故夫孝子慈孫之欲顯其親莫若使名副其實而不浮則天下心服之矣未聞以諡號繁多為貴也唐之典禮不經亦甚哉羣臣上開元神武皇帝尊號范祖禹曰三皇稱皇五帝稱帝三王稱王豈其德不足歟名號一而已矣及秦兼皇帝之號固已僭矣後世因而不改以為法後王也漢哀惑於妖讖始有陳聖劉太平之號周宣驕恣自稱天元髙宗稱天皇武后稱天后尊號之興蓋本於此開元之際主驕臣諛遂著以為故事使其臣子生而加諡於君父豈不悖哉孫之翰亦論加尊號曰古天子之稱曰皇曰帝曰王蓋稱其德也秦不顧德之所稱但務尊極故稱皇帝然亦未有尊號也至漢哀帝始有聖劉太平之號此豈可為法乎髙祖太宗各有功德俱無尊號髙宗徇武后之意始稱天皇中宗從韋庶人之欲乃號應天二宗並為婦人所制紀綱號令不由於已其行事紛亂果合天理乎而稱曰天皇號曰應天是妄自尊大但取千萬世所罪且笑也明皇以賢繼位祖宗善惡之事聞見固熟何故忘髙祖太宗之實德襲髙宗中宗之虛名蓋臣下諂諛者不守經義逢君之過而然也故所上表明言何必稽古此人臣不思之言爾人君行事不可泥古之迹又不可不稽古之道泥古迹則失於通變之機不稽古道則無以成大中之法況明皇英偉之主志氣雄侈臣下常以古道諷之尚慮越逸可得明言何必稽古以導其侈心乎豈非不思之言也設五王帳范祖禹曰文王孝於王季故友于兄弟睦於太姒故慈於子孫以及其家邦至於鳥獸草木無不被澤者惟其心而已矣先王未有孝而不友友而不慈者也至於後世帝王或能於此則不能於彼何哉非其才不足以為聖賢不能舉斯心加諸彼而已明皇以藩王有功成器居嫡長而能辭位以授之故明皇之心篤於兄弟蓋成器之行有以養其友愛之心也是以能全其天性而讒間之言無自入焉嗚呼茍能充是心則仁不可勝用也至於為人父則以讒殺其子為人夫則以孽黜其妻為人君則以非罪殄戮其臣下是皆不能充其類也茍不能充其類則其為善不出於利心哉諡岐王為惠文太子范祖禹曰太子君之二將以付畀宗廟社稷之重非官爵也而以為贈何哉雖親愛其弟欲以厚之然不正之禮不足為後世法也廢太子瑛鄂王瑶光王琚為庶人皆賜死立太子忠王附范祖禹曰明皇三子之廢繫於李林甫之一言其得未廢繫於張九齡之未罷相賢則父子得以相保相佞則天性滅為仇讎置相可不慎哉孫之翰論册忠王為太子曰國之廢立太子可容易哉其立之也非嫡不可非長不可非賢不可開元初明皇立瑛為太子非嫡也非長也但以母善歌舞寵之遂立其子立之固容易爾然立之二十餘年名分久定雖不聞大賢亦不聞有過又可容易廢之乎不惟廢之復殺之矣此雖武妃妖惑林甫賊計致明皇有是大惡然迹其本末亦由張説之過也明皇諸子皆非中宫所生可慎擇賢者立之矣何必即位之初急於立子蓋方寵瑛母用説其意爾然立之嵗久中外不聞其過人心有奉矣開元十七年忠王領河北元帥與百官相見張説退而言曰嘗觀太宗寫真圗忠王奇表比之聖祖事果便乎蓋昭成方娠説侍讀東宫知其異事謂王當受天命故因事言之使衆知爾亦或有結王之意也説事明皇不惟東宫之舊復贊先天監國之事情義至密非他相可比故任用已來言必從計必行觀忠王之事豈無密謀潛議也若果以瑛之才不能任唐事忠王賢足以代之何不定計退瑛於藩而立忠王使父子之際社稷之重無所失焉何密稱忠王之善而無所定計計雖不定明皇意已移矣天子於太子有移意則嬖寵姦賊之言入之易爾以此論之豈非張説之過也不然二十五年張九齡以直道被黜朝廷之士知明皇方惡忠言林甫方専凶計誰復開口敢謀國事明皇於林甫之言無不聽納惟立壽王瑁事不聽而卒立忠王也然瑛之才逮與不逮忠王無以辨之但國有太子而説為人臣稱諸王之美又不能贊定立太子之計使處置得所終致明皇殺子之惡説無以逃其過矣立貴妃玄宗子壽王妃范祖禹曰衛宣公納伋之妻國人惡之明皇殺其三子又納子婦於宫中用李林甫為相使族滅無罪父子夫婦君臣人之所以立也三綱絶矣其何以為天下乎又論貴妃以襁褓裹祿山曰昔辛有適伊川見被髮而祭者知其將為戎明皇不信其子而寵胡人以為戲至使出入宫掖而不疑褻慢神器亦極矣豈天奪其明歟何其惑之甚也石守道曰明皇帝承則天中宗睿宗三朝危亂之後思洗刷垢穢剗絶荒蕪澄滌化源潔清政道乃用姚崇宋璟韓休張九齡李元紘杜暹等相次為宰相宵分不寐日昊不食潛心堯舜之道側耳忠良之言憂勤萬機念慮四海不敢暫時逸豫不敢一日畋遊苑囿稀行聲色不御汲汲論思遂致開元三十年太平一日妃子入宫専寵惑成內荒頗隳庶政蛾眉巧笑迷君之心妖姿艷舞眩君之目日月斯久情愛寖深竭天下之財以奉一婦人殫海內之力以事一女子常恐不足兄弟姊妹皆啓厚封骨肉姻親咸登要職名園甲第以賜之膏腴水石以寵之牝雞晨鳴威過人主后戚専國勢傾朝廷諸侯輦貨於妃子之宫四方爭賂於楊氏之宅恩由財結官以賄成紀綱盡隳爵賞無序讒邪得進忠良見廢故天寶之政不在於天子而在於楊氏是以中外胥怨人神共憤逮祿山舉兵一唱而東都陷沒靈駕播遷倉皇出關崎嶇幸蜀國祚危如綴旒皇都鞠為茂草誰其為之楊氏一婦人也遷主恩而自専弄國柄而無禁色荒於內而天下怨叛豈非一婦人能致耶詩曰赫赫宗周褒姒滅之紂以妲己而亡吳以西施而滅天寶之亂誰謂非貴妃之罪也噫明皇至聰明至神聖也為一女之惑取笑千載之下可痛也哉臣嘗思唐髙祖太宗親履矢石身冒霜露艱難辛苦十餘年以得天下既得之後側席求賢虛心納諫晝視朝政日既不食夜讀經書漏分不寐勞心苦體孜孜焉致海內太平作子孫久長業未嘗敢暫時宴樂未嘗敢一夕荒寧苑囿不遊絲竹不御畋獵不數女色不近凡武德貞觀二三十年間四海晏然生人樂業國家之制度備矣禮樂成矣政化行矣教法修矣以垂於子垂於孫將謂之萬世而無喪亂覆亡之禍也嗚呼太宗陵土未乾而則天奪國李氏子孫殺戮殆盡唐室宗廟將為丘墟自後韋皇后安樂公主專政擅權朝廷大壞至楊太真之惑亂則海內一搖明皇肅宗四世播遷唐室自此亦衰矣才得十八帝僅三百年國滅家破良由髙宗中宗睿宗明皇覆敗祖業噓嗟歎息痛心疾首撫卷扼腕而泣下不止蓋傷其人子傳人社稷不仁不孝以致於此臣聞天子之孝在乎承宗廟奉社稷撫四海安萬民彼髙宗輩惑一婦人溺一女子忽然忘宗廟之重棄社稷之大輕四海之廣絶萬民之衆其為不孝也甚矣後世得不以為深戒哉安祿山范祖禹論祿山兼領范陽節度而黜陟使席建侯稱祿山公直李林甫裴寬皆順旨稱美由是祿山之寵益固曰明皇寵信安祿山故羣臣爭譽其美以封殖之主心益固雖太子不能間也三人者豈必交利於一蕃將而不忠於唐之社稷哉不過諛悅人主以保寵位而已其後祿山卒大亂天下人臣阿意順旨其長禍豈細哉孫之翰論輔璆琳固稱祿山無事曰人主信待中官無甚於明皇也祿山領三道兵權勢力至重又請蕃將以代舊將反計可知國忠以貴妃之親極公相之位明皇寵信無不從及奏祿山逆狀流涕以言是必欲感悟主心也然明皇竟未之信潛使璆琳往察其狀是信待國忠之意未及於中官也其意曰國忠我之寵丞相也但祿山有功不無忌嫉則其言未必忠於我也璆琳日在左右我所親信委之以事必盡忠於我也以此待璆琳之意過於國忠及為璆琳所誤遂成大亂雖説之不及事矣後之人君信待中官不可不慎子由論明皇征安祿山之利害曰天寶承平兵不知戰大盜突起四海震動御之無䇿君播國殘哥舒之敗固無足道者明皇欲下詔親征而姦臣嬖佞沮撓其事當是時天子臨戎其有濟乎愚嘗論之天寶盜起雖上有昏德聰明杜塞抑當時朝廷無人矣故為是猖狂不審之謀夫天子臨戎其利有二天下莫能當而明皇皆不得行之幸而不行使果行其狼狽有甚於此者何謂二利一者壓之以尊名重勢敵人雖強不忍冒犯順之危而起人之怒二者天子所統必天下之重兵選將天下莫能抗明皇時天下之勢其重在西北而京師輕也久矣大獄屢興縉紳切齒用兵無度百姓怨苦內煽淫泆荒亂失度尊名之不振也甚矣祿山教戰其將皆蕃戎徑卒非復唐也彼惟恐犯順之不深侮上之不快則明皇之於尊名重勢所不得行一也天下徑兵皆在西北藩臣握之府兵既壞天子侍衛長征彍騎而已有急而募不過得長安市中子而以抗代北徑騎此以羊戰狼則明皇於重兵選卒所不得行二也親征不可則無䇿乎曰知兵者必知敵人所恃如是者百戰不殆祿山之利速戰也所恃范陽也十年教其民千里而用之其鋒不可當雖太公穰苴必姑避之故賊必乘其鋒而用之彼惟恐戰之不速敵人之不我拒也然祿山之勢雖渡河而南則羇客也故心動易搖其恃范陽如虎豹之有山林急則投之以自藏方祿山之南也厚集潼關之師深溝髙壘勿與之戰委河南與之是時李光弼郭子儀皆在河北遣一將搗范陽之虛往必得志彼進則不得入關退則已失范陽獨守空虛之東都不過半年其勢潰矣此至計也其後祿山既死慶緒北走而史思明已有范陽慶緒卒困死河朔以此知祿山失范陽則必斃於河朔諸帥也其後史思明陷東都李光弼拒之於河陽而思明不能西以此知厚集潼關之師不戰而老之而祿山傾國逺鬭委其所恃而不顧固已犯天下之至危而唐之君臣不知出此唐無人也夫范祖禹論顔真卿杲卿等起兵討祿山曰明皇之末朝廷無忠賢左右無正人一旦兵起幽薊中原瓦解而杲卿首謀於常山真卿唱義於平原張介然崔無詖死其城郭李憕盧奕蔣清死其官守賈賁以一尉討賊張巡以縣令起兵郭子儀鷹揚於朔方李光弼電擊於河北孰謂天下無人乎蓋有之而不用也其後興復唐室卒賴之於忠賢夫國有人則存無人則亡古者萬乘之國有一臣則不可得而亡況忠賢如此其多乎唐之不亡斷可知矣詩云無競維人四方其訓之茍得其人則何危亂之有幸蜀范祖禹論曰傳曰社稷之主不可以輕輕則失衆況為天下之主乎古者天子巡狩必載廟主而行明皇既不能率其民人城守以待勤王之師必不得已而避冦出奔猶當告于宗廟諭衆而行為備而動則不至於顛沛矣乃以天子之尊獨與其所愛脫身而逃委其子孫皆碎賊手明皇自取之也自是以後天下有變則京師不守人主先為出計自明皇始其可醜也夫又論上至咸陽日中不得食曰臣民之位上下之等以勢相扶而已矣天子者以一身而寄天下之上所恃者衆心之所戴也合而從之則為人君離而去之則為匹夫天下常治則能保其人君之尊亂則衆散衆散則與匹夫何異哉書曰豫臨兆民凛乎若朽索之馭六馬先王不敢自恃如此故其國家可保也明皇享國幾五十年一旦失國出奔自長安至咸陽不四十里而已無食天子之貴四海之富其可恃乎又論老父郭從謹讓上以杜絶直言致亂曰天寶之亂田夫野人皆能知之而其君不得聞豈不哀哉夫壅蔽之禍至白刃流矢交於前六親不能相保而始覺也不亦晚乎歷代名賢確論卷七十五
